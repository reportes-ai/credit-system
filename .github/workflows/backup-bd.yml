# ─────────────────────────────────────────────────────────────────
# Respaldo nocturno de la BD (TiDB Cloud) — complementa el backup
# automático de TiDB Starter, cuya retención es de SOLO 1 día.
# Cada noche hace mysqldump completo y lo guarda en DOS lugares:
#   1) artefacto privado del repo (30 días de retención)
#   2) bucket privado de Google Cloud Storage (gs://autofacil-respaldos-bd,
#      90 días por la regla de ciclo de vida del bucket) — tercera copia,
#      fuera de GitHub y de TiDB. Requiere los secrets GCP_SA_KEY y GCS_BUCKET.
#
# Restauración:  descargar el artefacto → descomprimir →
#   mysql -h <DB_HOST> -P 4000 -u <DB_USER> -p --ssl-mode=VERIFY_IDENTITY <DB_NAME> < backup.sql
# (restaurar en un cluster/branch nuevo primero; NUNCA directo a prod sin revisar)
# ─────────────────────────────────────────────────────────────────
name: Backup BD nocturno

on:
  schedule:
    - cron: '17 6 * * *'   # 06:17 UTC = 02:17 Chile (verano) — fuera de horario
  workflow_dispatch: {}     # también se puede lanzar a mano (pestaña Actions)

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Instalar cliente MySQL
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mysql-client

      - name: Dump completo
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          mysqldump -h "$DB_HOST" -P "${DB_PORT:-4000}" -u "$DB_USER" -p"$DB_PASSWORD" \
            --ssl-mode=REQUIRED --skip-lock-tables --quick --no-tablespaces \
            --set-gtid-purged=OFF --column-statistics=0 \
            "$DB_NAME" | gzip -9 > backup-$(date +%Y%m%d).sql.gz
          ls -lh backup-*.sql.gz
          # Sanidad: el dump debe terminar completo
          gunzip -t backup-*.sql.gz
          zcat backup-*.sql.gz | tail -1 | grep -q "Dump completed" && echo "✓ dump completo"

      - name: Guardar artefacto (30 días)
        uses: actions/upload-artifact@v4
        with:
          name: backup-bd-${{ github.run_id }}
          path: backup-*.sql.gz
          retention-days: 30
          compression-level: 0

      # ── Tercera copia: Google Cloud Storage (bucket privado, 90 días de retención
      #    por regla de ciclo de vida del bucket). Si el secret no está, se omite. ──
      - name: Subir a Google Cloud Storage
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "GCP_SA_KEY no configurado — se omite la copia a Google Cloud Storage"; exit 0
          fi
          printf '%s' "$GCP_SA_KEY" > /tmp/gcp-sa.json
          # gcloud/gsutil ya vienen instalados en ubuntu-latest
          gcloud auth activate-service-account --key-file=/tmp/gcp-sa.json --quiet
          gsutil cp backup-*.sql.gz "gs://${GCS_BUCKET}/"
          rm -f /tmp/gcp-sa.json
          echo "✓ dump subido a gs://${GCS_BUCKET}/"
