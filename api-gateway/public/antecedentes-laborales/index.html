<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antecedentes Laborales — AutoFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#001345; --blue:#0141A2; --sky:#009AFE; }
    body { background:#f0f4f8; font-family:'Segoe UI',system-ui,sans-serif; }

    .topnav { background: linear-gradient(90deg, #012d70, #0255c5); color: #fff; height: 60px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .topnav-left { display: flex; align-items: center; gap: 16px; }
    .topnav-brand img { height: 34px; filter: brightness(0) invert(1); }
    .version-badge { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.75); font-size: 0.65rem; font-weight: 700; border-radius: 6px; padding: 2px 8px; letter-spacing: 0.5px; margin-left: 2px; }
    .topnav-right { display: flex; align-items: center; gap: 12px; }
    .user-chip { background: rgba(255,255,255,0.12); border-radius: 24px; padding: 5px 12px; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
    .avatar { width: 28px; height: 28px; background: #90caf9; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #0141A2; font-weight: 700; font-size: 0.75rem; }
    .perfil-badge { background: rgba(144,202,249,0.2); border: 1px solid rgba(144,202,249,0.4); color: #90caf9; border-radius: 12px; padding: 2px 10px; font-size: 0.73rem; font-weight: 600; }
    .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 5px 12px; font-size: 0.82rem; cursor: pointer; transition: background 0.2s; }
    .btn-logout:hover { background: rgba(255,255,255,0.22); }

    .page-wrap { max-width:1100px; margin:20px auto; padding:0 24px 60px; }

    /* Cliente banner */
    .cliente-banner {
      background:linear-gradient(135deg,var(--navy),var(--blue));
      border-radius:12px; padding:16px 24px; margin-bottom:18px;
      display:flex; align-items:center; justify-content:space-between; color:#fff;
      flex-wrap:wrap; gap:10px;
    }
    .cliente-banner .nombre { font-weight:700; font-size:1.05rem; }
    .cliente-banner .rut    { font-size:.9rem; opacity:.85; }
    .nav-btns { display:flex; gap:8px; flex-wrap:wrap; }
    .btn-nav {
      background:rgba(255,255,255,.15); color:#fff;
      border:1px solid rgba(255,255,255,.35); border-radius:8px;
      padding:7px 16px; font-size:.83rem; font-weight:600; cursor:pointer;
      transition:background .15s; text-decoration:none; display:inline-flex; align-items:center; gap:6px;
    }
    .btn-nav:hover { background:rgba(255,255,255,.28); color:#fff; }
    .btn-nav.active { background:#fff; color:var(--blue); }

    /* Form card */
    .form-card {
      background:#fff; border-radius:12px;
      padding:22px 26px; margin-bottom:18px;
      box-shadow:0 1px 6px rgba(0,0,0,.08);
    }
    .section-label {
      font-size:.78rem; font-weight:700; color:var(--blue);
      text-transform:uppercase; letter-spacing:.08em;
      margin-bottom:14px; display:flex; align-items:center; gap:6px;
    }
    .section-divider { border-color:#e5e7eb; margin:18px 0; }
    .form-label { font-size:.8rem; font-weight:600; color:#374151; margin-bottom:4px; }
    .form-control, .form-select {
      border-radius:7px; border:1.5px solid #d1d5db;
      font-size:.88rem; padding:7px 10px;
    }
    .form-control:focus, .form-select:focus {
      border-color:var(--blue); box-shadow:0 0 0 3px rgba(1,65,162,.1); outline:none;
    }
    .form-control:read-only { background:#f9fafb; }

    /* Renta variable table */
    .renta-grid {
      display:grid; grid-template-columns:repeat(6,1fr); gap:8px;
    }
    .renta-grid label { font-size:.75rem; font-weight:600; color:#6b7280; text-align:center; margin-bottom:2px; display:block; }

    /* Promedio badge */
    .promedio-badge {
      background:linear-gradient(135deg,#eff6ff,#dbeafe);
      border:1.5px solid #93c5fd; border-radius:8px;
      padding:10px 18px; text-align:center;
    }
    .promedio-badge .label { font-size:.72rem; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:.06em; }
    .promedio-badge .value { font-size:1.3rem; font-weight:800; color:var(--navy); }

    /* Renta Acreditada badge */
    .renta-acreditada-badge {
      background:linear-gradient(135deg,#ecfdf5,#d1fae5);
      border:1.5px solid #6ee7b7; border-radius:8px;
      padding:10px 18px; text-align:center;
    }
    .renta-acreditada-badge .label { font-size:.72rem; font-weight:700; color:#065f46; text-transform:uppercase; letter-spacing:.06em; }
    .renta-acreditada-badge .sub   { font-size:.68rem; color:#059669; margin-top:1px; }
    .renta-acreditada-badge .value { font-size:1.3rem; font-weight:800; color:#047857; }

    /* Antigüedad display */
    .antig-display {
      background:#f9fafb; border:1.5px solid #e5e7eb; border-radius:7px;
      padding:7px 12px; font-size:.88rem; color:#374151; font-weight:600;
    }

    /* Botones */
    .btn-guardar {
      background:linear-gradient(135deg,var(--blue),var(--sky));
      color:#fff; border:none; border-radius:8px;
      padding:10px 28px; font-weight:700; font-size:.92rem; cursor:pointer;
    }
    .btn-guardar:hover { opacity:.9; }
    .btn-cancelar {
      background:#fff; color:#6b7280;
      border:1.5px solid #d1d5db; border-radius:8px;
      padding:10px 22px; font-weight:600; font-size:.9rem; cursor:pointer;
    }
    .btn-cancelar:hover { background:#f9fafb; }

    /* Toast */
    .toast-msg {
      position:fixed; top:68px; right:20px; z-index:9999;
      border-radius:10px; padding:14px 20px;
      font-weight:600; font-size:.9rem; color:#fff;
      box-shadow:0 8px 24px rgba(0,0,0,.18);
      animation:slideIn .25s ease; display:none;
    }
    @keyframes slideIn { from { transform:translateX(60px); opacity:0; } to { transform:translateX(0); opacity:1; } }
    .toast-ok  { background:#059669; }
    .toast-err { background:#dc2626; }

    /* Search dropdown */
    .search-wrap { position:relative; }
    .search-dropdown {
      display:none; position:absolute; top:100%; left:0; right:0; z-index:500;
      background:#fff; border:1.5px solid #d1d5db; border-top:none;
      border-radius:0 0 8px 8px; max-height:200px; overflow-y:auto;
    }
    .search-dropdown.open { display:block; }
    .search-dropdown .dd-item {
      padding:8px 12px; font-size:.85rem; cursor:pointer; border-bottom:1px solid #f3f4f6;
    }
    .search-dropdown .dd-item:hover { background:#eff6ff; }
    .search-dropdown .dd-item strong { color:var(--blue); }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .breadcrumb-nav a:hover { color:#fff; }
    .breadcrumb-nav .sep { color:rgba(255,255,255,.35); }  </style>
</head>
<body>

<!-- ── Top nav ──────────────────────────────────────────────────── -->
<nav class="topnav">
  <div class="topnav-left">
    <div class="topnav-brand">
      <a href="/"><img src="/img/logo.png" alt="AutoFácil" style="display:block"></a>
      <span class="version-badge" id="versionBadge">v1.3</span>
    </div>
      <div class="breadcrumb-nav">
        <a href="/">Inicio</a><span class="sep">›</span>
        <span style="color:#fff;font-weight:600"><i class="bi bi-briefcase me-1"></i>Antecedentes Laborales</span>
      </div>
  </div>
  <div class="topnav-right">
    <div class="user-chip">
      <div class="avatar" id="avatarInicial">?</div>
      <div>
        <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
        <div class="perfil-badge" id="navPerfil">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="page-wrap">

  <!-- ── Banner cliente ──────────────────────────────────────────── -->
  <div class="cliente-banner">
    <div>
      <div class="nombre" id="clienteNombre">Cargando…</div>
      <div class="rut"    id="clienteRut"></div>
    </div>
    <div class="nav-btns">
      <a class="btn-nav active" href="#"><i class="bi bi-briefcase"></i>Ant. Laborales</a>
      <a class="btn-nav" id="btnGoInfCom" href="#"><i class="bi bi-bank"></i>Inf. Comercial</a>
      <a class="btn-nav" id="btnGoDatos" href="/clientes"><i class="bi bi-person"></i>Datos Personales</a>
    </div>
  </div>

  <!-- ── Formulario ──────────────────────────────────────────────── -->
  <div class="form-card">
    <div class="section-label"><i class="bi bi-briefcase-fill me-1"></i>Datos del empleo</div>
    <div class="row g-2">
      <div class="col-md-4 col-lg-3">
        <label class="form-label">Tipo Trabajador</label>
        <select id="fTipoTrabajador" class="form-select">
          <option value="">— Seleccione —</option>
          <option>Empleado</option>
          <option>Independiente</option>
          <option>Jubilado</option>
          <option>Taxista</option>
          <option>Transporte Escolar</option>
          <option>Transporte Personal</option>

      </div>
      <div class="col-md-5 col-lg-5">

        <input type="text" id="fEmpleador" class="form-control" placeholder="Nombre del empleador" oninput="upperInput(this)">

      <div class="col-md-3 col-lg-2">
        <label class="form-label">RUT Empresa</label>
        <input type="text" id="fRutEmpresa" class="form-control" maxlength="12"
               placeholder="76.123.456-7" oninput="onRutEmpresaInput(this)">

      </div>
      <div class="col-md-6 col-lg-4">
        <label class="form-label">Giro Empresa</label>
        <input type="text" id="fGiroEmpresa" class="form-control" placeholder="Actividad / Giro" oninput="upperInput(this)">
      </div>
      <div class="col-md-3 col-lg-2">
        <label class="form-label">Antigüedad (meses)</label>

      </div>

    <hr class="section-divider">
    <div class="section-label"><i class="bi bi-geo-alt-fill me-1"></i>Domicilio comercial</div>
    <div class="row g-2">

        <input type="text" id="fDireccionComercial" class="form-control" placeholder="Calle, Av." oninput="upperInput(this)">
      </div>
      <div class="col-md-2 col-lg-2">
        <label class="form-label">Número</label>

      </div>
      <div class="col-md-2 col-lg-2">
        <label class="form-label">Oficina / Dpto</label>
        <input type="text" id="fOficinaComercial" class="form-control" placeholder="101">
      </div>
      <div class="col-md-3 col-lg-3">
        <label class="form-label">Teléfono Comercial</label>
        <input type="text" id="fTelefonoComercial" class="form-control" placeholder="+56 2 1234 5678">
      </div>
      <div class="col-md-4 col-lg-3">
        <label class="form-label"><i class="bi bi-search me-1"></i>Buscar Comuna</label>
        <div class="search-wrap">
          <input type="text" id="fBuscarComuna" class="form-control"
                 placeholder="Escriba la comuna…"
                 oninput="filtrarComunas(this)" autocomplete="off">
          <div class="search-dropdown" id="fComunaDrop"></div>
        </div>
      </div>
      <div class="col-md-4 col-lg-3">
        <label class="form-label">Comuna</label>
        <input type="text" id="fComunaNombre" class="form-control" readonly placeholder="—">
        <input type="hidden" id="fIdComuna">
      </div>
      <div class="col-md-4 col-lg-3">
        <label class="form-label">Provincia</label>
        <input type="text" id="fProvinciaNombre" class="form-control" readonly placeholder="—">
        <input type="hidden" id="fIdProvincia">

      <div class="col-md-4 col-lg-3">
        <label class="form-label">Región</label>
        <input type="text" id="fRegionNombre" class="form-control" readonly placeholder="—">
        <input type="hidden" id="fIdRegion">

    </div>

    <hr class="section-divider">
    <div class="section-label"><i class="bi bi-cash-coin me-1"></i>Rentas</div>
    <div class="row g-2 mb-2">

        <input type="text" id="fRentaFija" class="form-control" placeholder="$0"
               oninput="rentaInput(this)" autocomplete="off">

  <!-- ── Botones ──────────────────────────────────────────────────── -->
  <div class="d-flex gap-2 justify-content-end">
    <button class="btn-cancelar" onclick="window.location.href='/clientes'">
      <i class="bi bi-arrow-left me-1"></i>Volver
    </button>
    <button class="btn-guardar" onclick="guardar()">
      <i class="bi bi-floppy me-1"></i>Guardar
    </button>
  </div>

</div>

<!-- Toast -->
<div class="toast-msg toast-ok"  id="toastOk"></div>
<div class="toast-msg toast-err" id="toastErr"></div>

<script>
/* ─── Auth ─────────────────────────────────────────────────────────── */
function getToken() { return localStorage.getItem('token'); }
function apiHeaders() { return { 'Content-Type':'application/json', 'Authorization':'Bearer '+getToken() }; }
function logout() { localStorage.removeItem('token'); localStorage.removeItem('usuario'); location.href='/login.html'; }

(function checkAuth() {
  const t = getToken();
  if (!t) { location.href='/login.html'; return; }
  try {
    const u = JSON.parse(localStorage.getItem('usuario') || '{}');
    document.getElementById('avatarInicial').textContent = (u.nombre||'?').charAt(0).toUpperCase();
    document.getElementById('navNombre').textContent = ((u.nombre||'') + ' ' + (u.apellido||'')).trim();
    document.getElementById('navPerfil').textContent = u.perfil || u.nombre_perfil || '—';
    const p = JSON.parse(atob(t.split('.')[1]));
    if (p.exp * 1000 < Date.now()) logout();
  } catch(e) { logout(); }
})();

/* ─── URL params ─────────────────────────────────────────────────── */
const params   = new URLSearchParams(location.search);
const RUT      = (params.get('rut') || '').toUpperCase().trim();

document.getElementById('btnGoInfCom').href = '/informacion-comercial?rut=' + encodeURIComponent(RUT);
document.getElementById('btnGoDatos').href  = '/clientes?rut=' + encodeURIComponent(RUT);

if (!RUT) {
  document.getElementById('clienteNombre').textContent = 'RUT no especificado';
} else {
  document.getElementById('clienteRut').textContent = RUT;
  cargarCliente();
  cargarDatos();
}

/* ─── Utilidades ─────────────────────────────────────────────────── */
function upperInput(el) { const s = el.selectionStart, e = el.selectionEnd; el.value = el.value.toUpperCase(); el.setSelectionRange(s,e); }
function fmtPesos(v) { return '$' + Math.round(v||0).toLocaleString('es-CL'); }

function showToast(msg, ok) {
  const el = document.getElementById(ok ? 'toastOk' : 'toastErr');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3200);
}

/* ─── RUT formatter + validador ─────────────────────────────────── */
function formatRUT(raw) {
  let clean = raw.replace(/[^0-9kK]/g,'').toUpperCase();
  if (clean.length < 2) return clean;
  const dv = clean.slice(-1), body = clean.slice(0,-1);
  let fmt = '';
  for (let i = body.length; i > 0; i -= 3)
    fmt = body.slice(Math.max(0,i-3),i) + (fmt ? '.'+fmt : '');
  return fmt + '-' + dv;
}
function calcDV(body) {
  const serie = [2,3,4,5,6,7];
  const suma  = body.split('').reverse()
    .reduce((acc,d,i) => acc + parseInt(d) * serie[i % 6], 0);
  const resto = 11 - (suma % 11);
  if (resto === 11) return '0';
  if (resto === 10) return 'K';
  return String(resto);
}
function onRutEmpresaInput(el) {
  const raw   = el.value;
  const clean = raw.replace(/[^0-9kK]/g,'').toUpperCase();
  if (clean.length >= 2) el.value = formatRUT(raw);
  const hint = document.getElementById('fRutEmpresaHint');
  if (clean.length >= 7 && clean.length <= 9) {
    const dvIngresado = clean.slice(-1).toUpperCase();
    const ok = calcDV(clean.slice(0,-1)) === dvIngresado;
    if (ok) {
      el.style.borderColor = '#059669';
      hint.style.color     = '#059669';
      hint.textContent     = '✓ RUT válido';
    } else {
      el.style.borderColor = '#dc2626';
      hint.style.color     = '#dc2626';
      hint.textContent     = `✗ DV incorrecto (debería ser ${calcDV(clean.slice(0,-1))})`;
    }
  } else if (clean.length > 0) {
    el.style.borderColor = '';
    hint.style.color     = '#9ca3af';
    hint.textContent     = 'Ingresa el RUT completo con dígito verificador';
  } else {
    el.style.borderColor = '';
    hint.textContent     = '';
  }
}

/* ─── Cargar datos del cliente ──────────────────────────────────── */
async function cargarCliente() {
  try {
    const r = await fetch('/api/clientes/rut/' + encodeURIComponent(RUT), { headers: apiHeaders() });
    const j = await r.json();
    if (j.success && j.data) {
      const c = j.data;
      const nombre = [c.nombres, c.apellido_paterno, c.apellido_materno].filter(Boolean).join(' ')
                  || c.razon_social || RUT;
      document.getElementById('clienteNombre').textContent = nombre;
    } else {
      document.getElementById('clienteNombre').textContent = RUT;
    }
  } catch(e) {
    document.getElementById('clienteNombre').textContent = RUT;
  }
}

/* ─── Geografía (comunas + provincias + regiones) ─────────────────── */
let allComunas    = [];
let allProvincias = [];
let allRegiones   = [];

async function cargarGeo() {
  try {
    const [rC, rP, rR] = await Promise.all([
      fetch('/api/geografico/comunas',   { headers: apiHeaders() }).then(r=>r.json()),
      fetch('/api/geografico/provincias',{ headers: apiHeaders() }).then(r=>r.json()),
      fetch('/api/geografico/regiones',  { headers: apiHeaders() }).then(r=>r.json()),
    ]);
    allComunas    = rC.data  || [];
    allProvincias = rP.data  || [];
    allRegiones   = rR.data  || [];
  } catch(e) {}
}

function filtrarComunas(el) {
  const q = el.value.toUpperCase().trim();
  const drop = document.getElementById('fComunaDrop');
  if (q.length < 2) { drop.classList.remove('open'); return; }
  // allComunas puede tener id_provincia o id_provincia_id según el API
  const hits = allComunas.filter(c =>
    (c.nombre || c.nombre_comuna || '').toUpperCase().includes(q)
  ).slice(0, 12);
  if (!hits.length) { drop.classList.remove('open'); return; }
  drop.innerHTML = hits.map(c => {
    const nombre = c.nombre || c.nombre_comuna || '';
    const idCom  = c.id_comuna;
    const idProv = c.id_provincia;
    // Nombre de provincia para mostrar en el dropdown
    const prov   = allProvincias.find(p => String(p.id_provincia) === String(idProv));
    const reg    = prov ? allRegiones.find(r => String(r.id_region) === String(prov.id_region)) : null;
    const hint   = [prov?.nombre, reg?.nombre].filter(Boolean).join(' — ');
    return `<div class="dd-item" onclick="selComuna(${idCom},${idProv},\`${nombre.replace(/`/g,"'")}\`)">
              <strong>${nombre}</strong> <small class="text-muted">${hint}</small>
            </div>`;
  }).join('');
  drop.classList.add('open');
}

function selComuna(idComuna, idProvincia, nombreComuna) {
  // Derivar región desde provincias
  const prov = allProvincias.find(p => String(p.id_provincia) === String(idProvincia));
  const idRegion = prov ? prov.id_region : null;
  const reg  = idRegion ? allRegiones.find(r => String(r.id_region) === String(idRegion)) : null;

  document.getElementById('fIdComuna').value      = idComuna;
  document.getElementById('fComunaNombre').value  = nombreComuna;
  document.getElementById('fIdProvincia').value   = idProvincia || '';
  document.getElementById('fProvinciaNombre').value = prov ? (prov.nombre || '') : '';
  document.getElementById('fIdRegion').value      = idRegion || '';
  document.getElementById('fRegionNombre').value  = reg  ? (reg.nombre  || '') : '';
  document.getElementById('fBuscarComuna').value  = '';
  document.getElementById('fComunaDrop').classList.remove('open');
}

function limpiarComuna() {
  ['fIdComuna','fIdProvincia','fIdRegion'].forEach(id => document.getElementById(id).value = '');
  ['fComunaNombre','fProvinciaNombre','fRegionNombre'].forEach(id => document.getElementById(id).value = '');
}

/* ─── Nombres de meses anteriores ──────────────────────────────── */
const MESES_ES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function labelMes(offset) {
  // offset=1 → mes anterior, offset=2 → hace 2 meses, etc.
  const hoy = new Date();
  const d   = new Date(hoy.getFullYear(), hoy.getMonth() - offset, 1);
  return MESES_ES[d.getMonth()] + '-' + String(d.getFullYear()).slice(2);
}

/* ─── Formateo de pesos CLP ─────────────────────────────────────── */
function parsePesos(str) {
  return parseInt(str.replace(/[^0-9]/g,'')) || 0;
}
function formatPesos(num) {
  if (!num) return '';
  return '$' + num.toLocaleString('es-CL');
}
function rentaInput(el) {
  const pos   = el.selectionStart;
  const antes = el.value.length;
  const num   = parsePesos(el.value);
  el.value    = formatPesos(num);
  // Mantener cursor aprox al mismo lugar desde el final
  const delta = el.value.length - antes;
  el.setSelectionRange(pos + delta, pos + delta);
  // Guardar valor numérico en hidden (solo para fRentaFija)
  const hid = document.getElementById(el.id + 'Val');
  if (hid) hid.value = num || '';
  calcPromedio();
}

/* ─── Renta variable grid ───────────────────────────────────────── */
function buildRentaGrid() {
  const grid = document.getElementById('rentaGrid');
  let html = '';
  for (let i = 1; i <= 6; i++) {
    html += `<div>
      <label>${labelMes(i)}</label>
      <input type="text" id="fRentaMes${i}" class="form-control" placeholder="$0"
             oninput="rentaInput(this)" autocomplete="off">
      <input type="hidden" id="fRentaMes${i}Val">
    </div>`;
  }
  grid.innerHTML = html;
}

/* ─── Antigüedad ────────────────────────────────────────────────── */
function calcAntiguedad() {
  const m = parseInt(document.getElementById('fAntiguedadMeses').value) || 0;
  const a = Math.floor(m / 12), r = m % 12;
  document.getElementById('fAntiguedadDisplay').textContent = `${a} año${a!==1?'s':''} y ${r} mes${r!==1?'es':''}`;
}

/* ─── Promedio renta variable ───────────────────────────────────── */
function calcPromedio() {
  const vals = [];
  for (let i = 1; i <= 6; i++) {
    const hid = document.getElementById('fRentaMes'+i+'Val');
    const v   = hid ? parseInt(hid.value) : 0;
    if (v > 0) vals.push(v);
  }
  const prom = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
  document.getElementById('promedioMeses').textContent = vals.length;
  document.getElementById('promedioValor').textContent = formatPesos(Math.round(prom)) || '$0';
  calcRentaAcreditada();
}

/* ─── Renta Acreditada ───────────────────────────────────────────── */
function calcRentaAcreditada() {
  // Promedio variable (sólo meses con valor)
  const vals = [];
  for (let i = 1; i <= 6; i++) {
    const hid = document.getElementById('fRentaMes'+i+'Val');
    const v   = hid ? parseInt(hid.value) : 0;
    if (v > 0) vals.push(v);
  }
  const prom = vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
  const fija = parseInt(document.getElementById('fRentaFijaVal').value) || 0;

  let acreditada, sub;
  if (prom > 0) {
    acreditada = prom;
    sub = 'Promedio ' + vals.length + ' mes(es) variable' + (vals.length !== 1 ? 's' : '');
  } else {
    acreditada = fija;
    sub = 'Renta fija líquida';
  }
  document.getElementById('rentaAcreditadaSub').textContent   = sub;
  document.getElementById('rentaAcreditadaValor').textContent = formatPesos(acreditada) || '$0';
}

/* ─── Cargar datos guardados ────────────────────────────────────── */
async function cargarDatos() {
  try {
    const r = await fetch('/api/antecedentes-laborales/' + encodeURIComponent(RUT), { headers: apiHeaders() });
    const j = await r.json();
    if (!j.success || !j.data) return;
    const d = j.data;
    const s = (id, v) => { const el = document.getElementById(id); if(el && v!=null) el.value = v; };
    s('fTipoTrabajador',    d.tipo_trabajador);
    s('fEmpleador',         d.empleador);
    s('fRutEmpresa',        d.rut_empresa);
    s('fGiroEmpresa',       d.giro_empresa);
    s('fAntiguedadMeses',   d.antiguedad_meses);
    s('fDireccionComercial',d.direccion_comercial);
    s('fNumeroComercial',   d.numero_comercial);
    s('fOficinaComercial',  d.oficina_comercial);
    s('fTelefonoComercial', d.telefono_comercial);
    // Renta fija con formato
    if (d.renta_fija_liquida != null) {
      const num = parseInt(d.renta_fija_liquida) || 0;
      document.getElementById('fRentaFija').value    = formatPesos(num);
      document.getElementById('fRentaFijaVal').value = num;
    }
    // Rentas variables con formato
    for (let i = 1; i <= 6; i++) {
      const v = d['renta_var_mes'+i];
      if (v != null && v !== '') {
        const num = parseInt(v) || 0;
        document.getElementById('fRentaMes'+i).value    = formatPesos(num);
        document.getElementById('fRentaMes'+i+'Val').value = num;
      }
    }
    if (d.id_comuna_comercial) {
      const c    = allComunas.find(x => x.id_comuna == d.id_comuna_comercial);
      const prov = d.id_provincia_comercial
                   ? allProvincias.find(p => p.id_provincia == d.id_provincia_comercial)
                   : allProvincias.find(p => String(p.id_provincia) === String(c?.id_provincia));
      const reg  = prov ? allRegiones.find(r => r.id_region == prov.id_region) : null;

      document.getElementById('fIdComuna').value      = d.id_comuna_comercial;
      document.getElementById('fComunaNombre').value  = c ? (c.nombre || c.nombre_comuna || '') : '';
      document.getElementById('fIdProvincia').value   = prov ? prov.id_provincia : (d.id_provincia_comercial || '');
      document.getElementById('fProvinciaNombre').value = prov ? (prov.nombre || '') : '';
      document.getElementById('fIdRegion').value      = reg  ? reg.id_region  : (d.id_region_comercial || '');
      document.getElementById('fRegionNombre').value  = reg  ? (reg.nombre  || '') : '';
    }
    calcAntiguedad();
    calcPromedio();
  } catch(e) {}
}

/* ─── Guardar ────────────────────────────────────────────────────── */
async function guardar() {
  const body = {
    tipo_trabajador:    document.getElementById('fTipoTrabajador').value,
    empleador:          document.getElementById('fEmpleador').value.trim(),
    rut_empresa:        document.getElementById('fRutEmpresa').value.trim(),
    giro_empresa:       document.getElementById('fGiroEmpresa').value.trim(),
    antiguedad_meses:   document.getElementById('fAntiguedadMeses').value || null,
    direccion_comercial:document.getElementById('fDireccionComercial').value.trim(),
    numero_comercial:   document.getElementById('fNumeroComercial').value.trim(),
    oficina_comercial:  document.getElementById('fOficinaComercial').value.trim(),
    id_comuna_comercial:   document.getElementById('fIdComuna').value    || null,
    id_provincia_comercial:document.getElementById('fIdProvincia').value || null,
    id_region_comercial:   document.getElementById('fIdRegion').value    || null,
    telefono_comercial: document.getElementById('fTelefonoComercial').value.trim(),
    renta_fija_liquida: document.getElementById('fRentaFijaVal').value || null,
  };
  for (let i = 1; i <= 6; i++)
    body['renta_var_mes'+i] = document.getElementById('fRentaMes'+i+'Val').value || null;

  try {
    const r = await fetch('/api/antecedentes-laborales/' + encodeURIComponent(RUT), {
      method:'PUT', headers: apiHeaders(), body: JSON.stringify(body),
    });
    const j = await r.json();
    if (j.success) showToast('Guardado correctamente', true);
    else showToast(j.error || 'Error al guardar', false);
  } catch(e) {
    showToast('Error de conexión', false);
  }
}

/* ─── Init ───────────────────────────────────────────────────────── */
buildRentaGrid();
cargarGeo().then(() => { if (RUT) cargarDatos(); });

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap'))
    document.querySelectorAll('.search-dropdown').forEach(d => d.classList.remove('open'));
});
