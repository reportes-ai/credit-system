<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auditoría — AutoFácil</title>
  <!-- v1.6 -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#001345; --blue:#0141A2; }
    body { background:#f0f4f8; font-family:'Segoe UI',system-ui,sans-serif; margin:0; }
    .topnav { background:linear-gradient(90deg,#012d70,#0255c5); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--blue); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .wrap { max-width:1500px; margin:0 auto; padding:18px 22px 60px; }
    h5.sec { font-weight:800; color:var(--navy); margin:0 0 2px; }
    .tabs { display:flex; gap:6px; margin:14px 0 12px; }
    .tab { background:#fff; border:1px solid #d8e0ea; color:#475569; border-radius:9px 9px 0 0; padding:9px 18px; font-weight:700; font-size:.9rem; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
    .tab.on { background:var(--navy); color:#fff; border-color:var(--navy); }
    .filtros { background:#fff; border:1px solid #e2e8f0; border-radius:10px; padding:12px 14px; display:flex; align-items:flex-end; gap:12px; flex-wrap:wrap; margin-bottom:10px; }
    .fld label { display:block; font-size:.7rem; font-weight:700; color:#64748b; margin-bottom:3px; text-transform:uppercase; letter-spacing:.3px; }
    .fld input, .fld select { border:1.5px solid #d1d5db; border-radius:8px; padding:7px 9px; font-size:.85rem; }
    .btn { border:none; border-radius:9px; padding:8px 15px; font-weight:700; cursor:pointer; font-size:.84rem; display:inline-flex; align-items:center; gap:6px; }
    .btn-f { background:var(--blue); color:#fff; }
    .btn-x { background:#16a34a; color:#fff; }
    .btn-clear { background:#f1f5f9; color:#475569; border:1px solid #cbd5e1; }
    .meta-row { display:flex; justify-content:space-between; align-items:center; margin:4px 2px 8px; font-size:.8rem; color:#64748b; }
    /* Consola full-width */
    .console { background:#0b1220; border-radius:10px; overflow-x:auto; box-shadow:0 2px 10px rgba(0,0,0,.15); }
    table.log { width:100%; border-collapse:collapse; font-family:'Consolas','SF Mono','Menlo',monospace; font-size:12.5px; color:#cbd5e1; white-space:nowrap; }
    table.log thead th { position:sticky; top:0; background:#0a0f1c; color:#7d8aa3; text-align:left; padding:9px 12px; font-size:11px; text-transform:uppercase; letter-spacing:.6px; border-bottom:1px solid #1e293b; }
    table.log td { padding:6px 12px; border-bottom:1px solid #131c2e; vertical-align:top; }
    table.log tbody tr:nth-child(even) { background:#0e1626; }
    table.log tbody tr:hover { background:#16233c; }
    .c-fecha { color:#64748b; }
    .c-user { color:#e2e8f0; font-weight:600; }
    .c-perfil { color:#7dd3fc; font-size:11px; }
    .c-detalle { color:#cbd5e1; white-space:normal; min-width:340px; }
    .c-rut { color:#fcd34d; }
    .c-ip { color:#475569; font-size:11px; }
    .c-mod { color:#a5b4fc; font-size:11px; text-transform:uppercase; }
    .acc { font-weight:700; padding:1px 8px; border-radius:5px; font-size:11px; letter-spacing:.4px; }
    .acc.LOGIN,.acc.PING { background:#0c2a4d; color:#7dd3fc; }
    .acc.LOGOUT { background:#1f2937; color:#94a3b8; }
    .acc.APROBAR { background:#0c3320; color:#6ee7b7; }
    .acc.RECHAZAR,.acc.DEVOLVER { background:#3a2a08; color:#fbbf24; }
    .acc.ELIMINAR,.acc.BORRAR,.acc.REVERSAR { background:#3b1115; color:#fca5a5; }
    .acc.EDITAR,.acc.ACTUALIZAR { background:#2a1640; color:#d8b4fe; }
    .acc.CREAR,.acc.CARGA_MASIVA { background:#08303a; color:#67e8f9; }
    .acc.CIERRE_MES,.acc.PERMISOS { background:#2a2410; color:#fde68a; }
    .acc.VALIDAR_DOC { background:#0c3320; color:#6ee7b7; }
    .acc.RECHAZAR_DOC { background:#3b1115; color:#fca5a5; }
    .acc.VER_DOCUMENTO { background:#10192c; color:#93a0b8; }
    .acc.PAGAR { background:#06281c; color:#5eead4; }
    .estado-on { color:#6ee7b7; } .estado-off { color:#64748b; }
    .pager { display:flex; justify-content:center; align-items:center; gap:12px; margin-top:12px; }
    .pager button { background:#fff; border:1px solid #cbd5e1; border-radius:8px; padding:6px 14px; cursor:pointer; font-weight:600; font-size:.85rem; }
    .pager button:disabled { opacity:.4; cursor:default; }
    .vacio { text-align:center; color:#64748b; padding:30px; font-family:monospace; }
    .toast-af { position:fixed; top:70px; right:20px; background:#16a34a; color:#fff; padding:12px 18px; border-radius:9px; font-weight:600; font-size:.88rem; z-index:2000; display:none; }
    .toast-af.err { background:#dc2626; }
  </style>
</head>
<body>
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a><span>›</span><span style="color:#fff;font-weight:600">Auditoría</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="user-chip" style="display:inline-flex"><div class="avatar" id="avatarInicial">?</div><div><div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div><div class="perfil-badge" id="navPerfil">—</div></div></span>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="wrap">
  <h5 class="sec"><i class="bi bi-clipboard-data me-2"></i>Auditoría de Movimientos</h5>
  <span style="font-size:.82rem;color:#64748b">Bitácora de ingresos al sistema y de las acciones de los procesos (aprobar, crear, editar, eliminar, etc.). Exportable a Excel.</span>

  <div class="tabs">
    <div class="tab on" id="tabLogins" onclick="setTab('logins')"><i class="bi bi-box-arrow-in-right"></i>Logins</div>
    <div class="tab" id="tabMov" onclick="setTab('mov')"><i class="bi bi-list-columns-reverse"></i>Movimientos</div>
    <div class="tab" id="tabBackups" onclick="setTab('backups')"><i class="bi bi-people"></i>BackUps <b style="color:#ef4444">*</b></div>
  </div>

  <div class="filtros">
    <div class="fld"><label>Desde</label><input id="f-desde" type="date"></div>
    <div class="fld"><label>Hasta</label><input id="f-hasta" type="date"></div>
    <div class="fld"><label>Usuario</label><select id="f-usuario" style="min-width:170px"><option value="">— Todos —</option></select></div>
    <div class="fld" id="wrapAccion" style="display:none"><label>Acción</label><select id="f-accion" style="min-width:140px"><option value="">— Todas —</option></select></div>
    <div class="fld" id="wrapModulo" style="display:none"><label>Módulo</label><select id="f-modulo" style="min-width:130px"><option value="">— Todos —</option></select></div>
    <div class="fld" id="wrapQ" style="display:none"><label>Buscar (detalle/RUT)</label><input id="f-q" type="text" placeholder="texto, rut, n° op…" style="width:180px"></div>
    <button class="btn btn-f" onclick="aplicar()"><i class="bi bi-funnel"></i>Filtrar</button>
    <button class="btn btn-clear" onclick="limpiar()"><i class="bi bi-x-circle"></i>Limpiar</button>
    <button class="btn btn-x" onclick="exportar()"><i class="bi bi-file-earmark-excel"></i>Exportar Excel</button>
  </div>

  <div class="meta-row"><span id="resumen">—</span><span id="rango"></span></div>

  <div class="console">
    <table class="log">
      <thead id="thead"></thead>
      <tbody id="tbody"><tr><td class="vacio">Cargando…</td></tr></tbody>
    </table>
  </div>

  <div class="pager">
    <button id="pgPrev" onclick="irPag(-1)">‹ Anterior</button>
    <span id="pgInfo" style="font-size:.85rem;color:#475569">—</span>
    <button id="pgNext" onclick="irPag(1)">Siguiente ›</button>
  </div>
</div>

<div id="toast" class="toast-af"></div>

<script>
const token = sessionStorage.getItem('token');
if (!token) location.href = '/login.html';
const YO = JSON.parse(sessionStorage.getItem('usuario') || '{}');
const H = { Authorization:'Bearer '+token };
document.getElementById('navNombre').textContent = ((YO.nombre||'') + ' ' + (YO.apellido||'')).trim() || '—';
document.getElementById('navPerfil').textContent = YO.perfil || '';
document.getElementById('avatarInicial').textContent = (YO.nombre||'?')[0].toUpperCase();
function logout(){ sessionStorage.clear(); location.href = '/login.html'; }
function toast(m, err){ const t=document.getElementById('toast'); t.textContent=m; t.className='toast-af'+(err?' err':''); t.style.display='block'; setTimeout(()=>t.style.display='none',2600); }
const escH = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
// La BD guarda la hora ya en horario Chile, pero el driver la etiqueta como UTC.
// Por eso formateamos en UTC: muestra el valor literal almacenado (= hora Chile real).
const TZ = { timeZone:'UTC' };
const fFecha = v => { if(!v) return ''; const d=new Date(v); return isNaN(d)?'':d.toLocaleDateString('es-CL',TZ); };
const fHora  = v => { if(!v) return ''; const d=new Date(v); return isNaN(d)?'':d.toLocaleTimeString('es-CL',{...TZ,hour12:false}); };

let TAB = 'logins', PAGE = 1, PAGES = 1;

function setTab(t){
  TAB = t; PAGE = 1;
  document.getElementById('tabLogins').classList.toggle('on', t==='logins');
  document.getElementById('tabMov').classList.toggle('on', t==='mov');
  document.getElementById('tabBackups').classList.toggle('on', t==='backups');
  const mov = t==='mov', bk = t==='backups';
  document.getElementById('wrapAccion').style.display = mov?'':'none';
  document.getElementById('wrapModulo').style.display = mov?'':'none';
  document.getElementById('wrapQ').style.display      = mov?'':'none';
  document.querySelector('.filtros').style.display = bk?'none':'';
  document.querySelector('.pager').style.display   = bk?'none':'';
  cargar();
}

function qs(extra){
  const p = new URLSearchParams();
  const d = document.getElementById('f-desde').value, h = document.getElementById('f-hasta').value;
  const u = document.getElementById('f-usuario').value;
  if (d) p.set('desde', d); if (h) p.set('hasta', h); if (u) p.set('usuario', u);
  if (TAB==='mov'){
    const a = document.getElementById('f-accion').value, m = document.getElementById('f-modulo').value, q = document.getElementById('f-q').value.trim();
    if (a) p.set('accion', a); if (m) p.set('modulo', m); if (q) p.set('q', q);
  }
  if (extra) for (const [k,v] of Object.entries(extra)) p.set(k, v);
  return p;
}

async function cargarFiltros(){
  try {
    const r = await fetch('/api/auditoria-mov/filtros', { headers:H });
    const j = await r.json(); if (!j.success) return;
    const su = document.getElementById('f-usuario');
    j.data.usuarios.forEach(u => { const o=document.createElement('option'); o.value=u.id; o.textContent=u.nombre||('#'+u.id); su.appendChild(o); });
    const sa = document.getElementById('f-accion');
    j.data.acciones.forEach(a => { const o=document.createElement('option'); o.value=a; o.textContent=a; sa.appendChild(o); });
    const sm = document.getElementById('f-modulo');
    j.data.modulos.forEach(m => { const o=document.createElement('option'); o.value=m; o.textContent=m; sm.appendChild(o); });
  } catch(e){}
}

async function cargar(){
  const tb = document.getElementById('tbody');
  tb.innerHTML = '<tr><td class="vacio">Cargando…</td></tr>';
  if (TAB==='backups'){
    try {
      const r = await fetch('/api/auditoria-mov/backups', { headers:H });
      const j = await r.json();
      if (!j.success){ tb.innerHTML = '<tr><td class="vacio">Error al cargar</td></tr>'; return; }
      document.getElementById('resumen').textContent = `${j.data.rows.length} periodo(s) de backup`;
      document.getElementById('rango').textContent = '';
      renderBackups(j.data.rows);
    } catch(e){ tb.innerHTML = '<tr><td class="vacio">Error de conexión</td></tr>'; }
    return;
  }
  const url = (TAB==='mov'?'/api/auditoria-mov/movimientos?':'/api/auditoria-mov/logins?') + qs({ page:PAGE, limit:100 }).toString();
  try {
    const r = await fetch(url, { headers:H });
    const j = await r.json();
    if (!j.success){ tb.innerHTML = '<tr><td class="vacio">Error al cargar</td></tr>'; return; }
    PAGES = j.data.pages || 1;
    document.getElementById('resumen').textContent = `${j.data.total} registro(s)` + (TAB==='mov'?' de movimientos':' de ingreso');
    document.getElementById('pgInfo').textContent = `Página ${j.data.page} de ${PAGES}`;
    document.getElementById('pgPrev').disabled = j.data.page<=1;
    document.getElementById('pgNext').disabled = j.data.page>=PAGES;
    TAB==='mov' ? renderMov(j.data.rows) : renderLogins(j.data.rows);
  } catch(e){ tb.innerHTML = '<tr><td class="vacio">Error de conexión</td></tr>'; }
}

// Diferencia de días (por fecha en UTC: la BD guarda hora Chile etiquetada UTC).
function diaDelta(desde, hasta){
  if(!desde||!hasta) return 0;
  const a=new Date(desde), b=new Date(hasta); if(isNaN(a)||isNaN(b)) return 0;
  const k=d=>Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate());
  return Math.round((k(b)-k(a))/86400000);
}
// Hora de salida: real (logout) o estimada (última actividad). +N si cae otro día.
function salidaHtml(r){
  const sal = r.logout_at || r.last_seen;
  if(!sal) return '<span class="estado-off">—</span>';
  const d = diaDelta(r.login_at, sal);
  const sub = d>0 ? `<sub style="color:#fbbf24;font-weight:700">+${d}</sub>` : '';
  return r.logout_at
    ? `${fHora(sal)}${sub}`
    : `<span style="color:#94a3b8;font-style:italic" title="Estimada — última actividad (sesión sin cierre)">~${fHora(sal)}${sub}</span>`;
}
function renderLogins(rows){
  document.getElementById('thead').innerHTML =
    '<tr><th>Usuario</th><th>Perfil</th><th>Fecha</th><th>Hora ingreso</th><th>Salida</th><th>Min</th><th>Estado</th></tr>';
  const tb = document.getElementById('tbody');
  if (!rows.length){ tb.innerHTML='<tr><td colspan="7" class="vacio">Sin ingresos en el rango seleccionado</td></tr>'; return; }
  tb.innerHTML = rows.map(r => `<tr>
    <td class="c-user">${escH(r.nombre||'—')}</td>
    <td class="c-perfil">${escH(r.perfil||'')}</td>
    <td class="c-fecha">${fFecha(r.login_at)}</td>
    <td>${fHora(r.login_at)}</td>
    <td class="c-fecha">${salidaHtml(r)}</td>
    <td>${r.minutos!=null?r.minutos:''}</td>
    <td>${r.logout_at?'<span class="estado-off">cerrada</span>':'<span class="estado-on">● activa</span>'}</td>
  </tr>`).join('');
}

function renderMov(rows){
  document.getElementById('thead').innerHTML =
    '<tr><th>Fecha</th><th>Hora</th><th>Usuario</th><th>Perfil</th><th>Módulo</th><th>Acción</th><th>Detalle</th><th>RUT</th><th>IP</th></tr>';
  const tb = document.getElementById('tbody');
  if (!rows.length){ tb.innerHTML='<tr><td colspan="9" class="vacio">Sin movimientos en el rango/filtros seleccionados</td></tr>'; return; }
  tb.innerHTML = rows.map(r => {
    const acc = String(r.accion||'').toUpperCase().replace(/[^A-Z_]/g,'');
    const esSis = (r.usuario === 'Sistema') || (r.id_usuario == null);
    const viaBackup = r.id_titular && r.titular_nombre;
    const userTd = viaBackup
      ? `<td class="c-user" style="color:#fca5a5" title="Realizado por ${escH(r.usuario||'')} como backup">${escH(r.titular_nombre)} <b style="color:#ef4444">*</b></td>`
      : `<td class="c-user"${esSis?' style="color:#67e8f9"':''}>${esSis?'<i class="bi bi-robot"></i> ':''}${escH(r.usuario||'Sistema')}</td>`;
    return `<tr>
      <td class="c-fecha">${fFecha(r.fecha)}</td>
      <td>${fHora(r.fecha)}</td>
      ${userTd}
      <td class="c-perfil">${escH(r.perfil||'')}</td>
      <td class="c-mod">${escH(r.modulo||'')}</td>
      <td><span class="acc ${acc}">${escH(r.accion||'')}</span></td>
      <td class="c-detalle">${escH(r.detalle||'')}${r.entidad_id?` <span style="color:#475569">#${escH(r.entidad_id)}</span>`:''}</td>
      <td class="c-rut">${escH(r.rut||'')}</td>
      <td class="c-ip">${escH(r.ip||'')}</td>
    </tr>`;
  }).join('');
}

function renderBackups(rows){
  document.getElementById('thead').innerHTML =
    '<tr><th>Titular <b style="color:#ef4444">*</b></th><th>BackUp</th><th>Categorías</th><th>Desde</th><th>Hasta</th><th>Activado por</th></tr>';
  const tb = document.getElementById('tbody');
  if (!rows.length){ tb.innerHTML='<tr><td colspan="6" class="vacio">Sin backups activados aún</td></tr>'; return; }
  tb.innerHTML = rows.map(r => `<tr>
    <td class="c-user" style="color:#fca5a5">${escH(r.titular||'—')} <b style="color:#ef4444">*</b></td>
    <td class="c-user">${escH(r.suplente||'—')}</td>
    <td>${escH(r.categorias||'')}</td>
    <td class="c-fecha">${fFecha(r.desde)} ${fHora(r.desde)}</td>
    <td>${r.hasta?(fFecha(r.hasta)+' '+fHora(r.hasta)):'<span class="estado-on">● Vigente</span>'}</td>
    <td class="c-perfil">${escH(r.activado_por||'')}</td>
  </tr>`).join('');
}

function aplicar(){ PAGE = 1; cargar(); }
function irPag(d){ const n=PAGE+d; if(n>=1&&n<=PAGES){ PAGE=n; cargar(); } }
function limpiar(){
  document.getElementById('f-desde').value=''; document.getElementById('f-hasta').value='';
  document.getElementById('f-usuario').value='';
  if (document.getElementById('f-accion')) document.getElementById('f-accion').value='';
  if (document.getElementById('f-modulo')) document.getElementById('f-modulo').value='';
  if (document.getElementById('f-q')) document.getElementById('f-q').value='';
  PAGE=1; cargar();
}
function exportar(){
  const base = TAB==='mov' ? '/api/auditoria-mov/movimientos/export?' : '/api/auditoria-mov/logins/export?';
  const p = qs({ token });
  window.location.href = base + p.toString();
  toast('Generando Excel…');
}

// Fechas por defecto: últimos 30 días
(function initFechas(){
  const hoy = new Date(), hace30 = new Date(); hace30.setDate(hoy.getDate() - 30);
  const iso = d => d.toLocaleDateString('en-CA'); // YYYY-MM-DD en hora local
  document.getElementById('f-hasta').value = iso(hoy);
  document.getElementById('f-desde').value = iso(hace30);
})();
cargarFiltros();
cargar();
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
