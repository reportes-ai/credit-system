<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equivalencia Ejecutivos — Carga Masiva AutoFácil</title>
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-left { display:flex; align-items:center; gap:16px; }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .breadcrumb-nav .sep { color:rgba(255,255,255,.35); }
    .topnav-right { display:flex; align-items:center; gap:10px; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .main-content { padding:32px 40px; max-width:900px; margin:0 auto; }
    .page-banner { background:linear-gradient(135deg,#0c4a6e,#0891b2 60%,#06b6d4); border-radius:14px; color:#fff; padding:20px 28px; margin-bottom:24px; display:flex; align-items:center; gap:16px; }
    .page-banner i { font-size:2rem; opacity:.85; }
    .page-banner h2 { font-weight:700; margin:0 0 2px; font-size:1.1rem; }
    .page-banner p { opacity:.8; margin:0; font-size:.82rem; }
    .card { background:#fff; border-radius:14px; padding:28px; box-shadow:0 1px 5px rgba(0,0,0,.07); border:none; }
    .btn-main { background:var(--navy); color:#fff; border:none; border-radius:10px; padding:10px 24px; font-size:.9rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
    .btn-main:hover { background:var(--navy-light); }
    .btn-main:disabled { opacity:.55; cursor:not-allowed; }
    .preview-table { font-size:.82rem; }
    .preview-table th { background:#e0f2fe; color:#374151; font-weight:700; padding:8px 12px; }
    .preview-table td { padding:7px 12px; border-bottom:1px solid #f1f5f9; }
    #toast { position:fixed; bottom:24px; right:24px; padding:12px 22px; border-radius:10px; color:#fff; font-weight:600; font-size:.88rem; display:flex; align-items:center; gap:8px; box-shadow:0 4px 20px rgba(0,0,0,.2); transform:translateY(80px); opacity:0; transition:.28s; z-index:9999; }
    #toast.show { transform:translateY(0); opacity:1; }
    #toast.ok  { background:#166534; }
    #toast.err { background:#991b1b; }
    @media(max-width:700px){ .main-content { padding:16px; } }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-left">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge">v6.0</span></a>
    <div class="breadcrumb-nav">
      <a href="/">Inicio</a><span class="sep">›</span>
      <a href="/carga-masiva/">Carga Masiva</a><span class="sep">›</span>
      <span style="color:#fff;font-weight:600">Equivalencia Ejecutivos</span>
    </div>
  </div>
  <div class="topnav-right">
    <div class="user-chip">
      <div class="avatar" id="avatarInicial">?</div>
      <div>
        <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
        <div class="perfil-badge" id="navPerfil">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="main-content">
  <div class="page-banner">
    <i class="bi bi-people-fill"></i>
    <div>
      <h2>Equivalencia Ejecutivos</h2>
      <p>Mapeo de nombres: Trinidad → AutoFácil. Las filas en <span style="background:rgba(255,255,255,.2);padding:1px 6px;border-radius:4px">amarillo</span> requieren asignación.</p>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div id="avisoSinAsignar" style="display:none;background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:8px 14px;font-size:.82rem;color:#92400e;flex:1"></div>
      <button onclick="eqReaplicar()" class="btn-main" id="btnReaplicar"
        style="background:#475569;margin-left:auto" title="Renombra en los créditos ya cargados (meses abiertos) según estas equivalencias">
        <i class="bi bi-arrow-repeat"></i>Reaplicar a créditos existentes
      </button>
      <button onclick="eqGuardarEjecutivos()" class="btn-main" id="btnGuardarEjecs"
        style="background:#0891b2">
        <i class="bi bi-floppy"></i>Guardar cambios
      </button>
    </div>
    <div style="overflow-x:auto">
      <table class="table preview-table" id="tblEjecs" style="min-width:560px">
        <thead><tr>
          <th>Nombre en Trinidad</th>
          <th>Equivalente en AutoFácil</th>
          <th style="width:60px;text-align:center">Acción</th>
        </tr></thead>
        <tbody id="bodyEjecs">
          <tr><td colspan="3" style="text-align:center;color:#9ca3af;padding:20px">Cargando…</td></tr>
        </tbody>
      </table>
    </div>
    <div style="display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap;border-top:1px solid #f1f5f9;padding-top:14px">
      <input id="nuevoEjecTri" type="text" placeholder="Nombre exacto en Trinidad"
        style="border:1.5px solid #d1d5db;border-radius:8px;padding:7px 12px;font-size:.85rem;flex:1;min-width:160px;outline:none">
      <input id="nuevoEjecAF" type="text" placeholder="Nombre en AutoFácil (opcional)"
        style="border:1.5px solid #d1d5db;border-radius:8px;padding:7px 12px;font-size:.85rem;flex:1;min-width:160px;outline:none">
      <button class="btn-main" onclick="eqAgregarEjecutivo()" style="padding:7px 18px;font-size:.85rem;background:#0891b2">
        <i class="bi bi-plus-lg"></i>Agregar
      </button>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="eqDialogo" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:14px;padding:28px 32px;max-width:480px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,.35)">
    <div style="font-weight:700;font-size:1rem;color:#111827;margin-bottom:6px">
      <i class="bi bi-person-fill me-2" style="color:#0891b2"></i>Seleccionar equivalente en AutoFácil
    </div>
    <div style="font-size:.83rem;color:#6b7280;margin-bottom:16px">Trinidad: <strong id="dialogTri" style="color:#374151"></strong></div>
    <select id="dialogSelect" style="width:100%;border:1.5px solid #d1d5db;border-radius:8px;padding:9px 12px;font-size:.9rem;background:#fff;outline:none;margin-bottom:20px"></select>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="eqDialogoCerrar()" style="background:#f3f4f6;border:none;border-radius:8px;padding:8px 20px;font-size:.88rem;cursor:pointer;font-weight:600">Cancelar</button>
      <button onclick="eqDialogoAceptar()" class="btn-main" style="padding:8px 22px"><i class="bi bi-check-lg me-1"></i>Aplicar</button>
    </div>
  </div>
</div>

<div id="toast"><i id="toastIcon" class="bi bi-check-circle-fill"></i><span id="toastMsg"></span></div>

<script src="/js/auth-guard.js"></script>
<script>
const token = sessionStorage.getItem('token');
const yo    = JSON.parse(sessionStorage.getItem('usuario') || 'null');
if (!token || !yo) window.location.href = '/login.html';
if (yo?.perfil !== 'Administrador') { alert('Solo Administradores pueden acceder a esta sección'); window.location.href = '/'; }
const H = { Authorization: 'Bearer ' + token };
document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
document.getElementById('navPerfil').textContent  = yo?.perfil || '';
document.getElementById('avatarInicial').textContent = (yo?.nombre||'?').charAt(0).toUpperCase();
function logout() { sessionStorage.removeItem('token'); sessionStorage.removeItem('usuario'); window.location.href = '/login.html'; }

let eqEjecsData = [], eqEjecsAF = [], toastTimer;

function toast(msg, ok=true) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').className = ok ? 'bi bi-check-circle-fill' : 'bi bi-x-circle-fill';
  t.className = `show ${ok?'ok':'err'}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function eqRenderEjecs() {
  const tbody = document.getElementById('bodyEjecs');
  if (!eqEjecsData.length) {
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#9ca3af;padding:16px">Sin equivalencias.</td></tr>';
    return;
  }
  const optsAF = eqEjecsAF.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('');
  tbody.innerHTML = eqEjecsData.map((r,i) => {
    const tieneMatch = r.nombre_autofacil && r.nombre_autofacil.trim() !== '';
    const esRevisar  = tieneMatch && r.nombre_autofacil.trim().toUpperCase() === 'REVISAR';
    const rowBg = !tieneMatch ? 'background:#fffbeb' : esRevisar ? 'background:#fff1f2' : '';
    const colAF = tieneMatch
      ? `<div style="display:flex;gap:6px;align-items:center">
           <input type="text" value="${esc(r.nombre_autofacil)}" data-idx="${i}" data-field="nombre_autofacil"
             style="flex:1;border:1.5px solid #e5e7eb;border-radius:6px;padding:5px 9px;font-size:.82rem" oninput="eqEjEdit(this)">
           <button title="Seleccionar de la lista" onclick="eqAbrirDialogo(${i})"
             style="background:#e0f2fe;border:none;border-radius:6px;padding:5px 8px;cursor:pointer;color:#0891b2;font-size:.8rem">
             <i class="bi bi-chevron-expand"></i>
           </button>
         </div>`
      : `<div style="display:flex;gap:6px;align-items:center">
           <select data-idx="${i}" data-field="nombre_autofacil" onchange="eqEjSelectChange(this)"
             style="flex:1;border:1.5px solid #fbbf24;border-radius:6px;padding:5px 9px;font-size:.82rem;background:#fffbeb">
             <option value="">— Seleccionar ejecutivo AutoFácil —</option>${optsAF}
           </select>
         </div>`;
    return `<tr id="eqEj_${r.id}" style="${rowBg}">
      <td><div style="font-size:.83rem;font-weight:600;color:#374151">${esc(r.nombre_trinidad)}</div></td>
      <td>${colAF}</td>
      <td style="text-align:center">
        <button onclick="eqEliminarEjecutivo(${r.id})"
          style="background:#fee2e2;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;color:#dc2626;font-size:.8rem">
          <i class="bi bi-trash3"></i>
        </button>
      </td>
    </tr>`;
  }).join('');

  const sinAsignar = eqEjecsData.filter(r=>!r.nombre_autofacil?.trim()).length;
  const enRevisar  = eqEjecsData.filter(r=>r.nombre_autofacil?.trim().toUpperCase()==='REVISAR').length;
  const aviso = document.getElementById('avisoSinAsignar');
  const msgs = [];
  if (sinAsignar) msgs.push(`${sinAsignar} ejecutivo(s) sin equivalencia`);
  if (enRevisar)  msgs.push(`${enRevisar} marcado(s) como REVISAR`);
  aviso.style.display = msgs.length ? '' : 'none';
  aviso.textContent = msgs.length ? '⚠️ ' + msgs.join(' · ') : '';
}

function eqEjEdit(el) { eqEjecsData[+el.dataset.idx][el.dataset.field]=el.value; document.getElementById('btnGuardarEjecs').style.background='#0e7490'; }
function eqEjSelectChange(sel) { eqEjecsData[+sel.dataset.idx].nombre_autofacil=sel.value; document.getElementById('btnGuardarEjecs').style.background='#0e7490'; eqRenderEjecs(); }

function eqAbrirDialogo(idx) {
  const r=eqEjecsData[idx];
  document.getElementById('dialogTri').textContent=r.nombre_trinidad;
  document.getElementById('dialogSelect').innerHTML=`<option value="">— Seleccionar —</option>${eqEjecsAF.map(n=>`<option value="${esc(n)}"${n===r.nombre_autofacil?' selected':''}>${esc(n)}</option>`).join('')}`;
  document.getElementById('dialogSelect').dataset.idx=idx;
  document.getElementById('eqDialogo').style.display='flex';
}
function eqDialogoCerrar() { document.getElementById('eqDialogo').style.display='none'; }
function eqDialogoAceptar() {
  const sel=document.getElementById('dialogSelect');
  if (!sel.value) { toast('Selecciona un ejecutivo',false); return; }
  eqEjecsData[+sel.dataset.idx].nombre_autofacil=sel.value;
  document.getElementById('btnGuardarEjecs').style.background='#0e7490';
  eqDialogoCerrar(); eqRenderEjecs();
}

async function eqCargarEjecutivos() {
  try {
    const [rEjecs,rAF] = await Promise.all([
      fetch('/api/trinidad-config/ejecutivos',{headers:H}).then(x=>x.json()),
      fetch('/api/trinidad-config/ejecutivos-af',{headers:H}).then(x=>x.json()),
    ]);
    eqEjecsAF=rAF.data||[]; eqEjecsData=rEjecs.data||[];
    eqRenderEjecs();
  } catch { document.getElementById('bodyEjecs').innerHTML='<tr><td colspan="3" style="color:red">Error al cargar</td></tr>'; }
}

async function eqGuardarEjecutivos() {
  const btn=document.getElementById('btnGuardarEjecs');
  btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>Guardando…';
  let ok=0,err=0;
  for (const r of eqEjecsData) {
    const res=await fetch(`/api/trinidad-config/ejecutivos/${r.id}`,{
      method:'PUT',headers:{...H,'Content-Type':'application/json'},
      body:JSON.stringify({nombre_trinidad:r.nombre_trinidad,nombre_autofacil:r.nombre_autofacil})
    }).then(x=>x.json());
    res.success?ok++:err++;
  }
  btn.disabled=false; btn.innerHTML='<i class="bi bi-floppy"></i>Guardar cambios'; btn.style.background='#0891b2';
  toast(err?`✗ ${err} error(es)`:`✓ ${ok} ejecutivos guardados`,!err);
  if (!err) eqReaplicar(true); // renombrar de inmediato los créditos ya cargados
}

async function eqReaplicar(silencioso=false) {
  const btn=document.getElementById('btnReaplicar');
  btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>Reaplicando…';
  try {
    const res=await fetch('/api/trinidad-config/reaplicar-ejecutivos',{method:'POST',headers:H}).then(x=>x.json());
    if (!res.success) throw new Error(res.error);
    const cambios=(res.data.log||[]).filter(l=>l.includes('→'));
    if (cambios.length) toast(`✓ Nombres reaplicados: ${cambios.join(' · ')}`,true);
    else if (!silencioso) toast('Sin cambios: todos los créditos ya usan los nombres actuales',true);
  } catch(e) { toast('Error al reaplicar: '+e.message,false); }
  btn.disabled=false; btn.innerHTML='<i class="bi bi-arrow-repeat"></i>Reaplicar a créditos existentes';
}

async function eqAgregarEjecutivo() {
  const tri=document.getElementById('nuevoEjecTri').value.trim();
  const af =document.getElementById('nuevoEjecAF').value.trim();
  if (!tri) { toast('Ingresa el nombre Trinidad',false); return; }
  const res=await fetch('/api/trinidad-config/ejecutivos',{
    method:'POST',headers:{...H,'Content-Type':'application/json'},
    body:JSON.stringify({nombre_trinidad:tri,nombre_autofacil:af})
  }).then(x=>x.json());
  if (!res.success) { toast('Error: '+res.error,false); return; }
  document.getElementById('nuevoEjecTri').value=''; document.getElementById('nuevoEjecAF').value='';
  toast('Ejecutivo agregado',true); eqCargarEjecutivos();
  if (af) eqReaplicar(true);
}

async function eqEliminarEjecutivo(id) {
  if (!confirm('¿Eliminar esta equivalencia?')) return;
  const res=await fetch(`/api/trinidad-config/ejecutivos/${id}`,{method:'DELETE',headers:H}).then(x=>x.json());
  if (!res.success) { toast('Error: '+res.error,false); return; }
  toast('Eliminado',true); eqCargarEjecutivos();
}

eqCargarEjecutivos();
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
