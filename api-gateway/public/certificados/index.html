<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<!-- v1.6 -->
<link rel="icon" href="/img/favicon.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Certificados — AutoFácil</title>
<link rel="stylesheet" href="/css/bootstrap-icons.css">
<style>
  :root { --navy:#0f2d6b; --blue:#1565c0; --bg:#f0f4f8; --card:#fff; --border:#e2e8f0; --text:#1e293b; --muted:#64748b; --violet:#7c3aed; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); }
  /* Barra superior: componente único /js/topnav.js */
  .page{ max-width:1000px; margin:0 auto; padding:24px 16px 80px; }
  h1{ font-size:1.3rem; color:var(--navy); margin-bottom:4px; }
  .sub{ color:var(--muted); font-size:.9rem; margin-bottom:20px; }
  .card{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px 22px; box-shadow:0 2px 10px rgba(0,0,0,.05); margin-bottom:20px; }
  .tipos{ display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; }
  .tipo{ border:1.5px solid var(--border); border-radius:12px; padding:14px; cursor:pointer; transition:.15s; background:#fff; text-align:left; }
  .tipo:hover{ border-color:var(--violet); box-shadow:0 4px 14px rgba(124,58,237,.15); }
  .tipo.sel{ border-color:var(--violet); background:#f5f3ff; }
  .tipo i{ font-size:1.4rem; color:var(--violet); }
  .tipo .t{ font-weight:700; font-size:.9rem; color:var(--navy); margin-top:6px; }
  .tipo .d{ font-size:.74rem; color:var(--muted); margin-top:2px; }
  label{ display:block; font-weight:700; font-size:.8rem; color:var(--navy); margin-bottom:6px; }
  input[type=text], input[type=number]{ width:100%; padding:9px 12px; border:1.5px solid #cbd5e1; border-radius:9px; font-size:.9rem; }
  .row{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media(max-width:640px){ .row{ grid-template-columns:1fr; } }
  .btn{ border:none; border-radius:9px; padding:10px 20px; font-size:.9rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
  .btn-go{ background:linear-gradient(135deg,#6d28d9,var(--violet)); color:#fff; }
  .btn-go:disabled{ opacity:.5; cursor:not-allowed; }
  .btn-light{ background:#eef2ff; color:#4338ca; }
  .spinner{ width:15px; height:15px; border:.18em solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .err{ background:#fef2f2; border:1px solid #fca5a5; color:#b91c1c; border-radius:8px; padding:10px 14px; font-size:.85rem; margin-top:12px; display:none; }
  .res{ border:1px solid var(--border); border-radius:10px; margin-top:10px; max-height:260px; overflow:auto; }
  .res .it{ padding:9px 12px; border-bottom:1px solid #f1f5f9; cursor:pointer; font-size:.85rem; display:flex; justify-content:space-between; gap:10px; }
  .res .it:hover{ background:#f5f3ff; }
  .res .it b{ color:var(--navy); }
  .selbox{ background:#f0fdf4; border:1px solid #86efac; border-radius:10px; padding:10px 14px; font-size:.86rem; margin-top:10px; display:none; }
  .tabs{ display:flex; gap:8px; margin-bottom:14px; }
  .tab{ padding:7px 16px; border-radius:20px; font-size:.84rem; font-weight:700; cursor:pointer; border:1.5px solid var(--border); background:#fff; color:var(--muted); }
  .tab.active{ background:var(--navy); color:#fff; border-color:var(--navy); }
  table{ width:100%; border-collapse:collapse; font-size:.82rem; }
  th,td{ padding:8px 10px; text-align:left; border-bottom:1px solid #f1f5f9; }
  th{ background:#f8fafc; color:var(--navy); font-size:.7rem; text-transform:uppercase; letter-spacing:.04em; }
  .pill{ display:inline-block; border-radius:20px; padding:1px 9px; font-size:.7rem; font-weight:700; background:#ede9fe; color:#6d28d9; }
  .pill.anul{ background:#fee2e2; color:#b91c1c; }
  .hide{ display:none; }

  /* ── Documento del certificado (imprimible) ── */
  #certWrap{ display:none; }
  .doc{ background:#fff; border:1px solid var(--border); border-radius:10px; padding:48px 54px; max-width:816px; min-height:24cm; margin:0 auto; box-shadow:0 6px 24px rgba(0,0,0,.08); display:flex; flex-direction:column; }
  .doc-head{ display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid #0141A2; padding-bottom:10px; margin-bottom:8px; }
  .doc-head .addr{ font-size:.62rem; color:#546E7A; line-height:1.65; }
  .doc-head img.logo{ height:40px; object-fit:contain; }
  .folio-row{ text-align:right; font-size:.7rem; color:var(--muted); margin-bottom:16px; }
  .folio-row b{ color:#0141A2; letter-spacing:1px; }
  .doc h2{ text-align:center; font-size:1.18rem; color:#0141A2; text-transform:uppercase; letter-spacing:1px; margin:6px 0 26px; }
  .doc .body{ font-size:.95rem; line-height:1.9; text-align:justify; color:#1e293b; }
  .doc .body b{ color:#0f172a; }
  .doc .grid{ display:grid; grid-template-columns:1fr 1fr; gap:6px 24px; margin:22px 0; font-size:.88rem; }
  .doc .grid div{ border-bottom:1px dotted #cbd5e1; padding:4px 0; display:flex; justify-content:space-between; }
  .doc .grid span{ color:var(--muted); }
  .doc-foot{ display:flex; justify-content:space-between; align-items:flex-end; margin-top:auto; padding-top:30px; gap:20px; }
  .doc-foot .firma{ text-align:center; flex:1; }
  .doc-foot .firma .cargo{ font-weight:800; font-size:.85rem; color:#0f172a; letter-spacing:.3px; }
  .doc-foot .firma .empresa{ font-size:.8rem; color:#0f172a; font-weight:600; margin-top:1px; }
  .doc-actions{ max-width:780px; margin:14px auto 0; display:flex; gap:10px; justify-content:flex-end; }
  @page{ size:Letter; margin:1.8cm; }
  @media print{
    body{ background:#fff; }
    .topnav,.page > *:not(#certWrap),.doc-actions,#af-topnav{ display:none !important; }
    .page{ padding:0; max-width:none; }
    #certWrap{ display:block !important; }
    .doc{ border:none; box-shadow:none; border-radius:0; max-width:none; min-height:auto; padding:0; }
  }
</style>
</head>
<body>

<div id="af-topnav"></div>
<script>
  window.AF_TOPNAV = { breadcrumb: [
    { label:'Inicio', href:'/' },
    { label:'Certificados', icon:'bi-patch-check', current:true }
  ] };
</script>

<div class="page">
  <h1>Certificados</h1>
  <div class="sub">Emite constancias con código QR de verificación pública.</div>

  <div class="tabs">
    <div class="tab active" id="tabEmitir" onclick="verTab('emitir')">Emitir</div>
    <div class="tab" id="tabHist" onclick="verTab('hist')">Historial</div>
  </div>

  <!-- ── EMITIR ── -->
  <div id="vEmitir">
    <div class="card">
      <label>1. Tipo de certificado</label>
      <div class="tipos" id="tipos"></div>
    </div>

    <!-- Búsqueda (crédito para 4 tipos · carta de aprobación para preaprobado) -->
    <div class="card hide" id="boxCredito">
      <label id="lblBusq">2. Crédito (busca por N° Operación, RUT o nombre)</label>
      <input type="text" id="q" placeholder="Ej. 88604 · 17.373.323-2 · FERNANDO SANCHEZ" oninput="buscarDeb()">
      <div class="res hide" id="res"></div>
      <div class="selbox" id="selbox"></div>
      <div id="boxCuota" class="hide" style="margin-top:12px">
        <label>N° de cuota a certificar</label>
        <input type="number" id="numCuota" min="1" placeholder="Ej. 3" style="max-width:160px">
      </div>
    </div>

    <div class="card hide" id="boxGen">
      <button class="btn btn-go" id="btnGen" onclick="generar()" disabled><i class="bi bi-patch-check"></i>Generar certificado</button>
      <div class="err" id="err"></div>
    </div>
  </div>

  <!-- ── DOCUMENTO ── -->
  <div id="certWrap">
    <div class="doc" id="doc"></div>
    <div class="doc-actions">
      <button class="btn btn-light" onclick="nuevo()"><i class="bi bi-arrow-left"></i>Nuevo</button>
      <button class="btn btn-go" onclick="window.print()"><i class="bi bi-printer"></i>Imprimir / PDF</button>
    </div>
  </div>

  <!-- ── HISTORIAL ── -->
  <div id="vHist" class="hide">
    <div class="card">
      <label>Filtrar por RUT</label>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <input type="text" id="fRut" maxlength="12" placeholder="12.345.678-9" oninput="filtrarRut()" style="max-width:220px">
        <span id="fRutMsg" style="font-size:.78rem"></span>
      </div>
      <div style="overflow:auto;margin-top:14px">
        <table>
          <thead><tr><th>Fecha</th><th>Tipo</th><th>N° Op</th><th>Cliente</th><th>Código</th><th>Emitió</th><th>Estado</th><th>Ver</th></tr></thead>
          <tbody id="histBody"><tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:18px">Cargando…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="/js/qrcode-generator.js"></script>
<script src="/js/qr-verificacion.js"></script>
<script src="/js/auth-guard.js"></script>
<script>
const TOKEN = () => sessionStorage.getItem('token');
(function(){ if(!TOKEN()){ location.href='/login.html'; return; }
  try{ const u=JSON.parse(sessionStorage.getItem('usuario')||'{}'); document.getElementById('navUser').textContent=u.nombre||''; }catch(e){} })();
const $ = id => document.getElementById(id);
const H = () => ({ Authorization:'Bearer '+TOKEN() });
const HJ = () => ({ 'Content-Type':'application/json', Authorization:'Bearer '+TOKEN() });
const nf = n => Number(n||0).toLocaleString('es-CL');
const opf = n => String(n==null?'':n);            // N° de operación: SIN puntos de miles
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const money = n => '$'+nf(n);
const fmtRut = v => { v=String(v||'').replace(/[^0-9kK]/g,'').toUpperCase(); if(v.length<2) return String(v||''); const dv=v.slice(-1); const c=v.slice(0,-1).replace(/\B(?=(\d{3})+(?!\d))/g,'.'); return c+'-'+dv; };
function fechaLarga(iso){ if(!iso) return '—'; const M=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const [y,m,d]=iso.split('-').map(Number); return `${d} de ${M[m-1]} de ${y}`; }
function addDias(iso,n){ if(!iso) return '—'; const dt=new Date(iso+'T00:00:00'); dt.setDate(dt.getDate()+(n||0)); return fechaLarga(dt.toISOString().slice(0,10)); }

const TIPOS = [
  ['CERT_CREDITO_VIGENTE','bi-shield-check','Crédito Vigente','Estado y saldo del crédito',  'credito'],
  ['CERT_PREPAGO',        'bi-cash-coin',   'Prepago','Crédito pagado en su totalidad',        'credito'],
  ['CERT_ALZAMIENTO',     'bi-unlock',      'Alzamiento de Prenda','Libera la prenda del vehículo','credito'],
  ['CERT_PAGO_CUOTA',     'bi-receipt',     'Pago de Cuota','Una cuota pagada en particular',    'credito'],
  ['CERT_DEUDA_VIGENTE',  'bi-cash-stack',  'Deuda Vigente','Saldo de deuda actual',             'credito'],
  ['CERT_DEUDA_PREPAGO',  'bi-wallet2',     'Deuda para Prepago','Monto para saldar el crédito',  'credito'],
  ['CERT_PREAPROBADO',    'bi-patch-plus',  'Crédito Preaprobado','Desde la carta de aprobación',  'carta'],
];
let tipoSel=null, modoSel=null, credSel=null;
// Firma de la empresa (misma que usan las Cartas de Aprobación)
let FIRMA_EMPRESA=null;
fetch('/api/cartas-params/firma_empresa',{headers:H()}).then(r=>r.ok?r.json():null).then(j=>{ if(j&&j.data) FIRMA_EMPRESA=j.data; }).catch(()=>{});

(function pintarTipos(){
  $('tipos').innerHTML = TIPOS.map(([t,ic,nom,desc])=>`
    <div class="tipo" data-t="${t}" onclick="selTipo('${t}')">
      <i class="bi ${ic}"></i><div class="t">${nom}</div><div class="d">${desc}</div>
    </div>`).join('');
})();

function selTipo(t){
  tipoSel=t; credSel=null;
  modoSel = TIPOS.find(x=>x[0]===t)[4];
  document.querySelectorAll('.tipo').forEach(e=>e.classList.toggle('sel', e.dataset.t===t));
  $('boxCredito').classList.remove('hide');
  $('lblBusq').textContent = modoSel==='carta'
    ? '2. Carta de aprobación enviada (busca por N° carta, RUT o nombre)'
    : '2. Crédito (busca por N° Operación, RUT o nombre)';
  $('q').placeholder = modoSel==='carta' ? 'Ej. 266024855DI · 19.201.958-3 · YAIR FUENTES' : 'Ej. 88604 · 17.373.323-2 · FERNANDO SANCHEZ';
  $('boxCuota').classList.toggle('hide', t!=='CERT_PAGO_CUOTA');
  $('boxGen').classList.remove('hide');
  $('selbox').style.display='none'; $('res').classList.add('hide'); $('q').value=''; $('err').style.display='none';
  refreshGen();
}

let debT=null;
function buscarDeb(){ clearTimeout(debT); debT=setTimeout(buscar,300); }
async function buscar(){
  const q=$('q').value.trim();
  if(q.length<2){ $('res').classList.add('hide'); return; }
  const ep = modoSel==='carta' ? '/api/certificados/buscar-carta' : '/api/certificados/buscar';
  try{
    const r=await fetch(ep+'?q='+encodeURIComponent(q),{headers:H()});
    const j=await r.json(); if(!j.success) return;
    const rows=j.data||[];
    $('res').innerHTML = rows.length ? rows.map(c=>{
      const veh=esc([c.marca,c.modelo,c.anio].filter(Boolean).join(' '));
      const left = modoSel==='carta' ? `<b>${esc(c.op_carta||'')}</b> · ${esc(c.cliente||'')}` : `<b>N° ${opf(c.num_op)}</b> · ${esc(c.nombre||'')}`;
      const right = modoSel==='carta' ? `${esc(fmtRut(c.rut))} · ${veh} · ${money(c.precio_venta)}` : `${esc(fmtRut(c.rut))} · ${veh}${c.estado_cartera?' · '+esc(c.estado_cartera):''}`;
      return `<div class="it" onclick='selCred(${JSON.stringify(c).replace(/'/g,"&#39;")})'><span>${left}</span><span style="color:#64748b">${right}</span></div>`;
    }).join('') : '<div class="it" style="color:#94a3b8;cursor:default">Sin resultados</div>';
    $('res').classList.remove('hide');
  }catch(e){}
}
function selCred(c){
  credSel=c; $('res').classList.add('hide'); $('selbox').style.display='block';
  const veh=esc([c.marca,c.modelo,c.anio].filter(Boolean).join(' '));
  $('selbox').innerHTML = modoSel==='carta'
    ? `<b>Carta ${esc(c.op_carta||'')}</b> — ${esc(c.cliente||'')} · ${esc(fmtRut(c.rut))} · ${veh} · Precio ${money(c.precio_venta)} · Pie ${money(c.pie)} · Saldo ${money(c.saldo)}`
    : `<b>N° ${opf(c.num_op)}</b> — ${esc(c.nombre||'')} · ${esc(fmtRut(c.rut))} · ${veh}`;
  refreshGen();
}
function refreshGen(){
  let ok=false;
  if(modoSel==='credito') ok=!!credSel && (tipoSel!=='CERT_PAGO_CUOTA' || $('numCuota').value>0);
  else if(modoSel==='carta') ok=!!credSel;
  $('btnGen').disabled=!ok;
}
document.addEventListener('input',e=>{ if(e.target.id==='numCuota') refreshGen(); });

async function generar(){
  const btn=$('btnGen'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Generando…'; $('err').style.display='none';
  const body={ tipo:tipoSel };
  if(modoSel==='credito'){ body.num_op=credSel.num_op; if(tipoSel==='CERT_PAGO_CUOTA') body.numero_cuota=Number($('numCuota').value); }
  else if(modoSel==='carta'){ body.op_carta=credSel.op_carta; }
  try{
    const r=await fetch('/api/certificados/generar',{method:'POST',headers:HJ(),body:JSON.stringify(body)});
    const j=await r.json(); if(!j.success) throw new Error(j.error||'Error');
    render(j.data);
  }catch(e){ $('err').textContent='⚠ '+e.message; $('err').style.display='block'; }
  finally{ btn.disabled=false; btn.innerHTML='<i class="bi bi-patch-check"></i>Generar certificado'; refreshGen(); }
}

function cuerpo(d){
  const c=d.credito||{}, x=d.datos||{}, nom=esc(d.nombre||''), rut=esc(fmtRut(d.rut));
  if(d.tipo==='CERT_CREDITO_VIGENTE') return `AutoFácil Chile certifica que <b>${nom}</b>, RUT <b>${rut}</b>, mantiene <b>vigente</b> el crédito automotriz N° <b>${opf(c.num_op)}</b> (${esc(c.financiera||'')}), otorgado con fecha ${esc(c.fecha_otorgado||'—')}, asociado al vehículo <b>${esc(c.vehiculo||'—')}</b>. A la fecha registra <b>${nf(x.cuotas_pagadas)}</b> de <b>${nf(x.cuotas_total)}</b> cuotas pagadas, con un saldo insoluto de <b>${money(x.saldo_insoluto)}</b> y una cuota mensual de <b>${money(x.cuota_mensual)}</b>.`;
  if(d.tipo==='CERT_PREPAGO') return `AutoFácil Chile certifica que el crédito automotriz N° <b>${opf(c.num_op)}</b> (${esc(c.financiera||'')}), de <b>${nom}</b>, RUT <b>${rut}</b>, asociado al vehículo <b>${esc(c.vehiculo||'—')}</b>, fue <b>PREPAGADO</b> (pagado en su totalidad) con fecha <b>${esc(x.fecha_prepago||'—')}</b>. El cliente <b>no registra saldos pendientes</b> por este crédito.`;
  if(d.tipo==='CERT_ALZAMIENTO') return `Habiéndose pagado íntegramente el crédito automotriz N° <b>${opf(c.num_op)}</b> de <b>${nom}</b>, RUT <b>${rut}</b>, AutoFácil Chile autoriza y certifica el <b>ALZAMIENTO DE LA PRENDA</b> que afecta al vehículo <b>${esc(x.vehiculo||'—')}</b>${x.tipo_vehiculo?' ('+esc(x.tipo_vehiculo)+')':''}. Fecha del pago final: <b>${esc(x.fecha_pago_final||'—')}</b>.`;
  if(d.tipo==='CERT_PAGO_CUOTA') return `AutoFácil Chile certifica que, respecto del crédito automotriz N° <b>${opf(c.num_op)}</b> de <b>${nom}</b>, RUT <b>${rut}</b>, la <b>cuota N° ${nf(x.numero_cuota)}</b> (vencimiento ${esc(x.fecha_vencimiento||'—')}) fue <b>pagada</b> con fecha <b>${esc(x.fecha_pago||'—')}</b> por un monto de <b>${money(x.monto)}</b>.`;
  if(d.tipo==='CERT_PREAPROBADO'){
    const veh=esc([x.tipo_vehiculo,x.marca,x.modelo,x.anio].filter(Boolean).join(' '));
    return `AutoFácil Chile certifica que <b>${nom}</b>, RUT <b>${rut}</b>, cuenta con un crédito automotriz <b>PREAPROBADO</b> según la carta de aprobación N° <b>${esc(x.op_carta||'')}</b>, bajo las siguientes condiciones: vehículo <b>${veh}</b>${x.patente?', patente <b>'+esc(x.patente)+'</b>':''}; precio del vehículo <b>${money(x.precio_venta)}</b>; pie <b>${money(x.pie)}</b>; saldo precio a financiar <b>${money(x.saldo_precio)}</b>; plazo <b>${nf(x.plazo)}</b> cuotas${x.tasa!=null?'; tasa <b>'+x.tasa+'%</b> mensual':''}${x.monto_credito?'; monto del crédito <b>'+money(x.monto_credito)+'</b>':''}. Financiamiento a través de <b>${esc(x.financiera||'')}</b>. La presente oferta tiene una <b>vigencia de ${nf(x.vigencia_dias||5)} días corridos</b> a contar de la fecha de emisión (vence el <b>${addDias(d.fecha_emision,x.vigencia_dias||5)}</b>).`;
  }
  return '';
}
function gridDatos(d){
  const x=d.datos||{}, c=d.credito||{}, items=[];
  const add=(k,v)=>items.push(`<div><span>${k}</span><b>${v}</b></div>`);
  add('Cliente', esc(d.nombre||'—')); add('RUT', esc(d.rut?fmtRut(d.rut):'—'));
  if(c.num_op){ add('N° Operación', opf(c.num_op)); if(c.financiera) add('Financiera', esc(c.financiera)); if(c.vehiculo) add('Vehículo', esc(c.vehiculo)); }
  if(d.tipo==='CERT_CREDITO_VIGENTE'){ add('Cuotas pagadas', `${nf(x.cuotas_pagadas)} / ${nf(x.cuotas_total)}`); add('Saldo insoluto', money(x.saldo_insoluto)); add('Cuota mensual', money(x.cuota_mensual)); }
  if(d.tipo==='CERT_PREPAGO'){ add('Fecha de prepago', esc(x.fecha_prepago||'—')); add('Monto financiado', money(x.monto_financiado)); }
  if(d.tipo==='CERT_PAGO_CUOTA'){ add('Cuota', nf(x.numero_cuota)); add('Fecha de pago', esc(x.fecha_pago||'—')); add('Monto', money(x.monto)); }
  if(d.tipo==='CERT_ALZAMIENTO'){ add('Fecha pago final', esc(x.fecha_pago_final||'—')); }
  if(d.tipo==='CERT_PREAPROBADO'){
    add('N° Carta', esc(x.op_carta||'—'));
    add('Vehículo', esc([x.tipo_vehiculo,x.marca,x.modelo,x.anio].filter(Boolean).join(' ')));
    if(x.patente) add('Patente', esc(x.patente));
    add('Precio vehículo', money(x.precio_venta)); add('Pie', money(x.pie)); add('Saldo precio', money(x.saldo_precio));
    add('Plazo', nf(x.plazo)+' cuotas'); if(x.tasa!=null) add('Tasa mensual', x.tasa+'%');
    if(x.monto_credito) add('Monto crédito', money(x.monto_credito));
    add('Financiera', esc(x.financiera||'—')); add('Vigencia', nf(x.vigencia_dias||5)+' días');
  }
  return `<div class="grid">${items.join('')}</div>`;
}
function render(d){
  const qr = (typeof qrVerificacionHTML==='function') ? qrVerificacionHTML(d.codigo,{px:108}) : '';
  const firmaImg = FIRMA_EMPRESA
    ? `<img src="${FIRMA_EMPRESA}" style="max-width:320px;max-height:120px;display:block;margin:0 auto 6px">`
    : `<div style="border-bottom:1px solid #555;width:280px;margin:0 auto 8px">&nbsp;</div>`;
  $('doc').innerHTML = `
    ${d.anulado?'<div style="background:#fef2f2;border:1px solid #fca5a5;color:#b91c1c;text-align:center;font-weight:800;padding:8px;border-radius:8px;margin-bottom:12px;letter-spacing:1px">⛔ CERTIFICADO ANULADO</div>':''}
    <div class="doc-head">
      <div class="addr">Av. Presidente Kennedy 5757, Of. 1601, Las Condes<br>Santiago, Chile · www.autofacilchile.cl</div>
      <img class="logo" src="/img/logo.png" alt="AutoFácil" onerror="this.style.display='none'">
    </div>
    <div class="folio-row">Folio <b>${esc(d.codigo)}</b> · ${fechaLarga(d.fecha_emision)}</div>
    <h2>${esc(d.tipo_label||'')}</h2>
    <div class="body">${d.cuerpo_html||''}</div>
    ${d.detalle_html||''}
    <div class="body" style="margin-top:16px">${d.cierre_html||''}</div>
    <div class="doc-foot">
      <div class="firma">
        ${firmaImg}
        <div class="cargo">Gerente de Operaciones</div>
        <div class="empresa">Auto Fácil SpA</div>
      </div>
      <div>${qr}</div>
    </div>`;
  $('certWrap').style.display='block';
  $('vEmitir').classList.add('hide'); $('vHist').classList.add('hide');
  window.scrollTo({top:0,behavior:'smooth'});
}
function nuevo(){ $('certWrap').style.display='none'; $('vEmitir').classList.remove('hide'); }

/* ── Tabs / Historial ── */
function verTab(t){
  $('tabEmitir').classList.toggle('active', t==='emitir');
  $('tabHist').classList.toggle('active', t==='hist');
  $('certWrap').style.display='none';
  if(t==='hist'){ $('vEmitir').classList.add('hide'); $('vHist').classList.remove('hide'); cargarHist(); }
  else { $('vHist').classList.add('hide'); $('vEmitir').classList.remove('hide'); }
}
let HIST_ROWS=[];
async function cargarHist(){
  try{
    const r=await fetch('/api/certificados/historial',{headers:H()});
    const j=await r.json(); HIST_ROWS=j.data||[];
    if($('fRut').value.trim()) filtrarRut(); else pintarHist(HIST_ROWS);
  }catch(e){ $('histBody').innerHTML='<tr><td colspan="8" style="text-align:center;color:#b91c1c;padding:18px">Error al cargar</td></tr>'; }
}
function pintarHist(rows){
  $('histBody').innerHTML = rows.length ? rows.map(c=>`
    <tr>
      <td>${esc(c.created_at)}</td>
      <td>${esc(c.tipo_label)}</td>
      <td>${c.num_op?opf(c.num_op):'—'}</td>
      <td>${esc(c.nombre||'—')}<br><span style="color:#94a3b8;font-size:.74rem">${esc(fmtRut(c.rut))}</span></td>
      <td><a href="/verificar/${esc(c.codigo)}" target="_blank" style="font-family:monospace;color:#6d28d9">${esc(c.codigo)}</a></td>
      <td>${esc(c.emitido_por||'')}</td>
      <td>${c.anulado?'<span class="pill anul">ANULADO</span>':'<span class="pill">Válido</span>'}</td>
      <td><button title="Ver certificado" onclick="verCert('${esc(c.codigo)}')" style="background:#ede9fe;border:none;color:#6d28d9;border-radius:8px;padding:5px 10px;cursor:pointer"><i class="bi bi-eye"></i></button></td>
    </tr>`).join('') : '<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:18px">Sin certificados</td></tr>';
}
async function verCert(codigo){
  try{
    const r=await fetch('/api/certificados/ver/'+encodeURIComponent(codigo),{headers:H()});
    const j=await r.json(); if(!j.success) throw new Error(j.error||'Error');
    render(j.data);
  }catch(e){ alert('No se pudo abrir el certificado: '+e.message); }
}
/* ── Validador de RUT (DV módulo 11) + formato + filtro ── */
function rutDV(cuerpo){ let s=0,m=2; for(const d of String(cuerpo).split('').reverse()){ s+=parseInt(d,10)*m; m=m===7?2:m+1; } const r=11-(s%11); return r===11?'0':r===10?'K':String(r); }
function rutFormat(v){ v=String(v||'').replace(/[^0-9kK]/g,'').toUpperCase(); if(v.length<2) return v; const dv=v.slice(-1); let c=v.slice(0,-1).replace(/\B(?=(\d{3})+(?!\d))/g,'.'); return c+'-'+dv; }
function rutValido(v){ v=String(v||'').replace(/[^0-9kK]/g,'').toUpperCase(); if(v.length<2) return false; const c=v.slice(0,-1); if(!/^\d+$/.test(c)) return false; return rutDV(c)===v.slice(-1); }
function filtrarRut(){
  const el=$('fRut'), msg=$('fRutMsg');
  const raw=el.value.replace(/[^0-9kK]/g,'').toUpperCase();
  el.value=rutFormat(el.value);
  if(!raw){ el.style.borderColor='#cbd5e1'; msg.textContent=''; pintarHist(HIST_ROWS); return; }
  const ok=rutValido(raw);
  el.style.borderColor= ok?'#16a34a':'#ef4444';
  msg.textContent= ok?'✓ RUT válido':'…'; msg.style.color= ok?'#16a34a':'#94a3b8';
  pintarHist(HIST_ROWS.filter(r=>String(r.rut||'').replace(/[^0-9kK]/g,'').toUpperCase().includes(raw)));
}
