<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- v1.2 — cuadros Excel + copiar con formato + descargar .xls por lámina -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --accent:#009AFE; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; }
    .main-content { padding:32px 40px; max-width:1250px; margin:0 auto; }
    .page-banner { background:linear-gradient(135deg,#012d70,#0141A2 60%,#009AFE); border-radius:16px; color:#fff; padding:22px 30px; margin-bottom:22px; display:flex; align-items:center; gap:16px; }
    .page-banner i { font-size:2.2rem; opacity:.85; } .page-banner h2 { font-weight:700; margin:0 0 3px; font-size:1.25rem; } .page-banner p { opacity:.85; margin:0; font-size:.87rem; }
    .lamina { background:#fff; border-radius:14px; box-shadow:0 1px 6px rgba(0,0,0,.08); margin-bottom:26px; overflow:hidden; page-break-after:always; }
    .lam-head { background:linear-gradient(135deg,#012d70,#0141A2); color:#fff; padding:12px 22px; font-weight:700; font-size:.95rem; display:flex; justify-content:space-between; align-items:center; }
    .lam-head .kicker { font-size:.7rem; letter-spacing:.12em; opacity:.75; }
    .lam-body { padding:18px 22px; }
    table { width:100%; border-collapse:collapse; font-size:.79rem; }
    thead th { background:#f8fafc; color:#374151; font-weight:700; padding:7px 10px; border-bottom:2px solid #e5e7eb; text-align:left; white-space:nowrap; }
    tbody td { padding:5px 10px; border-bottom:1px solid #f1f5f9; }
    .tr-tot td { font-weight:800; background:#f0f6ff; border-top:2px solid var(--navy); }
    .tr-grupo td { font-weight:800; background:#f8fafc; color:var(--navy); }
    .text-right { text-align:right; } .num { font-family:Consolas,monospace; }
    .neg { color:#b91c1c; } .pos { color:#166534; }
    .hechos { background:#fffbeb; border:1px solid #fde68a; border-radius:10px; padding:12px 14px; margin-top:14px; }
    .hechos h6 { font-size:.82rem; font-weight:800; color:#92400e; margin:0 0 6px; }
    .hechos textarea { width:100%; border:1px solid #fde68a; border-radius:8px; font-size:.82rem; padding:8px 10px; background:#fff; min-height:88px; }
    .portada { background:linear-gradient(135deg,#012d70,#0141A2 55%,#009AFE); color:#fff; border-radius:14px; padding:80px 40px; text-align:center; margin-bottom:26px; page-break-after:always; }
    .portada h1 { font-weight:800; font-size:2rem; margin-bottom:8px; } .portada .sub { opacity:.85; font-size:1.05rem; }
    .kpi-row { display:flex; gap:14px; flex-wrap:wrap; margin-top:26px; justify-content:center; }
    .kpi { background:rgba(255,255,255,.12); border-radius:12px; padding:14px 22px; min-width:170px; }
    .kpi .v { font-size:1.3rem; font-weight:800; } .kpi .l { font-size:.72rem; opacity:.8; text-transform:uppercase; letter-spacing:.08em; }
    /* Cuadros estilo Excel de finanzas */
    .xls { border-collapse:collapse; width:100%; font-size:.78rem; }
    .xls th, .xls td { border:1px solid #b7b7b7; padding:3px 8px; }
    .xls .tit { background:#FFD966; font-weight:800; text-align:center; font-size:.85rem; border:2px solid #7f6000; }
    .xls thead th { background:#FFD966; text-align:center; font-weight:800; border:2px solid #7f6000; }
    .xls td.n { text-align:right; font-family:Calibri,Consolas,monospace; white-space:nowrap; }
    .xls .grupo td { background:#efefef; font-weight:800; }
    .xls .margen td { background:#dce6f1; color:#1F4E79; font-weight:800; }
    .xls .neg { color:#b91c1c; }
    @media print {
      body { background:#fff; } .main-content { padding:0; max-width:none; }
      .no-print, #af-topnav, .toolbar { display:none !important; }
      .lamina, .portada { box-shadow:none; border-radius:0; margin:0; }
      .hechos textarea { border:none; background:transparent; resize:none; }
      .hechos .btns { display:none; }
      @page { size:letter landscape; margin:10mm; }
    }
  </style>
</head>
<body>
<div id="af-topnav"></div>
<script>window.AF_TOPNAV = { breadcrumb: [ { label:'Inicio', href:'/' }, { label:'Contabilidad', href:'/contabilidad/' }, { label:'Presentación Directorio', icon:'bi-easel2', current:true } ] };</script>
<script src="/js/topnav.js"></script>
<div class="main-content">
  <div class="page-banner no-print"><i class="bi bi-easel2"></i><div><h2>Presentación Directorio</h2><p>La presentación mensual de finanzas armada sola con los libros: balance, cuentas por cobrar y pagar, resultados vs año anterior, caja — con Hechos Relevantes editables por lámina. Imprime a PDF apaisado y listo.</p></div></div>

  <div class="d-flex gap-2 align-items-end mb-3 flex-wrap toolbar no-print">
    <div><label class="form-label small fw-semibold mb-1">Mes</label><input type="month" id="fMes" class="form-control form-control-sm"></div>
    <button class="btn btn-sm btn-primary" onclick="generar()"><i class="bi bi-magic me-1"></i>Generar presentación</button>
    <button class="btn btn-sm btn-outline-secondary" onclick="window.print()"><i class="bi bi-printer me-1"></i>Imprimir / PDF</button>
    <button class="btn btn-sm btn-outline-secondary" onclick="configRubros()"><i class="bi bi-sliders me-1"></i>Configurar rubros</button>
    <label class="btn btn-sm btn-outline-secondary mb-0" title="Sube el export AVSOFT: Compras → Importador/Exportador → Exportar Documentos de Compras (1 Línea)"><i class="bi bi-upload me-1"></i>Importar compras AVSOFT
      <input type="file" hidden accept=".csv,.txt" onchange="importarCompras(this)"></label>
  </div>

  <div id="out"><div class="text-muted no-print">Elige el mes y genera la presentación.</div></div>
</div>

<dialog id="dlgRubros" style="border:none;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:24px;width:900px;max-width:96vw;max-height:88vh;overflow:auto"></dialog>

<script src="/js/auth-guard.js"></script>
<script>
const token = sessionStorage.getItem('token'); if (!token) location.href='/login.html';
const H = { Authorization:'Bearer '+token, 'Content-Type':'application/json' };
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const clp = n => { const v=Math.round(Number(n)||0); return (v<0?'−$':'$')+Math.abs(v).toLocaleString('es-CL'); };
const mm = n => { const v=(Number(n)||0)/1e6; return (v<0?'−$':'$')+Math.abs(v).toLocaleString('es-CL',{minimumFractionDigits:1,maximumFractionDigits:1})+' MM'; };
const pct = (a,b) => !b ? '—' : ((a-b)/Math.abs(b)*100).toLocaleString('es-CL',{maximumFractionDigits:1})+'%';
const varCls = v => v<0?'neg':(v>0?'pos':'');
const MESES = ['','enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const hoy = new Date(); const pad=n=>String(n).padStart(2,'0');
const prev = new Date(hoy.getFullYear(), hoy.getMonth()-1, 1);
fMes.value = `${prev.getFullYear()}-${pad(prev.getMonth()+1)}`;
let D = null;

const filaCta = (x, cols) => `<tr><td class="num">${esc(x.cuenta)}</td><td>${esc(x.nombre||'')}</td>${cols.map(c=>`<td class="text-right num ${c.cls||''}">${c.txt}</td>`).join('')}</tr>`;

function bloqueHechos(sec, titulo){
  const h = D.hechos[sec];
  return `<div class="hechos">
    <h6><i class="bi bi-exclamation-circle me-1"></i>Hechos Relevantes — ${titulo}</h6>
    <textarea id="hx_${sec}" placeholder="1) ...">${esc(h?.texto||'')}</textarea>
    <div class="btns d-flex justify-content-between align-items-center mt-1">
      <span class="small text-muted">${h?`Guardado por ${esc(h.actualizado_por||'')} · ${String(h.updated_at).slice(0,16).replace('T',' ')}`:''}</span>
      <span>
        <button class="btn btn-sm btn-outline-primary me-1" onclick="hechosIA('${sec}')"><i class="bi bi-stars me-1"></i>Borrador IA</button>
        <button class="btn btn-sm btn-primary" onclick="guardarHechos('${sec}')"><i class="bi bi-check-lg me-1"></i>Guardar</button>
      </span>
    </div>
  </div>`;
}

function lamina(kicker, titulo, cuerpo, sec, tituloHechos){
  return `<div class="lamina">
    <div class="lam-head"><span>${titulo}</span>
      <span class="d-flex align-items-center gap-2">
        <button class="btn btn-sm btn-outline-light no-print" style="--bs-btn-padding-y:2px;--bs-btn-font-size:.72rem" title="Copiar el cuadro con formato (pégalo en Excel, Word o correo)" onclick="copiarCuadro(this)"><i class="bi bi-clipboard me-1"></i>Copiar</button>
        <button class="btn btn-sm btn-outline-light no-print" style="--bs-btn-padding-y:2px;--bs-btn-font-size:.72rem" title="Descargar como Excel" onclick="descargarCuadro(this,'${esc(titulo)}')"><i class="bi bi-download me-1"></i>Excel</button>
        <span class="kicker">${kicker} · AUTOFÁCIL</span>
      </span></div>
    <div class="lam-body">${cuerpo}${sec?bloqueHechos(sec, tituloHechos||titulo):''}</div>
  </div>`;
}

/* ── Copiar / descargar cuadros con formato ──
   Clona la tabla y aplica los estilos computados INLINE (los <style> de la
   página no viajan en el portapapeles ni al .xls): así el pegado en Excel,
   Word o Gmail conserva colores, negritas y bordes. */
function tablaInline(tbl){
  const clon = tbl.cloneNode(true);
  const props = ['background-color','color','font-weight','font-size','font-family','text-align','border','padding','white-space'];
  const src = tbl.querySelectorAll('*'), dst = clon.querySelectorAll('*');
  const aplicar = (s,d) => { const cs = getComputedStyle(s); d.style.cssText = props.map(p=>`${p}:${cs.getPropertyValue(p)}`).join(';'); };
  aplicar(tbl, clon); clon.style.borderCollapse = 'collapse';
  for (let i=0;i<src.length;i++) aplicar(src[i], dst[i]);
  clon.querySelectorAll('button,input,textarea').forEach(e=>e.remove());
  return clon;
}
function tablaDe(btn){
  const t = btn.closest('.lamina').querySelector('.lam-body table');
  if (!t) alert('Esta lámina no tiene cuadro para copiar.');
  return t;
}
async function copiarCuadro(btn){
  const t = tablaDe(btn); if (!t) return;
  const html = '<meta charset="utf-8">' + tablaInline(t).outerHTML;
  const plano = [...t.rows].map(r=>[...r.cells].map(c=>c.innerText.trim()).join('\t')).join('\n');
  try {
    await navigator.clipboard.write([new ClipboardItem({
      'text/html': new Blob([html],{type:'text/html'}),
      'text/plain': new Blob([plano],{type:'text/plain'}),
    })]);
    const orig = btn.innerHTML; btn.innerHTML = '<i class="bi bi-check-lg me-1"></i>Copiado';
    setTimeout(()=>btn.innerHTML=orig, 1800);
  } catch(e) { alert('No se pudo copiar: '+e.message); }
}
function descargarCuadro(btn, titulo){
  const t = tablaDe(btn); if (!t) return;
  const html = `<html><head><meta charset="utf-8"></head><body>${tablaInline(t).outerHTML}</body></html>`;
  const blob = new Blob(['﻿'+html], {type:'application/vnd.ms-excel'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = titulo.toLowerCase().replace(/[^a-z0-9áéíóúñ]+/gi,'-').replace(/^-|-$/g,'') + '-' + fMes.value + '.xls';
  a.click(); URL.revokeObjectURL(a.href);
}

function generar(){ consultar(); }
let Q = null, C = null; // cuadros estilo Excel + auxiliar compras
async function consultar(){
  const [j, jq, jc] = await Promise.all([
    fetch('/api/contabilidad/directorio?mes='+fMes.value,{headers:H}).then(r=>r.json()),
    fetch('/api/contabilidad/directorio/cuadros?mes='+fMes.value,{headers:H}).then(r=>r.json()),
    fetch('/api/contabilidad/compras-aux?mes='+fMes.value,{headers:H}).then(r=>r.json()).catch(()=>({success:false})),
  ]);
  if (!j.success) return alert(j.error);
  if (!jq.success) return alert(jq.error);
  D = j.data; Q = jq.data; C = jc.success ? jc.data : null; render();
}
async function importarCompras(inp){
  const f = inp.files[0]; if (!f) return; inp.value='';
  const base64 = await new Promise(res=>{ const fr = new FileReader(); fr.onload = ()=>res(fr.result); fr.readAsDataURL(f); });
  const r = await fetch('/api/contabilidad/compras-aux/importar',{method:'POST',headers:H,body:JSON.stringify({base64})});
  const j = await r.json(); if (!j.success) return alert(j.error);
  alert(`Importadas ${j.data.documentos.toLocaleString('es-CL')} facturas (${j.data.meses.length} meses: ${j.data.meses[0]} → ${j.data.meses[j.data.meses.length-1]}). Los meses del archivo se reemplazaron completos.`);
  if (D) consultar();
}
/* miles de pesos, formato Excel */
const miles = n => { const v = Math.round((Number(n)||0)/1000); return `<span class="${v<0?'neg':''}">${v.toLocaleString('es-CL')}</span>`; };
const pesos = n => { const v = Math.round(Number(n)||0); return `<span class="${v<0?'neg':''}">${v.toLocaleString('es-CL')}</span>`; };
const pctDe = (v, base) => base ? `<span class="${v<0?'neg':''}">${(v/Math.abs(base)*100).toLocaleString('es-CL',{minimumFractionDigits:2,maximumFractionDigits:2})}%</span>` : '';

function cuadroBalance(){
  const b = Q.balance, nC = b.columnas.length;
  let html = `<table class="xls"><thead>
    <tr><th colspan="${nC+1}" class="tit">AUTOFACIL CHILE SPA<br>BALANCE GENERAL EN MILES DE PESOS</th></tr>
    <tr><th style="min-width:220px"></th>${b.columnas.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
  const T = { ACTIVO:Array(nC).fill(0), PASIVO:Array(nC).fill(0), PATRIMONIO:Array(nC).fill(0) };
  b.grupos.forEach(g=>{ g.subtotal.forEach((v,i)=>T[g.tipo][i]+=v); });
  const filaTot = (lbl, arr) => `<tr class="margen"><td>${lbl}</td>${arr.map(v=>`<td class="n">${miles(v)}</td>`).join('')}</tr>`;
  html += filaTot('Activo', T.ACTIVO);
  b.grupos.filter(g=>g.tipo==='ACTIVO').forEach(g=>{
    html += `<tr class="grupo"><td>${esc(g.grupo)}</td>${g.subtotal.map(v=>`<td class="n">${miles(v)}</td>`).join('')}</tr>`;
    g.filas.forEach(f=>{ html += `<tr><td>${esc(f.etiqueta)}</td>${f.valores.map(v=>`<td class="n">${miles(v)}</td>`).join('')}</tr>`; });
  });
  html += filaTot('Pasivo', T.PASIVO);
  b.grupos.filter(g=>g.tipo==='PASIVO').forEach(g=>{
    html += `<tr class="grupo"><td>${esc(g.grupo)}</td>${g.subtotal.map(v=>`<td class="n">${miles(v)}</td>`).join('')}</tr>`;
    g.filas.forEach(f=>{ html += `<tr><td>${esc(f.etiqueta)}</td>${f.valores.map(v=>`<td class="n">${miles(v)}</td>`).join('')}</tr>`; });
  });
  b.grupos.filter(g=>g.tipo==='PATRIMONIO').forEach(g=>{
    html += `<tr class="grupo"><td>${esc(g.grupo)}</td>${g.subtotal.map(v=>`<td class="n">${miles(v)}</td>`).join('')}</tr>`;
    g.filas.forEach(f=>{ html += `<tr><td>${esc(f.etiqueta)}</td>${f.valores.map(v=>`<td class="n">${miles(v)}</td>`).join('')}</tr>`; });
  });
  // Resultado del ejercicio = Activo − Pasivo − Patrimonio (para que cuadre a la vista)
  const RES = T.ACTIVO.map((v,i)=>v - T.PASIVO[i] - T.PATRIMONIO[i]);
  html += `<tr><td>Resultado del Ejercicio</td>${RES.map(v=>`<td class="n">${miles(v)}</td>`).join('')}</tr>`;
  html += filaTot('Total Pasivo y Patrimonio', T.PASIVO.map((v,i)=>v+T.PATRIMONIO[i]+RES[i]));
  return html + '</tbody></table>';
}

function cuadroEERR(fV, fAA, titulo, lblA, lblAA){
  // columnas: actual | % | PPTO | % | año anterior | % | VAR/AA | %
  const base = Q.base_pct[fV], baseAA = Q.base_pct[fAA];
  const idx = { acum:0, acum_aa:1, mes:2, mes_aa:3 };
  let html = `<table class="xls"><thead>
    <tr><th colspan="9" class="tit">AUTOFACIL CHILE SPA<br>${titulo}</th></tr>
    <tr><th style="min-width:220px"></th><th>${lblA}</th><th>%</th><th>PPTO</th><th>${lblAA}</th><th>%</th><th>VAR/${lblAA.slice(-2)}</th><th>%</th><th></th></tr></thead><tbody>`;
  Q.eerr.forEach(r=>{
    const a = r.valores[idx[fV]], b = r.valores[idx[fAA]];
    const varV = a-b, varP = b ? (varV/Math.abs(b)*100) : null;
    const cls = r.clase==='MARGEN' ? 'margen' : '';
    html += `<tr class="${cls}"><td>${esc(r.etiqueta)}</td>
      <td class="n">${pesos(a)}</td><td class="n">${pctDe(a,base)}</td>
      <td class="n" style="color:#999">—</td>
      <td class="n">${pesos(b)}</td><td class="n">${pctDe(b,baseAA)}</td>
      <td class="n">${pesos(varV)}</td><td class="n">${varP===null?'':`<span class="${varP<0?'neg':''}">${varP.toLocaleString('es-CL',{maximumFractionDigits:1})}%</span>`}</td><td></td></tr>`;
  });
  return html + `</tbody></table><div class="small text-muted mt-1">Columna PPTO en gris: se llenará cuando exista el mantenedor de presupuesto anual.</div>`;
}

function render(){
  const [y,m] = D.mes.split('-').map(Number);
  const nomMes = MESES[m].toUpperCase()+' '+y;
  const esCxC = c => /^110[3-9]/.test(c.cuenta) && !/^1101|^1102/.test(c.cuenta);
  const bal = D.balance;
  const act = bal.filter(x=>x.tipo==='ACTIVO'), pas = bal.filter(x=>x.tipo==='PASIVO'), pat = bal.filter(x=>x.tipo==='PATRIMONIO');
  const sum = (arr,f) => arr.reduce((s,x)=>s+x[f],0);
  const totAct = sum(act,'s_actual'), totPas = -sum(pas,'s_actual'), totPat = -sum(pat,'s_actual');
  const ing = D.eerr.filter(x=>x.tipo==='INGRESO'), gas = D.eerr.filter(x=>x.tipo==='GASTO');
  const resMes = sum(ing,'mes_actual')-sum(gas,'mes_actual'), resMesAA = sum(ing,'mes_aa')-sum(gas,'mes_aa');
  const resAcum = sum(ing,'acum_actual')-sum(gas,'acum_actual'), resAcumAA = sum(ing,'acum_aa')-sum(gas,'acum_aa');

  // Lámina balance: 3 grupos con actual/anterior/variación
  const filasBal = (arr, inv) => arr.filter(x=>Math.abs(x.s_actual)>0.5||Math.abs(x.s_anterior)>0.5).map(x=>{
    const a = inv?-x.s_actual:x.s_actual, b = inv?-x.s_anterior:x.s_anterior, v = a-b;
    return filaCta(x, [{txt:mm(a)},{txt:mm(b)},{txt:mm(v),cls:varCls(v)}]);
  }).join('');
  const cabBal = `<thead><tr><th style="width:95px">Cuenta</th><th></th><th class="text-right" style="width:120px">${MESES[m].slice(0,3)}-${String(y).slice(2)}</th><th class="text-right" style="width:120px">Mes anterior</th><th class="text-right" style="width:120px">Variación</th></tr></thead>`;
  const lamBal = lamina('BALANCE', `BALANCE GENERAL AL MES DE ${nomMes}`, cuadroBalance(), 'BALANCE');

  // CxC / CxP
  const cxc = act.filter(esCxC), cxp = pas.filter(x=>/^21/.test(x.cuenta));
  const lamCxC = lamina('BALANCE', `DETALLE CUENTAS POR COBRAR — ${nomMes}`, `
    <table>${cabBal}<tbody>${filasBal(cxc,false)}
      <tr class="tr-tot"><td colspan="2">TOTAL CUENTAS POR COBRAR</td><td class="text-right num">${mm(sum(cxc,'s_actual'))}</td><td class="text-right num">${mm(sum(cxc,'s_anterior'))}</td><td class="text-right num">${mm(sum(cxc,'s_actual')-sum(cxc,'s_anterior'))}</td></tr>
    </tbody></table>`, 'CXC', 'Cuentas por Cobrar');
  const lamCxP = lamina('BALANCE', `DETALLE CUENTAS POR PAGAR — ${nomMes}`, `
    <table>${cabBal}<tbody>${filasBal(cxp,true)}
      <tr class="tr-tot"><td colspan="2">TOTAL CUENTAS POR PAGAR</td><td class="text-right num">${mm(-sum(cxp,'s_actual'))}</td><td class="text-right num">${mm(-sum(cxp,'s_anterior'))}</td><td class="text-right num">${mm(-sum(cxp,'s_actual')+sum(cxp,'s_anterior'))}</td></tr>
    </tbody></table>`, 'CXP', 'Cuentas por Pagar');

  const MESU = MESES[m].slice(0,3).toUpperCase();
  const lamEERRMes = lamina('EERR', `MARGEN OPERATIVO DE ${nomMes}`,
    cuadroEERR('mes','mes_aa', `ESTADO DE RESULTADOS COMPARATIVO DEL MES EN PESOS`, `${MESU}.${String(y).slice(2)}`, `${MESU}.${String(y-1).slice(2)}`), 'EERR_MES', 'Resultados del mes');
  const lamEERRAcum = lamina('EERR', `P&G ACUMULADO AL MES DE ${nomMes}`,
    cuadroEERR('acum','acum_aa', `ESTADO DE RESULTADOS COMPARATIVO ACUMULADO EN PESOS`, `${MESU}.${String(y).slice(2)}`, `${MESU}.${String(y-1).slice(2)}`), 'EERR_ACUM', 'Resultados acumulados');

  // Caja y bancos
  const lamCaja = lamina('FDC', `CAJA Y BANCOS — MOVIMIENTO DE ${nomMes}`, `
    <table><thead><tr><th style="width:95px">Cuenta</th><th></th><th class="text-right">Saldo inicial</th><th class="text-right">Entradas</th><th class="text-right">Salidas</th><th class="text-right">Saldo final</th></tr></thead><tbody>
      ${D.caja.map(x=>filaCta(x,[{txt:mm(x.saldo_ini)},{txt:mm(x.entradas),cls:'pos'},{txt:mm(x.salidas),cls:'neg'},{txt:mm(x.saldo_ini+x.entradas-x.salidas)}])).join('')}
      <tr class="tr-tot"><td colspan="2">TOTAL DISPONIBLE</td>
        <td class="text-right num">${mm(sum(D.caja,'saldo_ini'))}</td>
        <td class="text-right num pos">${mm(sum(D.caja,'entradas'))}</td>
        <td class="text-right num neg">${mm(sum(D.caja,'salidas'))}</td>
        <td class="text-right num">${mm(sum(D.caja,'saldo_ini')+sum(D.caja,'entradas')-sum(D.caja,'salidas'))}</td></tr>
    </tbody></table>`, 'CAJA', 'Caja y bancos');

  // Lámina compras (auxiliar AVSOFT), solo si hay datos del mes
  let lamCompras = '';
  if (C && C.total_mes.docs){
    const f10 = C.documentos.slice(0,25);
    lamCompras = lamina('COMPRAS', `DETALLE COMPRAS DE ${nomMes} (facturas de proveedores)`, `
      <div class="row g-3"><div class="col-lg-7">
      <table class="xls"><thead>
        <tr><th colspan="5" class="tit">FACTURAS DEL MES — ${C.total_mes.docs} docs · ${mm(C.total_mes.total)} (se muestran las 25 mayores)</th></tr>
        <tr><th>Proveedor</th><th>Doc</th><th>Emisión</th><th>Vencim.</th><th>Total</th></tr></thead><tbody>
        ${f10.map(d=>`<tr><td>${esc(d.razon_social||d.rut||'')}</td><td class="n">${esc(d.tipo_doc||'')}-${esc(d.num_doc||'')}</td>
          <td class="n">${d.fecha_doc?String(d.fecha_doc).slice(0,10):''}</td><td class="n">${d.fecha_vcto?String(d.fecha_vcto).slice(0,10):''}</td>
          <td class="n">${pesos(d.total)}</td></tr>`).join('')}
      </tbody></table></div>
      <div class="col-lg-5">
      <table class="xls"><thead>
        <tr><th colspan="3" class="tit">TOP PROVEEDORES ACUMULADO ${y}</th></tr>
        <tr><th>Proveedor</th><th>Docs</th><th>Total</th></tr></thead><tbody>
        ${C.proveedores_anio.map(p=>`<tr><td>${esc(p.razon_social||p.rut||'')}</td><td class="n">${p.docs}</td><td class="n">${pesos(p.total)}</td></tr>`).join('')}
      </tbody></table>
      <div class="small text-muted mt-1">Fuente: export AVSOFT "Documentos de Compras (1 Línea)" — re-importable desde el botón de la barra.</div>
      </div></div>`, 'COMPRAS', 'Compras del mes');
  }
  document.getElementById('out').innerHTML = `
    <div class="portada">
      <div style="font-size:.85rem;letter-spacing:.25em;opacity:.75">INFORME DE FINANZAS AL DIRECTORIO</div>
      <h1>AutoFácil Chile</h1>
      <div class="sub">${MESES[m][0].toUpperCase()+MESES[m].slice(1)} ${y} · generado desde los libros el ${new Date().toLocaleDateString('es-CL')}${D.tipo_cambio?` · TC cierre $${D.tipo_cambio.valor.toLocaleString('es-CL')}`:''}</div>
      <div class="kpi-row">
        <div class="kpi"><div class="v">${mm(totAct)}</div><div class="l">Activo</div></div>
        <div class="kpi"><div class="v">${mm(totPas)}</div><div class="l">Pasivo</div></div>
        <div class="kpi"><div class="v ${varCls(resMes)}" style="color:#fff">${mm(resMes)}</div><div class="l">Resultado del mes</div></div>
        <div class="kpi"><div class="v" style="color:#fff">${mm(resAcum)}</div><div class="l">Resultado acumulado</div></div>
      </div>
    </div>
    ${lamBal}${lamCxC}${lamCxP}${lamCompras}${lamEERRMes}${lamEERRAcum}${lamCaja}
    <div class="lamina"><div class="lam-head"><span>CIERRE</span><span class="kicker">AUTOFÁCIL</span></div>
      <div class="lam-body" style="text-align:center;padding:70px 20px"><h3 class="fw-bold" style="color:var(--navy)">¿Preguntas?</h3>
      <div class="text-muted small">Detalle disponible en Contabilidad → Libros, Estados Financieros e Informe de Cierre Mensual</div></div></div>`;
}

/* ── Configurar rubros (mapeo cuenta→rubro de los cuadros) ── */
async function configRubros(){
  const r = await fetch('/api/contabilidad/directorio/rubros',{headers:H}); const j = await r.json();
  if (!j.success) return alert(j.error);
  const rows = j.data;
  const fila = x => `
    <tr data-id="${x.id}" class="${x.activo?'':'text-muted'}">
      <td><input class="form-control form-control-sm r-et" value="${esc(x.etiqueta)}" ${x.clase==='MARGEN'?'':''}></td>
      <td>${x.cuadro==='BALANCE'?`<input class="form-control form-control-sm r-gr" value="${esc(x.grupo||'')}">`:(x.tipo||'<span class="text-muted">margen</span>')}</td>
      <td>${x.clase==='MARGEN'?'<span class="text-muted small">calculado</span>':`<input class="form-control form-control-sm r-pf" value="${esc(x.prefijos||'')}" placeholder="prefijos, coma">`}</td>
      <td style="width:70px"><input class="form-control form-control-sm r-or" type="number" value="${x.orden}"></td>
      <td class="text-nowrap">
        <button class="btn btn-sm btn-link p-0 me-1" title="Guardar" onclick="guardarRubro(${x.id},this)"><i class="bi bi-check-lg"></i></button>
        <button class="btn btn-sm btn-link p-0 me-1" title="${x.activo?'Desactivar':'Activar'}" onclick="toggleRubro(${x.id},${x.activo?0:1})"><i class="bi bi-power"></i></button>
        ${x.clase==='RUBRO'?`<button class="btn btn-sm btn-link text-danger p-0" title="Eliminar" onclick="eliminarRubro(${x.id})"><i class="bi bi-trash"></i></button>`:''}
      </td>
    </tr>`;
  const seccion = (cuadro, titulo) => `
    <h6 class="fw-bold mt-3">${titulo}</h6>
    <table class="table table-sm" style="font-size:.8rem"><thead><tr><th>Etiqueta</th><th>${cuadro==='BALANCE'?'Grupo':'Tipo'}</th><th>Prefijos de cuenta</th><th>Orden</th><th></th></tr></thead>
    <tbody>${rows.filter(x=>x.cuadro===cuadro).map(fila).join('')}</tbody></table>
    <button class="btn btn-sm btn-outline-primary" onclick="nuevoRubro('${cuadro}')"><i class="bi bi-plus-lg me-1"></i>Agregar rubro ${cuadro==='BALANCE'?'al balance':'al P&G'}</button>`;
  document.getElementById('dlgRubros').innerHTML = `
    <div class="d-flex justify-content-between align-items-start">
      <h5 class="fw-bold">Rubros de los cuadros</h5>
      <button class="btn btn-sm btn-outline-secondary" onclick="dlgRubros.close();consultar()"><i class="bi bi-x-lg"></i> Cerrar y regenerar</button></div>
    <div class="small text-muted mb-2">Cada cuenta se asigna al PRIMER rubro (por orden) cuyo prefijo calce con su código. Lo que no calza aparece como "Otros (sin rubro)". Los márgenes azules se calculan solos (acumulado ingresos − gastos hasta esa fila).</div>
    ${seccion('BALANCE','Cuadro Balance General')}
    ${seccion('EERR','Cuadro Estado de Resultados (P&G)')}`;
  document.getElementById('dlgRubros').showModal();
}
async function guardarRubro(id, btn){
  const tr = btn.closest('tr');
  const body = { etiqueta: tr.querySelector('.r-et').value.trim(), orden: Number(tr.querySelector('.r-or').value)||0 };
  const gr = tr.querySelector('.r-gr'); if (gr) body.grupo = gr.value.trim();
  const pf = tr.querySelector('.r-pf'); if (pf) body.prefijos = pf.value.trim();
  const r = await fetch('/api/contabilidad/directorio/rubros/'+id,{method:'PUT',headers:H,body:JSON.stringify(body)});
  const j = await r.json(); if (!j.success) return alert(j.error);
  btn.innerHTML = '<i class="bi bi-check-all text-success"></i>';
}
async function toggleRubro(id, activo){
  const r = await fetch('/api/contabilidad/directorio/rubros/'+id,{method:'PUT',headers:H,body:JSON.stringify({activo:!!activo})});
  const j = await r.json(); if (!j.success) return alert(j.error); configRubros();
}
async function eliminarRubro(id){
  if (!confirm('¿Eliminar este rubro? Sus cuentas caerán a "Otros (sin rubro)".')) return;
  const r = await fetch('/api/contabilidad/directorio/rubros/'+id,{method:'DELETE',headers:H});
  const j = await r.json(); if (!j.success) return alert(j.error); configRubros();
}
async function nuevoRubro(cuadro){
  const etiqueta = prompt('Nombre del rubro:'); if (!etiqueta||!etiqueta.trim()) return;
  const body = { cuadro, etiqueta: etiqueta.trim(), orden: 99 };
  if (cuadro==='BALANCE') body.grupo = prompt('Grupo (ej. Activo Corriente, Pasivo Corriente, Patrimonio):')||'Activo Corriente';
  else body.tipo = (prompt('Tipo (INGRESO o GASTO):')||'').toUpperCase()==='INGRESO'?'INGRESO':'GASTO';
  body.prefijos = prompt('Prefijos de cuenta (separados por coma, ej. 4002,400106):')||'';
  const r = await fetch('/api/contabilidad/directorio/rubros',{method:'POST',headers:H,body:JSON.stringify(body)});
  const j = await r.json(); if (!j.success) return alert(j.error); configRubros();
}

async function guardarHechos(sec){
  const texto = document.getElementById('hx_'+sec).value.trim();
  const r = await fetch('/api/contabilidad/directorio/hechos',{method:'PUT',headers:H,body:JSON.stringify({mes:fMes.value,seccion:sec,texto})});
  const j = await r.json(); if (!j.success) return alert(j.error);
  D.hechos[sec] = { texto, actualizado_por:'tú', updated_at:new Date().toISOString() };
  alert('Hechos relevantes guardados.');
}

function datosSeccion(sec){
  const esCxC = c => /^110[3-9]/.test(c.cuenta) && !/^1101|^1102/.test(c.cuenta);
  if (sec==='BALANCE') return { balance: D.balance };
  if (sec==='CXC') return { cxc: D.balance.filter(x=>x.tipo==='ACTIVO'&&esCxC(x)) };
  if (sec==='CXP') return { cxp: D.balance.filter(x=>x.tipo==='PASIVO'&&/^21/.test(x.cuenta)) };
  if (sec==='EERR_MES') return { eerr_mes: D.eerr.map(x=>({cuenta:x.cuenta,nombre:x.nombre,tipo:x.tipo,mes_actual:x.mes_actual,mes_anio_anterior:x.mes_aa})) };
  if (sec==='EERR_ACUM') return { eerr_acum: D.eerr.map(x=>({cuenta:x.cuenta,nombre:x.nombre,tipo:x.tipo,acum_actual:x.acum_actual,acum_anio_anterior:x.acum_aa})) };
  if (sec==='COMPRAS') return C ? { total_mes: C.total_mes, mayores_facturas: C.documentos.slice(0,15).map(d=>({proveedor:d.razon_social,doc:(d.tipo_doc||'')+'-'+(d.num_doc||''),vencimiento:d.fecha_vcto,total:d.total})), top_proveedores_anio: C.proveedores_anio } : {};
  return { caja: D.caja };
}
async function hechosIA(sec){
  const btn = event.target.closest('button');
  btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Analizando…';
  try {
    const r = await fetch('/api/contabilidad/directorio/hechos-ia',{method:'POST',headers:H,body:JSON.stringify({mes:fMes.value,seccion:sec,datos:datosSeccion(sec)})});
    const j = await r.json(); if (!j.success) return alert(j.error);
    const ta = document.getElementById('hx_'+sec);
    ta.value = (ta.value.trim()?ta.value.trim()+'\n\n':'')+j.data.borrador;
    alert('Borrador IA agregado — revísalo, ajústalo y presiona Guardar.');
  } finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-stars me-1"></i>Borrador IA'; }
}
