<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créditos — AutoFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#001345; --blue:#0141A2; --sky:#009AFE; }
    body { background:#f0f4f8; font-family:'Segoe UI',system-ui,sans-serif; }

    /* ── Topnav ── */
    .topnav { background: linear-gradient(90deg, #012d70, #0255c5); color: #fff; height: 60px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .topnav-left { display: flex; align-items: center; gap: 16px; }
    .topnav-brand img { height: 34px; filter: brightness(0) invert(1); }
    .version-badge { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.75); font-size: 0.65rem; font-weight: 700; border-radius: 6px; padding: 2px 8px; letter-spacing: 0.5px; margin-left: 2px; }
    .topnav-right { display: flex; align-items: center; gap: 12px; }
    .user-chip { background: rgba(255,255,255,0.12); border-radius: 24px; padding: 5px 12px; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
    .avatar { width: 28px; height: 28px; background: #90caf9; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #0141A2; font-weight: 700; font-size: 0.75rem; }
    .perfil-badge { background: rgba(144,202,249,0.2); border: 1px solid rgba(144,202,249,0.4); color: #90caf9; border-radius: 12px; padding: 2px 10px; font-size: 0.73rem; font-weight: 600; }
    .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 5px 12px; font-size: 0.82rem; cursor: pointer; transition: background 0.2s; }
    .btn-logout:hover { background: rgba(255,255,255,0.22); }

    /* ── Layout ── */
    .page-wrap { max-width:1300px; margin:24px auto; padding:0 24px 60px; }

    /* ── Header banner ── */
    .page-banner {
      background:linear-gradient(135deg,var(--navy),var(--blue) 55%,var(--sky));
      border-radius:14px; padding:22px 30px; margin-bottom:22px;
      color:#fff; display:flex; align-items:center; gap:18px;
    }
    .page-banner i.icon { font-size:2.4rem; opacity:.75; }
    .page-banner h2 { margin:0 0 3px; font-size:1.2rem; font-weight:800; }
    .page-banner p  { margin:0; font-size:.83rem; opacity:.8; }

    /* ── Top bar ── */
    .top-bar { display:flex; align-items:stretch; gap:10px; margin-bottom:20px; }

    /* Tab cards: siempre visibles, 2 cols */
    .tab-cards { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }

    /* Card base compartida */
    .tab-card, .empresa-card {
      background:#fff; border-radius:12px; padding:16px 12px; cursor:pointer;
      border:2px solid transparent;
      transition:transform .18s, box-shadow .18s, border-color .18s;
      box-shadow:0 1px 4px rgba(0,0,0,.06);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:8px; text-align:center; width:100%;
    }
    .tab-card:hover, .empresa-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(1,65,162,.15); border-color:var(--navy); }
    .tab-card.active    { border-color:var(--navy); box-shadow:0 6px 20px rgba(1,65,162,.2); }
    .empresa-card.selected { border-color:var(--navy); box-shadow:0 6px 20px rgba(1,65,162,.2); }

    /* Tab card: ícono + título */
    .tab-card .card-icon {
      width:40px; height:40px; border-radius:10px;
      background:linear-gradient(135deg,#e8eaf6,#c5cae9);
      display:flex; align-items:center; justify-content:center;
      font-size:1.2rem; color:var(--navy); transition:background .18s, color .18s;
    }
    .tab-card:hover .card-icon,
    .tab-card.active .card-icon { background:linear-gradient(135deg,var(--navy),var(--blue)); color:#fff; }
    .tab-card h6 { font-weight:700; font-size:.82rem; margin:0; color:#111827; line-height:1.3; }

    /* Empresa cards: ocultas por defecto, se muestran como grupo */
    .empresa-cards { display:none; grid-template-columns:repeat(3,1fr); gap:10px; }
    .empresa-cards.visible { display:grid; }
    .empresa-card img { max-width:100%; max-height:38px; object-fit:contain; filter:grayscale(35%) opacity(.7); transition:filter .18s; }
    .empresa-card:hover img, .empresa-card.selected img { filter:none; }
    .empresa-check { width:16px; height:16px; border-radius:50%; border:2px solid #d1d5db; background:#fff; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .empresa-card.selected .empresa-check { background:var(--navy); border-color:var(--navy); }
    .empresa-card.selected .empresa-check::after { content:'✓'; color:#fff; font-size:.55rem; font-weight:800; }

    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* ── Cards ── */
    .form-card { background:#fff; border-radius:12px; padding:22px 24px; margin-bottom:16px; box-shadow:0 1px 5px rgba(0,0,0,.07); }
    .section-label { font-size:.75rem; font-weight:800; color:var(--blue); text-transform:uppercase; letter-spacing:.08em; margin-bottom:14px; display:flex; align-items:center; gap:7px; }
    .section-divider { border-color:#e5e7eb; margin:18px 0; }
    .form-label { font-size:.8rem; font-weight:600; color:#374151; margin-bottom:4px; }
    .form-control, .form-select { border-radius:7px; border:1.5px solid #d1d5db; font-size:.88rem; padding:7px 10px; }
    .form-control:focus, .form-select:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(1,65,162,.1); outline:none; }
    .form-control:read-only { background:#f9fafb; }

    /* ── Tabla consulta ── */
    .search-bar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
    .search-bar input { flex:1; min-width:200px; }
    .search-bar select { width:160px; }

    .cred-table { width:100%; border-collapse:collapse; font-size:.82rem; }
    .cred-table th { background:#f1f5f9; color:#374151; font-size:.73rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; padding:10px 12px; border-bottom:2px solid #e5e7eb; white-space:nowrap; }
    .cred-table td { padding:9px 12px; border-bottom:1px solid #f0f2f5; color:#374151; }
    .cred-table tr:last-child td { border-bottom:none; }
    .cred-table tr:hover td { background:#f8fafd; }
    .cred-table .num { text-align:right; font-weight:600; }
    .cred-table .mono { font-family:monospace; font-size:.8rem; }

    /* Estado badges */
    .badge-estado { display:inline-block; border-radius:20px; padding:2px 10px; font-size:.73rem; font-weight:700; white-space:nowrap; }
    .badge-VIGENTE   { background:#dcfce7; color:#166534; }
    .badge-EN-MORA   { background:#fef3c7; color:#92400e; }
    .badge-CANCELADO { background:#dbeafe; color:#1e40af; }
    .badge-PREPAGADO { background:#ede9fe; color:#5b21b6; }
    .badge-CASTIGADO { background:#fee2e2; color:#991b1b; }

    /* Número crédito */
    .num-cred { font-family:monospace; font-weight:700; color:var(--blue); font-size:.82rem; }

    /* Detalle panel */
    .detalle-panel {
      position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:2000;
      display:none; align-items:center; justify-content:center; padding:16px;
    }
    .detalle-panel.open { display:flex; }
    .detalle-box {
      background:#fff; border-radius:16px; width:100%; max-width:750px;
      max-height:92vh; display:flex; flex-direction:column;
      box-shadow:0 12px 48px rgba(0,0,0,.28); overflow:hidden;
    }
    .detalle-head {
      background:linear-gradient(135deg,var(--navy),var(--blue));
      color:#fff; padding:18px 22px; display:flex; align-items:flex-start; gap:12px; flex-shrink:0;
    }
    .detalle-head .dh-info { flex:1; }
    .detalle-head .dh-num  { font-size:.8rem; opacity:.75; margin-bottom:2px; }
    .detalle-head .dh-nombre { font-size:1.05rem; font-weight:800; }
    .detalle-head .dh-rut { font-size:.82rem; opacity:.8; }
    .detalle-close { background:none; border:none; color:rgba(255,255,255,.75); font-size:1.3rem; cursor:pointer; }
    .detalle-close:hover { color:#fff; }
    .detalle-body { padding:0; overflow-y:auto; flex:1; }
    .detalle-footer { padding:14px 22px; border-top:1px solid #f0f2f5; display:flex; gap:10px; justify-content:flex-end; background:#f9fafb; flex-shrink:0; }

    .ds { padding:16px 22px; border-bottom:1px solid #f0f2f5; }
    .ds:last-child { border-bottom:none; }
    .ds-title { font-size:.7rem; font-weight:800; color:var(--blue); text-transform:uppercase; letter-spacing:.08em; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
    .ds-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; }
    .ds-item .ds-label { font-size:.68rem; color:#9ca3af; font-weight:600; text-transform:uppercase; }
    .ds-item .ds-val   { font-size:.9rem; font-weight:700; color:#111827; margin-top:1px; }
    .ds-item .ds-val.big { font-size:1.15rem; color:var(--navy); }

    /* ── Empresa cards ── */
    .empresa-card {
      background:#fff; border-radius:14px; padding:22px 16px;
      cursor:pointer; border:2px solid #e5e7eb;
      transition:transform .18s, box-shadow .18s, border-color .18s;
      box-shadow:0 1px 4px rgba(0,0,0,.06);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:10px; min-height:110px;
    }
    .empresa-card img { max-width:100%; max-height:54px; object-fit:contain; filter:grayscale(40%) opacity(.7); transition:filter .18s; }
    .empresa-card:hover { transform:translateY(-3px); box-shadow:0 10px 28px rgba(1,65,162,.14); border-color:#93c5fd; }
    .empresa-card:hover img { filter:none; }
    .empresa-card.selected { border-color:var(--navy); box-shadow:0 8px 24px rgba(1,65,162,.18); }
    .empresa-card.selected img { filter:none; }
    .empresa-check { width:20px; height:20px; border-radius:50%; border:2px solid #d1d5db; background:#fff; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .empresa-card.selected .empresa-check { background:var(--navy); border-color:var(--navy); }
    .empresa-card.selected .empresa-check::after { content:'✓'; color:#fff; font-size:.65rem; font-weight:800; }

    /* Estado edit */
    .estado-edit { display:flex; gap:8px; align-items:center; }
    .estado-edit select { flex:1; }

    /* Botones */
    .btn-guardar { background:linear-gradient(135deg,var(--blue),var(--sky)); color:#fff; border:none; border-radius:8px; padding:10px 26px; font-weight:700; font-size:.92rem; cursor:pointer; }
    .btn-guardar:hover { opacity:.9; }
    .btn-cancelar { background:#fff; color:#6b7280; border:1.5px solid #d1d5db; border-radius:8px; padding:10px 22px; font-weight:600; font-size:.9rem; cursor:pointer; }
    .btn-cancelar:hover { background:#f9fafb; }
    .btn-buscar-rut { background:var(--blue); color:#fff; border:none; border-radius:7px; padding:7px 16px; font-size:.88rem; font-weight:700; cursor:pointer; white-space:nowrap; }
    .btn-buscar-rut:hover { background:#0255c5; }
    .btn-ver-detalle { background:none; border:1.5px solid var(--blue); border-radius:6px; color:var(--blue); font-size:.75rem; font-weight:700; padding:3px 10px; cursor:pointer; white-space:nowrap; }
    .btn-ver-detalle:hover { background:#eff6ff; }

    /* Tasación / Permiso readonly */
    .veh-readonly { background:#f0f9ff; border-color:#bfdbfe; color:#1e40af; font-weight:600; }

    /* Patente validación */
    .patente-ok  { border-color:#10b981 !important; background:#f0fdf4 !important; }
    .patente-err { border-color:#dc2626 !important; background:#fef2f2 !important; }
    .patente-hint { font-size:.68rem; margin-top:2px; min-height:14px; }
    .patente-hint.ok  { color:#059669; }
    .patente-hint.err { color:#dc2626; }

    /* Dealer autocomplete */
    .dealer-wrap { position:relative; }
    .dealer-drop {
      position:absolute; top:100%; left:0; right:0; z-index:300;
      background:#fff; border:1.5px solid #93c5fd; border-radius:0 0 8px 8px;
      box-shadow:0 6px 18px rgba(0,0,0,.12); max-height:200px; overflow-y:auto;
      display:none;
    }
    .dealer-drop.open { display:block; }
    .dealer-item { padding:7px 12px; cursor:pointer; font-size:.83rem; border-bottom:1px solid #f1f5f9; }
    .dealer-item:last-child { border-bottom:none; }
    .dealer-item:hover { background:#eff6ff; }
    .dealer-item .di-name { font-weight:700; color:#1e293b; }
    .dealer-item .di-sub  { color:#6b7280; font-size:.75rem; }

    /* Parque / Calle */
    .ubic-toggle { display:flex; gap:6px; }
    .ubic-btn { flex:1; padding:6px 0; border:1.5px solid #d1d5db; border-radius:7px; font-size:.8rem; font-weight:700; cursor:pointer; text-align:center; background:#fff; color:#6b7280; transition:all .15s; }
    .ubic-btn.active-parque { border-color:#0141A2; background:#eff6ff; color:#0141A2; }
    .ubic-btn.active-calle  { border-color:#059669; background:#f0fdf4; color:#059669; }

    /* RUT found bar */
    .rut-found { background:#f0fdf4; border:1.5px solid #6ee7b7; border-radius:8px; padding:10px 16px; font-size:.88rem; font-weight:700; color:#065f46; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
    .rut-found-nombre { display:flex; align-items:center; gap:6px; }
    .rut-found-fechas { display:flex; gap:16px; flex-wrap:wrap; align-items:center; }
    .fecha-item { display:flex; flex-direction:column; align-items:center; gap:1px; }
    .fecha-item .fi-label { color:#6b7280; font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
    .fecha-item .fi-val   { color:#047857; font-size:.75rem; font-weight:700; }
    .fecha-item .fi-val.stale { color:#dc2626 !important; font-weight:800; }

    /* Toast */
    .toast-msg { position:fixed; top:68px; right:20px; z-index:9999; border-radius:10px; padding:14px 20px; font-weight:600; font-size:.9rem; color:#fff; box-shadow:0 8px 24px rgba(0,0,0,.18); display:none; }
    .toast-ok  { background:#059669; }
    .toast-err { background:#dc2626; }

    /* Resultado vacío */
    .empty-state { text-align:center; padding:48px 20px; color:#9ca3af; }
    .empty-state i { font-size:3rem; display:block; margin-bottom:12px; opacity:.4; }

    /* Stats bar */
    .stats-bar { display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
    .stat-chip { background:#fff; border-radius:10px; padding:12px 18px; flex:1; min-width:130px; box-shadow:0 1px 4px rgba(0,0,0,.07); }
    .stat-chip .sc-label { font-size:.7rem; font-weight:700; color:#9ca3af; text-transform:uppercase; letter-spacing:.06em; }
    .stat-chip .sc-val   { font-size:1.3rem; font-weight:900; color:var(--navy); margin-top:2px; }
  </style>
</head>
<body>

<!-- ── Topnav ── -->
<nav class="topnav">
  <div class="topnav-left">
    <div class="topnav-brand">
      <a href="/"><img src="/img/logo.png" alt="AutoFácil" style="display:block"></a>
      <span class="version-badge" id="versionBadge">v1.6</span>
    </div>
  </div>
  <div class="topnav-right">
    <div class="user-chip">
      <div class="avatar" id="avatarInicial">?</div>
      <div>
        <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
        <div class="perfil-badge" id="navPerfil">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="page-wrap">

  <!-- Banner -->
  <div class="page-banner">
    <i class="bi bi-credit-card-2-front-fill icon"></i>
    <div>
      <h2>Gestión de Créditos</h2>
      <p>Consulta el estado de los créditos vigentes o ingresa un nuevo crédito al sistema.</p>
    </div>
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <!-- Tab selectors (siempre visibles) -->
    <div class="tab-cards" id="mainTabs">
      <button class="tab-card active" data-tab="consulta" onclick="cambiarTab('consulta')">
        <div class="card-icon"><i class="bi bi-search"></i></div>
        <h6>Consulta Créditos</h6>
      </button>
      <button class="tab-card" data-tab="ingreso" onclick="cambiarTab('ingreso')">
        <div class="card-icon"><i class="bi bi-plus-circle"></i></div>
        <h6>Ingreso de Créditos</h6>
      </button>
    </div>
    <!-- Empresa (solo visible en Ingreso) -->
    <div class="empresa-cards" id="empresaCards">
      <button type="button" class="empresa-card" data-empresa="AUTOFACIL" onclick="seleccionarEmpresa(this)">
        <img src="/img/logo-autofacil.png" alt="AutoFácil">
        <div class="empresa-check"></div>
      </button>
      <button type="button" class="empresa-card" data-empresa="AUTOFIN" onclick="seleccionarEmpresa(this)">
        <img src="/img/logo-autofin.png" alt="AUTOFIN">
        <div class="empresa-check"></div>
      </button>
      <button type="button" class="empresa-card" data-empresa="UNIDAD" onclick="seleccionarEmpresa(this)">
        <img src="/img/logo-unidad.png" alt="Unidad">
        <div class="empresa-check"></div>
      </button>
    </div>
    <input type="hidden" id="iEmpresa" value="">
  </div>

  <!-- ════════════════════════════════
       TAB: CONSULTA CRÉDITOS
  ════════════════════════════════ -->
  <div class="tab-panel active" id="panelConsulta">

    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-chip"><div class="sc-label">Total</div><div class="sc-val" id="statTotal">—</div></div>
      <div class="stat-chip"><div class="sc-label">Vigentes</div><div class="sc-val" id="statVigentes" style="color:#166534">—</div></div>
      <div class="stat-chip"><div class="sc-label">En Mora</div><div class="sc-val" id="statMora" style="color:#92400e">—</div></div>
      <div class="stat-chip"><div class="sc-label">Cancelados</div><div class="sc-val" id="statCancelados" style="color:#1e40af">—</div></div>
    </div>

    <!-- Búsqueda -->
    <div class="form-card">
      <div class="search-bar">
        <input type="text" id="searchQ" class="form-control" placeholder="Buscar por RUT, nombre o N° crédito…"
               onkeydown="if(event.key==='Enter') buscarCreditos()">
        <select id="searchEstado" class="form-select" onchange="buscarCreditos()">
          <option value="">Todos los estados</option>
          <option value="VIGENTE">Vigente</option>
          <option value="EN MORA">En Mora</option>
          <option value="CANCELADO">Cancelado</option>
          <option value="PREPAGADO">Prepagado</option>
          <option value="CASTIGADO">Castigado</option>
        </select>
        <button class="btn-buscar-rut" onclick="buscarCreditos()">
          <i class="bi bi-search me-1"></i>Buscar
        </button>
      </div>
      <div id="resultadosConsulta">
        <div class="empty-state">
          <i class="bi bi-credit-card"></i>
          Ingresa una búsqueda o deja en blanco y presiona Buscar para ver todos.
        </div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════
       TAB: INGRESO DE CRÉDITOS
  ════════════════════════════════ -->
  <div class="tab-panel" id="panelIngreso">

    <!-- Sección 1: Cliente -->
    <div class="form-card">
      <div class="section-label"><i class="bi bi-person-fill"></i>Cliente</div>
      <div class="row g-2">
        <div class="col-md-3">
          <label class="form-label">RUT Cliente *</label>
          <div class="d-flex gap-2">
            <input type="text" id="iRut" class="form-control" maxlength="12"
                   placeholder="12.345.678-9" oninput="onRutInputCred(this)"
                   onkeydown="if(event.key==='Enter') buscarClienteCred()">
            <button class="btn-buscar-rut" onclick="buscarClienteCred()">
              <i class="bi bi-search"></i>
            </button>
          </div>
        </div>
        <div class="col-md-5" id="campoNombreCliente">
          <label class="form-label">Nombre Cliente *</label>
          <input type="text" id="iNombreCliente" class="form-control" placeholder="Se autocompleta al buscar RUT" oninput="upperInputCred(this)">
        </div>
        <div class="col-md-4">
          <label class="form-label">Ejecutivo</label>
          <input type="text" id="iEjecutivo" class="form-control" readonly>
        </div>
      </div>
      <div id="rutClienteFoundMsg" style="display:none;margin-top:8px"></div>
    </div>

    <!-- Sección 2: Vehículo -->
    <div class="form-card">
      <div class="section-label"><i class="bi bi-car-front-fill"></i>Datos del Vehículo</div>
      <div class="row g-2">
        <!-- Fila 1: Tipo / Marca / Modelo / Año -->
        <div class="col-md-2">
          <label class="form-label">Tipo Vehículo</label>
          <select id="iTipoVehiculo" class="form-select">
            <option value="">— Seleccione —</option>
            <option>Automóvil</option><option>Camioneta</option><option>Camión</option>
            <option>Furgón</option><option>Van</option><option>Moto</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Marca</label>

        <div class="col-md-3">

        <div class="col-md-3">

        <div class="col-md-4">
          <label class="form-label">Dealer</label>
          <div class="dealer-wrap">
            <input type="text" id="iDealerBuscar" class="form-control" placeholder="Buscar dealer…"
                   oninput="dealerBuscar(this)" onblur="dealerBlur()" autocomplete="off">

          <input type="hidden" id="iTipoUbicacion">
          <input type="text" id="iNombreParque" class="form-control" placeholder="Nombre del parque"

    <!-- Sección 3: Condiciones del Crédito -->

<div class="detalle-panel" id="detallePanel" onclick="if(event.target===this)cerrarDetalle()">
  <div class="detalle-box">
    <div class="detalle-head">
      <div class="dh-info">
        <div class="dh-num"  id="dNumCred">—</div>
        <div class="dh-nombre" id="dNombre">—</div>
        <div class="dh-rut"    id="dRut">—</div>
      </div>
      <button class="detalle-close" onclick="cerrarDetalle()"><i class="bi bi-x-lg"></i></button>

        <i class="bi bi-floppy me-1"></i>Guardar cambios
      </button>

<script>
/* ─── Auth ─────────────────────────────────────────────────────────── */
function getToken() { return localStorage.getItem('token'); }
function apiHdr()   { return { 'Content-Type':'application/json', 'Authorization':'Bearer '+getToken() }; }
function logout()   { localStorage.removeItem('token'); localStorage.removeItem('usuario'); location.href='/login.html'; }

(function checkAuth() {
  const t = getToken();
  if (!t) { location.href='/login.html'; return; }
  try {
    const u = JSON.parse(localStorage.getItem('usuario') || '{}');
    document.getElementById('avatarInicial').textContent = (u.nombre||'?').charAt(0).toUpperCase();
    document.getElementById('navNombre').textContent = ((u.nombre||'') + ' ' + (u.apellido||'')).trim();
    document.getElementById('navPerfil').textContent = u.perfil || u.nombre_perfil || '—';
    const p = JSON.parse(atob(t.split('.')[1]));
    if (p.exp * 1000 < Date.now()) logout();
    // Prellenar ejecutivo
    document.getElementById('iEjecutivo').value = (u.nombre||'') + ' ' + (u.apellido||'');
  } catch(e) { logout(); }
})();

/* ─── Utils ─────────────────────────────────────────────────────────── */
function upperInputCred(el) { const s=el.selectionStart, e=el.selectionEnd; el.value=el.value.toUpperCase(); el.setSelectionRange(s,e); }
function fmtPeso(v) { return v!=null && v!=='' && v!==0 ? '$'+Number(v).toLocaleString('es-CL') : '—'; }

/* ─── Validador de Patente (LLLLNN) ─────────────────────────────────── */
const PATENTE_RE = /^[A-Z]{4}[0-9]{2}$/;
function patenteInput(el) {
  el.value = el.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
  const hint = document.getElementById('patenteHint');
  el.classList.remove('patente-ok','patente-err');
  if (el.value.length === 0) { hint.textContent = ''; hint.className = 'patente-hint'; return; }
  if (PATENTE_RE.test(el.value)) {
    el.classList.add('patente-ok');
    hint.textContent = '✓ Formato válido';
    hint.className = 'patente-hint ok';
  } else {
    el.classList.add('patente-err');
    const letras = el.value.replace(/[^A-Z]/g,'').length;
    const nums   = el.value.replace(/[^0-9]/g,'').length;
    hint.textContent = letras < 4 ? `Faltan ${4-letras} letra(s)` : nums < 2 ? `Faltan ${2-nums} número(s)` : 'Formato: ABCD12';
    hint.className = 'patente-hint err';
  }
}
function patenteBlur(el) { patenteInput(el); }

/* ─── Dealer autocomplete ─────────────────────────────────────────────── */
let _dealerTimer = null;
function dealerBuscar(el) {
  clearTimeout(_dealerTimer);
  document.getElementById('iDealer').value   = '';
  document.getElementById('iDealerId').value = '';
  const q = el.value.trim();
  if (q.length < 2) { document.getElementById('iDealerDrop').classList.remove('open'); return; }
  _dealerTimer = setTimeout(async () => {
    const r = await fetch('/api/dealers?q=' + encodeURIComponent(q) + '&limit=20', { headers: apiHdr() });
    const j = await r.json();
    const drop = document.getElementById('iDealerDrop');
    if (!j.success || !j.data.rows.length) {
      drop.innerHTML = '<div class="dealer-item"><span class="di-sub">Sin resultados</span></div>';
    } else {
      drop.innerHTML = j.data.rows.map(d => {
        const parque = d.ccs_parque ? `<span class="di-sub">Parque ${d.ccs_parque}</span>` : `<span class="di-sub">Calle</span>`;
        return `<div class="dealer-item" onmousedown="dealerSeleccionar(${d.id_dealer},'${(d.nombre_indexa||d.nombre_razon||'').replace(/'/g,"\\'")}','${(d.ccs_parque||'').replace(/'/g,"\\'")}')">
          <div class="di-name">${d.nombre_indexa || d.nombre_razon}</div>${parque}
        </div>`;
      }).join('');
    }
    drop.classList.add('open');
  }, 280);
}
function dealerSeleccionar(id, nombre, parque) {
  document.getElementById('iDealerBuscar').value = nombre;
  document.getElementById('iDealer').value       = nombre;
  document.getElementById('iDealerId').value     = id;
  document.getElementById('iDealerDrop').classList.remove('open');
  // Auto-completar ubicación desde ccs_parque del dealer
  if (parque && parque.toUpperCase() !== 'PARTICULAR') {
    setUbicacion('PARQUE');
    document.getElementById('iNombreParque').value = parque;
  } else {
    setUbicacion('CALLE');
  }
}
function dealerBlur() {
  setTimeout(() => document.getElementById('iDealerDrop').classList.remove('open'), 200);
  // Si hay texto pero no se seleccionó de la lista, igual guardar el texto
  const buscar = document.getElementById('iDealerBuscar').value.trim();
  if (buscar && !document.getElementById('iDealer').value) {
    document.getElementById('iDealer').value = buscar;
  }
}

/* ─── Ubicación Parque / Calle ───────────────────────────────────────── */
function setUbicacion(tipo) {
  document.getElementById('iTipoUbicacion').value = tipo;
  document.getElementById('btnUbicParque').className = 'ubic-btn' + (tipo==='PARQUE'?' active-parque':'');
  document.getElementById('btnUbicCalle').className  = 'ubic-btn' + (tipo==='CALLE'?' active-calle':'');
  const parqueInput = document.getElementById('iNombreParque');
  parqueInput.style.display = tipo === 'PARQUE' ? 'block' : 'none';
  if (tipo !== 'PARQUE') parqueInput.value = '';
}

/* ─── Cascada de vehículos ───────────────────────────────────────────── */
async function vehApiGet(params) {
  const qs = new URLSearchParams(params).toString();
  const r  = await fetch('/api/vehiculos/cascada?' + qs, { headers: apiHdr() });
  return r.json();
}

function fillSelect(id, opciones, placeholder, enabled) {
  const el = document.getElementById(id);
  el.innerHTML = `<option value="">— ${placeholder} —</option>` +
    opciones.map(o => `<option value="${o}">${o}</option>`).join('');
  el.disabled = !enabled;
}

async function vehCargaModelos() {
  const marca = document.getElementById('iMarca').value;
  // Resetear los selects dependientes
  fillSelect('iModelo',     [], 'Seleccione marca', false);
  fillSelect('iAnio',       [], '—',                false);
  fillSelect('iTransmision',[], 'seleccione año',   false);
  fillSelect('iCombustible',[], 'seleccione año',   false);
  document.getElementById('iTasacion').value = '';
  document.getElementById('iPermiso').value  = '';
  if (!marca) return;
  const j = await vehApiGet({ marca });
  if (j.success) fillSelect('iModelo', j.data.modelos, 'Seleccione modelo', true);
}

async function vehCargaAnios() {
  const marca  = document.getElementById('iMarca').value;
  const modelo = document.getElementById('iModelo').value;
  fillSelect('iAnio',       [], '—',              false);
  fillSelect('iTransmision',[], 'seleccione año', false);
  fillSelect('iCombustible',[], 'seleccione año', false);
  document.getElementById('iTasacion').value = '';
  document.getElementById('iPermiso').value  = '';
  if (!marca || !modelo) return;
  const j = await vehApiGet({ marca, modelo });
  if (j.success) fillSelect('iAnio', j.data.anios, 'Seleccione año', true);
}

async function vehCargaDetalle() {
  const marca  = document.getElementById('iMarca').value;
  const modelo = document.getElementById('iModelo').value;
  const anio   = document.getElementById('iAnio').value;
  fillSelect('iTransmision',[], 'seleccione año', false);
  fillSelect('iCombustible',[], 'seleccione año', false);
  document.getElementById('iTasacion').value = '';
  document.getElementById('iPermiso').value  = '';
  if (!marca || !modelo || !anio) return;
  const j = await vehApiGet({ marca, modelo, anio });
  if (j.success && j.data) {
    const d = j.data;
    fillSelect('iTransmision', d.transmisiones, 'Seleccione', !!d.transmisiones.length);
    fillSelect('iCombustible', d.combustibles,  'Seleccione', !!d.combustibles.length);
    // Si solo hay una opción, preseleccionar
    if (d.transmisiones.length === 1) document.getElementById('iTransmision').value = d.transmisiones[0];
    if (d.combustibles.length  === 1) document.getElementById('iCombustible').value  = d.combustibles[0];
    document.getElementById('iTasacion').value = d.tasacion ? fmtPeso(d.tasacion) : '';
    document.getElementById('iPermiso').value  = d.permiso  ? fmtPeso(d.permiso)  : '';
  }
}

// Carga marcas al inicio
async function vehCargaMarcas() {
  const j = await vehApiGet({});
  if (j.success) fillSelect('iMarca', j.data.marcas, 'Seleccione marca', true);
}

// Restaura los selects en cascada al cargar un crédito existente
async function vehRestaurar(marca, modelo, anio, transmision, combustible) {
  if (!marca) return;
  const jM = await vehApiGet({});
  if (jM.success) {
    fillSelect('iMarca', jM.data.marcas, 'Seleccione marca', true);
    document.getElementById('iMarca').value = marca;
  }
  if (!modelo) return;
  const jMod = await vehApiGet({ marca });
  if (jMod.success) {
    fillSelect('iModelo', jMod.data.modelos, 'Seleccione modelo', true);
    document.getElementById('iModelo').value = modelo;
  }
  if (!anio) return;
  const jA = await vehApiGet({ marca, modelo });
  if (jA.success) {
    fillSelect('iAnio', jA.data.anios, 'Seleccione año', true);
    document.getElementById('iAnio').value = anio;
  }
  const jD = await vehApiGet({ marca, modelo, anio });
  if (jD.success && jD.data) {
    const d = jD.data;
    fillSelect('iTransmision', d.transmisiones, 'Seleccione', !!d.transmisiones.length);
    fillSelect('iCombustible', d.combustibles,  'Seleccione', !!d.combustibles.length);
    if (transmision) document.getElementById('iTransmision').value = transmision;
    if (combustible) document.getElementById('iCombustible').value = combustible;
    document.getElementById('iTasacion').value = d.tasacion ? fmtPeso(d.tasacion) : '';
    document.getElementById('iPermiso').value  = d.permiso  ? fmtPeso(d.permiso)  : '';
  }
}
function showToast(msg, ok) {
  const el = document.getElementById(ok ? 'toastOk' : 'toastErr');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display='none', 3500);
}

/* ─── Tabs ─────────────────────────────────────────────────────────── */
function cambiarTab(tab) {
  document.querySelectorAll('#mainTabs .tab-card').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`#mainTabs .tab-card[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('panel' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  // Mostrar/ocultar empresa cards según tab
  document.getElementById('empresaCards').classList.toggle('visible', tab === 'ingreso');
}

/* ─── Empresa selector ──────────────────────────────────────────────── */
function seleccionarEmpresa(el) {
  document.querySelectorAll('.empresa-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('iEmpresa').value = el.dataset.empresa;
}

/* ─── RUT formatter ─────────────────────────────────────────────────── */
function formatRUT(raw) {
  let c = raw.replace(/[^0-9kK]/g,'').toUpperCase();
  if (c.length < 2) return c;
  const dv=c.slice(-1), body=c.slice(0,-1);
  let fmt='';
  for (let i=body.length; i>0; i-=3) fmt=body.slice(Math.max(0,i-3),i)+(fmt?'.'+fmt:'');
  return fmt+'-'+dv;
}
function onRutInputCred(el) {
  const c=el.value.replace(/[^0-9kK]/g,'');
  if (c.length>=2) el.value=formatRUT(el.value);
}

/* ═══════════════════════════════════════════════════════════════════
   CONSULTA CRÉDITOS
═══════════════════════════════════════════════════════════════════ */
let _todosCreditos = [];

async function buscarCreditos() {
  const q      = document.getElementById('searchQ').value.trim();
  const estado = document.getElementById('searchEstado').value;
  const res    = document.getElementById('resultadosConsulta');
  res.innerHTML = '<div class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Buscando…</div>';
  try {
    let url = '/api/creditos?';
    if (q)      url += 'q=' + encodeURIComponent(q) + '&';
    if (estado) url += 'estado=' + encodeURIComponent(estado);
    const r = await fetch(url, { headers: apiHdr() });
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    _todosCreditos = j.data || [];
    renderConsulta(_todosCreditos);
    actualizarStats(_todosCreditos);
  } catch(e) {
    res.innerHTML = `<div class="empty-state" style="color:#ef4444"><i class="bi bi-exclamation-triangle"></i>${e.message}</div>`;
  }
}

function actualizarStats(list) {
  document.getElementById('statTotal').textContent     = list.length;
  document.getElementById('statVigentes').textContent  = list.filter(c=>c.estado==='VIGENTE').length;
  document.getElementById('statMora').textContent      = list.filter(c=>c.estado==='EN MORA').length;
  document.getElementById('statCancelados').textContent= list.filter(c=>c.estado==='CANCELADO').length;
}

function renderConsulta(list) {
  const res = document.getElementById('resultadosConsulta');
  if (!list.length) {
    res.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i>Sin resultados para esta búsqueda.</div>';
    return;
  }
  const fmtF = s => s ? new Date(s).toLocaleDateString('es-CL') : '—';
  res.innerHTML = `<div class="table-responsive">
    <table class="cred-table">
      <thead>
        <tr>
          <th>N° Crédito</th>
          <th>RUT</th>
          <th>Cliente</th>
          <th>Fecha</th>
          <th>Vehículo</th>
          <th class="num">Cuota</th>
          <th>Plazo</th>
          <th style="text-align:center">Estado</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${list.map(c => `
        <tr>
          <td class="num-cred">${c.numero_credito||'—'}</td>
          <td class="mono">${c.rut_cliente||'—'}</td>
          <td>${c.nombre_cliente||'—'}</td>
          <td style="white-space:nowrap;font-size:.78rem;color:#6b7280">${fmtF(c.fecha_otorgamiento||c.created_at)}</td>
          <td style="font-size:.8rem">${[c.marca,c.modelo,c.anio].filter(Boolean).join(' ')||'—'}</td>
          <td class="num" style="color:var(--navy);font-weight:800">${fmtPeso(c.cuota)}</td>
          <td style="text-align:center">${c.plazo?c.plazo+' m':'—'}</td>
          <td style="text-align:center"><span class="badge-estado badge-${(c.estado||'').replace(' ','-')}">${c.estado||'—'}</span></td>
          <td style="text-align:center">
            <button class="btn-ver-detalle" onclick="abrirDetalle(${c.id_credito})">
              <i class="bi bi-eye me-1"></i>Ver
            </button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

/* ─── Detalle crédito ────────────────────────────────────────────────── */

          ${item('Fecha Otorgamiento', fmtD(c.fecha_otorgamiento))}

          <div>
            <div style="font-size:.7rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.06em">Cuota Mensual</div>
            <div style="font-size:1.5rem;font-weight:900;color:var(--navy)">${fmtPeso(c.cuota)}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:.7rem;font-weight:700;color:#9ca3af;text-transform:uppercase">Ejecutivo</div>

              <option value="EN MORA"   ${c.estado==='EN MORA'   ?'selected':''}>En Mora</option>
              <option value="CANCELADO" ${c.estado==='CANCELADO' ?'selected':''}>Cancelado</option>
              <option value="PREPAGADO" ${c.estado==='PREPAGADO' ?'selected':''}>Prepagado</option>

function item(label, val) {
  return `<div class="ds-item"><div class="ds-label">${label}</div><div class="ds-val">${val||'—'}</div></div>`;
}

function cerrarDetalle() {
  document.getElementById('detallePanel').classList.remove('open');
  _creditoEditId = null;
}

async function guardarEstadoDetalle() {
  if (!_creditoEditId) return;
  const body = {
    estado:        document.getElementById('dEstado').value,
    observaciones: document.getElementById('dObservaciones').value.trim(),
  };
  try {
    const r = await fetch('/api/creditos/'+_creditoEditId, { method:'PUT', headers:apiHdr(), body:JSON.stringify(body) });
    const j = await r.json();
    if (j.success) {
      showToast('Cambios guardados', true);
      cerrarDetalle();
      buscarCreditos();
    } else showToast(j.error||'Error', false);
  } catch(e) { showToast('Error de conexión', false); }
}

/* ═══════════════════════════════════════════════════════════════════
   INGRESO DE CRÉDITOS
═══════════════════════════════════════════════════════════════════ */
async function buscarClienteCred() {
  const rut = document.getElementById('iRut').value.trim().toUpperCase();
  if (!rut) return;
  const msg = document.getElementById('rutClienteFoundMsg');
  try {
    // Traer datos del cliente y los tres timestamps en paralelo
    const [rCliente, rAntLab, rInfoCom] = await Promise.all([
      fetch('/api/clientes/rut/'           + encodeURIComponent(rut), { headers:apiHdr() }),
      fetch('/api/antecedentes-laborales/' + encodeURIComponent(rut), { headers:apiHdr() }),
      fetch('/api/informacion-comercial/'  + encodeURIComponent(rut), { headers:apiHdr() }),
    ]);
    const [jCliente, jAntLab, jInfoCom] = await Promise.all([
      rCliente.json(), rAntLab.json(), rInfoCom.json(),
    ]);

    if (jCliente.success && jCliente.data) {
      const c      = jCliente.data;
      const nombre = [c.nombres, c.apellido_paterno, c.apellido_materno].filter(Boolean).join(' ')
                   || c.razon_social || rut;
      document.getElementById('iNombreCliente').value = nombre;

      // Fechas de actualización
      const hoy   = new Date();
      const tresM = 90 * 24 * 60 * 60 * 1000; // 90 días
      const itemFecha = (label, val) => {
        if (!val) return `<div class="fecha-item"><span class="fi-label">${label}</span><span class="fi-val stale">Sin datos</span></div>`;
        const d     = new Date(val);
        const stale = (hoy - d) > tresM;
        const txt   = d.toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'2-digit' });
        return `<div class="fecha-item"><span class="fi-label">${label}</span><span class="fi-val${stale?' stale':''}">${txt}</span></div>`;
      };
      const fechasHtml = [
        itemFecha('Datos Personales', c.fecha_actualizacion),
        itemFecha('Ant. Laborales',   jAntLab.success  && jAntLab.data  ? jAntLab.data.updated_at  : null),
        itemFecha('Inf. Comercial',   jInfoCom.success && jInfoCom.data ? jInfoCom.data.updated_at : null),
      ].join('');

      msg.innerHTML = `<div class="rut-found">
        <div class="rut-found-nombre"><i class="bi bi-person-check"></i>${nombre} — ${rut}</div>
        <div class="rut-found-fechas">${fechasHtml}</div>
      </div>`;
      msg.style.display = 'block';
    } else {
      msg.innerHTML = `<div style="color:#ef4444;font-size:.82rem"><i class="bi bi-exclamation-circle me-1"></i>Cliente no encontrado. Ingresa el nombre manualmente.</div>`;
      msg.style.display = 'block';
    }
  } catch(e) { showToast('Error al buscar cliente', false); }
}

function calcSaldo() {
  const val = parseFloat(document.getElementById('iValorVehiculo').value)||0;
  const pie = parseFloat(document.getElementById('iPie').value)||0;
  document.getElementById('iSaldoPrecio').value = val-pie > 0 ? Math.round(val-pie) : 0;
  calcMontoFin();
}

function calcMontoFin() {
  const saldo   = parseFloat(document.getElementById('iSaldoPrecio').value)||0;
  const gastos  = parseFloat(document.getElementById('iGastosOp').value)||0;
  const seguros = parseFloat(document.getElementById('iSeguros').value)||0;
  document.getElementById('iMontoFin').value = Math.round(saldo+gastos+seguros);
}

async function guardarCredito() {
  const rut    = document.getElementById('iRut').value.trim().toUpperCase();
  const nombre = document.getElementById('iNombreCliente').value.trim();
  if (!rut || !nombre) { showToast('RUT y nombre del cliente son obligatorios', false); return; }

  const body = {
    rut_cliente:         rut,
    nombre_cliente:      nombre,
    empresa:             document.getElementById('iEmpresa').value || null,
    estado:              document.getElementById('iEstado').value,
    fecha_otorgamiento:  document.getElementById('iFechaOtorg').value || null,
    fecha_primera_cuota: document.getElementById('iFechaPrimeraCuota').value || null,
    valor_vehiculo:      document.getElementById('iValorVehiculo').value || null,
    pie:                 document.getElementById('iPie').value || null,
    saldo_precio:        document.getElementById('iSaldoPrecio').value || null,
    gastos_operativos:   document.getElementById('iGastosOp').value || null,
    seguros:             document.getElementById('iSeguros').value || null,
    monto_financiado:    document.getElementById('iMontoFin').value || null,
    plazo:               document.getElementById('iPlazo').value || null,
    tasa_mensual:        document.getElementById('iTasa').value || null,
    cuota:               document.getElementById('iCuota').value || null,
    tipo_vehiculo:       document.getElementById('iTipoVehiculo').value || null,
    marca:               document.getElementById('iMarca').value || null,
    modelo:              document.getElementById('iModelo').value || null,
    anio:                document.getElementById('iAnio').value || null,
    patente:             document.getElementById('iPatente').value || null,
    color:               document.getElementById('iColor').value || null,
    motor:               document.getElementById('iMotor').value || null,
    chasis:              document.getElementById('iChasis').value || null,
    transmision:         document.getElementById('iTransmision').value || null,
    combustible:         document.getElementById('iCombustible').value || null,
    tasacion:            parseInt((document.getElementById('iTasacion').value||'').replace(/[^0-9]/g,'')) || null,
    permiso_circulacion: parseInt((document.getElementById('iPermiso').value||'').replace(/[^0-9]/g,''))  || null,
    dealer:              document.getElementById('iDealer').value || null,
    id_dealer:           parseInt(document.getElementById('iDealerId').value) || null,
    tipo_ubicacion:      document.getElementById('iTipoUbicacion').value || null,
    nombre_parque:       document.getElementById('iNombreParque').value.trim() || null,
    ejecutivo:           document.getElementById('iEjecutivo').value || null,
    observaciones:       document.getElementById('iObservaciones').value || null,
  };

  try {
    const r = await fetch('/api/creditos', { method:'POST', headers:apiHdr(), body:JSON.stringify(body) });
    const j = await r.json();
    if (j.success) {
      showToast(`Crédito ${j.data.numero_credito} ingresado correctamente`, true);
      limpiarIngreso();
      cambiarTab('consulta');
      setTimeout(buscarCreditos, 300);
    } else showToast(j.error||'Error al guardar', false);
  } catch(e) { showToast('Error de conexión', false); }
}

function limpiarIngreso() {
  ['iRut','iNombreCliente','iTipoVehiculo','iPatente','iColor',
   'iMotor','iChasis','iDealer','iDealerBuscar','iDealerId',
   'iFechaOtorg','iFechaPrimeraCuota','iValorVehiculo','iPie',
   'iSaldoPrecio','iGastosOp','iSeguros','iMontoFin','iPlazo','iTasa','iCuota','iObservaciones',
   'iTasacion','iPermiso','iTipoUbicacion','iNombreParque'
  ].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  fillSelect('iMarca',     [], 'Seleccione marca',  true);
  fillSelect('iModelo',    [], 'Seleccione marca',  false);
  fillSelect('iAnio',      [], '—',                 false);
  fillSelect('iTransmision',[],'seleccione año',    false);
  fillSelect('iCombustible',[],'seleccione año',    false);
  document.getElementById('iEstado').value = 'VIGENTE';
  document.getElementById('iEmpresa').value = '';
  document.querySelectorAll('.empresa-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('rutClienteFoundMsg').style.display = 'none';
  // Reset dealer dropdown
  document.getElementById('iDealerDrop').classList.remove('open');
  // Reset ubicación
  document.getElementById('btnUbicParque').classList.remove('active-parque');
  document.getElementById('btnUbicCalle').classList.remove('active-calle');
  document.getElementById('iNombreParque').style.display = 'none';
  // Reset patente hint
  const ph = document.getElementById('patenteHint');
  if (ph) ph.textContent = '';
  const pi = document.getElementById('iPatente');
  if (pi) { pi.classList.remove('patente-ok','patente-err'); }
  vehCargaMarcas(); // recargar marcas
}

/* ─── Init ─────────────────────────────────────────────────────────── */
buscarCreditos();
vehCargaMarcas();
document.addEventListener('keydown', e => { if(e.key==='Escape') cerrarDetalle(); });
</script>
