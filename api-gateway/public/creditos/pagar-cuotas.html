<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago de Cuotas — AutoFácil</title>
  <link rel="stylesheet" href="/css/bootstrap-icons.css">
  <style>
    :root { --navy:#0f2d6b; --blue:#1565c0; --bg:#f0f4f8; --card:#fff; --border:#e2e8f0; --text:#1e293b; --muted:#64748b; --green:#16a34a; --red:#dc2626; --amber:#d97706; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); }

    /* Barra superior: componente único /js/topnav.js */

    /* Page */
    .page-wrap { max-width:1100px; margin:0 auto; padding:24px 16px 100px; }

    /* Credit header */
    .cred-header { background:linear-gradient(135deg,var(--navy),#1a56db); border-radius:14px; padding:18px 24px; color:#fff; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
    .ch-title { font-size:1.1rem; font-weight:900; }
    .ch-sub   { font-size:.85rem; opacity:.8; margin-top:2px; }
    .estado-pill { border-radius:20px; padding:4px 14px; font-size:.78rem; font-weight:800; background:#dcfce7; color:#166534; border:1.5px solid #86efac; }
    .estado-pill.mora { background:#fef3c7; color:#92400e; border-color:#fcd34d; }

    /* Action bar */
    .action-bar { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1.5px solid var(--border); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 -4px 16px rgba(0,0,0,.07); z-index:100; }
    .btn-accion { border:none; border-radius:9px; padding:10px 22px; font-size:.9rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:7px; text-decoration:none; }
    .btn-volver { background:#f1f5f9; color:var(--text); }
    .btn-revisar { background:linear-gradient(135deg,var(--navy),var(--blue)); color:#fff; }

    .spinner-wrap { text-align:center; padding:60px; color:var(--muted); }
    .no-data { text-align:center; padding:60px; color:var(--muted); font-size:.9rem; }
    .no-data i { font-size:2.5rem; display:block; margin-bottom:10px; opacity:.4; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .breadcrumb-nav a:hover { color:#fff; }
    .breadcrumb-nav .sep { color:rgba(255,255,255,.35); }
  </style>
</head>
<body>

<div id="af-topnav"></div>
<script>
  (function () {
    var id = new URLSearchParams(location.search).get('id') || '';
    window.AF_TOPNAV = {
      breadcrumb: [
        { label:'Inicio', href:'/' },
        { label:'Tesorería', href:'/tesoreria/' },
        { label:'Caja', href:'/tesoreria/caja' },
        { label:'Pago de Cuotas', icon:'bi-cash-coin', current:true }
      ],
      actions: id ? [{ label:'Ver Crédito', icon:'bi-eye', href:'/creditos/revisar?id=' + id }] : []
    };
  })();
</script>

<div class="page-wrap">
  <div id="credHeader"></div>
  <div id="payHost">
    <div class="spinner-wrap"><i class="bi bi-hourglass-split" style="font-size:2rem;display:block;margin-bottom:12px"></i>Cargando…</div>
  </div>
</div>

<!-- Action bar -->
<div class="action-bar">
  <a href="/creditos" class="btn-accion btn-volver"><i class="bi bi-arrow-left"></i>Volver</a>
  <div style="display:flex;gap:10px;align-items:center">
    <button id="btnODP" onclick="emitirODPficha()" class="btn-accion" style="display:none;background:linear-gradient(135deg,#0141A2,#0255c5);color:#fff"><i class="bi bi-send"></i>Emitir ODP</button>
    <a id="btnRevisarBot" href="#" class="btn-accion btn-revisar"><i class="bi bi-eye"></i>Ver Revisión</a>
  </div>
</div>

<script src="/js/auth-guard.js"></script>
<script>
/* ── Auth ── */
const token = sessionStorage.getItem('token');
const yo    = JSON.parse(sessionStorage.getItem('usuario') || 'null');
if (!token || !yo) location.href = '/login.html';
const creditId = new URLSearchParams(location.search).get('id');
if (creditId) {
  document.getElementById('btnRevisarBot').href = '/creditos/revisar?id='+creditId;
}

const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const clp = v => '$' + Math.round(Number(v)||0).toLocaleString('es-CL');
const fmtRut = v => { v=String(v||'').replace(/[^0-9kK]/g,'').toUpperCase(); if(v.length<2) return String(v||''); const dv=v.slice(-1); return v.slice(0,-1).replace(/\B(?=(\d{3})+(?!\d))/g,'.')+'-'+dv; };

/* ── Cabecera del crédito + visibilidad ODP (solo AutoFácil) ── */
function pintarHeader(c) {
  const ec = String(c.estado_cartera_disp || c.estado_cartera || '').toUpperCase();
  const esMora = ['MORA','EN MORA','VENCIDO','CASTIGADO'].includes(ec);
  const pill = ec === 'VENCIDO'
    ? '<span class="estado-pill" style="background:#fee2e2;color:#991b1b;border-color:#fca5a5">VENCIDO</span>'
    : esMora ? `<span class="estado-pill mora">${esc(ec)}</span>`
             : `<span class="estado-pill">${esc(ec || 'VIGENTE')}</span>`;
  document.getElementById('credHeader').innerHTML = `
    <div class="cred-header">
      <div>
        <div class="ch-title"><i class="bi bi-credit-card me-2"></i>${esc(c.nombre_cliente||'—')}</div>
        <div class="ch-sub">N° ${esc(c.numero_credito||c.id_credito)} &nbsp;·&nbsp; ${fmtRut(c.rut_cliente)} &nbsp;·&nbsp; ${c.plazo||'—'} cuotas de ${clp(c.cuota)}</div>
      </div>
      ${pill}
    </div>`;
  // ODP solo para cartera propia AutoFácil
  const btnODP = document.getElementById('btnODP');
  if (btnODP) btnODP.style.display = (String(c.financiera||'').toUpperCase()==='AUTOFACIL') ? 'flex' : 'none';
}

/* ── Emitir ODP (las cuotas se eligen en el modal compartido) ── */
function emitirODPficha() { if (creditId) ODP.abrir(creditId); }

/* ── Montar el panel de pago (multi-cuota + condonación + pago en lote) ──
   En DOMContentLoaded: para entonces ya cargó /js/pago-cuotas-panel.js (script
   síncrono del body), así que window.PagoCuotas existe. */
document.addEventListener('DOMContentLoaded', () => {
  if (!creditId) {
    document.getElementById('payHost').innerHTML = '<div class="no-data"><i class="bi bi-exclamation-triangle"></i>ID no especificado</div>';
  } else {
    PagoCuotas.montar(document.getElementById('payHost'), { creditId, onLoad: pintarHeader });
  }
});
</script>
<script src="/js/html2canvas.min.js"></script>
<script src="/js/timbre-pagado.js"></script>
<script src="/js/comprobante.js"></script>
<script src="/js/pago-cuotas-panel.js"></script>
<script src="/js/odp-emitir.js"></script>
<script src="/js/topnav.js"></script>
<script src="/js/app-version.js"></script>
</body>
</html>
