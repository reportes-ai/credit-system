<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Revisión de Crédito — AutoFácil</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
  :root {
    --navy:#0f2d6b; --blue:#1565c0; --bg:#f0f4f8;
    --card:#fff; --border:#e2e8f0; --text:#1e293b; --muted:#64748b;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); }

  /* ── Navbar ── */
  .navbar { background:linear-gradient(135deg,var(--navy),var(--blue)); padding:0 24px; height:52px; display:flex; align-items:center; justify-content:space-between; }
  .nav-brand { display:flex; align-items:center; gap:10px; color:#fff; font-weight:800; font-size:1rem; text-decoration:none; }
  .nav-brand img { height:28px; }
  .nav-actions { display:flex; align-items:center; gap:10px; }
  .btn-back { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); color:#fff; border-radius:8px; padding:6px 14px; font-size:.82rem; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; text-decoration:none; transition:background .15s; }
  .btn-back:hover { background:rgba(255,255,255,.25); }
  .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; letter-spacing:.5px; margin-left:4px; }

  /* ── Page layout ── */
  .page-wrap { max-width:1100px; margin:0 auto; padding:24px 16px 48px; }

  /* ── Credit header ── */
  .cred-header { background:linear-gradient(135deg,var(--navy),#1a56db); border-radius:14px; padding:20px 24px; color:#fff; margin-bottom:20px; display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .ch-left { display:flex; flex-direction:column; gap:4px; }
  .ch-num  { font-size:.78rem; font-weight:700; opacity:.75; letter-spacing:.08em; text-transform:uppercase; }
  .ch-name { font-size:1.4rem; font-weight:900; }
  .ch-rut  { font-size:.88rem; opacity:.8; }
  .ch-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
  .estado-badge { border-radius:20px; padding:4px 14px; font-size:.8rem; font-weight:800; text-transform:uppercase; letter-spacing:.06em; }
  .eb-REVISION  { background:#fef2f2; color:#dc2626; border:1.5px solid #fca5a5; }
  .eb-VIGENTE   { background:#f0fdf4; color:#16a34a; border:1.5px solid #86efac; }
  .eb-EN-MORA   { background:#fffbeb; color:#d97706; border:1.5px solid #fcd34d; }
  .eb-CANCELADO { background:#eff6ff; color:#2563eb; border:1.5px solid #93c5fd; }
  .eb-PREPAGADO { background:#f5f3ff; color:#7c3aed; border:1.5px solid #c4b5fd; }
  .eb-CASTIGADO { background:#fff1f2; color:#be123c; border:1.5px solid #fda4af; }
  .ch-updated { font-size:.72rem; opacity:.65; }
  .ch-financiera { background:rgba(255,255,255,.2); border-radius:6px; padding:3px 10px; font-size:.78rem; font-weight:800; letter-spacing:.05em; }

  /* ── Section cards ── */
  .section { background:var(--card); border-radius:12px; border:1px solid var(--border); margin-bottom:16px; overflow:hidden; }
  .sec-title { display:flex; align-items:center; gap:8px; padding:14px 20px; border-bottom:1px solid var(--border); font-size:.82rem; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:var(--navy); background:#f8faff; }
  .sec-body  { padding:18px 20px; }

  /* ── Field grid ── */
  .field-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px 20px; }
  .field-item { display:flex; flex-direction:column; gap:2px; }
  .fi-label { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); }
  .fi-val   { font-size:.9rem; font-weight:600; color:var(--text); }
  .fi-val.highlight { color:var(--navy); font-size:1.1rem; font-weight:900; }
  .fi-val.danger    { color:#dc2626; }
  .fi-val.success   { color:#16a34a; }
  .fi-val.empty     { color:#cbd5e1; font-style:italic; font-weight:400; }

  /* ── Cuota box ── */
  .cuota-box { background:linear-gradient(135deg,var(--navy),var(--blue)); border-radius:10px; padding:14px 20px; color:#fff; display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
  .cb-label { font-size:.7rem; font-weight:700; opacity:.75; text-transform:uppercase; letter-spacing:.07em; }
  .cb-val   { font-size:1.6rem; font-weight:900; }
  .cb-right { text-align:right; font-size:.82rem; opacity:.85; }

  /* ── Renta summary ── */
  .renta-box { background:#f0fdf4; border:1.5px solid #86efac; border-radius:10px; padding:12px 18px; display:flex; gap:0; flex-wrap:wrap; margin-top:14px; overflow:hidden; }
  .rb-item { display:flex; flex-direction:column; gap:2px; padding:6px 18px 6px 0; }
  .rb-item:not(:last-child) { border-right:1px dashed #86efac; margin-right:18px; }
  .rb-label { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#15803d; }
  .rb-val   { font-size:1rem; font-weight:800; color:#166534; }
  /* Carga items */
  .rb-item.carga { background:none; }
  .rb-item.carga .rb-label  { color:#b45309; }
  .rb-item.carga .rb-val    { color:#92400e; }
  .rb-item.carga-new .rb-label { color:#1d4ed8; }
  .rb-item.carga-new .rb-val   { color:#1e3a8a; }
  .rb-pct { font-size:.75rem; font-weight:700; opacity:.75; margin-top:1px; }
  .rb-divider { width:1px; background:#86efac; margin:4px 0; align-self:stretch; }

  /* ── Info comercial table ── */
  .ic-table { width:100%; border-collapse:collapse; font-size:.83rem; }
  .ic-table th { background:#f8fafc; color:var(--muted); font-weight:700; font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; padding:7px 12px; border-bottom:2px solid var(--border); text-align:left; }
  .ic-table td { padding:8px 12px; border-bottom:1px solid #f1f5f9; }
  .ic-table tr:last-child td { border-bottom:none; }
  .ic-table td.td-num { text-align:right; font-weight:700; }
  .ic-table td.td-red { color:#dc2626; font-weight:700; }
  .ic-table td.td-ok  { color:#16a34a; font-weight:700; }
  .no-data { text-align:center; padding:28px; color:#94a3b8; font-size:.88rem; }
  .no-data i { font-size:1.8rem; display:block; margin-bottom:8px; opacity:.5; }

  /* ── Amortización btn ── */
  .amort-btn { display:inline-flex; align-items:center; gap:8px; background:#ede9fe; border:1.5px solid #c4b5fd; color:#5b21b6; border-radius:9px; padding:9px 16px; font-size:.84rem; font-weight:700; cursor:pointer; transition:background .15s; margin-top:12px; }
  .amort-btn:hover { background:#ddd6fe; }

  /* ── Detalle btn (gastos/seguros) ── */
  .det-btn { display:inline-flex; align-items:center; gap:5px; background:none; border:1px solid #cbd5e1; color:var(--muted); border-radius:6px; padding:2px 9px; font-size:.72rem; font-weight:700; cursor:pointer; transition:all .15s; margin-top:4px; }
  .det-btn:hover { background:#f1f5f9; border-color:#94a3b8; color:var(--text); }
  .det-btn.active { background:#eff6ff; border-color:#93c5fd; color:#1d4ed8; }

  /* ── Detalle panel inline ── */
  .det-panel { display:none; background:#f8faff; border:1.5px solid #bfdbfe; border-radius:10px; padding:12px 16px; margin-top:8px; }
  .det-panel.open { display:block; }
  .det-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; font-size:.83rem; border-bottom:1px dashed #e2e8f0; }
  .det-row:last-child { border-bottom:none; }
  .det-row-label { color:var(--muted); }
  .det-row-val   { font-weight:700; color:var(--text); }
  .det-row-val.highlight { color:var(--navy); font-size:.9rem; }
  .det-row-val.zero { color:#cbd5e1; font-style:italic; font-weight:400; }
  .det-total { display:flex; justify-content:space-between; align-items:center; padding:6px 0 0; margin-top:4px; border-top:2px solid #bfdbfe; font-size:.88rem; font-weight:800; color:var(--navy); }

  /* ── Action footer ── */
  .action-bar { position:sticky; bottom:0; background:#fff; border-top:1.5px solid var(--border); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; box-shadow:0 -4px 16px rgba(0,0,0,.07); }
  .action-bar-left  { display:flex; gap:10px; align-items:center; }
  .action-bar-right { display:flex; gap:10px; align-items:center; }
  .btn-accion { border:none; border-radius:9px; padding:10px 20px; font-size:.88rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:7px; transition:opacity .15s; }
  .btn-accion:hover { opacity:.88; }
  .btn-aprobar   { background:linear-gradient(135deg,#059669,#10b981); color:#fff; }
  .btn-rechazar  { background:linear-gradient(135deg,#dc2626,#ef4444); color:#fff; }
  .btn-guardar   { background:linear-gradient(135deg,var(--navy),var(--blue)); color:#fff; }
  .btn-volver    { background:#f1f5f9; color:#475569; border:1.5px solid var(--border); }
  .btn-volver:hover { background:#e2e8f0; }

  /* ── Estado select ── */
  .estado-select { border:1.5px solid var(--border); border-radius:8px; padding:8px 12px; font-size:.88rem; font-weight:600; color:var(--text); background:#fff; cursor:pointer; }

  /* ── Amort modal ── */
  .amort-overlay { display:none; position:fixed; inset:0; background:rgba(15,23,42,.6); z-index:900; align-items:center; justify-content:center; }
  .amort-overlay.open { display:flex; }
  .amort-box { background:#fff; border-radius:14px; width:min(780px,97vw); max-height:88vh; display:flex; flex-direction:column; box-shadow:0 24px 60px rgba(0,0,0,.3); overflow:hidden; }
  .amort-head { background:linear-gradient(135deg,#7c3aed,#4f46e5); color:#fff; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .amort-head h6 { margin:0; font-size:.95rem; font-weight:800; }
  .amort-summary { display:flex; gap:12px; flex-wrap:wrap; padding:12px 18px; background:#f8fafc; border-bottom:1px solid var(--border); flex-shrink:0; }
  .amort-sum-item { flex:1; min-width:120px; text-align:center; }
  .amort-sum-lbl  { font-size:.62rem; font-weight:700; text-transform:uppercase; color:var(--muted); letter-spacing:.06em; }
  .amort-sum-val  { font-size:.96rem; font-weight:900; color:var(--navy); }
  .amort-scroll { overflow-y:auto; flex:1; }
  .amort-table { width:100%; border-collapse:collapse; font-size:.81rem; }
  .amort-table thead th { position:sticky; top:0; background:#f1f5f9; color:#475569; font-weight:800; font-size:.73rem; text-transform:uppercase; letter-spacing:.05em; padding:8px 12px; border-bottom:2px solid #cbd5e1; }
  .amort-table tbody tr:nth-child(even) { background:#f8fafc; }
  .amort-table td { padding:7px 12px; border-bottom:1px solid #f1f5f9; color:#374151; }
  .amort-table tfoot td { font-weight:800; background:#ede9fe; color:#5b21b6; padding:8px 12px; border-top:2px solid #c4b5fd; }
  .amort-foot-bar { padding:12px 18px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; background:#f9fafb; }

  /* ── Spinner ── */
  .spinner-wrap { display:flex; align-items:center; justify-content:center; padding:60px; }
  .spinner-border { width:2rem; height:2rem; border:.25em solid #cbd5e1; border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── Toast ── */
  .toast-msg { position:fixed; top:68px; right:20px; z-index:9999; border-radius:10px; padding:14px 20px; font-weight:600; font-size:.9rem; color:#fff; box-shadow:0 8px 24px rgba(0,0,0,.18); display:none; }
  .toast-ok  { background:#059669; }
  .toast-err { background:#dc2626; }

  @media(max-width:600px) {
    .ch-name { font-size:1.1rem; }
    .field-grid { grid-template-columns:1fr 1fr; }
    .action-bar { flex-direction:column; }
  }
</style>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="/creditos">
    <img src="/img/logo-autofacil.png" alt="AutoFácil" onerror="this.style.display='none'">
    <span>Revisión de Crédito</span>
    <span class="version-badge">v1.2</span>
  </a>
  <div class="nav-actions">
    <span id="navUser" style="color:rgba(255,255,255,.75);font-size:.82rem"></span>
    <a href="/creditos" class="btn-back"><i class="bi bi-arrow-left"></i>Volver</a>
  </div>
</nav>

<div class="page-wrap" id="pageWrap">
  <div class="spinner-wrap"><div class="spinner-border"></div></div>
</div>

<!-- Modal Amortización -->
<div class="amort-overlay" id="amortOverlay" onclick="if(event.target===this)cerrarAmort()">
  <div class="amort-box">
    <div class="amort-head">
      <h6><i class="bi bi-table me-2"></i>Tabla de Amortización — <span id="amortNumCred">—</span></h6>
      <button style="background:none;border:none;color:rgba(255,255,255,.8);font-size:1.2rem;cursor:pointer" onclick="cerrarAmort()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="amort-summary" id="amortSummary"></div>
    <div class="amort-scroll">
      <table class="amort-table">
        <thead><tr><th>N°</th><th>Vencimiento</th><th>Amort. Capital</th><th>Interés</th><th>Cuota</th><th>Saldo</th></tr></thead>
        <tbody id="amortBody"></tbody>
        <tfoot id="amortFoot"></tfoot>
      </table>
    </div>
    <div class="amort-foot-bar">
      <span style="font-size:.75rem;color:#9ca3af">Sistema francés · cuota fija</span>
      <button onclick="cerrarAmort()" style="background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 16px;font-weight:600;cursor:pointer;font-size:.85rem">Cerrar</button>
    </div>
  </div>
</div>

<div class="toast-msg" id="toastMsg"></div>

<script>
/* ── Auth ── */
function getToken() { return localStorage.getItem('token'); }
function apiHdr()   { return { 'Content-Type':'application/json', 'Authorization':'Bearer '+getToken() }; }

(function checkAuth() {
  if (!getToken()) { location.href='/login.html'; return; }
  try {
    const u = JSON.parse(localStorage.getItem('usuario')||'{}');
    document.getElementById('navUser').textContent = u.nombre || '';
  } catch(e){}
})();

/* ── Helpers ── */
const fmtP  = v => v != null && v !== '' ? '$'+Math.round(Number(v)).toLocaleString('es-CL') : '—';
const fmtD  = s => s ? new Date(s).toLocaleDateString('es-CL',{timeZone:'UTC',day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
const fmtDT = s => s ? new Date(s).toLocaleString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
const val   = v => (v != null && v !== '') ? v : null;
const fi    = (label,v,cls='') => `<div class="field-item"><div class="fi-label">${label}</div><div class="fi-val${cls?' '+cls:''}">${v ?? '<span class="fi-val empty">—</span>'}</div></div>`;

function showToast(msg, ok) {
  const el = document.getElementById('toastMsg');
  el.textContent = msg; el.className = 'toast-msg '+(ok?'toast-ok':'toast-err');
  el.style.display='block'; setTimeout(()=>{ el.style.display='none'; }, 3500);
}

/* ── Tasas seguros (misma tabla que ingreso) ── */
const CRED_SEG_RATES = {
  6:  { d:0.00898,  r:0.006745, c:0.036162, dr:0.015847, dc:0.045806, rc:0.043406, drc:0.053186 },
  12: { d:0.018641, r:0.011634, c:0.037883, dr:0.030715, dc:0.057977, rc:0.05042,  drc:0.071008 },
  24: { d:0.027538, r:0.012248, c:0.042101, dr:0.040474, dc:0.072041, rc:0.055409, drc:0.08613  },
  36: { d:0.035518, r:0.012761, c:0.04712,  dr:0.049208, dc:0.08613,  rc:0.061121, drc:0.1012   },
  48: { d:0.043623, r:0.029018, c:0.052853, dr:0.075269, dc:0.101322, rc:0.085069, drc:0.136622 },
  72: { d:0.054964, r:0.034875, c:0.058985, dr:0.093853, dc:0.120825, rc:0.098177, drc:0.164822 },
};
function credPlazoBracket(n) { for (const b of [6,12,24,36,48,72]) if (n<=b) return b; return 72; }
function credComboKey(d,r,c) {
  if(d&&r&&c) return 'drc'; if(d&&r) return 'dr'; if(d&&c) return 'dc';
  if(r&&c) return 'rc'; if(d) return 'd'; if(r) return 'r'; if(c) return 'c'; return null;
}

/* ── Load page ── */
const params   = new URLSearchParams(location.search);
const creditId = params.get('id');
let _credito   = null;
let _credParams = {};

async function cargarPagina() {
  if (!creditId) { document.getElementById('pageWrap').innerHTML = '<div class="no-data"><i class="bi bi-exclamation-triangle"></i>ID de crédito no especificado</div>'; return; }
  try {
    // 1. Cargar crédito + params en paralelo
    const [rc, rp] = await Promise.all([
      fetch('/api/creditos/'+creditId,     { headers: apiHdr() }),
      fetch('/api/parametros-credito',     { headers: apiHdr() }),
    ]);
    const [jc, jp] = await Promise.all([rc.json(), rp.json()]);
    if (!jc.success) throw new Error(jc.error);
    _credito  = jc.data;
    _credParams = (jp.success && jp.data?.obj) ? jp.data.obj : {};
    const rut = _credito.rut_cliente;

    // 2. Cargar antecedentes e info comercial en paralelo
    const [ra, ri] = await Promise.all([
      fetch('/api/antecedentes-laborales/'+encodeURIComponent(rut), { headers: apiHdr() }),
      fetch('/api/informacion-comercial/'+encodeURIComponent(rut),  { headers: apiHdr() }),
    ]);
    const [ja, ji] = await Promise.all([ra.json(), ri.json()]);
    const ant = ja.success ? ja.data : null;
    const com = ji.success ? ji.data : null;

    renderPagina(_credito, ant, com);
  } catch(e) {
    document.getElementById('pageWrap').innerHTML = `<div class="no-data"><i class="bi bi-exclamation-triangle"></i>${e.message}</div>`;
  }
}

function renderPagina(c, ant, com) {
  const estadoKey = (c.estado||'').replace(' ','-');
  const rentaVar  = ant ? [ant.renta_var_mes1,ant.renta_var_mes2,ant.renta_var_mes3,
                            ant.renta_var_mes4,ant.renta_var_mes5,ant.renta_var_mes6]
                            .filter(v=>v!=null&&v>0) : [];
  const rentaVarProm = rentaVar.length ? Math.round(rentaVar.reduce((a,b)=>a+b,0)/rentaVar.length) : 0;
  const rentaTotal   = (ant?.renta_fija_liquida||0) + rentaVarProm;

  // Carga mensual actual: suma de todas las cargas + arriendo
  const cargaActual = com
    ? (parseFloat(com.deuda_hipotecaria_carga)||0)
    + (parseFloat(com.deuda_comercial_carga)||0)
    + (parseFloat(com.deuda_consumo_carga)||0)
    + (parseFloat(com.arriendo)||0)
    : 0;
  const cuota       = parseFloat(c.cuota) || 0;
  const cargaNueva  = cargaActual + cuota;
  const pctActual   = rentaTotal > 0 ? (cargaActual / rentaTotal * 100) : null;
  const pctNueva    = rentaTotal > 0 ? (cargaNueva  / rentaTotal * 100) : null;
  const fmtPct      = v => v !== null ? Number(v).toFixed(1) + '%' : '';

  document.getElementById('pageWrap').innerHTML = `

    <!-- ── Header ── -->
    <div class="cred-header">
      <div class="ch-left">
        <div class="ch-num"><i class="bi bi-credit-card me-1"></i>N° Crédito</div>
        <div class="ch-name">${c.numero_credito||'—'}</div>
        <div class="ch-name" style="font-size:1.1rem;margin-top:2px">${c.nombre_cliente||'—'}</div>
        <div class="ch-rut">${c.rut_cliente||'—'}</div>
      </div>
      <div class="ch-right">
        <span class="estado-badge eb-${estadoKey}">${estadoEstado(c.estado)}</span>
        ${c.financiera ? `<span class="ch-financiera">${c.financiera}</span>` : ''}
        <div class="ch-updated"><i class="bi bi-clock me-1"></i>Actualizado: ${fmtDT(c.updated_at||c.created_at)}</div>
        <div class="ch-updated"><i class="bi bi-calendar-plus me-1"></i>Ingresado: ${fmtDT(c.created_at)}</div>
      </div>
    </div>

    <!-- ── Vehículo ── -->
    <div class="section">
      <div class="sec-title"><i class="bi bi-car-front-fill"></i>Vehículo</div>
      <div class="sec-body">
        <div class="field-grid">
          ${fi('Tipo',          val(c.tipo_vehiculo))}
          ${fi('Marca',         val(c.marca))}
          ${fi('Modelo',        val(c.modelo))}
          ${fi('Año',           val(c.anio))}
          ${fi('Transmisión',   val(c.transmision))}
          ${fi('Combustible',   val(c.combustible))}
          ${fi('Patente',       val(c.patente))}
          ${fi('Color',         val(c.color))}

      <div class="sec-title"><i class="bi bi-briefcase-fill"></i>Antecedentes Laborales

          ${fi('Empleador',           val(ant.empleador))}

      </div>

        </div>
        <table class="ic-table">
          <thead><tr><th>Tipo Deuda</th><th>Monto</th><th>Instituciones</th><th>Carga Mensual</th></tr></thead>
          <tbody>

    <!-- ── Estado y Observaciones ── -->
    <div class="section">
      <div class="sec-title"><i class="bi bi-sliders"></i>Estado y Observaciones</div>
      <div class="sec-body">
        <div class="row" style="display:grid;grid-template-columns:200px 1fr;gap:16px;align-items:start">
          <div>
            <div class="fi-label" style="margin-bottom:6px">Estado del Crédito</div>
            <select id="dEstado" class="estado-select">
              <option value="REVISION"  ${c.estado==='REVISION' ?'selected':''}>En Revisión</option>
              <option value="VIGENTE"   ${c.estado==='VIGENTE'  ?'selected':''}>Vigente</option>

function icRow(label, monto, inst, carga, esMala=false) {
  const cls = esMala && monto > 0 ? 'td-red' : '';
  return `<tr>
    <td>${label}</td>
    <td class="td-num ${cls}">${fmtP(monto)}</td>
    <td style="text-align:center;color:var(--muted)">${inst!=null?inst:'—'}</td>
    <td class="td-num">${fmtP(carga)}</td>
  </tr>`;
}

function estadoEstado(e) {
  const map = { REVISION:'En Revisión', VIGENTE:'Vigente', 'EN MORA':'En Mora',
                CANCELADO:'Cancelado', PREPAGADO:'Prepagado', CASTIGADO:'Castigado' };
  return map[e] || e || '—';
}

/* ── Detalle Gastos Operativos y Seguros ── */
function toggleDetalle(tipo) {
  const panel = document.getElementById(tipo === 'gastos' ? 'panelGastos' : 'panelSeguros');
  const btn   = document.getElementById(tipo === 'gastos' ? 'btnDetGastos' : 'btnDetSeguros');
  const isOpen = panel.classList.contains('open');
  if (isOpen) { panel.classList.remove('open'); btn.classList.remove('active'); return; }
  if (tipo === 'gastos') renderDetalleGastos(panel);
  else                   renderDetalleSeguros(panel);
  panel.classList.add('open');
  btn.classList.add('active');
}

function renderDetalleGastos(panel) {
  const p  = _credParams;
  const dj = parseDJ();
  const fp = v => v > 0 ? fmtP(v) : '<span style="color:#cbd5e1">—</span>';
  const rows = [
    { label: 'Inscripción / Prenda',   val: p.prenda              || 0 },
    { label: 'Retiro y Gestión',       val: p.retiro_gestion      || 0 },
    { label: 'Limitación de Dominio',  val: p.limitacion_dominio  || 0 },
    { label: 'Gastos Administrativos', val: p.gastos_admin        || 0 },
    { label: 'Inscripción Registro',   val: p.inscripcion         || 0 },
    { label: 'GPS 24 meses',           val: dj.gps           ? (p.gps_24meses          || 0) : 0, badge: dj.gps           ? '' : 'No incluido' },
    { label: 'Reparaciones Menores',   val: dj.reparaciones  ? (p.reparaciones_menores || 0) : 0, badge: dj.reparaciones  ? '' : 'No incluido' },
  ];
  const total = rows.reduce((s,r) => s + r.val, 0);
  panel.innerHTML = `
    <div style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--navy);margin-bottom:8px">
      <i class="bi bi-list-ul me-1"></i>Desglose Gastos Operativos
    </div>
    ${rows.map(r => `
    <div class="det-row">
      <span class="det-row-label">${r.label}${r.badge ? ` <span style="font-size:.68rem;background:#f1f5f9;border-radius:4px;padding:1px 5px;color:#94a3b8">${r.badge}</span>` : ''}</span>
      <span class="det-row-val ${r.val===0?'zero':''}">${fp(r.val)}</span>
    </div>`).join('')}
    <div class="det-total"><span>Total Gastos Operativos</span><span>${fmtP(total)}</span></div>`;
}

function renderDetalleSeguros(panel) {
  const c  = _credito;
  const dj = parseDJ();
  const chkD = dj.seguros?.desgravamen ?? true;
  const chkR = dj.seguros?.rdh         ?? true;
  const chkC = dj.seguros?.cesantia    ?? true;

  // Recalcular usando la misma fórmula del ingreso
  const saldoPrecio = parseFloat(c.saldo_precio) || 0;
  const gastosOp    = parseFloat(c.gastos_operativos) || 0;
  const subSin      = saldoPrecio + gastosOp;
  const pb          = credPlazoBracket(parseInt(c.plazo) || 48);
  const rates       = CRED_SEG_RATES[pb] || CRED_SEG_RATES[72];
  const key         = credComboKey(chkD, chkR, chkC);
  let segDesg=0, segRdh=0, segCesa=0;
  if (key && subSin > 0) {
    const totalNet = (rates[key]||0) * subSin;
    const sumInd   = (chkD?rates.d:0)+(chkR?rates.r:0)+(chkC?rates.c:0);
    if (sumInd > 0) {
      if (chkD) segDesg = Math.round(totalNet*(rates.d/sumInd));
      if (chkR) segRdh  = Math.round(totalNet*(rates.r/sumInd));
      if (chkC) segCesa = Math.round(totalNet*(rates.c/sumInd));
    }
  }
  const totalSeg = segDesg + segRdh + segCesa;
  const fp = v => v > 0 ? fmtP(v) : '<span style="color:#cbd5e1">—</span>';
  const badge = ok => ok
    ? '<span style="font-size:.68rem;background:#f0fdf4;border:1px solid #86efac;border-radius:4px;padding:1px 6px;color:#15803d">Incluido</span>'
    : '<span style="font-size:.68rem;background:#f1f5f9;border-radius:4px;padding:1px 5px;color:#94a3b8">No incluido</span>';
  panel.innerHTML = `
    <div style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--navy);margin-bottom:8px">
      <i class="bi bi-shield-check me-1"></i>Desglose Seguros — Plazo bracket: ${pb} meses
    </div>
    <div class="det-row">
      <span class="det-row-label">Desgravamen ${badge(chkD)}</span>
      <span class="det-row-val ${!chkD?'zero':''}">${fp(segDesg)}</span>
    </div>
    <div class="det-row">
      <span class="det-row-label">RDH / Discapacidad ${badge(chkR)}</span>
      <span class="det-row-val ${!chkR?'zero':''}">${fp(segRdh)}</span>
    </div>
    <div class="det-row">
      <span class="det-row-label">Cesantía ${badge(chkC)}</span>
      <span class="det-row-val ${!chkC?'zero':''}">${fp(segCesa)}</span>
    </div>
    <div class="det-total"><span>Total Seguros</span><span>${fmtP(totalSeg)}</span></div>
    <div style="font-size:.68rem;color:#94a3b8;margin-top:6px">Base de cálculo: Saldo precio + Gastos operativos = ${fmtP(subSin)}</div>`;
}

function parseDJ() {
  try {
    const dj = typeof _credito.datos_json === 'string'
      ? JSON.parse(_credito.datos_json)
      : (_credito.datos_json || {});
    return dj;
  } catch(e) { return {}; }
}

/* ── Guardar cambios ── */
async function guardarCambios() {
  if (!_credito) return;
  try {
    const body = {
      estado:        document.getElementById('dEstado').value,
      observaciones: document.getElementById('dObservaciones').value.trim(),
      ejecutivo:     _credito.ejecutivo,
      dealer:        _credito.dealer,
      patente:       _credito.patente,
      color:         _credito.color,
      motor:         _credito.motor,
      chasis:        _credito.chasis,
    };
    const r = await fetch('/api/creditos/'+creditId, { method:'PUT', headers:apiHdr(), body:JSON.stringify(body) });
    const j = await r.json();
    if (j.success) { showToast('Cambios guardados correctamente', true); _credito.estado = body.estado; }
    else showToast(j.error||'Error al guardar', false);
  } catch(e) { showToast('Error de conexión', false); }
}

/* ── Botones Aprobar / Rechazar ── */
function cambiarEstadoRapido(estado) {
  document.getElementById('dEstado').value = estado;
  guardarCambios();
}

/* ── Tabla de Amortización ── */
function mostrarAmortizacion() {
  if (!_credito) return;
  const { numero_credito, monto_financiado, tasa_mensual, plazo, fecha_primera_cuota, cuota } = _credito;
  const mf = parseFloat(monto_financiado)||0;
  const t  = parseFloat(tasa_mensual)||0;
  const pl = parseInt(plazo)||0;
  const cu = parseFloat(cuota)||0;
  if (!mf||!t||!pl) { showToast('Datos insuficientes (monto, tasa y plazo son requeridos)', false); return; }
  document.getElementById('amortNumCred').textContent = numero_credito||'—';
  const fp = v => '$'+Math.round(v).toLocaleString('es-CL');
  const totalPag = Math.round(cu)*pl;
  const totalInt = totalPag - Math.round(mf);
  document.getElementById('amortSummary').innerHTML = `
    <div class="amort-sum-item"><div class="amort-sum-lbl">Monto Financiado</div><div class="amort-sum-val">${fp(mf)}</div></div>
    <div class="amort-sum-item"><div class="amort-sum-lbl">Cuota</div><div class="amort-sum-val">${fp(cu)}</div></div>
    <div class="amort-sum-item"><div class="amort-sum-lbl">Plazo</div><div class="amort-sum-val">${pl} meses</div></div>
    <div class="amort-sum-item"><div class="amort-sum-lbl">Total Intereses</div><div class="amort-sum-val" style="color:#dc2626">${fp(totalInt)}</div></div>
    <div class="amort-sum-item"><div class="amort-sum-lbl">Total a Pagar</div><div class="amort-sum-val">${fp(totalPag)}</div></div>`;
  const tasaD = t/100;
  let saldo = mf, sumCap=0, sumInt=0, sumCuota=0;
  let fecha = fecha_primera_cuota ? new Date(fecha_primera_cuota.split('T')[0]+'T00:00:00') : null;
  const fmtF2 = f => f ? f.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
  let rows='';
  for (let i=1; i<=pl; i++) {
    const interes = Math.round(saldo*tasaD);
    let   amort   = Math.round(cu)-interes;
    if (i===pl) amort = Math.round(saldo);
    const cuotaF  = interes+amort;
    saldo = Math.max(0,Math.round(saldo-amort));
    sumCap+=amort; sumInt+=interes; sumCuota+=cuotaF;
    const fechaFila = fecha ? new Date(fecha) : null;
    if (fecha) fecha.setMonth(fecha.getMonth()+1);
    rows+=`<tr>
      <td style="color:#9ca3af;font-size:.75rem">${i}</td>
      <td>${fmtF2(fechaFila)}</td>
      <td style="font-weight:700">${fp(amort)}</td>
      <td style="color:#dc2626">${fp(interes)}</td>
      <td style="font-weight:800;color:var(--navy)">${fp(cuotaF)}</td>
      <td style="color:#64748b">${fp(saldo)}</td>
    </tr>`;
  }
  document.getElementById('amortBody').innerHTML = rows;
  document.getElementById('amortFoot').innerHTML = `<tr><td colspan="2">TOTAL</td><td>${fp(sumCap)}</td><td>${fp(sumInt)}</td><td>${fp(sumCuota)}</td><td>—</td></tr>`;
  document.getElementById('amortOverlay').classList.add('open');
}
function cerrarAmort() { document.getElementById('amortOverlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') cerrarAmort(); });

cargarPagina();
</script>
