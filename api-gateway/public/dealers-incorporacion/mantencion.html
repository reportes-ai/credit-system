<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantención Dealers — AutoFácil</title>
  <!-- v1.11 -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; margin-left:16px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .topnav-right { display:flex; align-items:center; gap:10px; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .main { max-width:none; margin:24px auto; padding:0 24px 60px; }
    .tabs { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
    .tab { background:#fff; border:1.5px solid #e2e8f0; color:#475569; border-radius:10px; padding:9px 18px; font-size:.86rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:7px; }
    .tab.on { background:var(--navy); color:#fff; border-color:var(--navy); }
    .tab .badge-n { background:#ef4444; color:#fff; border-radius:10px; font-size:.7rem; padding:1px 7px; }
    .toolbar { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
    .toolbar input { border:1.5px solid #d1d5db; border-radius:8px; padding:8px 12px; font-size:.85rem; min-width:240px; }
    .btn { border:none; border-radius:9px; padding:8px 15px; font-size:.83rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
    .btn-navy { background:var(--navy); color:#fff; } .btn-green{ background:#16a34a; color:#fff; }
    .btn-red{ background:#dc2626; color:#fff; } .btn-amber{ background:#f59e0b; color:#fff; }
    .btn-light{ background:#f1f5f9; color:#334155; } .btn-sky{ background:#0284c7; color:#fff; }
    .btn-sm{ padding:5px 10px; font-size:.78rem; border-radius:7px; }
    .panel { background:#fff; border-radius:14px; box-shadow:0 1px 6px rgba(0,0,0,.07); overflow:hidden; }
    table.tb { width:100%; border-collapse:collapse; font-size:.83rem; }
    table.tb th { background:#f8fafc; color:#475569; text-align:left; padding:10px 12px; font-size:.74rem; text-transform:uppercase; letter-spacing:.4px; border-bottom:1px solid #e5e7eb; }
    table.tb td { padding:10px 12px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    table.tb tr:hover td { background:#f8fafc; }
    .estado-pill { font-size:.7rem; font-weight:800; border-radius:20px; padding:3px 10px; white-space:nowrap; }
    .e-BORRADOR{ background:#e2e8f0; color:#475569; } .e-EN_REVISION{ background:#fef9c3; color:#854d0e; }
    .e-TOMADA{ background:#fde68a; color:#92400e; } .e-APROBADA{ background:#dcfce7; color:#166534; } .e-RECHAZADA{ background:#fee2e2; color:#991b1b; }
    .e-PEND_AUTORIZACION{ background:#fef9c3; color:#854d0e; } .e-AUTORIZADA{ background:#dbeafe; color:#1e40af; } .e-PEND_CIERRE{ background:#fde68a; color:#92400e; }
    .acts { display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end; }
    .vacio { text-align:center; color:#94a3b8; padding:40px 0; }
    /* modal */
    dialog { border:none; border-radius:16px; padding:0; width:min(640px,94vw); box-shadow:0 20px 60px rgba(0,0,0,.3); }
    dialog::backdrop { background:rgba(0,0,0,.45); }
    .dlg-head { background:linear-gradient(135deg,#012d70,#0141A2); color:#fff; padding:16px 22px; display:flex; align-items:center; gap:10px; font-weight:700; }
    .dlg-body { padding:20px 22px; max-height:70vh; overflow:auto; }
    .dlg-foot { padding:14px 22px; border-top:1px solid #f1f5f9; display:flex; gap:10px; justify-content:flex-end; }
    .kv { display:grid; grid-template-columns:160px 1fr; gap:6px 14px; font-size:.85rem; }
    .fdoc { font-size:.84rem; }
    .fdoc-t { text-align:center; font-size:1rem; margin:2px 0 12px; color:#0141A2; font-weight:800; letter-spacing:.3px; }
    .fdoc table.p { width:100%; border-collapse:collapse; margin-bottom:8px; }
    .fdoc table.p th { background:#0141A2; color:#fff; text-align:left; padding:5px 9px; font-size:.76rem; letter-spacing:.3px; }
    .fdoc table.p td { border:1px solid #d1d5db; padding:5px 9px; }
    .fdoc table.p td.lbl { background:#f1f5f9; font-weight:600; color:#334155; width:42%; }
    .kv b { color:#475569; font-weight:600; }
    .grid2 { display:grid; grid-template-columns:repeat(2,1fr); gap:12px 16px; }
    .grid2 .full{ grid-column:1/-1; }
    .fld { display:flex; flex-direction:column; gap:4px; } .fld label{ font-size:.76rem; font-weight:600; color:#374151; }
    .fld input,.fld select,.fld textarea{ border:1.5px solid #d1d5db; border-radius:8px; padding:8px 10px; font-size:.85rem; }
    .toast-af { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#0f172a; color:#fff; padding:11px 20px; border-radius:10px; font-size:.86rem; z-index:9999; display:none; }
    .toast-af.err{ background:#b91c1c; }
    .motivo-line{ font-size:.78rem; color:#991b1b; margin-top:3px; }
    .apel-line{ font-size:.78rem; color:#1e40af; margin-top:3px; }
    .alert-row{ margin-top:4px; display:flex; flex-wrap:wrap; gap:4px; }
    .alert-chip{ font-size:.68rem; font-weight:700; border-radius:20px; padding:2px 8px; white-space:nowrap; display:inline-flex; align-items:center; gap:4px; }
    .ac-red{ background:#fee2e2; color:#991b1b; } .ac-amber{ background:#ffedd5; color:#9a3412; }
  </style>
</head>
<body>
<nav class="topnav">
  <div style="display:flex;align-items:center">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a> › <a href="/dealers-incorporacion/">Dealer</a> › <span style="color:#fff;font-weight:600">Mantención Dealers</span></div>
  </div>
  <div class="topnav-right">
    <button class="btn-logout" onclick="location.href='/dealers-incorporacion/nuevo.html'"><i class="bi bi-plus-lg me-1"></i>Nueva ficha</button>
    <span class="user-chip"><div class="avatar" id="avatarInicial">?</div>
      <div><div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
      <div class="perfil-badge" id="navPerfil">—</div></div></span>
    <a class="btn-logout" href="/dealers-incorporacion/"><i class="bi bi-arrow-left me-1"></i>Volver</a>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>
<script>
  (function(){ const u=JSON.parse(sessionStorage.getItem('usuario')||'{}');
    document.getElementById('navNombre').textContent=((u.nombre||'')+' '+(u.apellido||'')).trim()||'—';
    document.getElementById('navPerfil').textContent=u.perfil||'';
    document.getElementById('avatarInicial').textContent=(u.nombre||'?')[0].toUpperCase(); })();
  function logout(){ sessionStorage.clear(); location.href='/login.html'; }
</script>

<div class="main">
  <div class="tabs" id="tabs"></div>
  <div class="toolbar"><input id="buscar" placeholder="Buscar por RUT, razón social o ejecutivo…" oninput="render()"></div>
  <div class="panel"><div id="contenido"></div></div>
</div>

<dialog id="dlgVer">
  <div class="dlg-head"><i class="bi bi-building"></i> <span id="verTitulo">Ficha</span></div>
  <div class="dlg-body" id="verBody"></div>
  <div class="dlg-foot"><button class="btn btn-light" onclick="dlgVer.close()">Cerrar</button></div>
</dialog>

<dialog id="dlgDealer">
  <div class="dlg-head"><i class="bi bi-pencil-square"></i> Editar Dealer</div>
  <div class="dlg-body">
    <input type="hidden" id="d_id">
    <div class="grid2">
      <div class="fld"><label>RUT</label><input id="d_rut"></div>
      <div class="fld"><label>Nombre Razón Social</label><input id="d_nombre_razon"></div>
      <div class="fld"><label>Nombre Dealer</label><input id="d_nombre_indexa"></div>
      <div class="fld"><label>Categoría (CCS/Parque)</label><input id="d_ccs_parque"></div>
      <div class="fld full"><label>Dirección</label><input id="d_direccion"></div>
      <div class="fld"><label>Contacto</label><input id="d_contacto"></div>
      <div class="fld"><label>Teléfono</label><input id="d_telefono"></div>
      <div class="fld"><label>Correo</label><input id="d_correo"></div>
      <div class="fld"><label>Banco</label><input id="d_banco"></div>
      <div class="fld"><label>N° Cuenta</label><input id="d_num_cuenta"></div>
      <div class="fld"><label>RUT Pago</label><input id="d_rut_pago"></div>
      <div class="fld"><label>Activo</label><select id="d_activo"><option value="1">Sí</option><option value="0">No</option></select></div>
      <div class="fld"><label>Emite Factura</label><select id="d_tiene_factura"><option value="1">Sí</option><option value="0">No (Boleta)</option></select></div>
      <div class="fld full"><label>Observaciones</label><textarea id="d_observaciones" rows="2"></textarea></div>
    </div>
    <div style="margin-top:8px;border-top:1px solid #f1f5f9;padding-top:10px">
      <label style="display:block;font-size:.8rem;font-weight:600;color:#374151;margin-bottom:6px"><i class="bi bi-percent me-1"></i>Comisión pactada del dealer (solo lectura)</label>
      <div id="d_com_tabla"></div>
      <div style="margin-top:8px;font-size:.76rem;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 10px"><i class="bi bi-lock me-1"></i>Las comisiones <b>no se editan aquí</b>. Para cambiarlas, crea una <b>ficha de Modificación</b> del dealer: pasa por la cadena de aprobación (y por Gerencia si supera la pizarra).</div>
    </div>
  </div>
  <div class="dlg-foot"><button class="btn btn-light" onclick="dlgDealer.close()">Cancelar</button>
    <button class="btn btn-navy" onclick="guardarDealer()"><i class="bi bi-save me-1"></i>Guardar</button></div>
</dialog>

<div class="toast-af" id="toast"></div>

<script src="/js/auth-guard.js"></script>
<script src="/js/reporte-ia.js"></script>
<script>
const token = sessionStorage.getItem('token');
const yo    = JSON.parse(sessionStorage.getItem('usuario') || 'null');
if (!token || !yo) location.href='/login.html';
const H = { 'Content-Type':'application/json', Authorization:'Bearer '+token };
const MI_ID = yo?.id_usuario;
const escH = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const $ = id => document.getElementById(id);
function toast(m,err){ const t=$('toast'); t.textContent=m; t.className='toast-af'+(err?' err':''); t.style.display='block'; setTimeout(()=>t.style.display='none',2800); }
const fH = s => s ? new Date(s).toLocaleString('es-CL',{timeZone:'America/Santiago',dateStyle:'short',timeStyle:'short'}) : '—';

let PERMS = new Set(), ESADMIN = false, CANREV = false, CANGER = false, FICHAS = [], DEALERS = [], TAB = (new URLSearchParams(location.search).get('tab')||'');
const tiene = (...cs) => ESADMIN || cs.some(c=>PERMS.has(c));

async function init(){
  try { const r=await fetch('/api/auth/mis-permisos?_='+Date.now(),{cache:'no-store',headers:H}); const j=await r.json(); (j.funcionalidades||[]).forEach(c=>PERMS.add(c)); } catch(e){}
  ESADMIN = yo?.perfil==='Administrador';
  CANREV = tiene('dealer_ficha_revisar'); CANGER = tiene('dealer_part_especial');
  const canRev = CANREV || CANGER, canCrear = tiene('dealer_ficha_crear'), canMant = tiene('dealer_mantener');
  const tabs=[];
  if (canRev)   tabs.push(['revision','Revisión (pool)','bi-clipboard-check']);
  if (canCrear) tabs.push(['mias','Mis fichas','bi-folder']);
  if (canMant)  tabs.push(['dealers','Dealers vigentes','bi-building']);
  if (canRev || canMant) tabs.push(['historicas','Aprobaciones Históricas','bi-archive']);
  if (!tabs.length){ $('contenido').innerHTML='<div class="vacio"><i class="bi bi-lock"></i><br>Sin acceso.</div>'; return; }
  if (!tabs.find(t=>t[0]===TAB)) TAB = tabs[0][0];
  window._tabs = tabs;
  await cargar();
}

async function cargar(){
  try {
    const r = await fetch('/api/dealer-incorporacion/fichas', { headers:H });
    const j = await r.json(); if (j.success) FICHAS = j.data.rows||[];
  } catch(e){}
  if (tiene('dealer_mantener')) { try { const r=await fetch('/api/dealers?limit=500',{headers:H}); const j=await r.json(); if(j.success) DEALERS=j.data.rows||[]; } catch(e){} }
  pintarTabs(); render();
}

function pintarTabs(){
  const pend = FICHAS.filter(f=>['PEND_AUTORIZACION','PEND_CIERRE','TOMADA'].includes(f.estado)).length;
  $('tabs').innerHTML = window._tabs.map(([id,label,ic])=>{
    const n = (id==='revision' && pend) ? `<span class="badge-n">${pend}</span>` : '';
    return `<button class="tab ${id===TAB?'on':''}" onclick="setTab('${id}')"><i class="bi ${ic}"></i> ${label} ${n}</button>`;
  }).join('');
}
function setTab(t){ TAB=t; history.replaceState(null,'','?tab='+t); pintarTabs(); render(); }

function filtroQ(arr, campos){
  const q=$('buscar').value.trim().toLowerCase(); if(!q) return arr;
  return arr.filter(o=>campos.some(c=>String(o[c]||'').toLowerCase().includes(q)));
}

function render(){
  if (TAB==='revision') return renderRevision();
  if (TAB==='mias')     return renderMias();
  if (TAB==='dealers')  return renderDealers();
  if (TAB==='historicas') return renderHistoricas();
}

let histFiltro = 'todos';
function setHistFiltro(v){ histFiltro = v; renderHistoricas(); }
// Borrar un registro histórico (solo Administrador). NO elimina el dealer creado.
async function borrarHistorico(id){
  if(!ESADMIN){ toast('Solo el Administrador puede borrar históricos.', true); return; }
  if(!confirm('¿Borrar este registro histórico (la ficha)?\n\nEl dealer creado NO se elimina. Esta acción no se puede deshacer.')) return;
  try{ const r=await fetch('/api/dealer-incorporacion/fichas/'+id,{method:'DELETE',headers:H}); const j=await r.json(); if(!j.success)throw new Error(j.error); toast('Registro histórico borrado'); await cargar(); }
  catch(e){ toast(e.message,true); }
}
// Timbre al pie de la ficha aprobada (verde) o rechazada (rojo), con fecha y hora.
function timbreFicha(f){
  if (f.estado==='APROBADA'){
    return `<div style="margin-top:18px;display:flex;justify-content:center">
      <div style="border:3px solid #15803d;color:#15803d;border-radius:10px;padding:8px 20px;transform:rotate(-4deg);font-weight:800;letter-spacing:1px;text-align:center;background:#f0fdf4">
        <div style="font-size:1.2rem"><i class="bi bi-patch-check-fill"></i> APROBADO</div>
        <div style="font-size:.74rem;font-weight:600">${fH(f.updated_at)}</div>
        ${f.id_dealer?'<div style="font-size:.68rem;font-weight:600;opacity:.85">Dealer creado/actualizado</div>':''}
      </div></div>`;
  }
  if (f.estado==='RECHAZADA'){
    return `<div style="margin-top:18px;display:flex;justify-content:center">
      <div style="border:3px solid #b91c1c;color:#b91c1c;border-radius:10px;padding:8px 20px;transform:rotate(-4deg);font-weight:800;letter-spacing:1px;text-align:center;background:#fef2f2">
        <div style="font-size:1.2rem"><i class="bi bi-x-octagon-fill"></i> RECHAZADO</div>
        <div style="font-size:.74rem;font-weight:600">${fH(f.fecha_revision||f.updated_at)}</div>
        ${f.revisor_nombre?`<div style="font-size:.68rem;font-weight:600;opacity:.85">por ${escH(f.revisor_nombre)}</div>`:''}
      </div></div>${f.motivo_rechazo?`<div style="width:100%;text-align:center;margin-top:8px;font-size:.82rem;color:#991b1b"><b>Motivo:</b> ${escH(f.motivo_rechazo)}</div>`:''}`;
  }
  return '';
}
function renderHistoricas(){
  let rows = FICHAS.filter(f=>['APROBADA','RECHAZADA'].includes(f.estado));
  if (histFiltro==='aprobados')  rows = rows.filter(f=>f.estado==='APROBADA');
  if (histFiltro==='rechazados') rows = rows.filter(f=>f.estado==='RECHAZADA');
  rows = filtroQ(rows, ['rut','nombre_razon','nombre_fantasia','ejecutivo_nombre']);
  const sel = `<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
    <span style="font-size:.82rem;color:#475569">Mostrar:</span>
    ${['todos','Todos','aprobados','Aprobados','rechazados','Rechazados'].reduce((acc,_,i,a)=>{ if(i%2) return acc; const v=a[i],l=a[i+1];
      return acc+`<button class="btn btn-sm ${histFiltro===v?'btn-navy':'btn-light'}" onclick="setHistFiltro('${v}')">${l}</button>`; },'')}
    <span style="margin-left:auto;font-size:.8rem;color:#94a3b8">${rows.length} ficha(s)</span></div>`;
  if (!rows.length){ $('contenido').innerHTML = sel+'<div class="vacio"><i class="bi bi-archive" style="font-size:1.6rem"></i><br>Sin aprobaciones históricas con ese criterio.</div>'; return; }
  $('contenido').innerHTML = sel + `<table class="tb"><thead><tr>
    <th>Tipo</th><th>Concesionario</th><th>RUT</th><th>Ejecutivo</th><th>Comisión</th><th>Resultado</th><th>Fecha</th><th></th></tr></thead><tbody>${
    rows.map(f=>{
      const aprob = f.estado==='APROBADA';
      const chip = aprob
        ? `<span class="estado-pill" style="background:#dcfce7;color:#166534"><i class="bi bi-patch-check-fill"></i> APROBADO</span>`
        : `<span class="estado-pill" style="background:#fee2e2;color:#991b1b"><i class="bi bi-x-octagon-fill"></i> RECHAZADO</span>`;
      return `<tr>
        <td>${f.tipo==='PARQUE'?'<i class="bi bi-car-front"></i> Parque':'<i class="bi bi-shop"></i> General'}</td>
        <td><b>${escH(f.nombre_razon||f.nombre_fantasia||'—')}</b>${f.id_dealer_origen?'<div class="alert-row"><span class="alert-chip" style="background:#ffedd5;color:#9a3412"><i class="bi bi-pencil-square"></i> modificación</span></div>':''}</td>
        <td>${escH(f.rut||'—')}</td>
        <td>${escH(f.ejecutivo_nombre||'—')}</td>
        <td>${comResumen(f)}</td>
        <td>${chip}</td>
        <td>${fH(aprob?f.updated_at:(f.fecha_revision||f.updated_at))}</td>
        <td><div class="acts"><button class="btn btn-sm" style="background:#1e40af;color:#fff" onclick="verFicha(${f.id}, false, true)"><i class="bi bi-eye"></i> Ver</button>${ESADMIN?`<button class="btn btn-red btn-sm" onclick="borrarHistorico(${f.id})" title="Borrar registro histórico (solo Admin — no elimina el dealer)"><i class="bi bi-trash"></i></button>`:''}</div></td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

function comResumen(f){ return `${f.com_6_12||0}/${f.com_13_24||0}/${f.com_25_36||0}/${f.com_37||0}%`; }

/* ── Pool de revisión ── */
function alertasFila(f){
  const a=[];
  if (f.id_dealer_origen) a.push(`<span class="alert-chip" style="background:#ffedd5;color:#9a3412"><i class="bi bi-pencil-square"></i> modificación</span>`);
  if (f.part_especial)  a.push(`<span class="alert-chip" style="background:#ede9fe;color:#5b21b6"><i class="bi bi-star-fill"></i> participación especial</span>`);
  if (f.n_diferencias) a.push(`<span class="alert-chip ac-red"><i class="bi bi-exclamation-octagon"></i> ${f.n_diferencias} dif. sistema</span>`);
  if (f.n_faltantes)   a.push(`<span class="alert-chip ac-red"><i class="bi bi-file-earmark-x"></i> ${f.n_faltantes} no coinciden c/ doc</span>`);
  if (f.firma_sospecha) a.push(`<span class="alert-chip ac-amber"><i class="bi bi-pen"></i> posible SIN FIRMA</span>`);
  return a.length ? `<div class="alert-row">${a.join(' ')}</div>` : '';
}
function renderRevision(){
  let rows = FICHAS.filter(f=>['PEND_AUTORIZACION','PEND_CIERRE','TOMADA'].includes(f.estado));
  rows = filtroQ(rows, ['rut','nombre_razon','nombre_fantasia','ejecutivo_nombre']);

      <td><b>${escH(f.nombre_razon||f.nombre_fantasia||'—')}</b>${f.apelacion?`<div class="apel-line"><i class="bi bi-megaphone"></i> Apelación: ${escH(f.apelacion)}</div>`:''}${alertasFila(f)}</td>
      <td>${escH(f.rut||'—')}</td>
      <td>${escH(f.ejecutivo_nombre||'—')}</td>
      <td>${comResumen(f)}</td>
      <td><span class="estado-pill e-${f.estado}">${escH(f.estado.replace(/_/g,' '))}</span>${f.estado==='PEND_AUTORIZACION'&&f.nivel_actual_nombre?`<div style="font-size:.72rem;color:#854d0e">${escH(f.nivel_actual_nombre)}</div>`:''}${f.tomada_por_nombre?`<div style="font-size:.72rem;color:#92400e">por ${escH(f.tomada_por_nombre)}</div>`:''}</td>
      <td>${fH(f.updated_at)}</td>
      <td><div class="acts">
        <button class="btn btn-light btn-sm" onclick="verFicha(${f.id})" title="Ver ficha"><i class="bi bi-eye"></i></button>
        <button class="btn btn-sm" style="background:#1e40af;color:#fff" onclick="verFicha(${f.id}, true)" title="Revisar ficha + informes DealerNet + Reporte IA"><i class="bi bi-search"></i> Revisar</button>
        ${f.tiene_ficha?`<button class="btn btn-sky btn-sm" onclick="abrirArchivo(${f.id})" title="Ficha firmada"><i class="bi bi-file-earmark-pdf"></i></button>`:''}
        ${(()=>{
          if(f.estado==='PEND_AUTORIZACION'){
            const canAuth = ESADMIN || (f.nivel_actual_permiso && PERMS.has(f.nivel_actual_permiso));
            const niv = escH(f.nivel_actual_nombre||'nivel');
            return canAuth
              ? `<button class="btn btn-green btn-sm" onclick="autorizar(${f.id})" title="Autorizar: ${niv}"><i class="bi bi-check2-circle"></i> Autorizar</button>
                 <button class="btn btn-red btn-sm" onclick="rechazar(${f.id})"><i class="bi bi-x-lg"></i> Rechazar</button>`
              : `<span class="estado-pill e-PEND_AUTORIZACION" title="Pendiente de ${niv}"><i class="bi bi-hourglass-split"></i> ${niv}</span>`;
          }
          if(['PEND_CIERRE','TOMADA'].includes(f.estado)){
            return CANREV
              ? `<button class="btn btn-green btn-sm" onclick="cerrar(${f.id})"><i class="bi bi-check-lg"></i> Cerrar</button>
                 <button class="btn btn-red btn-sm" onclick="rechazar(${f.id})"><i class="bi bi-x-lg"></i> Rechazar</button>`
              : `<span class="estado-pill e-PEND_CIERRE"><i class="bi bi-hourglass-split"></i> En cierre</span>`;
          }
          return '';
        })()}
      </div></td></tr>`).join('')}</tbody></table>`;
}

/* ── Acciones ficha ── */
async function verFicha(id, revisar, historico){
  try {
    const r=await fetch('/api/dealer-incorporacion/fichas/'+id,{headers:H}); const j=await r.json();
    if(!j.success) throw new Error(j.error); const f=j.data;
    $('verTitulo').textContent = (revisar?'Revisar — ':historico?'Histórico — ':'')+(f.nombre_razon||f.rut||'Ficha')+' · '+(f.tipo==='PARQUE'?'Parque':'General');
    const row=(k,v)=>`<b>${k}</b><span>${escH(v??'—')}</span>`;
    // Adjuntos (ficha firmada + informes comerciales)
    let adjHtml = '';
    if (f.tiene_ficha) adjHtml += `<a class="btn btn-sky btn-sm" style="text-decoration:none" target="_blank" href="/api/dealer-incorporacion/fichas/${id}/archivo?token=${encodeURIComponent(token)}"><i class="bi bi-file-earmark-pdf"></i> Ficha firmada</a> `;
    try {
      const ra=await fetch('/api/dealer-incorporacion/fichas/'+id+'/archivos',{headers:H}); const ja=await ra.json();
      const CAT_LBL={EMPRESA:'Empresa',SOCIOS:'Socios',PODER_SIMPLE:'Poder Simple',PODER_REP_LEGAL:'Poderes Rep. Legal'};
      (ja.data||[]).forEach(a=>{ adjHtml += `<a class="btn btn-light btn-sm" style="text-decoration:none" target="_blank" href="/api/dealer-incorporacion/fichas/${id}/archivos/${a.id}?token=${encodeURIComponent(token)}"><i class="bi bi-paperclip"></i> ${CAT_LBL[a.categoria]||a.categoria}: ${escH(a.nombre||'archivo')}</a> `; });
    } catch(e){}
    // Diferencias vs datos cargados en el sistema
    let difHtml = '';
    if (Array.isArray(f.diferencias) && f.diferencias.length) {
      const esMod = !!f.id_dealer_origen;
      difHtml = `<div style="margin-top:14px;border:1px solid #fecaca;background:#fef2f2;border-radius:10px;padding:12px 14px">
        <b style="color:#991b1b;font-size:.82rem"><i class="bi bi-${esMod?'pencil-square':'exclamation-octagon'} me-1"></i>${esMod?'MODIFICACIÓN DE DEALER — datos que cambian respecto al sistema':'Diferencias con los datos del sistema'}</b>
        ${f.diferencias.map(d=>`<div style="margin-top:6px;font-size:.82rem"><b>${escH(d.campo)}:</b> ficha "<span style="color:#991b1b;font-weight:600">${escH(d.ficha)}</span>" · sistema "${escH(d.sistema)}"</div>`).join('')}</div>`;
    }
    // Datos que no coinciden con el texto del documento subido
    let faltHtml = '';
    if (Array.isArray(f.ficha_faltantes) && f.ficha_faltantes.length) {
      faltHtml = `<div style="margin-top:14px;border:1px solid #fca5a5;background:#fef2f2;border-radius:10px;padding:12px 14px">
        <b style="color:#991b1b;font-size:.82rem"><i class="bi bi-file-earmark-x me-1"></i>No coinciden con el documento subido</b>
        <div style="margin-top:2px;font-size:.76rem;color:#7f1d1d">Estos datos ingresados no se encontraron en el texto del archivo cargado:</div>
        ${f.ficha_faltantes.map(d=>`<div style="margin-top:5px;font-size:.82rem"><b>${escH(d.campo)}:</b> "<span style="color:#991b1b">${escH(d.valor)}</span>"</div>`).join('')}</div>`;
    }
    // Alerta de firma (heurística)
    let firmaHtml = '';
    if (f.firma_sospecha) {
      firmaHtml = `<div style="margin-top:14px;border:1px solid #fdba74;background:#fff7ed;border-radius:10px;padding:12px 14px">
        <b style="color:#9a3412;font-size:.82rem"><i class="bi bi-pen me-1"></i>Posible ficha SIN FIRMA</b>
        <div style="margin-top:4px;font-size:.82rem;color:#7c2d12">${escH(f.firma_detalle||'Revisa visualmente que la ficha esté firmada.')}</div></div>`;
    }
    // Excepciones (comisión modificada / boleta) con su comentario
    let excHtml = '';
    if (Array.isArray(f.excepciones) && f.excepciones.length) {
      const com = Object.fromEntries((f.excepciones_comentarios||[]).map(c=>[c.tipo,c.comentario]));
      excHtml = `<div style="margin-top:14px;border:1px solid #fde68a;background:#fffbeb;border-radius:10px;padding:12px 14px">
        <b style="color:#92400e;font-size:.82rem"><i class="bi bi-exclamation-triangle me-1"></i>Excepciones</b>
        ${f.excepciones.map(e=>`<div style="margin-top:6px;font-size:.83rem"><b>${escH(e.label||e.tipo)}:</b> ${escH(com[e.tipo]||'—')}</div>`).join('')}</div>`;
    }
    // Participación especial (comisión sobre la pizarra)
    let espHtml = '';
    if (f.part_especial || f.part_especial_por) {
      const aprob = f.part_especial_por
        ? `<div style="margin-top:4px;font-size:.82rem;color:#5b21b6"><i class="bi bi-patch-check-fill me-1"></i><b>Participación especial aprobada por ${escH(f.part_especial_por)}</b>${f.part_especial_fecha?` · ${fH(f.part_especial_fecha)}`:''}</div>`
        : `<div style="margin-top:4px;font-size:.82rem;color:#7c2d12">Requiere visto de Gerencia (Gerente General / Operaciones y Crédito) para fijar los %.</div>`;
      espHtml = `<div style="margin-top:14px;border:1px solid #ddd6fe;background:#f5f3ff;border-radius:10px;padding:12px 14px">
        <b style="color:#5b21b6;font-size:.82rem"><i class="bi bi-star-fill me-1"></i>Participación especial (comisión sobre la pizarra)</b>${aprob}</div>`;
    }
    // Cadena de autorización: autorizaciones registradas + nivel pendiente
    let cadenaHtml = '';
    if ((Array.isArray(f.autorizaciones) && f.autorizaciones.length) || f.estado==='PEND_AUTORIZACION') {
      const items = (f.autorizaciones||[]).map(a=>`<div style="margin-top:5px;font-size:.82rem"><i class="bi bi-check2-circle me-1" style="color:#15803d"></i><b>${escH(a.nombre_nivel||'Nivel')}:</b> ${escH(a.usuario_nombre||'—')}${a.perfil?` (${escH(a.perfil)})`:''} · ${fH(a.fecha)}${a.sin_revision?' <span style="color:#b91c1c;font-weight:700">· SIN REVISIÓN DE FICHA</span>':''}</div>`).join('');
      const pend = (f.estado==='PEND_AUTORIZACION' && f.nivel_actual_nombre) ? `<div style="margin-top:5px;font-size:.82rem;color:#854d0e"><i class="bi bi-hourglass-split me-1"></i>Pendiente: <b>${escH(f.nivel_actual_nombre)}</b></div>` : '';
      cadenaHtml = `<div style="margin-top:14px;border:1px solid #c7d2fe;background:#eef2ff;border-radius:10px;padding:12px 14px">
        <b style="color:#3730a3;font-size:.82rem"><i class="bi bi-diagram-3 me-1"></i>Cadena de autorización</b>${items||'<div style="font-size:.8rem;color:#94a3b8;margin-top:4px">Sin autorizaciones aún</div>'}${pend}</div>`;
    }
    $('verBody').innerHTML = `${(revisar||historico)?barraInformes(f):''}${fichaDocHTML(f)}${(f.apelacion||f.motivo_rechazo)?`<div class="kv" style="margin-top:10px">${f.apelacion?row('Apelación', f.apelacion):''}${f.motivo_rechazo?row('Motivo rechazo', f.motivo_rechazo):''}</div>`:''}${cadenaHtml}${espHtml}${firmaHtml}${difHtml}${faltHtml}${excHtml}<div style="margin-top:16px;display:flex;flex-wrap:wrap;gap:6px">${adjHtml||'<span style="font-size:.8rem;color:#94a3b8">Sin adjuntos</span>'}</div>${historico?timbreFicha(f):''}`;
    dlgVer.showModal();
    // Registrar que se revisó (para detectar "Aprobado sin revisión de ficha").
    if (revisar) { try { await fetch('/api/dealer-incorporacion/fichas/'+id+'/marcar-revisada',{method:'POST',headers:H}); } catch(_){} }
  } catch(e){ toast(e.message,true); }
}

// Barra superior de "Revisar": informe DealerNet (HTML) por entidad + UN solo botón Reporte IA.
function barraInformes(f){
  const ents = [{ tag:'Empresa', nombre: f.nombre_razon||f.rut||'Empresa', rut: f.rut }];
  let socs = f.socios; if(typeof socs==='string'){ try{ socs=JSON.parse(socs); }catch{ socs=[]; } }
  (Array.isArray(socs)?socs:[]).slice(0,3).forEach((s,i)=>{ if(s&&s.rut) ents.push({ tag:'Socio '+(i+1), nombre:s.nombre||s.rut, rut:s.rut }); });
  window._revEnts = ents;   // lo usa el botón único de Reporte IA
  const filas = ents.map(e=>{
    const rut = escH(e.rut||'');
    return `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:7px">
      <span style="font-size:.8rem;color:#0f172a;min-width:170px"><b>${escH(e.tag)}</b> · ${escH(e.nombre||'')} <span style="color:#94a3b8">${rut||'—'}</span></span>
      ${e.rut
        ? `<button class="btn btn-light btn-sm" onclick="window.open('/dealernet-informes/?rut='+encodeURIComponent('${rut}'),'_blank')"><i class="bi bi-clipboard-data"></i> Informe DealerNet</button>`
        : '<span style="font-size:.78rem;color:#94a3b8">sin RUT</span>'}
    </div>`;
  }).join('');
  return `<div style="margin-bottom:14px;border:1px solid #dbeafe;background:#eff6ff;border-radius:10px;padding:12px 14px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <b style="color:#1e40af;font-size:.82rem"><i class="bi bi-search me-1"></i>Revisar informes</b>
      <button class="btn btn-sm" style="background:#fdf3ee;border:1px solid #f2d3c4;color:#c2410c" onclick="verReportesIA()"><i class="bi bi-stars"></i> Reporte IA</button>
    </div>
    <div style="margin-top:9px">${filas||'<span style="font-size:.8rem;color:#94a3b8">Sin RUT de empresa ni socios.</span>'}</div></div>`;
}

// Reporte IA: usa el componente compartido AF_REP_IA (mismo formato en TODAS las pantallas).
function verReportesIA(){ if(window.AF_REP_IA) AF_REP_IA.abrir(window._revEnts||[]); else toast('Reporte IA no disponible', true); }

async function accion(id, path, body, okMsg){
  try {
    const r=await fetch('/api/dealer-incorporacion/fichas/'+id+'/'+path,{method:'POST',headers:H,body:JSON.stringify(body||{})});
    const j=await r.json(); if(!j.success) throw new Error(j.error);
    toast(okMsg); await cargar();
  } catch(e){ toast(e.message,true); }
}
const tomar   = id => accion(id,'tomar',{},'Ficha tomada — el resto del pool ya no la verá pendiente.');
function autorizar(id){
  const f = FICHAS.find(x=>x.id===id) || {};
  const esp = f.part_especial && (f.nivel_actual_permiso==='dealer_part_especial');
  const msg = esp
    ? '⭐ Vas a autorizar la PARTICIPACIÓN ESPECIAL (comisión sobre la pizarra).\nQuedará registrado: "aprobada por '+((yo?.nombre||'')+' '+(yo?.apellido||'')).trim()+'". ¿Confirmar?'
    : '¿Autorizar este nivel de la ficha?';
  if(confirm(msg)) accion(id,'autorizar',{},'Nivel autorizado ✓.');
}
function cerrar(id){
  if(confirm('¿Cerrar la ficha firmada y crear/actualizar el dealer en el sistema?'))
    accion(id,'cerrar',{},'Dealer creado/actualizado ✓ (se notificó al ejecutivo).');
}
function rechazar(id){
  const m=prompt('Motivo del rechazo (obligatorio, mínimo 5 caracteres):'); if(m==null) return;
  if(m.trim().length<5){ toast('Motivo demasiado corto.',true); return; }
  accion(id,'rechazar',{motivo:m.trim()},'Ficha rechazada (se notificó al ejecutivo).');
}
async function eliminar(id){
  if(!confirm('¿Eliminar esta ficha?')) return;
  try{ const r=await fetch('/api/dealer-incorporacion/fichas/'+id,{method:'DELETE',headers:H}); const j=await r.json(); if(!j.success)throw new Error(j.error); toast('Eliminada'); await cargar(); }catch(e){ toast(e.message,true); }
}

/* ── Editar dealer vigente ── */
function editarDealer(id){
  const d=DEALERS.find(x=>x.id_dealer===id); if(!d) return;
  $('d_id').value=d.id_dealer;
  const set=(k,v)=>{ $('d_'+k).value = v==null?'':v; };
  ['rut','nombre_razon','nombre_indexa','ccs_parque','direccion','contacto','telefono','correo','banco','num_cuenta','rut_pago','observaciones'].forEach(k=>set(k,d[k]));
  $('d_activo').value = d.activo?'1':'0'; $('d_tiene_factura').value = d.tiene_factura?'1':'0';
  // Comisión pactada del dealer (solo lectura) + sello de participación especial
  const pc = v => (v==null||v==='')?'—':(Number(v)+'%');
  const th = 'style="background:#f8fafc;padding:6px;border:1px solid #e5e7eb"', td = 'style="padding:7px;border:1px solid #e5e7eb"';
  $('d_com_tabla').innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:.82rem;text-align:center">
    <thead><tr><th ${th}>6 a 12</th><th ${th}>13 a 24</th><th ${th}>25 a 36</th><th ${th}>37 y +</th></tr></thead>
    <tbody><tr><td ${td}><b>${pc(d.com_6_12)}</b></td><td ${td}><b>${pc(d.com_13_24)}</b></td><td ${td}><b>${pc(d.com_25_36)}</b></td><td ${td}><b>${pc(d.com_37)}</b></td></tr></tbody></table>`
    + (d.part_especial_por?`<div style="margin-top:6px;font-size:.78rem;color:#5b21b6"><i class="bi bi-patch-check-fill me-1"></i>Participación especial aprobada por <b>${escH(d.part_especial_por)}</b></div>`:'');
  dlgDealer.showModal();
}
async function guardarDealer(){
  const id=$('d_id').value;
  const body={ numero_ind:DEALERS.find(x=>x.id_dealer==id)?.numero_ind||null,
    rut:$('d_rut').value.trim(), nombre_razon:$('d_nombre_razon').value.trim(), nombre_indexa:$('d_nombre_indexa').value.trim(),
    ccs_parque:$('d_ccs_parque').value.trim(), direccion:$('d_direccion').value.trim(),
    fecha_incorporacion:DEALERS.find(x=>x.id_dealer==id)?.fecha_incorporacion||null,
    contacto:$('d_contacto').value.trim(), telefono:$('d_telefono').value.trim(), correo:$('d_correo').value.trim(),
    num_cuenta:$('d_num_cuenta').value.trim(), banco:$('d_banco').value.trim(), rut_pago:$('d_rut_pago').value.trim(),
    activo:+$('d_activo').value, tiene_factura:+$('d_tiene_factura').value, observaciones:$('d_observaciones').value.trim() };
  try{ const r=await fetch('/api/dealers/'+id,{method:'PUT',headers:H,body:JSON.stringify(body)}); const j=await r.json(); if(!j.success)throw new Error(j.error);
    toast('Dealer actualizado ✓'); dlgDealer.close(); await cargar(); }catch(e){ toast(e.message,true); }
}

init();
