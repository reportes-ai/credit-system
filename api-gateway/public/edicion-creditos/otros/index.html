<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edición Otros Créditos — AutoFácil</title>
  <!-- v1.1 -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/edicion-creditos/edicion-page.css">
  <script>window.EDICION_TIPO='otros';</script>
</head>
<body>
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav">
      <a href="/">Inicio</a><span>›</span>
      <a href="/edicion-creditos/">Edición Créditos</a><span>›</span>
      <span style="color:#fff;font-weight:600">Otros Créditos</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="user-chip"><div class="avatar" id="avatarInicial">?</div><div><div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div><div class="perfil-badge" id="navPerfil">—</div></div></div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="toolbar">
  <div id="colSearchWrap" style="position:relative">
    <input id="colSearch" type="text" placeholder="🔍 Buscar columna…" autocomplete="off"
      oninput="buscarColumna(this.value)" onkeydown="navColDropdown(event)">
    <div id="colDropdown" style="display:none;position:absolute;top:100%;left:0;background:#fff;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);min-width:240px;max-height:280px;overflow-y:auto;z-index:500;margin-top:4px"></div>
  </div>
  <span id="ed-loading" style="display:none;font-size:.8rem;color:#64748b"><i class="bi bi-arrow-repeat spin me-1"></i>Cargando…</span>
</div>

<div id="tableScroll" class="table-scroll">
  <table class="ed-tbl">
    <thead id="ed-thead"></thead>
    <tbody id="ed-tbody"><tr><td colspan="99" style="text-align:center;color:#94a3b8;padding:28px">Cargando…</td></tr></tbody>
  </table>
</div>

<div class="pag" id="ed-pag"></div>
<div id="ed-toast"></div>

<script src="/js/app-version.js"></script>
<script src="/edicion-creditos/edicion-page.js"></script>
</body>
</html>
