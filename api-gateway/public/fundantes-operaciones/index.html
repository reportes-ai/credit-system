<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seguimiento Fundantes — Operaciones</title>
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; --green:#15803d; --red:#dc2626; --amber:#b45309; }
    * { box-sizing:border-box; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; color:#1e293b; }
    .page { max-width:none; margin:0; padding:24px 28px 80px; }
    .page-banner { background:linear-gradient(135deg,#012d70,#0141A2 50%,#009AFE); border-radius:16px; color:#fff; padding:20px 28px; margin-bottom:18px; display:flex; align-items:center; gap:18px; }
    .page-banner i { font-size:2.2rem; opacity:.85; }
    .page-banner h2 { font-weight:800; margin:0 0 3px; font-size:1.25rem; }
    .page-banner p { opacity:.85; margin:0; font-size:.86rem; }

    .bar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:14px; }
    .bar .cnt { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.07); padding:10px 16px; font-size:.86rem; font-weight:700; color:var(--navy); }
    .bar .cnt b { font-size:1.25rem; }
    .bar select { border:1.5px solid #d1d5db; border-radius:9px; padding:8px 12px; font-size:.83rem; font-weight:600; color:#334155; background:#fff; }

    .table-wrap { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); overflow:auto; }
    table.grid { width:100%; border-collapse:collapse; font-size:.83rem; white-space:nowrap; }
    table.grid thead tr { background:var(--navy); color:#fff; }
    table.grid thead th { padding:10px 12px; font-weight:600; font-size:.68rem; letter-spacing:.3px; text-transform:uppercase; text-align:left; }
    table.grid tbody tr { border-bottom:1px solid #f1f5f9; } table.grid tbody tr:hover { background:#f8fafc; }
    table.grid tbody td { padding:8px 12px; vertical-align:middle; }
    .td-op { font-weight:800; color:var(--navy); font-family:monospace; }
    .dias-pill { display:inline-block; border-radius:20px; padding:2px 9px; font-size:.72rem; font-weight:800; }
    .d0 { background:#dcfce7; color:#166534; } .d1 { background:#fef9c3; color:#854d0e; } .d2 { background:#fed7aa; color:#9a3412; } .d3 { background:#fecaca; color:#991b1b; }
    .btn-rev { background:linear-gradient(135deg,#0255c5,#0141A2); color:#fff; border:none; border-radius:8px; padding:6px 14px; font-size:.78rem; font-weight:800; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
    .empty { text-align:center; color:#94a3b8; padding:48px 0; } .empty i { font-size:2.2rem; display:block; margin-bottom:8px; opacity:.5; }

    /* Modal revisar (visor live) */
    .ov { position:fixed; inset:0; background:rgba(15,23,42,.65); z-index:500; display:none; align-items:center; justify-content:center; padding:14px; }
    .ov.open { display:flex; }
    .rev { background:#fff; border-radius:14px; width:min(1080px,100%); height:92vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 24px 60px rgba(0,0,0,.35); }
    .rev-head { background:linear-gradient(135deg,var(--navy-dark),var(--navy-light)); color:#fff; padding:13px 18px; display:flex; align-items:center; justify-content:space-between; }
    .rev-head h5 { margin:0; font-size:1rem; font-weight:800; } .rev-head .sub { font-size:.78rem; opacity:.85; }
    .rev-x { background:rgba(255,255,255,.15); border:none; color:#fff; border-radius:7px; width:30px; height:30px; cursor:pointer; font-size:1.15rem; }
    .rev-body { flex:1; display:flex; min-height:0; }
    .rev-side { width:220px; border-right:1px solid #e5e7eb; overflow-y:auto; background:#f8fafc; padding:10px; }
    .doc-tab { display:flex; align-items:center; gap:8px; padding:9px 11px; border-radius:9px; font-size:.8rem; font-weight:700; color:#475569; cursor:pointer; margin-bottom:6px; border:1.5px solid transparent; }
    .doc-tab:hover { background:#eef2f7; } .doc-tab.active { background:#fff; border-color:#bfdbfe; color:var(--navy); }
    .doc-tab.faltante { color:#b91c1c; cursor:default; opacity:.7; }
    .rev-view { flex:1; background:#1e293b; display:flex; align-items:center; justify-content:center; position:relative; }
    .rev-view iframe { width:100%; height:100%; border:none; background:#fff; }
    .rev-view .ph { color:#cbd5e1; text-align:center; font-size:.9rem; }
    .rev-nav { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,.85); border:none; width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:1.3rem; color:var(--navy); display:flex; align-items:center; justify-content:center; }
    .rev-nav.prev { left:12px; } .rev-nav.next { right:12px; }
    .rev-foot { padding:12px 18px; border-top:1px solid #e5e7eb; background:#f8fafc; display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; }
    .btn { border:none; border-radius:9px; padding:9px 18px; font-size:.86rem; font-weight:800; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
    .btn-dl { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
    .btn-ap { background:linear-gradient(135deg,#16a34a,#15803d); color:#fff; }
    .btn-rc { background:linear-gradient(135deg,#dc2626,#991b1b); color:#fff; }
    .btn-sec { background:#eef2f7; color:#334155; }

    .ov2 { position:fixed; inset:0; background:rgba(15,23,42,.6); z-index:520; display:none; align-items:center; justify-content:center; padding:16px; }
    .ov2.open { display:flex; }
    .box { background:#fff; border-radius:14px; width:min(460px,100%); box-shadow:0 24px 60px rgba(0,0,0,.3); overflow:hidden; }
    .box-head { background:linear-gradient(135deg,#dc2626,#991b1b); color:#fff; padding:14px 18px; font-weight:800; }
    .box-body { padding:16px 18px; } .box-body label { font-size:.8rem; font-weight:700; color:#475569; display:block; margin-bottom:6px; }
    .txta { width:100%; border:1.5px solid #d1d5db; border-radius:8px; padding:9px 12px; font-size:.88rem; font-family:inherit; resize:vertical; }
    .box-foot { padding:12px 18px; border-top:1px solid #e5e7eb; background:#f8fafc; display:flex; gap:10px; justify-content:flex-end; }
    .modal-err { background:#fef2f2; border:1.5px solid #fca5a5; color:#991b1b; border-radius:8px; padding:8px 12px; font-size:.8rem; font-weight:600; margin-top:10px; display:none; }
    .toast { position:fixed; bottom:26px; left:50%; transform:translateX(-50%); padding:11px 26px; border-radius:10px; font-size:.9rem; font-weight:700; z-index:600; display:none; box-shadow:0 8px 24px rgba(0,0,0,.25); }
    .toast.ok { background:#15803d; color:#fff; } .toast.err { background:#991b1b; color:#fff; }
  </style>
</head>
<body>

<div id="af-topnav"></div>
<script>
  window.AF_TOPNAV = { breadcrumb: [
    { label:'Inicio', href:'/' },
    { label:'Seguimiento Fundantes', href:'/fundantes/' },
    { label:'Operaciones', icon:'bi-inboxes', current:true }
  ] };
</script>

<div class="page">
  <div class="page-banner">
    <i class="bi bi-inboxes"></i>
    <div>
      <h2>Seguimiento Fundantes — Operaciones</h2>
      <p>Fundantes enviados a validación. Revísalos 1 a 1, descárgalos y aprueba o rechaza.</p>
    </div>
  </div>

  <div class="bar">
    <div class="cnt"><b id="cnt">0</b> operaciones por validar</div>
    <select id="fEjec" onchange="F.ejecutivo=this.value;cargar()"><option value="">Todos los ejecutivos</option></select>
    <select id="fFin" onchange="F.financiera=this.value;cargar()">
      <option value="">Todas las financieras</option>
      <option value="AUTOFIN">AUTOFIN</option>
      <option value="UNIDAD DE CREDITO">UNIDAD</option>
    </select>
  </div>

  <div style="margin:0 0 12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <div style="position:relative;flex:0 0 340px;max-width:100%">
      <i class="bi bi-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94a3b8"></i>
      <input id="buscarOp" placeholder="Buscar por N° OP o ID Financiera…" oninput="buscar()" autocomplete="off"
        style="width:100%;padding:9px 30px 9px 34px;border:1px solid #cbd5e1;border-radius:9px;font-size:.9rem;box-sizing:border-box">
      <i id="buscarClear" class="bi bi-x-circle" onclick="document.getElementById('buscarOp').value='';buscar()" style="display:none;position:absolute;right:11px;top:50%;transform:translateY(-50%);color:#94a3b8;cursor:pointer"></i>
    </div>
    <span id="buscarCount" style="font-size:.82rem;color:#64748b"></span>
  </div>

  <div class="table-wrap" id="tableWrap"><div class="empty"><i class="bi bi-hourglass-split"></i>Cargando…</div></div>
</div>

<!-- Modal revisar (visor live 1 a 1) -->
<div class="ov" id="ovRev">
  <div class="rev">
    <div class="rev-head">
      <div><h5 id="revTit">Revisar fundantes</h5><div class="sub" id="revSub"></div></div>
      <button class="rev-x" onclick="cerrarRev()">&times;</button>
    </div>
    <div class="rev-body">
      <div class="rev-side" id="revSide"></div>
      <div class="rev-view" id="revView">
        <button class="rev-nav prev" onclick="navDoc(-1)">‹</button>
        <div class="ph" id="revPh">Selecciona un documento</div>
        <button class="rev-nav next" onclick="navDoc(1)">›</button>
      </div>
    </div>
    <div class="rev-foot">
      <button class="btn btn-dl" onclick="descargarTodos()"><i class="bi bi-folder-symlink"></i> Descargar Todos</button>
      <button class="btn btn-rc" onclick="abrirRc()"><i class="bi bi-x-octagon"></i> Rechazar</button>
      <button class="btn btn-ap" onclick="aprobar()"><i class="bi bi-check2-circle"></i> Aprobar Fundantes</button>
    </div>
  </div>
</div>

<!-- Modal rechazo -->
<div class="ov2" id="ovRc">
  <div class="box">
    <div class="box-head">Rechazar fundantes</div>
    <div class="box-body">
      <label>Comentario (obligatorio) — indica qué debe corregir el ejecutivo</label>
      <textarea class="txta" id="rcTxt" rows="4" placeholder="Ej: el contrato de compraventa no viene firmado…"></textarea>
      <div class="modal-err" id="rcErr"></div>
    </div>
    <div class="box-foot">
      <button class="btn btn-sec" onclick="cerrarRc()">Cancelar</button>
      <button class="btn btn-rc" id="rcOk" onclick="confirmarRc()">Rechazar y avisar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/auth-guard.js"></script>
<script>
const token = sessionStorage.getItem('token');
const yo = JSON.parse(sessionStorage.getItem('usuario') || 'null');
if (!token || !yo) location.href = '/login.html';
const API = (p, o = {}) => fetch(p, { headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' }, ...o });
const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const opNum = v => String(v == null ? '' : v).replace(/\./g,'');
const fmtF = f => { if (!f) return '—'; try { return new Date(f).toLocaleDateString('es-CL',{timeZone:'UTC',day:'2-digit',month:'2-digit',year:'numeric'}); } catch { return '—'; } };
function toast(m, ok){ const t=document.getElementById('toast'); t.textContent=m; t.className='toast '+(ok?'ok':'err'); t.style.display='block'; setTimeout(()=>t.style.display='none',4000); }
const diasCls = d => d<=7?'d0':d<=15?'d1':d<=30?'d2':'d3';

let DATA = [], F = { ejecutivo:'', financiera:'', q:'' }, ACT = null, DOCS = [], IDX = 0;
const _urls = {};   // cache de objectURL por doc_id

async function cargar(){
  const wrap = document.getElementById('tableWrap');
  wrap.innerHTML = `<div class="empty"><i class="bi bi-hourglass-split"></i>Cargando…</div>`;
  const qs = new URLSearchParams({ estado:'ENVIADO' });
  if (F.ejecutivo) qs.set('ejecutivo', F.ejecutivo);
  if (F.financiera) qs.set('financiera', F.financiera);
  if (F.q) qs.set('q', F.q);
  try {
    const j = await (await API('/api/fundantes-seguimiento?' + qs.toString())).json();
    if (!j.success) throw new Error(j.error||'Error');
    DATA = j.data || [];
    document.getElementById('cnt').textContent = DATA.length;
    // poblar selector de ejecutivos (una vez)
    const sel = document.getElementById('fEjec');
    if (sel.options.length <= 1 && (j.ejecutivos||[]).length) {
      sel.innerHTML = `<option value="">Todos los ejecutivos</option>` + j.ejecutivos.map(e=>`<option value="${esc(e)}">${esc(e)}</option>`).join('');
      sel.value = F.ejecutivo;
    }
    pintar();
  } catch(e){ wrap.innerHTML = `<div class="empty"><i class="bi bi-x-octagon"></i>${esc(e.message)}</div>`; }
}

// Filtra DATA por el buscador (N° OP o ID Financiera). Vacío = todo.
// Búsqueda server-side (busca en TODA la base, no solo lo cargado). Debounce.
let _buscarT = null;
function buscar(){
  const v = (document.getElementById('buscarOp')?.value || '').trim();
  const cl = document.getElementById('buscarClear'); if (cl) cl.style.display = v ? '' : 'none';
  clearTimeout(_buscarT);
  _buscarT = setTimeout(() => { if (F.q !== v) { F.q = v; cargar(); } }, 350);
}
function pintar(){
  const wrap = document.getElementById('tableWrap');
  const rows = DATA;
  const cnt = document.getElementById('buscarCount');
  if (cnt) cnt.textContent = F.q ? `${rows.length} resultado${rows.length===1?'':'s'}` : '';
  if (!rows.length){
    wrap.innerHTML = F.q
      ? `<div class="empty"><i class="bi bi-search"></i>Sin coincidencias para "${esc(F.q)}".</div>`
      : `<div class="empty"><i class="bi bi-inbox"></i>No hay fundantes pendientes de validar.</div>`;
    return;
  }
  const body = rows.map(r => {
    const subidos = (r.docs||[]).filter(d=>d.subido).length;
    return `<tr>
      <td>${esc(r.ejecutivo||'—')}</td>
      <td class="td-op">${esc(opNum(r.num_op))}</td>
      <td>${esc(r.financiera||'—')}</td>
      <td>${esc(r.id_financiera||'—')}</td>
      <td>${fmtF(r.fecha_otorgado)}</td>
      <td><span class="dias-pill ${diasCls(r.dias)}">${r.dias} d</span></td>
      <td>${subidos} doc${subidos===1?'':'s'}</td>
      <td><button class="btn-rev" onclick="abrirRev(${r.id_credito})"><i class="bi bi-eye"></i> Revisar</button></td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table class="grid"><thead><tr>
    <th>Ejecutivo Comercial</th><th>N° Op</th><th>Financiera</th><th>ID Financiera</th>
    <th>Fecha Otorgado</th><th>Días</th><th>Docs</th><th></th></tr></thead><tbody>${body}</tbody></table>`;
}

/* ── Visor live ── */
function abrirRev(idCredito){
  ACT = DATA.find(r => r.id_credito === idCredito); if (!ACT) return;
  DOCS = (ACT.docs||[]).filter(d => d.subido);
  IDX = 0;
  document.getElementById('revTit').textContent = `OP ${opNum(ACT.num_op)} · ${ACT.financiera||''}`;
  document.getElementById('revSub').textContent = `${ACT.ejecutivo||''} · ID ${ACT.id_financiera||'—'} · ${DOCS.length} documento(s)`;
  // lista lateral: todos los requeridos (faltantes en rojo)
  document.getElementById('revSide').innerHTML = (ACT.docs||[]).map(d => {
    if (!d.subido) return `<div class="doc-tab faltante"><i class="bi bi-dash-circle"></i>${esc(d.nombre)}</div>`;
    const i = DOCS.indexOf(d);
    return `<div class="doc-tab" id="dt_${i}" onclick="mostrar(${i})"><i class="bi bi-file-earmark-text"></i>${esc(d.nombre)}</div>`;
  }).join('');
  document.getElementById('ovRev').classList.add('open');
  if (DOCS.length) mostrar(0); else document.getElementById('revPh').textContent = 'Sin documentos subidos';
}
async function mostrar(i){
  if (i<0 || i>=DOCS.length) return;
  IDX = i;
  document.querySelectorAll('.doc-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('dt_'+i)?.classList.add('active');
  const view = document.getElementById('revView');
  const d = DOCS[i];
  let url = _urls[d.doc_id];
  if (!url) {
    try {
      const r = await API(`/api/fundantes-seguimiento/doc/${d.doc_id}/download`);
      if (!r.ok) throw 0;
      url = URL.createObjectURL(await r.blob()); _urls[d.doc_id] = url;
    } catch(_) { view.querySelector('#revPh')?.remove(); return; }
  }
  view.querySelectorAll('iframe,.ph').forEach(el=>el.remove());
  const ph = document.createElement('div'); ph.className='ph'; ph.id='revPh';
  const ifr = document.createElement('iframe'); ifr.src = url;
  view.appendChild(ifr); view.appendChild(ph); ph.style.display='none';
}
function navDoc(dir){ if (DOCS.length) mostrar((IDX + dir + DOCS.length) % DOCS.length); }
function cerrarRev(){ document.getElementById('ovRev').classList.remove('open'); Object.values(_urls).forEach(u=>URL.revokeObjectURL(u)); for(const k in _urls) delete _urls[k]; ACT=null; }
function descargarTodos(){ if (ACT) window.open(`/api/fundantes-seguimiento/${ACT.id_credito}/zip?token=${encodeURIComponent(token)}`, '_blank'); }

async function aprobar(){
  if (!ACT) return;
  if (!confirm(`¿Aprobar los fundantes de la OP ${opNum(ACT.num_op)}? La operación quedará CERRADA.`)) return;
  try {
    const j = await (await API(`/api/fundantes-seguimiento/${ACT.id_credito}/validar`, { method:'POST', body: JSON.stringify({ accion:'aprobar' }) })).json();
    if (!j.success) throw new Error(j.error||'Error');
    cerrarRev(); toast('Aprobado — operación cerrada', true); cargar();
  } catch(e){ toast(e.message, false); }
}
function abrirRc(){ document.getElementById('rcTxt').value=''; document.getElementById('rcErr').style.display='none'; document.getElementById('ovRc').classList.add('open'); }
function cerrarRc(){ document.getElementById('ovRc').classList.remove('open'); }
async function confirmarRc(){
  const txt = document.getElementById('rcTxt').value.trim(), err = document.getElementById('rcErr');
  if (!txt){ err.textContent='El comentario es obligatorio.'; err.style.display='block'; return; }
  if (!ACT) return;
  try {
    const j = await (await API(`/api/fundantes-seguimiento/${ACT.id_credito}/validar`, { method:'POST', body: JSON.stringify({ accion:'rechazar', comentario:txt }) })).json();
    if (!j.success) throw new Error(j.error||'Error');
    cerrarRc(); cerrarRev(); toast('Rechazado — se avisó al ejecutivo', true); cargar();
  } catch(e){ err.textContent=e.message; err.style.display='block'; }
}

cargar();
</script>
<script src="/js/topnav.js"></script>
<script src="/js/app-version.js"></script>
</body>
</html>
