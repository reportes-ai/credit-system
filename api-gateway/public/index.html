<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoFácil — Crédito Automotriz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="/js/orden-toast.js"></script>
  <style>
    :root { --navy: #0141A2; --navy-dark: #012d70; --navy-light: #0255c5; --accent: #009AFE; --bg: #f0f4f8; }
    body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; min-height: 100vh; }

    /* ── TOPNAV ── */
    .topnav {
      background: linear-gradient(90deg, var(--navy-dark), var(--navy-light));
      color: #fff; height: 60px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .topnav-left { display: flex; align-items: center; gap: 32px; }
    .topnav-brand img { height: 34px; filter: brightness(0) invert(1); }
    .version-badge { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.75); font-size: 0.65rem; font-weight: 700; border-radius: 6px; padding: 2px 8px; letter-spacing: 0.5px; margin-left: 2px; }

    /* ── NAV LINKS ── */
    .topnav-menu { display: flex; align-items: center; gap: 4px; }
    .nav-item { position: relative; }
    .nav-link-btn {
      background: none; border: none; color: rgba(255,255,255,0.85);
      padding: 8px 14px; border-radius: 8px; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .nav-link-btn:hover, .nav-link-btn.open { background: rgba(255,255,255,0.15); color: #fff; }
    .nav-link-btn i.arrow { font-size: 0.7rem; transition: transform 0.2s; }
    .nav-link-btn.open i.arrow { transform: rotate(180deg); }

    .nav-dropdown {
      position: absolute; top: calc(100% + 8px); left: 0;
      background: #fff; border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      min-width: 180px; padding: 6px;
      display: none; z-index: 999;
      animation: dropIn 0.15s ease;
    }
    @keyframes dropIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    .nav-dropdown.show { display: block; }
    .nav-dropdown a {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; border-radius: 7px;
      color: #1e293b; font-size: 0.87rem; font-weight: 500;
      text-decoration: none; transition: background 0.12s;
    }
    .nav-dropdown a:hover { background: #eef2ff; color: var(--navy); }
    .nav-dropdown a i { color: var(--navy); font-size: 1rem; width: 18px; }
    .nav-dropdown-divider { height: 1px; background: #f1f5f9; margin: 4px 0; }

    /* ── USER / LOGOUT ── */
    .topnav-right { display: flex; align-items: center; gap: 12px; }
    .user-chip {
      background: rgba(255,255,255,0.12); border-radius: 24px;
      padding: 5px 12px; display: flex; align-items: center; gap: 8px; font-size: 0.85rem;
    }
    .avatar { width: 28px; height: 28px; background: #90caf9; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--navy); font-weight: 700; font-size: 0.75rem; }
    .perfil-badge { background: rgba(144,202,249,0.2); border: 1px solid rgba(144,202,249,0.4); color: #90caf9; border-radius: 12px; padding: 2px 10px; font-size: 0.73rem; font-weight: 600; }
    .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 5px 12px; font-size: 0.82rem; cursor: pointer; transition: background 0.2s; }
    .btn-logout:hover { background: rgba(255,255,255,0.22); }

    /* ── CLIMA WIDGET ── */
    .clima-widget {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px; padding: 5px 12px; font-size: 0.82rem; color: rgba(255,255,255,0.92);
      cursor: default; white-space: nowrap; user-select: none;
    }
    .clima-widget .clima-icon { font-size: 1.15rem; line-height: 1; }
    .clima-widget .clima-temp { font-weight: 700; font-size: 0.95rem; }
    .clima-widget .clima-rango { color: rgba(255,255,255,0.65); font-size: 0.75rem; }
    .clima-widget .clima-ciudad { color: rgba(255,255,255,0.6); font-size: 0.72rem; }
    .clima-sep { color: rgba(255,255,255,0.3); }

    /* ── CONTENT ── */
    .main-content { padding: 36px 40px; max-width: 1500px; margin: 0 auto; }
    .welcome-banner {
      background: linear-gradient(135deg, #012d70, #0141A2 50%, #009AFE);
      border-radius: 16px; color: #fff; padding: 32px 40px; margin-bottom: 36px;
      position: relative; overflow: hidden;
    }
    .welcome-banner::after { content: '\F5D5'; font-family: 'bootstrap-icons'; position: absolute; right: 32px; top: 50%; transform: translateY(-50%); font-size: 7rem; opacity: 0.07; }
    .welcome-banner h2 { font-weight: 700; margin: 0 0 6px; font-size: 1.6rem; }
    .welcome-banner p { opacity: 0.8; margin: 0; font-size: 0.95rem; }
    .section-title { font-weight: 700; font-size: 0.85rem; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
    .modules-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
    .module-card { background: #fff; border-radius: 14px; padding: 28px 24px; cursor: pointer; text-decoration: none; color: inherit; border: 2px solid transparent; transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s; display: block; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .module-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(1,65,162,0.15); border-color: var(--navy); color: inherit; }
    .card-icon { width: 52px; height: 52px; border-radius: 14px; background: linear-gradient(135deg, #e8eaf6, #c5cae9); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: var(--navy); margin-bottom: 16px; transition: background 0.18s, color 0.18s; }
    .module-card:hover .card-icon { background: linear-gradient(135deg, var(--navy), var(--accent)); color: #fff; }
    .module-card h6 { font-weight: 700; font-size: 0.95rem; margin: 0 0 6px; color: #111827; }
    .module-card p { font-size: 0.8rem; color: #6b7280; margin: 0 0 18px; line-height: 1.4; }
    .btn-acceder { background: var(--navy); color: #fff; border: none; border-radius: 8px; padding: 7px 16px; font-size: 0.82rem; font-weight: 600; }
    .module-card:hover .btn-acceder { background: var(--accent); }
    @media (max-width: 900px) { .modules-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 640px) { .main-content { padding: 20px 16px; } .welcome-banner { padding: 24px 20px; } .topnav-menu { display: none; } .modules-grid { grid-template-columns: repeat(2, 1fr); } }

    /* ── CINTA NOTICIAS ── */
    .news-ticker {
      background: linear-gradient(90deg, #012d70, #013a8a);
      border-bottom: 1px solid rgba(0,154,254,0.25);
      height: 28px; display: flex; align-items: center;
      overflow: hidden; position: sticky; top: 60px; z-index: 199;
    }
    .news-label {
      background: #009AFE; color: #fff;
      font-size: 0.68rem; font-weight: 800; letter-spacing: 1px;
      padding: 0 12px; height: 100%; display: flex; align-items: center;
      white-space: nowrap; flex-shrink: 0; text-transform: uppercase;
    }
    .news-track-wrap {
      flex: 1; overflow: hidden; position: relative; height: 100%;
    }
    .news-track {
      display: flex; align-items: center; gap: 0;
      height: 100%; white-space: nowrap;
      animation: tickerScroll 60s linear infinite;
      will-change: transform;
    }
    .news-track:hover { animation-play-state: paused; }
    @keyframes tickerScroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .news-item {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 0 28px; font-size: 0.76rem; color: #bfdbfe;
      cursor: pointer; transition: color 0.15s;
    }
    .news-item:hover { color: #fff; }
    .news-item .news-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: #60a5fa; flex-shrink: 0;
    }
    .news-item .news-src {
      color: #60a5fa; font-weight: 700; font-size: 0.68rem;
      text-transform: uppercase; margin-right: 2px;
    }

    /* ── REORDENAR ── */
    .btn-reordenar { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); color: #fff; border-radius: 8px; padding: 5px 13px; font-size: 0.82rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
    .btn-reordenar:hover { background: rgba(255,255,255,0.22); }
    .btn-reordenar.activo { background: #f59e0b; border-color: #f59e0b; color: #fff; }
    .reorder-hint { font-size: 0.78rem; color: #f59e0b; font-weight: 600; margin-left: 8px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .modules-grid.sortable-mode .module-card { cursor: grab; border: 2px dashed #d1d5db; }
    .modules-grid.sortable-mode .module-card:hover { border-color: var(--navy); transform: none; box-shadow: 0 4px 16px rgba(1,65,162,0.12); }
    .modules-grid.sortable-mode .module-card.sortable-chosen { cursor: grabbing; box-shadow: 0 12px 40px rgba(1,65,162,0.3); border-color: var(--navy); transform: scale(1.03); opacity: 0.95; }
    .modules-grid.sortable-mode .module-card.sortable-ghost { opacity: 0.3; }
    .drag-handle { position: absolute; top: 10px; right: 10px; color: #9ca3af; font-size: 1rem; display: none; }
    .sortable-mode .drag-handle { display: block; }
    .module-card { position: relative; }
    .btn-guardar-orden { background: #16a34a; border: none; color: #fff; border-radius: 8px; padding: 5px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer; display: none; align-items: center; gap: 6px; }
    .btn-guardar-orden:hover { background: #15803d; }

    /* ── Intro animation ── */
    body.intro-lock { overflow: hidden; }
    .module-card.intro-hidden { opacity: 0; }
  </style>
</head>
<body>

  <nav class="topnav">
    <div class="topnav-left">
      <a href="/" class="topnav-brand">
        <img src="/img/logo.png" alt="AutoFácil">
        <span class="version-badge">v5.2</span>
      </a>
    </div>

    <div class="topnav-right">
      
    <!-- Widget Clima -->
    <div class="clima-widget" id="climaWidget" title="Clima actual">
      <span class="clima-icon" id="climaIcon">⏳</span>
      <span class="clima-temp" id="climaTemp">—</span>
      <span class="clima-sep">|</span>
      <span class="clima-rango"><span id="climaMin">—</span>° / <span id="climaMax">—</span>°</span>
      <span class="clima-sep">·</span>
      <span class="clima-ciudad" id="climaCiudad">Santiago</span>
    </div>

    <a href="/dashboard" title="Dashboard Analytics" style="display:flex;align-items:center;gap:5px;color:rgba(255,255,255,0.85);text-decoration:none;font-size:12px;font-weight:500;padding:5px 10px;border:1px solid rgba(255,255,255,0.25);border-radius:6px;transition:.15s" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">
      <i class="bi bi-bar-chart-line" style="font-size:15px"></i> Dashboard
    </a>
    <div class="user-chip">
        <div class="avatar" id="avatarInicial">?</div>
        <div>
          <div style="font-weight:600; line-height:1.3; color:#fff" id="navNombre">—</div>
          <div class="perfil-badge" id="navPerfil">—</div>
        </div>
      </div>
      <button class="btn-reordenar" id="btnReordenar" onclick="toggleReordenar()" style="display:none">
        <i class="bi bi-arrows-move"></i>Reordenar
      </button>
      <button class="btn-guardar-orden" id="btnGuardarOrden" onclick="guardarOrden()">
        <i class="bi bi-floppy"></i>Guardar orden
      </button>
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
    </div>
  </nav>

  <!-- Cinta de noticias -->
  <div class="news-ticker" id="newsTicker">
    <div class="news-label">📰 Noticias</div>
    <div class="news-track-wrap">
      <div class="news-track" id="newsTrack">
        <span class="news-item"><span class="news-dot"></span>Cargando noticias...</span>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="welcome-banner">
      <h2>Bienvenido, <span id="bienvenidoNombre">—</span></h2>
      <p>Selecciona el módulo con el que deseas trabajar.</p>
    </div>
    <div class="section-title"><i class="bi bi-grid-3x3-gap-fill"></i> Módulos disponibles</div>
    <div class="modules-grid" id="modulesGrid">
      <div style="grid-column:1/-1; text-align:center; padding:40px; color:#6b7280">
        <div class="spinner-border spinner-border-sm me-2"></div>Cargando módulos...
      </div>
    </div>
  </div>

  <script src="/js/auth-guard.js"></script>
<script>
    const token = sessionStorage.getItem('token');
    const usuario = JSON.parse(sessionStorage.getItem('usuario') || 'null');
    if (!token || !usuario) { window.location.href = '/login.html'; }

    const esAdmin = usuario?.perfil === 'Administrador';
    const H = { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' };

    if (usuario) {
      const nombre = `${usuario.nombre} ${usuario.apellido || ''}`.trim();
      document.getElementById('navNombre').textContent = nombre;
      document.getElementById('navPerfil').textContent = usuario.perfil || '';
      document.getElementById('avatarInicial').textContent = nombre.charAt(0).toUpperCase();
      document.getElementById('bienvenidoNombre').textContent = usuario.nombre;
      if (esAdmin) document.getElementById('btnReordenar').style.display = 'flex';
    }

    function logout() { sessionStorage.removeItem('token'); sessionStorage.removeItem('usuario'); sessionStorage.removeItem('af_intro_done'); window.location.href = '/login.html'; }

    let sortable = null;
    let modulosData = [];
    let modoReordenar = false;

    function toggleReordenar() {
      modoReordenar = !modoReordenar;
      const grid = document.getElementById('modulesGrid');
      const btnR = document.getElementById('btnReordenar');
      const btnG = document.getElementById('btnGuardarOrden');

      if (modoReordenar) {
        grid.classList.add('sortable-mode');
        btnR.classList.add('activo');
        btnR.innerHTML = '<i class="bi bi-x-circle"></i>Cancelar';
        btnG.style.display = 'flex';
        sortable = new Sortable(grid, {
          animation: 180,
          ghostClass: 'sortable-ghost',
          chosenClass: 'sortable-chosen',
          onStart: () => { grid.querySelectorAll('.module-card').forEach(c => c.removeAttribute('href')); },
        });
      } else {
        grid.classList.remove('sortable-mode');
        btnR.classList.remove('activo');
        btnR.innerHTML = '<i class="bi bi-arrows-move"></i>Reordenar';
        btnG.style.display = 'none';
        if (sortable) { sortable.destroy(); sortable = null; }
        // Restaurar href
        grid.querySelectorAll('.module-card').forEach(card => {
          // Restaurar por data-ruta (simCard y cualquier card con ruta directa)
          if (card.dataset.ruta) { card.href = card.dataset.ruta; return; }
          // Restaurar por id de módulo
          const id = parseInt(card.dataset.id);
          const mod = modulosData.find(m => m.id_modulo === id);
          if (mod) card.href = mod.ruta || '#';
        });
      }
    }

    async function guardarOrden() {
      const btn = document.getElementById('btnGuardarOrden');
      btn.disabled = true;
      btn.textContent = 'Guardando…';
      try {
        const grid = document.getElementById('modulesGrid');
        // Guarda el orden como array de rutas (igual que mantenedores — usa config_ui)
        const ids = [...grid.querySelectorAll('.module-card[data-id]')]
          .map(c => c.dataset.id);

        const res = await fetch('/api/config/ui/dashboard', {
          method: 'PUT',
          headers: H,
          body: JSON.stringify({ valor: ids }),
        });
        const json = await res.json();
        if (json.success) {
          toggleReordenar();
          mostrarToastOrden('Orden guardado');
        } else {
          mostrarToastError('Error al guardar: ' + (json.error || res.status));
        }
      } catch(e) {
        mostrarToastError('Error al guardar: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-floppy"></i> Guardar orden';
      }
    }

    /* ══════════════════════════════════════════════════════════════
       🚀  INTRO — Tarjetas voladoras + sonido láser
       Solo se ejecuta una vez por sesión (sessionStorage flag)
    ══════════════════════════════════════════════════════════════ */
    function playLaserSound() {
      if (window._silenciarIntro) return;
      try { new Audio('/audio/bienvenido.mp3').play(); } catch(e) {}
    }

    function introAnimation() {
      const grid  = document.getElementById('modulesGrid');
      const cards = [...grid.querySelectorAll('.module-card')];
      if (!cards.length) return;

      const vw = Math.max(window.innerWidth  + 200, 1000);
      const vh = Math.max(window.innerHeight + 200,  700);

      /* Posiciones de salida: esquinas y bordes, cicladas por índice */
      const origins = [
        `translate(-${vw}px, -${vh * 0.6}px) rotate(-28deg) scale(0.35)`,
        `translate(${vw}px,  -${vh * 0.6}px) rotate( 28deg) scale(0.35)`,
        `translate(-${vw}px,  ${vh * 0.2}px) rotate( 22deg) scale(0.35)`,
        `translate(${vw}px,   ${vh * 0.2}px) rotate(-22deg) scale(0.35)`,
        `translate(-${vw * 0.5}px, -${vh}px) rotate(-18deg) scale(0.35)`,
        `translate(${vw * 0.5}px,  -${vh}px) rotate( 18deg) scale(0.35)`,
        `translate(-${vw}px,  ${vh * 0.5}px) rotate( 15deg) scale(0.35)`,
        `translate(${vw}px,   ${vh * 0.5}px) rotate(-15deg) scale(0.35)`,
        `translate(-${vw * 0.3}px, -${vh}px) rotate( 24deg) scale(0.35)`,
        `translate(${vw * 0.3}px,   ${vh}px) rotate(-24deg) scale(0.35)`,
        `translate(0px, -${vh}px)             rotate(-12deg) scale(0.35)`,
        `translate(0px,  ${vh}px)             rotate( 12deg) scale(0.35)`,
      ];

      document.body.classList.add('intro-lock');

      /* Estado inicial: fuera de pantalla */
      cards.forEach((c, i) => {
        c.style.transition = 'none';
        c.style.transform  = origins[i % origins.length];
        c.style.opacity    = '0';
      });

      /* Pequeña pausa para que el DOM pinte el estado inicial */
      requestAnimationFrame(() => requestAnimationFrame(() => {
        playLaserSound();

        cards.forEach((c, i) => {
          const dur = 0.52 + Math.random() * 0.18;
          setTimeout(() => {
            c.style.transition = `transform ${dur}s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.28s ease`;
            c.style.transform  = '';
            c.style.opacity    = '1';
          }, 80 + i * 72);
        });

        /* Limpiar estilos inline tras la animación */
        const cleanAt = 80 + (cards.length - 1) * 72 + 750;
        setTimeout(() => {
          document.body.classList.remove('intro-lock');
          cards.forEach(c => { c.style.transition = ''; c.style.transform = ''; c.style.opacity = ''; });
        }, cleanAt);
      }));
    }

    async function cargarModulos() {
      try {
        // Carga módulos y orden guardado en paralelo
        const [resp, respOrden, respPlacement] = await Promise.all([
          fetch('/api/auth/mis-permisos', { headers: H }),
          fetch('/api/config/ui/dashboard',  { headers: H }),
          fetch('/api/config/ui/placement_v2', { headers: H }),
        ]);
        if (resp.status === 401) { logout(); return; }
        const data         = await resp.json();
        const dataOrden    = await respOrden.json();
        const dataPlacement = await respPlacement.json();

        const grid = document.getElementById('modulesGrid');
        grid.innerHTML = '';
        if (!data.success || data.data.length === 0) {
          grid.innerHTML = '<p class="text-muted text-center py-5" style="grid-column:1/-1">Sin módulos asignados. Contacta al administrador.</p>';
          return;
        }
        const placement = (dataPlacement.success && dataPlacement.data && typeof dataPlacement.data === 'object') ? dataPlacement.data : {};
        const DEFAULT_OCULTAS = ['/politica/', '/carga-masiva/', '/antecedentes-laborales/', '/informacion-comercial/'];
        const normR = r => r ? (r.endsWith('/') ? r : r + '/') : r;
        // Fallback para módulos que no vienen de mis-permisos
        const HOME_FALLBACK = [
          { ruta:'/clientes/',           nombre:'Clientes',              icono:'bi-people-fill',          descripcion:'' },
          { ruta:'/cotizaciones/',       nombre:'Cotizaciones',          icono:'bi-calculator',           descripcion:'' },
          { ruta:'/creditos/',           nombre:'Créditos',              icono:'bi-credit-card-2-front',  descripcion:'' },
          { ruta:'/tesoreria/',          nombre:'Tesorería',             icono:'bi-safe2',                descripcion:'' },
          { ruta:'/crm/',                nombre:'CRM',                   icono:'bi-headset',              descripcion:'' },
          { ruta:'/cobranza/',           nombre:'Cobranza',              icono:'bi-bell-fill',            descripcion:'' },
          { ruta:'/reporteria/',         nombre:'Reportería',            icono:'bi-bar-chart-line-fill',  descripcion:'' },
          { ruta:'/politica/',           nombre:'Política',              icono:'bi-shield-lock',          descripcion:'' },
          { ruta:'/usuarios/',           nombre:'Usuarios',              icono:'bi-people',               descripcion:'' },
          { ruta:'/mantenedores/',       nombre:'Mantenedores',          icono:'bi-gear-fill',            descripcion:'' },
          { ruta:'/cartas-aprobacion/',  nombre:'Cartas de Aprobación',  icono:'bi-envelope-paper',       descripcion:'' },
          { ruta:'/comisiones/',         nombre:'Comisión Ejecutivos',   icono:'bi-cash-coin',            descripcion:'' },
          { ruta:'/carga-masiva/',       nombre:'Carga Masiva',          icono:'bi-cloud-upload',         descripcion:'' },
        ];
        // Construye mapa normalizado de todos los módulos disponibles
        const modMap = new Map();
        data.data.forEach(m => modMap.set(normR(m.ruta), m));
        HOME_FALLBACK.forEach(f => { const k = normR(f.ruta); if (!modMap.has(k)) modMap.set(k, { ...f, id_modulo: k }); });

        const isNewFmt = Object.keys(placement).some(k => Array.isArray(placement[k]));

        if (isNewFmt && Array.isArray(placement['home'])) {
          const homeOrder = placement['home'];
          const mentioned = new Set(Object.values(placement).flat().map(normR));
          // Items en el orden guardado (normaliza slash para el lookup)
          const ordered = homeOrder.map(r => modMap.get(normR(r))).filter(Boolean);
          const orderedKeys = new Set(homeOrder.map(normR));
          // Items válidos no mencionados en ninguna sección → extras
          const extras = [...modMap.values()].filter(m => {
            const k = normR(m.ruta);
            return !mentioned.has(k) && !orderedKeys.has(k) && !DEFAULT_OCULTAS.includes(k);
          });
          modulosData = [...ordered, ...extras];
        } else {
          // Formato viejo o sin config
          modulosData = [...modMap.values()].filter(m => {
            const k = normR(m.ruta);
            const sec = placement[k] || placement[m.ruta];
            if (sec) return sec === 'home';
            return !DEFAULT_OCULTAS.includes(k);
          });
        }

        // Orden guardado legacy (array de id_modulo como string) o por defecto
        const ordenGuardado = (dataOrden.success && Array.isArray(dataOrden.data)) ? dataOrden.data : null;
        const modsSorted = ordenGuardado
          ? ordenGuardado.map(id => modulosData.find(m => String(m.id_modulo) === String(id))).filter(Boolean)
              .concat(modulosData.filter(m => !ordenGuardado.includes(String(m.id_modulo))))
          : modulosData;

        // Simulador Rentabilidad — incluido en el orden si ya fue guardado, sino va primero
        const simCard = document.createElement('a');
        simCard.href = '/simulador/';
        simCard.dataset.ruta = '/simulador/';
        simCard.dataset.id = 'sim';
        simCard.className = 'module-card';
        simCard.style.cursor = 'pointer';
        simCard.addEventListener('click', (e) => { e.preventDefault(); window.location.href = '/simulador/'; });
        simCard.innerHTML = `
          <i class="bi bi-grip-vertical drag-handle"></i>
          <div class="card-icon"><i class="bi bi-calculator"></i></div>
          <h6>Simulador Rentabilidad</h6>
          <p>AutoFin y Unidad de Crédito. Calcula ingresos, comisiones y cuota en tiempo real.</p>
          <span class="btn-acceder"><i class="bi bi-arrow-right-circle me-1"></i>Acceder</span>`;

        // Si hay orden guardado con 'sim', respetarlo; si no, simCard va primero
        if (ordenGuardado && ordenGuardado.includes('sim')) {
          const allItems = [{ id_modulo: 'sim', _el: simCard },
            ...modsSorted.map(m => ({ ...m, _el: null }))];
          const reordenados = ordenGuardado
            .map(id => allItems.find(x => String(x.id_modulo) === String(id)))
            .filter(Boolean)
            .concat(allItems.filter(x => !ordenGuardado.includes(String(x.id_modulo))));
          reordenados.forEach(item => {
            if (item._el) { grid.appendChild(item._el); return; }
            const m = item;
            const a = document.createElement('a');
            a.href = m.ruta || '#'; a.className = 'module-card'; a.dataset.id = m.id_modulo;
            a.innerHTML = `<i class="bi bi-grip-vertical drag-handle"></i>
              <div class="card-icon"><i class="bi ${m.icono || 'bi-grid'}"></i></div>
              <h6>${m.nombre}</h6><p>${m.descripcion || ''}</p>
              <span class="btn-acceder"><i class="bi bi-arrow-right-circle me-1"></i>Acceder</span>`;
            grid.appendChild(a);
          });
        } else {
          grid.appendChild(simCard);
          modsSorted.forEach(mod => {
            const a = document.createElement('a');
            a.href = mod.ruta || '#'; a.className = 'module-card'; a.dataset.id = mod.id_modulo;
            a.innerHTML = `<i class="bi bi-grip-vertical drag-handle"></i>
              <div class="card-icon"><i class="bi ${mod.icono || 'bi-grid'}"></i></div>
              <h6>${mod.nombre}</h6><p>${mod.descripcion || ''}</p>
              <span class="btn-acceder"><i class="bi bi-arrow-right-circle me-1"></i>Acceder</span>`;
            grid.appendChild(a);
          });
        }

        /* 🚀 Animación: una vez por sesión */
        if (!sessionStorage.getItem('af_intro_done')) {
          sessionStorage.setItem('af_intro_done', '1');
          /* 🔊 Audio: solo la primera vez del día */
          const hoy = new Date().toISOString().slice(0, 10);
          if (localStorage.getItem('af_intro_fecha') !== hoy) {
            localStorage.setItem('af_intro_fecha', hoy);
          } else {
            // Ya sonó hoy — silenciar reemplazando la función
            window._silenciarIntro = true;
          }
          introAnimation();
        }
      } catch {
        document.getElementById('modulesGrid').innerHTML = '<p class="text-danger text-center py-4" style="grid-column:1/-1">Error al cargar módulos.</p>';
      }
    }
    cargarModulos();
  </script>
<script src="/js/app-version.js"></script>

<script>
/* ── Cinta de noticias (backend proxy /api/noticias) ────────────────── */
(async function initTicker() {
  let noticias = [];
  try {
    const r = await fetch('/api/noticias');
    const d = await r.json();
    if (d.success && d.data?.length) noticias = d.data;
  } catch { /* fallback abajo */ }

  if (!noticias.length) {
    noticias = [{ titulo: 'Sin noticias disponibles en este momento', link: '#', src: '' }];
  }

  const track = document.getElementById('newsTrack');
  const buildItems = () => noticias.map(n =>
    `<span class="news-item" onclick="${n.link !== '#' ? `window.open('${n.link}','_blank')` : ''}" title="${n.titulo.replace(/"/g,'&quot;')}">
       <span class="news-dot"></span>
       ${n.src ? `<span class="news-src">${n.src}</span>` : ''}
       ${n.titulo}
     </span>`
  ).join('');

  track.innerHTML = buildItems() + buildItems();

  const totalChars = noticias.reduce((s, n) => s + n.titulo.length, 0);
  const dur = Math.max(45, Math.min(140, totalChars * 0.20));
  track.style.animationDuration = dur + 's';
})();

/* ── Widget Clima (Open-Meteo, sin API key) ──────────────────────────── */
const WMO_ICON = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌧️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'🌨️', 73:'🌨️', 75:'❄️',
  77:'❄️',
  80:'🌦️', 81:'🌧️', 82:'⛈️',
  85:'🌨️', 86:'🌨️',
  95:'⛈️', 96:'⛈️', 99:'⛈️',
};

async function cargarClima(lat, lon, ciudad) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&daily=temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=1`;
    const r = await fetch(url);
    const d = await r.json();
    const temp  = Math.round(d.current.temperature_2m);
    const code  = d.current.weathercode;
    const tmax  = Math.round(d.daily.temperature_2m_max[0]);
    const tmin  = Math.round(d.daily.temperature_2m_min[0]);
    const icon  = WMO_ICON[code] || '🌡️';
    document.getElementById('climaIcon').textContent  = icon;
    document.getElementById('climaTemp').textContent  = temp + '°C';
    document.getElementById('climaMin').textContent   = tmin;
    document.getElementById('climaMax').textContent   = tmax;
    document.getElementById('climaCiudad').textContent = ciudad;
    document.getElementById('climaWidget').title =
      `${icon} ${temp}°C — Máx ${tmax}° / Mín ${tmin}° · ${ciudad}`;
  } catch {
    document.getElementById('climaIcon').textContent = '🌡️';
    document.getElementById('climaTemp').textContent = '—';
  }
}

async function getCiudad(lat, lon) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10`,
      { headers: { 'Accept-Language': 'es' } }
    );
    const d = await r.json();
    return d.address?.city || d.address?.town || d.address?.village || d.address?.county || 'Mi ubicación';
  } catch { return 'Mi ubicación'; }
}

function initClima() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const { latitude: lat, longitude: lon } = pos.coords;
        const ciudad = await getCiudad(lat, lon);
        cargarClima(lat, lon, ciudad);
      },
      () => cargarClima(-33.4569, -70.6483, 'Santiago'),
      { timeout: 5000 }
    );
  } else {
    cargarClima(-33.4569, -70.6483, 'Santiago');
  }
}

initClima();
</script>
