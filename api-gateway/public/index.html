<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoFácil — Crédito Automotriz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --navy: #0141A2;
      --navy-dark: #012d70;
      --navy-light: #0255c5;
      --accent: #009AFE;
      --bg: #f0f4f8;
    }
    body {
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
    }
    .topnav {
      background: linear-gradient(90deg, var(--navy-dark), var(--navy-light));
      color: #fff;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .topnav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .topnav-brand i { font-size: 1.4rem; color: #90caf9; }
    .topnav-right { display: flex; align-items: center; gap: 16px; }
    .user-chip {
      background: rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
    }
    .avatar {
      width: 28px; height: 28px;
      background: #90caf9;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--navy);
      font-weight: 700;
      font-size: 0.75rem;
    }
    .perfil-badge {
      background: rgba(144,202,249,0.2);
      border: 1px solid rgba(144,202,249,0.4);
      color: #90caf9;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .btn-logout {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.22); }
    .main-content { padding: 36px 40px; max-width: 1200px; margin: 0 auto; }
    .welcome-banner {
      background: linear-gradient(135deg, #012d70, #0141A2 50%, #009AFE);
      border-radius: 16px;
      color: #fff;
      padding: 32px 40px;
      margin-bottom: 36px;
      position: relative;
      overflow: hidden;
    }
    .welcome-banner::after {
      content: '\F5D5';
      font-family: 'bootstrap-icons';
      position: absolute;
      right: 32px; top: 50%;
      transform: translateY(-50%);
      font-size: 7rem;
      opacity: 0.07;
    }
    .welcome-banner h2 { font-weight: 700; margin: 0 0 6px; font-size: 1.6rem; }
    .welcome-banner p { opacity: 0.8; margin: 0; font-size: 0.95rem; }
    .last-access-chip {
      margin-top: 16px;
      background: rgba(255,255,255,0.12);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.8rem;
    }
    .section-title {
      font-weight: 700;
      font-size: 0.85rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }
    .module-card {
      background: #fff;
      border-radius: 14px;
      padding: 28px 24px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      border: 2px solid transparent;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      display: block;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .module-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(26,35,126,0.15);
      border-color: var(--navy);
      color: inherit;
    }
    .card-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, #e8eaf6, #c5cae9);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      color: var(--navy);
      margin-bottom: 16px;
      transition: background 0.18s, color 0.18s;
    }
    .module-card:hover .card-icon {
      background: linear-gradient(135deg, var(--navy), var(--accent));
      color: #fff;
    }
    .module-card h6 { font-weight: 700; font-size: 0.95rem; margin: 0 0 6px; color: #111827; }
    .module-card p { font-size: 0.8rem; color: #6b7280; margin: 0 0 18px; line-height: 1.4; }
    .btn-acceder {
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .module-card:hover .btn-acceder { background: var(--accent); }
    @media (max-width: 600px) {
      .main-content { padding: 20px 16px; }
      .welcome-banner { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <nav class="topnav">
    <div class="topnav-brand">
      <img src="/img/logo.png" alt="AutoFácil" style="height:36px;filter:brightness(0) invert(1);">
    </div>
    <div class="topnav-right">
      <div class="user-chip">
        <div class="avatar" id="avatarInicial">?</div>
        <div>
          <div style="font-weight:600; line-height:1.3" id="navNombre">—</div>
          <div class="perfil-badge" id="navPerfil">—</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">
        <i class="bi bi-box-arrow-right me-1"></i>Salir
      </button>
    </div>
  </nav>

  <div class="main-content">
    <div class="welcome-banner">
      <h2>Bienvenido, <span id="bienvenidoNombre">—</span></h2>
      <p>Selecciona el módulo con el que deseas trabajar.</p>
    </div>

    <div class="section-title"><i class="bi bi-grid-3x3-gap-fill"></i> Módulos disponibles</div>

    <div class="modules-grid" id="modulesGrid">
      <div style="grid-column:1/-1; text-align:center; padding:40px; color:#6b7280">
        <div class="spinner-border spinner-border-sm me-2"></div>Cargando módulos...
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const usuario = JSON.parse(localStorage.getItem('usuario') || 'null');

    if (!token || !usuario) { window.location.href = '/login.html'; }

    if (usuario) {
      const nombre = `${usuario.nombre} ${usuario.apellido || ''}`.trim();
      document.getElementById('navNombre').textContent = nombre;
      document.getElementById('navPerfil').textContent = usuario.perfil || '';
      document.getElementById('avatarInicial').textContent = nombre.charAt(0).toUpperCase();
      document.getElementById('bienvenidoNombre').textContent = usuario.nombre;
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('usuario');
      window.location.href = '/login.html';
    }

    async function cargarModulos() {
      try {
        const resp = await fetch('/api/auth/mis-permisos', {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (resp.status === 401) { logout(); return; }
        const data = await resp.json();
        const grid = document.getElementById('modulesGrid');
        grid.innerHTML = '';

        if (!data.success || data.data.length === 0) {
          grid.innerHTML = '<p class="text-muted text-center py-5" style="grid-column:1/-1">Sin módulos asignados. Contacta al administrador.</p>';
          return;
        }

        data.data.forEach(mod => {
          const a = document.createElement('a');
          a.href = mod.ruta || '#';
          a.className = 'module-card';
          a.innerHTML = `
            <div class="card-icon"><i class="bi ${mod.icono || 'bi-grid'}"></i></div>
            <h6>${mod.nombre}</h6>
            <p>${mod.descripcion || ''}</p>
            <span class="btn-acceder"><i class="bi bi-arrow-right-circle me-1"></i>Acceder</span>
          `;
          grid.appendChild(a);
        });
      } catch {
        document.getElementById('modulesGrid').innerHTML =
          '<p class="text-danger text-center py-4" style="grid-column:1/-1">Error al cargar módulos.</p>';
      }
    }

    cargarModulos();
  </script>
</body>
</html>
