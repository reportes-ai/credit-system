<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — AutoFácil</title>
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(150deg, #001345 0%, #0141A2 60%, #009AFE 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
      position: relative;
    }
    .login-header {
      background: #fff;
      border-bottom: 3px solid #009AFE;
      padding: 14px 24px 12px;
      text-align: center;
    }
    .login-header img.logo {
      width: 78%;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    .login-header p {
      color: #6b7280;
      font-size: 0.85rem;
      margin: 0;
    }
    .login-body {
      padding: 22px 40px 24px;
    }
    .form-label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #374151;
    }
    .form-control {
      border-radius: 8px;
      border: 1.5px solid #d1d5db;
      padding: 10px 14px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .form-control:focus {
      border-color: #0141A2;
      box-shadow: 0 0 0 3px rgba(1,65,162,0.12);
    }
    .input-group-text {
      border-radius: 8px 0 0 8px;
      border: 1.5px solid #d1d5db;
      border-right: none;
      background: #f9fafb;
      color: #6b7280;
    }
    .btn-login {
      background: linear-gradient(135deg, #0141A2, #009AFE);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-weight: 600;
      font-size: 1rem;
      width: 100%;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-login:hover { opacity: 0.92; }
    .btn-login:active { transform: scale(0.99); }
    .btn-login:disabled { opacity: 0.65; }
    #alerta { display: none; }
    .version { text-align: center; color: #9ca3af; font-size: 0.75rem; margin-top: 24px; }
    .version strong { color: #0141A2; font-weight: 700; }

    /* ── Dissolve transition ── */
    @keyframes cardDissolve {
      0%   { transform: scale(1);    opacity: 1; filter: blur(0px);  }
      30%  { transform: scale(1.05); opacity: 1; filter: blur(0px);  }
      100% { transform: scale(0.82); opacity: 0; filter: blur(14px); }
    }
    @keyframes bgDarken {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }
    .login-card.dissolving {
      animation: cardDissolve 0.75s cubic-bezier(0.4, 0, 0.6, 1) forwards;
      pointer-events: none;
    }
    #bgOverlay {
      position: fixed; inset: 0;
      background: #000d2e;
      opacity: 0; pointer-events: none;
      transition: opacity 0.75s ease;
      z-index: 999;
    }
    #bgOverlay.active { opacity: 1; }

    /* ── Timbre "Asistido por IA de Anthropic" — se estampa al cargar ── */
    .af-stamp {
      position: absolute; right: 8px; top: 94px; width: 104px; height: 104px;
      pointer-events: none; z-index: 6; opacity: 0; mix-blend-mode: multiply;
      transform-origin: center; transform: rotate(-12deg) scale(2.5);
      animation: afStampIn 0.55s cubic-bezier(0.2,0.75,0.3,1) 0.55s forwards;
    }
    .af-stamp svg { width: 100%; height: 100%; display: block; }
    @keyframes afStampIn {
      0%   { opacity: 0;    transform: rotate(-34deg) scale(2.5); }
      55%  { opacity: 0.95; transform: rotate(-12deg) scale(0.88); }
      72%  { opacity: 0.95; transform: rotate(-12deg) scale(1.06); }
      100% { opacity: 0.9;  transform: rotate(-12deg) scale(1); }
    }
    @media (max-width: 520px) { .af-stamp { width: 90px; height: 90px; top: 70px; right: 6px; } }
    @media (prefers-reduced-motion: reduce) {
      .af-stamp { animation: none; opacity: 0.9; transform: rotate(-12deg) scale(1); }
    }
  </style>
</head>
<body>
  <div id="bgOverlay"></div>
  <div class="login-card">
    <div class="login-header">
      <img src="/img/logo-bs.png" alt="AutoFácil Business Suite" class="logo">
    </div>
    <div class="login-body">
      <div id="alerta" class="alert alert-danger alert-sm py-2 px-3 mb-3" role="alert"></div>

      <form id="formLogin" novalidate>
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" class="form-control" placeholder="usuario@empresa.cl" required autocomplete="email">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            <button class="btn btn-outline-secondary" type="button" id="togglePass" tabindex="-1">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-login" id="btnLogin">
          <span id="btnText"><i class="bi bi-box-arrow-in-right me-2"></i>Ingresar</span>
          <span id="btnSpinner" class="d-none">
            <span class="spinner-border spinner-border-sm me-2"></span>Ingresando...
          </span>
        </button>
      </form>

      <!-- Cambio de contraseña obligatorio en el primer ingreso -->
      <form id="formNuevaClave" novalidate style="display:none">
        <p style="font-size:0.85rem;color:#374151;margin-bottom:14px">
          <i class="bi bi-shield-lock text-primary me-1"></i>
          Por seguridad, define tu contraseña antes de continuar.
        </p>
        <div class="mb-3">
          <label class="form-label">Nueva contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="nuevaClave" class="form-control" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Confirmar contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="confirmaClave" class="form-control" placeholder="Repite la contraseña" autocomplete="new-password">
          </div>
        </div>
        <button type="submit" class="btn-login" id="btnNuevaClave">
          <span id="btnTextNC"><i class="bi bi-shield-check me-2"></i>Guardar y entrar</span>
          <span id="btnSpinnerNC" class="d-none">
            <span class="spinner-border spinner-border-sm me-2"></span>Guardando...
          </span>
        </button>
      </form>

      <p class="version">AutoFácil <strong>v5.2</strong> &nbsp;·&nbsp; 2026</p>
      <p class="version" style="margin-top:4px;font-size:0.68rem;color:#c4c9d4">Desarrollado por Patricio Escobar Pohlhammer</p>
    </div>

    <!-- Timbre / tampón "Asistido por IA de Anthropic" -->
    <div class="af-stamp" aria-hidden="true">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Asistido por Inteligencia Artificial de Anthropic">
        <defs>
          <filter id="afStampRough" x="-20%" y="-20%" width="140%" height="140%">
            <feTurbulence type="fractalNoise" baseFrequency="0.04 0.045" numOctaves="2" seed="7" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="2.1" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
          <path id="afArcTop" d="M 40 100 A 60 60 0 0 1 160 100"/>
          <path id="afArcBot" d="M 40 104 A 60 60 0 0 0 160 104"/>
        </defs>
        <g filter="url(#afStampRough)" fill="#111111" font-family="'Segoe UI',Arial,sans-serif">
          <circle cx="100" cy="100" r="92" fill="none" stroke="#111111" stroke-width="4.5"/>
          <circle cx="100" cy="100" r="80" fill="none" stroke="#111111" stroke-width="2"/>
          <text font-weight="800" font-size="13" letter-spacing="2.5" text-anchor="middle">
            <textPath href="#afArcTop" xlink:href="#afArcTop" startOffset="50%">ASISTIDO POR</textPath>
          </text>
          <text font-weight="800" font-size="12" letter-spacing="1.8" text-anchor="middle">
            <textPath href="#afArcBot" xlink:href="#afArcBot" startOffset="50%">★ ANTHROPIC ★</textPath>
          </text>
          <text x="100" y="74" font-size="20" text-anchor="middle">✦</text>
          <text x="100" y="120" font-weight="900" font-size="50" letter-spacing="2" text-anchor="middle">IA</text>
        </g>
      </svg>
    </div>
  </div>

  <script>
    // Destino post-login: soporta ?next=/ruta (solo rutas locales; lo usa la app dedicada de WhatsApp)
    const _next = (() => {
      const n = new URLSearchParams(location.search).get('next') || '/';
      return (n.startsWith('/') && !n.startsWith('//')) ? n : '/';
    })();
    // Si ya hay sesión, redirigir al destino
    if (sessionStorage.getItem('token')) window.location.href = _next;

    // Clave usada al ingresar — sirve como "contraseña actual" en el cambio obligatorio.
    // La sesión NO se persiste hasta cambiar la clave (evita saltarse el paso recargando).
    let _loginPassword = '';
    let _pendingToken = null;
    let _pendingUsuario = null;

    function dissolveEntrar() {
      document.querySelector('.login-card').classList.add('dissolving');
      document.getElementById('bgOverlay').classList.add('active');
      setTimeout(() => { window.location.href = _next; }, 780);
    }

    document.getElementById('togglePass').addEventListener('click', () => {
      const inp = document.getElementById('password');
      const ico = document.getElementById('eyeIcon');
      if (inp.type === 'password') { inp.type = 'text'; ico.className = 'bi bi-eye-slash'; }
      else { inp.type = 'password'; ico.className = 'bi bi-eye'; }
    });

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const alerta = document.getElementById('alerta');
      const btnLogin = document.getElementById('btnLogin');

      alerta.style.display = 'none';
      btnLogin.disabled = true;
      document.getElementById('btnText').classList.add('d-none');
      document.getElementById('btnSpinner').classList.remove('d-none');

      try {
        const resp = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await resp.json();

        if (data.success) {
          /* ── Primer ingreso: forzar cambio de contraseña (sesión no se guarda aún) ── */
          if (data.data.debe_cambiar_clave) {
            _loginPassword = password;
            _pendingToken = data.data.token;
            _pendingUsuario = data.data.usuario;
            btnLogin.disabled = false;
            document.getElementById('btnText').classList.remove('d-none');
            document.getElementById('btnSpinner').classList.add('d-none');
            document.getElementById('formLogin').style.display = 'none';
            document.getElementById('formNuevaClave').style.display = '';
            alerta.style.display = 'none';
            document.getElementById('nuevaClave').focus();
            return;
          }

          sessionStorage.setItem('token', data.data.token);
          sessionStorage.setItem('usuario', JSON.stringify(data.data.usuario));

          /* ── Botón de éxito ── */
          document.getElementById('btnSpinner').classList.add('d-none');
          document.getElementById('btnText').classList.remove('d-none');
          document.getElementById('btnText').innerHTML = '<i class="bi bi-check-circle-fill me-2"></i>¡Bienvenido!';
          btnLogin.style.background = 'linear-gradient(135deg,#059669,#10b981)';

          /* ── Dissolve + redirect ── */
          setTimeout(dissolveEntrar, 320);

        } else {
          alerta.textContent = data.error || 'Error al iniciar sesión';
          alerta.style.display = 'block';
          btnLogin.disabled = false;
          document.getElementById('btnText').classList.remove('d-none');
          document.getElementById('btnSpinner').classList.add('d-none');
        }
      } catch {
        alerta.textContent = 'Error de conexión con el servidor';
        alerta.style.display = 'block';
        btnLogin.disabled = false;
        document.getElementById('btnText').classList.remove('d-none');
        document.getElementById('btnSpinner').classList.add('d-none');
      }
    });

    /* ── Cambio de contraseña obligatorio (primer ingreso) ── */
    document.getElementById('formNuevaClave').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nueva    = document.getElementById('nuevaClave').value;
      const confirma = document.getElementById('confirmaClave').value;
      const alerta   = document.getElementById('alerta');
      const btn      = document.getElementById('btnNuevaClave');

      alerta.style.display = 'none';
      if (nueva.length < 6) { alerta.textContent = 'La contraseña debe tener al menos 6 caracteres'; alerta.style.display = 'block'; return; }
      if (nueva !== confirma) { alerta.textContent = 'Las contraseñas no coinciden'; alerta.style.display = 'block'; return; }

      btn.disabled = true;
      document.getElementById('btnTextNC').classList.add('d-none');
      document.getElementById('btnSpinnerNC').classList.remove('d-none');

      try {
        const r = await fetch('/api/auth/cambiar-clave', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _pendingToken },
          body: JSON.stringify({ password_actual: _loginPassword, password_nuevo: nueva })
        });
        const data = await r.json();
        if (data.success) {
          // Recién ahora se persiste la sesión
          sessionStorage.setItem('token', _pendingToken);
          sessionStorage.setItem('usuario', JSON.stringify(_pendingUsuario));
          document.getElementById('btnSpinnerNC').classList.add('d-none');
          document.getElementById('btnTextNC').classList.remove('d-none');
          document.getElementById('btnTextNC').innerHTML = '<i class="bi bi-check-circle-fill me-2"></i>¡Listo!';
          btn.style.background = 'linear-gradient(135deg,#059669,#10b981)';
          setTimeout(dissolveEntrar, 420);
        } else {
          alerta.textContent = data.error || 'No se pudo cambiar la contraseña';
          alerta.style.display = 'block';
          btn.disabled = false;
          document.getElementById('btnTextNC').classList.remove('d-none');
          document.getElementById('btnSpinnerNC').classList.add('d-none');
        }
      } catch {
        alerta.textContent = 'Error de conexión con el servidor';
        alerta.style.display = 'block';
        btn.disabled = false;
        document.getElementById('btnTextNC').classList.remove('d-none');
        document.getElementById('btnSpinnerNC').classList.add('d-none');
      }
    });
  </script>
<script src="/js/app-version.js"></script>
</body>
</html>
