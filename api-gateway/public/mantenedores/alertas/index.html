<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alertas — Mantenedor — AutoFácil</title>
  <!-- v1.0 -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#001345; --blue:#0141A2; }
    body { background:#f0f4f8; font-family:'Segoe UI',system-ui,sans-serif; margin:0; }
    .topnav { background:linear-gradient(90deg,#012d70,#0255c5); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--blue); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .wrap { max-width:1080px; margin:0 auto; padding:22px 24px; }
    .card-af { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); padding:18px 20px; margin-bottom:16px; }
    label { font-size:.72rem; font-weight:800; text-transform:uppercase; color:#64748b; letter-spacing:.3px; display:block; margin:0 0 4px; }
    input, select { width:100%; border:1.5px solid #e2e8f0; border-radius:8px; padding:8px 11px; font-size:.85rem; box-sizing:border-box; font-family:inherit; }
    input:focus, select:focus { border-color:#0141A2; outline:none; }
    table { width:100%; border-collapse:collapse; font-size:.83rem; }
    th { background:#f8fafc; color:#475569; font-size:.7rem; text-transform:uppercase; padding:8px 10px; text-align:left; border-bottom:2px solid #e2e8f0; }
    td { padding:8px 10px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    .pill { font-size:.68rem; font-weight:800; border-radius:10px; padding:2px 9px; }
    .pa { background:#fee2e2; color:#b91c1c; } .pn { background:#dbeafe; color:#1d4ed8; }
    .on { color:#15803d; font-weight:700; } .off { color:#94a3b8; }
    .btn-af { background:linear-gradient(135deg,#0141A2,#0255c5); color:#fff; border:none; border-radius:9px; padding:9px 20px; font-size:.85rem; font-weight:700; cursor:pointer; }
    .btn-ghost { background:#fff; border:1.5px solid #0141A2; color:#0141A2; border-radius:9px; padding:8px 16px; font-size:.83rem; font-weight:700; cursor:pointer; }
    .btn-del { background:#fef2f2; color:#b91c1c; border:none; border-radius:7px; padding:5px 9px; cursor:pointer; }
    .btn-ed { background:#eff6ff; color:#1d4ed8; border:none; border-radius:7px; padding:5px 9px; cursor:pointer; margin-right:5px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
    .field { }
    #msg { font-size:.84rem; display:none; }
    .head-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:14px; }
    .hint { font-size:.74rem; color:#94a3b8; margin:3px 0 0; }
    /* slide toggle */
    .sw { position:relative; display:inline-block; width:42px; height:23px; vertical-align:middle; }
    .sw input { display:none; }
    .sw .sl { position:absolute; inset:0; background:#cbd5e1; border-radius:23px; cursor:pointer; transition:.2s; }
    .sw .sl:before { content:''; position:absolute; width:17px; height:17px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
    .sw input:checked + .sl { background:#0141A2; }
    .sw input:checked + .sl:before { transform:translateX(19px); }
    .sw.snd input:checked + .sl { background:#15803d; }
    .sw-lbl { font-size:.72rem; color:#64748b; margin-left:6px; vertical-align:middle; }
  </style>
</head>
<body>
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a><span>›</span><a href="/mantenedores/">Mantenedores</a><span>›</span><span style="color:#fff;font-weight:600">Alertas</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="user-chip"><div class="avatar" id="avatarInicial">?</div><div><div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div><div class="perfil-badge" id="navPerfil">—</div></div></div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="wrap">
  <div class="head-row">
    <div>
      <h5 style="font-weight:800;color:var(--navy);margin:0"><i class="bi bi-bell-fill me-2"></i>Alertas</h5>
      <span style="font-size:.82rem;color:#64748b">Reglas que disparan notificaciones (campanita) automáticamente.</span>
    </div>
    <button class="btn-ghost" onclick="nueva()"><i class="bi bi-plus-circle me-1"></i>Agregar alerta</button>
  </div>

  <!-- Formulario -->
  <div class="card-af" id="formCard" style="display:none">
    <div class="grid" style="margin-bottom:12px">
      <div class="field" style="grid-column:1/-1"><label>Nombre de la alerta</label><input id="fNombre" placeholder="Ej: Cartas pendientes en el pool"></div>
      <div class="field"><label>Origen (qué vigila)</label><select id="fOrigen" onchange="onOrigen()"></select></div>
      <div class="field"><label>Campo / variable</label><select id="fCampo"></select></div>
      <div class="field"><label>Operador</label><select id="fOperador" onchange="onOperador()"></select></div>
      <div class="field" id="wVal1"><label>Valor</label><input id="fVal1"></div>
      <div class="field" id="wVal2" style="display:none"><label>Valor máx</label><input id="fVal2"></div>
      <div class="field"><label>Prioridad</label><select id="fPrioridad"><option value="normal">Normal</option><option value="alta">Alta (campanita insistente)</option></select></div>
      <div class="field"><label>Perfil 1</label><select id="fDestino1" class="dest"></select></div>
      <div class="field"><label>Perfil 2 (opcional)</label><select id="fDestino2" class="dest"></select></div>
      <div class="field"><label>Perfil 3 (opcional)</label><select id="fDestino3" class="dest"></select></div>
      <div class="field"><label>No repetir por (min)</label><input id="fDelay" type="number" min="0" value="60"></div>
      <div class="field"><label>Sonar cada (seg)</label><input id="fSonCada" type="number" min="5" value="30"></div>
      <div class="field"><label>Sonar máximo (min)</label><input id="fSonMax" type="number" min="1" value="5"></div>
      <div class="field"><label>Activa</label><label class="sw"><input type="checkbox" id="fActivo" checked><span class="sl"></span></label><span class="sw-lbl" id="lblActivo">Sí</span></div>
      <div class="field"><label>Sonido</label><label class="sw snd"><input type="checkbox" id="fSonido" checked><span class="sl"></span></label><span class="sw-lbl" id="lblSonido">Con sonido</span></div>
    </div>
    <p class="hint" id="hintOp"></p>
    <div style="display:flex;justify-content:flex-end;gap:12px;align-items:center;margin-top:10px">
      <span id="msg"></span>
      <button class="btn-ghost" onclick="cancelar()">Cancelar</button>
      <button class="btn-af" id="btnGuardar" onclick="guardar()"><i class="bi bi-check-lg me-1"></i>Guardar</button>
    </div>
  </div>

  <!-- Lista -->
  <div class="card-af">
    <table>
      <thead><tr><th>Nombre</th><th>Condición</th><th>Prioridad</th><th>Destino</th><th>Activa</th><th>Sonido</th><th></th></tr></thead>
      <tbody id="body"><tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:24px">Cargando…</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const token = sessionStorage.getItem('token');
const yo = JSON.parse(sessionStorage.getItem('usuario')||'null');
if (!token || !yo) location.href='/login.html';
document.getElementById('navNombre').textContent = yo.nombre+' '+(yo.apellido||'');
document.getElementById('navPerfil').textContent = yo.perfil||'';
document.getElementById('avatarInicial').textContent = (yo.nombre||'?')[0].toUpperCase();
function logout(){ sessionStorage.clear(); location.href='/login.html'; }
const H = { 'Content-Type':'application/json', Authorization:'Bearer '+token };
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
let META = { origenes:[], operadores:[], perfiles:[] }, EDIT = null;

(async function init(){
  const [rM, rL] = await Promise.all([ fetch('/api/alertas/meta',{headers:H}), fetch('/api/alertas',{headers:H}) ]);
  const jM = await rM.json(), jL = await rL.json();
  META = jM.data || META;
  // Poblar selects fijos
  document.getElementById('fOrigen').innerHTML = META.origenes.map(o=>`<option value="${esc(o.id)}">${esc(o.label)}</option>`).join('');
  document.getElementById('fOperador').innerHTML = META.operadores.map(o=>`<option value="${esc(o.op)}">${esc(o.label)}</option>`).join('');
  const optsDest = '<option value="">—</option><option value="CREADOR">👤 Creador (quien creó el registro)</option><option value="TODOS">Todos los usuarios</option>' + META.perfiles.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('');
  document.querySelectorAll('.dest').forEach(s=>s.innerHTML=optsDest);
  renderLista(jL.data||[]);
})();

function campos(origenId){ return (META.origenes.find(o=>o.id===origenId)||{}).campos || []; }
function onOrigen(){
  const o = document.getElementById('fOrigen').value;
  document.getElementById('fCampo').innerHTML = campos(o).map(c=>`<option value="${esc(c.campo)}">${esc(c.label)}</option>`).join('');
}
function onOperador(){
  const op = document.getElementById('fOperador').value;
  const meta = META.operadores.find(o=>o.op===op) || {valores:1};
  document.getElementById('wVal2').style.display = meta.valores===2 ? '' : 'none';
  const hint = op==='contiene' ? 'Texto a buscar. Para varias opciones sepáralas con ";" (ej: AUTOFIN;UNIDAD).'
             : op==='entre' ? 'Se cumple si el valor está entre el mínimo y el máximo (inclusive).'
             : 'Se cumple comparando el campo con el valor indicado.';
  document.getElementById('hintOp').textContent = hint;
}

document.addEventListener('change', e => {
  if (e.target.id==='fActivo') document.getElementById('lblActivo').textContent = e.target.checked?'Sí':'No';
  if (e.target.id==='fSonido') document.getElementById('lblSonido').textContent = e.target.checked?'Con sonido':'Silenciosa';
});

function nueva(){ EDIT=null; document.getElementById('formCard').style.display='';
  document.getElementById('fNombre').value=''; document.getElementById('fOrigen').selectedIndex=0; onOrigen();
  document.getElementById('fOperador').selectedIndex=0; onOperador();
  document.getElementById('fVal1').value=''; document.getElementById('fVal2').value='';
  document.getElementById('fPrioridad').value='normal';
  document.getElementById('fDestino1').value='Administrador'; document.getElementById('fDestino2').value=''; document.getElementById('fDestino3').value='';
  document.getElementById('fDelay').value=60; document.getElementById('fSonCada').value=30; document.getElementById('fSonMax').value=5;
  document.getElementById('fActivo').checked=true; document.getElementById('fSonido').checked=true;
  document.getElementById('lblActivo').textContent='Sí'; document.getElementById('lblSonido').textContent='Con sonido';
  window.scrollTo({top:0,behavior:'smooth'}); }
function cancelar(){ document.getElementById('formCard').style.display='none'; }

function editar(a){ EDIT=a.id; document.getElementById('formCard').style.display='';
  document.getElementById('fNombre').value=a.nombre;
  document.getElementById('fOrigen').value=a.origen; onOrigen(); document.getElementById('fCampo').value=a.campo;
  document.getElementById('fOperador').value=a.operador; onOperador();
  document.getElementById('fVal1').value=a.valor1||''; document.getElementById('fVal2').value=a.valor2||'';
  document.getElementById('fPrioridad').value=a.prioridad;
  const ds=String(a.destino||'').split(',').map(s=>s.trim());
  document.getElementById('fDestino1').value=ds[0]||''; document.getElementById('fDestino2').value=ds[1]||''; document.getElementById('fDestino3').value=ds[2]||'';
  document.getElementById('fDelay').value=a.delay_min??60; document.getElementById('fSonCada').value=a.sonido_cada_seg??30; document.getElementById('fSonMax').value=a.sonido_max_min??5;
  document.getElementById('fActivo').checked=!!a.activo; document.getElementById('fSonido').checked=a.sonido!=0;
  document.getElementById('lblActivo').textContent=a.activo?'Sí':'No';
  document.getElementById('lblSonido').textContent=a.sonido!=0?'Con sonido':'Silenciosa';
  window.scrollTo({top:0,behavior:'smooth'}); }

async function guardar(){
  const msg=document.getElementById('msg'), btn=document.getElementById('btnGuardar');
  const body={ id:EDIT, nombre:document.getElementById('fNombre').value.trim(),
    origen:document.getElementById('fOrigen').value, campo:document.getElementById('fCampo').value,
    operador:document.getElementById('fOperador').value, valor1:document.getElementById('fVal1').value.trim(),
    valor2:document.getElementById('fVal2').value.trim(), prioridad:document.getElementById('fPrioridad').value,
    destinos:[document.getElementById('fDestino1').value,document.getElementById('fDestino2').value,document.getElementById('fDestino3').value].filter(Boolean),
    delay_min:document.getElementById('fDelay').value, sonido_cada_seg:document.getElementById('fSonCada').value, sonido_max_min:document.getElementById('fSonMax').value,
    activo:document.getElementById('fActivo').checked, sonido:document.getElementById('fSonido').checked };
  if(!body.destinos.length) body.destinos=['Administrador'];
  if(!body.nombre){ msg.textContent='Falta el nombre'; msg.style.cssText='display:inline;color:#b91c1c'; return; }
  btn.disabled=true; btn.innerHTML='<i class="bi bi-hourglass-split me-1"></i>…'; msg.style.display='none';
  try{
    const r=await fetch('/api/alertas',{method:'POST',headers:H,body:JSON.stringify(body)});
    const j=await r.json();
    if(j.success){ document.getElementById('formCard').style.display='none'; await recargar(); }
    else { msg.textContent=j.error||'Error'; msg.style.cssText='display:inline;color:#b91c1c'; }
  }catch(e){ msg.textContent='Error: '+e.message; msg.style.cssText='display:inline;color:#b91c1c'; }
  btn.disabled=false; btn.innerHTML='<i class="bi bi-check-lg me-1"></i>Guardar';
}

async function eliminar(id){ if(!confirm('¿Eliminar esta alerta?')) return;
  await fetch('/api/alertas/'+id,{method:'DELETE',headers:H}); recargar(); }

async function recargar(){ const r=await fetch('/api/alertas',{headers:H}); const j=await r.json(); renderLista(j.data||[]); }

function condTexto(a){
  const lbl=(campos(a.origen).find(c=>c.campo===a.campo)||{}).label||a.campo;
  const opl=(META.operadores.find(o=>o.op===a.operador)||{}).label||a.operador;
  let v=a.operador==='entre' ? `${a.valor1} y ${a.valor2}` : a.valor1;
  return `${esc(lbl)} ${esc(opl)} <b>${esc(v)}</b>`;
}
let ROWS = [];
function renderLista(rows){
  ROWS = rows;
  const tb=document.getElementById('body');
  if(!rows.length){ tb.innerHTML='<tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:24px">Sin alertas. Crea una con "Agregar alerta".</td></tr>'; return; }
  tb.innerHTML = rows.map(a=>`<tr>
    <td><b>${esc(a.nombre)}</b><br><span style="font-size:.72rem;color:#94a3b8">${esc((META.origenes.find(o=>o.id===a.origen)||{}).label||a.origen)}</span></td>
    <td>${condTexto(a)}</td>
    <td><span class="pill ${a.prioridad==='alta'?'pa':'pn'}">${a.prioridad==='alta'?'ALTA':'Normal'}</span></td>
    <td>${esc(String(a.destino||'').replace(/,/g,', '))}</td>
    <td><label class="sw"><input type="checkbox" ${a.activo?'checked':''} onchange="toggleCampo(${a.id},'activo',this.checked)"><span class="sl"></span></label></td>
    <td><label class="sw snd"><input type="checkbox" ${a.sonido!=0?'checked':''} onchange="toggleCampo(${a.id},'sonido',this.checked)"><span class="sl"></span></label></td>
    <td style="text-align:right;white-space:nowrap">
      <button class="btn-ed" onclick="editarId(${a.id})"><i class="bi bi-pencil"></i></button>
      <button class="btn-del" onclick="eliminar(${a.id})"><i class="bi bi-trash"></i></button>
    </td></tr>`).join('');
}
function editarId(id){ const a=ROWS.find(x=>x.id===id); if(a) editar(a); }
async function toggleCampo(id, campo, val){
  const a=ROWS.find(x=>x.id===id); if(!a) return;
  const body={ ...a, activo:!!a.activo, sonido:a.sonido!=0 };
  body[campo]=val;
  await fetch('/api/alertas',{method:'POST',headers:H,body:JSON.stringify(body)});
  const local=ROWS.find(x=>x.id===id); if(local) local[campo]=val?1:0;
}
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
