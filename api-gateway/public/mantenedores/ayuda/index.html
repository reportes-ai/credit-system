<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayuda — Mantenedor — AutoFácil</title>
  <!-- v1.0 -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#001345; --blue:#0141A2; }
    body { background:#f0f4f8; font-family:'Segoe UI',system-ui,sans-serif; margin:0; }
    .topnav { background:linear-gradient(90deg,#012d70,#0255c5); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--blue); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .wrap { max-width:880px; margin:0 auto; padding:22px 24px; }
    .card-af { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); padding:20px 22px; margin-bottom:16px; }
    label { font-size:.74rem; font-weight:800; text-transform:uppercase; color:#64748b; letter-spacing:.3px; display:block; margin:0 0 4px; }
    input, textarea, select { width:100%; border:1.5px solid #e2e8f0; border-radius:8px; padding:8px 11px; font-size:.86rem; box-sizing:border-box; font-family:inherit; }
    input:focus, textarea:focus, select:focus { border-color:#0141A2; outline:none; }
    textarea { resize:vertical; min-height:60px; }
    .row2 { display:flex; gap:14px; }
    .row2 > div { flex:1; }
    .field { margin-bottom:14px; }
    h6.sec { font-weight:800; color:var(--navy); font-size:.95rem; margin:4px 0 10px; display:flex; align-items:center; gap:7px; }
    .item { border:1px solid #eef2f7; border-radius:10px; padding:10px 12px; margin-bottom:10px; position:relative; }
    .item .del { position:absolute; top:8px; right:8px; background:#fef2f2; color:#b91c1c; border:none; border-radius:6px; width:24px; height:24px; cursor:pointer; font-size:.8rem; }
    .btn-add { background:#eff6ff; border:1.5px dashed #93c5fd; color:#1d4ed8; border-radius:9px; padding:7px 14px; font-size:.8rem; font-weight:700; cursor:pointer; }
    .btn-af { background:linear-gradient(135deg,#0141A2,#0255c5); color:#fff; border:none; border-radius:9px; padding:10px 24px; font-size:.88rem; font-weight:700; cursor:pointer; }
    .btn-af:disabled { opacity:.55; cursor:default; }
    .head-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:14px; }
    #msg { font-size:.85rem; display:none; }
    .hint { font-size:.78rem; color:#94a3b8; margin:2px 0 0; }
  </style>
</head>
<body>
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a><span>›</span><a href="/mantenedores/">Mantenedores</a><span>›</span><span style="color:#fff;font-weight:600">Ayuda</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="user-chip"><div class="avatar" id="avatarInicial">?</div><div><div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div><div class="perfil-badge" id="navPerfil">—</div></div></div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="wrap">
  <div class="head-row">
    <div>
      <h5 style="font-weight:800;color:var(--navy);margin:0"><i class="bi bi-question-circle me-2"></i>Ayuda de Páginas</h5>
      <span style="font-size:.82rem;color:#64748b">Edita el texto del botón "?" que ven los usuarios en cada página.</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="msg"></span>
      <button class="btn-af" id="btnGuardar" onclick="guardar()"><i class="bi bi-check-lg me-1"></i>Guardar</button>
    </div>
  </div>

  <div class="card-af">
    <div class="row2">
      <div class="field">
        <label>Página</label>
        <select id="selPagina" onchange="cargarSel()"></select>
      </div>
      <div class="field">
        <label>Ruta</label>
        <input id="fRuta" placeholder="/postventa/">
        <p class="hint">Ej: /clientes/ — debe empezar y terminar con "/"</p>
      </div>
    </div>
    <div class="row2">
      <div class="field" style="flex:2"><label>Título</label><input id="fTitulo" placeholder="Post Venta"></div>
      <div class="field"><label>Ícono (Bootstrap)</label><input id="fIcono" placeholder="bi-truck"></div>
    </div>
    <div class="field"><label>Para qué sirve (descripción)</label><textarea id="fDesc"></textarea></div>
  </div>

  <div class="card-af">
    <h6 class="sec"><i class="bi bi-list-check"></i>Cómo se usa (pasos)</h6>
    <div id="pasos"></div>
    <button class="btn-add" onclick="addPaso()"><i class="bi bi-plus-circle me-1"></i>Agregar paso</button>
  </div>

  <div class="card-af">
    <h6 class="sec"><i class="bi bi-grid"></i>Submódulos</h6>
    <div id="subs"></div>
    <button class="btn-add" onclick="addSub()"><i class="bi bi-plus-circle me-1"></i>Agregar submódulo</button>
  </div>

  <div class="card-af">
    <div class="field" style="margin:0"><label>¿Y después? (a dónde ir)</label><textarea id="fSig"></textarea></div>
  </div>
</div>

<script>
const token = sessionStorage.getItem('token');
const yo = JSON.parse(sessionStorage.getItem('usuario')||'null');
if (!token || !yo) location.href='/login.html';
document.getElementById('navNombre').textContent = yo.nombre+' '+(yo.apellido||'');
document.getElementById('navPerfil').textContent = yo.perfil||'';
document.getElementById('avatarInicial').textContent = (yo.nombre||'?')[0].toUpperCase();
function logout(){ sessionStorage.clear(); location.href='/login.html'; }
const H = { 'Content-Type':'application/json', Authorization:'Bearer '+token };
const esc = s => String(s??'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

(async function init(){
  await cargarLista();
  if (document.getElementById('selPagina').value) cargarSel();
})();

async function cargarLista(){
  const r = await fetch('/api/ayuda/todas', { headers:H });
  const j = await r.json();
  const sel = document.getElementById('selPagina');
  sel.innerHTML = '<option value="">— Nueva página —</option>' +
    (j.data||[]).map(a => `<option value="${esc(a.ruta)}">${esc(a.titulo)} (${esc(a.ruta)})</option>`).join('');
}

async function cargarSel(){
  const ruta = document.getElementById('selPagina').value;
  if (!ruta){ limpiar(); return; }
  const r = await fetch('/api/ayuda?ruta='+encodeURIComponent(ruta), { headers:H });
  const j = await r.json();
  const d = j.data || { ruta };
  document.getElementById('fRuta').value = d.ruta || ruta;
  document.getElementById('fTitulo').value = d.titulo || '';
  document.getElementById('fIcono').value = d.icono || '';
  document.getElementById('fDesc').value = d.descripcion || '';
  document.getElementById('fSig').value = d.siguiente || '';
  document.getElementById('pasos').innerHTML = '';
  (d.pasos||[]).forEach(p => addPaso(p));
  document.getElementById('subs').innerHTML = '';
  (d.submodulos||[]).forEach(s => addSub(s));
}

function limpiar(){
  ['fRuta','fTitulo','fIcono','fDesc','fSig'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pasos').innerHTML=''; document.getElementById('subs').innerHTML='';
}

function addPaso(p={}){
  const d = document.createElement('div'); d.className='item';
  d.innerHTML = `<button class="del" onclick="this.parentNode.remove()">✕</button>
    <div class="field"><label>Título del paso</label><input class="p-tit" value="${esc(p.titulo||'')}"></div>
    <div class="field" style="margin:0"><label>Detalle</label><textarea class="p-det">${esc(p.detalle||'')}</textarea></div>`;
  document.getElementById('pasos').appendChild(d);
}
function addSub(s={}){
  const d = document.createElement('div'); d.className='item';
  d.innerHTML = `<button class="del" onclick="this.parentNode.remove()">✕</button>
    <div class="field"><label>Nombre del submódulo</label><input class="s-nom" value="${esc(s.nombre||'')}"></div>
    <div class="field" style="margin:0"><label>Para qué sirve</label><textarea class="s-pq">${esc(s.para_que||'')}</textarea></div>`;
  document.getElementById('subs').appendChild(d);
}

async function guardar(){
  const ruta = document.getElementById('fRuta').value.trim();
  const titulo = document.getElementById('fTitulo').value.trim();
  const msg = document.getElementById('msg'), btn = document.getElementById('btnGuardar');
  if (!ruta || !titulo){ msg.textContent='Ruta y título son obligatorios'; msg.style.cssText='display:inline;color:#b91c1c;font-size:.85rem'; return; }
  const pasos = [...document.querySelectorAll('#pasos .item')].map(it => ({
    titulo: it.querySelector('.p-tit').value.trim(), detalle: it.querySelector('.p-det').value.trim()
  })).filter(p => p.titulo || p.detalle);
  const submodulos = [...document.querySelectorAll('#subs .item')].map(it => ({
    nombre: it.querySelector('.s-nom').value.trim(), para_que: it.querySelector('.s-pq').value.trim()
  })).filter(s => s.nombre || s.para_que);
  const body = {
    ruta, titulo,
    icono: document.getElementById('fIcono').value.trim() || 'bi-question-circle',
    descripcion: document.getElementById('fDesc').value.trim(),
    pasos, submodulos,
    siguiente: document.getElementById('fSig').value.trim(),
  };
  btn.disabled=true; btn.innerHTML='<i class="bi bi-hourglass-split me-1"></i>Guardando…'; msg.style.display='none';
  try {
    const r = await fetch('/api/ayuda/'+encodeURIComponent(ruta), { method:'PUT', headers:H, body: JSON.stringify(body) });
    const j = await r.json();
    if (j.success){ msg.textContent='✓ Guardado'; msg.style.cssText='display:inline;color:#15803d;font-weight:700;font-size:.85rem'; await cargarLista(); document.getElementById('selPagina').value=ruta; }
    else { msg.textContent=j.error||'Error'; msg.style.cssText='display:inline;color:#b91c1c;font-size:.85rem'; }
  } catch(e){ msg.textContent='Error: '+e.message; msg.style.cssText='display:inline;color:#b91c1c;font-size:.85rem'; }
  btn.disabled=false; btn.innerHTML='<i class="bi bi-check-lg me-1"></i>Guardar';
  setTimeout(()=>{ msg.style.display='none'; }, 4000);
}
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
