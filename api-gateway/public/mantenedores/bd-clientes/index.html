<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BD Clientes Nivel Dios — AutoFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-left { display:flex; align-items:center; gap:16px; }
    .topnav-brand { display:flex; align-items:center; gap:8px; }
    .topnav-brand img { height:34px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .breadcrumb-nav a:hover { color:#fff; }
    .breadcrumb-nav .sep { color:rgba(255,255,255,.35); }
    .topnav-right { display:flex; align-items:center; gap:12px; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .main-content { padding:24px 28px; }
    .page-banner { background:linear-gradient(135deg,#0f4c0f,#16a34a 50%,#4ade80); border-radius:14px; color:#fff; padding:20px 28px; margin-bottom:20px; display:flex; align-items:center; gap:16px; }
    .page-banner i { font-size:2.4rem; opacity:.85; }
    .page-banner h2 { font-weight:800; margin:0 0 2px; font-size:1.3rem; }
    .page-banner p { opacity:.75; margin:0; font-size:.85rem; }

    /* Búsqueda */
    .search-bar { background:#fff; border-radius:12px; padding:18px 22px; margin-bottom:18px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
    .search-row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .rut-input { border:2px solid #e5e7eb; border-radius:10px; padding:10px 16px; font-size:1rem; font-weight:600; width:240px; transition:.15s; }
    .rut-input:focus { outline:none; border-color:var(--navy); }
    .btn-buscar { background:var(--navy); color:#fff; border:none; border-radius:10px; padding:10px 24px; font-size:.9rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; }
    .btn-buscar:hover { background:var(--navy-dark); }

    /* Ficha cliente */
    .client-header { background:#fff; border-radius:12px; padding:20px 24px; margin-bottom:16px; box-shadow:0 1px 4px rgba(0,0,0,.06); display:none; }
    .client-name { font-size:1.3rem; font-weight:800; color:#111827; margin:0 0 4px; }
    .client-rut  { font-size:.95rem; color:#6b7280; margin:0; font-weight:600; }
    .client-stats { display:flex; gap:14px; margin-top:14px; flex-wrap:wrap; }
    .stat-chip { background:#f0f4ff; border:1px solid #c7d2fe; border-radius:8px; padding:6px 14px; font-size:.8rem; }
    .stat-chip strong { color:var(--navy); font-size:1rem; display:block; }

    /* Tabla */
    .table-wrapper { background:#fff; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.07); overflow:hidden; }
    .table-scroll { overflow-x:auto; overflow-y:auto; max-height:calc(100vh - 380px); }
    table { border-collapse:collapse; width:max-content; min-width:100%; font-size:.78rem; }
    thead th { background:#16a34a; color:#fff; font-weight:600; white-space:nowrap; position:sticky; top:0; z-index:10; padding:0; }
    thead th .th-inner { display:flex; flex-direction:column; }
    thead th .th-label { padding:8px 10px 4px; cursor:pointer; user-select:none; white-space:nowrap; display:flex; align-items:center; gap:4px; }
    thead th .th-label:hover { background:rgba(255,255,255,.12); }
    thead th .filter-input { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.25); color:#fff; border-radius:5px; padding:3px 7px; font-size:.72rem; width:calc(100% - 14px); margin:0 7px 6px; box-sizing:border-box; }
    thead th .filter-input::placeholder { color:rgba(255,255,255,.5); }
    thead th .filter-input:focus { outline:none; background:rgba(255,255,255,.25); }
    tbody tr { border-bottom:1px solid #f0f0f0; }
    tbody tr:hover { background:#f0fff4; }
    tbody td { padding:6px 10px; white-space:nowrap; max-width:220px; overflow:hidden; text-overflow:ellipsis; color:#374151; }
    tbody td.null-val { color:#d1d5db; font-style:italic; }
    tbody td.editable { cursor:pointer; }
    tbody td.editable:hover { background:#fffbeb; }
    .edit-cell-input { border:2px solid #16a34a; border-radius:5px; padding:3px 7px; font-size:.78rem; width:100%; min-width:80px; box-sizing:border-box; }
    .btn-action { border:none; border-radius:6px; padding:4px 10px; font-size:.75rem; font-weight:600; cursor:pointer; }
    .btn-save { background:#16a34a; color:#fff; }
    .btn-cancel { background:#e5e7eb; color:#374151; }

    /* Empty state */
    .empty-state { text-align:center; padding:60px 20px; color:#9ca3af; }
    .empty-state i { font-size:3rem; margin-bottom:16px; display:block; }

    /* Loading */
    .loading-overlay { position:fixed; inset:0; background:rgba(255,255,255,.7); display:none; align-items:center; justify-content:center; z-index:999; }
    .spinner { width:40px; height:40px; border:4px solid #e5e7eb; border-top-color:#16a34a; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .toast-container { position:fixed; bottom:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
    .toast { background:#1e293b; color:#fff; border-radius:10px; padding:12px 18px; font-size:.83rem; display:flex; align-items:center; gap:10px; box-shadow:0 4px 20px rgba(0,0,0,.25); animation:slideIn .2s ease; }
    .toast.success { border-left:4px solid #16a34a; }
    .toast.error { border-left:4px solid #dc2626; }
    @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-left">
    <a href="/" class="topnav-brand">
      <img src="/img/logo.png" alt="AutoFácil">
      <span class="version-badge" id="versionBadge">v4.8</span>
    </a>
    <div class="breadcrumb-nav">
      <a href="/">Inicio</a><span class="sep">›</span>
      <a href="/mantenedores/">Mantenedores</a><span class="sep">›</span>
      <span style="color:#fff;font-weight:600"><i class="bi bi-person-fill-gear me-1"></i>BD Clientes Nivel Dios</span>
    </div>
  </div>
  <div class="topnav-right">
    <div class="user-chip">
      <div class="avatar" id="avatarInicial">?</div>
      <div>
        <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
        <div class="perfil-badge" id="navPerfil">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="main-content">
  <div class="page-banner">
    <i class="bi bi-person-fill-gear"></i>
    <div>
      <h2>👤 BD CLIENTES NIVEL DIOS</h2>
      <p>Busca por RUT y accede a <strong>todas las operaciones</strong> del cliente con todos sus campos</p>
    </div>
  </div>

  <div class="search-bar">
    <div class="search-row">
      <input type="text" class="rut-input" id="rutInput" placeholder="Ej: 12345678-9"
        onkeydown="if(event.key==='Enter') buscar()"
        oninput="this.value=this.value.replace(/\./g,'').toUpperCase()">
      <button class="btn-buscar" onclick="buscar()">
        <i class="bi bi-search"></i>Buscar cliente
      </button>
      <span id="buscarStatus" style="font-size:.83rem;color:#6b7280;"></span>
    </div>
  </div>

  <div class="client-header" id="clientHeader">
    <div class="client-name" id="clientName">—</div>
    <div class="client-rut"  id="clientRut">—</div>
    <div class="client-stats" id="clientStats"></div>
  </div>

  <div class="table-wrapper" id="tableWrapper" style="display:none;">
    <div class="table-scroll">
      <table id="mainTable">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="empty-state" id="emptyState">
    <i class="bi bi-person-bounding-box"></i>
    <p>Ingresa un RUT para ver todas las operaciones del cliente</p>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast-container" id="toastContainer"></div>

<script src="/js/auth-guard.js"></script>
<script>
const token = sessionStorage.getItem('token');
const yo    = JSON.parse(sessionStorage.getItem('usuario') || 'null');
if (!token || !yo) window.location.href = '/login.html';
const H = { 'Content-Type':'application/json', Authorization:'Bearer '+token };

document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
document.getElementById('navPerfil').textContent  = yo?.perfil || '';
document.getElementById('avatarInicial').textContent = (yo?.nombre||'?').charAt(0).toUpperCase();
function logout() { sessionStorage.removeItem('token'); sessionStorage.removeItem('usuario'); window.location.href='/login.html'; }

let columns  = [];
let rows     = [];
let filters  = {};
let sortCol  = 'mes';
let sortDir  = 'desc';
let editCell = null;
let currentRut = '';

function toast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const d = document.createElement('div');
  d.className = `toast ${type}`;
  d.innerHTML = `<i class="bi bi-${type==='success'?'check-circle':'exclamation-triangle'}"></i>${msg}`;
  c.appendChild(d);
  setTimeout(() => d.remove(), 3500);
}

async function init() {
  const r = await fetch('/api/bd-operaciones/columns', {headers:H});
  const j = await r.json();
  columns = j.data;
}

async function buscar() {
  let rut = document.getElementById('rutInput').value.trim().replace(/\./g,'').toUpperCase();
  if (!rut) return;
  currentRut = rut;
  filters = {};
  showLoading(true);
  try {
    const qs = new URLSearchParams({
      page:1, limit:200, sort:sortCol, dir:sortDir,
      filters: JSON.stringify({ rut_cliente: rut })
    });
    const r = await fetch(`/api/bd-operaciones?${qs}`, {headers:H});
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    rows = j.data.rows;

    if (!rows.length) {
      document.getElementById('clientHeader').style.display = 'none';
      document.getElementById('tableWrapper').style.display = 'none';
      document.getElementById('emptyState').style.display   = 'block';
      document.getElementById('emptyState').innerHTML = `<i class="bi bi-person-x"></i><p>No se encontraron operaciones para RUT <strong>${rut}</strong></p>`;
      document.getElementById('buscarStatus').textContent = 'Sin resultados';
      return;
    }

    // Ficha cliente
    const nombre = rows.find(r=>r.nombre_cliente)?.nombre_cliente || '—';
    document.getElementById('clientName').textContent = nombre;
    document.getElementById('clientRut').textContent  = rut;
    const otorgados  = rows.filter(r=>r.estado_credito==='OTORGADO').length;
    const vigentes   = rows.filter(r=>r.estado==='VIGENTE').length;
    const financieras = [...new Set(rows.map(r=>r.financiera).filter(Boolean))].join(', ');
    document.getElementById('clientStats').innerHTML = `
      <div class="stat-chip"><strong>${rows.length}</strong>Total operaciones</div>
      <div class="stat-chip"><strong>${otorgados}</strong>Otorgadas</div>
      <div class="stat-chip"><strong>${vigentes}</strong>Vigentes</div>
      <div class="stat-chip"><strong style="font-size:.75rem">${financieras||'—'}</strong>Financieras</div>
    `;
    document.getElementById('clientHeader').style.display = 'block';
    document.getElementById('tableWrapper').style.display = 'block';
    document.getElementById('emptyState').style.display   = 'none';
    document.getElementById('buscarStatus').textContent   = `${rows.length} operaciones encontradas`;

    buildHeaders();
    renderRows(filterAndSort());
  } catch(e) {
    toast(e.message,'error');
  } finally {
    showLoading(false);
  }
}

function filterAndSort() {
  let result = [...rows];
  for (const [col, val] of Object.entries(filters)) {
    if (!val) continue;
    result = result.filter(r => String(r[col]||'').toLowerCase().includes(val.toLowerCase()));
  }
  result.sort((a,b) => {
    const va = a[sortCol], vb = b[sortCol];
    if (va === null || va === undefined) return 1;
    if (vb === null || vb === undefined) return -1;
    const cmp = String(va).localeCompare(String(vb), undefined, {numeric:true});
    return sortDir === 'asc' ? cmp : -cmp;
  });
  return result;
}

function buildHeaders() {
  const tr = document.createElement('tr');
  columns.forEach(col => {
    const th = document.createElement('th');
    const inner = document.createElement('div'); inner.className='th-inner';
    const label = document.createElement('div');
    label.className = 'th-label' + (sortCol===col.field?' sorted-'+sortDir:'');
    label.innerHTML = col.field;
    label.onclick = () => { sortCol===col.field ? sortDir=(sortDir==='asc'?'desc':'asc') : (sortCol=col.field,sortDir='asc'); buildHeaders(); renderRows(filterAndSort()); };
    const inp = document.createElement('input');
    inp.type='text'; inp.className='filter-input'; inp.placeholder='🔍';
    inp.value = filters[col.field]||'';
    inp.oninput = debounce(() => { filters[col.field]=inp.value; renderRows(filterAndSort()); }, 250);
    inner.appendChild(label); inner.appendChild(inp); th.appendChild(inner); tr.appendChild(th);
  });
  document.getElementById('thead').innerHTML='';
  document.getElementById('thead').appendChild(tr);
}

function renderRows(data) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML='';
  data.forEach(row => {
    const tr = document.createElement('tr');
    columns.forEach(col => {
      const td = document.createElement('td');
      const val = row[col.field];
      td.dataset.field=col.field; td.dataset.id=row.id;
      if (val===null||val===undefined||val==='') { td.textContent='—'; td.className='null-val editable'; }
      else { td.textContent=val; td.className='editable'; td.title=String(val); }
      if (col.field !== 'id') td.ondblclick = () => startEdit(tr, td, col, val);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function startEdit(tr, td, col, oldVal) {
  if (editCell) cancelEdit();
  editCell = {tr,td,col,oldVal};
  const inp = document.createElement('input');
  inp.className='edit-cell-input';
  inp.value = (oldVal===null||oldVal===undefined)?'':oldVal;
  inp.onkeydown = e => { if(e.key==='Enter') saveEdit(td.dataset.id,col.field,inp.value); if(e.key==='Escape') cancelEdit(); };
  td.innerHTML=''; td.appendChild(inp);
  const s=document.createElement('button'); s.className='btn-action btn-save ms-1'; s.textContent='✓'; s.onclick=()=>saveEdit(td.dataset.id,col.field,inp.value);
  const c=document.createElement('button'); c.className='btn-action btn-cancel ms-1'; c.textContent='✕'; c.onclick=cancelEdit;
  td.appendChild(s); td.appendChild(c); inp.focus(); inp.select();
}

function cancelEdit() {
  if (!editCell) return;
  const {td,oldVal}=editCell;
  td.innerHTML=''; td.textContent=(oldVal===null||oldVal===undefined||oldVal==='')?'—':oldVal;
  td.className=(oldVal===null||oldVal===undefined||oldVal==='')?'null-val editable':'editable';
  editCell=null;
}

async function saveEdit(id, field, newVal) {
  showLoading(true);
  try {
    const r = await fetch(`/api/bd-operaciones/${id}`, {
      method:'PUT', headers:H,
      body: JSON.stringify({[field]: newVal===''?null:newVal})
    });
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    // Actualizar fila local
    const row = rows.find(r=>r.id==id);
    if (row) row[field] = newVal===''?null:newVal;
    editCell=null;
    toast(`✅ ${field} actualizado`);
    renderRows(filterAndSort());
  } catch(e) {
    toast(e.message,'error'); cancelEdit();
  } finally {
    showLoading(false);
  }
}

function showLoading(v) { document.getElementById('loadingOverlay').style.display=v?'flex':'none'; }
function debounce(fn,ms) { let t; return (...a) => { clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

init();
// Auto-buscar si viene RUT en URL
const urlRut = new URLSearchParams(location.search).get('rut');
if (urlRut) { document.getElementById('rutInput').value=urlRut; buscar(); }
</script>
</body>
</html>
