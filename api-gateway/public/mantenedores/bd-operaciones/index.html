<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BD Operaciones Nivel Dios — AutoFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-left { display:flex; align-items:center; gap:16px; }
    .topnav-brand { display:flex; align-items:center; gap:8px; }
    .topnav-brand img { height:34px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .breadcrumb-nav a:hover { color:#fff; }
    .breadcrumb-nav .sep { color:rgba(255,255,255,.35); }
    .topnav-right { display:flex; align-items:center; gap:12px; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .main-content { padding:24px 28px; }
    .page-banner { background:linear-gradient(135deg,#1a0050,#0141A2 50%,#009AFE); border-radius:14px; color:#fff; padding:20px 28px; margin-bottom:20px; display:flex; align-items:center; gap:16px; }
    .page-banner i { font-size:2.4rem; opacity:.85; }
    .page-banner h2 { font-weight:800; margin:0 0 2px; font-size:1.3rem; }
    .page-banner p { opacity:.75; margin:0; font-size:.85rem; }

    /* Toolbar */
    .toolbar { background:#fff; border-radius:12px; padding:14px 18px; margin-bottom:14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; box-shadow:0 1px 4px rgba(0,0,0,.06); }
    .toolbar .info-chip { background:var(--navy); color:#fff; border-radius:8px; padding:5px 14px; font-size:.82rem; font-weight:700; }
    .toolbar .info-chip span { opacity:.7; font-weight:400; }

    /* Tabla wrapper */
    .table-wrapper { background:#fff; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.07); overflow:hidden; }
    .table-scroll { overflow-x:auto; overflow-y:auto; max-height:calc(100vh - 280px); }
    table { border-collapse:collapse; width:max-content; min-width:100%; font-size:.78rem; }
    thead th { background:#0141A2; color:#fff; font-weight:600; white-space:nowrap; position:sticky; top:0; z-index:10; padding:0; }
    thead th .th-inner { display:flex; flex-direction:column; }
    thead th .th-label { padding:8px 10px 4px; display:flex; align-items:center; gap:4px; cursor:pointer; user-select:none; white-space:nowrap; }
    thead th .th-label:hover { background:rgba(255,255,255,.1); }
    thead th .th-label .sort-icon { font-size:.65rem; opacity:.5; }
    thead th .th-label.sorted-asc .sort-icon::before { content:' ▲'; opacity:1; }
    thead th .th-label.sorted-desc .sort-icon::before { content:' ▼'; opacity:1; }
    thead th .filter-input { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.25); color:#fff; border-radius:5px; padding:3px 7px; font-size:.72rem; width:calc(100% - 14px); margin:0 7px 6px; box-sizing:border-box; }
    thead th .filter-input::placeholder { color:rgba(255,255,255,.5); }
    thead th .filter-input:focus { outline:none; background:rgba(255,255,255,.25); border-color:#fff; }
    tbody tr { border-bottom:1px solid #f0f0f0; }
    tbody tr:hover { background:#f0f7ff; }
    tbody td { padding:6px 10px; white-space:nowrap; max-width:220px; overflow:hidden; text-overflow:ellipsis; color:#374151; }
    tbody td.null-val { color:#d1d5db; font-style:italic; }
    tbody td.editable { cursor:pointer; }
    tbody td.editable:hover { background:#fffbeb; }
    .edit-cell-input { border:2px solid var(--accent); border-radius:5px; padding:3px 7px; font-size:.78rem; width:100%; min-width:80px; box-sizing:border-box; }
    .btn-action { border:none; border-radius:6px; padding:4px 10px; font-size:.75rem; font-weight:600; cursor:pointer; }
    .btn-save { background:#16a34a; color:#fff; }
    .btn-save:hover { background:#15803d; }
    .btn-cancel { background:#e5e7eb; color:#374151; }
    .btn-cancel:hover { background:#d1d5db; }

    /* Paginación */
    .pagination-bar { padding:12px 18px; display:flex; align-items:center; justify-content:space-between; border-top:1px solid #f0f0f0; flex-wrap:wrap; gap:8px; }
    .pagination-bar .info { font-size:.8rem; color:#6b7280; }
    .page-btns { display:flex; gap:4px; align-items:center; }
    .page-btn { background:#f3f4f6; border:1px solid #e5e7eb; border-radius:6px; padding:4px 10px; font-size:.8rem; cursor:pointer; font-weight:600; color:#374151; }
    .page-btn:hover { background:#e0e7ff; }
    .page-btn.active { background:var(--navy); color:#fff; border-color:var(--navy); }
    .page-btn:disabled { opacity:.4; cursor:default; }
    select.per-page { border:1px solid #e5e7eb; border-radius:6px; padding:4px 8px; font-size:.8rem; color:#374151; }

    /* Loading */
    .loading-overlay { position:fixed; inset:0; background:rgba(255,255,255,.7); display:flex; align-items:center; justify-content:center; z-index:999; display:none; }
    .spinner { width:40px; height:40px; border:4px solid #e5e7eb; border-top-color:var(--navy); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Toast */
    .toast-container { position:fixed; bottom:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
    .toast { background:#1e293b; color:#fff; border-radius:10px; padding:12px 18px; font-size:.83rem; display:flex; align-items:center; gap:10px; box-shadow:0 4px 20px rgba(0,0,0,.25); animation:slideIn .2s ease; }
    .toast.success { border-left:4px solid #16a34a; }
    .toast.error { border-left:4px solid #dc2626; }
    @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-left">
    <a href="/" class="topnav-brand">
      <img src="/img/logo.png" alt="AutoFácil">
      <span class="version-badge" id="versionBadge">v4.8</span>
    </a>
    <div class="breadcrumb-nav">
      <a href="/">Inicio</a><span class="sep">›</span>
      <a href="/mantenedores/">Mantenedores</a><span class="sep">›</span>
      <span style="color:#fff;font-weight:600"><i class="bi bi-database-fill-gear me-1"></i>BD Operaciones Nivel Dios</span>
    </div>
  </div>
  <div class="topnav-right">
    <div class="user-chip">
      <div class="avatar" id="avatarInicial">?</div>
      <div>
        <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
        <div class="perfil-badge" id="navPerfil">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="main-content">
  <div class="page-banner">
    <i class="bi bi-database-fill-gear"></i>
    <div>
      <h2>⚡ BD OPERACIONES NIVEL DIOS</h2>
      <p>Vista y edición directa de <strong>operaciones_brokerage</strong> — todos los campos, todos los registros</p>
    </div>
  </div>

  <div class="toolbar">
    <div class="info-chip">Total: <span id="totalLabel">—</span></div>
    <div class="info-chip">Página: <span id="pageLabel">—</span></div>
    <button class="btn btn-sm btn-outline-secondary" onclick="clearFilters()"><i class="bi bi-x-circle me-1"></i>Limpiar filtros</button>
    <button class="btn btn-sm btn-outline-primary" onclick="exportCSV()"><i class="bi bi-download me-1"></i>Exportar CSV</button>
    <div style="flex:1"></div>
    <label style="font-size:.82rem;color:#6b7280;">Filas por página:</label>
    <select class="per-page" id="limitSel" onchange="changeLimit()">
      <option value="25">25</option>
      <option value="50" selected>50</option>
      <option value="100">100</option>
      <option value="200">200</option>
    </select>
  </div>

  <div class="table-wrapper">
    <div class="table-scroll" id="tableScroll">
      <table id="mainTable">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pagination-bar">
      <div class="info" id="paginInfo">Cargando...</div>
      <div class="page-btns" id="pageBtns"></div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast-container" id="toastContainer"></div>

<script src="/js/auth-guard.js"></script>
<script>
const token = sessionStorage.getItem('token');
const yo    = JSON.parse(sessionStorage.getItem('usuario') || 'null');
if (!token || !yo) window.location.href = '/login.html';
const H = { 'Content-Type':'application/json', Authorization:'Bearer '+token };

document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
document.getElementById('navPerfil').textContent  = yo?.perfil || '';
document.getElementById('avatarInicial').textContent = (yo?.nombre||'?').charAt(0).toUpperCase();
function logout() { sessionStorage.removeItem('token'); sessionStorage.removeItem('usuario'); window.location.href='/login.html'; }

let columns   = [];
let filters   = {};
let sortCol   = 'id';
let sortDir   = 'desc';
let page      = 1;
let limit     = 50;
let totalRows = 0;
let editCell  = null; // {tr, td, field, oldVal}

/* ── Toast ── */
function toast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const d = document.createElement('div');
  d.className = `toast ${type}`;
  d.innerHTML = `<i class="bi bi-${type==='success'?'check-circle':'exclamation-triangle'}"></i>${msg}`;
  c.appendChild(d);
  setTimeout(() => d.remove(), 3500);
}

/* ── Cargar columnas y luego datos ── */
async function init() {
  const r = await fetch('/api/bd-operaciones/columns', {headers:H});
  const j = await r.json();
  columns = j.data;
  buildHeaders();
  await load();
}

function buildHeaders() {
  const tr1 = document.createElement('tr');
  columns.forEach(col => {
    const th = document.createElement('th');
    const inner = document.createElement('div');
    inner.className = 'th-inner';

    const label = document.createElement('div');
    label.className = 'th-label' + (sortCol===col.field ? ' sorted-'+sortDir : '');
    label.innerHTML = `${col.field}<span class="sort-icon"></span>`;
    label.onclick = () => toggleSort(col.field);

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'filter-input';
    inp.placeholder = '🔍';
    inp.dataset.col = col.field;
    inp.value = filters[col.field] || '';
    inp.oninput = debounce(() => { filters[col.field] = inp.value; page=1; load(); }, 400);

    inner.appendChild(label);
    inner.appendChild(inp);
    th.appendChild(inner);
    tr1.appendChild(th);
  });
  document.getElementById('thead').innerHTML = '';
  document.getElementById('thead').appendChild(tr1);
}

function toggleSort(col) {
  if (sortCol === col) sortDir = sortDir==='asc'?'desc':'asc';
  else { sortCol=col; sortDir='asc'; }
  page=1;
  buildHeaders();
  load();
}

async function load() {
  showLoading(true);
  try {
    const activeFilters = Object.fromEntries(Object.entries(filters).filter(([,v])=>v!==''));
    const qs = new URLSearchParams({
      page, limit, sort:sortCol, dir:sortDir,
      filters: JSON.stringify(activeFilters)
    });
    const r = await fetch(`/api/bd-operaciones?${qs}`, {headers:H});
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    totalRows = j.data.total;
    renderRows(j.data.rows);
    renderPagination(j.data);
    document.getElementById('totalLabel').textContent = totalRows.toLocaleString();
    document.getElementById('pageLabel').textContent  = `${j.data.page} / ${j.data.pages}`;
  } catch(e) {
    toast(e.message, 'error');
  } finally {
    showLoading(false);
  }
}

function renderRows(rows) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach(row => {
    const tr = document.createElement('tr');
    columns.forEach(col => {
      const td = document.createElement('td');
      const val = row[col.field];
      td.dataset.field = col.field;
      td.dataset.id    = row.id;
      if (val === null || val === undefined || val === '') {
        td.textContent = '—';
        td.className = 'null-val editable';
      } else {
        td.textContent = val;
        td.className = 'editable';
        td.title = String(val);
      }
      td.ondblclick = () => startEdit(tr, td, col, val);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

/* ── Edición inline ── */
function startEdit(tr, td, col, oldVal) {
  if (editCell) cancelEdit();
  if (col.field === 'id') return; // id no editable
  editCell = {tr, td, col, oldVal};
  const inp = document.createElement('input');
  inp.className = 'edit-cell-input';
  inp.value = oldVal === null || oldVal === undefined ? '' : oldVal;
  inp.onkeydown = e => {
    if (e.key === 'Enter')  saveEdit(td.dataset.id, col.field, inp.value);
    if (e.key === 'Escape') cancelEdit();
  };
  td.innerHTML = '';
  td.appendChild(inp);

  const btnSave = document.createElement('button');
  btnSave.className = 'btn-action btn-save ms-1'; btnSave.textContent = '✓';
  btnSave.onclick = () => saveEdit(td.dataset.id, col.field, inp.value);

  const btnCan = document.createElement('button');
  btnCan.className = 'btn-action btn-cancel ms-1'; btnCan.textContent = '✕';
  btnCan.onclick = cancelEdit;

  td.appendChild(btnSave);
  td.appendChild(btnCan);
  inp.focus(); inp.select();
}

function cancelEdit() {
  if (!editCell) return;
  const {td, oldVal} = editCell;
  td.innerHTML = '';
  td.textContent = (oldVal === null || oldVal === undefined || oldVal === '') ? '—' : oldVal;
  td.className = (oldVal === null || oldVal === undefined || oldVal === '') ? 'null-val editable' : 'editable';
  editCell = null;
}

async function saveEdit(id, field, newVal) {
  showLoading(true);
  try {
    const r = await fetch(`/api/bd-operaciones/${id}`, {
      method:'PUT', headers:H,
      body: JSON.stringify({ [field]: newVal === '' ? null : newVal })
    });
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    editCell = null;
    toast(`✅ ${field} actualizado`);
    await load();
  } catch(e) {
    toast(e.message,'error');
    cancelEdit();
  } finally {
    showLoading(false);
  }
}

/* ── Paginación ── */
function renderPagination(d) {
  document.getElementById('paginInfo').textContent =
    `Mostrando ${((d.page-1)*d.limit)+1}–${Math.min(d.page*d.limit,d.total)} de ${d.total.toLocaleString()} registros`;

  const container = document.getElementById('pageBtns');
  container.innerHTML = '';
  const mk = (label, p, dis=false) => {
    const b = document.createElement('button');
    b.className = 'page-btn' + (p===page?' active':'');
    b.textContent = label; b.disabled = dis;
    b.onclick = () => { page=p; load(); };
    return b;
  };
  container.appendChild(mk('«', 1, page===1));
  container.appendChild(mk('‹', page-1, page===1));

  const start = Math.max(1, page-2), end = Math.min(d.pages, page+2);
  for (let i=start; i<=end; i++) container.appendChild(mk(i,i));

  container.appendChild(mk('›', page+1, page===d.pages));
  container.appendChild(mk('»', d.pages, page===d.pages));
}

function changeLimit() { limit=parseInt(document.getElementById('limitSel').value); page=1; load(); }
function clearFilters() { filters={}; document.querySelectorAll('.filter-input').forEach(i=>i.value=''); page=1; load(); }

/* ── Exportar CSV ── */
function exportCSV() {
  const rows = [...document.querySelectorAll('#tbody tr')];
  const header = columns.map(c=>c.field).join(',');
  const lines  = rows.map(tr => [...tr.querySelectorAll('td')].map(td=>`"${td.title||td.textContent}"`).join(','));
  const csv  = [header,...lines].join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='operaciones.csv'; a.click();
}

function showLoading(v) { document.getElementById('loadingOverlay').style.display = v?'flex':'none'; }
function debounce(fn,ms) { let t; return (...a) => { clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

init();
</script>
</body>
</html>
