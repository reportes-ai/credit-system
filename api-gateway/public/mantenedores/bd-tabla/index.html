<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BD Tabla Nivel Dios — AutoFácil</title>
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-left { display:flex; align-items:center; gap:16px; }
    .topnav-brand { display:flex; align-items:center; gap:8px; }
    .topnav-brand img { height:34px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .breadcrumb-nav a:hover { color:#fff; }
    .breadcrumb-nav .sep { color:rgba(255,255,255,.35); }
    .topnav-right { display:flex; align-items:center; gap:12px; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .main-content { padding:24px 28px; }
    .page-banner { background:linear-gradient(135deg,#012d70,#0141A2 50%,#009AFE); border-radius:14px; color:#fff; padding:20px 28px; margin-bottom:20px; display:flex; align-items:center; gap:16px; }
    .page-banner i { font-size:2.4rem; opacity:.85; }
    .page-banner h2 { font-weight:800; margin:0 0 2px; font-size:1.3rem; }
    .page-banner p { opacity:.75; margin:0; font-size:.85rem; }
    .toolbar { background:#fff; border-radius:12px; padding:14px 18px; margin-bottom:14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; box-shadow:0 1px 4px rgba(0,0,0,.06); }
    .toolbar .info-chip { background:var(--navy); color:#fff; border-radius:8px; padding:5px 14px; font-size:.82rem; font-weight:700; }
    .table-wrapper { background:#fff; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.07); overflow:hidden; }
    .table-scroll { overflow-x:auto; overflow-y:auto; max-height:calc(100vh - 260px); }
    table { border-collapse:collapse; width:max-content; min-width:100%; font-size:.78rem; }
    thead th { background:#0141A2; color:#fff; font-weight:600; white-space:nowrap; position:sticky; top:0; z-index:10; padding:0; }
    thead th .th-inner { display:flex; flex-direction:column; }
    thead th .th-label { padding:8px 10px 4px; display:flex; align-items:center; gap:4px; cursor:pointer; user-select:none; white-space:nowrap; }
    thead th .th-label:hover { background:rgba(255,255,255,.1); }
    thead th .th-label .sort-icon { font-size:.65rem; opacity:.5; }
    thead th .th-label.sorted-asc .sort-icon::before { content:' ▲'; opacity:1; }
    thead th .th-label.sorted-desc .sort-icon::before { content:' ▼'; opacity:1; }
    thead th .filter-input { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.25); color:#fff; border-radius:5px; padding:3px 7px; font-size:.72rem; width:calc(100% - 14px); margin:0 7px 6px; box-sizing:border-box; }
    thead th .filter-input::placeholder { color:rgba(255,255,255,.5); }
    thead th .filter-input:focus { outline:none; background:rgba(255,255,255,.25); border-color:#fff; }
    /* Fila de letras Excel */
    .tr-letters th { background:#1e3a5f; color:rgba(255,255,255,.75); font-size:.68rem; font-weight:700;
      text-align:center; padding:3px 4px; letter-spacing:.5px; position:sticky; top:0; z-index:10;
      border-bottom:2px solid rgba(255,255,255,.15); min-width:0; }
    .tr-letters th.col-letter-highlight { background:#f59e0b !important; color:#012d70 !important; }
    /* Columna resaltada por búsqueda */
    th.col-highlighted { outline:3px solid #f59e0b !important; outline-offset:-3px; }
    td.col-highlighted { background:#fffbeb !important; }
    tbody tr { border-bottom:1px solid #f0f0f0; }
    tbody tr:hover { background:#eff6ff; }
    tbody td { padding:6px 10px; white-space:nowrap; max-width:220px; overflow:hidden; text-overflow:ellipsis; color:#374151; }
    tbody td.null-val { color:#d1d5db; font-style:italic; }
    tbody td.editable { cursor:pointer; }
    tbody td.editable:hover { background:#fffbeb; }
    .edit-cell-input { border:2px solid var(--accent); border-radius:5px; padding:3px 7px; font-size:.78rem; width:100%; min-width:80px; box-sizing:border-box; }
    .btn-action { border:none; border-radius:6px; padding:4px 10px; font-size:.75rem; font-weight:600; cursor:pointer; }
    .btn-save { background:#16a34a; color:#fff; }
    .btn-cancel { background:#e5e7eb; color:#374151; }
    .pagination-bar { padding:12px 18px; display:flex; align-items:center; justify-content:space-between; border-top:1px solid #f0f0f0; flex-wrap:wrap; gap:8px; }
    .pagination-bar .info { font-size:.8rem; color:#6b7280; }
    .page-btns { display:flex; gap:4px; align-items:center; }
    .page-btn { background:#f3f4f6; border:1px solid #e5e7eb; border-radius:6px; padding:4px 10px; font-size:.8rem; cursor:pointer; font-weight:600; color:#374151; }
    .page-btn:hover { background:#eff6ff; }
    .page-btn.active { background:#0141A2; color:#fff; border-color:#0141A2; }
    .page-btn:disabled { opacity:.4; cursor:default; }
    select.per-page { border:1px solid #e5e7eb; border-radius:6px; padding:4px 8px; font-size:.8rem; color:#374151; }
    .loading-overlay { position:fixed; inset:0; background:rgba(255,255,255,.7); display:none; align-items:center; justify-content:center; z-index:999; }
    .spinner { width:40px; height:40px; border:4px solid #e5e7eb; border-top-color:#0141A2; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .toast-container { position:fixed; bottom:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
    .toast { background:#1e293b; color:#fff; border-radius:10px; padding:12px 18px; font-size:.83rem; display:flex; align-items:center; gap:10px; box-shadow:0 4px 20px rgba(0,0,0,.25); animation:slideIn .2s ease; }
    .toast.success { border-left:4px solid #16a34a; }
    .toast.error { border-left:4px solid #dc2626; }
    @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-left">
    <a href="/" class="topnav-brand">
      <img src="/img/logo.png" alt="AutoFácil">
      <span class="version-badge">v1.0</span>
    </a>
    <div class="breadcrumb-nav">
      <a href="/">Inicio</a><span class="sep">›</span>
      <a href="/mantenedores/">Mantenedores</a><span class="sep">›</span>
      <a href="/mantenedores/solo-dios/">⚡ Solo Dios</a><span class="sep">›</span>
      <span style="color:#fff;font-weight:600" id="bcTabla"><i class="bi bi-database-fill me-1"></i>BD Tabla</span>
    </div>
  </div>
  <div class="topnav-right">
    <div class="user-chip">
      <div class="avatar" id="avatarInicial">?</div>
      <div>
        <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
        <div class="perfil-badge" id="navPerfil">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="main-content">
  <div class="page-banner">
    <i class="bi bi-database-fill" id="bannerIcon"></i>
    <div>
      <h2 id="bannerTitulo">⚡ BD NIVEL DIOS</h2>
      <p id="bannerSub">Vista y edición directa — todos los campos, filtros por columna, edición inline.</p>
      <div id="tablaChips" style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap"></div>
    </div>
  </div>

  <div class="toolbar">
    <div class="info-chip">Total: <span id="totalLabel">—</span></div>
    <div class="info-chip">Página: <span id="pageLabel">—</span></div>
    <button class="btn btn-sm btn-outline-secondary" onclick="clearFilters()"><i class="bi bi-x-circle me-1"></i>Limpiar filtros</button>
    <button class="btn btn-sm btn-outline-success" onclick="exportCSV()"><i class="bi bi-download me-1"></i>Exportar CSV</button>
    <!-- Buscador de campos -->
    <div style="position:relative;display:flex;align-items:center;gap:0">
      <span style="position:absolute;left:9px;color:#9ca3af;font-size:.85rem;pointer-events:none">🔎</span>
      <input id="colSearch" type="text" placeholder="Buscar columna..." autocomplete="off"
        style="padding:5px 10px 5px 30px;border:1px solid #d1d5db;border-radius:8px;font-size:.8rem;width:180px;outline:none"
        oninput="buscarColumna(this.value)"
        onfocus="document.getElementById('colDropdown').style.display='block'"
        onblur="setTimeout(()=>document.getElementById('colDropdown').style.display='none',200)"
        onkeydown="navColDropdown(event)">
      <div id="colDropdown" style="display:none;position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.14);z-index:500;min-width:220px;max-height:260px;overflow-y:auto"></div>
    </div>
    <div style="flex:1"></div>
    <label style="font-size:.82rem;color:#6b7280;">Filas por página:</label>
    <select class="per-page" id="limitSel" onchange="changeLimit()">
      <option value="25">25</option>
      <option value="50" selected>50</option>
      <option value="100">100</option>
      <option value="200">200</option>
    </select>
  </div>

  <div class="table-wrapper">
    <div class="table-scroll" id="tableScroll">
      <table id="mainTable">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pagination-bar">
      <div class="info" id="paginInfo">Cargando...</div>
      <div class="page-btns" id="pageBtns"></div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast-container" id="toastContainer"></div>

<script src="/js/auth-guard.js"></script>
<script>
const token = sessionStorage.getItem('token');
const yo    = JSON.parse(sessionStorage.getItem('usuario') || 'null');
if (!token || !yo) window.location.href = '/login.html';
const H = { 'Content-Type':'application/json', Authorization:'Bearer '+token };
document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
document.getElementById('navPerfil').textContent  = yo?.perfil || '';
document.getElementById('avatarInicial').textContent = (yo?.nombre||'?').charAt(0).toUpperCase();
function logout() { sessionStorage.removeItem('token'); sessionStorage.removeItem('usuario'); window.location.href='/login.html'; }

/* Editor GENÉRICO: la tabla viene por query ?t= y debe estar en la whitelist del backend */
const TABLA = new URLSearchParams(location.search).get('t') || 'dealers';
const API = '/api/bd-tabla/' + TABLA;
let PK  = 'id';

let columns = [], filters = {}, sortCol = null, sortDir = 'desc';
let page = 1, limit = 50, totalRows = 0, editCell = null;

function toast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const d = document.createElement('div');
  d.className = `toast ${type}`;
  d.innerHTML = `<i class="bi bi-${type==='success'?'check-circle':'exclamation-triangle'}"></i> ${msg}`;
  c.appendChild(d); setTimeout(() => d.remove(), 3500);
}
function showLoading(v) { document.getElementById('loadingOverlay').style.display = v ? 'flex' : 'none'; }
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

async function init() {
  // catálogo: label/ícono/pk de la tabla + chips para cambiar entre tablas del mismo grupo
  const rc = await fetch('/api/bd-tabla/catalogo', {headers:H});
  const jc = await rc.json();
  if (!jc.success) { toast(jc.error,'error'); return; }
  const cat = jc.data, t = cat.find(x=>x.nombre===TABLA);
  if (!t) { toast('Tabla no permitida','error'); return; }
  PK = t.pk; sortCol = t.pk;
  document.title = `BD ${t.label} Nivel Dios — AutoFácil`;
  document.getElementById('bannerTitulo').textContent = `⚡ BD ${t.label.toUpperCase()} NIVEL DIOS`;
  document.getElementById('bannerSub').innerHTML = `Vista y edición directa de la tabla <strong>${TABLA}</strong> — todos los campos, filtros por columna, edición inline.`;
  document.getElementById('bannerIcon').className = 'bi ' + (t.icono||'bi-database-fill');
  document.getElementById('bcTabla').innerHTML = `<i class="bi ${t.icono||'bi-database-fill'} me-1"></i>BD ${t.label}`;
  const hermanas = cat.filter(x=>x.grupo===t.grupo);
  document.getElementById('tablaChips').innerHTML = hermanas.length>1 ? hermanas.map(x=>
    `<a href="?t=${x.nombre}" style="text-decoration:none;border-radius:8px;padding:3px 12px;font-size:.72rem;font-weight:700;
       background:${x.nombre===TABLA?'#fff':'rgba(255,255,255,.15)'};color:${x.nombre===TABLA?'#012d70':'#fff'}">${x.label}</a>`).join('') : '';
  const r = await fetch(`${API}/columns`, {headers:H});
  const j = await r.json();
  if (!j.success) { toast(j.error,'error'); return; }
  columns = j.data; buildHeaders(); await load();
}

/* Convierte índice numérico a letras estilo Excel: 0→A, 25→Z, 26→AA… */
function colLetter(n) {
  let s = '';
  n++;
  while (n > 0) { n--; s = String.fromCharCode(65 + (n % 26)) + s; n = Math.floor(n / 26); }
  return s;
}

function buildHeaders() {
  const trLetters = document.createElement('tr');
  trLetters.className = 'tr-letters';
  const tr = document.createElement('tr');
  columns.forEach((col, idx) => {
    // Celda de letra Excel (clickeable: salta a la columna)
    const thL = document.createElement('th');
    thL.dataset.colIdx = idx; thL.id = 'colLetter_' + idx; thL.title = col.field;
    thL.textContent = colLetter(idx); thL.style.cursor = 'pointer';
    thL.onclick = () => irAColumna(col.field, idx);
    trLetters.appendChild(thL);

    const th = document.createElement('th');
    const inner = document.createElement('div'); inner.className = 'th-inner';
    const label = document.createElement('div');
    label.className = 'th-label' + (sortCol===col.field ? ' sorted-'+sortDir : '');
    label.innerHTML = `${col.field}<span class="sort-icon"></span>`;
    label.onclick = () => toggleSort(col.field);
    const inp = document.createElement('input');
    inp.type='text'; inp.className='filter-input'; inp.placeholder='🔍';
    inp.dataset.col=col.field; inp.value=filters[col.field]||'';
    inp.oninput=debounce(()=>{ filters[col.field]=inp.value; page=1; load(); },400);
    inner.appendChild(label); inner.appendChild(inp);
    th.appendChild(inner); tr.appendChild(th);
  });
  document.getElementById('thead').innerHTML='';
  document.getElementById('thead').appendChild(trLetters);
  document.getElementById('thead').appendChild(tr);
}

/* ── Buscador de columna (por nombre o por letra Excel) ── */
let _dropSel = -1;
function buscarColumna(q) {
  const dd = document.getElementById('colDropdown');
  _dropSel = -1;
  if (!q.trim()) { dd.innerHTML = ''; return; }
  const qlo = q.toLowerCase();
  const hits = columns
    .map((c,i) => ({field:c.field, idx:i, letter:colLetter(i)}))
    .filter(x => x.field.toLowerCase().includes(qlo) || x.letter.toLowerCase() === qlo);
  if (!hits.length) { dd.innerHTML = '<div style="padding:10px 14px;color:#9ca3af;font-size:.8rem">Sin resultados</div>'; return; }
  dd.innerHTML = hits.map(h => `
    <div class="col-drop-item" data-idx="${h.idx}" data-field="${h.field}"
      style="padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:.83rem;border-bottom:1px solid #f3f4f6"
      onmouseover="this.style.background='#eff6ff'" onmouseout="this.style.background=''"
      onclick="irAColumna('${h.field}',${h.idx});document.getElementById('colSearch').value='${h.field}';document.getElementById('colDropdown').style.display='none'">
      <span style="background:#0141A2;color:#fff;border-radius:5px;padding:1px 7px;font-size:.72rem;font-weight:700;min-width:28px;text-align:center">${h.letter}</span>
      <span>${h.field}</span>
    </div>`).join('');
}
function navColDropdown(e) {
  const items = document.querySelectorAll('.col-drop-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { _dropSel = Math.min(_dropSel+1, items.length-1); highlightDrop(items); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { _dropSel = Math.max(_dropSel-1, 0); highlightDrop(items); e.preventDefault(); }
  else if (e.key === 'Enter' && _dropSel >= 0) { items[_dropSel].click(); e.preventDefault(); }
}
function highlightDrop(items) {
  items.forEach((it,i) => it.style.background = i === _dropSel ? '#eff6ff' : '');
  if (_dropSel >= 0) items[_dropSel].scrollIntoView({block:'nearest'});
}
function irAColumna(field, idx) {
  document.querySelectorAll('.tr-letters th').forEach(th => th.classList.remove('col-letter-highlight'));
  const lth = document.getElementById('colLetter_' + idx);
  if (lth) lth.classList.add('col-letter-highlight');
  document.querySelectorAll('th.col-highlighted, td.col-highlighted').forEach(el => el.classList.remove('col-highlighted'));
  const ths = document.querySelectorAll('#thead tr:last-child th');
  if (ths[idx]) ths[idx].classList.add('col-highlighted');
  document.querySelectorAll(`#tbody td[data-field="${field}"]`).forEach(td => td.classList.add('col-highlighted'));
  const tableScroll = document.getElementById('tableScroll');
  if (ths[idx]) {
    const thRect = ths[idx].getBoundingClientRect();
    const wrapRect = tableScroll.getBoundingClientRect();
    tableScroll.scrollTo({ left: tableScroll.scrollLeft + thRect.left - wrapRect.left - 60, behavior: 'smooth' });
  }
  setTimeout(() => {
    if (lth) lth.classList.remove('col-letter-highlight');
    document.querySelectorAll('th.col-highlighted, td.col-highlighted').forEach(el => el.classList.remove('col-highlighted'));
  }, 3000);
}

function toggleSort(col) {
  sortDir = sortCol===col ? (sortDir==='asc'?'desc':'asc') : 'asc';
  sortCol = col; page=1; buildHeaders(); load();
}

async function load() {
  showLoading(true);
  try {
    const af = Object.fromEntries(Object.entries(filters).filter(([,v])=>v!==''));
    const qs = new URLSearchParams({page,limit,sort:sortCol,dir:sortDir,filters:JSON.stringify(af)});
    const r = await fetch(`${API}?${qs}`,{headers:H});
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    totalRows = j.data.total; renderRows(j.data.rows); renderPagination(j.data);
    document.getElementById('totalLabel').textContent = totalRows.toLocaleString();
    document.getElementById('pageLabel').textContent  = `${j.data.page} / ${j.data.pages}`;
  } catch(e) { toast(e.message,'error'); }
  finally { showLoading(false); }
}

function renderRows(rows) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML='';
  rows.forEach(row => {
    const tr = document.createElement('tr');
    columns.forEach(col => {
      const td = document.createElement('td');
      const val = row[col.field];
      td.dataset.field=col.field; td.dataset.id=row[PK];
      if (val===null||val===undefined||val==='') { td.textContent='—'; td.className='null-val editable'; }
      else { td.textContent=val; td.className='editable'; td.title=String(val); }
      td.ondblclick = e => { e.stopPropagation(); startEdit(tr,td,col,val); };
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function startEdit(tr, td, col, oldVal) {
  if (editCell) cancelEdit();
  if (col.field === PK) return;
  editCell={tr,td,col,oldVal};
  const inp=document.createElement('input');
  inp.className='edit-cell-input';
  inp.value=(oldVal===null||oldVal===undefined)?'':oldVal;
  inp.onkeydown=e=>{ if(e.key==='Enter') saveEdit(td.dataset.id,col.field,inp.value); if(e.key==='Escape') cancelEdit(); };
  td.innerHTML=''; td.appendChild(inp);
  const s=document.createElement('button'); s.className='btn-action btn-save ms-1'; s.textContent='✓';
  s.onclick=e=>{e.stopPropagation();saveEdit(td.dataset.id,col.field,inp.value);};
  const c=document.createElement('button'); c.className='btn-action btn-cancel ms-1'; c.textContent='✕';
  c.onclick=e=>{e.stopPropagation();cancelEdit();};
  td.appendChild(s); td.appendChild(c); inp.focus(); inp.select();
}

function cancelEdit() {
  if (!editCell) return;
  const {td,oldVal}=editCell;
  if (oldVal===null||oldVal===undefined||oldVal==='') { td.textContent='—'; td.className='null-val editable'; }
  else { td.textContent=oldVal; td.className='editable'; td.title=String(oldVal); }
  editCell=null;
}

async function saveEdit(id, field, val) {
  showLoading(true);
  try {
    const r=await fetch(`${API}/${id}`,{method:'PUT',headers:H,body:JSON.stringify({[field]:val===''?null:val})});
    const j=await r.json();
    if (!j.success) throw new Error(j.error);
    const {td,col}=editCell; editCell=null;
    const newVal=j.data[field];
    if (newVal===null||newVal===undefined||newVal==='') { td.textContent='—'; td.className='null-val editable'; }
    else { td.textContent=newVal; td.className='editable'; td.title=String(newVal); }
    td.ondblclick=e=>{e.stopPropagation();startEdit(null,td,col,newVal);};
    toast('Guardado correctamente');
  } catch(e) { toast(e.message,'error'); cancelEdit(); }
  finally { showLoading(false); }
}

function renderPagination({page:p, pages, total, limit:lim}) {
  const info=document.getElementById('paginInfo');
  const start=(p-1)*lim+1, end=Math.min(p*lim,total);
  info.textContent=`Mostrando ${start.toLocaleString()}–${end.toLocaleString()} de ${total.toLocaleString()} registros`;
  const cont=document.getElementById('pageBtns'); cont.innerHTML='';
  const mk=(label,pg,disabled=false,active=false)=>{
    const b=document.createElement('button'); b.className='page-btn'+(active?' active':'');
    b.textContent=label; b.disabled=disabled;
    b.onclick=()=>{page=pg;load();}; return b;
  };
  cont.appendChild(mk('«',1,p<=1)); cont.appendChild(mk('‹',p-1,p<=1));
  const start2=Math.max(1,p-2), end2=Math.min(pages,p+2);
  for(let i=start2;i<=end2;i++) cont.appendChild(mk(i,i,false,i===p));
  cont.appendChild(mk('›',p+1,p>=pages)); cont.appendChild(mk('»',pages,p>=pages));
}

function clearFilters() { filters={}; page=1; buildHeaders(); load(); }
function changeLimit() { limit=parseInt(document.getElementById('limitSel').value); page=1; load(); }

function exportCSV() {
  const rows=[columns.map(c=>c.field).join(';')];
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    rows.push([...tr.querySelectorAll('td')].map(td=>{ const v=td.textContent==='—'?'':td.textContent; return `"${v.replace(/"/g,'""')}"`; }).join(';'));
  });
  const blob=new Blob(['﻿'+rows.join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=TABLA+'.csv'; a.click();
}

init();

/* Vista ANALISTA (ruta -edicion): sin "NIVEL DIOS", breadcrumb sin Solo Dios. */
(function () {
  if (!/-edicion/.test(location.pathname)) return;
  const fix = () => {
    document.title = document.title.replace(/\s*nivel dios/i, '');
    document.querySelectorAll('h1,h2,h3,h6').forEach(el => { if (/nivel dios/i.test(el.textContent)) el.innerHTML = el.innerHTML.replace(/⚡\s*/, '').replace(/\s*NIVEL DIOS/i, ''); });
    document.querySelectorAll('a[href*="solo-dios"]').forEach(a => { const sep = a.nextElementSibling; a.remove(); if (sep && /›/.test(sep.textContent || '')) sep.remove(); });
  };
  fix(); setTimeout(fix, 150); document.addEventListener('DOMContentLoaded', fix);
})();
</script>
