<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunas — AutoFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy: #0141A2; --navy-dark: #012d70; --navy-light: #0255c5; --accent: #009AFE; --bg: #f0f4f8; }
    body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; min-height: 100vh; }
    .topnav { background: linear-gradient(90deg, var(--navy-dark), var(--navy-light)); color: #fff; height: 60px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .topnav-left { display: flex; align-items: center; gap: 16px; }
    .topnav-brand img { height: 32px; filter: brightness(0) invert(1); }
    .version-badge { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.75); font-size: 0.65rem; font-weight: 700; border-radius: 6px; padding: 2px 8px; }
    .breadcrumb-nav { color: rgba(255,255,255,0.6); font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
    .breadcrumb-nav a { color: rgba(255,255,255,0.75); text-decoration: none; }
    .breadcrumb-nav a:hover { color: #fff; }
    .breadcrumb-nav .sep { color: rgba(255,255,255,0.35); }
    .topnav-right { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 28px; height: 28px; background: #90caf9; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--navy); font-weight: 700; font-size: 0.75rem; }
    .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 5px 12px; font-size: 0.82rem; cursor: pointer; }
    .page-content { padding: 24px 32px; max-width: 1200px; margin: 0 auto; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-header h4 { font-weight: 700; color: #111827; margin: 0; display: flex; align-items: center; gap: 10px; }
    .page-header h4 i { color: var(--navy); }
    .cols-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    .col-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); display: flex; flex-direction: column; }
    .col-header { padding: 14px 16px; border-bottom: 2px solid #f0f4f8; display: flex; align-items: center; justify-content: space-between; }
    .col-header h6 { font-weight: 700; color: var(--navy); margin: 0; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
    .col-body { flex: 1; overflow-y: auto; max-height: calc(100vh - 260px); }
    .list-item { padding: 10px 16px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 0.87rem; transition: background 0.12s; }
    .list-item:hover { background: #eef2ff; }
    .list-item.active { background: #eef2ff; color: var(--navy); font-weight: 700; border-left: 3px solid var(--navy); }
    .list-item .item-name { flex: 1; }
    .item-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
    .list-item:hover .item-actions { opacity: 1; }
    .btn-icon { background: none; border: none; padding: 3px 6px; border-radius: 4px; cursor: pointer; font-size: 0.78rem; }
    .btn-icon.edit { color: var(--navy); }
    .btn-icon.edit:hover { background: #dbeafe; }
    .btn-icon.del { color: #dc2626; }
    .btn-icon.del:hover { background: #fee2e2; }
    .empty-state { padding: 40px 20px; text-align: center; color: #9ca3af; font-size: 0.85rem; }
    .btn-primary { background: var(--navy); border-color: var(--navy); font-size: 0.82rem; }
    .btn-primary:hover { background: var(--accent); border-color: var(--accent); }
    .modal-header { background: linear-gradient(135deg, var(--navy), var(--accent)); color: #fff; border-radius: 12px 12px 0 0; }
    .modal-header .btn-close { filter: invert(1); }
    .modal-content { border-radius: 12px; border: none; }
    .form-label { font-weight: 600; font-size: 0.82rem; color: #374151; }
    .form-control, .form-select { border-radius: 8px; border: 1.5px solid #d1d5db; font-size: 0.88rem; }
    .form-control:focus, .form-select:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(1,65,162,0.1); }
    .toast-container { position: fixed; top: 70px; right: 20px; z-index: 9999; }
    .search-col { padding: 8px 12px; border-bottom: 1px solid #f0f4f8; }
    .search-col input { border-radius: 6px; border: 1px solid #d1d5db; font-size: 0.82rem; padding: 5px 10px; width: 100%; }
    .badge-count { background: #e8eaf6; color: var(--navy); border-radius: 10px; padding: 2px 8px; font-size: 0.7rem; font-weight: 700; }
    .page-banner { background: linear-gradient(135deg, #012d70, #0141A2 50%, #009AFE); border-radius: 16px; color: #fff; padding: 28px 36px; margin-bottom: 36px; display: flex; align-items: center; gap: 20px; }
    .page-banner > i { font-size: 3rem; opacity: 0.8; }
    .page-banner h2 { font-weight: 700; margin: 0 0 4px; font-size: 1.4rem; }
    .page-banner p { opacity: 0.8; margin: 0; font-size: 0.9rem; }
  </style>
</head>
<body>
  <nav class="topnav">
    <div class="topnav-left">
      <div class="topnav-brand"><a href="/"><img src="/img/logo.png" alt="AutoFácil"></a> <span class="version-badge">v3.4</span></div>
      <div class="breadcrumb-nav">
        <a href="/">Inicio</a><span class="sep">/</span>
        <a href="/mantenedores/">Mantenedores</a><span class="sep">/</span>
        <span style="color:#fff;font-weight:600"><i class="bi bi-geo-alt me-1"></i>Comunas</span>
      </div>
    </div>
    <div class="topnav-right">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="avatar" id="avatarInicial">?</div>
        <span style="color:#fff;font-weight:600" id="navNombre">—</span>
      </div>
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
    </div>
  </nav>

  <div class="toast-container">
    <div id="toast" class="toast align-items-center text-white border-0" role="alert">
      <div class="d-flex"><div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>
    </div>
  </div>

  <div class="page-content">
    <div class="page-banner">
      <i class="bi bi-geo-alt"></i>
      <div>
        <h2>Comunas</h2>
        <p>Gestión de regiones, provincias y comunas de Chile</p>
      </div>
    </div>

    <div class="cols-grid">
      <!-- REGIONES -->
      <div class="col-card">
        <div class="col-header">
          <h6><i class="bi bi-map"></i> Regiones <span class="badge-count" id="cntRegiones">0</span></h6>
          <button class="btn btn-primary btn-sm" onclick="abrirModalRegion()"><i class="bi bi-plus-lg"></i></button>
        </div>
        <div class="search-col">
          <input type="text" id="buscarRegion" placeholder="Buscar región..." oninput="filtrarRegiones()">
        </div>
        <div class="col-body" id="listaRegiones">
          <div class="empty-state">Cargando...</div>
        </div>
      </div>

      <!-- PROVINCIAS -->
      <div class="col-card">
        <div class="col-header">
          <h6><i class="bi bi-diagram-2"></i> Provincias <span class="badge-count" id="cntProvincias">0</span></h6>
          <button class="btn btn-primary btn-sm" onclick="abrirModalProvincia()" id="btnNuevaProv" disabled><i class="bi bi-plus-lg"></i></button>
        </div>
        <div class="search-col">
          <input type="text" id="buscarProvincia" placeholder="Buscar provincia..." oninput="filtrarProvincias()">
        </div>
        <div class="col-body" id="listaProvincias">
          <div class="empty-state">Selecciona una región</div>
        </div>
      </div>

      <!-- COMUNAS -->
      <div class="col-card">
        <div class="col-header">
          <h6><i class="bi bi-geo-alt"></i> Comunas <span class="badge-count" id="cntComunas">0</span></h6>
          <button class="btn btn-primary btn-sm" onclick="abrirModalComuna()" id="btnNuevaComuna" disabled><i class="bi bi-plus-lg"></i></button>
        </div>
        <div class="search-col">
          <input type="text" id="buscarComuna" placeholder="Buscar comuna..." oninput="filtrarComunas()">
        </div>
        <div class="col-body" id="listaComunas">
          <div class="empty-state">Selecciona una provincia</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal fade" id="modal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitulo">—</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3" id="campoPadre" style="display:none">
            <label class="form-label" id="labelPadre">—</label>
            <select id="fPadre" class="form-select"></select>
          </div>
          <div class="mb-2">
            <label class="form-label">Nombre *</label>
            <input type="text" id="fNombre" class="form-control" placeholder="Nombre">
          </div>
          <div id="modalError" class="alert alert-danger mt-3 d-none"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary btn-sm" id="btnGuardar" onclick="guardar()"><i class="bi bi-floppy me-1"></i>Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const yo = JSON.parse(localStorage.getItem('usuario') || 'null');
    if (!token || !yo) { window.location.href = '/login.html'; }
    document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
    document.getElementById('avatarInicial').textContent = (yo?.nombre||'?').charAt(0).toUpperCase();
    function logout() { localStorage.removeItem('token'); localStorage.removeItem('usuario'); window.location.href = '/login.html'; }

    const api = async (method, url, body) => {
      const r = await fetch(url, { method, headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' }, body: body ? JSON.stringify(body) : undefined });
      if (r.status === 401) { logout(); return null; }
      return r.json();
    };
    const showToast = (msg, tipo='success') => {
      const el = document.getElementById('toast');
      el.className = `toast align-items-center text-white border-0 bg-${tipo}`;
      document.getElementById('toastMsg').textContent = msg;
      bootstrap.Toast.getOrCreateInstance(el, { delay: 3000 }).show();
    };

    let regiones = [], provincias = [], comunas = [];
    let selRegion = null, selProvincia = null;
    let modalTipo = '', editId = null;

    // ─── CARGAR DATOS ───
    async function cargarRegiones() {
      const d = await api('GET', '/api/geografico/regiones');
      if (d?.success) { regiones = d.data; renderRegiones(regiones); }
    }

    async function cargarProvincias(id_region) {
      const d = await api('GET', `/api/geografico/provincias?id_region=${id_region}`);
      if (d?.success) { provincias = d.data; renderProvincias(provincias); }
    }

    async function cargarComunas(id_provincia) {
      const d = await api('GET', `/api/geografico/comunas?id_provincia=${id_provincia}`);
      if (d?.success) { comunas = d.data; renderComunas(comunas); }
    }

    // ─── RENDER ───
    function renderRegiones(lista) {
      document.getElementById('cntRegiones').textContent = lista.length;
      const el = document.getElementById('listaRegiones');
      if (!lista.length) { el.innerHTML = '<div class="empty-state">Sin regiones</div>'; return; }
      el.innerHTML = lista.map(r => `
        <div class="list-item ${selRegion?.id_region===r.id_region?'active':''}" onclick="seleccionarRegion(${r.id_region})">
          <span class="item-name">${r.nombre}</span>
          <div class="item-actions">
            <button class="btn-icon edit" onclick="event.stopPropagation();editarRegion(${r.id_region},'${esc(r.nombre)}')"><i class="bi bi-pencil"></i></button>
            <button class="btn-icon del" onclick="event.stopPropagation();eliminar('region',${r.id_region})"><i class="bi bi-trash"></i></button>
          </div>
        </div>`).join('');
    }

    function renderProvincias(lista) {
      document.getElementById('cntProvincias').textContent = lista.length;
      const el = document.getElementById('listaProvincias');
      if (!lista.length) { el.innerHTML = '<div class="empty-state">Sin provincias</div>'; return; }
      el.innerHTML = lista.map(p => `
        <div class="list-item ${selProvincia?.id_provincia===p.id_provincia?'active':''}" onclick="seleccionarProvincia(${p.id_provincia})">
          <span class="item-name">${p.nombre}</span>
          <div class="item-actions">
            <button class="btn-icon edit" onclick="event.stopPropagation();editarProvincia(${p.id_provincia},'${esc(p.nombre)}',${p.id_region})"><i class="bi bi-pencil"></i></button>
            <button class="btn-icon del" onclick="event.stopPropagation();eliminar('provincia',${p.id_provincia})"><i class="bi bi-trash"></i></button>
          </div>
        </div>`).join('');
    }

    function renderComunas(lista) {
      document.getElementById('cntComunas').textContent = lista.length;
      const el = document.getElementById('listaComunas');
      if (!lista.length) { el.innerHTML = '<div class="empty-state">Sin comunas</div>'; return; }
      el.innerHTML = lista.map(c => `
        <div class="list-item">
          <span class="item-name">${c.nombre}</span>
          <div class="item-actions">
            <button class="btn-icon edit" onclick="editarComuna(${c.id_comuna},'${esc(c.nombre)}',${c.id_provincia})"><i class="bi bi-pencil"></i></button>
            <button class="btn-icon del" onclick="eliminar('comuna',${c.id_comuna})"><i class="bi bi-trash"></i></button>
          </div>
        </div>`).join('');
    }

    const esc = s => (s||'').replace(/'/g,"\\'");

    // ─── SELECCIÓN ───
    function seleccionarRegion(id) {
      selRegion = regiones.find(r => r.id_region === id);
      selProvincia = null;
      renderRegiones(regiones);
      document.getElementById('listaProvincias').innerHTML = '<div class="empty-state">Cargando...</div>';
      document.getElementById('listaComunas').innerHTML = '<div class="empty-state">Selecciona una provincia</div>';
      document.getElementById('cntComunas').textContent = '0';
      document.getElementById('btnNuevaProv').disabled = false;
      document.getElementById('btnNuevaComuna').disabled = true;
      cargarProvincias(id);
    }

    function seleccionarProvincia(id) {
      selProvincia = provincias.find(p => p.id_provincia === id);
      renderProvincias(provincias);
      document.getElementById('listaComunas').innerHTML = '<div class="empty-state">Cargando...</div>';
      document.getElementById('btnNuevaComuna').disabled = false;
      cargarComunas(id);
    }

    // ─── FILTROS ───
    function filtrarRegiones() {
      const q = document.getElementById('buscarRegion').value.toLowerCase();
      renderRegiones(regiones.filter(r => r.nombre.toLowerCase().includes(q)));
    }
    function filtrarProvincias() {
      const q = document.getElementById('buscarProvincia').value.toLowerCase();
      renderProvincias(provincias.filter(p => p.nombre.toLowerCase().includes(q)));
    }
    function filtrarComunas() {
      const q = document.getElementById('buscarComuna').value.toLowerCase();
      renderComunas(comunas.filter(c => c.nombre.toLowerCase().includes(q)));
    }

    // ─── MODALES ───
    function abrirModalRegion() {
      modalTipo = 'region'; editId = null;
      document.getElementById('modalTitulo').textContent = 'Nueva Región';
      document.getElementById('fNombre').value = '';
      document.getElementById('campoPadre').style.display = 'none';
      document.getElementById('modalError').classList.add('d-none');
      bootstrap.Modal.getOrCreateInstance(document.getElementById('modal')).show();
    }

    function editarRegion(id, nombre) {
      modalTipo = 'region'; editId = id;
      document.getElementById('modalTitulo').textContent = 'Editar Región';
      document.getElementById('fNombre').value = nombre;
      document.getElementById('campoPadre').style.display = 'none';
      document.getElementById('modalError').classList.add('d-none');
      bootstrap.Modal.getOrCreateInstance(document.getElementById('modal')).show();
    }

    function abrirModalProvincia() {
      modalTipo = 'provincia'; editId = null;
      document.getElementById('modalTitulo').textContent = 'Nueva Provincia';
      document.getElementById('fNombre').value = '';
      document.getElementById('campoPadre').style.display = '';
      document.getElementById('labelPadre').textContent = 'Región';
      const sel = document.getElementById('fPadre');
      sel.innerHTML = regiones.map(r => `<option value="${r.id_region}" ${selRegion?.id_region===r.id_region?'selected':''}>${r.nombre}</option>`).join('');
      document.getElementById('modalError').classList.add('d-none');
      bootstrap.Modal.getOrCreateInstance(document.getElementById('modal')).show();
    }

    function editarProvincia(id, nombre, id_region) {
      modalTipo = 'provincia'; editId = id;
      document.getElementById('modalTitulo').textContent = 'Editar Provincia';
      document.getElementById('fNombre').value = nombre;
      document.getElementById('campoPadre').style.display = '';
      document.getElementById('labelPadre').textContent = 'Región';
      const sel = document.getElementById('fPadre');
      sel.innerHTML = regiones.map(r => `<option value="${r.id_region}" ${r.id_region===id_region?'selected':''}>${r.nombre}</option>`).join('');
      document.getElementById('modalError').classList.add('d-none');
      bootstrap.Modal.getOrCreateInstance(document.getElementById('modal')).show();
    }

    function abrirModalComuna() {
      modalTipo = 'comuna'; editId = null;
      document.getElementById('modalTitulo').textContent = 'Nueva Comuna';
      document.getElementById('fNombre').value = '';
      document.getElementById('campoPadre').style.display = '';
      document.getElementById('labelPadre').textContent = 'Provincia';
      const sel = document.getElementById('fPadre');
      sel.innerHTML = provincias.map(p => `<option value="${p.id_provincia}" ${selProvincia?.id_provincia===p.id_provincia?'selected':''}>${p.nombre}</option>`).join('');
      document.getElementById('modalError').classList.add('d-none');
      bootstrap.Modal.getOrCreateInstance(document.getElementById('modal')).show();
    }

    function editarComuna(id, nombre, id_provincia) {
      modalTipo = 'comuna'; editId = id;
      document.getElementById('modalTitulo').textContent = 'Editar Comuna';
      document.getElementById('fNombre').value = nombre;
      document.getElementById('campoPadre').style.display = '';
      document.getElementById('labelPadre').textContent = 'Provincia';
      const sel = document.getElementById('fPadre');
      sel.innerHTML = provincias.map(p => `<option value="${p.id_provincia}" ${p.id_provincia===id_provincia?'selected':''}>${p.nombre}</option>`).join('');
      document.getElementById('modalError').classList.add('d-none');
      bootstrap.Modal.getOrCreateInstance(document.getElementById('modal')).show();
    }

    // ─── GUARDAR ───
    async function guardar() {
      const nombre = document.getElementById('fNombre').value.trim();
      const padreId = parseInt(document.getElementById('fPadre').value);
      if (!nombre) { mostrarError('El nombre es requerido'); return; }

      let url, body;
      if (modalTipo === 'region') {
        url = editId ? `/api/geografico/regiones/${editId}` : '/api/geografico/regiones';
        body = { nombre };
      } else if (modalTipo === 'provincia') {
        url = editId ? `/api/geografico/provincias/${editId}` : '/api/geografico/provincias';
        body = { nombre, id_region: padreId };
      } else {
        url = editId ? `/api/geografico/comunas/${editId}` : '/api/geografico/comunas';
        body = { nombre, id_provincia: padreId };
      }

      const d = await api(editId ? 'PUT' : 'POST', url, body);
      if (d?.success) {
        bootstrap.Modal.getInstance(document.getElementById('modal')).hide();
        showToast(editId ? 'Actualizado' : 'Creado correctamente');
        if (modalTipo === 'region') { await cargarRegiones(); }
        else if (modalTipo === 'provincia' && selRegion) { await cargarProvincias(selRegion.id_region); }
        else if (modalTipo === 'comuna' && selProvincia) { await cargarComunas(selProvincia.id_provincia); }
      } else { mostrarError(d?.error || 'Error al guardar'); }
    }

    function mostrarError(msg) {
      const el = document.getElementById('modalError');
      el.textContent = msg; el.classList.remove('d-none');
    }

    // ─── ELIMINAR ───
    async function eliminar(tipo, id) {
      const nombres = { region: 'región', provincia: 'provincia', comuna: 'comuna' };
      if (!confirm(`¿Eliminar esta ${nombres[tipo]}?`)) return;
      const urls = { region: `/api/geografico/regiones/${id}`, provincia: `/api/geografico/provincias/${id}`, comuna: `/api/geografico/comunas/${id}` };
      const d = await api('DELETE', urls[tipo]);
      if (d?.success) {
        showToast('Eliminado correctamente');
        if (tipo === 'region') { selRegion = null; selProvincia = null; await cargarRegiones(); document.getElementById('listaProvincias').innerHTML='<div class="empty-state">Selecciona una región</div>'; document.getElementById('listaComunas').innerHTML='<div class="empty-state">Selecciona una provincia</div>'; document.getElementById('cntProvincias').textContent='0'; document.getElementById('cntComunas').textContent='0'; }
        else if (tipo === 'provincia') { selProvincia = null; if (selRegion) await cargarProvincias(selRegion.id_region); document.getElementById('listaComunas').innerHTML='<div class="empty-state">Selecciona una provincia</div>'; document.getElementById('cntComunas').textContent='0'; }
        else if (tipo === 'comuna') { if (selProvincia) await cargarComunas(selProvincia.id_provincia); }
      } else showToast(d?.error || 'Error al eliminar', 'danger');
    }

    cargarRegiones();
  </script>
</body>
</html>
