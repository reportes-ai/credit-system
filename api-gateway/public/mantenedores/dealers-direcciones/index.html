<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revisión de Direcciones — AutoFácil</title>
  <!-- v1.0 — Revisión de direcciones de dealers (tu dirección vs Google) -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:1100; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,0.15); color:rgba(255,255,255,0.75); font-size:0.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav a { color:rgba(255,255,255,0.8); text-decoration:none; font-size:0.85rem; }
    .breadcrumb-nav .sep { color:rgba(255,255,255,0.5); margin:0 7px; }
    .btn-back { color:rgba(255,255,255,0.9); text-decoration:none; font-size:13px; font-weight:600; padding:6px 14px; border:1px solid rgba(255,255,255,0.3); border-radius:7px; }
    .wrap { max-width:980px; margin:0 auto; padding:18px 18px 40px; }
    .bar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; background:#fff; border:1px solid #e3e8ef; border-radius:12px; padding:12px 14px; box-shadow:0 2px 8px rgba(1,65,162,.05); margin-bottom:14px; }
    .stat { display:inline-flex; align-items:center; gap:6px; font-size:.82rem; color:#334155; background:#f8fafc; border:1px solid #e3e8ef; border-radius:20px; padding:5px 12px; font-weight:600; }
    .stat b { color:#0141A2; }
    .toggle { display:inline-flex; align-items:center; gap:6px; font-size:.82rem; color:#334155; cursor:pointer; user-select:none; }
    .card { background:#fff; border:1px solid #e3e8ef; border-radius:14px; box-shadow:0 4px 16px rgba(1,65,162,.07); overflow:hidden; }
    .card-h { background:#f8fafc; border-bottom:1px solid #eef2f7; padding:14px 18px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .card-h .nm { font-weight:800; color:#0141A2; font-size:1.05rem; }
    .card-h .meta { color:#64748b; font-size:.84rem; }
    .badge-duda { background:#fffbeb; color:#92400e; border:1px solid #fde68a; border-radius:20px; padding:3px 11px; font-size:.72rem; font-weight:700; }
    .badge-ok { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; border-radius:20px; padding:3px 11px; font-size:.72rem; font-weight:700; }
    .card-b { padding:16px 18px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media(max-width:760px){ .card-b{ grid-template-columns:1fr; } }
    .opt { border:1px solid #e3e8ef; border-radius:10px; padding:11px 13px; background:#fcfdff; }
    .opt .lbl { font-size:.68rem; font-weight:800; letter-spacing:.4px; text-transform:uppercase; color:#94a3b8; margin-bottom:5px; display:flex; align-items:center; gap:6px; }
    .opt .val { color:#0f172a; font-size:.92rem; line-height:1.45; min-height:38px; }
    .opt .use { margin-top:9px; background:#eef4ff; color:#0141A2; border:1px solid #cdddff; border-radius:7px; padding:5px 11px; font-size:.78rem; font-weight:700; cursor:pointer; }
    .opt .use:hover { background:#0141A2; color:#fff; }
    .opt.goog { border-color:#cdddff; background:#f5f9ff; }
    .editor { grid-column:1/-1; }
    .editor label { font-size:.72rem; font-weight:800; color:#0141A2; text-transform:uppercase; letter-spacing:.4px; }
    .editor input { width:100%; border:1.5px solid #cdddff; border-radius:9px; padding:10px 12px; font-size:.95rem; margin-top:5px; box-sizing:border-box; }
    #mini { grid-column:1/-1; height:230px; border-radius:11px; border:1px solid #e3e8ef; z-index:1; }
    .card-f { padding:14px 18px; border-top:1px solid #eef2f7; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .btn { border:none; border-radius:9px; padding:10px 18px; font-weight:700; font-size:.9rem; cursor:pointer; }
    .btn-save { background:#16a34a; color:#fff; } .btn-save:hover{ background:#15803d; }
    .btn-keep { background:#0141A2; color:#fff; } .btn-keep:hover{ background:#0255c5; }
    .btn-skip { background:#f1f5f9; color:#475569; } .btn-skip:hover{ background:#e2e8f0; }
    .done { text-align:center; padding:50px 20px; color:#166534; }
    .done i { font-size:3rem; }
    .toast-af { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:#0f172a; color:#fff; padding:11px 20px; border-radius:10px; font-size:.88rem; z-index:3000; display:none; box-shadow:0 8px 28px rgba(0,0,0,.35); }
    .toast-af.err { background:#b91c1c; }
    .warn { background:#fffbeb; border:1px solid #fde68a; border-left:4px solid #f59e0b; border-radius:10px; padding:10px 14px; color:#92400e; font-size:.84rem; margin-bottom:12px; }
  </style>
</head>
<body>

<nav class="topnav">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a><span class="sep">›</span><a href="/mantenedores/dealers/">Dealers</a><span class="sep">›</span><span style="color:#fff;font-weight:600"><i class="bi bi-pin-map me-1"></i>Revisión de direcciones</span></div>
  </div>
  <a href="/mantenedores/dealers-mapa/" class="btn-back"><i class="bi bi-geo-alt me-1"></i>Mapa</a>
</nav>

<div class="wrap">
  <div id="noKey" class="warn" style="display:none"><i class="bi bi-exclamation-triangle me-1"></i><b>Falta la API key de Google</b> (<code>GOOGLE_MAPS_API_KEY</code> en Render). Sin ella no se puede normalizar ni re-geocodificar al guardar.</div>

  <div class="bar">
    <span class="stat"><i class="bi bi-list-check"></i> Por revisar <b id="stPend">0</b></span>
    <span class="stat"><i class="bi bi-exclamation-triangle"></i> Dudosas <b id="stDudas">0</b></span>
    <span class="stat"><i class="bi bi-check2-circle"></i> Revisadas <b id="stRev">0</b></span>
    <div style="flex:1"></div>
    <label class="toggle"><input type="checkbox" id="soloDudas" checked onchange="rebuild()"> Solo dudosas primero</label>
  </div>

  <div id="cont"></div>
</div>

<div id="toast" class="toast-af"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const token = sessionStorage.getItem('token');
const yo = JSON.parse(sessionStorage.getItem('usuario') || 'null');
if (!token || !yo) location.href = '/login.html';
const H = { 'Content-Type':'application/json', Authorization:'Bearer '+token };
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m, err){ const t=$('toast'); t.textContent=m; t.className='toast-af'+(err?' err':''); t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
const PREC = { ROOFTOP:'exacta', RANGE_INTERPOLATED:'buena', GEOMETRIC_CENTER:'aproximada (centro)', APPROXIMATE:'aproximada' };

let TODAS = [], cola = [], i = 0, map, marker, tieneKey = false;

async function cargar(){
  const j = await (await fetch('/api/dealers/direcciones',{headers:H})).json();
  if (!j.success) { toast(j.error||'Error', true); return; }
  TODAS = j.data.rows || [];
  tieneKey = j.data.tiene_key;
  $('noKey').style.display = tieneKey ? 'none' : 'block';
  const st = j.data.stats || {};
  $('stRev').textContent = (st.revisadas||0);
  $('stDudas').textContent = (st.dudas||0);
  rebuild();
}
function rebuild(){
  const pend = TODAS.filter(d => Number(d.dir_revisada) === 0);
  cola = $('soloDudas').checked
    ? [...pend].sort((a,b)=> (Number(b.duda)-Number(a.duda)) || (a.numero-b.numero))
    : pend;
  i = 0;
  $('stPend').textContent = cola.length;
  render();
}
function render(){
  const c = $('cont');
  if (i >= cola.length) {
    c.innerHTML = `<div class="card"><div class="done"><i class="bi bi-check-circle-fill"></i>
      <h3 style="margin:10px 0 4px">¡Listo!</h3>
      <p style="color:#64748b">No quedan direcciones por revisar con el filtro actual.</p>
      <a href="/mantenedores/dealers-mapa/" class="btn btn-keep" style="text-decoration:none;display:inline-block;margin-top:8px">Ver el mapa</a></div></div>`;
    return;
  }
  const d = cola[i];
  const dudoso = Number(d.duda) === 1;
  const prec = d.geo_precision ? (PREC[d.geo_precision] || d.geo_precision) : null;
  c.innerHTML = `
    <div class="card">
      <div class="card-h">
        <span class="nm">${esc(d.nombre||'Dealer')}</span>
        <span class="meta">N° ${d.numero??'—'} · RUT ${esc(d.rut||'—')} · ${esc(d.comuna||'')}</span>
        <div style="flex:1"></div>
        ${dudoso ? '<span class="badge-duda"><i class="bi bi-exclamation-triangle me-1"></i>Revisar</span>' : '<span class="badge-ok"><i class="bi bi-check2 me-1"></i>Coincide bien</span>'}
        <span class="meta">${i+1} de ${cola.length}</span>
      </div>
      <div class="card-b">
        <div class="opt">
          <div class="lbl"><i class="bi bi-pencil"></i> Tu dirección (actual)</div>
          <div class="val">${esc(d.direccion||'—')}</div>
          <button class="use" onclick="usar(${escAttr(d.direccion)})">Usar esta</button>
        </div>
        <div class="opt goog">
          <div class="lbl"><i class="bi bi-google"></i> Google sugiere ${prec?`· precisión ${esc(prec)}`:''}</div>
          <div class="val">${esc(d.geo_dir||'(no se pudo geocodificar)')}</div>
          ${d.geo_dir?`<button class="use" onclick="usar(${escAttr(d.geo_dir)})">Usar esta</button>`:''}
        </div>
        <div class="editor">
          <label>Dirección a guardar (puedes ajustarla)</label>
          <input id="editor" value="${esc(d.geo_dir || d.direccion || '')}">
        </div>
        <div id="mini"></div>
      </div>
      <div class="card-f">
        <button class="btn btn-save" onclick="guardar()"><i class="bi bi-save me-1"></i>Guardar y siguiente</button>
        <button class="btn btn-keep" onclick="mantener()"><i class="bi bi-hand-thumbs-up me-1"></i>Mantener la mía</button>
        <button class="btn btn-skip" onclick="saltar()">Saltar →</button>
        <div style="flex:1"></div>
        <span style="color:#94a3b8;font-size:.8rem"><i class="bi bi-info-circle"></i> "Guardar" re-geocodifica y actualiza el punto del mapa.</span>
      </div>
    </div>`;
  pintarMini(d);
}
function escAttr(s){ return "'" + String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;') + "'"; }
function usar(v){ $('editor').value = v; }
function pintarMini(d){
  const el = $('mini'); if (!el) return;
  if (!map) {
    map = L.map('mini', { zoomControl:true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19, attribution:'© OpenStreetMap' }).addTo(map);
  } else { map.invalidateSize(); }
  if (d.lat != null && d.lng != null) {
    map.setView([d.lat, d.lng], 16);
    if (marker) marker.setLatLng([d.lat, d.lng]); else marker = L.marker([d.lat, d.lng]).addTo(map);
    marker.bindPopup(esc(d.geo_dir||d.direccion||''));
  } else {
    map.setView([-33.45,-70.66], 11);
    if (marker) { map.removeLayer(marker); marker = null; }
  }
  setTimeout(()=>map.invalidateSize(), 120);
}
async function post(id, body){
  const r = await fetch('/api/dealers/'+id+'/direccion', { method:'POST', headers:H, body:JSON.stringify(body) });
  const j = await r.json(); if (!j.success) throw new Error(j.error||'Error'); return j.data;
}
async function guardar(){
  const d = cola[i]; const nueva = $('editor').value.trim();
  if (!nueva) { toast('La dirección no puede ir vacía.', true); return; }
  try {
    const r = await post(d.id_dealer, { accion:'guardar', direccion:nueva });
    d.dir_revisada = 1; bumpRev();
    if (r && r.geo_status && r.geo_status !== 'OK') toast('Guardada, pero Google no la ubicó bien — quedará sin punto en el mapa.');
    else toast('Dirección actualizada ✓');
    next();
  } catch(e){ toast(e.message, true); }
}
async function mantener(){
  const d = cola[i];
  try { await post(d.id_dealer, { accion:'mantener' }); d.dir_revisada = 1; bumpRev(); toast('Mantienes la tuya ✓'); next(); }
  catch(e){ toast(e.message, true); }
}
function saltar(){ next(); }
function next(){ i++; $('stPend').textContent = Math.max(cola.length - i, 0); render(); }
function bumpRev(){ $('stRev').textContent = (parseInt($('stRev').textContent||'0')+1); }

cargar();
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
