<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantenedores — AutoFácil</title>
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <script src="/js/Sortable.min.js"></script>
  <script src="/js/orden-toast.js"></script>
  <style>
    :root { --navy: #0141A2; --navy-dark: #012d70; --navy-light: #0255c5; --accent: #009AFE; --bg: #f0f4f8; }
    body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; min-height: 100vh; }
    .topnav { background: linear-gradient(90deg, var(--navy-dark), var(--navy-light)); color: #fff; height: 60px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .topnav-left { display: flex; align-items: center; gap: 16px; }
    .topnav-brand { display: flex; align-items: center; gap: 8px; }
    .topnav-brand img { height: 34px; filter: brightness(0) invert(1); }
    .version-badge { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.75); font-size: 0.65rem; font-weight: 700; border-radius: 6px; padding: 2px 8px; letter-spacing: 0.5px; margin-left: 2px; }
    .breadcrumb-nav { color: rgba(255,255,255,0.6); font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
    .breadcrumb-nav a { color: rgba(255,255,255,0.75); text-decoration: none; }
    .breadcrumb-nav a:hover { color: #fff; }
    .breadcrumb-nav .sep { color: rgba(255,255,255,0.35); }
    .topnav-right { display: flex; align-items: center; gap: 12px; }
    .user-chip { background: rgba(255,255,255,0.12); border-radius: 24px; padding: 5px 12px; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
    .avatar { width: 28px; height: 28px; background: #90caf9; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--navy); font-weight: 700; font-size: 0.75rem; }
    .perfil-badge { background: rgba(144,202,249,0.2); border: 1px solid rgba(144,202,249,0.4); color: #90caf9; border-radius: 12px; padding: 2px 10px; font-size: 0.73rem; font-weight: 600; }
    .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 5px 12px; font-size: 0.82rem; cursor: pointer; }
    .btn-logout:hover { background: rgba(255,255,255,0.2); }
    .main-content { padding: 36px 40px; max-width: 1500px; margin: 0 auto; }
    .page-banner { background: linear-gradient(135deg, #012d70, #0141A2 50%, #009AFE); border-radius: 16px; color: #fff; padding: 28px 36px; margin-bottom: 36px; display: flex; align-items: center; gap: 20px; }
    .page-banner i.bi-sliders { font-size: 3rem; opacity: 0.8; }
    .page-banner h2 { font-weight: 700; margin: 0 0 4px; font-size: 1.4rem; }
    .page-banner p { opacity: 0.8; margin: 0; font-size: 0.9rem; }
    .section-title { font-weight: 700; font-size: 0.85rem; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
    .modules-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
    @media (max-width: 900px) { .modules-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 640px) { .main-content { padding: 20px 16px; } .modules-grid { grid-template-columns: repeat(2, 1fr); } }
    .module-card { background: #fff; border-radius: 14px; padding: 24px 22px; cursor: pointer; text-decoration: none; color: inherit; border: 2px solid transparent; transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s; display: flex; flex-direction: column; min-height: 215px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); position: relative; }
    .module-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(1,65,162,0.15); border-color: var(--navy); color: inherit; }
    .card-icon { width: 52px; height: 52px; border-radius: 14px; background: linear-gradient(135deg, #e8eaf6, #c5cae9); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: var(--navy); margin-bottom: 16px; transition: background 0.18s, color 0.18s; }
    .module-card:hover .card-icon { background: linear-gradient(135deg, var(--navy), var(--accent)); color: #fff; }
    .module-card h6 { font-weight: 700; font-size: 0.95rem; margin: 0 0 6px; color: #111827; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .module-card p { font-size: 0.8rem; color: #6b7280; margin: 0 0 16px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .btn-acceder { background: var(--navy); color: #fff; border: none; border-radius: 8px; padding: 7px 16px; font-size: 0.82rem; font-weight: 600; align-self: flex-start; margin-top: auto; }
    .module-card:hover .btn-acceder { background: var(--accent); }

    /* Reordenar */
    .btn-reordenar { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); color: #fff; border-radius: 8px; padding: 5px 13px; font-size: 0.82rem; font-weight: 600; cursor: pointer; display: none; align-items: center; gap: 6px; }
    .btn-reordenar:hover { background: rgba(255,255,255,0.22); }
    .btn-reordenar.activo { background: #f59e0b; border-color: #f59e0b; }
    .btn-guardar-orden { background: #16a34a; border: none; color: #fff; border-radius: 8px; padding: 5px 13px; font-size: 0.82rem; font-weight: 600; cursor: pointer; display: none; align-items: center; gap: 6px; }
    .btn-guardar-orden:hover { background: #15803d; }
    .drag-handle { position: absolute; top: 10px; right: 10px; color: #9ca3af; font-size: 1.1rem; display: none; }
    .modules-grid.sortable-mode .module-card { cursor: grab; border: 2px dashed #d1d5db; }
    .modules-grid.sortable-mode .module-card:hover { transform: none; box-shadow: 0 4px 16px rgba(1,65,162,0.1); border-color: var(--navy); }
    .modules-grid.sortable-mode .module-card.sortable-chosen { cursor: grabbing; box-shadow: 0 12px 40px rgba(1,65,162,0.3); border-color: var(--navy); transform: scale(1.03); }
    .modules-grid.sortable-mode .module-card.sortable-ghost { opacity: 0.3; }
    .modules-grid.sortable-mode .drag-handle { display: block; }

    /* Buscador */
    .search-wrap { position: relative; max-width: 520px; margin: 0 0 24px; }
    .search-wrap > i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 1.05rem; pointer-events: none; }
    .search-wrap input { width: 100%; box-sizing: border-box; border: 2px solid #e5e7eb; border-radius: 12px; padding: 11px 40px 11px 42px; font-size: 0.95rem; outline: none; background: #fff; transition: border-color .15s, box-shadow .15s; }
    .search-wrap input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(1,65,162,.1); }
    .search-wrap .clr { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); border: none; background: #f1f5f9; color: #64748b; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 1rem; line-height: 1; display: none; }
    .search-wrap .clr:hover { background: #e2e8f0; }
    .no-result { color: #9ca3af; padding: 26px 4px; font-size: 0.9rem; display: none; }
  </style>
</head>
<body>
  <nav class="topnav">
    <div class="topnav-left">
      <a href="/" class="topnav-brand">
        <img src="/img/logo.png" alt="AutoFácil" style="display:block">
        <span class="version-badge" id="versionBadge">v5.6</span>
      </a>
        <div class="breadcrumb-nav"><a href="/">Inicio</a><span class="sep">›</span><span style="color:#fff;font-weight:600"><i class="bi bi-gear me-1"></i>Mantenedores</span></div></div>
    <div class="topnav-right">
      
    <a href="/dashboard" title="Dashboard Analytics" style="display:flex;align-items:center;gap:5px;color:rgba(255,255,255,0.85);text-decoration:none;font-size:12px;font-weight:500;padding:5px 10px;border:1px solid rgba(255,255,255,0.25);border-radius:6px;transition:.15s" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">
      <i class="bi bi-bar-chart-line" style="font-size:15px"></i> Dashboard
    </a>
    <div class="user-chip">
        <div class="avatar" id="avatarInicial">?</div>
        <div>
          <div style="font-weight:600; line-height:1.3; color:#fff" id="navNombre">—</div>
          <div class="perfil-badge" id="navPerfil">—</div>
        </div>
      </div>
      <button class="btn-reordenar" id="btnReordenar" onclick="toggleReordenar()">
        <i class="bi bi-arrows-move"></i>Reordenar
      </button>
      <button class="btn-guardar-orden" id="btnGuardarOrden" onclick="guardarOrden()">
        <i class="bi bi-floppy"></i>Guardar orden
      </button>
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
    </div>
  </nav>

  <div class="main-content">
    <div class="page-banner">
      <i class="bi bi-sliders"></i>
      <div>
        <h2>Mantenedores</h2>
        <p>Administración de valores y parámetros del sistema</p>
      </div>
    </div>
    <div class="search-wrap">
      <i class="bi bi-search"></i>
      <input type="text" id="buscarMant" placeholder="Buscar mantenedor por nombre o descripción…" oninput="filtrarMant()" autocomplete="off">
      <button class="clr" id="clrMant" onclick="limpiarMant()" title="Limpiar">&times;</button>
    </div>
    <div class="section-title"><i class="bi bi-grid-3x3-gap-fill"></i> Submódulos disponibles</div>
    <div class="modules-grid" id="modulesGrid"></div>
    <div class="no-result" id="mantNoResult"></div>
  </div>

  <script src="/js/placement-manifest.js"></script>
  <script src="/js/auth-guard.js"></script>
<script>
    const token = sessionStorage.getItem('token');
    const yo    = JSON.parse(sessionStorage.getItem('usuario') || 'null');
    if (!token || !yo) window.location.href = '/login.html';
    const esAdmin = yo?.perfil === 'Administrador';
    const H = { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token };

    document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
    document.getElementById('navPerfil').textContent  = yo?.perfil || '';
    document.getElementById('avatarInicial').textContent = (yo?.nombre||'?').charAt(0).toUpperCase();
    if (esAdmin) document.getElementById('btnReordenar').style.display = 'flex';

    function logout() { sessionStorage.removeItem('token'); sessionStorage.removeItem('usuario'); window.location.href = '/login.html'; }

    // Descripciones por id (texto de presentación — mantenido en frontend)
    const DESCS = {
      'compras':             'Catálogo por perfil, direcciones de despacho y centro de costo por usuario',
      'correos-programados': 'Correos automáticos por horario: activar/suspender, hora, días y destinatarios',
      'backups':             'Suplencias por usuario: hereda Funciones, Alertas y Correos a un backup',
      'actividades-economicas': 'Catálogo SII de actividades económicas: código, glosa, afecto a IVA y categoría tributaria',
      'tasas':               'Gestión de tasas mensuales y anuales para créditos',
      'uf':                  'Registro y consulta del valor de la Unidad de Fomento',
      'dealers':             'Administración de concesionarios y datos de contacto',
      'vehiculos':           'Base de tasación SII con marcas, modelos y valores',
      'comunas':             'Gestión de regiones, provincias y comunas de Chile',
      'parametros':          'Gastos operacionales fijos y comisiones del crédito',
      'factores-seguro':     'Tasas netas, factores calculados y comisiones por plazo',
      'tipos-documento':     'Documentos de respaldo requeridos en el proceso de aprobación',
      'pagares':             'Plantillas editables de Hoja Resumen, Contrato, Pagaré y Mandatos',
      'cuentas-bancarias':   'Razón social, RUT, banco y número de cuenta para transferencias',
      'parques':             'Arriendo mensual y porcentaje de comisión por parque',
      'estado-creditos':     'Estados del crédito y sus transiciones permitidas (máquina de estados)',
      'broker-validaciones': 'Ítems de validación documental para AUTOFIN y UNIDAD DE CRÉDITO',
      'financieras':         'Parámetros de cálculo de ingresos AutoFin y UAC',
      'comisiones-seguro':   'Porcentajes de comisión sobre prima por Desgravamen y Cesantía',
      'productos-financiera':'Productos disponibles en la digitación por financiera',
      'solo-dios':           'Acceso directo a la BD sin filtros — edición total',
      'dealernet':           'Productos y costos de la integración DealerNet',
      'vista-pantallas':     'Configura qué módulos aparecen en el Home y en cada sección',
      'bd-operaciones':      'Base de datos de operaciones de crédito',
      'bd-clientes':         'Base de datos de clientes',
      'bd-antecedentes':     'Base de datos de antecedentes laborales',
      'bd-informacion-comercial': 'Base de datos de información comercial',
    };

    // Palabras clave por mantenedor (submódulos, pestañas y sinónimos) para la búsqueda.
    // No son datos de negocio: solo enriquecen el filtro (ej. "suplencias" → Backups).
    const KEYWORDS = {
      'usuarios': 'perfiles permisos usuarios suspendidos seguridad sesiones contraseña roles ejecutivos comerciales',
      'tasas': 'tmc tasa máxima convencional mensual anual período spread costo de fondo umbral del tramo uf menor mayor 200 uf válido desde hasta interés',
      'uf': 'unidad de fomento uf utm ipc dólar indicadores económicos importar csv valores',
      'dealers': 'concesionarios dealer razón social rut contacto comercial dirección teléfono banco cuenta categoría potencial parque incorporación importar diagnóstico ventas posiciones rotación factura',
      'vehiculos': 'tasación sii marca modelo año versión cilindrada combustible transmisión tracción puertas potencia permiso código sii vehículo',
      'comunas': 'regiones provincias comunas geográfico región ciudad',
      'parametros': 'gastos operacionales prenda retiro gestión auto limitación de dominio gastos de administración inscripción transferencia gps reparaciones menores seguro comisiones crédito umbral',
      'factores-seguro': 'desgravamen cesantía rdh reparaciones del hogar factor plazo bracket prima seguro penetración',
      'tipos-documento': 'documentos respaldo aprobación obligatorio ocupación brokerage autofácil tipo de documento requeridos',
      'pagares': 'hoja resumen contrato pagaré mandato plantilla editable documento',
      'cuentas-bancarias': 'banco cuenta corriente número de cuenta razón social rut tipo de cuenta titular transferencia depósito',
      'parques': 'arriendo mensual comisión sobre saldo parque orden',
      'estado-creditos': 'etapas estados transiciones máquina de estados brokerage autofácil originación puertas de entrada inicial final marcas estado de cartera mora vencido castigo umbrales de atraso vigente prepagado',
      'estado-cartera': 'estado de cartera mora vencido castigo umbrales de atraso días motor de clasificación inicial final vigente prepagado terminado',
      'broker-validaciones': 'validación documental autofin unidad de crédito documentos a validar brokers ítems orden checklist',
      'financieras': 'autofin uac unidad de crédito ingresos tmc anual spread costo de fondo tier ops inscripción transferencia limitación al dominio dealer parque patio calle',
      'comisiones-seguro': 'desgravamen cesantía ambos comisión sobre prima factor plazo penetración tramos',
      'productos-financiera': 'productos por financiera autofin unidad de crédito digitación orden',
      'dealernet': 'dealernet productos costos integración central de información plan prepago uf vigencia bloqueo rut informes',
      'vista-pantallas': 'placement pantallas home secciones cards módulos submódulos ubicación',
      'actividades-economicas': 'actividad económica sii giro código glosa afecto a iva categoría tributaria',
      'correos-programados': 'correos programados automáticos cron destinatarios hora chile días informe diario de ventas',
      'backups': 'suplencias suplente titular backup funciones alertas correos reemplazo',
      'solo-dios': 'base de datos sql dios bd operaciones clientes antecedentes laborales información comercial meses cerrados recalcular comisiones acceso directo edición total',
      'mantencion-sistema': 'mantención modo desarrollo aviso mensaje bg-admin cinta correos de prueba whatsapp',
      'impuestos': 'impuestos iva retención honorarios boleta',
      'cobranza-parametros': 'parámetros de cobranza gastos de cobranza tramos uf interés mora día 21 texto whatsapp sms asunto cuerpo email datos de transferencia valor cuota',
      'alertas': 'alertas notificaciones campana origen evento destino perfiles prioridad sonido sonar eventos de pago post venta condición',
      'feriados': 'feriados días hábiles calendario festivos chile año',
      'meses-cerrados': 'meses cerrados cierre de mes contable automáticamente',
      'dealer-categorias': 'categoría y potencial dealer segmentación beneficios meta programa color',
      'inteligencia-artificial': 'inteligencia artificial ia anthropic configuración interruptor maestro funcionalidades modelo tokens precios renta afp parámetros validador de certificados sello',
      'potencial-dealer': 'potencial parque dealer cuartil segmento priorización penetración matriz factor ventas',
      'certificados-textos': 'textos de certificados plantillas certificado constancia prepago crédito vigente pago de cuota',
      'definiciones': 'definiciones términos glosario categoría concepto',
      'respuestas-rapidas': 'respuestas rápidas chat atención remota plantillas mensajes',
      'ayuda': 'ayuda de páginas submódulos pasos cómo se usa',
      'servidor-hora': 'hora del servidor timezone tz override zona horaria',
      'db-maintenance': 'mantenimiento bd base de datos tablas índices fragmentación analyze integridad consultas lentas crecimiento',
      'presupuesto': 'presupuesto mensual mes ops monto meta proyección',
      'alertas-saldos': 'alertas saldos precio comisiones campana ejecutivo',
    };

    let sortable = null, modoReordenar = false;
    const CONFIG_KEY = 'submenu_mantenedores';

    async function cargar() {
      let orden = null, placement = {}, funcInfo = [], modsBD = [], esProt = false;
      try {
        const [rOrden, rPlacement, rMods] = await Promise.all([
          fetch(`/api/config/ui/${CONFIG_KEY}`, { headers: H }),
          fetch('/api/config/ui/placement_v2', { headers: H }),
          fetch(('/api/auth/mis-permisos?_='+Date.now()), { headers: H }),
        ]);
        const jOrden = await rOrden.json(); const jP = await rPlacement.json(); const jM = await rMods.json();
        if (jOrden.success && Array.isArray(jOrden.data)) orden = jOrden.data;
        if (jP.success && jP.data) placement = jP.data;
        funcInfo = (jM.funcionalidadesInfo || []).filter(f => f.href && f.href.startsWith('/mantenedores/'));
        if (jM.success && Array.isArray(jM.data)) modsBD = jM.data;
        esProt = !!jM.protegido;   // BG-ADMIN (servidor), no de la sesión
      } catch {}

      // BD Nivel Dios: solo accesibles dentro de la card SOLO DIOS, no como cards sueltas
      const SOLO_DIOS = new Set(['bd-operaciones','bd-clientes','bd-antecedentes','bd-informacion-comercial','meses-cerrados']);
      // DealerNet: las 2 cards van dentro de la card "Mantenedor DealerNet" (/mantenedores/dealernet/)
      const DEALERNET = new Set(['dealernet-productos','dealernet-costos']);
      // Construir items desde funcionalidades BD (href + icono + nombre desde servidor)
      const nativeHrefs = new Set(funcInfo.map(f => f.href));
      // keys asignadas explícitamente a OTRA sección (formato nuevo {sec:[keys]}) → no van aquí
      const asignadasFuera = new Set();
      Object.entries(placement).forEach(([sec, arr]) => {
        if (sec !== 'mantenedores' && Array.isArray(arr)) arr.forEach(k => asignadasFuera.add(k));
      });
      const nativeItems = funcInfo.map(f => {
        const seg = f.href.replace('/mantenedores/', '').replace(/\/$/, '');
        if (SOLO_DIOS.has(seg) || DEALERNET.has(seg)) return null;
        if (placement[seg] && placement[seg] !== 'mantenedores') return null;
        if (asignadasFuera.has(seg)) return null;
        const segBase = seg.replace(/-edicion$/, ''); // desc compartida con la variante -edicion
        return { id: seg || f.codigo, href: f.href, icon: f.icono || 'bi-grid', titulo: f.nombre, desc: DESCS[seg] || DESCS[segBase] || (typeof PLACEMENT_DESCS !== 'undefined' && (PLACEMENT_DESCS[seg] || PLACEMENT_DESCS[segBase])) || '' };
      }).filter(Boolean);

      // Extras: sub-items de otras secciones movidos aquí via placement (viejo {k:'mantenedores'} y nuevo {mantenedores:[k]})
      const nativeIds = new Set(nativeItems.map(i => i.id));
      const _mantArrKeys = Array.isArray(placement['mantenedores']) ? placement['mantenedores'] : [];
      const extrasSubitem = Object.entries(PLACEMENT_ITEMS || {})
        // dedup TAMBIÉN por href: la misma página puede venir de funcionalidades BD
        // con otra clave (ej. bd-operaciones-edicion vs bd-operaciones del manifiesto)
        .filter(([k, v]) => !nativeIds.has(k) && !nativeHrefs.has(v.href) && (placement[k] === 'mantenedores' || _mantArrKeys.includes(k)))
        .map(([k, v]) => ({ id: k, href: v.href, icon: v.icon, titulo: v.titulo, desc: DESCS[k] || (typeof PLACEMENT_DESCS !== 'undefined' && PLACEMENT_DESCS[k]) || v.desc || '' }));

      // Extras: módulos BD movidos aquí (formato viejo: placement[ruta] === 'mantenedores')
      const extrasMods = modsBD
        .filter(m => placement[m.ruta] === 'mantenedores' && !nativeHrefs.has(m.ruta))
        .map(m => ({ id: m.ruta, href: m.ruta, icon: m.icono || 'bi-grid', titulo: m.nombre, desc: m.descripcion || '' }));

      // Extras: módulos BD movidos aquí (formato nuevo: placement['mantenedores'] = [ ... rutas ... ])
      const normR = r => r ? (r.endsWith('/') ? r : r + '/') : r;
      const mantArr = Array.isArray(placement['mantenedores']) ? placement['mantenedores'] : [];
      const modsByRuta = new Map(modsBD.map(m => [normR(m.ruta), m]));
      const yaHref = new Set([...nativeHrefs, ...extrasMods.map(x => x.href)]);
      const extrasModsNew = mantArr
        .filter(id => typeof id === 'string' && id.startsWith('/') && modsByRuta.has(normR(id)) && !yaHref.has(normR(id)))
        .map(id => { const m = modsByRuta.get(normR(id)); return { id: m.ruta, href: m.ruta, icon: m.icono || 'bi-grid', titulo: m.nombre, desc: m.descripcion || '' }; });

      const allItems = [...nativeItems, ...extrasSubitem, ...extrasMods, ...extrasModsNew];
      // Card exclusiva de BG-ADMIN (no pasa por la matriz de permisos: ni otros admin la ven)
      if (esProt) allItems.push({ id:'mantencion-sistema', href:'/mantenedores/mantencion-sistema/', icon:'bi-cone-striped', titulo:'Mantención de Sistema', desc:'Aviso de mantención para todos los usuarios — solo BG-ADMIN' });
      const items = orden
        ? orden.map(id => allItems.find(i => i.id === id)).filter(Boolean)
            .concat(allItems.filter(i => !orden.includes(i.id)))
        : allItems;

      const grid = document.getElementById('modulesGrid');
      grid.innerHTML = items.map(m => `
        <a href="${m.href}" class="module-card" data-id="${m.id}" data-href="${m.href}" data-keywords="${KEYWORDS[m.id]||''}">
          <i class="bi bi-grip-vertical drag-handle"></i>
          <div class="card-icon"><i class="bi ${m.icon}"></i></div>
          <h6>${m.titulo}</h6>
          <p>${m.desc}</p>
          <span class="btn-acceder"><i class="bi bi-arrow-right-circle me-1"></i>Acceder</span>
        </a>`).join('');
    }

    function toggleReordenar() {
      modoReordenar = !modoReordenar;
      const grid = document.getElementById('modulesGrid');
      const btnR = document.getElementById('btnReordenar');
      const btnG = document.getElementById('btnGuardarOrden');

      if (modoReordenar) {
        const bm = document.getElementById('buscarMant'); if (bm && bm.value) { bm.value = ''; filtrarMant(); }
        grid.classList.add('sortable-mode');
        btnR.classList.add('activo');
        btnR.innerHTML = '<i class="bi bi-x-circle"></i>Cancelar';
        btnG.style.display = 'flex';
        sortable = new Sortable(grid, {
          animation: 180,
          ghostClass: 'sortable-ghost',
          chosenClass: 'sortable-chosen',
          onStart: () => grid.querySelectorAll('.module-card').forEach(c => c.removeAttribute('href')),
        });
      } else {
        grid.classList.remove('sortable-mode');
        btnR.classList.remove('activo');
        btnR.innerHTML = '<i class="bi bi-arrows-move"></i>Reordenar';
        btnG.style.display = 'none';
        if (sortable) { sortable.destroy(); sortable = null; }
        grid.querySelectorAll('.module-card').forEach(card => {
          if (card.dataset.href) card.href = card.dataset.href;
        });
      }
    }

    async function guardarOrden() {
      const btn = document.getElementById('btnGuardarOrden');
      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-hourglass-split"></i>Guardando...';
      try {
        const ids = [...document.getElementById('modulesGrid').querySelectorAll('.module-card')]
          .map(c => c.dataset.id);
        const res  = await fetch(`/api/config/ui/${CONFIG_KEY}`, {
          method: 'PUT', headers: H, body: JSON.stringify({ valor: ids }),
        });
        const json = await res.json();
        if (json.success) {
          toggleReordenar();
          mostrarToastOrden('Orden guardado');
        } else {
          mostrarToastError('Error al guardar: ' + (json.error || res.status));
        }
      } catch (e) {
        mostrarToastError('Error al guardar: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-floppy"></i>Guardar orden';
      }
    }

    /* diagnóstico: window.testOrden() en consola del navegador */
    window.testOrden = async function() {
      const ping = await fetch('/api/config/ui/ping', { headers: H });
      console.log('PING status:', ping.status, await ping.json());
      const get  = await fetch(`/api/config/ui/${CONFIG_KEY}`, { headers: H });
      console.log('GET  status:', get.status,  await get.json());
      const put  = await fetch(`/api/config/ui/${CONFIG_KEY}`, { method: 'PUT', headers: H, body: JSON.stringify({ valor: ['TEST'] }) });
      console.log('PUT  status:', put.status,  await put.json());
      const get2 = await fetch(`/api/config/ui/${CONFIG_KEY}`, { headers: H });
      console.log('GET2 status:', get2.status, await get2.json());
    };

    /* ── Buscador de mantenedores (filtra las cards por nombre/descripción) ── */
    function filtrarMant() {
      const inp = document.getElementById('buscarMant');
      const q = (inp.value || '').trim().toLowerCase();
      document.getElementById('clrMant').style.display = q ? 'block' : 'none';
      let visibles = 0;
      document.querySelectorAll('#modulesGrid .module-card').forEach(c => {
        const txt = ((c.querySelector('h6')?.textContent || '') + ' ' + (c.querySelector('p')?.textContent || '') + ' ' + (c.dataset.keywords || '')).toLowerCase();
        const show = !q || txt.includes(q);
        c.style.display = show ? '' : 'none';
        if (show) visibles++;
      });
      const nr = document.getElementById('mantNoResult');
      const sin = q && visibles === 0;
      nr.style.display = sin ? 'block' : 'none';
      nr.textContent = sin ? `Sin mantenedores para “${inp.value.trim()}”.` : '';
    }
    function limpiarMant() { const i = document.getElementById('buscarMant'); i.value = ''; filtrarMant(); i.focus(); }

    cargar();
  </script>
<script src="/js/app-version.js"></script>
</body>
</html>
