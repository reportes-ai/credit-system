<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meses Cerrados — AutoFácil</title>
  <!-- v2.0 checklist de cierre -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-left { display:flex; align-items:center; gap:16px; }
    .topnav-brand { display:flex; align-items:center; gap:8px; }
    .topnav-brand img { height:34px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .breadcrumb-nav a:hover { color:#fff; }
    .breadcrumb-nav .sep { color:rgba(255,255,255,.35); }
    .topnav-right { display:flex; align-items:center; gap:12px; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }

    .main-content { padding:32px 40px; max-width:820px; margin:0 auto; }
    .page-banner { background:linear-gradient(135deg,#1a0050,#6d28d9 55%,#f59e0b); border-radius:14px; color:#fff; padding:22px 28px; margin-bottom:28px; display:flex; align-items:center; gap:16px; }
    .page-banner i { font-size:2.4rem; opacity:.85; }
    .page-banner h2 { font-weight:800; margin:0 0 3px; font-size:1.25rem; }
    .page-banner p  { opacity:.8; margin:0; font-size:.85rem; }

    /* Config */
    .config-box { background:#fff; border-radius:12px; padding:16px 22px; margin-bottom:20px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; box-shadow:0 1px 4px rgba(0,0,0,.06); border-left:4px solid #6d28d9; }
    .config-box label { font-size:.85rem; font-weight:600; color:#374151; }
    .config-box input[type=number] { border:1.5px solid #c4b5fd; border-radius:8px; padding:6px 12px; font-size:.9rem; width:72px; text-align:center; outline:none; font-weight:700; color:#1a0050; }
    .config-box input:focus { border-color:#6d28d9; }
    .btn-guardar-cfg { background:linear-gradient(135deg,#6d28d9,#7c3aed); color:#fff; border:none; border-radius:8px; padding:6px 18px; font-size:.83rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
    .btn-guardar-cfg:hover { filter:brightness(1.1); }

    /* Tabla */
    .table-card { background:#fff; border-radius:14px; box-shadow:0 1px 6px rgba(0,0,0,.07); overflow:hidden; }
    .table-card table { width:100%; border-collapse:collapse; font-size:.88rem; }
    .table-card thead th { background:#1e1b4b; color:#fff; padding:12px 18px; font-weight:700; font-size:.8rem; letter-spacing:.3px; text-transform:uppercase; }
    .table-card tbody tr { border-bottom:1px solid #f0f0f0; transition:background .12s; }
    .table-card tbody tr:hover { background:#faf9ff; }
    .table-card tbody td { padding:13px 18px; vertical-align:middle; }

    /* Mes col */
    .mes-nombre { font-weight:700; font-size:.93rem; color:#111827; }
    .mes-dias   { font-size:.76rem; color:#9ca3af; margin-top:2px; }

    /* Estado */
    .estado-abierto { display:inline-flex; align-items:center; gap:6px; background:#f0fdf4; color:#15803d; border:1.5px solid #bbf7d0; border-radius:20px; padding:4px 14px; font-size:.8rem; font-weight:700; }
    .estado-abierto i { font-size:.85rem; }
    .estado-cerrado { display:inline-flex; align-items:center; gap:6px; background:#fef2f2; color:#b91c1c; border:1.5px solid #fecaca; border-radius:20px; padding:4px 14px; font-size:.8rem; font-weight:700; }
    .estado-cerrado i { font-size:.85rem; }
    .badge-sugerido { display:inline-flex; align-items:center; gap:5px; background:#fef3c7; color:#92400e; border-radius:6px; padding:2px 8px; font-size:.72rem; font-weight:700; margin-left:6px; }
    .badge-recierre  { display:inline-flex; align-items:center; gap:5px; background:#eff6ff; color:#1d4ed8; border-radius:6px; padding:2px 8px; font-size:.72rem; font-weight:700; margin-left:6px; }
    .badge-auto     { display:inline-flex; align-items:center; gap:5px; background:#f3f4f6; color:#6b7280; border-radius:6px; padding:2px 8px; font-size:.7rem; margin-left:4px; }

    /* Toggle */
    .toggle { position:relative; display:inline-block; width:44px; height:24px; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-slider { position:absolute; inset:0; background:#d1d5db; border-radius:24px; transition:.2s; cursor:pointer; }
    .toggle-slider:before { content:''; position:absolute; width:18px; height:18px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; box-shadow:0 1px 4px rgba(0,0,0,.2); }
    .toggle input:checked + .toggle-slider { background:#dc2626; }
    .toggle input:checked + .toggle-slider:before { transform:translateX(20px); }
    .toggle input:disabled + .toggle-slider { opacity:.45; cursor:not-allowed; }

    /* Spinner */
    .loading-overlay { position:fixed; inset:0; background:rgba(255,255,255,.65); display:none; align-items:center; justify-content:center; z-index:999; }
    .spinner { width:38px; height:38px; border:4px solid #e5e7eb; border-top-color:#6d28d9; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .toast-container { position:fixed; bottom:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
    .toast { background:#1e293b; color:#fff; border-radius:10px; padding:11px 16px; font-size:.83rem; display:flex; align-items:center; gap:9px; box-shadow:0 4px 20px rgba(0,0,0,.22); animation:slideIn .2s ease; }
    .toast.success { border-left:4px solid #16a34a; }
    .toast.error   { border-left:4px solid #dc2626; }
    @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-left">
    <a href="/" class="topnav-brand">
      <img src="/img/logo.png" alt="AutoFácil">
      <span class="version-badge" id="versionBadge">v7.11</span>
    </a>
    <div class="breadcrumb-nav">
      <a href="/">Inicio</a><span class="sep">›</span>
      <a href="/mantenedores/">Mantenedores</a><span class="sep">›</span>
      <a href="/mantenedores/solo-dios/">⚡ Solo Dios</a><span class="sep">›</span>
      <span style="color:#fff;font-weight:600"><i class="bi bi-calendar-lock-fill me-1"></i>Meses Cerrados</span>
    </div>
  </div>
  <div class="topnav-right">
    <div class="user-chip">
      <div class="avatar" id="avatarInicial">?</div>
      <div>
        <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
        <div class="perfil-badge" id="navPerfil">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="main-content">
  <div class="page-banner">
    <i class="bi bi-calendar-lock-fill"></i>
    <div>
      <h2>MESES CERRADOS</h2>
      <p>Bloquea meses anteriores — los meses cerrados no aceptan ninguna modificación de datos</p>
    </div>
  </div>

  <!-- Config días cierre -->
  <div class="config-box">
    <i class="bi bi-clock-history" style="color:#6d28d9;font-size:1.2rem"></i>
    <label>Cerrar meses automáticamente a los</label>
    <input type="number" id="inputDiasCierre" min="1" max="365" value="35">
    <label>días después del fin del mes</label>
    <button class="btn-guardar-cfg" onclick="guardarDiasCierre()">
      <i class="bi bi-floppy"></i>Guardar
    </button>
    <span id="cfgMsg" style="font-size:.78rem;color:#16a34a;display:none">✓ Guardado</span>
  </div>

  <!-- Tabla -->
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Mes</th>
          <th>Días transcurridos</th>
          <th style="text-align:center">Estado</th>
          <th style="text-align:center">Cerrar / Abrir</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="4" style="text-align:center;padding:32px;color:#9ca3af">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast-container" id="toastContainer"></div>

<script src="/js/auth-guard.js"></script>
<script src="/js/app-version.js"></script>
<script>
const token = sessionStorage.getItem('token');
const yo    = JSON.parse(sessionStorage.getItem('usuario') || 'null');
if (!token || !yo) window.location.href = '/login.html';
const H = { 'Content-Type':'application/json', Authorization:'Bearer '+token };

document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
document.getElementById('navPerfil').textContent  = yo?.perfil || '';
document.getElementById('avatarInicial').textContent = (yo?.nombre||'?').charAt(0).toUpperCase();
function logout() { sessionStorage.removeItem('token'); sessionStorage.removeItem('usuario'); window.location.href='/login.html'; }

const MESES_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
let _diasCierre = 35;
function fmtMes(mes) {
  const [a, m] = mes.split('-');
  return `${MESES_ES[parseInt(m)-1]} ${a}`;
}

function toast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const d = document.createElement('div');
  d.className = `toast ${type}`;
  d.innerHTML = `<i class="bi bi-${type==='success'?'check-circle':'exclamation-triangle'}"></i>${msg}`;
  c.appendChild(d);
  setTimeout(() => d.remove(), 3200);
}

async function cargar() {
  document.getElementById('loadingOverlay').style.display = 'flex';
  try {
    const r = await fetch('/api/meses-cerrados', { headers: H });
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    _diasCierre = j.data.dias_cierre;
    document.getElementById('inputDiasCierre').value = j.data.dias_cierre;
    renderTabla(j.data.meses);
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="4" style="color:#dc2626;padding:24px;text-align:center">${e.message}</td></tr>`;
  } finally {
    document.getElementById('loadingOverlay').style.display = 'none';
  }
}

function renderTabla(meses) {
  const tb = document.getElementById('tbody');
  if (!meses.length) {
    tb.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:24px;color:#9ca3af">Sin meses disponibles</td></tr>';
    return;
  }
  tb.innerHTML = meses.map(m => {
    const estadoHtml = m.cerrado
      ? `<span class="estado-cerrado"><i class="bi bi-lock-fill"></i>Cerrado${m.auto_cierre ? ' <small style="font-weight:400;opacity:.7">(auto)</small>' : ''}</span>`
      : `<span class="estado-abierto"><i class="bi bi-unlock-fill"></i>Abierto</span>`;

    const extras = [];
    if (!m.cerrado && m.sugerido_cerrar)
      extras.push(`<span class="badge-sugerido"><i class="bi bi-exclamation-triangle-fill"></i>Supera límite</span>`);
    if (!m.cerrado && m.recierre_en_horas)
      extras.push(`<span class="badge-recierre"><i class="bi bi-clock-fill"></i>Se cerrará en ${m.recierre_en_horas}h</span>`);

    return `
      <tr>
        <td>
          <div class="mes-nombre">${fmtMes(m.mes)}</div>
          <div class="mes-dias">${m.mes}</div>
        </td>
        <td>
          <span style="font-weight:600;color:${m.dias_transcurridos >= _diasCierre ? '#b91c1c' : '#374151'}">${m.dias_transcurridos} días</span>
          ${extras.join('')}
        </td>
        <td style="text-align:center">${estadoHtml}</td>
        <td style="text-align:center">
          <label class="toggle" title="${m.cerrado ? 'Click para abrir este mes' : 'Click para cerrar este mes'}">
            <input type="checkbox" ${m.cerrado ? 'checked' : ''} onchange="toggleMes('${m.mes}', this)">
            <span class="toggle-slider"></span>
          </label>
        </td>
      </tr>`;
  }).join('');
}

async function toggleMes(mes, chk, forzar) {
  const cerrado = chk.checked;
  chk.disabled = true;
  try {
    const r = await fetch(`/api/meses-cerrados/${mes}`, {
      method: 'PUT', headers: H, body: JSON.stringify({ cerrado, forzar: !!forzar })
    });
    const j = await r.json();
    if (r.status === 409 && j.data && j.data.checks) {   // checklist con pendientes
      mostrarChecklist(mes, j.data.checks, chk);
      return;
    }
    if (!j.success) throw new Error(j.error);
    toast(cerrado ? `🔒 ${fmtMes(mes)} cerrado${forzar ? ' (forzado)' : ' — checklist OK'}` : `🔓 ${fmtMes(mes)} abierto`);
    await cargar();
  } catch(e) {
    toast(e.message, 'error');
    chk.checked = !cerrado;
    chk.disabled = false;
  }
}

/* Checklist de cierre: muestra los pendientes y deja decidir (resolver o forzar) */
function mostrarChecklist(mes, checks, chk) {
  document.getElementById('afCkDlg')?.remove();
  const dlg = document.createElement('dialog');
  dlg.id = 'afCkDlg';
  dlg.style.cssText = 'border:none;border-radius:16px;padding:0;max-width:560px;width:92vw;box-shadow:0 24px 70px rgba(0,0,0,.35)';
  const fila = c => `
    <div style="display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid #f1f5f9">
      <span style="font-size:1.1rem">${c.ok ? '✅' : '❌'}</span>
      <div style="flex:1;font-size:.88rem;color:#1e293b">${c.label}</div>
      ${c.ok ? '<span style="font-size:.75rem;color:#16a34a;font-weight:700">OK</span>'
             : `<span style="font-size:.78rem;color:#b91c1c;font-weight:800">${c.n} pendiente${c.n === 1 ? '' : 's'}</span>
                ${c.href ? `<a href="${c.href}" target="_blank" style="font-size:.75rem;font-weight:700">resolver →</a>` : ''}`}
    </div>`;
  dlg.innerHTML = `
    <div style="background:linear-gradient(135deg,#012d70,#0141A2 60%,#0255c5);color:#fff;padding:16px 22px;font-weight:800">
      <i class="bi bi-clipboard-check me-2"></i>Checklist de cierre — ${fmtMes(mes)}
    </div>
    <div style="padding:14px 22px 6px;font-family:'Segoe UI',system-ui,sans-serif">
      <div style="font-size:.82rem;color:#64748b;margin-bottom:6px">El mes tiene pendientes. Puedes resolverlos y reintentar, o cerrarlo de todas formas (queda auditado como cierre forzado).</div>
      ${checks.map(fila).join('')}
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;padding:14px 22px 18px">
      <button id="afCkCancel" style="background:#f1f5f9;border:none;border-radius:8px;padding:9px 18px;font-weight:700;cursor:pointer">Cancelar</button>
      <button id="afCkForce" style="background:#b91c1c;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-weight:700;cursor:pointer"><i class="bi bi-exclamation-triangle me-1"></i>Cerrar de todas formas</button>
    </div>`;
  document.body.appendChild(dlg);
  dlg.showModal();
  document.getElementById('afCkCancel').onclick = () => { dlg.close(); dlg.remove(); chk.checked = false; chk.disabled = false; };
  document.getElementById('afCkForce').onclick = () => { dlg.close(); dlg.remove(); chk.disabled = false; chk.checked = true; toggleMes(mes, chk, true); };
}

async function guardarDiasCierre() {
  const dias = parseInt(document.getElementById('inputDiasCierre').value);
  if (!dias || dias < 1) return toast('Ingresa un valor válido', 'error');
  try {
    const r = await fetch('/api/meses-cerrados/config/dias-cierre', {
      method: 'PUT', headers: H, body: JSON.stringify({ dias })
    });
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    const msg = document.getElementById('cfgMsg');
    msg.style.display = 'inline';
    setTimeout(() => msg.style.display = 'none', 2000);
    await cargar();
  } catch(e) {
    toast(e.message, 'error');
  }
}

cargar();
</script>
</body>
</html>
