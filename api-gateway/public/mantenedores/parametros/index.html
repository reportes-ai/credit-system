<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parámetros de Crédito — AutoFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy: #0141A2; --navy-dark: #012d70; --navy-light: #0255c5; --accent: #009AFE; --bg: #f0f4f8; }
    body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; min-height: 100vh; }
    .topnav { background: linear-gradient(90deg, var(--navy-dark), var(--navy-light)); color: #fff; height: 60px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .topnav-left { display: flex; align-items: center; gap: 16px; }
    .topnav-brand img { height: 32px; filter: brightness(0) invert(1); }
    .version-badge { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.75); font-size: 0.65rem; font-weight: 700; border-radius: 6px; padding: 2px 8px; letter-spacing: 0.5px; }
    .breadcrumb-nav { color: rgba(255,255,255,0.6); font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
    .breadcrumb-nav a { color: rgba(255,255,255,0.75); text-decoration: none; }
    .breadcrumb-nav a:hover { color: #fff; }
    .breadcrumb-nav .sep { color: rgba(255,255,255,0.35); }
    .topnav-right { display: flex; align-items: center; gap: 12px; }
    .user-chip { background: rgba(255,255,255,0.12); border-radius: 24px; padding: 5px 12px; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
    .avatar { width: 28px; height: 28px; background: #90caf9; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--navy); font-weight: 700; font-size: 0.75rem; }
    .perfil-badge { background: rgba(144,202,249,0.2); border: 1px solid rgba(144,202,249,0.4); color: #90caf9; border-radius: 12px; padding: 2px 10px; font-size: 0.73rem; font-weight: 600; }
    .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 5px 12px; font-size: 0.82rem; cursor: pointer; }
    .btn-logout:hover { background: rgba(255,255,255,0.2); }
    .page-content { padding: 28px 32px; max-width: 680px; margin: 0 auto; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-header h4 { font-weight: 700; color: #111827; margin: 0; display: flex; align-items: center; gap: 10px; }
    .page-header h4 i { color: var(--navy); }
    .card { border: none; border-radius: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    .card-head { background: linear-gradient(90deg, #f8fafc, #fff); border-bottom: 1px solid #e5e7eb; border-radius: 14px 14px 0 0; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .card-head-left { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 0.82rem; color: var(--navy); text-transform: uppercase; letter-spacing: 0.05em; }
    .card-body { padding: 0; }
    .param-row { display: flex; align-items: center; padding: 13px 24px; border-bottom: 1px solid #f1f5f9; gap: 12px; }
    .param-row:last-child { border-bottom: none; }
    .param-label { flex: 1; font-size: 0.87rem; font-weight: 600; color: #374151; }
    .param-display { font-size: 1rem; font-weight: 700; color: var(--navy); min-width: 120px; text-align: right; }
    .param-input-wrap { display: flex; align-items: center; gap: 6px; min-width: 160px; justify-content: flex-end; }
    .param-input { border-radius: 8px; border: 1.5px solid #d1d5db; font-size: 0.88rem; padding: 5px 10px; width: 130px; text-align: right; font-weight: 600; transition: border-color .2s; }
    .param-input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(1,65,162,0.1); outline: none; }
    .param-unit { font-size: 0.75rem; color: #9ca3af; min-width: 14px; }
    .meta-bar { padding: 10px 24px 14px; font-size: 0.78rem; color: #9ca3af; display: flex; align-items: center; gap: 6px; }
    .meta-bar i { color: #d1d5db; }
    .badge-edit { background: #fef3c7; color: #92400e; border-radius: 8px; padding: 3px 10px; font-size: 0.72rem; font-weight: 700; display: none; }
    .badge-edit.show { display: inline-block; }
    .btn-edit { background: #fff; border: 1.5px solid #d1d5db; color: #374151; border-radius: 8px; padding: 6px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: border-color .2s; }
    .btn-edit:hover { border-color: var(--navy); color: var(--navy); }
    .btn-save { background: var(--navy); border: none; color: #fff; border-radius: 8px; padding: 6px 16px; font-size: 0.82rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .btn-save:hover { background: var(--accent); }
    .btn-cancel { background: #fff; border: 1.5px solid #e5e7eb; color: #6b7280; border-radius: 8px; padding: 6px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
    .btn-cancel:hover { border-color: #9ca3af; }
    .action-row { display: none; align-items: center; gap: 8px; }
    .action-row.show { display: flex; }
    .toast-container { position: fixed; top: 72px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast-item { background: #fff; border-radius: 10px; padding: 12px 16px; box-shadow: 0 4px 16px rgba(0,0,0,.14); min-width: 260px; display: flex; align-items: center; gap: 10px; animation: slideIn .2s ease; border-left: 4px solid var(--navy); }
    .toast-item.success { border-left-color: #10b981; }
    .toast-item.error   { border-left-color: #ef4444; }
    .toast-item i.ti { font-size: 1rem; }
    .toast-item.success i.ti { color: #10b981; }
    .toast-item.error   i.ti { color: #ef4444; }
    .toast-item span { flex: 1; font-size: .85rem; font-weight: 600; color: #1f2937; }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }
    .page-banner { background: linear-gradient(135deg, #012d70, #0141A2 50%, #009AFE); border-radius: 16px; color: #fff; padding: 28px 36px; margin-bottom: 36px; display: flex; align-items: center; gap: 20px; }
    .page-banner > i { font-size: 3rem; opacity: 0.8; }
    .page-banner h2 { font-weight: 700; margin: 0 0 4px; font-size: 1.4rem; }
    .page-banner p { opacity: 0.8; margin: 0; font-size: 0.9rem; }
    .loading-overlay { display: flex; align-items: center; gap: 10px; color: #6b7280; font-size: 0.85rem; padding: 40px 0; }
    .spinner-sm { width: 18px; height: 18px; border: 2px solid #d1d5db; border-top-color: var(--navy); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-left">
    <div class="topnav-brand">
      <a href="/"><img src="/img/logo.png" alt="AutoFácil" style="display:block"></a>
      <span class="version-badge" id="versionBadge">v4.5</span>
    </div>
  </div>
  <div class="topnav-right">
    <div class="user-chip">
      <div class="avatar" id="avatarInicial">?</div>
      <div>
        <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
        <div class="perfil-badge" id="navPerfil">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="toast-container" id="toastContainer"></div>

<div class="page-content">
  <div class="page-banner">
    <i class="bi bi-sliders"></i>
    <div>
      <h2>Parámetros de Crédito</h2>
      <p>Gastos operacionales fijos del crédito</p>
    </div>
  </div>

  <div id="loadingState" class="loading-overlay">
    <div class="spinner-sm"></div> Cargando parámetros...
  </div>

  <div id="mainCard" style="display:none">
    <div class="card">
      <div class="card-head">
        <div class="card-head-left">
          <i class="bi bi-receipt"></i> Gastos Operacionales
          <span class="badge-edit" id="badgeEdit">Editando</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <!-- Botón editar (modo display) -->
          <button class="btn-edit" id="btnEditar" onclick="enterEdit()">
            <i class="bi bi-pencil"></i> Editar
          </button>
          <!-- Botones guardar/cancelar (modo edición) -->
          <div class="action-row" id="actionRow">
            <button class="btn-cancel" onclick="cancelEdit()">Cancelar</button>
            <button class="btn-save" onclick="guardar()">
              <i class="bi bi-floppy"></i> Guardar
            </button>
          </div>
        </div>
      </div>

      <div class="card-body">
        <!-- Filas generadas por JS -->
        <div id="paramRows"></div>
      </div>

      <div class="meta-bar" id="metaBar">
        <i class="bi bi-clock"></i>
        <span id="metaFecha">—</span>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/cl-numbers.js"></script>
<script>
/* ─── AUTH ──────────────────────────────────────────────────────────────── */
const token = localStorage.getItem('token');
const yo = JSON.parse(localStorage.getItem('usuario') || 'null');
if (!token || !yo) { window.location.href = '/login.html'; }
document.getElementById('avatarInicial').textContent = (yo?.nombre || '?').charAt(0).toUpperCase();
document.getElementById('navNombre').textContent = `${yo?.nombre || ''} ${yo?.apellido || ''}`.trim();
document.getElementById('navPerfil').textContent = yo?.perfil || yo?.nombre_perfil || '—';
function logout() { localStorage.removeItem('token'); localStorage.removeItem('usuario'); window.location.href = '/login.html'; }
function authHdr() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }

/* ─── PARÁMETROS A MOSTRAR ──────────────────────────────────────────────── */
const PARAMS = [
  { key: 'prenda',               label: 'Prenda' },
  { key: 'retiro_gestion',       label: 'Retiro Gestión Auto' },
  { key: 'limitacion_dominio',   label: 'Limitación de Dominio' },
  { key: 'gastos_admin',         label: 'Gastos de Administración' },
  { key: 'inscripcion',          label: 'Inscripción / Transferencia' },
  { key: 'gps_24meses',          label: 'GPS 24 meses' },
  { key: 'reparaciones_menores', label: 'Reparaciones Menores' },
];

/* ─── FORMAT HELPERS ────────────────────────────────────────────────────── */
const fmtPeso = n => '$' + Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
const parsePeso = s => {
  if (!s) return 0;
  return parseInt(s.toString().replace(/\./g, '').replace(/\$/g, '').trim(), 10) || 0;
};

/* ─── STATE ─────────────────────────────────────────────────────────────── */
let valores = {};   // { key: number }
let editando = false;

/* ─── RENDER ────────────────────────────────────────────────────────────── */
function renderRows() {
  const container = document.getElementById('paramRows');
  container.innerHTML = PARAMS.map(p => `
    <div class="param-row" id="row_${p.key}">
      <span class="param-label">${p.label}</span>
      <span class="param-display" id="disp_${p.key}">${fmtPeso(valores[p.key] ?? 0)}</span>
      <div class="param-input-wrap" id="inpWrap_${p.key}" style="display:none">
        <input class="param-input" type="text" id="inp_${p.key}"
               inputmode="numeric"
               value="${fmtPeso(valores[p.key] ?? 0)}"
               oninput="onPesoInput(this)">
        <span class="param-unit">$</span>
      </div>
    </div>
  `).join('');
}

function onPesoInput(el) {
  const raw = parsePeso(el.value);
  const fmt = fmtPeso(raw);
  const pos  = el.selectionStart;
  const diff = fmt.length - el.value.length;
  el.value = fmt;
  try { el.setSelectionRange(Math.max(1, pos + diff), Math.max(1, pos + diff)); } catch(e) {}
}

/* ─── MODES ─────────────────────────────────────────────────────────────── */
function enterEdit() {
  editando = true;
  PARAMS.forEach(p => {
    document.getElementById('disp_' + p.key).style.display = 'none';
    document.getElementById('inpWrap_' + p.key).style.display = 'flex';
    document.getElementById('inp_' + p.key).value = fmtPeso(valores[p.key] ?? 0);
  });
  document.getElementById('btnEditar').style.display = 'none';
  document.getElementById('actionRow').classList.add('show');
  document.getElementById('badgeEdit').classList.add('show');
}

function cancelEdit() {
  editando = false;
  PARAMS.forEach(p => {
    document.getElementById('disp_' + p.key).style.display = '';
    document.getElementById('inpWrap_' + p.key).style.display = 'none';
  });
  document.getElementById('btnEditar').style.display = '';
  document.getElementById('actionRow').classList.remove('show');
  document.getElementById('badgeEdit').classList.remove('show');
}

/* ─── LOAD ──────────────────────────────────────────────────────────────── */
async function cargar() {
  try {
    const res = await fetch('/api/parametros-credito', { headers: authHdr() });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Error al cargar');

    const lista = data.data?.lista || [];
    const obj   = data.data?.obj   || data.data || {};

    PARAMS.forEach(p => { valores[p.key] = obj[p.key] ?? 0; });

    // Fecha de última actualización (máx de los parámetros mostrados)
    const keys = new Set(PARAMS.map(p => p.key));
    const fechas = lista
      .filter(r => keys.has(r.clave) && r.fecha_actualizacion)
      .map(r => new Date(r.fecha_actualizacion));
    if (fechas.length) {
      const max = new Date(Math.max(...fechas));
      document.getElementById('metaFecha').textContent =
        'Última actualización: ' + max.toLocaleDateString('es-CL', { day:'2-digit', month:'long', year:'numeric' }) +
        ' ' + max.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });
    } else {
      document.getElementById('metaFecha').textContent = 'Sin fecha de actualización';
    }

    renderRows();
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainCard').style.display = '';
  } catch (err) {
    document.getElementById('loadingState').innerHTML =
      `<i class="bi bi-exclamation-triangle text-danger me-2"></i> Error al cargar. <a href="javascript:cargar()">Reintentar</a>`;
    console.error(err);
  }
}

/* ─── GUARDAR ───────────────────────────────────────────────────────────── */
async function guardar() {
  const body = {};
  for (const p of PARAMS) {
    const v = parsePeso(document.getElementById('inp_' + p.key).value);
    if (isNaN(v)) { showToast('Valor inválido en: ' + p.label, 'error'); return; }
    body[p.key] = v;
    valores[p.key] = v;
  }

  try {
    const res = await fetch('/api/parametros-credito', {
      method: 'PUT', headers: authHdr(), body: JSON.stringify(body)
    });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    // Actualizar displays
    PARAMS.forEach(p => {
      document.getElementById('disp_' + p.key).textContent = fmtPeso(valores[p.key]);
    });
    // Actualizar fecha
    const now = new Date();
    document.getElementById('metaFecha').textContent =
      'Última actualización: ' + now.toLocaleDateString('es-CL', { day:'2-digit', month:'long', year:'numeric' }) +
      ' ' + now.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });

    cancelEdit();
    showToast('Parámetros guardados correctamente', 'success');
  } catch (err) {
    showToast('Error al guardar: ' + err.message, 'error');
    console.error(err);
  }
}

/* ─── TOAST ─────────────────────────────────────────────────────────────── */
function showToast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const icon = type === 'success' ? 'bi-check-circle-fill' : 'bi-x-circle-fill';
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.innerHTML = `<i class="bi ${icon} ti"></i><span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

cargar();
</script>
</body>
</html>
