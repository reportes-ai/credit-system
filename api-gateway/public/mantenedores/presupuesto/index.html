<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presupuesto — AutoFácil</title>
  <!-- v1.0 -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#001345; --blue:#0141A2; }
    body { background:#f0f4f8; font-family:'Segoe UI',system-ui,sans-serif; margin:0; }
    .topnav { background:linear-gradient(90deg,#012d70,#0255c5); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--blue); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .wrap { max-width:1200px; margin:0 auto; padding:22px 24px; }
    .head-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:8px; }
    .card-af { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); padding:18px 20px; }
    table { border-collapse:collapse; font-size:.84rem; }
    th, td { border:1px solid #e2e8f0; padding:6px 8px; text-align:center; }
    thead .yr { background:#0f2a52; color:#fff; font-size:.8rem; }
    thead .sub { background:#1e3a5f; color:#cfe0f5; font-size:.7rem; text-transform:uppercase; font-weight:700; }
    th.mes-h, td.mes-c { background:#f8fafc; font-weight:700; color:#334155; text-align:left; min-width:70px; position:sticky; left:0; }
    tfoot td { background:#eef2ff; font-weight:800; color:var(--navy); }
    input.cell { width:78px; border:1px solid transparent; border-radius:5px; padding:3px 5px; font-size:.82rem; text-align:right; background:#fff; }
    input.cell:hover { border-color:#e2e8f0; }
    input.cell:focus { border-color:#0141A2; outline:none; background:#f5f9ff; }
    .btn-af { background:linear-gradient(135deg,#0141A2,#0255c5); color:#fff; border:none; border-radius:9px; padding:9px 20px; font-size:.85rem; font-weight:700; cursor:pointer; }
    .btn-ghost { background:#fff; border:1.5px solid #0141A2; color:#0141A2; border-radius:9px; padding:8px 16px; font-size:.83rem; font-weight:700; cursor:pointer; }
    .btn-af:disabled { opacity:.55; cursor:default; }
    #msg { font-size:.85rem; display:none; }
    .hint { font-size:.78rem; color:#64748b; margin:0 0 12px; }
    .tbl-scroll { overflow-x:auto; }
  </style>
</head>
<body>
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a><span>›</span><a href="/mantenedores/">Mantenedores</a><span>›</span><span style="color:#fff;font-weight:600">Presupuesto</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="user-chip"><div class="avatar" id="avatarInicial">?</div><div><div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div><div class="perfil-badge" id="navPerfil">—</div></div></div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="wrap">
  <div class="head-row">
    <div>
      <h5 style="font-weight:800;color:var(--navy);margin:0"><i class="bi bi-clipboard-data me-2"></i>Presupuesto</h5>
      <span style="font-size:.82rem;color:#64748b">Meta de operaciones y monto (MM$) por mes y año. Lo usa el Dashboard.</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="msg"></span>
      <button class="btn-ghost" onclick="agregarAnio()"><i class="bi bi-plus-circle me-1"></i>Agregar Año</button>
      <button class="btn-af" id="btnGuardar" onclick="guardar()"><i class="bi bi-check-lg me-1"></i>Guardar</button>
    </div>
  </div>

  <div class="card-af">
    <p class="hint"><b>Ops</b> = N° de operaciones presupuestadas · <b>Monto</b> = colocación presupuestada en MM$ (millones).</p>
    <div class="tbl-scroll">
      <table id="tabla"></table>
    </div>
  </div>
</div>

<script>
const token = sessionStorage.getItem('token');
const yo = JSON.parse(sessionStorage.getItem('usuario')||'null');
if (!token || !yo) location.href='/login.html';
document.getElementById('navNombre').textContent = yo.nombre+' '+(yo.apellido||'');
document.getElementById('navPerfil').textContent = yo.perfil||'';
document.getElementById('avatarInicial').textContent = (yo.nombre||'?')[0].toUpperCase();
function logout(){ sessionStorage.clear(); location.href='/login.html'; }
const H = { 'Content-Type':'application/json', Authorization:'Bearer '+token };
const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

// Modelo en memoria: { '2026': { 1:{ops,monto}, ... 12:{...} }, '2027': {...} }
let MODELO = {};
let ANIOS = [];

(async function init(){
  try {
    const r = await fetch('/api/dashboard/presupuesto', { headers:H });
    const j = await r.json();
    (j.data||[]).forEach(d => {
      const [y, m] = String(d.mes).split('-');
      const mm = parseInt(m);
      if (!MODELO[y]) MODELO[y] = {};
      MODELO[y][mm] = { ops: Number(d.ops)||0, monto: Number(d.monto)||0 };
    });
  } catch(e) {}
  if (!Object.keys(MODELO).length) MODELO['2026'] = {};
  ANIOS = Object.keys(MODELO).sort();
  // Asegurar 12 meses por año
  ANIOS.forEach(y => { for (let m=1;m<=12;m++) if (!MODELO[y][m]) MODELO[y][m] = {ops:0,monto:0}; });
  render();
})();

function render(){
  const t = document.getElementById('tabla');
  let h = '<thead><tr class="yr"><th class="mes-h" rowspan="2">Mes</th>';
  ANIOS.forEach(y => h += `<th colspan="2" class="yr">${y}</th>`);
  h += '</tr><tr class="sub">';
  ANIOS.forEach(() => h += '<th class="sub">Ops</th><th class="sub">Monto MM$</th>');
  h += '</tr></thead><tbody>';
  for (let m=1;m<=12;m++){
    h += `<tr><td class="mes-c">${MESES[m-1]}</td>`;
    ANIOS.forEach(y => {
      const c = MODELO[y][m] || {ops:0,monto:0};
      h += `<td><input class="cell" type="number" step="1" min="0" value="${c.ops}" data-y="${y}" data-m="${m}" data-k="ops" oninput="upd(this)"></td>`;
      h += `<td><input class="cell" type="number" step="0.1" min="0" value="${c.monto}" data-y="${y}" data-m="${m}" data-k="monto" oninput="upd(this)"></td>`;
    });
    h += '</tr>';
  }
  h += '</tbody><tfoot><tr><td class="mes-c">TOTAL</td>';
  ANIOS.forEach(y => {
    const tOps = sumaAnio(y,'ops'), tMon = sumaAnio(y,'monto');
    h += `<td id="tot-${y}-ops">${tOps.toLocaleString('es-CL')}</td><td id="tot-${y}-monto">${tMon.toLocaleString('es-CL',{maximumFractionDigits:1})}</td>`;
  });
  h += '</tr></tfoot>';
  t.innerHTML = h;
}

function sumaAnio(y, k){ let s=0; for(let m=1;m<=12;m++) s+=Number(MODELO[y][m]?.[k])||0; return s; }

function upd(inp){
  const y=inp.dataset.y, m=parseInt(inp.dataset.m), k=inp.dataset.k;
  MODELO[y][m][k] = Number(inp.value)||0;
  document.getElementById(`tot-${y}-${k}`).textContent =
    sumaAnio(y,k).toLocaleString('es-CL', k==='monto'?{maximumFractionDigits:1}:{});
}

function agregarAnio(){
  const max = Math.max(...ANIOS.map(Number));
  const nuevo = String(max+1);
  MODELO[nuevo] = {};
  for (let m=1;m<=12;m++) MODELO[nuevo][m] = {ops:0,monto:0};
  ANIOS = Object.keys(MODELO).sort();
  render();
}

async function guardar(){
  const btn = document.getElementById('btnGuardar'), msg = document.getElementById('msg');
  btn.disabled = true; btn.innerHTML = '<i class="bi bi-hourglass-split me-1"></i>Guardando…'; msg.style.display='none';
  // Aplanar a [{mes:'YYYY-MM', ops, monto}]
  const arr = [];
  ANIOS.forEach(y => { for (let m=1;m<=12;m++){
    const c = MODELO[y][m] || {ops:0,monto:0};
    arr.push({ mes:`${y}-${String(m).padStart(2,'0')}`, ops:Number(c.ops)||0, monto:Number(c.monto)||0 });
  }});
  try {
    const r = await fetch('/api/dashboard/presupuesto', { method:'POST', headers:H, body: JSON.stringify({ presupuesto: arr }) });
    const j = await r.json();
    if (j.success){ msg.textContent='✓ Guardado'; msg.style.cssText='display:inline;color:#15803d;font-weight:700;font-size:.85rem'; }
    else { msg.textContent=j.error||'Error al guardar'; msg.style.cssText='display:inline;color:#b91c1c;font-size:.85rem'; }
  } catch(e){ msg.textContent='Error: '+e.message; msg.style.cssText='display:inline;color:#b91c1c;font-size:.85rem'; }
  btn.disabled=false; btn.innerHTML='<i class="bi bi-check-lg me-1"></i>Guardar';
  setTimeout(()=>{ msg.style.display='none'; }, 4000);
}
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
