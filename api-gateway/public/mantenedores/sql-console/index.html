<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consola SQL — AutoFácil</title>
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-left { display:flex; align-items:center; gap:16px; }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:34px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .breadcrumb-nav a:hover { color:#fff; }
    .breadcrumb-nav .sep { color:rgba(255,255,255,.35); }
    .topnav-right { display:flex; align-items:center; gap:12px; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }

    .main-content { padding:24px 28px; max-width:1500px; margin:0 auto; }
    .page-banner { background:linear-gradient(135deg,var(--navy-dark),var(--navy) 50%,var(--accent)); border-radius:16px; color:#fff; padding:22px 30px; margin-bottom:22px; display:flex; align-items:center; gap:18px; }
    .page-banner i { font-size:2.6rem; opacity:.9; }
    .page-banner h2 { font-weight:900; margin:0 0 4px; font-size:1.4rem; letter-spacing:.5px; }
    .page-banner p { opacity:.85; margin:0; font-size:.86rem; }

    .layout { display:grid; grid-template-columns:240px 1fr; gap:18px; align-items:start; }
    @media (max-width:900px){ .layout { grid-template-columns:1fr; } }

    .panel { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
    .sidebar { padding:14px; max-height:72vh; overflow:auto; }
    .sidebar h6 { font-weight:800; font-size:.78rem; color:var(--navy-dark); text-transform:uppercase; letter-spacing:.5px; margin:0 0 10px; display:flex; align-items:center; gap:6px; }
    .tbl-item { display:block; width:100%; text-align:left; border:none; background:transparent; padding:5px 8px; border-radius:6px; font-size:.8rem; color:#374151; cursor:pointer; font-family:'Consolas','Courier New',monospace; }
    .tbl-item:hover { background:#eff6ff; color:var(--navy); }

    .editor-wrap { padding:16px; }
    .ed-bar { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
    .ed-bar .hint { font-size:.78rem; color:#6b7280; margin-left:auto; }
    textarea#sql { width:100%; min-height:130px; resize:vertical; font-family:'Consolas','Courier New',monospace; font-size:.92rem; line-height:1.5; border:1.5px solid #cbd5e1; border-radius:10px; padding:12px 14px; color:#0f172a; background:#f8fafc; }
    textarea#sql:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,154,254,.15); }
    .btn-run { background:linear-gradient(135deg,var(--navy),var(--accent)); color:#fff; border:none; border-radius:8px; padding:9px 22px; font-size:.88rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:7px; box-shadow:0 2px 8px rgba(1,65,162,.3); }
    .btn-run:hover { filter:brightness(1.07); }
    .btn-run:disabled { opacity:.6; cursor:default; }
    .btn-ghost { background:#fff; color:var(--navy); border:1.5px solid #cbd5e1; border-radius:8px; padding:8px 16px; font-size:.84rem; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
    .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
    .btn-ghost:disabled { opacity:.5; cursor:default; }

    .status { font-size:.82rem; margin:12px 0; padding:9px 14px; border-radius:8px; display:none; }
    .status.ok  { display:block; background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
    .status.err { display:block; background:#fef2f2; color:#991b1b; border:1px solid #fecaca; white-space:pre-wrap; font-family:'Consolas',monospace; }
    .status.warn{ display:block; background:#fffbeb; color:#92400e; border:1px solid #fde68a; }

    .res-wrap { overflow:auto; max-height:60vh; border:1px solid #e5e7eb; border-radius:10px; }
    table.res { border-collapse:collapse; width:100%; font-size:.82rem; }
    table.res th { position:sticky; top:0; background:var(--navy-dark); color:#fff; font-weight:700; text-align:left; padding:8px 12px; white-space:nowrap; z-index:1; }
    table.res td { padding:6px 12px; border-bottom:1px solid #f1f5f9; white-space:nowrap; max-width:380px; overflow:hidden; text-overflow:ellipsis; color:#1f2937; }
    table.res tr:hover td { background:#f8fafc; }
    table.res td.null { color:#9ca3af; font-style:italic; }
    .row-n { color:#94a3b8; font-variant-numeric:tabular-nums; }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-left">
    <a href="/" class="topnav-brand">
      <img src="/img/logo.png" alt="AutoFácil">
      <span class="version-badge" id="versionBadge">v1.0</span>
    </a>
    <div class="breadcrumb-nav">
      <a href="/">Inicio</a><span class="sep">›</span>
      <a href="/mantenedores/">Mantenedores</a><span class="sep">›</span>
      <a href="/mantenedores/solo-dios/">⚡ Solo Dios</a><span class="sep">›</span>
      <span style="color:#fff;font-weight:600">Consola SQL</span>
    </div>
  </div>
  <div class="topnav-right">
    <div class="user-chip">
      <div class="avatar" id="avatarInicial">?</div>
      <div>
        <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
        <div class="perfil-badge" id="navPerfil">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="main-content">
  <div class="page-banner">
    <i class="bi bi-terminal-fill"></i>
    <div>
      <h2>Consola SQL</h2>
      <p>Solo lectura — SELECT, SHOW, DESCRIBE, EXPLAIN. Una sentencia a la vez · máx. 2.000 filas · 20s · todo queda auditado.</p>
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar tablas -->
    <div class="panel sidebar">
      <h6><i class="bi bi-table"></i> Tablas</h6>
      <div id="tablas"><span style="font-size:.78rem;color:#9ca3af">Cargando…</span></div>
    </div>

    <!-- Editor + resultados -->
    <div class="panel editor-wrap">
      <div class="ed-bar">
        <button class="btn-run" id="btnRun" onclick="ejecutar()"><i class="bi bi-play-fill"></i>Ejecutar</button>
        <button class="btn-ghost" id="btnCsv" onclick="exportarCSV()" disabled><i class="bi bi-filetype-csv"></i>Exportar CSV</button>
        <span class="hint">Ctrl + Enter para ejecutar</span>
      </div>
      <textarea id="sql" placeholder="SELECT * FROM creditos LIMIT 100" spellcheck="false"></textarea>
      <div id="status" class="status"></div>
      <div class="res-wrap" id="resWrap" style="display:none">
        <table class="res" id="res"><thead></thead><tbody></tbody></table>
      </div>
    </div>
  </div>
</div>

<script src="/js/auth-guard.js"></script>
<script src="/js/app-version.js"></script>
<script>
  const token = sessionStorage.getItem('token');
  const yo    = JSON.parse(sessionStorage.getItem('usuario') || 'null');
  if (!token || !yo) window.location.href = '/login.html';
  document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
  document.getElementById('navPerfil').textContent  = yo?.perfil || '';
  document.getElementById('avatarInicial').textContent = (yo?.nombre||'?').charAt(0).toUpperCase();
  function logout() { sessionStorage.removeItem('token'); sessionStorage.removeItem('usuario'); window.location.href='/login.html'; }

  const $ = s => document.querySelector(s);
  let ULT = null; // último resultado para CSV

  async function runSQL(sql) {
    const r = await fetch('/api/sql-console', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+token },
      body: JSON.stringify({ sql })
    });
    return r.json();
  }

  function setStatus(cls, html) { const s=$('#status'); s.className='status '+cls; s.innerHTML=html; }

  async function ejecutar() {
    const sql = $('#sql').value.trim();
    if (!sql) return;
    const btn = $('#btnRun'); btn.disabled = true; btn.innerHTML='<i class="bi bi-hourglass-split"></i>Ejecutando…';
    $('#btnCsv').disabled = true; ULT = null;
    try {
      const j = await runSQL(sql);
      if (!j.success) { setStatus('err', '⚠ '+(j.error||'Error')); $('#resWrap').style.display='none'; return; }
      pintar(j.data);
      const n = j.data.total.toLocaleString('es-CL');
      let msg = `<i class="bi bi-check-circle-fill"></i> ${n} fila(s) · ${j.data.ms} ms`;
      if (j.data.truncado) { setStatus('warn', `Mostrando las primeras 2.000 de ${n} filas · ${j.data.ms} ms — acota con LIMIT para ver el resto.`); }
      else setStatus('ok', msg);
      $('#btnCsv').disabled = j.data.filas.length === 0;
    } catch(e) { setStatus('err', '⚠ '+e.message); }
    finally { btn.disabled=false; btn.innerHTML='<i class="bi bi-play-fill"></i>Ejecutar'; }
  }

  function pintar(d) {
    ULT = d;
    const thead = $('#res thead'), tbody = $('#res tbody');
    thead.innerHTML = '<tr><th class="row-n">#</th>' + d.columnas.map(c=>`<th>${esc(c)}</th>`).join('') + '</tr>';
    tbody.innerHTML = d.filas.map((row,i) =>
      `<tr><td class="row-n">${i+1}</td>` + d.columnas.map(c=>cell(row[c])).join('') + '</tr>'
    ).join('');
    $('#resWrap').style.display = d.filas.length ? 'block' : 'none';
  }
  function cell(v){ if(v===null||v===undefined) return '<td class="null">NULL</td>';
    if(typeof v==='object') v=JSON.stringify(v); return `<td title="${esc(String(v))}">${esc(String(v))}</td>`; }
  function esc(s){ return String(s).replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

  function exportarCSV() {
    if (!ULT || !ULT.filas.length) return;
    const q = s => '"' + String(s===null||s===undefined?'':s).replace(/"/g,'""') + '"';
    const lines = [ ULT.columnas.map(q).join(';') ];
    ULT.filas.forEach(r => lines.push(ULT.columnas.map(c=>q(typeof r[c]==='object'&&r[c]!==null?JSON.stringify(r[c]):r[c])).join(';')));
    const blob = new Blob(['﻿'+lines.join('\r\n')], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'consulta-sql.csv'; a.click(); URL.revokeObjectURL(a.href);
  }

  // Ctrl+Enter
  $('#sql').addEventListener('keydown', e => {
    if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); ejecutar(); }
  });

  // Sidebar: lista de tablas
  (async () => {
    const j = await runSQL('SHOW TABLES');
    const cont = $('#tablas');
    if (!j.success || !j.data.filas.length) { cont.innerHTML='<span style="font-size:.78rem;color:#9ca3af">—</span>'; return; }
    const col = j.data.columnas[0];
    cont.innerHTML = j.data.filas.map(r => {
      const t = r[col];
      return `<button class="tbl-item" onclick="usarTabla('${esc(t)}')"><i class="bi bi-table"></i> ${esc(t)}</button>`;
    }).join('');
  })();
  function usarTabla(t){ $('#sql').value = `SELECT * FROM ${t} LIMIT 100`; $('#sql').focus(); ejecutar(); }
</script>
</body>
</html>
