<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UF — AutoFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy: #0141A2; --navy-dark: #012d70; --navy-light: #0255c5; --accent: #009AFE; --bg: #f0f4f8; }
    body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; min-height: 100vh; }
    .topnav { background: linear-gradient(90deg, var(--navy-dark), var(--navy-light)); color: #fff; height: 60px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .topnav-left { display: flex; align-items: center; gap: 16px; }
    .topnav-brand img { height: 32px; filter: brightness(0) invert(1); }
    .version-badge { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.75); font-size: 0.65rem; font-weight: 700; border-radius: 6px; padding: 2px 8px; letter-spacing: 0.5px; }
    .breadcrumb-nav { color: rgba(255,255,255,0.6); font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
    .breadcrumb-nav a { color: rgba(255,255,255,0.75); text-decoration: none; }
    .breadcrumb-nav a:hover { color: #fff; }
    .breadcrumb-nav .sep { color: rgba(255,255,255,0.35); }
    .topnav-right { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 28px; height: 28px; background: #90caf9; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--navy); font-weight: 700; font-size: 0.75rem; }
    .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 5px 12px; font-size: 0.82rem; cursor: pointer; }
    .btn-logout:hover { background: rgba(255,255,255,0.2); }
    .page-content { padding: 28px 32px; max-width: 900px; margin: 0 auto; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .page-header h4 { font-weight: 700; color: #111827; margin: 0; display: flex; align-items: center; gap: 10px; }
    .page-header h4 i { color: var(--navy); }
    .card { border: none; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .uf-vigente-card { background: linear-gradient(135deg, var(--navy), var(--accent)); border-radius: 14px; color: #fff; padding: 24px 28px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; }
    .uf-vigente-card .label { font-size: 0.82rem; opacity: 0.8; font-weight: 600; letter-spacing: 0.5px; }
    .uf-vigente-card .valor { font-size: 2.2rem; font-weight: 800; letter-spacing: 1px; }
    .uf-vigente-card .fecha { font-size: 0.78rem; opacity: 0.7; margin-top: 4px; }
    .uf-vigente-card i { font-size: 3rem; opacity: 0.25; }
    .table { font-size: 0.88rem; }
    .table thead th { background: #f8fafc; font-weight: 700; color: #374151; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #e5e7eb; }
    .table tbody tr:hover { background: #f8fafc; }
    .valor-uf { font-weight: 700; color: var(--navy); font-size: 0.95rem; }
    .btn-primary { background: var(--navy); border-color: var(--navy); }
    .btn-primary:hover { background: var(--accent); border-color: var(--accent); }
    .search-bar { position: relative; }
    .search-bar input { padding-left: 34px; border-radius: 8px; border: 1.5px solid #d1d5db; font-size: 0.88rem; }
    .search-bar input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(1,65,162,0.1); }
    .search-bar i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
    .modal-header { background: linear-gradient(135deg, var(--navy), var(--accent)); color: #fff; border-radius: 12px 12px 0 0; }
    .modal-header .btn-close { filter: invert(1); }
    .modal-content { border-radius: 12px; border: none; }
    .form-label { font-weight: 600; font-size: 0.82rem; color: #374151; }
    .form-control { border-radius: 8px; border: 1.5px solid #d1d5db; font-size: 0.88rem; }
    .form-control:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(1,65,162,0.1); }
    .toast-container { position: fixed; top: 70px; right: 20px; z-index: 9999; }
  </style>
</head>
<body>
  <nav class="topnav">
    <div class="topnav-left">
      <div class="topnav-brand"><a href="/"><img src="/img/logo.png" alt="AutoFácil"></a> <span class="version-badge">v1.3</span></div>
      <div class="breadcrumb-nav">
        <a href="/">Inicio</a><span class="sep">/</span>
        <span style="color:rgba(255,255,255,0.5)">Mantenedores</span><span class="sep">/</span>
        <span style="color:#fff; font-weight:600"><i class="bi bi-currency-dollar me-1"></i>UF</span>
      </div>
    </div>
    <div class="topnav-right">
      <div style="display:flex;align-items:center;gap:8px;font-size:0.85rem">
        <div class="avatar" id="avatarInicial">?</div>
        <span style="color:#fff; font-weight:600" id="navNombre">—</span>
      </div>
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
    </div>
  </nav>

  <div class="toast-container">
    <div id="toast" class="toast align-items-center text-white border-0" role="alert">
      <div class="d-flex"><div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>
    </div>
  </div>

  <div class="page-content">
    <div class="page-header">
      <h4><i class="bi bi-currency-dollar"></i> Valores UF</h4>
      <button class="btn btn-primary btn-sm" onclick="abrirModal()"><i class="bi bi-plus-lg me-1"></i>Ingresar UF</button>
    </div>

    <!-- UF VIGENTE -->
    <div class="uf-vigente-card" id="ufVigenteCard">
      <div>
        <div class="label">UF VIGENTE HOY</div>
        <div class="valor" id="ufValor">—</div>
        <div class="fecha" id="ufFecha">—</div>
      </div>
      <i class="bi bi-currency-dollar"></i>
    </div>

    <div class="card">
      <div class="card-body p-3">
        <div class="mb-3 search-bar" style="max-width:260px">
          <i class="bi bi-search"></i>
          <input type="text" id="buscador" class="form-control" placeholder="Buscar por fecha..." oninput="filtrar()">
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead><tr><th>Fecha</th><th>Valor UF</th><th style="width:90px">Acciones</th></tr></thead>
            <tbody id="tbody"><tr><td colspan="3" class="text-center py-4 text-muted">Cargando...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal fade" id="modal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitulo">Ingresar UF</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Fecha *</label>
            <input type="date" id="fFecha" class="form-control">
          </div>
          <div class="mb-2">
            <label class="form-label">Valor UF *</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input type="number" id="fValor" class="form-control" placeholder="37000.00" step="0.01" min="0">
            </div>
          </div>
          <div id="modalError" class="alert alert-danger mt-3 d-none"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" onclick="guardar()"><i class="bi bi-floppy me-1"></i>Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const yo = JSON.parse(localStorage.getItem('usuario') || 'null');
    if (!token || !yo) { window.location.href = '/login.html'; }
    document.getElementById('navNombre').textContent = `${yo?.nombre || ''} ${yo?.apellido || ''}`.trim();
    document.getElementById('avatarInicial').textContent = (yo?.nombre || '?').charAt(0).toUpperCase();
    function logout() { localStorage.removeItem('token'); localStorage.removeItem('usuario'); window.location.href = '/login.html'; }

    const api = async (method, url, body) => {
      const r = await fetch(url, { method, headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' }, body: body ? JSON.stringify(body) : undefined });
      if (r.status === 401) { logout(); return null; }
      return r.json();
    };
    const showToast = (msg, tipo='success') => {
      const el = document.getElementById('toast');
      el.className = `toast align-items-center text-white border-0 bg-${tipo}`;
      document.getElementById('toastMsg').textContent = msg;
      bootstrap.Toast.getOrCreateInstance(el, { delay: 3000 }).show();
    };

    let datos = [], editId = null;

    async function cargar() {
      const [dAll, dVig] = await Promise.all([api('GET', '/api/uf'), api('GET', '/api/uf/vigente')]);
      if (dAll?.success) { datos = dAll.data; renderizar(datos); }
      if (dVig?.success && dVig.data) {
        document.getElementById('ufValor').textContent = `$ ${parseFloat(dVig.data.valor).toLocaleString('es-CL', {minimumFractionDigits:2})}`;
        document.getElementById('ufFecha').textContent = `Al ${new Date(dVig.data.fecha).toLocaleDateString('es-CL', {timeZone:'UTC'})}`;
      }
    }

    function renderizar(lista) {
      const tbody = document.getElementById('tbody');
      if (!lista.length) { tbody.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-muted">Sin registros UF.</td></tr>'; return; }
      tbody.innerHTML = lista.map(u => `
        <tr>
          <td>${new Date(u.fecha).toLocaleDateString('es-CL', {timeZone:'UTC'})}</td>
          <td><span class="valor-uf">$ ${parseFloat(u.valor).toLocaleString('es-CL', {minimumFractionDigits:2})}</span></td>
          <td>
            <button class="btn btn-outline-primary btn-sm me-1" onclick="editar(${u.id_uf}, '${u.fecha?.split('T')[0]}', ${u.valor})"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-outline-danger btn-sm" onclick="eliminar(${u.id_uf})"><i class="bi bi-trash"></i></button>
          </td>
        </tr>`).join('');
    }

    function filtrar() {
      const q = document.getElementById('buscador').value.toLowerCase();
      renderizar(datos.filter(u => new Date(u.fecha).toLocaleDateString('es-CL').includes(q)));
    }

    function abrirModal() {
      editId = null;
      document.getElementById('modalTitulo').textContent = 'Ingresar UF';
      document.getElementById('fFecha').value = new Date().toISOString().split('T')[0];
      document.getElementById('fValor').value = '';
      document.getElementById('modalError').classList.add('d-none');
      bootstrap.Modal.getOrCreateInstance(document.getElementById('modal')).show();
    }

    function editar(id, fecha, valor) {
      editId = id;
      document.getElementById('modalTitulo').textContent = 'Editar UF';
      document.getElementById('fFecha').value = fecha;
      document.getElementById('fValor').value = valor;
      document.getElementById('modalError').classList.add('d-none');
      bootstrap.Modal.getOrCreateInstance(document.getElementById('modal')).show();
    }

    async function guardar() {
      const body = { fecha: document.getElementById('fFecha').value, valor: parseFloat(document.getElementById('fValor').value) };
      const url = editId ? `/api/uf/${editId}` : '/api/uf';
      const d = await api(editId ? 'PUT' : 'POST', url, body);
      if (d?.success) {
        bootstrap.Modal.getInstance(document.getElementById('modal')).hide();
        showToast(editId ? 'UF actualizada' : 'UF ingresada');
        cargar();
      } else {
        const el = document.getElementById('modalError');
        el.textContent = d?.error || 'Error al guardar'; el.classList.remove('d-none');
      }
    }

    async function eliminar(id) {
      if (!confirm('¿Eliminar este registro UF?')) return;
      const d = await api('DELETE', `/api/uf/${id}`);
      if (d?.success) { showToast('Registro eliminado'); cargar(); }
      else showToast(d?.error || 'Error', 'danger');
    }

    cargar();
  </script>
</body>
</html>
