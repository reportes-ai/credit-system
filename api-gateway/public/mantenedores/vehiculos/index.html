<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehículos SII — AutoFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
    .topnav-left { display:flex; align-items:center; gap:16px; }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,0.15); color:rgba(255,255,255,0.75); font-size:0.65rem; font-weight:700; border-radius:6px; padding:2px 8px; letter-spacing:0.5px; }
    .breadcrumb-nav { color:rgba(255,255,255,0.6); font-size:0.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,0.75); text-decoration:none; }
    .breadcrumb-nav a:hover { color:#fff; }
    .breadcrumb-nav .sep { color:rgba(255,255,255,0.35); }
    .topnav-right { display:flex; align-items:center; gap:12px; }
    .user-chip { background:rgba(255,255,255,0.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:0.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:700; font-size:0.75rem; }
    .perfil-badge { background:rgba(144,202,249,0.2); border:1px solid rgba(144,202,249,0.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:0.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:0.82rem; cursor:pointer; }
    .main-content { padding:28px 32px; max-width:1400px; margin:0 auto; }
    .page-banner { background:linear-gradient(135deg,#012d70,#0141A2 50%,#009AFE); border-radius:16px; color:#fff; padding:24px 32px; margin-bottom:28px; display:flex; align-items:center; justify-content:space-between; gap:20px; }
    .banner-left { display:flex; align-items:center; gap:20px; }
    .page-banner i.bi-car-front { font-size:2.8rem; opacity:0.8; }
    .page-banner h2 { font-weight:700; margin:0 0 4px; font-size:1.3rem; }
    .page-banner p { opacity:0.8; margin:0; font-size:0.88rem; }
    .banner-actions { display:flex; gap:10px; flex-shrink:0; }
    .card-box { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,0.07); padding:20px 24px; margin-bottom:20px; }
    .filters-row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
    .filters-row .form-label { font-size:0.78rem; font-weight:600; color:#6b7280; margin-bottom:4px; }
    .filters-row select, .filters-row input { font-size:0.85rem; }
    .stat-pills { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
    .stat-pill { background:#f0f4f8; border-radius:20px; padding:6px 16px; font-size:0.82rem; color:#374151; }
    .stat-pill strong { color:var(--navy); }
    table { font-size:0.82rem; }
    th { background:#f8fafc; color:#6b7280; font-weight:600; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; border-top:none !important; white-space:nowrap; }
    td { vertical-align:middle; }
    .badge-tipo { font-size:0.7rem; font-weight:600; padding:3px 8px; border-radius:10px; background:#e8eaf6; color:#3949ab; }
    .tasacion-val { font-weight:700; color:#0141A2; font-size:0.82rem; }
    .btn-sm { font-size:0.75rem; padding:3px 8px; }
    .pagination-row { display:flex; align-items:center; justify-content:space-between; margin-top:16px; }
    .pag-info { font-size:0.82rem; color:#6b7280; }
    .import-progress { display:none; margin-top:12px; }
    .modal-xl { max-width:900px; }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-left">
    <a href="/" class="topnav-brand">
      <img src="/img/logo.png" alt="AutoFácil">
      <span class="version-badge">v3.4</span>
    </a>
    <div class="breadcrumb-nav">
      <a href="/">Inicio</a><span class="sep">/</span>
      <a href="/mantenedores/"><i class="bi bi-sliders me-1"></i>Mantenedores</a><span class="sep">/</span>
      <span style="color:#fff;font-weight:600"><i class="bi bi-car-front me-1"></i>Vehículos</span>
    </div>
  </div>
  <div class="topnav-right">
    <div class="user-chip">
      <div class="avatar" id="avatarInicial">?</div>
      <div>
        <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
        <div class="perfil-badge" id="navPerfil">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="main-content">
  <div class="page-banner">
    <div class="banner-left">
      <i class="bi bi-car-front"></i>
      <div>
        <h2>Vehículos SII</h2>
        <p>Base de tasación — Resolución Exenta SII N°06 / 2026</p>
      </div>
    </div>
    <div class="banner-actions">
      <button class="btn btn-light btn-sm px-3" onclick="document.getElementById('fileInput').click()">
        <i class="bi bi-file-earmark-excel me-1 text-success"></i>Importar Excel SII
      </button>
      <input type="file" id="fileInput" accept=".xlsx" style="display:none" onchange="onFileSelected(this)">
      <button class="btn btn-warning btn-sm px-3" onclick="abrirModalNuevo()">
        <i class="bi bi-plus-circle me-1"></i>Agregar
      </button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="card-box">
    <div class="filters-row">
      <div>
        <div class="form-label">Buscar</div>
        <input type="text" id="filtroQ" class="form-control form-control-sm" placeholder="Marca, modelo, versión..." style="width:220px" oninput="debounceCargar()">
      </div>
      <div>
        <div class="form-label">Marca</div>
        <select id="filtroMarca" class="form-select form-select-sm" style="width:180px" onchange="cargar()">
          <option value="">Todas las marcas</option>
        </select>
      </div>
      <div>
        <div class="form-label">Tipo</div>
        <select id="filtroTipo" class="form-select form-select-sm" style="width:150px" onchange="cargar()">
          <option value="">Todos los tipos</option>
        </select>
      </div>
      <div>
        <div class="form-label">Año</div>
        <select id="filtroAnio" class="form-select form-select-sm" style="width:110px" onchange="cargar()">
          <option value="">Todos</option>
        </select>
      </div>
      <div>
        <div class="form-label">Resultados</div>
        <select id="filtroLimit" class="form-select form-select-sm" style="width:90px" onchange="cargar()">
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="200">200</option>
        </select>
      </div>
      <button class="btn btn-outline-secondary btn-sm" onclick="limpiarFiltros()"><i class="bi bi-x-circle me-1"></i>Limpiar</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stat-pills" id="statPills"></div>

  <!-- Tabla -->
  <div class="card-box" style="padding:0;overflow:hidden">
    <div style="overflow-x:auto">
      <table class="table table-hover mb-0" id="tablaVehiculos">
        <thead>
          <tr>
            <th>Código SII</th>
            <th>Año</th>
            <th>Tipo</th>
            <th>Marca</th>
            <th>Modelo</th>
            <th>Versión</th>
            <th>Combustible</th>
            <th>Transmisión</th>
            <th>Tasación 2026</th>
            <th>Permiso 2026</th>
            <th class="text-center">Acc.</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pagination-row px-4 py-3">
      <div class="pag-info" id="pagInfo"></div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-secondary btn-sm" id="btnPrev" onclick="cambiarPag(-1)"><i class="bi bi-chevron-left"></i></button>
        <button class="btn btn-outline-secondary btn-sm" id="btnNext" onclick="cambiarPag(1)"><i class="bi bi-chevron-right"></i></button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Importar -->
<div class="modal fade" id="modalImportar" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-file-earmark-excel me-2 text-success"></i>Importar Base SII</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="previewInfo" class="alert alert-info" style="font-size:0.88rem"></div>
        <div class="import-progress" id="importProgress">
          <div class="d-flex justify-content-between mb-1" style="font-size:0.82rem">
            <span id="progTexto">Importando...</span>
            <span id="progPct">0%</span>
          </div>
          <div class="progress">
            <div class="progress-bar bg-success" id="progBar" style="width:0%"></div>
          </div>
        </div>
        <div id="importResult" class="mt-3" style="display:none"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-success" id="btnConfirmarImport" onclick="confirmarImport()">
          <i class="bi bi-upload me-1"></i>Importar
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Vehículo -->
<div class="modal fade" id="modalVehiculo" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalVehTitle">Vehículo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="vehId">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label fw-semibold">Código SII</label>
            <input type="text" class="form-control" id="vehCodigoSii">
          </div>
          <div class="col-md-2">
            <label class="form-label fw-semibold">Año</label>
            <input type="number" class="form-control" id="vehAnio" min="2000" max="2030">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">Tipo</label>
            <input type="text" class="form-control" id="vehTipo">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Marca</label>
            <input type="text" class="form-control" id="vehMarca">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Modelo</label>
            <input type="text" class="form-control" id="vehModelo">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Versión</label>
            <input type="text" class="form-control" id="vehVersion">
          </div>
          <div class="col-md-2">
            <label class="form-label fw-semibold">Puertas</label>
            <input type="number" class="form-control" id="vehPuertas" min="1" max="6">
          </div>
          <div class="col-md-2">
            <label class="form-label fw-semibold">Cilindrada</label>
            <input type="number" class="form-control" id="vehCilindrada">
          </div>
          <div class="col-md-2">
            <label class="form-label fw-semibold">Potencia HP</label>
            <input type="number" class="form-control" id="vehPotencia">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">Combustible</label>
            <input type="text" class="form-control" id="vehCombustible">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">Transmisión</label>
            <input type="text" class="form-control" id="vehTransmision">
          </div>
          <div class="col-md-2">
            <label class="form-label fw-semibold">Marchas</label>
            <input type="number" class="form-control" id="vehMarchas">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">Tracción</label>
            <input type="text" class="form-control" id="vehTraccion">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">País</label>
            <input type="text" class="form-control" id="vehPais">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Tasación ($)</label>
            <input type="text" class="form-control" id="vehTasacion" placeholder="174.856" inputmode="numeric">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Permiso ($)</label>
            <input type="text" class="form-control" id="vehPermiso" placeholder="34.876" inputmode="numeric">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarVehiculo()"><i class="bi bi-floppy me-1"></i>Guardar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/cl-numbers.js"></script>
<script>
const token = localStorage.getItem('token');
const yo = JSON.parse(localStorage.getItem('usuario') || 'null');
if (!token || !yo) window.location.href = '/login.html';
const nombre = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
document.getElementById('navNombre').textContent = nombre;
document.getElementById('navPerfil').textContent = yo?.perfil || '';
document.getElementById('avatarInicial').textContent = (yo?.nombre||'?').charAt(0).toUpperCase();
function logout() { localStorage.removeItem('token'); localStorage.removeItem('usuario'); window.location.href = '/login.html'; }

const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
let paginaActual = 1;
let totalRegistros = 0;
let pendingImport = [];
let debTimer;

function debounceCargar() { clearTimeout(debTimer); debTimer = setTimeout(cargar, 400); }

async function cargar(pag) {
  if (pag !== undefined) paginaActual = pag;
  const q      = document.getElementById('filtroQ').value;
  const marca  = document.getElementById('filtroMarca').value;
  const tipo   = document.getElementById('filtroTipo').value;
  const anio   = document.getElementById('filtroAnio').value;
  const limit  = document.getElementById('filtroLimit').value;
  const params = new URLSearchParams({ page: paginaActual, limit });
  if (q)     params.append('q', q);
  if (marca) params.append('marca', marca);
  if (tipo)  params.append('tipo', tipo);
  if (anio)  params.append('anio', anio);

  const res = await fetch('/api/vehiculos?' + params, { headers });
  const json = await res.json();
  if (!json.success) return;
  const { rows, total, page, limit: lim } = json.data;
  totalRegistros = total;
  renderTabla(rows);
  const desde = (page - 1) * lim + 1;
  const hasta = Math.min(page * lim, total);
  document.getElementById('pagInfo').textContent = total > 0
    ? `Mostrando ${desde}–${hasta} de ${total.toLocaleString('es-CL')} vehículos`
    : 'Sin resultados';
  document.getElementById('btnPrev').disabled = page <= 1;
  document.getElementById('btnNext').disabled = hasta >= total;
  document.getElementById('statPills').innerHTML = `
    <div class="stat-pill">Total: <strong>${total.toLocaleString('es-CL')}</strong> registros</div>`;
}

function renderTabla(rows) {
  const tb = document.getElementById('tbody');
  if (!rows.length) { tb.innerHTML = '<tr><td colspan="11" class="text-center text-muted py-4">Sin resultados</td></tr>'; return; }
  tb.innerHTML = rows.map(v => `
    <tr>
      <td><code style="font-size:0.75rem">${v.codigo_sii||''}</code></td>
      <td><strong>${v.anio}</strong></td>
      <td><span class="badge-tipo">${v.tipo||''}</span></td>
      <td style="font-weight:600">${v.marca||''}</td>
      <td>${v.modelo||''}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${v.version||''}">${v.version||''}</td>
      <td>${v.combustible||''}</td>
      <td>${v.transmision||''}</td>
      <td class="tasacion-val">$${(v.tasacion||0).toLocaleString('es-CL')}</td>
      <td>$${(v.permiso||0).toLocaleString('es-CL')}</td>
      <td class="text-center">
        <button class="btn btn-outline-primary btn-sm me-1" onclick="editarVehiculo(${JSON.stringify(v).replace(/"/g,'&quot;')})"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-outline-danger btn-sm" onclick="eliminarVehiculo(${v.id_vehiculo})"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`).join('');
}

function cambiarPag(delta) { paginaActual += delta; cargar(); }

function limpiarFiltros() {
  document.getElementById('filtroQ').value = '';
  document.getElementById('filtroMarca').value = '';
  document.getElementById('filtroTipo').value = '';
  document.getElementById('filtroAnio').value = '';
  paginaActual = 1;
  cargar();
}

async function cargarFiltros() {
  const res = await fetch('/api/vehiculos/filtros', { headers });
  const json = await res.json();
  if (!json.success) return;
  const { marcas, tipos, anios } = json.data;
  const sel = (id, vals) => {
    const el = document.getElementById(id);
    const prev = el.value;
    const first = el.options[0].outerHTML;
    el.innerHTML = first + vals.map(v => `<option value="${v}">${v}</option>`).join('');
    if (prev) el.value = prev;
  };
  sel('filtroMarca', marcas);
  sel('filtroTipo', tipos);
  sel('filtroAnio', anios);
}

// ---- Import ----
let importRows = [];

function onFileSelected(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  const reader = new FileReader();
  reader.onload = (e) => {
    const wb = XLSX.read(e.target.result, { type: 'binary' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

    // Find header row (contains "Código SII")
    let headerIdx = -1;
    for (let i = 0; i < raw.length; i++) {
      if (raw[i] && raw[i].some(c => c && String(c).includes('Código SII'))) {
        headerIdx = i; break;
      }
    }
    if (headerIdx === -1) { alert('No se encontró encabezado válido en el archivo.'); return; }

    const headers = raw[headerIdx].map(h => (h || '').toString().trim());
    const idx = (name) => headers.findIndex(h => h.includes(name));
    const iCod   = idx('Código SII');
    const iAnio  = idx('Año');
    const iTipo  = idx('Tipo');
    const iMarca = idx('Marca');
    const iMod   = idx('Modelo');
    const iVer   = idx('Versión');
    const iPuer  = idx('Puertas');
    const iCil   = idx('Cilindrada');
    const iPot   = idx('Potencia');
    const iComb  = idx('Combustible');
    const iTrans = idx('Transmisión');
    const iMar   = idx('Marchas');
    const iTrac  = idx('Tracción');
    const iPais  = idx('País');
    const iEquip = idx('Equipamiento');
    const iTas   = idx('Tasación');
    const iPerm  = idx('Permiso');
    const iBen   = idx('Beneficio');

    importRows = [];
    for (let i = headerIdx + 1; i < raw.length; i++) {
      const r = raw[i];
      if (!r || !r[iCod]) continue;
      importRows.push({
        codigo_sii:   r[iCod] ? String(r[iCod]).trim() : null,
        anio:         parseInt(r[iAnio]) || null,
        tipo:         r[iTipo] ? String(r[iTipo]).trim() : null,
        marca:        r[iMarca] ? String(r[iMarca]).trim() : null,
        modelo:       r[iMod] ? String(r[iMod]).trim() : null,
        version:      r[iVer] ? String(r[iVer]).trim() : null,
        puertas:      parseInt(r[iPuer]) || null,
        cilindrada:   parseInt(r[iCil]) || null,
        potencia:     parseInt(r[iPot]) || null,
        combustible:  r[iComb] ? String(r[iComb]).trim() : null,
        transmision:  r[iTrans] ? String(r[iTrans]).trim() : null,
        marchas:      parseInt(r[iMar]) || null,
        traccion:     r[iTrac] ? String(r[iTrac]).trim() : null,
        pais:         r[iPais] ? String(r[iPais]).trim() : null,
        equipamiento: iEquip >= 0 && r[iEquip] ? String(r[iEquip]).trim() : null,
        tasacion:     parseInt(r[iTas]) || null,
        permiso:      parseInt(r[iPerm]) || null,
        beneficio_ley: iBen >= 0 && r[iBen] ? String(r[iBen]).trim() : null,
      });
    }

    const con2025 = importRows.filter(r => r.anio === 2025).length;
    document.getElementById('previewInfo').innerHTML =
      `<strong>${importRows.length.toLocaleString('es-CL')}</strong> vehículos encontrados en el archivo.<br>` +
      (con2025 > 0 ? `<span class="text-success"><i class="bi bi-info-circle me-1"></i>${con2025.toLocaleString('es-CL')} registros año 2025 → también se agregarán como 2026</span>` : '');
    document.getElementById('importProgress').style.display = 'none';
    document.getElementById('importResult').style.display = 'none';
    document.getElementById('btnConfirmarImport').disabled = false;
    new bootstrap.Modal(document.getElementById('modalImportar')).show();
  };
  reader.readAsBinaryString(file);
}

async function confirmarImport() {
  if (!importRows.length) return;
  const BATCH = 150;
  const total = importRows.length;
  let insertados = 0;
  document.getElementById('importProgress').style.display = 'block';
  document.getElementById('btnConfirmarImport').disabled = true;

  for (let i = 0; i < total; i += BATCH) {
    const batch = importRows.slice(i, i + BATCH);
    const res = await fetch('/api/vehiculos/importar', {
      method: 'POST', headers,
      body: JSON.stringify({ registros: batch }),
    });
    const json = await res.json();
    if (json.success) insertados += json.data.insertados;
    const pct = Math.round(Math.min((i + BATCH) / total * 100, 100));
    document.getElementById('progBar').style.width = pct + '%';
    document.getElementById('progPct').textContent = pct + '%';
    document.getElementById('progTexto').textContent = `Procesando ${Math.min(i + BATCH, total).toLocaleString('es-CL')} / ${total.toLocaleString('es-CL')}`;
  }

  document.getElementById('importResult').style.display = 'block';
  document.getElementById('importResult').innerHTML =
    `<div class="alert alert-success mb-0"><i class="bi bi-check-circle me-2"></i><strong>${insertados.toLocaleString('es-CL')}</strong> registros importados correctamente.</div>`;
  document.getElementById('btnConfirmarImport').textContent = 'Cerrar';
  document.getElementById('btnConfirmarImport').onclick = () => {
    bootstrap.Modal.getInstance(document.getElementById('modalImportar')).hide();
    document.getElementById('btnConfirmarImport').textContent = 'Importar';
    document.getElementById('btnConfirmarImport').onclick = confirmarImport;
    cargarFiltros();
    cargar(1);
  };
}

// ---- CRUD ----
function abrirModalNuevo() {
  document.getElementById('modalVehTitle').textContent = 'Nuevo Vehículo';
  ['vehId','vehCodigoSii','vehAnio','vehTipo','vehMarca','vehModelo','vehVersion',
   'vehPuertas','vehCilindrada','vehPotencia','vehCombustible','vehTransmision',
   'vehMarchas','vehTraccion','vehPais','vehTasacion','vehPermiso'].forEach(id => {
    document.getElementById(id).value = '';
  });
  new bootstrap.Modal(document.getElementById('modalVehiculo')).show();
}

function editarVehiculo(v) {
  document.getElementById('modalVehTitle').textContent = 'Editar Vehículo';
  document.getElementById('vehId').value = v.id_vehiculo;
  document.getElementById('vehCodigoSii').value = v.codigo_sii || '';
  document.getElementById('vehAnio').value = v.anio || '';
  document.getElementById('vehTipo').value = v.tipo || '';
  document.getElementById('vehMarca').value = v.marca || '';
  document.getElementById('vehModelo').value = v.modelo || '';
  document.getElementById('vehVersion').value = v.version || '';
  document.getElementById('vehPuertas').value = v.puertas || '';
  document.getElementById('vehCilindrada').value = v.cilindrada || '';
  document.getElementById('vehPotencia').value = v.potencia || '';
  document.getElementById('vehCombustible').value = v.combustible || '';
  document.getElementById('vehTransmision').value = v.transmision || '';
  document.getElementById('vehMarchas').value = v.marchas || '';
  document.getElementById('vehTraccion').value = v.traccion || '';
  document.getElementById('vehPais').value = v.pais || '';
  document.getElementById('vehTasacion').value = v.tasacion ? formatCLInt(v.tasacion) : '';
  document.getElementById('vehPermiso').value  = v.permiso  ? formatCLInt(v.permiso)  : '';
  new bootstrap.Modal(document.getElementById('modalVehiculo')).show();
}

async function guardarVehiculo() {
  const id = document.getElementById('vehId').value;
  const body = {
    codigo_sii:  document.getElementById('vehCodigoSii').value,
    anio:        parseInt(document.getElementById('vehAnio').value),
    tipo:        document.getElementById('vehTipo').value,
    marca:       document.getElementById('vehMarca').value,
    modelo:      document.getElementById('vehModelo').value,
    version:     document.getElementById('vehVersion').value,
    puertas:     parseInt(document.getElementById('vehPuertas').value)||null,
    cilindrada:  parseInt(document.getElementById('vehCilindrada').value)||null,
    potencia:    parseInt(document.getElementById('vehPotencia').value)||null,
    combustible: document.getElementById('vehCombustible').value,
    transmision: document.getElementById('vehTransmision').value,
    marchas:     parseInt(document.getElementById('vehMarchas').value)||null,
    traccion:    document.getElementById('vehTraccion').value,
    pais:        document.getElementById('vehPais').value,
    tasacion:    parseCL(document.getElementById('vehTasacion').value)||null,
    permiso:     parseCL(document.getElementById('vehPermiso').value)||null,
    beneficio_ley: null,
  };
  const url = id ? `/api/vehiculos/${id}` : '/api/vehiculos';
  const method = id ? 'PUT' : 'POST';
  const res = await fetch(url, { method, headers, body: JSON.stringify(body) });
  const json = await res.json();
  if (json.success) {
    bootstrap.Modal.getInstance(document.getElementById('modalVehiculo')).hide();
    cargar(); cargarFiltros();
  } else alert('Error: ' + json.error);
}

async function eliminarVehiculo(id) {
  if (!confirm('¿Eliminar este vehículo?')) return;
  const res = await fetch(`/api/vehiculos/${id}`, { method: 'DELETE', headers });
  const json = await res.json();
  if (json.success) cargar();
  else alert('Error: ' + json.error);
}

// Init
cargar(1);
cargarFiltros();
</script>
