<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vista Pantallas — AutoFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="/js/placement-manifest.js"></script>
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --bg:#f0f4f8; }
    * { box-sizing:border-box; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }

    /* NAV */
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-left { display:flex; align-items:center; gap:16px; }
    .topnav-brand img { height:34px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .topnav-right { display:flex; align-items:center; gap:8px; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-nav { border-radius:8px; padding:6px 14px; font-size:.82rem; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; border:none; }
    .btn-reordenar { background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.3); }
    .btn-reordenar:hover, .btn-reordenar.activo { background:rgba(255,255,255,.28); }
    .btn-guardar { background:#16a34a; color:#fff; display:none; }
    .btn-guardar:hover { background:#15803d; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }

    /* MAIN */
    .main-content { padding:22px 28px; max-width:1600px; margin:0 auto; }
    .page-banner { background:linear-gradient(135deg,#012d70,#0141A2 50%,#009AFE); border-radius:14px; color:#fff; padding:18px 24px; margin-bottom:20px; display:flex; align-items:center; gap:14px; }
    .page-banner i.main-icon { font-size:2rem; opacity:.8; flex-shrink:0; }
    .page-banner h2 { font-weight:700; margin:0 0 3px; font-size:1.1rem; }
    .page-banner p { opacity:.8; margin:0; font-size:.8rem; }

    /* GROUPS */
    .groups-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }

    .group-card { background:#fff; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.07); overflow:hidden; }
    .group-header { padding:9px 13px; display:flex; align-items:center; gap:7px; }
    .group-header i.sec-icon { font-size:.95rem; color:#fff; flex-shrink:0; }
    .group-header h3 { margin:0; font-size:.85rem; font-weight:700; color:#fff; flex:1; white-space:nowrap; overflow:hidden; }
    .group-count { background:rgba(255,255,255,.28); border-radius:20px; padding:1px 9px; font-size:.68rem; font-weight:700; color:#fff; white-space:nowrap; }
    .group-body { padding:8px 10px; min-height:46px; display:flex; flex-wrap:wrap; gap:5px; align-content:flex-start; transition:background .15s; }
    .group-body.drag-over { background:#f0f4ff; }
    .group-empty { color:#c4c9d4; font-size:.7rem; font-style:italic; width:100%; text-align:center; padding:5px 0; pointer-events:none; }

    /* CHIPS */
    .chip {
      display:inline-flex; align-items:center; gap:4px;
      border-radius:20px; padding:4px 10px 4px 6px;
      font-size:.74rem; font-weight:600;
      user-select:none; white-space:nowrap;
      transition:box-shadow .12s, border-color .12s;
    }
    .chip.type-module { background:#eff6ff; border:1.5px solid #bfdbfe; color:#1d4ed8; }
    .chip.type-module .chip-icon { color:#2563eb; }
    .chip.type-subitem { background:#f9fafb; border:1.5px solid #d1d5db; color:#374151; }
    .chip.type-subitem .chip-icon { color:#6b7280; }
    .chip.sortable-chosen { box-shadow:0 4px 14px rgba(1,65,162,.25); transform:scale(1.05); }
    .chip.sortable-ghost { opacity:.2; }
    .chip .chip-drag { font-size:.75rem; color:#9ca3af; cursor:grab; display:none; }
    .chip .chip-icon { font-size:.78rem; }

    /* REORDER MODE */
    body.reorder-mode .chip { cursor:grab; }
    body.reorder-mode .chip:hover { box-shadow:0 2px 8px rgba(1,65,162,.18); }
    body.reorder-mode .chip .chip-drag { display:inline; }
    body.reorder-mode .group-body { background:#fafbff; }
    body.reorder-mode .group-card { box-shadow:0 2px 12px rgba(0,0,0,.1); }
    body:not(.reorder-mode) .chip { cursor:default; pointer-events:none; }
    body:not(.reorder-mode) .group-body { pointer-events:none; }

    /* SAVE BAR */
    .save-bar { display:flex; align-items:center; justify-content:flex-end; gap:10px; margin-top:18px; padding-top:14px; border-top:1px solid #e2e8f0; }
    .save-ok { font-size:.82rem; color:#16a34a; font-weight:600; display:none; align-items:center; gap:5px; }
  </style>
</head>
<body>
  <nav class="topnav">
    <div class="topnav-left">
      <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge">v2.2</span></a>
      <div class="breadcrumb-nav">
        <a href="/">Inicio</a><span style="color:rgba(255,255,255,.35)">›</span>
        <a href="/mantenedores/">Mantenedores</a><span style="color:rgba(255,255,255,.35)">›</span>
        <span style="color:#fff;font-weight:600">Vista Pantallas</span>
      </div>
    </div>
    <div class="topnav-right">
      <div class="user-chip">
        <div class="avatar" id="avatarInicial">?</div>
        <div>
          <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
          <div class="perfil-badge" id="navPerfil">—</div>
        </div>
      </div>
      <button class="btn-nav btn-reordenar" id="btnReordenar" onclick="toggleReordenar()"><i class="bi bi-arrows-move"></i>Reordenar</button>
      <button class="btn-nav btn-guardar" id="btnGuardar" onclick="guardar()"><i class="bi bi-floppy"></i>Guardar orden</button>
      <button class="btn-nav" id="btnActualizar" onclick="actualizarModulos()" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.25)"><i class="bi bi-arrow-repeat"></i> Actualizar Módulos</button>
      <button class="btn-nav btn-reset-top" onclick="resetDefaults()" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.25)"><i class="bi bi-arrow-counterclockwise"></i></button>
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
    </div>
  </nav>

  <div class="main-content">
    <div class="page-banner">
      <i class="bi bi-layout-wtf main-icon"></i>
      <div>
        <h2>Vista Pantallas — Organización de Módulos</h2>
        <p>Presiona <strong>Reordenar</strong> para arrastrar chips entre grupos o cambiar el orden dentro de cada sección. <span style="background:rgba(255,255,255,.2);border-radius:4px;padding:1px 5px;font-size:.75rem">🔵 módulo principal</span> &nbsp;<span style="background:rgba(255,255,255,.2);border-radius:4px;padding:1px 5px;font-size:.75rem">⚪ sub-item</span></p>
      </div>
    </div>

    <div class="groups-grid" id="groupsGrid"></div>

    <div class="save-bar">
      <span class="save-ok" id="saveOk"><i class="bi bi-check-circle-fill me-1"></i>Guardado correctamente</span>
    </div>
  </div>

  <script src="/js/auth-guard.js"></script>
  <script>
    const token = sessionStorage.getItem('token');
    const yo    = JSON.parse(sessionStorage.getItem('usuario') || 'null');
    if (!token || !yo) window.location.href = '/login.html';
    const H = { 'Content-Type':'application/json', Authorization:'Bearer '+token };
    document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
    document.getElementById('navPerfil').textContent = yo?.perfil || '';
    document.getElementById('avatarInicial').textContent = (yo?.nombre||'?').charAt(0).toUpperCase();
    function logout() { sessionStorage.clear(); window.location.href = '/login.html'; }

    // Módulos del HOME conocidos (fallback si la BD no los devuelve o para complementar)
    const HOME_FALLBACK = [
      { ruta:'/clientes/',           nombre:'Clientes',              icono:'bi-people-fill' },
      { ruta:'/cotizaciones/',       nombre:'Cotizaciones',          icono:'bi-calculator' },
      { ruta:'/creditos/',           nombre:'Créditos',              icono:'bi-credit-card-2-front' },
      { ruta:'/tesoreria/',          nombre:'Tesorería',             icono:'bi-safe2' },
      { ruta:'/crm/',                nombre:'CRM',                   icono:'bi-headset' },
      { ruta:'/cobranza/',           nombre:'Cobranza',              icono:'bi-bell-fill' },
      { ruta:'/reporteria/',         nombre:'Reportería',            icono:'bi-bar-chart-line-fill' },
      { ruta:'/politica/',           nombre:'Política',              icono:'bi-shield-lock' },
      { ruta:'/usuarios/',           nombre:'Usuarios',              icono:'bi-people' },
      { ruta:'/mantenedores/',       nombre:'Mantenedores',          icono:'bi-gear-fill' },
      { ruta:'/cartas-aprobacion/',  nombre:'Cartas de Aprobación',  icono:'bi-envelope-paper' },
      { ruta:'/comisiones/',         nombre:'Comisión Ejecutivos',   icono:'bi-cash-coin' },
      { ruta:'/carga-masiva/',       nombre:'Carga Masiva',          icono:'bi-cloud-upload' },
      { ruta:'/simulador/',          nombre:'Simulador Rentabilidad',icono:'bi-calculator' },
      { ruta:'/antecedentes-laborales/', nombre:'Antecedentes Laborales', icono:'bi-briefcase' },
      { ruta:'/informacion-comercial/',  nombre:'Información Comercial',  icono:'bi-building' },
    ];

    let sortables = [];
    let reorderMode = false;

    function makeChip(key, titulo, icon, type) {
      const span = document.createElement('span');
      span.className = `chip type-${type}`;
      span.dataset.key = key;
      span.innerHTML = `<i class="bi bi-grip-vertical chip-drag"></i><i class="bi ${icon||'bi-grid'} chip-icon"></i>${titulo}`;
      return span;
    }

    function buildGroup(sectionId, chips) {
      const cfg = PLACEMENT_SECTIONS[sectionId];
      const card = document.createElement('div');
      card.className = 'group-card';
      card.innerHTML = `
        <div class="group-header" style="background:${cfg.color}">
          <i class="bi ${cfg.icon} sec-icon"></i>
          <h3>${cfg.label}</h3>
          <span class="group-count" id="cnt-${sectionId}">0</span>
        </div>
        <div class="group-body" id="grp-${sectionId}">
          <span class="group-empty">Sin elementos</span>
        </div>`;
      document.getElementById('groupsGrid').appendChild(card);

      const body = document.getElementById(`grp-${sectionId}`);
      chips.forEach(c => body.appendChild(c));
      refreshCount(sectionId);
    }

    function refreshCount(sectionId) {
      const body = document.getElementById(`grp-${sectionId}`);
      if (!body) return;
      const n = body.querySelectorAll('.chip').length;
      const el = document.getElementById(`cnt-${sectionId}`);
      if (el) el.textContent = n;
      const empty = body.querySelector('.group-empty');
      if (empty) empty.style.display = n === 0 ? '' : 'none';
    }

    function enableSortables() {
      sortables.forEach(s => s.destroy());
      sortables = [];
      Object.keys(PLACEMENT_SECTIONS).forEach(sid => {
        const body = document.getElementById(`grp-${sid}`);
        if (!body) return;
        sortables.push(Sortable.create(body, {
          group: 'chips',
          animation: 130,
          handle: '.chip-drag',
          filter: '.group-empty',
          ghostClass: 'sortable-ghost',
          chosenClass: 'sortable-chosen',
          onEnd: () => Object.keys(PLACEMENT_SECTIONS).forEach(refreshCount),
        }));
      });
    }

    function disableSortables() {
      sortables.forEach(s => s.destroy());
      sortables = [];
    }

    function toggleReordenar() {
      reorderMode = !reorderMode;
      const btnR = document.getElementById('btnReordenar');
      const btnG = document.getElementById('btnGuardar');
      if (reorderMode) {
        document.body.classList.add('reorder-mode');
        btnR.innerHTML = '<i class="bi bi-x-circle"></i>Cancelar';
        btnR.classList.add('activo');
        btnG.style.display = 'flex';
        enableSortables();
      } else {
        document.body.classList.remove('reorder-mode');
        btnR.innerHTML = '<i class="bi bi-arrows-move"></i>Reordenar';
        btnR.classList.remove('activo');
        btnG.style.display = 'none';
        disableSortables();
        location.reload(); // recargar para descartar cambios no guardados
      }
    }

    async function init() {
      const grid = document.getElementById('groupsGrid');
      grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#6b7280;padding:40px"><span class="spinner-border spinner-border-sm me-2"></span>Cargando módulos…</p>';

      let respMods = { success: false, data: [] };
      let placement = {};
      try {
        [respMods, placement] = await Promise.all([
          fetch('/api/auth/mis-permisos', { headers: H }).then(r => r.json()),
          loadPlacementConfig(H),
        ]);
      } catch(e) {
        grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:#dc2626;padding:40px"><i class="bi bi-exclamation-triangle me-2"></i>Error al cargar: ${e.message}</p>`;
        return;
      }

      grid.innerHTML = '';

      // Combinar módulos de BD con fallback (BD tiene prioridad para nombre/icono)
      const dbList = respMods.success ? respMods.data : [];
      const rutasDb = new Set(dbList.map(m => m.ruta));
      // Agregar fallback entries que no estén en BD (así siempre aparecen todos)
      const extras = HOME_FALLBACK.filter(f => !rutasDb.has(f.ruta));
      const dbMods = [...dbList, ...extras];

      const zones = {};
      Object.keys(PLACEMENT_SECTIONS).forEach(s => { zones[s] = []; });

      // Formato nuevo: placement_v2 = { sectionId: [key1, key2, ...] }
      // Formato viejo: { key: sectionId }
      let placementOrdered = null;
      const isNewFormat = placement && Object.keys(placement).some(k => Array.isArray(placement[k]));
      if (isNewFormat) placementOrdered = placement;

      if (placementOrdered) {
        // Construir un lookup rápido key→section desde arrays ordenados
        const keyToSection = {};
        Object.entries(placementOrdered).forEach(([sec, arr]) => {
          if (Array.isArray(arr)) arr.forEach(k => { keyToSection[k] = sec; });
        });

        // Módulos BD en su orden guardado
        const homeOrder = placementOrdered['home'] || [];
        const usedKeys = new Set();
        homeOrder.forEach(key => {
          const m = dbMods.find(m => m.ruta === key);
          if (m) { zones['home'].push(makeChip(m.ruta, m.nombre, m.icono, 'module')); usedKeys.add(key); }
        });
        // Módulos BD asignados a otras secciones
        dbMods.forEach(m => {
          if (usedKeys.has(m.ruta)) return;
          const sec = keyToSection[m.ruta] || 'home';
          if (!zones[sec]) zones[sec] = [];
          zones[sec].push(makeChip(m.ruta, m.nombre, m.icono, 'module'));
        });

        // Sub-items del manifiesto en su orden guardado
        Object.entries(placementOrdered).forEach(([sec, arr]) => {
          if (!Array.isArray(arr)) return;
          arr.forEach(key => {
            if (PLACEMENT_ITEMS[key]) {
              const item = PLACEMENT_ITEMS[key];
              if (!zones[sec]) zones[sec] = [];
              // Evitar duplicado si ya está
              if (!zones[sec].find(c => c && c.dataset && c.dataset.key === key))
                zones[sec].push(makeChip(key, item.titulo, item.icon, 'subitem'));
            }
          });
        });
        // Sub-items no presentes en ningún array → default
        Object.entries(PLACEMENT_ITEMS).forEach(([key, item]) => {
          const sec = keyToSection[key] || item.section;
          if (!zones[sec]) zones[sec] = [];
          if (!zones[sec].find(c => c && c.dataset && c.dataset.key === key))
            zones[sec].push(makeChip(key, item.titulo, item.icon, 'subitem'));
        });

      } else {
        // Sin config (o formato viejo flat) — usar defaults
        const flatPlacement = (!isNewFormat && placement) ? placement : {};

        dbMods.forEach(m => {
          const sec = flatPlacement[m.ruta] || 'home';
          if (!zones[sec]) zones[sec] = [];
          zones[sec].push(makeChip(m.ruta, m.nombre, m.icono, 'module'));
        });
        Object.entries(PLACEMENT_ITEMS).forEach(([key, item]) => {
          const sec = flatPlacement[key] || item.section;
          if (!zones[sec]) zones[sec] = [];
          zones[sec].push(makeChip(key, item.titulo, item.icon, 'subitem'));
        });
      }

      Object.keys(PLACEMENT_SECTIONS).forEach(sid => buildGroup(sid, zones[sid] || []));
    }

    async function guardar() {
      const btn = document.getElementById('btnGuardar');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Guardando…';

      // Nuevo formato: { sectionId: [key1, key2, ...] } (ordenado)
      const placement = {};
      Object.keys(PLACEMENT_SECTIONS).forEach(sid => {
        const body = document.getElementById(`grp-${sid}`);
        placement[sid] = [...body.querySelectorAll('.chip')].map(c => c.dataset.key);
      });

      try {
        const r = await fetch('/api/config/ui/placement_v2', {
          method:'PUT', headers:H, body:JSON.stringify({ valor: placement })
        });
        const d = await r.json();
        if (!d.success) throw new Error(d.error);
        const ok = document.getElementById('saveOk');
        ok.style.display = 'flex';
        setTimeout(() => { ok.style.display = 'none'; }, 2500);
        // Salir de modo reordenar sin recargar
        reorderMode = false;
        document.body.classList.remove('reorder-mode');
        document.getElementById('btnReordenar').innerHTML = '<i class="bi bi-arrows-move"></i>Reordenar';
        document.getElementById('btnReordenar').classList.remove('activo');
        document.getElementById('btnGuardar').style.display = 'none';
        disableSortables();
      } catch(e) { alert('Error: ' + e.message); }

      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-floppy"></i>Guardar orden';
    }

    async function actualizarModulos() {
      const btn = document.getElementById('btnActualizar');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Actualizando…';

      let respMods = { success: false, data: [] };
      try {
        respMods = await fetch('/api/auth/mis-permisos', { headers: H }).then(r => r.json());
      } catch {}

      const dbList = respMods.success ? respMods.data : [];

      // Recopilar todas las rutas/keys ya presentes en algún grupo
      const yaPresentes = new Set();
      Object.keys(PLACEMENT_SECTIONS).forEach(sid => {
        document.getElementById(`grp-${sid}`)?.querySelectorAll('.chip').forEach(c => yaPresentes.add(c.dataset.key));
      });

      // Módulos nuevos: los que vienen de BD y no están en ningún grupo
      const nuevos = dbList.filter(m => !yaPresentes.has(m.ruta));

      if (nuevos.length === 0) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Actualizar Módulos';
        const ok = document.getElementById('saveOk');
        ok.textContent = '✓ Sin módulos nuevos';
        ok.style.display = 'flex';
        setTimeout(() => { ok.style.display = 'none'; ok.textContent = '✓ Guardado correctamente'; }, 2500);
        return;
      }

      // Agregar los nuevos al grupo HOME
      const homeBody = document.getElementById('grp-home');
      nuevos.forEach(m => homeBody.appendChild(makeChip(m.ruta, m.nombre, m.icono, 'module')));
      refreshCount('home');

      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Actualizar Módulos';
      const ok = document.getElementById('saveOk');
      ok.textContent = `✓ ${nuevos.length} módulo(s) nuevo(s) agregado(s) al HOME`;
      ok.style.display = 'flex';
      setTimeout(() => { ok.style.display = 'none'; ok.textContent = '✓ Guardado correctamente'; }, 3500);
    }

    async function resetDefaults() {
      if (!confirm('¿Restaurar todo a la posición y orden original?')) return;
      await fetch('/api/config/ui/placement_v2', {
        method:'PUT', headers:H, body:JSON.stringify({ valor: {} })
      });
      location.reload();
    }

    init();
  </script>
</body>
</html>
