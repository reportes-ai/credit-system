<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emisión de Orden de Pago — AutoFácil</title>
  <!-- v1.0 -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#001345; --blue:#0141A2; }
    body { background:#f0f4f8; font-family:'Segoe UI',system-ui,sans-serif; margin:0; }
    .topnav { background:linear-gradient(90deg,#012d70,#0255c5); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--blue); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .wrap { max-width:880px; margin:0 auto; padding:24px; }
    .card-af { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); padding:22px 24px; margin-bottom:18px; }
    h5.sec { font-weight:800; color:var(--navy); font-size:1rem; margin:0 0 16px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .fld { margin-bottom:2px; }
    .fld.full { grid-column:1 / -1; }
    .fld label { display:block; font-size:.7rem; font-weight:800; text-transform:uppercase; color:#64748b; letter-spacing:.3px; margin:0 0 4px; }
    .fld input, .fld select, .fld textarea { width:100%; border:1.5px solid #e2e8f0; border-radius:8px; padding:9px 11px; font-size:.86rem; box-sizing:border-box; font-family:inherit; }
    .fld input:focus, .fld select:focus, .fld textarea:focus { border-color:#0141A2; outline:none; }
    .fld textarea { min-height:64px; resize:vertical; }
    .monto-box input { font-size:1.15rem; font-weight:800; color:#0141A2; }
    .btn-af { background:linear-gradient(135deg,#0141A2,#0255c5); color:#fff; border:none; border-radius:9px; padding:11px 26px; font-size:.92rem; font-weight:700; cursor:pointer; }
    .btn-ghost { background:#fff; border:1.5px solid #e2e8f0; border-radius:8px; padding:10px 16px; font-size:.85rem; cursor:pointer; color:#334155; text-decoration:none; }
    .ok-box { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:12px; padding:22px; text-align:center; display:none; }
    .ok-box .num { font-size:1.5rem; font-weight:800; color:#15803d; letter-spacing:.5px; }
  </style>
</head>
<body>
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a><span>›</span><a href="/ordenes-pago/">Órdenes de Pago</a><span>›</span><span style="color:#fff;font-weight:600">Emisión</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="user-chip"><div class="avatar" id="avatarInicial">?</div><div><div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div><div class="perfil-badge" id="navPerfil">—</div></div></div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="wrap">
  <div class="ok-box card-af" id="okBox">
    <i class="bi bi-check-circle-fill" style="font-size:2.4rem;color:#16a34a"></i>
    <p style="margin:10px 0 4px;color:#15803d;font-weight:600">Orden de pago emitida</p>
    <div class="num" id="okNum">—</div>
    <div style="margin-top:18px;display:flex;gap:10px;justify-content:center">
      <button class="btn-af" onclick="nueva()"><i class="bi bi-plus-lg me-1"></i>Emitir otra</button>
      <a class="btn-ghost" href="/ordenes-pago/historial/"><i class="bi bi-clock-history me-1"></i>Ver historial</a>
    </div>
  </div>

  <form id="formCard" class="card-af">
    <h5 class="sec"><i class="bi bi-pencil-square me-2"></i>Nueva Orden de Pago</h5>
    <div class="grid2">
      <div class="fld full"><label>Proveedor *</label>
        <select id="fProv" onchange="onProvChange()"><option value="">Cargando…</option></select>
      </div>
      <div class="fld" id="boxProvNombre" style="display:none"><label>Nombre del proveedor (no registrado) *</label><input id="fProvNombre" maxlength="200"></div>
      <div class="fld" id="boxProvRut" style="display:none"><label>RUT (opcional)</label><input id="fProvRut" maxlength="20" placeholder="76.123.456-7" oninput="onRut()"></div>

      <div class="fld full"><label>Concepto *</label><input id="fConcepto" maxlength="300" placeholder="Ej: Arriendo oficina junio 2026"></div>

      <div class="fld"><label>Categoría</label>
        <input id="fCategoria" list="catList" maxlength="80" placeholder="Ej: Arriendo, Servicios, Insumos…">
        <datalist id="catList"><option>Arriendo</option><option>Servicios Básicos</option><option>Honorarios</option><option>Insumos</option><option>Marketing</option><option>Tecnología</option><option>Mantención</option><option>Otros</option></datalist>
      </div>
      <div class="fld monto-box"><label>Monto (CLP) *</label><input id="fMonto" inputmode="numeric" placeholder="0" oninput="fmtMonto()"></div>

      <div class="fld"><label>Tipo de documento</label>
        <select id="fTipoDoc"><option value="">—</option><option>Factura</option><option>Boleta</option><option>Boleta de Honorarios</option><option>Nota de Cobro</option><option>Sin documento</option></select>
      </div>
      <div class="fld"><label>N° de documento</label><input id="fNumDoc" maxlength="40"></div>

      <div class="fld"><label>Fecha del documento</label><input id="fFechaDoc" type="date"></div>
      <div class="fld"><label>Fecha de emisión *</label><input id="fFechaEmision" type="date"></div>

      <div class="fld"><label>Método de pago</label>
        <select id="fMetodo"><option value="">—</option><option>Transferencia</option><option>Cheque</option><option>Efectivo</option><option>Tarjeta</option></select>
      </div>
      <div class="fld"><!-- spacer --></div>

      <div class="fld full"><label>Observaciones</label><textarea id="fObs" maxlength="500"></textarea></div>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin-top:18px">
      <span id="errMsg" style="font-size:.84rem;color:#b91c1c;display:none"></span>
      <div style="flex:1"></div>
      <a class="btn-ghost" href="/ordenes-pago/">Cancelar</a>
      <button type="button" class="btn-af" id="btnEmitir" onclick="emitir()"><i class="bi bi-send-check me-1"></i>Emitir orden</button>
    </div>
  </form>
</div>

<script>
const token = sessionStorage.getItem('token');
const yo = JSON.parse(sessionStorage.getItem('usuario')||'null');
if (!token || !yo) location.href='/login.html';
document.getElementById('navNombre').textContent = yo.nombre+' '+(yo.apellido||'');
document.getElementById('navPerfil').textContent = yo.perfil||'';
document.getElementById('avatarInicial').textContent = (yo.nombre||'?')[0].toUpperCase();
function logout(){ sessionStorage.clear(); location.href='/login.html'; }
const H = { 'Content-Type':'application/json', Authorization:'Bearer '+token };
const escH = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function formatRUT(v){ let x=String(v||'').replace(/[^0-9kK]/g,'').toUpperCase(); if(!x) return ''; const dv=x.slice(-1); let n=x.slice(0,-1); n=n.replace(/\B(?=(\d{3})+(?!\d))/g,'.'); return n?`${n}-${dv}`:dv; }
function onRut(){ const el=document.getElementById('fProvRut'); el.value=formatRUT(el.value); }
function fmtMonto(){ const el=document.getElementById('fMonto'); const n=el.value.replace(/\D/g,''); el.value=n? Number(n).toLocaleString('es-CL'):''; }
function montoNum(){ return Number(document.getElementById('fMonto').value.replace(/\D/g,''))||0; }

async function cargarProv(){
  try {
    const r = await fetch('/api/ordenes-pago/proveedores', { headers:H });
    const j = await r.json();
    const opts = (j.data||[]).map(p=>`<option value="${p.id}">${escH(p.nombre)}${p.rut?' — '+escH(formatRUT(p.rut)):''}</option>`).join('');
    document.getElementById('fProv').innerHTML =
      '<option value="">— Seleccionar proveedor —</option>' + opts + '<option value="__otro">+ Proveedor no registrado…</option>';
  } catch(e) {
    document.getElementById('fProv').innerHTML = '<option value="">Error al cargar</option><option value="__otro">+ Proveedor no registrado…</option>';
  }
}
function onProvChange(){
  const v = document.getElementById('fProv').value;
  const otro = v==='__otro';
  document.getElementById('boxProvNombre').style.display = otro?'':'none';
  document.getElementById('boxProvRut').style.display = otro?'':'none';
}

async function emitir(){
  const err = document.getElementById('errMsg'); err.style.display='none';
  const provSel = document.getElementById('fProv').value;
  const concepto = document.getElementById('fConcepto').value.trim();
  const monto = montoNum();
  if (!provSel) { return fail('Selecciona un proveedor.'); }
  let body = { concepto, monto,
    categoria: document.getElementById('fCategoria').value.trim(),
    tipo_documento: document.getElementById('fTipoDoc').value,
    numero_documento: document.getElementById('fNumDoc').value.trim(),
    fecha_documento: document.getElementById('fFechaDoc').value || null,
    fecha_emision: document.getElementById('fFechaEmision').value || null,
    metodo_pago: document.getElementById('fMetodo').value,
    observaciones: document.getElementById('fObs').value.trim() };
  if (provSel==='__otro') {
    const pn = document.getElementById('fProvNombre').value.trim();
    if (!pn) return fail('Indica el nombre del proveedor.');
    body.proveedor_nombre = pn;
    body.proveedor_rut = document.getElementById('fProvRut').value.trim();
  } else { body.id_proveedor = parseInt(provSel); }
  if (!concepto) return fail('El concepto es obligatorio.');
  if (monto<=0) return fail('El monto debe ser mayor a 0.');

  const btn = document.getElementById('btnEmitir'); btn.disabled=true; btn.innerHTML='<i class="bi bi-hourglass-split me-1"></i>Emitiendo…';
  try {
    const r = await fetch('/api/ordenes-pago/ordenes', { method:'POST', headers:H, body: JSON.stringify(body) });
    const j = await r.json();
    if (j.success) {
      document.getElementById('formCard').style.display='none';
      document.getElementById('okNum').textContent = j.data.numero;
      document.getElementById('okBox').style.display='block';
      window.scrollTo({top:0,behavior:'smooth'});
    } else fail(j.error||'Error al emitir.');
  } catch(e) { fail('Error de red.'); }
  btn.disabled=false; btn.innerHTML='<i class="bi bi-send-check me-1"></i>Emitir orden';
}
function fail(m){ const e=document.getElementById('errMsg'); e.textContent=m; e.style.display='inline'; const b=document.getElementById('btnEmitir'); b.disabled=false; b.innerHTML='<i class="bi bi-send-check me-1"></i>Emitir orden'; }
function nueva(){ location.reload(); }

document.getElementById('fFechaEmision').value = new Date().toISOString().slice(0,10);
cargarProv();
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
