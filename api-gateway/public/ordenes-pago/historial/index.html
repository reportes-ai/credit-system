<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de Órdenes de Pago — AutoFácil</title>
  <!-- v1.0 -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#001345; --blue:#0141A2; }
    body { background:#f0f4f8; font-family:'Segoe UI',system-ui,sans-serif; margin:0; }
    .topnav { background:linear-gradient(90deg,#012d70,#0255c5); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--blue); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .main-content { padding:24px; }
    .card-af { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); padding:16px 18px; margin-bottom:16px; }
    .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .toolbar input, .toolbar select { border:1.5px solid #e2e8f0; border-radius:8px; padding:8px 11px; font-size:.84rem; }
    .toolbar input[type=text]{ min-width:240px; }
    .chips { display:flex; gap:10px; flex-wrap:wrap; }
    .chip { background:#f1f5f9; border-radius:10px; padding:8px 14px; font-size:.8rem; color:#334155; }
    .chip b { color:#0141A2; font-size:.95rem; }
    .chip.pag b { color:#15803d; }
    table { width:100%; border-collapse:collapse; font-size:.83rem; }
    th { background:#f8fafc; color:#475569; font-size:.7rem; text-transform:uppercase; padding:9px 10px; text-align:left; border-bottom:2px solid #e2e8f0; white-space:nowrap; }
    td { padding:8px 10px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    td.r, th.r { text-align:right; }
    .est { font-size:.7rem; font-weight:700; border-radius:10px; padding:2px 9px; white-space:nowrap; }
    .est.EMITIDA { background:#fef9c3; color:#854d0e; }
    .est.PAGADA  { background:#dcfce7; color:#15803d; }
    .est.ANULADA { background:#fee2e2; color:#b91c1c; }
    .icon-btn { background:none; border:none; cursor:pointer; font-size:.95rem; padding:3px 6px; border-radius:6px; color:#475569; }
    .icon-btn:hover { background:#eff6ff; }
    .btn-ghost { background:#fff; border:1.5px solid #e2e8f0; border-radius:8px; padding:7px 12px; font-size:.82rem; cursor:pointer; color:#334155; }
    dialog { border:none; border-radius:16px; padding:0; box-shadow:0 20px 60px rgba(0,0,0,.3); max-width:520px; width:94%; }
    dialog::backdrop { background:rgba(15,23,42,.55); }
    .dlg-head { background:linear-gradient(135deg,#012d70,#0255c5); color:#fff; padding:15px 20px; font-weight:700; display:flex; justify-content:space-between; }
    .dlg-body { padding:18px 20px; font-size:.86rem; color:#334155; line-height:1.7; }
    .dlg-foot { padding:13px 20px; border-top:1px solid #eef2f7; display:flex; justify-content:flex-end; gap:10px; }
    .btn-af { background:linear-gradient(135deg,#0141A2,#0255c5); color:#fff; border:none; border-radius:9px; padding:8px 18px; font-size:.85rem; font-weight:700; cursor:pointer; }
    .kv { display:grid; grid-template-columns:130px 1fr; gap:4px 12px; }
    .kv .k { color:#94a3b8; font-size:.78rem; text-transform:uppercase; font-weight:700; }
  </style>
</head>
<body>
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a><span>›</span><a href="/ordenes-pago/">Órdenes de Pago</a><span>›</span><span style="color:#fff;font-weight:600">Historial</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="user-chip"><div class="avatar" id="avatarInicial">?</div><div><div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div><div class="perfil-badge" id="navPerfil">—</div></div></div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="main-content">
  <div class="card-af">
    <div class="toolbar">
      <input type="text" id="q" placeholder="N° orden, proveedor, concepto, documento…" oninput="debounced()">
      <select id="fEstado" onchange="cargar()">
        <option value="">Todos los estados</option>
        <option value="EMITIDA">Emitidas</option>
        <option value="PAGADA">Pagadas</option>
        <option value="ANULADA">Anuladas</option>
      </select>
      <label style="font-size:.8rem;color:#475569">Desde <input type="date" id="fDesde" onchange="cargar()"></label>
      <label style="font-size:.8rem;color:#475569">Hasta <input type="date" id="fHasta" onchange="cargar()"></label>
      <button class="btn-ghost" onclick="limpiar()"><i class="bi bi-x-circle me-1"></i>Limpiar</button>
      <div style="flex:1"></div>
      <a class="btn-af" href="/ordenes-pago/emision/" style="text-decoration:none"><i class="bi bi-plus-lg me-1"></i>Nueva orden</a>
    </div>
  </div>

  <div class="card-af" style="padding:14px 18px">
    <div class="chips" id="chips"><span class="chip">Cargando…</span></div>
  </div>

  <div class="card-af">
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>N° Orden</th><th>Fecha</th><th>Proveedor</th><th>Concepto</th><th>Documento</th>
          <th class="r">Monto</th><th>Estado</th><th>Pago</th><th></th>
        </tr></thead>
        <tbody id="tbody"><tr><td colspan="9" style="text-align:center;color:#94a3b8;padding:24px">Cargando…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<dialog id="dlg">
  <div class="dlg-head"><span id="dTitulo">Orden</span><i class="bi bi-x-lg" style="cursor:pointer" onclick="document.getElementById('dlg').close()"></i></div>
  <div class="dlg-body" id="dBody"></div>
  <div class="dlg-foot" id="dFoot"></div>
</dialog>

<script>
const token = sessionStorage.getItem('token');
const yo = JSON.parse(sessionStorage.getItem('usuario')||'null');
if (!token || !yo) location.href='/login.html';
document.getElementById('navNombre').textContent = yo.nombre+' '+(yo.apellido||'');
document.getElementById('navPerfil').textContent = yo.perfil||'';
document.getElementById('avatarInicial').textContent = (yo.nombre||'?')[0].toUpperCase();
function logout(){ sessionStorage.clear(); location.href='/login.html'; }
const H = { 'Content-Type':'application/json', Authorization:'Bearer '+token };
const escH = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtMon = n => '$'+Number(n||0).toLocaleString('es-CL');
const fdate = d => d? String(d).slice(0,10).split('-').reverse().join('-') : '—';
let DATA = [], PUEDE = (yo.perfil==='Administrador');

let tmr=null; function debounced(){ clearTimeout(tmr); tmr=setTimeout(cargar, 280); }
function limpiar(){ document.getElementById('q').value=''; document.getElementById('fEstado').value=''; document.getElementById('fDesde').value=''; document.getElementById('fHasta').value=''; cargar(); }

async function permisos(){
  if (yo.perfil==='Administrador') { PUEDE=true; return; }
  try { const r=await fetch('/api/auth/mis-permisos?_='+Date.now(),{headers:H}); const j=await r.json(); PUEDE=(j.funcionalidades||[]).includes('ordenes_pago_emitir'); } catch(e){}
}

async function cargar(){
  const p = new URLSearchParams();
  const q = document.getElementById('q').value.trim(); if (q) p.set('q', q);
  const est = document.getElementById('fEstado').value; if (est) p.set('estado', est);
  const d = document.getElementById('fDesde').value; if (d) p.set('desde', d);
  const h = document.getElementById('fHasta').value; if (h) p.set('hasta', h);
  const tb = document.getElementById('tbody');
  tb.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#94a3b8;padding:24px">Cargando…</td></tr>';
  try {
    const r = await fetch('/api/ordenes-pago/ordenes?'+p.toString(), { headers:H });
    const j = await r.json();
    DATA = j.data || [];
    pintaChips(j.resumen||{}, DATA.length);
    if (!DATA.length) { tb.innerHTML='<tr><td colspan="9" style="text-align:center;color:#94a3b8;padding:24px">Sin órdenes para el filtro.</td></tr>'; return; }
    tb.innerHTML = DATA.map(o => {
      const doc = [o.tipo_documento, o.numero_documento].filter(Boolean).join(' ') || '—';
      const acc = (PUEDE && o.estado==='EMITIDA')
        ? `<button class="icon-btn" title="Marcar pagada" onclick="marcar(${o.id},'PAGADA')"><i class="bi bi-cash-coin" style="color:#16a34a"></i></button>
           <button class="icon-btn" title="Anular" onclick="marcar(${o.id},'ANULADA')"><i class="bi bi-x-octagon" style="color:#dc2626"></i></button>` : '';
      return `<tr>
        <td><b>${escH(o.numero||'—')}</b></td>
        <td>${fdate(o.fecha_emision)}</td>
        <td>${escH(o.proveedor_nombre||'—')}</td>
        <td>${escH(o.concepto||'—')}</td>
        <td style="font-size:.78rem">${escH(doc)}</td>
        <td class="r"><b>${fmtMon(o.monto)}</b></td>
        <td><span class="est ${o.estado}">${o.estado}</span></td>
        <td>${o.estado==='PAGADA'? fdate(o.fecha_pago):'—'}</td>
        <td style="white-space:nowrap;text-align:right">
          <button class="icon-btn" title="Detalle" onclick="ver(${o.id})"><i class="bi bi-eye"></i></button>${acc}
        </td>
      </tr>`;
    }).join('');
  } catch(e) {
    tb.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#b91c1c;padding:24px">Error al cargar.</td></tr>';
  }
}

function pintaChips(rs, total){
  document.getElementById('chips').innerHTML =
    `<span class="chip">Órdenes (filtro): <b>${total}</b></span>
     <span class="chip">Emitidas: <b>${rs.emitidas||0}</b> · ${fmtMon(rs.monto_emitido)}</span>
     <span class="chip pag">Pagadas: <b>${rs.pagadas||0}</b> · ${fmtMon(rs.monto_pagado)}</span>`;
}

function ver(id){
  const o = DATA.find(x=>x.id===id); if(!o) return;
  document.getElementById('dTitulo').textContent = o.numero||'Orden';
  const doc = [o.tipo_documento, o.numero_documento].filter(Boolean).join(' ') || '—';
  document.getElementById('dBody').innerHTML = `<div class="kv">
    <span class="k">Proveedor</span><span>${escH(o.proveedor_nombre||'—')}${o.proveedor_rut?' · '+escH(o.proveedor_rut):''}</span>
    <span class="k">Concepto</span><span>${escH(o.concepto||'—')}</span>
    <span class="k">Categoría</span><span>${escH(o.categoria||'—')}</span>
    <span class="k">Documento</span><span>${escH(doc)}${o.fecha_documento?' · '+fdate(o.fecha_documento):''}</span>
    <span class="k">Monto</span><span><b>${fmtMon(o.monto)}</b></span>
    <span class="k">Emisión</span><span>${fdate(o.fecha_emision)}</span>
    <span class="k">Método pago</span><span>${escH(o.metodo_pago||'—')}</span>
    <span class="k">Estado</span><span><span class="est ${o.estado}">${o.estado}</span>${o.estado==='PAGADA'?' · '+fdate(o.fecha_pago):''}</span>
    <span class="k">Observaciones</span><span>${escH(o.observaciones||'—')}</span>
    <span class="k">Emitida por</span><span>${escH(o.usuario_nombre||'—')}</span>
  </div>`;
  const foot = document.getElementById('dFoot');
  foot.innerHTML = (PUEDE && o.estado==='EMITIDA')
    ? `<button class="btn-ghost" onclick="marcar(${o.id},'ANULADA')">Anular</button><button class="btn-af" onclick="marcar(${o.id},'PAGADA')"><i class="bi bi-cash-coin me-1"></i>Marcar pagada</button>`
    : `<button class="btn-ghost" onclick="document.getElementById('dlg').close()">Cerrar</button>`;
  document.getElementById('dlg').showModal();
}

async function marcar(id, estado){
  const o = DATA.find(x=>x.id===id);
  const label = estado==='PAGADA'?'marcar como PAGADA':'ANULAR';
  if (!confirm(`¿${label} la orden ${o?.numero||id}?`)) return;
  try {
    const r = await fetch(`/api/ordenes-pago/ordenes/${id}/estado`, { method:'PUT', headers:H, body: JSON.stringify({ estado }) });
    const j = await r.json();
    if (j.success) { try{document.getElementById('dlg').close();}catch(e){} cargar(); }
    else alert(j.error||'Error');
  } catch(e) { alert('Error de red'); }
}

(async()=>{ await permisos(); cargar(); })();
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
