<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de Órdenes de Pago — AutoFácil</title>
  <!-- v1.10 -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#001345; --blue:#0141A2; }
    body { background:#f0f4f8; font-family:'Segoe UI',system-ui,sans-serif; margin:0; }
    .topnav { background:linear-gradient(90deg,#012d70,#0255c5); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--blue); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .main-content { padding:24px; }
    .card-af { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); padding:16px 18px; margin-bottom:16px; }
    .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .toolbar input, .toolbar select { border:1.5px solid #e2e8f0; border-radius:8px; padding:8px 11px; font-size:.84rem; }
    .toolbar input[type=text]{ min-width:240px; }
    .chips { display:flex; gap:10px; flex-wrap:wrap; }
    .chip { background:#f1f5f9; border-radius:10px; padding:8px 14px; font-size:.8rem; color:#334155; }
    .chip b { color:#0141A2; font-size:.95rem; }
    .chip.pag b { color:#15803d; }
    table { width:100%; border-collapse:collapse; font-size:.83rem; }
    th { background:#f8fafc; color:#475569; font-size:.7rem; text-transform:uppercase; padding:9px 10px; text-align:left; border-bottom:2px solid #e2e8f0; white-space:nowrap; }
    td { padding:8px 10px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    td.r, th.r { text-align:right; }
    .est { font-size:.7rem; font-weight:700; border-radius:10px; padding:2px 9px; white-space:nowrap; }
    .est.EMITIDA { background:#fef9c3; color:#854d0e; }
    .est.PAGADA  { background:#dcfce7; color:#15803d; }
    .est.ANULADA { background:#fee2e2; color:#b91c1c; }
    .ofilt { border:1.5px solid #e2e8f0; background:#fff; color:#475569; border-radius:8px; padding:5px 12px; font-size:.78rem; font-weight:700; cursor:pointer; }
    .ofilt.on { background:#0141A2; border-color:#0141A2; color:#fff; }
    .tipo-badge { font-size:.66rem; font-weight:700; border-radius:8px; padding:2px 8px; white-space:nowrap; }
    .tipo-COMISION { background:#ede9fe; color:#6d28d9; }
    .tipo-SALDO { background:#cffafe; color:#0e7490; }
    .tipo-GENERAL { background:#f1f5f9; color:#475569; }
    .icon-btn { background:none; border:none; cursor:pointer; font-size:.95rem; padding:3px 6px; border-radius:6px; color:#475569; }
    .icon-btn:hover { background:#eff6ff; }
    .btn-ghost { background:#fff; border:1.5px solid #e2e8f0; border-radius:8px; padding:7px 12px; font-size:.82rem; cursor:pointer; color:#334155; }
    dialog { border:none; border-radius:16px; padding:0; box-shadow:0 20px 60px rgba(0,0,0,.3); max-width:880px; width:96%; }
    .dlg-foot { flex-wrap:wrap; }
    #dlgPago { max-width:440px; }
    #dlgPago label { display:block; font-size:.72rem; font-weight:800; text-transform:uppercase; color:#64748b; margin-bottom:10px; }
    #dlgPago select, #dlgPago input { width:100%; border:1.5px solid #e2e8f0; border-radius:8px; padding:8px 11px; font-size:.86rem; box-sizing:border-box; margin-top:4px; font-weight:400; }
    .toast { position:fixed; top:70px; right:20px; background:#16a34a; color:#fff; padding:12px 18px; border-radius:9px; font-weight:600; font-size:.86rem; z-index:3000; display:none; max-width:360px; }
    dialog::backdrop { background:rgba(15,23,42,.55); }
    .dlg-head { background:linear-gradient(135deg,#012d70,#0255c5); color:#fff; padding:15px 20px; font-weight:700; display:flex; justify-content:space-between; }
    .dlg-body { padding:18px 20px; font-size:.86rem; color:#334155; line-height:1.7; }
    .dlg-foot { padding:13px 20px; border-top:1px solid #eef2f7; display:flex; justify-content:flex-end; gap:10px; }
    .btn-af { background:linear-gradient(135deg,#0141A2,#0255c5); color:#fff; border:none; border-radius:9px; padding:8px 18px; font-size:.85rem; font-weight:700; cursor:pointer; }
    .kv { display:grid; grid-template-columns:130px 1fr; gap:4px 12px; }
    .kv .k { color:#94a3b8; font-size:.78rem; text-transform:uppercase; font-weight:700; }
  </style>
</head>
<body>
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a><span>›</span><a href="/ordenes-pago/">Órdenes de Pago</a><span>›</span><span style="color:#fff;font-weight:600">Historial</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="user-chip"><div class="avatar" id="avatarInicial">?</div><div><div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div><div class="perfil-badge" id="navPerfil">—</div></div></div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="main-content">
  <div class="card-af">
    <div class="toolbar">
      <input type="text" id="q" placeholder="N° orden, proveedor, concepto, documento…" oninput="debounced()">
      <select id="fEstado" onchange="cargar()">
        <option value="">Todos los estados</option>
        <option value="EMITIDA">Emitidas</option>
        <option value="PAGADA">Pagadas</option>
        <option value="ANULADA">Anuladas</option>
      </select>
      <label style="font-size:.8rem;color:#475569">Desde <input type="date" id="fDesde" onchange="cargar()"></label>
      <label style="font-size:.8rem;color:#475569">Hasta <input type="date" id="fHasta" onchange="cargar()"></label>
      <button class="btn-ghost" onclick="limpiar()"><i class="bi bi-x-circle me-1"></i>Limpiar</button>
      <div style="flex:1"></div>
      <a class="btn-af" href="/ordenes-pago/emision/" style="text-decoration:none"><i class="bi bi-plus-lg me-1"></i>Nueva orden</a>
    </div>
    <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center">
      <span style="font-size:.72rem;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-right:4px">Tipo:</span>
      <button class="ofilt on" data-o="" onclick="setOrigen(this)">Todas</button>
      <button class="ofilt" data-o="COMISION" onclick="setOrigen(this)">Comisiones</button>
      <button class="ofilt" data-o="SALDO" onclick="setOrigen(this)">Saldos Precio</button>
      <button class="ofilt" data-o="GENERAL" onclick="setOrigen(this)">Otros</button>
    </div>
  </div>

  <div class="card-af" style="padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <div class="chips" id="chips"><span class="chip">Cargando…</span></div>
    <div id="cajaStatus"></div>
  </div>

  <div class="card-af">
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>N° Orden</th><th>Tipo</th><th>Fecha</th><th>Proveedor / Dealer</th><th>Concepto</th><th>Documento</th>
          <th class="r">Monto</th><th>Estado</th><th>Pago</th><th></th>
        </tr></thead>
        <tbody id="tbody"><tr><td colspan="10" style="text-align:center;color:#94a3b8;padding:24px">Cargando…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<dialog id="dlg">
  <div class="dlg-head"><span id="dTitulo">Orden</span><i class="bi bi-x-lg" style="cursor:pointer" onclick="document.getElementById('dlg').close()"></i></div>
  <div class="dlg-body" id="dBody"></div>
  <div class="dlg-foot" id="dFoot"></div>
</dialog>
<dialog id="dlgPago">
  <div class="dlg-head"><span id="pgTit">Registrar pago</span><i class="bi bi-x-lg" style="cursor:pointer" onclick="cerrarPago()"></i></div>
  <div class="dlg-body">
    <p id="pgInfo" style="margin:0 0 14px;font-size:.9rem"></p>
    <label>Método de pago
      <select id="pgMetodo"><option>Transferencia</option><option>Cheque</option><option>Efectivo</option><option>Tarjeta</option></select>
    </label>
    <label>Fecha de pago<input id="pgFecha" type="date"></label>
    <div id="pgCaja" style="font-size:.8rem;color:#15803d;font-weight:700"></div>
  </div>
  <div class="dlg-foot">
    <span id="pgMsg" style="font-size:.82rem;color:#b91c1c;margin-right:auto;display:none"></span>
    <button class="btn-ghost" onclick="cerrarPago()">Cancelar</button>
    <button class="btn-af" id="pgBtn" onclick="confirmarPago()"><i class="bi bi-cash-coin me-1"></i>Registrar pago</button>
  </div>
</dialog>
<div class="toast" id="toast"></div>

<script>
const token = sessionStorage.getItem('token');
const yo = JSON.parse(sessionStorage.getItem('usuario')||'null');
if (!token || !yo) location.href='/login.html';
document.getElementById('navNombre').textContent = yo.nombre+' '+(yo.apellido||'');
document.getElementById('navPerfil').textContent = yo.perfil||'';
document.getElementById('avatarInicial').textContent = (yo.nombre||'?')[0].toUpperCase();
function logout(){ sessionStorage.clear(); location.href='/login.html'; }
const H = { 'Content-Type':'application/json', Authorization:'Bearer '+token };
const escH = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtMon = n => '$'+Number(n||0).toLocaleString('es-CL');
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',3000); }
function chk401(r){ if(r && r.status===401){ sessionStorage.clear(); location.href='/login.html'; return true; } return false; }
const fdate = d => d? String(d).slice(0,10).split('-').reverse().join('-') : '—';
const fdatetime = d => { if(!d) return '—'; const s=String(d); const f=fdate(s); const hm=(s.slice(11,16)||''); return hm? f+' '+hm : f; };
let DATA = [], PUEDE = (yo.perfil==='Administrador'), ORIGEN='', MICAJA=null, PAGO_ID=null;
const isAdmin = (yo.perfil==='Administrador');   // solo Admin puede anular
async function cargarCaja(){ try{ const r=await fetch('/api/ordenes-pago/mi-caja',{headers:H}); if(chk401(r))return; const j=await r.json(); MICAJA=j.data||null; }catch(e){} renderCajaStatus(); }
function renderCajaStatus(){
  const el=document.getElementById('cajaStatus'); if(!el) return;
  el.innerHTML = MICAJA
    ? `<span title="${escH(MICAJA.nombre||'')}" style="display:inline-flex;align-items:center;gap:7px;background:#dcfce7;color:#15803d;border:1px solid #bbf7d0;border-radius:999px;padding:6px 14px;font-size:.82rem;font-weight:800"><i class="bi bi-cash-stack"></i>CAJA #${MICAJA.id_caja} · ACTIVA</span>`
    : `<span style="display:inline-flex;align-items:center;gap:7px;background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;border-radius:999px;padding:6px 14px;font-size:.82rem;font-weight:700"><i class="bi bi-cash-stack"></i>Sin caja activa</span>`;
}

let tmr=null; function debounced(){ clearTimeout(tmr); tmr=setTimeout(cargar, 280); }
function limpiar(){ document.getElementById('q').value=''; document.getElementById('fEstado').value=''; document.getElementById('fDesde').value=''; document.getElementById('fHasta').value=''; cargar(); }
function setOrigen(btn){ ORIGEN = btn.dataset.o||''; document.querySelectorAll('.ofilt').forEach(b=>b.classList.toggle('on', b===btn)); cargar(); }

async function permisos(){
  if (yo.perfil==='Administrador') { PUEDE=true; return; }
  try { const r=await fetch('/api/auth/mis-permisos?_='+Date.now(),{headers:H}); const j=await r.json(); PUEDE=(j.funcionalidades||[]).includes('ordenes_pago_emitir'); } catch(e){}
}

async function cargar(){
  const p = new URLSearchParams();
  const q = document.getElementById('q').value.trim(); if (q) p.set('q', q);
  const est = document.getElementById('fEstado').value; if (est) p.set('estado', est);
  if (ORIGEN) p.set('origen', ORIGEN);
  const d = document.getElementById('fDesde').value; if (d) p.set('desde', d);
  const h = document.getElementById('fHasta').value; if (h) p.set('hasta', h);
  const tb = document.getElementById('tbody');
  tb.innerHTML = '<tr><td colspan="10" style="text-align:center;color:#94a3b8;padding:24px">Cargando…</td></tr>';
  try {
    const r = await fetch('/api/ordenes-pago/ordenes?'+p.toString(), { headers:H });
    if (chk401(r)) return;
    const j = await r.json();
    DATA = j.data || [];
    pintaChips(j.resumen||{}, DATA.length);
    if (!DATA.length) { tb.innerHTML='<tr><td colspan="10" style="text-align:center;color:#94a3b8;padding:24px">Sin órdenes para el filtro.</td></tr>'; return; }
    tb.innerHTML = DATA.map(o => {
      let acc = '';
      if (o.pagable && MICAJA) acc += `<button class="icon-btn" title="Pagar" onclick="pagar(${o.id})"><i class="bi bi-cash-coin" style="color:#16a34a"></i></button>`;
      if (o.editable && o.estado==='EMITIDA' && isAdmin) acc += `<button class="icon-btn" title="Anular (solo Admin)" onclick="marcar(${o.id},'ANULADA')"><i class="bi bi-x-octagon" style="color:#dc2626"></i></button>`;
      return `<tr>
        <td><b>${escH(o.numero||'—')}</b></td>
        <td><span class="tipo-badge tipo-${o.origen}">${escH(o.origen_label)}</span></td>
        <td>${fdate(o.fecha_emision)}</td>
        <td>${escH(o.proveedor_nombre||'—')}</td>
        <td>${escH(o.concepto||'—')}</td>
        <td style="font-size:.78rem">${escH(o.documento||'—')}</td>
        <td class="r"><b>${fmtMon(o.monto)}</b></td>
        <td><span class="est ${o.estado}">${o.estado}</span></td>
        <td>${o.estado==='PAGADA'? fdate(o.fecha_pago):'—'}</td>
        <td style="white-space:nowrap;text-align:right">
          <button class="icon-btn" title="Detalle" onclick="ver(${o.id})"><i class="bi bi-eye"></i></button>${acc}
        </td>
      </tr>`;
    }).join('');
  } catch(e) {
    tb.innerHTML = '<tr><td colspan="10" style="text-align:center;color:#b91c1c;padding:24px">Error al cargar.</td></tr>';
  }
}

function pintaChips(rs, total){
  document.getElementById('chips').innerHTML =
    `<span class="chip">Órdenes (filtro): <b>${total}</b></span>
     <span class="chip">Emitidas: <b>${rs.emitidas||0}</b> · ${fmtMon(rs.monto_emitido)}</span>
     <span class="chip pag">Pagadas: <b>${rs.pagadas||0}</b> · ${fmtMon(rs.monto_pagado)}</span>`;
}

/* ── Documento "Solicitud de Pago" (formato AutoFácil) ── */
const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const periodoCL = d => { if(!d) return '—'; const x=new Date(String(d).slice(0,10)); if(isNaN(x)) return '—'; return MESES[x.getUTCMonth()]+'-'+String(x.getUTCFullYear()).slice(2); };
function impInfo(o){
  const t = o.tratamiento || '';
  const esRet = (t==='RET'||t==='HONORARIOS');
  const esEx  = (t==='EXENTO');
  const neto  = Number(o.monto_neto != null ? o.monto_neto : o.monto)||0;
  const imp   = Number(o.impuesto_monto)||0;
  const bruto = Number(o.monto_bruto != null ? o.monto_bruto : (neto + imp))||0;
  const pagar = Number(o.monto)||0;
  const pct   = Number(o.impuesto_pct != null ? o.impuesto_pct : (esRet?15.25:esEx?0:19));
  const lbl   = esRet ? `Retención ${pct}%` : esEx ? 'Exento' : `IVA ${pct}%`;
  return { neto, bruto, imp, pagar, pct, lbl, esRet, esEx };
}
function docHTML(o){
  const i = impInfo(o);
  const docNum = [o.tipo_documento, o.numero_documento].filter(Boolean).join(' ');
  const periodo = periodoCL(o.fecha_documento || o.fecha_emision);
  const fechaPagar = fdate(o.fecha_pago || o.fecha_emision);
  const tipoGasto = (o.categoria || 'PAGO A PROVEEDOR').toUpperCase();
  const Sdoc='font-family:Arial,sans-serif;color:#1e293b;font-size:11px;border:2px solid #93c5fd;border-radius:8px;padding:14px 16px;display:block;width:100%;box-sizing:border-box';
  const Smeta='border-collapse:collapse;font-size:11px';
  const Slbl='color:#64748b;font-weight:700;text-transform:uppercase;font-size:9px;padding:1px 8px;white-space:nowrap';
  const Smv='padding:1px 8px;font-size:11px';
  const Stbl='width:100%;border-collapse:collapse;margin:8px 0;font-size:11px;table-layout:fixed';
  const Sth='background:#dbeafe;color:#1e3a8a;border:1px solid #93c5fd;padding:5px 6px;font-size:9px;text-transform:uppercase;text-align:left;white-space:normal;word-break:break-word';
  const Std='border:1px solid #cbd5e1;padding:5px 6px;white-space:normal;word-break:break-word';
  const Snum=Std+';text-align:right';
  const Sres='border-collapse:collapse;margin-top:14px;width:100%;max-width:860px';
  const SresL='border:1px solid #cbd5e1;padding:5px 8px;font-size:11px;background:#eff6ff;font-weight:700;width:22%;white-space:nowrap';
  const SresV='border:1px solid #cbd5e1;padding:5px 8px;font-size:11px';
  return `<div style="${Sdoc}">
    <table style="width:100%;border-collapse:collapse;margin-bottom:14px"><tbody><tr>
      <td style="vertical-align:top"><table style="${Smeta}"><tbody>
        <tr><td style="${Slbl}">Concepto</td><td style="${Smv}">SOLICITUD DE PAGO</td></tr>
        <tr><td style="${Slbl}">Compañía</td><td style="${Smv}">AUTOFÁCIL SPA</td></tr>
        <tr><td style="${Slbl}">Tipo gasto</td><td style="${Smv}">${escH(tipoGasto)}</td></tr>
        <tr><td style="${Slbl}">N° Orden</td><td style="${Smv}">${escH(o.numero||'—')}</td></tr>
        <tr><td style="${Slbl}">Solicitante</td><td style="${Smv}">${escH(o.usuario_nombre||'—')}</td></tr>
        <tr><td style="${Slbl}">Fecha</td><td style="${Smv}">${fdate(o.fecha_emision)}</td></tr>
      </tbody></table></td>
      <td style="vertical-align:top;text-align:right">
        <img width="150" height="34" style="height:34px;width:auto" src="${location.origin}/img/logo-autofacil.png" onerror="this.src='${location.origin}/img/logo.png'">
      </td>
    </tr></tbody></table>
    <table style="${Stbl}">
      <colgroup><col style="width:23%"><col style="width:12%"><col style="width:21%"><col style="width:8%"><col style="width:12%"><col style="width:12%"><col style="width:12%"></colgroup>
      <thead><tr><th style="${Sth}">Proveedor</th><th style="${Sth}">RUT</th><th style="${Sth}">Detalle</th><th style="${Sth}">Mes</th><th style="${Sth}">Monto Bruto</th><th style="${Sth}">${escH(i.lbl)}</th><th style="${Sth}">Monto Neto</th></tr></thead>
      <tbody>
        <tr><td style="${Std}">${escH(o.proveedor_nombre||'')}</td><td style="${Std}">${escH(o.proveedor_rut||'')}</td>
          <td style="${Std}">${escH(o.concepto||'')}</td><td style="${Std}">${periodo}</td>
          <td style="${Snum}">${fmtMon(i.bruto)}</td><td style="${Snum}">${i.esEx?'—':fmtMon(i.imp)}</td><td style="${Snum}">${fmtMon(i.neto)}</td></tr>
        <tr><td colspan="6" style="${Std};text-align:right;font-weight:800;background:#f1f5f9">A PAGAR</td><td style="${Snum};font-weight:800;background:#dbeafe;color:#1e3a8a">${fmtMon(i.pagar)}</td></tr>
      </tbody>
    </table>
    <table style="${Sres}"><tbody>
      <tr><td style="${SresL}">Proveedor</td><td style="${SresV}">${escH(o.proveedor_nombre||'')}</td></tr>
      <tr><td style="${SresL}">Concepto</td><td style="${SresV}">${escH(o.concepto||'')}</td></tr>
      <tr><td style="${SresL}">Período</td><td style="${SresV}">${periodo}</td></tr>
      <tr><td style="${SresL}">Documento</td><td style="${SresV}">${escH(o.tipo_documento||'—')}${docNum&&o.numero_documento?' N° '+escH(o.numero_documento):''}${o.fecha_documento?' · '+fdate(o.fecha_documento):''}</td></tr>
      <tr><td style="${SresL}">Destino</td><td style="${SresV}">${escH(o.destino||'—')}</td></tr>
      <tr><td style="${SresL}">Monto bruto</td><td style="${SresV}">${fmtMon(i.bruto)}</td></tr>
      <tr><td style="${SresL}">${escH(i.lbl)}</td><td style="${SresV}">${i.esEx?'—':fmtMon(i.imp)}</td></tr>
      <tr><td style="${SresL}">Monto neto</td><td style="${SresV}">${fmtMon(i.neto)}</td></tr>
      <tr><td style="${SresL}">A pagar</td><td style="${SresV};font-weight:700">${fmtMon(i.pagar)}</td></tr>
      <tr><td style="${SresL}">Fecha a pagar</td><td style="${SresV}">${fechaPagar}</td></tr>
    </tbody></table>
  </div>`;
}
const PARR = 'font-size:14px;color:#374151;margin:0 0 14px;line-height:1.6';
function emailHTML(o){
  const i = impInfo(o);
  const cuerpo = `<p style="${PARR}">Estimado Equipo de Contabilidad:</p>
    <p style="${PARR}">Adjunto encontrarán la Orden de Pago N° <strong>${escH(o.numero||'')}</strong> para el pago a <strong>${escH(o.proveedor_nombre||'')}</strong> por concepto de <strong>${escH(o.concepto||'')}</strong>, por un monto a pagar de <strong>${fmtMon(i.pagar)}</strong>.</p>
    <p style="${PARR}">Les agradezco coordinar el pago según los datos indicados en el documento.</p>`;
  const firma = `<div style="margin-top:18px"><p style="${PARR}">Saludos cordiales,<br><strong>${escH(o.usuario_nombre||'')}</strong><br>AutoFácil SpA</p></div>`;
  return `<div style="font-family:Arial,sans-serif">${cuerpo}${docHTML(o)}${firma}</div>`;
}
const asuntoDe = o => `Orden de Pago ${o.numero||''} — ${o.proveedor_nombre||''}`;

let VISTA = null;   // orden actualmente abierta
// TODAS las órdenes (comisión, saldo precio, generales) se ven con el mismo documento Solicitud de Pago.
async function ver(id){
  const row = DATA.find(x=>x.id===id); if(!row) return;
  let full;
  try { const r=await fetch('/api/ordenes-pago/ordenes/'+row.id+'/documento',{headers:H}); if(chk401(r)) return; const j=await r.json(); if(!j.success||!j.data) throw 0; full=j.data; }
  catch(e){ toast('No se pudo cargar la orden'); return; }
  VISTA = full;
  document.getElementById('dTitulo').textContent = full.numero||'Orden';
  let extra = '';
  if (full.estado==='ANULADA') extra = `<p style="color:#b91c1c;font-size:.82rem;margin:0 0 10px"><i class="bi bi-x-octagon me-1"></i>Anulada por ${escH(full.anulada_nombre||'—')}${full.fecha_anulada?' · '+fdatetime(full.fecha_anulada):''}</p>`;
  else if (full.estado==='PAGADA') extra = `<p style="color:#15803d;font-size:.82rem;margin:0 0 10px"><i class="bi bi-check-circle me-1"></i>Pagada el ${fdate(full.fecha_pago)}${full.metodo_pago?' · '+escH(full.metodo_pago):''}${full.congelada?' · <i class="bi bi-lock-fill"></i> documento en duro (inmutable)':''}</p>`;
  document.getElementById('dBody').innerHTML = extra + docHTML(full);
  const foot = document.getElementById('dFoot');
  // Anular y Enviar a Contabilidad solo aplican a órdenes generales (las de Post Venta se gestionan allí).
  const anularBtn = (row.editable && full.estado==='EMITIDA' && isAdmin) ? `<button class="btn-ghost" onclick="marcarVista('ANULADA')">Anular</button>` : '';
  const enviar    = (row.editable && PUEDE) ? `<button class="btn-af" id="btnEnviar" onclick="enviarCorreo()"><i class="bi bi-envelope-paper me-1"></i>Enviar a Contabilidad</button>` : '';
  const pagarBtn  = (row.pagable && MICAJA) ? `<button class="btn-af" onclick="pagar(${row.id})"><i class="bi bi-cash-coin me-1"></i>Pagar</button>` : '';
  foot.innerHTML = `<button class="btn-ghost" onclick="document.getElementById('dlg').close()">Cerrar</button>
    <button class="btn-ghost" onclick="copiarDoc()"><i class="bi bi-clipboard me-1"></i>Copiar</button>
    <button class="btn-ghost" onclick="descargarDoc()"><i class="bi bi-download me-1"></i>Descargar</button>
    ${anularBtn}${enviar}${pagarBtn}`;
  document.getElementById('dlg').showModal();
}

async function copiarDoc(){
  const o = VISTA; if(!o) return;
  const html = emailHTML(o);
  const plano = (o.numero||'')+' — '+(o.proveedor_nombre||'')+' — A pagar '+fmtMon(impInfo(o).pagar);
  try {
    if (navigator.clipboard && window.ClipboardItem){
      await navigator.clipboard.write([new ClipboardItem({
        'text/html': new Blob([html],{type:'text/html'}),
        'text/plain': new Blob([plano],{type:'text/plain'})
      })]);
    } else throw new Error('no-clipboard');
    toast('Documento copiado — pégalo en tu correo');
  } catch(e) {
    const tmp = document.createElement('div'); tmp.contentEditable='true'; tmp.style.cssText='position:fixed;left:-9999px'; tmp.innerHTML=html;
    document.body.appendChild(tmp); const rg=document.createRange(); rg.selectNodeContents(tmp);
    const sel=getSelection(); sel.removeAllRanges(); sel.addRange(rg);
    try { document.execCommand('copy'); toast('Documento copiado'); } catch(_) { alert('No se pudo copiar.'); }
    sel.removeAllRanges(); tmp.remove();
  }
}

function descargarDoc(){
  const o = VISTA; if(!o) return;
  const w = window.open('', '_blank');
  if (!w) { alert('Permite las ventanas emergentes para descargar.'); return; }
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${escH(o.numero||'Orden de Pago')}</title></head>
    <body style="margin:24px">${docHTML(o)}
    <script>window.onload=function(){setTimeout(function(){window.print();},200);}<\/script></body></html>`);
  w.document.close();
}

async function enviarCorreo(){
  const o = VISTA; if(!o) return;
  if (!confirm(`¿Enviar la Orden de Pago ${o.numero||''} por correo a Contabilidad? Quedarás en copia.`)) return;
  const btn = document.getElementById('btnEnviar'); if(btn){ btn.disabled=true; btn.innerHTML='<i class="bi bi-hourglass-split me-1"></i>Enviando…'; }
  try {
    const r = await fetch(`/api/ordenes-pago/ordenes/${o.id}/enviar-correo`, { method:'POST', headers:H,
      body: JSON.stringify({ asunto: asuntoDe(o), html: emailHTML(o) }) });
    const j = await r.json();
    if (!j.success) throw new Error(j.error||'No se pudo enviar');
    toast('Correo enviado a '+(j.data?.to||'Contabilidad')+(j.data?.cc?(' (CC '+j.data.cc+')'):''));
  } catch(e){ toast('No se pudo enviar: '+e.message); }
  if(btn){ btn.disabled=false; btn.innerHTML='<i class="bi bi-envelope-paper me-1"></i>Enviar a Contabilidad'; }
}

// Marcar desde la tabla (fila): usa el id de la orden general (op_id).
async function marcar(id, estado){ const row = DATA.find(x=>x.id===id); if(!row||!row.editable) return; await doMarcar(row.op_id, row.numero, estado); }
// Marcar desde el modal abierto (VISTA = orden general completa).
async function marcarVista(estado){ if(!VISTA) return; await doMarcar(VISTA.id, VISTA.numero, estado); }
async function doMarcar(opId, numero, estado){
  const label = estado==='PAGADA'?'marcar como PAGADA':'ANULAR';
  if (!confirm(`¿${label} la orden ${numero||opId}?`)) return;
  try {
    const r = await fetch(`/api/ordenes-pago/ordenes/${opId}/estado`, { method:'PUT', headers:H, body: JSON.stringify({ estado }) });
    if (chk401(r)) return;
    const j = await r.json();
    if (j.success) { try{document.getElementById('dlg').close();}catch(e){} cargar(); }
    else alert(j.error||'Error');
  } catch(e) { alert('Error de red'); }
}

/* ── Pago (egreso desde caja) — aplica a todas las órdenes ── */
function pagar(ocId){
  const o = DATA.find(x=>x.id===ocId); if(!o) return;
  if (!MICAJA){ alert('Necesitas una Caja Activa para registrar pagos.'); return; }
  PAGO_ID = ocId;
  document.getElementById('pgTit').textContent = 'Registrar pago — '+(o.numero||'');
  document.getElementById('pgInfo').innerHTML = `<b>${escH(o.proveedor_nombre||'—')}</b> · ${escH(o.concepto||'')}<br>Monto a pagar: <b style="color:#0141A2">${fmtMon(o.monto)}</b>`;
  document.getElementById('pgFecha').value = new Date().toISOString().slice(0,10);
  document.getElementById('pgCaja').innerHTML = '<i class="bi bi-cash-stack me-1"></i>Caja: '+escH(MICAJA.nombre||'—');
  document.getElementById('pgMsg').style.display='none';
  try{ document.getElementById('dlg').close(); }catch(e){}
  document.getElementById('dlgPago').showModal();
}
function cerrarPago(){ try{ document.getElementById('dlgPago').close(); }catch(e){} PAGO_ID=null; }
async function confirmarPago(){
  if (!PAGO_ID) return;
  const btn=document.getElementById('pgBtn'), msg=document.getElementById('pgMsg');
  btn.disabled=true; btn.innerHTML='<i class="bi bi-hourglass-split me-1"></i>Registrando…'; msg.style.display='none';
  try {
    const r = await fetch(`/api/ordenes-pago/ordenes/${PAGO_ID}/pagar`, { method:'POST', headers:H,
      body: JSON.stringify({ metodo_pago: document.getElementById('pgMetodo').value, fecha_pago: document.getElementById('pgFecha').value||null }) });
    if (chk401(r)) { return; }
    const j = await r.json();
    if (j.success){ cerrarPago(); cargar(); toast('Pago registrado en caja '+(j.data?.caja||'')); }
    else { msg.textContent=j.error||'Error al registrar el pago'; msg.style.display='inline'; }
  } catch(e){ msg.textContent='Error de red'; msg.style.display='inline'; }
  btn.disabled=false; btn.innerHTML='<i class="bi bi-cash-coin me-1"></i>Registrar pago';
}

(async()=>{ await permisos(); await cargarCaja(); cargar(); })();
</script>
<script src="/js/app-version.js"></script>
