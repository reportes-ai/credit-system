<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Política de Crédito — AutoFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#001345; --blue:#0141A2; --sky:#009AFE; }
    body { background:#f0f4f8; font-family:'Segoe UI',system-ui,sans-serif; }

    /* ── Topnav ─────────────────────────────────────────────────────── */
    .topnav { background:linear-gradient(90deg,#012d70,#0255c5); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-left { display:flex; align-items:center; gap:16px; }
    .topnav-brand img { height:34px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; letter-spacing:.5px; margin-left:2px; }
    .topnav-right { display:flex; align-items:center; gap:12px; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#0141A2; font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; transition:background .2s; }
    .btn-logout:hover { background:rgba(255,255,255,.22); }

    /* ── Layout ─────────────────────────────────────────────────────── */
    .page-wrap { max-width:900px; margin:28px auto; padding:0 24px 60px; }

    /* ── Banner ─────────────────────────────────────────────────────── */
    .page-banner {
      background:linear-gradient(135deg,#012d70,#0141A2 55%,#009AFE);
      border-radius:16px; color:#fff; padding:28px 36px; margin-bottom:28px;
      display:flex; align-items:center; gap:20px;
    }
    .page-banner > i { font-size:3rem; opacity:.8; }
    .page-banner h2 { font-weight:700; margin:0 0 4px; font-size:1.35rem; }
    .page-banner p { opacity:.8; margin:0; font-size:.88rem; }

    /* ── Sección card ────────────────────────────────────────────────── */
    .section-card {
      background:#fff; border-radius:14px; padding:26px 30px; margin-bottom:20px;
      box-shadow:0 1px 6px rgba(0,0,0,.08);
    }
    .section-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:20px;
    }
    .section-label {
      font-size:.8rem; font-weight:700; color:var(--blue);
      text-transform:uppercase; letter-spacing:.08em;
      display:flex; align-items:center; gap:7px;
    }
    .section-desc { font-size:.82rem; color:#6b7280; margin-top:3px; }

    /* ── Tabla de factores ───────────────────────────────────────────── */
    .factor-table { width:100%; border-collapse:collapse; }
    .factor-table thead tr { background:#f0f4f8; }
    .factor-table th {
      font-size:.73rem; font-weight:700; color:#6b7280;
      text-transform:uppercase; letter-spacing:.07em;
      padding:10px 14px; border-bottom:2px solid #e5e7eb; text-align:left;
    }
    .factor-table th:last-child { text-align:center; width:160px; }
    .factor-table td { padding:7px 14px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    .factor-table tr:last-child td { border-bottom:none; }
    .factor-table tr:hover td { background:#f8fafc; }
    .tipo-label { font-size:.88rem; font-weight:600; color:#1e293b; }

    /* Separador de sección dentro de la tabla */
    .factor-table .tr-sep td {
      background:#f0f4f8; padding:6px 14px;
      font-size:.7rem; font-weight:700; color:#6b7280;
      text-transform:uppercase; letter-spacing:.08em;
      border-bottom:1px solid #e5e7eb;
    }
    /* Fila de arriendo */
    .factor-table .tr-arriendo td { background:#fef9ec; }
    .factor-table .tr-arriendo:hover td { background:#fef3c7; }
    .factor-table .tr-arriendo .tipo-label { color:#92400e; }

    /* ── Input de porcentaje ─────────────────────────────────────────── */
    .pct-wrap { display:flex; align-items:center; justify-content:center; gap:4px; }
    .pct-input {
      width:90px; text-align:right;
      border:1.5px solid #d1d5db; border-radius:7px;
      padding:6px 8px; font-size:.9rem; font-weight:600; color:#1e293b;
      transition:border-color .15s, box-shadow .15s;
    }
    .pct-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(1,65,162,.1); outline:none; }
    .pct-input.changed { border-color:#f59e0b; background:#fffbeb; }
    .pct-symbol { font-size:.9rem; font-weight:700; color:#6b7280; }

    /* ── Botones ─────────────────────────────────────────────────────── */
    .btn-guardar {
      background:linear-gradient(135deg,var(--blue),var(--sky));
      color:#fff; border:none; border-radius:8px;
      padding:9px 26px; font-weight:700; font-size:.9rem; cursor:pointer;
      display:flex; align-items:center; gap:7px;
    }
    .btn-guardar:hover { opacity:.9; }
    .btn-guardar:disabled { opacity:.6; cursor:default; }

    /* ── Toast ───────────────────────────────────────────────────────── */
    .toast-msg { position:fixed; top:68px; right:20px; z-index:9999; border-radius:10px; padding:14px 20px; font-weight:600; font-size:.9rem; color:#fff; box-shadow:0 8px 24px rgba(0,0,0,.18); animation:slideIn .25s ease; display:none; }
    @keyframes slideIn { from{transform:translateX(60px);opacity:0} to{transform:translateX(0);opacity:1} }
    .toast-ok  { background:#059669; }
    .toast-err { background:#dc2626; }

    /* ── Indicador de cambios ────────────────────────────────────────── */
    .changes-badge { display:none; background:#f59e0b; color:#fff; border-radius:20px; padding:2px 10px; font-size:.72rem; font-weight:700; }
    .changes-badge.visible { display:inline-block; }
  </style>
</head>
<body>

<!-- ── Topnav ────────────────────────────────────────────────────── -->
<nav class="topnav">
  <div class="topnav-left">
    <div class="topnav-brand">
      <a href="/"><img src="/img/logo.png" alt="AutoFácil" style="display:block"></a>
      <span class="version-badge" id="versionBadge">v1.1</span>
    </div>
  </div>
  <div class="topnav-right">
    <div class="user-chip">
      <div class="avatar" id="avatarInicial">?</div>
      <div>
        <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
        <div class="perfil-badge" id="navPerfil">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="page-wrap">

  <!-- ── Banner ──────────────────────────────────────────────────── -->
  <div class="page-banner">
    <i class="bi bi-shield-check"></i>
    <div>
      <h2>Política de Crédito AutoFácil</h2>
      <p>Configuración de parámetros aplicados en la evaluación crediticia</p>
    </div>
  </div>

  <!-- ── Card: Carga Mensual ─────────────────────────────────────── -->
  <div class="section-card">
    <div class="section-header">
      <div>
        <div class="section-label"><i class="bi bi-percent"></i>Carga Mensual sobre Deuda</div>
        <div class="section-desc">Factor (%) aplicado sobre el monto de cada tipo de deuda para calcular la carga mensual del cliente</div>
      </div>
      <span class="changes-badge" id="changesBadge">Cambios sin guardar</span>
    </div>

    <table class="factor-table">
      <thead>
        <tr>
          <th>Concepto</th>
          <th style="text-align:center">Factor (%)</th>
        </tr>
      </thead>
      <tbody id="factorBody">
        <tr><td colspan="2" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Cargando…</td></tr>
      </tbody>
    </table>

    <div class="d-flex justify-content-end mt-3">
      <button class="btn-guardar" id="btnGuardar" onclick="guardar()" disabled>
        <i class="bi bi-floppy"></i>Guardar cambios
      </button>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast-msg toast-ok"  id="toastOk"></div>
<div class="toast-msg toast-err" id="toastErr"></div>

<script>
/* ─── Auth ─────────────────────────────────────────────────────── */
function getToken() { return localStorage.getItem('token'); }
function apiHeaders() { return { 'Content-Type':'application/json', 'Authorization':'Bearer '+getToken() }; }
function logout() { localStorage.removeItem('token'); localStorage.removeItem('usuario'); location.href='/login.html'; }

(function checkAuth() {
  const t = getToken();
  if (!t) { location.href='/login.html'; return; }
  try {
    const u = JSON.parse(localStorage.getItem('usuario') || '{}');
    document.getElementById('avatarInicial').textContent = (u.nombre||'?').charAt(0).toUpperCase();
    document.getElementById('navNombre').textContent = ((u.nombre||'') + ' ' + (u.apellido||'')).trim();
    document.getElementById('navPerfil').textContent = u.perfil || u.nombre_perfil || '—';
    const p = JSON.parse(atob(t.split('.')[1]));
    if (p.exp * 1000 < Date.now()) logout();
  } catch(e) { logout(); }
})();

/* ─── Definición de factores ────────────────────────────────────── */
// sep:true → fila separadora (no es un parámetro editable)
// arriendo:true → estilo especial, es % sobre renta (no sobre deuda)
const FACTORES = [
  { sep: true,  label: 'Carga Mensual sobre Deuda' },
  { clave: 'carga_deuda_vigente_total', label: 'Deuda Vigente Total' },
  { clave: 'carga_deuda_hipotecaria',   label: 'Deuda Hipotecaria'   },
  { clave: 'carga_deuda_comercial',     label: 'Deuda Comercial'     },
  { clave: 'carga_deuda_consumo',       label: 'Deuda Consumo'       },
  { clave: 'carga_deuda_morosa',        label: 'Deuda Morosa'        },
  { clave: 'carga_deuda_vencida',       label: 'Deuda Vencida'       },
  { clave: 'carga_deuda_castigada',     label: 'Deuda Castigada'     },
  { clave: 'carga_linea_disponible',    label: 'Línea Disponible'    },
  { sep: true,  label: 'Arriendo' },
  { clave: 'pct_arriendo', label: 'Porcentaje destinado a Arriendo', arriendo: true },
];

let valoresOriginales = {};

function showToast(msg, ok) {
  const el = document.getElementById(ok ? 'toastOk' : 'toastErr');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3200);
}

/* ─── Render tabla ───────────────────────────────────────────────── */
function renderTabla(obj) {
  const tbody = document.getElementById('factorBody');
  tbody.innerHTML = FACTORES.map(f => {
    // Fila separadora
    if (f.sep) {
      return `<tr class="tr-sep"><td colspan="2"><i class="bi bi-${f.arriendo ? 'house' : 'percent'} me-1"></i>${f.label}</td></tr>`;
    }
    const val     = (obj[f.clave] ?? 0).toFixed(4);
    const display = parseFloat(val).toLocaleString('es-CL', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
    const trClass = f.arriendo ? ' class="tr-arriendo"' : '';
    const hint    = f.arriendo
      ? `<div style="font-size:.7rem;color:#92400e;margin-top:2px;">% de la Renta Acreditada del cliente</div>`
      : '';
    return `
      <tr${trClass}>
        <td><span class="tipo-label">${f.label}</span>${hint}</td>
        <td>
          <div class="pct-wrap">
            <input type="number" class="pct-input"
                   id="inp_${f.clave}"
                   value="${display.replace(',','.')}"
                   min="0" max="100" step="0.01"
                   oninput="onCambio(this, '${f.clave}')">
            <span class="pct-symbol">%</span>
          </div>
        </td>
      </tr>`;
  }).join('');
}

/* ─── Detectar cambios ───────────────────────────────────────────── */
function onCambio(el, clave) {
  const nuevo    = parseFloat(el.value) || 0;
  const original = valoresOriginales[clave] ?? 0;
  el.classList.toggle('changed', Math.abs(nuevo - original) > 0.00001);
  actualizarEstado();
}

function actualizarEstado() {
  const hayCambios = FACTORES.filter(f => !f.sep).some(f => {
    const el = document.getElementById('inp_' + f.clave);
    return el && el.classList.contains('changed');
  });
  document.getElementById('changesBadge').classList.toggle('visible', hayCambios);
  document.getElementById('btnGuardar').disabled = !hayCambios;
}

/* ─── Cargar desde API ───────────────────────────────────────────── */
async function cargar() {
  try {
    const r = await fetch('/api/parametros-credito', { headers: apiHeaders() });
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    valoresOriginales = {};
    FACTORES.filter(f => !f.sep).forEach(f => {
      valoresOriginales[f.clave] = j.data.obj[f.clave] ?? 0;
    });
    renderTabla(j.data.obj);
    actualizarEstado();
  } catch(e) {
    document.getElementById('factorBody').innerHTML =
      `<tr><td colspan="2" class="text-danger text-center py-3">Error al cargar parámetros: ${e.message}</td></tr>`;
  }
}

/* ─── Guardar ────────────────────────────────────────────────────── */
async function guardar() {
  const btn = document.getElementById('btnGuardar');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Guardando…';

  const body = {};
  FACTORES.filter(f => !f.sep).forEach(f => {
    const el = document.getElementById('inp_' + f.clave);
    body[f.clave] = parseFloat(el?.value) || 0;
  });

  try {
    const r = await fetch('/api/parametros-credito', {
      method: 'PUT', headers: apiHeaders(), body: JSON.stringify(body),
    });
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    // Actualizar originales y limpiar resaltados
    FACTORES.filter(f => !f.sep).forEach(f => {
      valoresOriginales[f.clave] = body[f.clave];
      const el = document.getElementById('inp_' + f.clave);
      if (el) el.classList.remove('changed');
    });
    actualizarEstado();
    showToast('Parámetros guardados correctamente', true);
  } catch(e) {
    showToast('Error al guardar: ' + e.message, false);
    btn.disabled = false;
  } finally {
    btn.innerHTML = '<i class="bi bi-floppy"></i>Guardar cambios';
  }
}

cargar();
</script>
</body>
</html>
