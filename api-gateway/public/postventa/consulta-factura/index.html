<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta Estado Factura — AutoFácil</title>
  <!-- v1.1 -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#001345; --blue:#0141A2; }
    body { background:#f0f4f8; font-family:'Segoe UI',system-ui,sans-serif; margin:0; }
    .topnav { background:linear-gradient(90deg,#012d70,#0255c5); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--blue); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .wrap { max-width:1280px; margin:0 auto; padding:22px 24px; }
    .card-af { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); padding:16px 18px; margin-bottom:16px; }
    .head-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .head-row h5 { font-weight:800; color:var(--navy); margin:0; }
    label { font-size:.7rem; font-weight:800; text-transform:uppercase; color:#64748b; letter-spacing:.3px; display:block; margin:0 0 4px; }
    input { width:100%; border:1.5px solid #e2e8f0; border-radius:8px; padding:9px 11px; font-size:.85rem; box-sizing:border-box; font-family:inherit; }
    input:focus { border-color:#0141A2; outline:none; }
    .filtros { display:grid; grid-template-columns:2fr 1fr 1fr auto auto; gap:10px; align-items:end; }
    .btn-af { background:linear-gradient(135deg,#0141A2,#0255c5); color:#fff; border:none; border-radius:9px; padding:10px 18px; font-size:.85rem; font-weight:700; cursor:pointer; white-space:nowrap; }
    .btn-ghost { background:#fff; border:1.5px solid #cbd5e1; color:#475569; border-radius:9px; padding:9px 16px; font-size:.83rem; font-weight:700; cursor:pointer; white-space:nowrap; }
    table { width:100%; border-collapse:collapse; font-size:.82rem; }
    th { background:#f8fafc; color:#475569; font-size:.68rem; text-transform:uppercase; padding:9px 10px; text-align:left; border-bottom:2px solid #e2e8f0; white-space:nowrap; }
    td { padding:9px 10px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    tr.op-row { cursor:pointer; } tr.op-row:hover td { background:#fafbff; }
    .num { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
    .pill { font-size:.66rem; font-weight:800; border-radius:10px; padding:3px 9px; white-space:nowrap; display:inline-block; }
    .pg { background:#dcfce7; color:#15803d; } .pp { background:#dbeafe; color:#1d4ed8; } .ps { background:#f1f5f9; color:#94a3b8; }
    .tag { font-size:.62rem; font-weight:800; border-radius:8px; padding:1px 6px; }
    .tag-b { background:#fef3c7; color:#b45309; } .tag-t { background:#ede9fe; color:#6d28d9; }
    .paso { font-size:.66rem; color:#94a3b8; margin-top:2px; }
    .muted { color:#94a3b8; }
    .timeline { background:#f8fafc; border-radius:10px; padding:12px 14px; }
    .tl-step { display:flex; align-items:center; gap:10px; padding:3px 0; font-size:.8rem; }
    .tl-dot { width:18px; text-align:center; }
    .tl-done { color:#15803d; } .tl-pend { color:#cbd5e1; }
    .tl-fecha { color:#94a3b8; font-size:.72rem; margin-left:auto; white-space:nowrap; }
    .count { font-size:.8rem; color:#64748b; margin-bottom:10px; }
  </style>
</head>
<body>
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a><span>›</span><a href="/postventa/">Post Venta</a><span>›</span><span style="color:#fff;font-weight:600">Consulta Estado Factura</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="user-chip"><div class="avatar" id="avatarInicial">?</div><div><div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div><div class="perfil-badge" id="navPerfil">—</div></div></div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="wrap">
  <div class="card-af">
    <div class="head-row"><i class="bi bi-receipt" style="color:var(--blue);font-size:1.2rem"></i><h5>Consulta Estado Factura y Ciclo de Comisión</h5></div>
    <div class="filtros">
      <div><label>Buscar (N° OP, N° Factura, RUT o nombre dealer, ejecutivo)</label><input id="fq" placeholder="Ej: 12345, F-0098, 76.xxx, Automotora…" autofocus></div>
      <div><label>Mes facturación</label><input id="fMes" type="month"></div>
      <div><label>N° Factura</label><input id="fFactura" placeholder="N° factura"></div>
      <button class="btn-af" onclick="buscar()"><i class="bi bi-search me-1"></i>Buscar</button>
      <button class="btn-ghost" onclick="limpiar()">Limpiar</button>
    </div>
  </div>

  <div class="card-af">
    <div class="count" id="count">Cargando…</div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>N° OP</th><th>Dealer</th><th>Ejecutivo</th><th>N° Factura</th><th>Mes Fact.</th><th>Fecha Fact.</th>
          <th class="num">Monto Bruto</th><th class="num">Líquido</th><th>Estado comisión</th><th>Orden Pago</th>
        </tr></thead>
        <tbody id="body"><tr><td colspan="10" style="text-align:center;color:#94a3b8;padding:24px">Cargando…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const token = sessionStorage.getItem('token');
const yo = JSON.parse(sessionStorage.getItem('usuario')||'null');
if (!token || !yo) location.href='/login.html';
document.getElementById('navNombre').textContent = yo.nombre+' '+(yo.apellido||'');
document.getElementById('navPerfil').textContent = yo.perfil||'';
document.getElementById('avatarInicial').textContent = (yo.nombre||'?')[0].toUpperCase();
function logout(){ sessionStorage.clear(); location.href='/login.html'; }
const H = { Authorization:'Bearer '+token };
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const money = n => (n==null?'—':'$'+Number(n||0).toLocaleString('es-CL'));
const fdate = s => s ? new Date(s).toLocaleDateString('es-CL') : '—';
let ORDEN = [], DATA = [];

function pillClase(estado){ return estado==='COMISION PAGADA'?'pg':(estado==='SIN ETAPAS'?'ps':'pp'); }

async function buscar(){
  const q = document.getElementById('fq').value.trim();
  const mes = document.getElementById('fMes').value.trim();
  const factura = document.getElementById('fFactura').value.trim();
  document.getElementById('count').textContent = 'Buscando…';
  document.getElementById('body').innerHTML = '<tr><td colspan="10" style="text-align:center;color:#94a3b8;padding:24px">Buscando…</td></tr>';
  try{
    const url = '/api/postventa/consulta-facturas?q='+encodeURIComponent(q)+'&mes='+encodeURIComponent(mes)+'&factura='+encodeURIComponent(factura);
    const j = await (await fetch(url,{headers:H})).json();
    ORDEN = j.orden || []; DATA = j.data || [];
    render();
  }catch(e){
    document.getElementById('count').textContent = 'Error al consultar.';
    document.getElementById('body').innerHTML = '<tr><td colspan="10" style="text-align:center;color:#b91c1c;padding:24px">Error al consultar.</td></tr>';
  }
}
function limpiar(){ document.getElementById('fq').value=''; document.getElementById('fMes').value=''; document.getElementById('fFactura').value=''; buscar(); }

function render(){
  const tb = document.getElementById('body');
  document.getElementById('count').textContent = DATA.length + (DATA.length>=300?'+ resultados (refina la búsqueda)':' resultado(s)');
  if(!DATA.length){ tb.innerHTML='<tr><td colspan="10" style="text-align:center;color:#94a3b8;padding:24px">Sin resultados.</td></tr>'; return; }
  tb.innerHTML = DATA.map((r,i)=>{
    const tags = (r.es_boleta?'<span class="tag tag-b">Boleta</span> ':'')+(r.es_terceros?'<span class="tag tag-t">Terceros</span>':'');
    const fact = r.numero_factura ? esc(r.numero_factura)+(tags?'<br>'+tags:'') : '<span class="muted">Sin factura</span>';
    return `
    <tr class="op-row" onclick="toggle(${i})">
      <td><b>${esc(r.num_op||'—')}</b></td>
      <td>${esc(r.nombre_dealer||'—')}<br><span class="muted" style="font-size:.72rem">${esc(r.rut_dealer||'')}</span></td>
      <td>${esc(r.ejecutivo||'—')}</td>
      <td>${fact}</td>
      <td>${esc(r.mes_fact||'—')}</td>
      <td>${fdate(r.fecha_factura)}</td>
      <td class="num">${money(r.monto_bruto)}</td>
      <td class="num">${money(r.monto_liquido)}</td>
      <td><span class="pill ${pillClase(r.estado)}">${esc(r.estado)}</span><div class="paso">paso ${r.paso}/${r.total} · ${fdate(r.fecha_estado)}</div></td>
      <td>${r.orden_comision?esc(r.orden_comision):'<span class="muted">—</span>'}</td>
    </tr>
    <tr id="det${i}" style="display:none"><td colspan="10" style="padding:0 10px 12px">${timeline(r)}</td></tr>`;
  }).join('');
}
function timeline(r){
  const reached = {}; (r.etapas||[]).forEach(e=>{ reached[e.etapa]=e.fecha; });
  const steps = ORDEN.map(et=>{
    const f = reached[et];
    return `<div class="tl-step"><span class="tl-dot ${f?'tl-done':'tl-pend'}">${f?'<i class="bi bi-check-circle-fill"></i>':'<i class="bi bi-circle"></i>'}</span>
      <span style="${f?'':'color:#cbd5e1'}">${esc(et)}</span>${f?`<span class="tl-fecha">${new Date(f).toLocaleString('es-CL')}</span>`:''}</div>`;
  }).join('');
  return `<div class="timeline">${steps}</div>`;
}
function toggle(i){ const d=document.getElementById('det'+i); if(d) d.style.display = d.style.display==='none'?'':'none'; }

document.getElementById('fq').addEventListener('keydown', e=>{ if(e.key==='Enter') buscar(); });
document.getElementById('fFactura').addEventListener('keydown', e=>{ if(e.key==='Enter') buscar(); });
document.getElementById('fMes').addEventListener('change', buscar);
buscar();
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
