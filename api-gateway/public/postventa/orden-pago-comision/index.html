<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emisión Orden de Pago Comisión — AutoFácil</title>
  <!-- v1.8 -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#012d70; --blue:#0141A2; --accent:#0255c5; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; }
    .topnav { background:linear-gradient(90deg,#012d70,#0255c5); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--blue); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .main { max-width:1280px; margin:0 auto; padding:24px; }
    .af-banner { background:linear-gradient(135deg,#012d70,#0141A2 55%,#009AFE); border-radius:16px; color:#fff; padding:22px 30px; margin-bottom:22px; display:flex; align-items:center; gap:16px; }
    .af-banner i { font-size:2.2rem; opacity:.85; }
    .af-banner h2 { font-weight:700; margin:0 0 2px; font-size:1.25rem; }
    .af-banner p { opacity:.82; margin:0; font-size:.86rem; }
    .card-box { background:#fff; border-radius:14px; box-shadow:0 1px 6px rgba(0,0,0,.07); padding:18px 20px; }
    table.lista { width:100%; border-collapse:collapse; font-size:.84rem; }
    table.lista th { background:#0141A2; color:#fff; font-size:.72rem; text-transform:uppercase; letter-spacing:.4px; padding:8px 10px; text-align:left; position:sticky; top:0; }
    table.lista td { padding:8px 10px; border-bottom:1px solid #eef2f7; }
    table.lista tr:hover td { background:#f8fafc; }
    .pill { background:#e0e7ff; color:#3730a3; border-radius:6px; padding:1px 8px; font-size:.72rem; font-weight:700; }
    .dias { font-weight:800; }
    .dias.alto { color:#dc2626; } .dias.medio { color:#b45309; }
    .btn-ver { background:#0141A2; color:#fff; border:none; border-radius:7px; padding:5px 12px; font-size:.78rem; font-weight:700; cursor:pointer; }
    .vacio { text-align:center; color:#94a3b8; padding:40px 0; }
    .ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; align-items:flex-start; justify-content:center; padding:24px; overflow-y:auto; }
    .ov.open { display:flex; }
    .op-modal { background:#fff; border-radius:12px; width:97%; max-width:1180px; margin:auto; }
    .op-modal-head { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; border-bottom:1px solid #e5e7eb; }
    .op-modal-head h5 { margin:0; font-weight:700; font-size:1rem; }
    .op-modal-body { padding:16px; }
    .op-modal-foot { padding:14px 20px; border-top:1px solid #e5e7eb; display:flex; gap:10px; justify-content:flex-end; }
    .btn-copiar { background:#16a34a; color:#fff; border:none; border-radius:8px; padding:9px 18px; font-weight:700; cursor:pointer; }
    .btn-emitir { background:#0141A2; color:#fff; border:none; border-radius:8px; padding:9px 18px; font-weight:700; cursor:pointer; }
    .btn-cerrar { background:#f1f5f9; color:#374151; border:none; border-radius:8px; padding:9px 16px; font-weight:600; cursor:pointer; }
    .toast { position:fixed; top:70px; right:20px; background:#16a34a; color:#fff; padding:12px 18px; border-radius:9px; font-weight:600; font-size:.88rem; z-index:2000; display:none; }
  </style>
</head>
<body>
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav">
      <a href="/">Inicio</a><span>›</span><a href="/postventa">Post Venta</a><span>›</span>
      <span style="color:#fff;font-weight:600">Emisión Orden de Pago Comisión</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="user-chip"><div class="avatar" id="avatarInicial">?</div><div><div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div><div class="perfil-badge" id="navPerfil">—</div></div></div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="main">
  <div class="af-banner"><i class="bi bi-receipt"></i><div>
    <h2>Emisión Orden de Pago — Comisión</h2>
    <p>Operaciones con <b>factura recibida</b> pendientes de emitir. Revisa, copia la orden para el correo y emítela.</p>
  </div></div>

  <div class="card-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-weight:700;color:var(--navy)" id="resumen">—</div>
      <input id="buscar" placeholder="Buscar OP, dealer, RUT…" oninput="render()" style="border:1.5px solid #d1d5db;border-radius:8px;padding:7px 12px;font-size:.85rem;width:280px;max-width:50%">
    </div>
    <div style="overflow-x:auto">
      <table class="lista">
        <thead><tr>
          <th>N° OP</th><th>Financiera</th><th>Dealer</th><th>RUT</th>
          <th style="text-align:right">Comisión</th><th>Factura</th><th>Días</th><th></th>
        </tr></thead>
        <tbody id="tbody"><tr><td colspan="8" class="vacio"><div class="spinner-border spinner-border-sm"></div> Cargando…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="ov" id="ov">
  <div class="op-modal">
    <div class="op-modal-head"><h5>Orden de Pago de Comisión</h5><button class="btn-cerrar" onclick="cerrar()"><i class="bi bi-x-lg"></i></button></div>
    <div class="op-modal-body"><div id="docWrap"></div></div>
    <div class="op-modal-foot">
      <button class="btn-cerrar" onclick="cerrar()">Cancelar</button>
      <button class="btn-copiar" onclick="copiarOrden()"><i class="bi bi-clipboard me-1"></i>Copiar para correo</button>
      <button class="btn-emitir" onclick="emitir()"><i class="bi bi-send-check me-1"></i>Emitir orden</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const token = sessionStorage.getItem('token');
const yo = JSON.parse(sessionStorage.getItem('usuario')||'null');
if (!token || !yo) location.href='/login.html';
if (yo){ document.getElementById('navNombre').textContent = yo.nombre+' '+(yo.apellido||''); document.getElementById('navPerfil').textContent = yo.perfil||''; document.getElementById('avatarInicial').textContent = (yo.nombre||'?')[0].toUpperCase(); }
function logout(){ sessionStorage.clear(); location.href='/login.html'; }
const hdr = () => ({ 'Content-Type':'application/json', Authorization:'Bearer '+token });
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); }
const fmt = n => '$' + Math.round(Number(n)||0).toLocaleString('es-CL');
const fechaCL = d => d ? new Date(d).toLocaleDateString('es-CL',{timeZone:'UTC',day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const periodoCL = d => { const x = d ? new Date(d) : new Date(); return MESES[x.getUTCMonth()] + '-' + String(x.getUTCFullYear()).slice(2); };

let DATA = [], actual = null, IMPUESTOS = { IVA:19, RETENCION_HONORARIOS:15.25 };

async function cargar(){
  try {
    const [r, ri] = await Promise.all([
      fetch('/api/postventa/orden-pago-comision', { headers: hdr() }),
      fetch('/api/impuestos/valores', { headers: hdr() })
    ]);
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    try { const ji = await ri.json(); if (ji.success && ji.data) IMPUESTOS = ji.data; } catch(e){}
    DATA = j.data.rows || [];
    render();
  } catch(e){ document.getElementById('tbody').innerHTML = `<tr><td colspan="8" class="vacio">Error: ${e.message}</td></tr>`; }
}

// Agrupa operaciones que comparten la MISMA boleta/factura del mismo dealer
// → una sola orden de pago. Sin número de factura quedan individuales.
let GROUPS = [];
function agrupar(rows){
  const map = new Map();
  for (const r of rows){
    const key = r.numero_factura
      ? ((r.rut_dealer||'')+'|'+r.numero_factura+'|'+(r.es_boleta?'B':'F'))
      : ('op'+r.id);
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(r);
  }
  return [...map.values()];
}
function render(){
  const q = (document.getElementById('buscar').value||'').toLowerCase();
  const rows = DATA.filter(r => !q || [r.num_op,r.nombre_dealer,r.rut_dealer,r.financiera,r.numero_factura].some(v => String(v||'').toLowerCase().includes(q)));
  GROUPS = agrupar(rows);
  const total = rows.reduce((s,r)=>s+(Number(r.comision)||0),0);
  document.getElementById('resumen').textContent = `${rows.length} operación(es) en ${GROUPS.length} orden(es) · Comisión total: ${fmt(total)}`;
  const tb = document.getElementById('tbody');
  if (!GROUPS.length){ tb.innerHTML = '<tr><td colspan="8" class="vacio">No hay operaciones con factura recibida pendientes de emitir.</td></tr>'; return; }
  tb.innerHTML = GROUPS.map((g, gi) => {
    const f0 = g[0];
    const sumCom = g.reduce((s,o)=>s+(Number(o.comision)||0),0);
    const dias = Math.max(...g.map(o=>o.dias!=null?o.dias:-1));
    const dc = dias>=7?'alto':dias>=3?'medio':'';
    const nums = g.map(o=>o.num_op).join(', ');
    const fins = [...new Set(g.map(o=>o.financiera))].map(f=>`<span class="pill">${f||'—'}</span>`).join(' ');
    const fact = f0.numero_factura
      ? `<b>${f0.numero_factura}</b> <span class="pill">${f0.es_boleta?'Boleta':'Factura'}</span>${g.length>1?` · ${g.length} ops`:''}`
      : '—';
    return `<tr>
      <td><b>${nums}</b></td>
      <td>${fins}</td>
      <td>${f0.nombre_dealer||'—'}</td>
      <td>${f0.rut_dealer||'—'}</td>
      <td style="text-align:right">${fmt(sumCom)}</td>
      <td style="font-size:.8rem">${fact}</td>
      <td><span class="dias ${dc}">${dias>=0?dias+' d':'—'}</span></td>
      <td><button class="btn-ver" onclick="verOrden(${gi})"><i class="bi bi-eye me-1"></i>Ver orden</button></td>
    </tr>`;
  }).join('');
}

// ops = array de operaciones que comparten la misma boleta/factura
function docHTML(ops){
  if (!Array.isArray(ops)) ops = [ops];
  const f0 = ops[0];
  const iva = Number(IMPUESTOS.IVA)||19, ret = Number(IMPUESTOS.RETENCION_HONORARIOS)||15.25;
  // Desglose por operación: valores REGISTRADOS (fallback solo para registros antiguos)
  const calc = o => {
    const eb = !!o.es_boleta;
    const neto = Number(o.monto_factura ?? o.comision)||0;
    const pct  = (o.impuesto_pct != null) ? Number(o.impuesto_pct) : (eb ? ret : iva);
    const impMonto = (o.impuesto_monto != null) ? Number(o.impuesto_monto) : Math.round(neto * pct/100);
    const aPagar   = (o.monto_liquido  != null) ? Number(o.monto_liquido)  : (eb ? (neto - impMonto) : (neto + impMonto));
    return { neto, pct, impMonto, aPagar, eb };
  };
  const cs = ops.map(calc);
  const sumNeto  = cs.reduce((s,c)=>s+c.neto,0);
  const sumImp   = cs.reduce((s,c)=>s+c.impMonto,0);
  const sumPagar = cs.reduce((s,c)=>s+c.aPagar,0);
  const esBoleta = !!f0.es_boleta;
  const pct0 = (f0.impuesto_pct != null) ? Number(f0.impuesto_pct) : (esBoleta ? ret : iva);
  const impLbl = `${esBoleta ? 'Retención' : 'IVA'} ${pct0}%`;
  const fechaPago = fechaCL(new Date().toISOString());
  const nums = ops.map(o=>o.num_op).join(', ');
  const conceptoDet = `Comisión OP${ops.length>1?'s':''} ${nums} - ${f0.financiera||''}`;
  const nOrden = f0.num_orden || ('OC-'+(f0.numero_factura||f0.num_op||''));
  const Sdoc = 'font-family:Arial,sans-serif;color:#1e293b;font-size:11px;border:2px solid #93c5fd;border-radius:8px;padding:14px 16px;display:block;width:100%;box-sizing:border-box';
  const Smeta = 'border-collapse:collapse;font-size:11px';
  const Slbl = 'color:#64748b;font-weight:700;text-transform:uppercase;font-size:9px;padding:1px 8px;white-space:nowrap';
  const Smv = 'padding:1px 8px;font-size:11px';
  const Stbl = 'width:100%;border-collapse:collapse;margin:8px 0;font-size:11px;table-layout:fixed';
  const Sth = 'background:#dbeafe;color:#1e3a8a;border:1px solid #93c5fd;padding:5px 6px;font-size:9px;text-transform:uppercase;text-align:left;white-space:normal;word-break:break-word';
  const Std = 'border:1px solid #cbd5e1;padding:5px 6px;white-space:normal;word-break:break-word';
  const Snum = Std + ';text-align:right';
  const Sres = 'border-collapse:collapse;margin-top:14px;max-width:430px';
  const SresL = 'border:1px solid #cbd5e1;padding:5px 8px;font-size:11px;background:#eff6ff;font-weight:700;width:42%';
  const SresV = 'border:1px solid #cbd5e1;padding:5px 8px;font-size:11px';
  const filas = ops.map((o,i)=>{
    const c = cs[i];
    const concepto = `Comisión OP ${o.num_op||''} - ${o.financiera||''}`;
    return `<tr>
      <td style="${Std}">${o.nombre_dealer||''}</td><td style="${Std}">${o.rut_dealer||''}</td>
      <td style="${Std}">${concepto}</td><td style="${Std}">${periodoCL(o.fecha_factura)}</td><td style="${Snum}">${fmt(c.neto)}</td>
      <td style="${Snum}">${fmt(c.impMonto)}</td><td style="${Snum}">${fmt(c.aPagar)}</td><td style="${Std}">${fechaPago}</td>
    </tr>`;
  }).join('');
  return `<div style="${Sdoc}">
    <table style="width:100%;border-collapse:collapse;margin-bottom:14px"><tbody><tr>
      <td style="vertical-align:top">
        <table style="${Smeta}"><tbody>
          <tr><td style="${Slbl}">Concepto</td><td style="${Smv}">SOLICITUD DE PAGO</td></tr>
          <tr><td style="${Slbl}">Compañía</td><td style="${Smv}">AUTOFÁCIL SPA</td></tr>
          <tr><td style="${Slbl}">Tipo gasto</td><td style="${Smv}">COMISIÓN A DEALER</td></tr>
          <tr><td style="${Slbl}">N° Orden</td><td style="${Smv}">${nOrden}</td></tr>
          <tr><td style="${Slbl}">Fecha</td><td style="${Smv}">${fechaPago}</td></tr>
        </tbody></table>
      </td>
      <td style="vertical-align:top;text-align:right">
        <img width="150" height="34" style="height:34px;width:auto" src="${location.origin}/img/logo-autofacil.png" onerror="this.src='${location.origin}/img/logo.png'">
      </td>
    </tr></tbody></table>
    <table style="${Stbl}">
      <colgroup><col style="width:22%"><col style="width:11%"><col style="width:21%"><col style="width:7%"><col style="width:11%"><col style="width:10%"><col style="width:10%"><col style="width:8%"></colgroup>
      <thead><tr><th style="${Sth}">Dealer</th><th style="${Sth}">RUT</th><th style="${Sth}">Detalle</th><th style="${Sth}">Mes</th><th style="${Sth}">Monto Total</th><th style="${Sth}">${impLbl}</th><th style="${Sth}">A Pagar</th><th style="${Sth}">Fecha a pagar</th></tr></thead>
      <tbody>${filas}
        <tr><td colspan="6" style="${Std};text-align:right;font-weight:800;background:#f1f5f9">TOTAL</td><td style="${Snum};font-weight:800;background:#f1f5f9">${fmt(sumPagar)}</td><td style="${Std};background:#f1f5f9"></td></tr>
      </tbody>
    </table>
    <table style="${Sres}"><tbody>
      <tr><td style="${SresL}">Proveedor</td><td style="${SresV}">${f0.nombre_dealer||''}</td></tr>
      <tr><td style="${SresL}">Concepto</td><td style="${SresV}">${conceptoDet}</td></tr>
      <tr><td style="${SresL}">Período</td><td style="${SresV}">${periodoCL(f0.fecha_factura)}</td></tr>
      ${f0.numero_factura?`<tr><td style="${SresL}">N° ${esBoleta?'Boleta':'Factura'}</td><td style="${SresV}">${f0.numero_factura}${esBoleta?' (Boleta)':''}${f0.es_terceros?' · terceros':''}${ops.length>1?` · ${ops.length} operaciones`:''}</td></tr>`:''}
      <tr><td style="${SresL}">Destino</td><td style="${SresV}">CTA. CTE. ${f0.num_cuenta? f0.num_cuenta+(f0.banco?(' · '+f0.banco):'') : ''}</td></tr>
      <tr><td style="${SresL}">Monto total</td><td style="${SresV}">${fmt(sumNeto)}</td></tr>
      <tr><td style="${SresL}">${impLbl}</td><td style="${SresV}">${fmt(sumImp)}</td></tr>
      <tr><td style="${SresL}">A pagar</td><td style="${SresV};font-weight:700">${fmt(sumPagar)}</td></tr>
      <tr><td style="${SresL}">Fecha a pagar</td><td style="${SresV}">${fechaPago}</td></tr>
    </tbody></table>
  </div>`;
}

function emailHTML(ops){
  if (!Array.isArray(ops)) ops = [ops];
  const f0 = ops[0];
  const nOrden = f0.num_orden || ('OC-' + (f0.numero_factura||f0.num_op||''));
  const fFact = fechaCL(f0.fecha_factura);
  const fin = f0.financiera || 'Autofin';
  const nums = ops.map(o=>o.num_op).join(', ');
  const docLbl = f0.es_boleta ? 'boleta' : 'factura';
  const p = 'font-size:14px;color:#374151;margin:0 0 14px;line-height:1.6';
  return `<div style="font-family:Arial,sans-serif">
    <p style="${p}">Estimado Equipo de Contabilidad:</p>
    <p style="${p}">Adjunto encontrarán <strong>Orden de Pago de Comisión N° ${nOrden}</strong> para el pago de la Comisión a <strong>${f0.nombre_dealer||''}</strong> del${ops.length>1?'os Créditos':' Crédito'} <strong>N° ${nums}</strong> otorgado${ops.length>1?'s':''} por <strong>${fin}</strong>, ${docLbl} ${f0.numero_factura?`N° <strong>${f0.numero_factura}</strong> `:''}recepcionada por AutoFácil el día <strong>${fFact}</strong>.</p>
    <p style="${p}">Les recordamos que deben marcar en el módulo de <strong>Comisión Pagada</strong>, de manera de informar al Ejecutivo y cerrar el flujo operativo de esta transacción.</p>
    ${docHTML(ops)}
    <p style="${p};margin-top:18px">Saludos cordiales,<br><strong>Área de Operaciones</strong></p>
  </div>`;
}

async function verOrden(gi){
  actual = GROUPS[gi];
  if (!actual || !actual.length) return;
  const f0 = actual[0];
  if (!f0.num_orden){
    try {
      const r = await fetch('/api/postventa/orden-pago-comision/'+f0.id+'/correlativo', { headers: hdr() });
      const j = await r.json();
      if (j.success) actual.forEach(o => o.num_orden = j.data.num_orden);
    } catch(e){}
  }
  document.getElementById('docWrap').innerHTML = emailHTML(actual);
  document.getElementById('ov').classList.add('open');
}
function cerrar(){ document.getElementById('ov').classList.remove('open'); actual=null; }

async function copiarOrden(){
  const html = document.getElementById('docWrap').innerHTML;
  const texto = document.getElementById('docWrap').innerText;
  try {
    if (navigator.clipboard && window.ClipboardItem) {
      await navigator.clipboard.write([new ClipboardItem({
        'text/html': new Blob([html], {type:'text/html'}),
        'text/plain': new Blob([texto], {type:'text/plain'}),
      })]);
    } else { await navigator.clipboard.writeText(texto); }
    toast('Orden copiada — pégala en el correo');
  } catch(e){ toast('No se pudo copiar: '+e.message); }
}

async function emitir(){
  if (!actual || !actual.length) return;
  const ids = actual.map(o => o.id);
  const nums = actual.map(o => o.num_op).join(', ');
  if (!confirm(`¿Emitir la orden de pago de comisión de la${ids.length>1?'s':''} OP ${nums}? Pasará${ids.length>1?'n':''} a Comisiones a Pagar.`)) return;
  try {
    const r = await fetch('/api/postventa/orden-pago-comision/emitir', { method:'POST', headers:hdr(), body:JSON.stringify({ ids }) });
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    DATA = DATA.filter(x => !ids.includes(x.id));
    cerrar(); render();
    toast(`Orden emitida — ${ids.length} operación(es) pasó a Comisiones a Pagar`);
  } catch(e){ toast('Error: '+e.message); }
}

document.getElementById('ov').addEventListener('click', e => { if (e.target.id==='ov') cerrar(); });

let CAN_EMITIR = false;
(async function permEmitir(){
  try {
    const admin = (yo.perfil||'') === 'Administrador';
    const [rp, ra] = await Promise.all([
      fetch('/api/auth/mis-permisos', { headers:hdr() }).then(r=>r.json()).catch(()=>({})),
      fetch('/api/postventa/atribuciones-comision', { headers:hdr() }).then(r=>r.json()).catch(()=>({})),
    ]);
    CAN_EMITIR = admin || (rp.funcionalidades||[]).includes('pv_com_orden_emitir');
    const btn = document.querySelector('.btn-emitir');
    if (btn && !CAN_EMITIR){
      btn.style.display = 'none';
      const quienes = ((ra.data && ra.data.pv_com_orden_emitir) || []).filter(p=>p!=='Administrador');
      const foot = btn.parentElement;
      const n = document.createElement('span');
      n.style.cssText = 'font-size:.78rem;color:#94a3b8;align-self:center';
      n.textContent = 'Solo pueden emitir: ' + [...new Set([...quienes,'Administrador'])].join(', ');
      foot.appendChild(n);
    }
  } catch(e){}
})();

cargar();
</script>
