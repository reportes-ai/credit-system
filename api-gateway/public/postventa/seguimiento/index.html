<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seguimiento Post Venta — AutoFácil</title>
  <!-- v2.2 -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#001345; --blue:#0141A2; }
    body { background:#f0f4f8; font-family:'Segoe UI',system-ui,sans-serif; margin:0; }
    .topnav { background:linear-gradient(90deg,#012d70,#0255c5); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:300; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--blue); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .wrap { max-width:1500px; margin:0 auto; padding:12px 24px; }
    /* filtros */
    .filtros { background:#fff; border-radius:10px; padding:7px 12px; box-shadow:0 2px 10px rgba(0,0,0,.1); margin-bottom:8px; position:sticky; top:60px; z-index:200; }
    .toggle { border:1.5px solid #cbd5e1; background:#fff; color:#475569; border-radius:9px; padding:2px 8px; font-size:.66rem; font-weight:600; cursor:pointer; margin:1px; text-align:center; vertical-align:top; line-height:1.15; }
    .toggle .tsub { display:block; font-size:.55rem; font-weight:600; color:#94a3b8; line-height:1.1; }
    .toggle.on .tsub { color:rgba(255,255,255,.85); }
    .toggle.on { background:var(--blue); border-color:var(--blue); color:#fff; }
    .toggle.fin.on { background:#0e7490; border-color:#0e7490; }
    .flbl { display:inline-block; min-width:118px; font-size:.6rem; font-weight:800; text-transform:uppercase; color:#94a3b8; margin:2px 6px 1px 2px; }
    .filtros > div { margin-bottom:1px; }
    /* card crédito */
    .cred { background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.07); margin-bottom:9px; overflow:hidden; }
    .cred-head { display:flex; flex-wrap:wrap; gap:6px 14px; padding:6px 14px; background:#f8fafc; border-bottom:1px solid #e2e8f0; font-size:.72rem; align-items:center; }
    .cred-head b { color:#0f172a; }
    .est-pill { font-size:.64rem; font-weight:800; border-radius:10px; padding:2px 8px; }
    .est-PENDIENTE { background:#fef3c7; color:#b45309; }
    .est-PARA.PAGO, .est-PARAPAGO { background:#dbeafe; color:#1d4ed8; }
    .est-PAGADO { background:#dcfce7; color:#15803d; }
    .etapas { display:grid; grid-template-columns:repeat(8,1fr); }
    .et { border-right:1px solid #f1f5f9; padding:4px 5px; text-align:center; font-size:.64rem; }
    .et:last-child { border-right:none; }
    .et .tit { font-weight:800; color:#012d70; text-transform:uppercase; font-size:.57rem; min-height:18px; line-height:1.15; }
    .et .usr { color:#64748b; min-height:12px; }
    .et input[type=checkbox] { width:14px; height:14px; cursor:pointer; accent-color:#0141A2; }
    .et .pend { color:#b45309; font-weight:700; }
    .et .fecha { color:#475569; }
    .et .dias { color:#0e7490; font-weight:700; }
    .track-lbl { background:#eef2ff; color:#012d70; font-size:.6rem; font-weight:800; padding:2px 14px; text-transform:uppercase; letter-spacing:.05em; }
  </style>
</head>
<body>
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a><span>›</span><a href="/postventa/">Post Venta</a><span>›</span><span style="color:#fff;font-weight:600">Seguimiento</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="user-chip"><div class="avatar" id="avatarInicial">?</div><div><div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div><div class="perfil-badge" id="navPerfil">—</div></div></div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="wrap">
  <div class="filtros">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
      <input type="text" id="fBuscar" placeholder="Buscar OP, RUT, dealer, ejecutivo, saldo…" oninput="render()"
        style="flex:1;max-width:520px;border:1.5px solid #e2e8f0;border-radius:7px;padding:5px 11px;font-size:.8rem">
      <button onclick="limpiarFiltros()" style="border:1.5px solid #cbd5e1;background:#fff;color:#475569;border-radius:7px;padding:5px 14px;font-size:.74rem;font-weight:700;cursor:pointer;white-space:nowrap">
        <i class="bi bi-x-circle me-1"></i>Limpiar
      </button>
    </div>
    <div>
      <span class="flbl">Mostrar:</span>
      <button class="toggle on" id="btnFiltroPagado" onclick="toggleFiltroPagado()"
        style="font-size:.7rem;padding:3px 12px">≠ Pagado <span class="tsub">Ocultar completamente pagados</span></button>
    </div>
    <div><span class="flbl">Mes Otorgamiento:</span><span id="fMeses"></span></div>
    <div><span class="flbl">Financiera:</span><span id="fFinancieras"></span></div>
    <div><span class="flbl">Etapa Saldo Precio:</span><span id="fSaldo"></span></div>
    <div><span class="flbl">Etapa Comisión:</span><span id="fComision"></span></div>
    <div id="resumen" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;padding-top:5px;border-top:1px solid #f1f5f9"></div>
    <div style="font-size:.68rem;color:#64748b;margin-top:2px" id="contador"></div>
  </div>

  <div id="lista"><div style="text-align:center;color:#94a3b8;padding:30px">Cargando…</div></div>
</div>

<script>
const token = sessionStorage.getItem('token');
const yo = JSON.parse(sessionStorage.getItem('usuario')||'null');
if (!token || !yo) location.href='/login.html';
document.getElementById('navNombre').textContent = yo.nombre+' '+(yo.apellido||'');
document.getElementById('navPerfil').textContent = yo.perfil||'';
document.getElementById('avatarInicial').textContent = (yo.nombre||'?')[0].toUpperCase();
function logout(){ sessionStorage.clear(); location.href='/login.html'; }
const H = { 'Content-Type':'application/json', Authorization:'Bearer '+token };

const fmtCLP = v => '$'+(parseInt(v)||0).toLocaleString('es-CL');
const escH = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtF = f => { if(!f) return ''; const d=new Date(f); return isNaN(d)?'':d.toLocaleDateString('es-CL'); };

let DATA = [], CFG = { etapas_saldo:[], etapas_comision:[] };
let IMPUESTOS = { IVA:19, RETENCION_HONORARIOS:15.25 };
let selFin = new Set(), selSaldo = new Set(), selCom = new Set(), selMes = new Set();
let filtroPagado = true; // por defecto oculta completamente pagados
const FINANCIERAS = ['AUTOFIN','UNIDAD DE CREDITO','AUTOFACIL'];
const MESES_N = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
const mesDe = f => { if(!f) return ''; const d=new Date(f); return isNaN(d)?'':d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); };
const mesLbl = m => MESES_N[parseInt(m.slice(5))-1]+' '+m.slice(0,4);

(async function init(){
  try { await fetch('/api/postventa/sync',             { method:'POST', headers:H }); } catch(e) {}
  try { await fetch('/api/postventa/marcar-historico', { method:'POST', headers:H }); } catch(e) {}
  const [rD, rC, rI] = await Promise.all([
    fetch('/api/postventa', { headers:H }),
    fetch('/api/postventa/config', { headers:H }),
    fetch('/api/impuestos/valores', { headers:H }),
  ]);
  const jD = await rD.json(), jC = await rC.json();
  try { const jI = await rI.json(); if (jI.success && jI.data) IMPUESTOS = Object.assign(IMPUESTOS, jI.data); } catch(e){}
  DATA = jD.data || [];
  if (jC.data) CFG = { etapas_saldo: jC.data.etapas_saldo||[], etapas_comision: jC.data.etapas_comision||[] };
  renderFiltros();
  render();
})();

function esPagado(r){
  return estadoDe(etapaActual(r,'SALDO'),'SALDO') === 'PAGADO'
      && estadoDe(etapaActual(r,'COMISION'),'COMISION') === 'PAGADO';
}
function limpiarFiltros(){
  document.getElementById('fBuscar').value = '';
  selFin.clear(); selSaldo.clear(); selCom.clear(); selMes.clear();
  renderFiltros(); render();
}
function toggleFiltroPagado(){
  filtroPagado = !filtroPagado;
  const btn = document.getElementById('btnFiltroPagado');
  btn.classList.toggle('on', filtroPagado);
  renderFiltros(); render();
}

/* etapa actual = última marcada según el orden de la config */
function etapaActual(r, track){
  const lista = (track==='SALDO'?CFG.etapas_saldo:CFG.etapas_comision).map(x=>x.etapa);
  const marcadas = new Set(r.etapas.filter(e=>e.track===track).map(e=>e.etapa));
  let actual = null;
  lista.forEach(et => { if (marcadas.has(et)) actual = et; });
  return actual;
}
function estadoDe(etapa, track){
  const lista = track==='SALDO'?CFG.etapas_saldo:CFG.etapas_comision;
  return lista.find(x=>x.etapa===etapa)?.estado || 'PENDIENTE';
}

function renderFiltros(){
  const mk = (cont, items, set, cls, lblFn) => {
    document.getElementById(cont).innerHTML = items.map(i =>
      `<button class="toggle ${cls}${set.has(i)?' on':''}" data-v="${escH(i)}">${escH(lblFn?lblFn(i):i)}<span class="tsub" data-sub="${escH(i)}"></span></button>`).join('');
    document.getElementById(cont).querySelectorAll('.toggle').forEach(b=>{
      b.addEventListener('click', ()=>{
        const v=b.dataset.v;
        set.has(v)?set.delete(v):set.add(v);
        b.classList.toggle('on');
        render();
      });
    });
  };
  const fins = [...new Set([...FINANCIERAS, ...DATA.map(r=>String(r.financiera||'').toUpperCase()).filter(Boolean)])];
  // Solo meses que tienen al menos un registro no completamente pagado
  const todosLosMeses = [...new Set(DATA.map(r=>mesDe(r.fecha_otorgado)).filter(Boolean))].sort().reverse();
  const meses = todosLosMeses.filter(m => DATA.some(r => mesDe(r.fecha_otorgado) === m && !esPagado(r)));
  // Limpiar selección de meses que ya no están visibles
  selMes.forEach(m => { if (!meses.includes(m)) selMes.delete(m); });
  mk('fMeses', meses, selMes, '', mesLbl);
  mk('fFinancieras', fins, selFin, 'fin');
  mk('fSaldo', CFG.etapas_saldo.map(x=>x.etapa), selSaldo, '');
  mk('fComision', CFG.etapas_comision.map(x=>x.etapa), selCom, '');
}

/* skip = dimensión a ignorar (para calcular los totales de sus propios toggles) */
function filtrar(skip){
  const q = (document.getElementById('fBuscar').value||'').toLowerCase();
  return DATA.filter(r => {
    if (filtroPagado && skip!=='pagado' && esPagado(r)) return false;
    if (skip!=='mes' && selMes.size && !selMes.has(mesDe(r.fecha_otorgado))) return false;
    if (skip!=='fin' && selFin.size && !selFin.has(String(r.financiera||'').toUpperCase())) return false;
    if (skip!=='saldo' && selSaldo.size && !selSaldo.has(etapaActual(r,'SALDO'))) return false;
    if (skip!=='com' && selCom.size && !selCom.has(etapaActual(r,'COMISION'))) return false;
    if (q && ![r.num_op, r.nombre_dealer, r.rut_dealer, r.ejecutivo, r.financiera,
               String(r.saldo_precio), String(r.comision)].some(v=>String(v||'').toLowerCase().includes(q))) return false;
    return true;
  });
}

function setSubs(cont, agg, montoLbl){
  document.querySelectorAll('#'+cont+' .tsub').forEach(el=>{
    const a = agg[el.dataset.sub];
    el.textContent = a ? a.n+' ops · '+fmtCLP(a.s) : '0 ops';
  });
}
function aggPor(rows, keyFn, montoFn){
  const agg = {};
  rows.forEach(r => {
    const k = keyFn(r); if(!k) return;
    (agg[k] = agg[k]||{n:0,s:0}); agg[k].n++; agg[k].s += +montoFn(r)||0;
  });
  return agg;
}

const COLORES_EST = { PENDIENTE:{ bg:'#fef3c7',color:'#b45309' }, 'PARA PAGO':{ bg:'#dbeafe',color:'#1d4ed8' }, PAGADO:{ bg:'#dcfce7',color:'#15803d' } };
function render(){
  const rows = filtrar();
  document.getElementById('contador').textContent = rows.length + ' crédito(s)';
  // totales dentro de cada toggle
  setSubs('fMeses',       aggPor(filtrar('mes'),   r=>mesDe(r.fecha_otorgado),                  r=>r.saldo_precio));
  setSubs('fFinancieras', aggPor(filtrar('fin'),   r=>String(r.financiera||'').toUpperCase(),   r=>r.saldo_precio));
  setSubs('fSaldo',       aggPor(filtrar('saldo'), r=>etapaActual(r,'SALDO'),                   r=>r.saldo_precio));
  setSubs('fComision',    aggPor(filtrar('com'),   r=>etapaActual(r,'COMISION'),                r=>r.comision));

  // Resumen por estado (usando filtrar() sin skip de pagado para mostrar totales reales)
  const resData = filtrar('pagado'); // respeta todos los filtros activos excepto pagado
  const grp = {};
  resData.forEach(r => {
    const estS = estadoDe(etapaActual(r,'SALDO'),'SALDO') || 'PENDIENTE';
    const estC = estadoDe(etapaActual(r,'COMISION'),'COMISION') || 'PENDIENTE';
    // Para el resumen usamos el estado "peor" del registro (si uno es pendiente, el registro es pendiente)
    const est = estS === 'PENDIENTE' || estC === 'PENDIENTE' ? 'PENDIENTE'
              : estS === 'PARA PAGO' || estC === 'PARA PAGO' ? 'PARA PAGO' : 'PAGADO';
    grp[est] = grp[est] || { n:0, saldo:0, comision:0 };
    grp[est].n++; grp[est].saldo += +r.saldo_precio||0; grp[est].comision += +r.comision||0;
  });
  const ORDEN = ['PENDIENTE','PARA PAGO','PAGADO'];
  document.getElementById('resumen').innerHTML = ORDEN.filter(e=>grp[e]).map(e => {
    const g = grp[e]; const c = COLORES_EST[e]||{bg:'#f1f5f9',color:'#475569'};
    return `<div style="background:${c.bg};color:${c.color};border-radius:8px;padding:3px 10px;font-size:.66rem;font-weight:700">
      <span style="font-size:.72rem">${escH(e)}</span>
      <span style="margin:0 8px;font-weight:400;opacity:.8">|</span>
      ${g.n} ops
      <span style="margin:0 4px;opacity:.6">·</span>
      SP: ${fmtCLP(g.saldo)}
      <span style="margin:0 4px;opacity:.6">·</span>
      Com: ${fmtCLP(g.comision)}
    </div>`;
  }).join('');

  const lista = document.getElementById('lista');
  if (!rows.length) { lista.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:30px">Sin créditos para los filtros</div>'; return; }
  lista.innerHTML = rows.map(r => credHTML(r)).join('');
}

function credHTML(r){
  const estS = estadoDe(etapaActual(r,'SALDO'), 'SALDO');
  const estC = estadoDe(etapaActual(r,'COMISION'), 'COMISION');
  return `<div class="cred">
    <div class="cred-head">
      <span>OP <b>${escH(r.num_op||'')}</b></span>
      <span>${escH(r.financiera||'')}</span>
      <span>Dealer: <b>${escH(r.nombre_dealer||'—')}</b>${r.rut_dealer?' ('+escH(r.rut_dealer)+')':''}</span>
      <span>Ejecutivo: ${escH(r.ejecutivo||'—')}</span>
      <span>Otorgado: ${fmtF(r.fecha_otorgado)}</span>
      <span>Saldo precio: <b>${fmtCLP(r.saldo_precio)}</b> <span class="est-pill est-${escH(estS).replace(' ','')}">${escH(estS)}</span></span>
      <span>Comisión: <b>${fmtCLP(r.comision)}</b> <span class="est-pill est-${escH(estC).replace(' ','')}">${escH(estC)}</span></span>
    </div>
    <div class="track-lbl">Saldo Precio</div>
    <div class="etapas">${trackHTML(r,'SALDO',CFG.etapas_saldo)}</div>
    <div class="track-lbl">Comisión</div>
    <div class="etapas">${trackHTML(r,'COMISION',CFG.etapas_comision)}</div>
  </div>`;
}

function trackHTML(r, track, lista){
  const marc = {};
  r.etapas.filter(e=>e.track===track).forEach(e=>marc[e.etapa]=e);

  // Índice de la última etapa marcada
  let lastIdx = -1;
  lista.forEach((x,i) => { if (marc[x.etapa]) lastIdx = i; });

  const esAdmin = yo.perfil === 'Administrador';
  const hoy = new Date().toISOString().slice(0,10);

  let fechaPrev = r.fecha_otorgado ? new Date(r.fecha_otorgado) : null;
  return lista.map((x,i) => {
    const m = marc[x.etapa];
    const esSistema = i === 0;

    // Etapas automáticas: se marcan desde sus módulos (Emisión Orden de Pago /
    // Saldos Precios a Pagar). No se marcan ni desmarcan a mano en Seguimiento.
    const esAuto = track==='SALDO' && ['ORDEN DE PAGO EMITIDA','ENVIADO A PAGO','SALDO PRECIO PAGADO'].includes(x.etapa);

    // ¿Puede marcar? Etapa anterior debe estar marcada
    const prevMarcado = i === 0 || !!marc[lista[i-1].etapa];
    const canMark = !esAuto && !m && !esSistema && prevMarcado;

    // ¿Puede desmarcar? Debe ser la última y marcada hoy (o admin)
    const esHoy = m && new Date(m.fecha).toISOString().slice(0,10) === hoy;
    const canUnmark = !esAuto && m && !esSistema && i === lastIdx && (esAdmin || esHoy);

    const disabled = esAuto || esSistema || (!m && !canMark) || (m && !canUnmark) ? 'disabled' : '';
    let title = '';
    if (esAuto) title = x.etapa==='ORDEN DE PAGO EMITIDA'
      ? 'Se marca automáticamente al emitir la orden en "Emisión Orden de Pago"'
      : x.etapa==='ENVIADO A PAGO'
      ? 'Se marca al presionar "Enviar a Pago" en "Saldos Precios a Pagar"'
      : 'Se marca automáticamente al registrar el pago en "Saldos Precios a Pagar"';
    else if (!esSistema && !m && !canMark)   title = `Debes marcar primero "${lista[i-1]?.etapa}"`;
    else if (!esSistema && m && !canUnmark) title = esAdmin ? '' : (esHoy ? 'Solo puedes desmarcar la última etapa' : 'Solo puedes desmarcar etapas marcadas hoy');

    let dias = '';
    if (m && fechaPrev) {
      const d = Math.round((new Date(m.fecha) - fechaPrev)/86400000);
      dias = `<div class="dias">${d} día${d===1?'':'s'}</div>`;
    }
    if (m) fechaPrev = new Date(m.fecha);
    return `<div class="et">
      <div class="tit">${escH(x.etapa)}</div>
      <div class="usr">${m?escH(m.usuario||''):''}</div>
      <div>
        <input type="checkbox" ${m?'checked':''} ${disabled} title="${escH(title)}"
          onchange="toggleEtapa(${r.id},'${track}','${escH(x.etapa)}',this)">
        ${!m?`<span class="pend">${canMark?'Pendiente':'🔒'}</span>`:''}
        ${(esAuto && x.etapa==='SALDO PRECIO PAGADO' && m && esAdmin)?`<button onclick="revertirPago(${r.id})" title="Revertir pago (con motivo, Administrador)" style="display:block;margin:3px auto 0;background:#fff1f2;color:#b91c1c;border:1px solid #fecaca;border-radius:6px;padding:1px 7px;font-size:.68rem;font-weight:700;cursor:pointer">↶ Revertir</button>`:''}
        ${(track==='COMISION' && x.etapa==='FACTURA RECIBIDA' && m)?`<button onclick="editarFactura(${r.id})" title="Ver / editar datos de la factura" style="display:block;margin:3px auto 0;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:6px;padding:1px 7px;font-size:.68rem;font-weight:700;cursor:pointer">✎ Factura</button>`:''}
      </div>
      <div class="fecha">${m?fmtF(m.fecha):''}</div>
      ${dias}
    </div>`;
  }).join('');
}

async function revertirPago(id){
  const motivo = prompt('Motivo de la reversa del pago (queda registrado para auditoría):');
  if (motivo === null) return;
  if (!motivo.trim()) { alert('Debes indicar un motivo.'); return; }
  try {
    const r = await fetch('/api/postventa/saldos-a-pagar/desmarcar', { method:'POST', headers:H,
      body: JSON.stringify({ ids:[id], motivo }) });
    const j = await r.json();
    if (!j.success) { alert(j.error||'Error'); return; }
    if (j.data && j.data.desmarcados === 0) { alert('No había pago que revertir.'); return; }
    const row = DATA.find(x=>x.id===id);
    if (row) row.etapas = row.etapas.filter(e=>!(e.track==='SALDO' && e.etapa==='SALDO PRECIO PAGADO'));
    render();
  } catch(e) { alert('Error de conexión'); }
}

/* ════════ Modal Factura Recibida (Comisión) ════════ */
let FC = { id:null, chk:null, terceros:false, boleta:false, rut:'', nombre:'', num_op:null };
const _fc = id => document.getElementById(id);
function abrirModalFactura(id, chk){
  const r = DATA.find(x => x.id === id) || {};
  FC = { id, chk, modo:'marcar', terceros:false, boleta:false, rut:r.rut_dealer||'', nombre:r.nombre_dealer||'', num_op:r.num_op||null };
  _fc('fcRut').value = FC.rut;       _fc('fcRut').disabled = false;
  _fc('fcNombre').value = FC.nombre; _fc('fcNombre').disabled = false;
  _fc('fcFecha').value = new Date().toISOString().slice(0,10);
  _fc('fcNumero').value = '';
  _fc('fcMonto').value = ''; _fc('fcMonto').dataset.raw = '';
  _fcSetExc('fcBtnTerceros', false); _fcSetExc('fcBtnBoleta', false);
  _fc('fcAlert').style.display = 'none';
  fcBoletaInfo();
  document.getElementById('modalFactura').showModal();
}
function _fcSetExc(btnId, on){
  const b = document.getElementById(btnId);
  b.style.background = on ? '#0141A2' : '#eef2f7';
  b.style.color = on ? '#fff' : '#334155';
}
function fcToggleTerceros(){
  FC.terceros = !FC.terceros; _fcSetExc('fcBtnTerceros', FC.terceros);
  if (FC.terceros){ _fc('fcRut').value=''; _fc('fcNombre').value=''; _fc('fcRut').disabled=true; _fc('fcNombre').disabled=true; }
  else { _fc('fcRut').value=FC.rut; _fc('fcNombre').value=FC.nombre; _fc('fcRut').disabled=false; _fc('fcNombre').disabled=false; }
}
function fcToggleBoleta(){ FC.boleta = !FC.boleta; _fcSetExc('fcBtnBoleta', FC.boleta); fcBoletaInfo(); }
function fcBoletaInfo(){
  const box = _fc('fcBoleta');
  const bruto = parseInt(_fc('fcMonto').dataset.raw||'')||0;   // monto bruto de la factura (con IVA)
  if (!FC.boleta || !bruto){ box.style.display='none'; return; }
  const iva = Number(IMPUESTOS.IVA)||19, ret = Number(IMPUESTOS.RETENCION_HONORARIOS)||15.25;
  const boletaBruto = Math.round(bruto / (1 + iva/100));   // líquido de la factura = bruto de la boleta
  const retencion = Math.round(boletaBruto * ret/100);
  const depositar = boletaBruto - retencion;
  const clp = n => '$'+(n||0).toLocaleString('es-CL');
  box.innerHTML = `⚠ Al cambiar a <b>Boleta</b>: el monto de la Boleta es <b>${clp(boletaBruto)}</b>, la retención (${ret}%) es <b>${clp(retencion)}</b> y el monto a depositar es <b>${clp(depositar)}</b>.`;
  box.style.display = 'block';
}
function editarFactura(id){
  const r = DATA.find(x => x.id === id) || {};
  FC = { id, chk:null, modo:'editar', terceros:!!r.fac_terceros, boleta:!!r.fac_boleta, rut:r.rut_dealer||'', nombre:r.nombre_dealer||'', num_op:r.num_op||null };
  _fc('fcRut').value = r.fac_terceros ? '' : (r.rut_dealer||'');       _fc('fcRut').disabled = !!r.fac_terceros;
  _fc('fcNombre').value = r.fac_terceros ? '' : (r.nombre_dealer||''); _fc('fcNombre').disabled = !!r.fac_terceros;
  _fc('fcFecha').value = r.fac_fecha ? String(r.fac_fecha).slice(0,10) : '';
  _fc('fcNumero').value = r.fac_numero || '';
  const m = r.fac_monto || ''; _fc('fcMonto').value = m ? '$'+parseInt(m).toLocaleString('es-CL') : ''; _fc('fcMonto').dataset.raw = m ? String(m) : '';
  _fcSetExc('fcBtnTerceros', !!r.fac_terceros); _fcSetExc('fcBtnBoleta', !!r.fac_boleta);
  _fc('fcAlert').style.display = 'none';
  fcBoletaInfo();
  document.getElementById('modalFactura').showModal();
}
function fcMoneyFmt(el){ const n = el.value.replace(/\D/g,''); el.dataset.raw = n; el.value = n ? '$'+parseInt(n).toLocaleString('es-CL') : ''; fcBoletaInfo(); }
function fcCancelar(){ document.getElementById('modalFactura').close(); if (FC.chk) FC.chk.checked = false; FC = {id:null,chk:null}; }
async function fcGuardar(){
  const fecha = _fc('fcFecha').value, numero = _fc('fcNumero').value.trim(), monto = parseInt(_fc('fcMonto').dataset.raw||'')||0;
  const al = _fc('fcAlert');
  if (!fecha || !numero || !monto){ al.textContent='Completa fecha, N° de factura y monto bruto.'; al.style.display='block'; return; }
  if (FC.terceros || FC.boleta){
    if (!confirm('Al grabar, el usuario certifica que se autorizó la emisión de una Boleta en vez de Factura y/o la emisión de la Boleta/Factura por un tercero.\n\n¿Confirmas?')) return;
  }
  const factura = { num_op:FC.num_op, rut_dealer:_fc('fcRut').value.trim()||null, nombre_dealer:_fc('fcNombre').value.trim()||null,
    fecha_factura:fecha, numero_factura:numero, monto_bruto:monto, es_terceros:FC.terceros?1:0, es_boleta:FC.boleta?1:0 };
  const editar = FC.modo === 'editar';
  const url = editar ? '/api/postventa/'+FC.id+'/factura-comision' : '/api/postventa/'+FC.id+'/etapa';
  const payload = editar ? factura : { track:'COMISION', etapa:'FACTURA RECIBIDA', marcar:1, factura };
  try {
    const r = await fetch(url, { method:'PUT', headers:H, body: JSON.stringify(payload) });
    const j = await r.json();
    if (!j.success){ al.textContent=j.error||'Error'; al.style.display='block'; return; }
    const row = DATA.find(x=>x.id===FC.id);
    if (row){
      if (!editar){ row.etapas = row.etapas.filter(e=>!(e.track==='COMISION'&&e.etapa==='FACTURA RECIBIDA'));
        row.etapas.push({ id_seguimiento:FC.id, track:'COMISION', etapa:'FACTURA RECIBIDA', usuario:(j.data&&j.data.usuario)||'', fecha:new Date().toISOString() }); }
      row.fac_fecha=fecha; row.fac_numero=numero; row.fac_monto=monto; row.fac_terceros=factura.es_terceros; row.fac_boleta=factura.es_boleta;
    }
    document.getElementById('modalFactura').close(); FC = {id:null,chk:null}; render();
  } catch(e){ al.textContent='Error de conexión'; al.style.display='block'; }
}

async function toggleEtapa(id, track, etapa, chk){
  if (chk.checked && track === 'COMISION' && etapa === 'FACTURA RECIBIDA') { abrirModalFactura(id, chk); return; }
  chk.disabled = true;
  try {
    const r = await fetch('/api/postventa/'+id+'/etapa', { method:'PUT', headers:H,
      body: JSON.stringify({ track, etapa, marcar: chk.checked ? 1 : 0 }) });
    const j = await r.json();
    if (!j.success) { alert(j.error||'Error'); chk.checked = !chk.checked; return; }
    const row = DATA.find(x=>x.id===id);
    if (row) {
      row.etapas = row.etapas.filter(e=>!(e.track===track && e.etapa===etapa));
      if (chk.checked) row.etapas.push({ id_seguimiento:id, track, etapa, usuario:j.data.usuario, fecha:new Date().toISOString() });
    }
    render();
  } catch(e) { alert('Error de conexión'); chk.checked = !chk.checked; }
  finally { chk.disabled = false; }
}
</script>

<style>
  #modalFactura { border:none; border-radius:14px; padding:0; max-width:460px; width:92%; box-shadow:0 20px 60px rgba(0,0,0,.3); }
  #modalFactura::backdrop { background:rgba(0,0,0,.45); }
  #modalFactura label { display:block; font-size:.78rem; font-weight:600; color:#374151; }
  #modalFactura input { width:100%; margin-top:3px; border:1.5px solid #d1d5db; border-radius:8px; padding:8px 10px; font-size:.88rem; box-sizing:border-box; outline:none; }
  #modalFactura input:focus { border-color:#0141A2; }
  #modalFactura input:disabled { background:#f1f5f9; color:#94a3b8; }
</style>
<dialog id="modalFactura">
  <div style="background:linear-gradient(135deg,#012d70,#0141A2);color:#fff;padding:15px 20px;display:flex;align-items:center;gap:10px">
    <i class="bi bi-receipt" style="font-size:1.25rem"></i>
    <h6 style="margin:0;font-weight:700;font-size:1rem">Factura Recibida — Comisión</h6>
  </div>
  <div style="padding:18px 20px">
    <div id="fcAlert" style="display:none;background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:8px;padding:8px 12px;font-size:.82rem;margin-bottom:12px"></div>
    <div id="fcBoleta" style="display:none;background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:8px;padding:9px 12px;font-size:.82rem;margin-bottom:12px;line-height:1.5"></div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button type="button" id="fcBtnTerceros" onclick="fcToggleTerceros()" style="flex:1;border:1px solid #cbd5e1;background:#eef2f7;color:#334155;border-radius:8px;padding:8px;font-size:.82rem;font-weight:700;cursor:pointer">Factura de terceros</button>
      <button type="button" id="fcBtnBoleta" onclick="fcToggleBoleta()" style="flex:1;border:1px solid #cbd5e1;background:#eef2f7;color:#334155;border-radius:8px;padding:8px;font-size:.82rem;font-weight:700;cursor:pointer">Boleta</button>
    </div>
    <div style="display:grid;gap:11px">
      <label>RUT Dealer<input id="fcRut" type="text"></label>
      <label>Nombre Dealer<input id="fcNombre" type="text"></label>
      <label>Fecha factura<input id="fcFecha" type="date"></label>
      <label>N° Factura<input id="fcNumero" type="text"></label>
      <label>Monto Bruto<input id="fcMonto" type="text" inputmode="numeric" placeholder="$0" oninput="fcMoneyFmt(this)"></label>
    </div>
  </div>
  <div style="padding:12px 20px;border-top:1px solid #eef2f7;display:flex;justify-content:flex-end;gap:10px">
    <button type="button" onclick="fcCancelar()" style="background:#f1f5f9;color:#374151;border:none;border-radius:8px;padding:8px 18px;font-weight:600;cursor:pointer">Cancelar</button>
    <button type="button" onclick="fcGuardar()" style="background:#0141A2;color:#fff;border:none;border-radius:8px;padding:8px 20px;font-weight:700;cursor:pointer">Guardar</button>
  </div>
</dialog>
<script src="/js/app-version.js"></script>
</body>
