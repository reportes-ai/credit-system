<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colaboradores — AutoFácil</title>
  <!-- v1.4 — flag no_mostrar propio (sin pisar contrato) + apertura directa ?id= -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; } .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; } .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; color:#fff; font-size:.85rem; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .main { padding:24px 28px; max-width:1360px; margin:0 auto; }
    .banner { background:linear-gradient(135deg,#012d70,#0141A2 55%,#009AFE); border-radius:16px; color:#fff; padding:20px 28px; margin-bottom:18px; display:flex; align-items:center; gap:16px; }
    .banner i { font-size:2.2rem; opacity:.85; } .banner h2 { font-weight:700; margin:0; font-size:1.2rem; } .banner p { margin:2px 0 0; opacity:.85; font-size:.85rem; }
    .panel { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); padding:16px 20px; margin-bottom:16px; }
    table { width:100%; border-collapse:collapse; font-size:.83rem; }
    th { background:#f8fafc; color:#475569; font-size:.7rem; text-transform:uppercase; padding:8px 10px; text-align:left; border-bottom:2px solid #e2e8f0; white-space:nowrap; }
    td { padding:7px 10px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    tr.filac:hover td { background:#f8fafc; cursor:pointer; }
    .pill { border-radius:10px; padding:2px 9px; font-size:.7rem; font-weight:700; }
    .pill.activo { background:#dcfce7; color:#15803d; } .pill.inactivo { background:#fee2e2; color:#b91c1c; }
    .tag { background:#e0e7ff; color:#3730a3; border-radius:6px; padding:2px 8px; font-size:.7rem; font-weight:700; }
    .empty { text-align:center; color:#9ca3af; padding:26px 0; }
    dialog { border:none; border-radius:16px; padding:0; box-shadow:0 20px 60px rgba(0,0,0,.3); max-width:940px; width:96%; }
    dialog::backdrop { background:rgba(15,23,42,.55); }
    .dlg-head { background:linear-gradient(135deg,#012d70,#0255c5); color:#fff; padding:14px 20px; font-weight:700; display:flex; justify-content:space-between; align-items:center; }
    .dlg-body { padding:16px 20px; max-height:72vh; overflow-y:auto; }
    .dlg-foot { padding:12px 20px; border-top:1px solid #eef2f7; display:flex; justify-content:flex-end; gap:10px; }
    .sec { font-size:.72rem; font-weight:800; text-transform:uppercase; color:#0141A2; margin:14px 0 8px; border-bottom:1px solid #eef2f7; padding-bottom:4px; }
    .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px 16px; } @media(max-width:760px){ .grid3{grid-template-columns:1fr;} }
    .fld label { font-size:.66rem; font-weight:700; text-transform:uppercase; color:#94a3b8; display:block; margin-bottom:2px; }
    .fld input, .fld select { width:100%; border:1.5px solid #e2e8f0; border-radius:8px; padding:6px 10px; font-size:.84rem; box-sizing:border-box; }
    .btn-navy { background:var(--navy); color:#fff; border:none; border-radius:9px; padding:8px 18px; font-weight:700; font-size:.85rem; cursor:pointer; }
    .btn-ghost { background:#fff; border:1.5px solid #d1d5db; color:#374151; border-radius:9px; padding:8px 14px; font-weight:600; font-size:.85rem; cursor:pointer; }
    .btn-mini { border:none; border-radius:7px; padding:4px 10px; font-size:.74rem; font-weight:700; cursor:pointer; }
    .btn-mini.del { background:#fee2e2; color:#b91c1c; }
    .toast { position:fixed; top:70px; right:20px; background:#16a34a; color:#fff; padding:12px 18px; border-radius:9px; font-weight:600; font-size:.86rem; z-index:3000; display:none; }
  </style>
</head>
<body>
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a> › <a href="/recursos-humanos/">Recursos Humanos</a> › <span style="color:#fff;font-weight:600"><i class="bi bi-people me-1"></i>Colaboradores</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px"><span class="user-chip" id="navNombre">—</span><button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button></div>
</nav>

<div class="main">
  <div class="banner"><i class="bi bi-people"></i><div><h2>Colaboradores</h2><p>Fichas del equipo: datos laborales, previsión, sueldo base, cuenta de pago y carpeta digital.</p></div></div>
  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;flex-wrap:wrap">
      <div style="font-weight:700;color:#012d70" id="resumen">—</div>
      <input id="q" placeholder="Buscar nombre, RUT, cargo…" oninput="render()" style="border:1.5px solid #d1d5db;border-radius:8px;padding:7px 12px;font-size:.85rem;width:300px;max-width:60%">
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Colaborador</th><th>RUT</th><th>Cargo</th><th>Ingreso</th><th>Contrato</th><th>AFP</th><th>Salud</th><th>Docs</th><th>Estado</th></tr></thead>
        <tbody id="tb"><tr><td colspan="9" class="empty">Cargando…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal ficha -->
<dialog id="dlg">
  <div class="dlg-head"><span id="dTitulo">Ficha</span><button class="btn-ghost" style="padding:4px 10px" onclick="dlg.close()"><i class="bi bi-x-lg"></i></button></div>
  <div class="dlg-body" id="dBody"></div>
  <div class="dlg-foot">
    <button class="btn-ghost" onclick="dlg.close()">Cerrar</button>
    <button class="btn-navy" onclick="guardarFicha()"><i class="bi bi-check2 me-1"></i>Guardar ficha</button>
  </div>
</dialog>
<div class="toast" id="toast"></div>

<script src="/js/auth-guard.js"></script>
<script>
const token = sessionStorage.getItem('token'), yo = JSON.parse(sessionStorage.getItem('usuario')||'null');
if (!token||!yo) location.href='/login.html';
document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
function logout(){ sessionStorage.clear(); location.href='/login.html'; }
(async()=>{ if (yo?.perfil==='Administrador') return; let ok=false;
  try { const j = await fetch('/api/auth/mis-permisos?_='+Date.now(),{headers:{Authorization:'Bearer '+token}}).then(r=>r.json());
    ok = (j.funcionalidades||[]).some(c=>['rh_colaboradores','rh_aprobar'].includes(c)); } catch(e){}
  if (!ok) { alert('Acceso restringido'); location.href='/recursos-humanos/'; } })();

const H = { Authorization:'Bearer '+token }, HJ = { ...H, 'Content-Type':'application/json' };
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;');
const fD = s => s ? new Date(String(s).slice(0,10)+'T12:00:00').toLocaleDateString('es-CL') : '—';
const iso = s => s ? String(s).slice(0,10) : '';
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2600); }
const dlg = document.getElementById('dlg');

let DATA = [], FICHA = null;
async function cargar(){
  const j = await (await fetch('/api/rrhh/colaboradores', { headers:H })).json();
  if (!j.success) { document.getElementById('tb').innerHTML = `<tr><td colspan="9" class="empty">${esc(j.error)}</td></tr>`; return; }
  DATA = j.data || []; render();
}
function render(){
  const q = (document.getElementById('q').value||'').toLowerCase();
  const rows = DATA.filter(r => !q || [r.nombre,r.rut,r.cargo,r.perfil].some(v=>String(v||'').toLowerCase().includes(q)));
  const activos = DATA.filter(r=>r.estado==='activo').length;
  document.getElementById('resumen').textContent = `${activos} colaboradores activos · ${DATA.length} en total`;
  document.getElementById('tb').innerHTML = rows.length ? rows.map(r=>`<tr class="filac" onclick="abrir(${r.id_usuario})">
    <td style="font-weight:600">${esc(r.nombre)}</td><td>${esc(r.rut||'—')}</td><td>${esc(r.cargo||'—')}</td>
    <td>${fD(r.fecha_ingreso)}</td><td>${r.tipo_contrato?`<span class="tag">${esc(r.tipo_contrato)}</span>`:'—'}</td>
    <td>${esc(r.afp||'—')}</td><td>${esc(r.salud||'—')}</td>
    <td>${r.docs>0?`<b>${r.docs}</b> 📄`:'—'}</td>
    <td><span class="pill ${r.estado==='activo'?'activo':'inactivo'}">${esc(r.estado)}</span></td>
  </tr>`).join('') : '<tr><td colspan="9" class="empty">Sin resultados.</td></tr>';
}

// req=true marca el campo como OBLIGATORIO (lo exige el archivo Previred / LRE)
const REQ = '<span style="color:#dc2626;font-weight:800" title="Obligatorio para Previred"> *</span>';
const inp = (id, lbl, val, type='text', req) => `<div class="fld"><label>${lbl}${req?REQ:''}</label><input id="${id}" type="${type}" value="${esc(val==null?'':val)}" ${req&&(val==null||val==='')?'style="border-color:#fca5a5"':''}></div>`;
const sel = (id, lbl, val, ops, req) => `<div class="fld"><label>${lbl}${req?REQ:''}</label><select id="${id}" ${req&&!val?'style="border-color:#fca5a5"':''}><option value=""></option>${ops.map(o=>`<option${o===val?' selected':''}>${o}</option>`).join('')}</select></div>`;

async function abrir(id){
  const j = await (await fetch('/api/rrhh/ficha/'+id, { headers:H })).json();
  if (!j.success) return alert(j.error||'Error');
  FICHA = j.data;
  const u = FICHA.usuario, f = FICHA.ficha || {};
  document.getElementById('dTitulo').textContent = [u.nombre,u.apellido,u.apellido_materno].filter(Boolean).join(' ') + (u.rut?' · '+u.rut:'');
  document.getElementById('dBody').innerHTML = `
    <div class="sec">Datos laborales</div>
    <div class="grid3">
      ${inp('f_cargo','Cargo',u.cargo)}
      ${inp('f_fecha_ingreso','Fecha de ingreso',iso(u.fecha_ingreso),'date',1)}
      ${inp('f_centro_costo','Centro de costo',u.centro_costo)}
      ${sel('f_tipo_contrato','Tipo de contrato',f.tipo_contrato,['INDEFINIDO','PLAZO FIJO','HONORARIOS','PRACTICA'],1)}
      ${sel('f_jornada','Jornada',f.jornada,['COMPLETA','PARCIAL'],1)}
      ${inp('f_telefono','Teléfono corporativo',u.telefono)}
    </div>
    <div class="sec">Datos personales</div>
    <div class="grid3">
      ${inp('f_fecha_nacimiento','Fecha de nacimiento',iso(u.fecha_nacimiento),'date')}
      ${sel('f_sexo','Sexo',u.sexo,['M','F'],1)}
      ${sel('f_estado_civil','Estado civil',f.estado_civil,['SOLTERO/A','CASADO/A','CONVIVIENTE CIVIL','DIVORCIADO/A','VIUDO/A'])}
      ${inp('f_nacionalidad','Nacionalidad',f.nacionalidad,'text',1)}
      ${inp('f_direccion','Dirección',f.direccion)}
      ${inp('f_comuna','Comuna',f.comuna)}
      ${inp('f_ciudad','Ciudad',f.ciudad)}
      ${inp('f_email_personal','Email personal',f.email_personal)}
      ${inp('f_telefono_personal','Teléfono personal',f.telefono_personal)}
    </div>
    <div class="sec">Cónyuge / conviviente</div>
    <div class="grid3">
      ${inp('f_conyuge_nombre','Nombre',f.conyuge_nombre)}
      ${inp('f_conyuge_rut','RUT',f.conyuge_rut)}
      ${inp('f_conyuge_telefono','Teléfono',f.conyuge_telefono)}
      <div class="fld" style="grid-column:span 2"><label>Dirección</label>
        <input id="f_conyuge_direccion" value="${esc(f.conyuge_misma_dir?'':(f.conyuge_direccion||''))}" ${f.conyuge_misma_dir?'disabled placeholder="(misma dirección del colaborador)"':''}></div>
      <div class="fld" style="display:flex;align-items:end;padding-bottom:6px">
        <label style="display:flex;align-items:center;gap:7px;margin:0;font-size:.78rem;text-transform:none;color:#334155;cursor:pointer">
          <input type="checkbox" id="f_conyuge_misma_dir" style="width:auto" ${f.conyuge_misma_dir?'checked':''}
            onchange="const d=document.getElementById('f_conyuge_direccion'); d.disabled=this.checked; d.placeholder=this.checked?'(misma dirección del colaborador)':''; if(this.checked)d.value='';">
          Misma dirección particular del colaborador
        </label>
      </div>
    </div>
    <div class="sec">Hijos <button class="btn-ghost" style="padding:2px 10px;font-size:.74rem;margin-left:8px" onclick="agregarHijo()"><i class="bi bi-plus-lg me-1"></i>Agregar hijo</button></div>
    <div id="hijosBox"></div>
    <div class="sec">Contactos de emergencia</div>
    <div class="grid3">
      ${inp('f_emergencia_nombre','Contacto 1 — nombre',f.emergencia_nombre)}
      ${inp('f_emergencia_fono','Contacto 1 — fono',f.emergencia_fono)}
      <div></div>
      ${inp('f_emergencia2_nombre','Contacto 2 — nombre',f.emergencia2_nombre)}
      ${inp('f_emergencia2_fono','Contacto 2 — fono',f.emergencia2_fono)}
    </div>
    <div class="sec">Previsión y pago (confidencial)</div>
    <div class="grid3">
      ${sel('f_afp','AFP',f.afp,['CAPITAL','CUPRUM','HABITAT','MODELO','PLANVITAL','PROVIDA','UNO'],1)}
      ${sel('f_salud','Salud',f.salud,['FONASA','BANMEDICA','COLMENA','CONSALUD','CRUZ BLANCA','ESENCIAL','NUEVA MASVIDA','VIDA TRES','ISALUD','FUNDACION','CRUZ DEL NORTE'],1)}
      ${inp('f_plan_isapre_uf','Plan Isapre pactado (UF, vacío si Fonasa)',f.plan_isapre_uf,'number')}
      ${inp('f_sueldo_base','Sueldo base ($)',f.sueldo_base,'number',1)}
      ${inp('f_banco_pago','Banco (depósito de sueldo)',f.banco_pago)}
      ${sel('f_tipo_cuenta_pago','Tipo de cuenta',f.tipo_cuenta_pago,['CUENTA CORRIENTE','CUENTA VISTA','CUENTA RUT','CHEQUERA ELECTRONICA'])}
      ${inp('f_num_cuenta_pago','N° de cuenta',f.num_cuenta_pago)}
    </div>
    <div class="sec">Cargas familiares (Previred)</div>
    <div class="grid3">
      ${sel('f_tramo_asignacion','Tramo asignación familiar',f.tramo_asignacion,['A','B','C','D'],1)}
      <div class="fld"><label>Cargas simples — hijos</label><input disabled value="${(FICHA.hijos||[]).filter(h=>h.es_carga).length} (marcados como carga en Hijos)"></div>
      ${inp('f_cargas_otras','Cargas simples — otras (cónyuge, ascendientes)',f.cargas_otras??0,'number')}
      ${inp('f_cargas_maternales','Cargas maternales',f.cargas_maternales??0,'number')}
      ${inp('f_cargas_invalidas','Cargas inválidas',f.cargas_invalidas??0,'number')}
      ${inp('f_anos_trabajados_previos','Años trabajados ANTES de AutoFácil (feriado progresivo art. 68, máx 10)',f.anos_trabajados_previos??0,'number')}
    </div>
    <div style="font-size:.75rem;color:#64748b;margin:-4px 0 6px">Tramo D = sin derecho a asignación. Los campos con <span style="color:#dc2626;font-weight:800">*</span> son obligatorios para el archivo Previred y el LRE.</div>
    <div class="fld" style="margin-top:10px"><label>Observaciones</label><input id="f_observaciones" value="${esc(f.observaciones||'')}"></div>
    <div class="sec">Carpeta digital</div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
      <select id="docTipo" style="border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 10px;font-size:.83rem">${(FICHA.doc_tipos||[]).map(t=>`<option>${t}</option>`).join('')}</select>
      <input type="file" id="docFile" style="font-size:.82rem">
      <button class="btn-ghost" onclick="subirDoc()"><i class="bi bi-upload me-1"></i>Subir</button>
    </div>
    <table><thead><tr><th>Tipo</th><th>Documento</th><th>Subido por</th><th>Fecha</th><th></th></tr></thead>
      <tbody>${(FICHA.documentos||[]).map(d=>`<tr>
        <td><span class="tag">${esc(d.tipo)}</span></td><td>${esc(d.nombre_archivo)}</td><td>${esc(d.subido_por||'—')}</td><td>${fD(d.created_at)}</td>
        <td style="white-space:nowrap"><a href="#" onclick="return verDoc(${d.id})" style="font-weight:700;margin-right:8px"><i class="bi bi-download"></i></a>
        <button class="btn-mini del" onclick="borrarDoc(${d.id})"><i class="bi bi-trash"></i></button></td></tr>`).join('') || '<tr><td colspan="5" class="empty">Sin documentos.</td></tr>'}</tbody></table>`;
  dlg.showModal();
  pintarHijos(FICHA.hijos || []);
}

/* ── Hijos (filas dinámicas) ── */
function filaHijo(h={}){
  return `<div class="hijo-row" style="display:grid;grid-template-columns:2fr 1fr 1fr auto auto;gap:10px 16px;align-items:end;margin-bottom:8px">
    <div class="fld"><label>Nombre</label><input class="h_nombre" value="${esc(h.nombre||'')}"></div>
    <div class="fld"><label>RUT</label><input class="h_rut" value="${esc(h.rut||'')}"></div>
    <div class="fld"><label>Fecha de nacimiento</label><input type="date" class="h_fnac" value="${esc(h.fecha_nacimiento||'')}"></div>
    <label style="display:flex;align-items:center;gap:6px;font-size:.78rem;color:#334155;padding-bottom:8px;cursor:pointer;white-space:nowrap">
      <input type="checkbox" class="h_carga" ${h.es_carga?'checked':''}> Es carga familiar</label>
    <button class="btn-mini del" style="margin-bottom:6px" title="Quitar" onclick="this.closest('.hijo-row').remove()"><i class="bi bi-trash"></i></button>
  </div>`;
}
function pintarHijos(hijos){
  document.getElementById('hijosBox').innerHTML = hijos.length
    ? hijos.map(filaHijo).join('')
    : '<div style="font-size:.8rem;color:#94a3b8;margin-bottom:6px">Sin hijos registrados.</div>';
}
function agregarHijo(){
  const box = document.getElementById('hijosBox');
  if (!box.querySelector('.hijo-row')) box.innerHTML = '';
  box.insertAdjacentHTML('beforeend', filaHijo());
  box.lastElementChild.querySelector('.h_nombre').focus();
}
function leerHijos(){
  return [...document.querySelectorAll('#hijosBox .hijo-row')].map(r => ({
    nombre: r.querySelector('.h_nombre').value.trim(),
    rut: r.querySelector('.h_rut').value.trim(),
    fecha_nacimiento: r.querySelector('.h_fnac').value,
    es_carga: r.querySelector('.h_carga').checked ? 1 : 0,
  })).filter(h => h.nombre || h.rut || h.fecha_nacimiento);
}

async function guardarFicha(){
  const g = id => document.getElementById(id)?.value.trim() ?? '';
  const body = {
    cargo:g('f_cargo'), fecha_ingreso:g('f_fecha_ingreso'), centro_costo:g('f_centro_costo'),
    fecha_nacimiento:g('f_fecha_nacimiento'), sexo:g('f_sexo'), telefono:g('f_telefono'),
    tipo_contrato:g('f_tipo_contrato'), jornada:g('f_jornada'),
    estado_civil:g('f_estado_civil'), nacionalidad:g('f_nacionalidad'),
    direccion:g('f_direccion'), comuna:g('f_comuna'), ciudad:g('f_ciudad'),
    email_personal:g('f_email_personal'), telefono_personal:g('f_telefono_personal'),
    emergencia_nombre:g('f_emergencia_nombre'), emergencia_fono:g('f_emergencia_fono'),
    emergencia2_nombre:g('f_emergencia2_nombre'), emergencia2_fono:g('f_emergencia2_fono'),
    conyuge_nombre:g('f_conyuge_nombre'), conyuge_rut:g('f_conyuge_rut'), conyuge_telefono:g('f_conyuge_telefono'),
    conyuge_misma_dir: document.getElementById('f_conyuge_misma_dir')?.checked ? 1 : 0,
    conyuge_direccion: document.getElementById('f_conyuge_misma_dir')?.checked ? '' : g('f_conyuge_direccion'),
    hijos: leerHijos(),
    afp:g('f_afp'), salud:g('f_salud'), plan_isapre_uf:g('f_plan_isapre_uf'), sueldo_base:g('f_sueldo_base'),
    tramo_asignacion:g('f_tramo_asignacion'), cargas_otras:g('f_cargas_otras'), cargas_maternales:g('f_cargas_maternales'), cargas_invalidas:g('f_cargas_invalidas'), anos_trabajados_previos:g('f_anos_trabajados_previos'),
    banco_pago:g('f_banco_pago'), tipo_cuenta_pago:g('f_tipo_cuenta_pago'), num_cuenta_pago:g('f_num_cuenta_pago'),
    observaciones:g('f_observaciones'),
  };
  const j = await (await fetch('/api/rrhh/ficha/'+FICHA.usuario.id_usuario, { method:'PUT', headers:HJ, body:JSON.stringify(body) })).json();
  if (!j.success) return alert(j.error||'No se pudo guardar');
  dlg.close(); toast('✓ Ficha guardada'); cargar();
}

async function subirDoc(){
  const file = document.getElementById('docFile').files[0];
  if (!file) return alert('Elige un archivo');
  if (file.size > 15*1024*1024) return alert('Máximo 15 MB');
  const b64 = await new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result.split(',')[1]); fr.readAsDataURL(file); });
  const j = await (await fetch('/api/rrhh/docs/'+FICHA.usuario.id_usuario, { method:'POST', headers:HJ,
    body: JSON.stringify({ tipo: document.getElementById('docTipo').value, archivo_nombre: file.name, mime_type: file.type, archivo_data: b64 }) })).json();
  if (!j.success) return alert(j.error||'No se pudo subir');
  toast('✓ Documento subido'); abrir(FICHA.usuario.id_usuario);
}
async function verDoc(id){
  const r = await fetch('/api/rrhh/docs/archivo/'+id, { headers:H });
  if (!r.ok) { alert('No se pudo abrir'); return false; }
  const blob = await r.blob(); window.open(URL.createObjectURL(blob), '_blank'); return false;
}
async function borrarDoc(id){
  if (!confirm('¿Eliminar este documento de la carpeta?')) return;
  const j = await (await fetch('/api/rrhh/docs/'+id, { method:'DELETE', headers:H })).json();
  if (!j.success) return alert(j.error||'No se pudo eliminar');
  toast('Documento eliminado'); abrir(FICHA.usuario.id_usuario);
}
cargar().then(()=>{
  // ?id=N — abre directo una ficha (incluye ocultos "No mostrar"; se llega desde Directorio › Configurar)
  const idQ = new URLSearchParams(location.search).get('id');
  if (idQ) abrir(Number(idQ));
});
