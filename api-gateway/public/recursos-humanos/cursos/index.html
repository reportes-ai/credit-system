<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursos y Capacitaciones — RRHH</title>
  <!-- v1.0 — bitácora de cursos con asistencia y nota -->
  <link href="/css/bootstrap.min.css" rel="stylesheet"><link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; }
    .topnav-left { display:flex; align-items:center; gap:16px; } .topnav-brand img { height:32px; filter:brightness(0) invert(1); } .topnav-brand { text-decoration:none; display:flex; gap:8px; align-items:center; }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.7); font-size:.85rem; } .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; color:#fff; font-size:.85rem; } .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .main { padding:28px 34px; max-width:1080px; margin:0 auto; }
    .page-banner { background:linear-gradient(135deg,#012d70,#0141A2 50%,#009AFE); border-radius:16px; color:#fff; padding:22px 30px; margin-bottom:22px; display:flex; align-items:center; gap:16px; } .page-banner i { font-size:2.2rem; opacity:.9; } .page-banner h2 { margin:0; font-size:1.25rem; font-weight:700; } .page-banner p { margin:2px 0 0; opacity:.85; font-size:.84rem; }
    .tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; } .tab { padding:8px 16px; border-radius:20px; font-size:.84rem; font-weight:700; cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#64748b; } .tab.active { background:var(--navy); color:#fff; border-color:var(--navy); }
    .card-box { background:#fff; border-radius:14px; box-shadow:0 1px 6px rgba(0,0,0,.07); padding:22px; margin-bottom:16px; }
    .fld { margin-bottom:12px; } .fld label { display:block; font-size:.78rem; font-weight:600; color:#475569; margin-bottom:5px; } .fld input, .fld textarea { width:100%; border:1px solid #cbd5e1; border-radius:8px; padding:9px 11px; font-size:.88rem; box-sizing:border-box; }
    .btn-navy { background:var(--navy); color:#fff; border:none; border-radius:8px; padding:10px 18px; font-weight:700; font-size:.88rem; cursor:pointer; }
    .btn-mini { border:1px solid #cbd5e1; background:#fff; border-radius:7px; padding:5px 10px; font-size:.78rem; cursor:pointer; font-weight:600; }
    table { width:100%; border-collapse:collapse; font-size:.85rem; } th { background:#f8fafc; color:#475569; text-transform:uppercase; font-size:.68rem; text-align:left; padding:10px 12px; border-bottom:1px solid #e5e7eb; } td { padding:10px 12px; border-bottom:1px solid #f1f5f9; }
    .empty { text-align:center; color:#94a3b8; padding:30px 0; }
    .grid4 { display:grid; grid-template-columns:2fr 1fr 1fr 1fr; gap:12px; } @media(max-width:760px){ .grid4 { grid-template-columns:1fr 1fr; } }
    .personas { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:4px; max-height:280px; overflow:auto; background:#f8fafc; border-radius:10px; padding:12px; }
    .personas label { font-size:.82rem; display:flex; gap:7px; align-items:center; cursor:pointer; padding:3px 6px; border-radius:6px; } .personas label:hover { background:#eef4ff; }
    .fila-curso { cursor:pointer; } .fila-curso:hover { background:#f6f9ff; }
    .chip-horas { background:#eff6ff; color:var(--navy); border-radius:10px; padding:2px 10px; font-weight:800; font-size:.78rem; }
    .nota-inp { width:64px; border:1px solid #cbd5e1; border-radius:7px; padding:4px 8px; text-align:center; font-weight:700; }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-left"><a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a> › <a href="/recursos-humanos/">Recursos Humanos</a> › <span style="color:#fff;font-weight:600"><i class="bi bi-mortarboard me-1"></i>Cursos y Capacitaciones</span></div></div>
  <div style="display:flex;gap:10px;align-items:center"><span class="user-chip" id="navNombre">—</span><button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button></div>
</nav>
<div class="main">
  <div class="page-banner"><i class="bi bi-mortarboard"></i><div><h2>Cursos y Capacitaciones</h2><p>Bitácora de capacitación del equipo: cursos con horas, contenido, asistencia y nota — queda en la ficha de cada uno.</p></div></div>
  <div class="tabs">
    <div class="tab active" id="t1" onclick="tab('bitacora')"><i class="bi bi-journal-text me-1"></i>Bitácora</div>
    <div class="tab" id="t2" onclick="tab('nuevo')"><i class="bi bi-plus-circle me-1"></i>Nuevo curso</div>
  </div>

  <div id="secBitacora">
    <div class="card-box">
      <table><thead><tr><th>Fecha</th><th>Curso</th><th>Relator</th><th style="text-align:center">Horario</th><th style="text-align:center">Horas</th><th style="text-align:center">Asistentes</th><th style="text-align:center">Promedio</th></tr></thead>
      <tbody id="tbCursos"><tr><td colspan="7" class="empty">Cargando…</td></tr></tbody></table>
    </div>
    <div id="detCurso"></div>
  </div>

  <div id="secNuevo" style="display:none">
    <div class="card-box">
      <div class="grid4">
        <div class="fld"><label>Nombre del curso / capacitación *</label><input id="cNom" placeholder="Ej: Ley 21.320 de cobranza"></div>
        <div class="fld"><label>Fecha *</label><input type="date" id="cFecha"></div>
        <div class="fld"><label>Hora inicio *</label><input type="time" id="cHi"></div>
        <div class="fld"><label>Hora término *</label><input type="time" id="cHt"></div>
      </div>
      <div class="grid4">
        <div class="fld" style="grid-column:span 2"><label>Relator / quién dictó</label><input id="cRel" placeholder="Interno o externo"></div>
        <div class="fld"><label>Duración</label><div style="padding:9px 0"><span class="chip-horas" id="cHoras">— hrs</span></div></div>
        <div class="fld"><label>Evaluación</label><label style="font-size:.84rem;display:flex;gap:8px;align-items:center;padding:8px 0;cursor:pointer"><input type="checkbox" id="cConNota"> Con nota (1,0–7,0)</label></div>
      </div>
      <div class="fld"><label>Contenido del curso (a grandes rasgos: temas tratados, objetivo)</label><textarea id="cCont" rows="4" placeholder="Ej: Alcances de la ley, tope de gestiones semanales, gastos de cobranza permitidos, casos prácticos…"></textarea></div>
      <div class="fld"><label>Participantes * <a href="javascript:void(0)" onclick="marcarTodos(true)" style="font-size:.76rem;margin-left:8px">todos</a> · <a href="javascript:void(0)" onclick="marcarTodos(false)" style="font-size:.76rem">ninguno</a></label>
        <div class="personas" id="cPers"><small style="color:#94a3b8">Cargando equipo…</small></div></div>
      <div style="text-align:right"><button class="btn-navy" onclick="guardarCurso()"><i class="bi bi-check2-circle me-1"></i>Crear curso</button></div>
    </div>
  </div>
</div>
<script src="/js/auth-guard.js"></script>
<script>
  const token=sessionStorage.getItem('token'), yo=JSON.parse(sessionStorage.getItem('usuario')||'null');
  if(!token||!yo) location.href='/login.html';
  document.getElementById('navNombre').textContent=`${yo?.nombre||''} ${yo?.apellido||''}`.trim();
  function logout(){ sessionStorage.clear(); location.href='/login.html'; }
  const H={Authorization:'Bearer '+token}, HJ={...H,'Content-Type':'application/json'};
  const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  const fd=s=>s?String(s).slice(0,10).split('-').reverse().join('-'):'';
  const fh=n=>n==null?'—':Number(n).toLocaleString('es-CL',{minimumFractionDigits:1,maximumFractionDigits:2});
  let CURSOS=[];

  function tab(v){ document.getElementById('secBitacora').style.display=v==='bitacora'?'':'none'; document.getElementById('secNuevo').style.display=v==='nuevo'?'':'none';
    document.getElementById('t1').classList.toggle('active',v==='bitacora'); document.getElementById('t2').classList.toggle('active',v==='nuevo'); }

  /* horas en vivo */
  function calcH(){ const a=document.getElementById('cHi').value,b=document.getElementById('cHt').value;
    if(!a||!b){document.getElementById('cHoras').textContent='— hrs';return;}
    const min=(+b.slice(0,2)*60 + +b.slice(3))-(+a.slice(0,2)*60 + +a.slice(3));
    document.getElementById('cHoras').textContent=min>0?fh(min/60)+' hrs':'⚠ revisa horas'; }
  document.getElementById('cHi').addEventListener('change',calcH); document.getElementById('cHt').addEventListener('change',calcH);

  async function cargarEquipo(){
    const j=await (await fetch('/api/rrhh/desempeno/360/usuarios',{headers:H})).json();
    const us=(j.data||{}).usuarios||[];
    document.getElementById('cPers').innerHTML=us.map(u=>`<label><input type="checkbox" class="pcheck" value="${u.id_usuario}"> ${esc(u.nombre)}<small style="color:#94a3b8"> ${esc(u.cargo||'')}</small></label>`).join('')||'<small class="empty">Sin usuarios.</small>';
  }
  window.marcarTodos=v=>document.querySelectorAll('.pcheck').forEach(c=>c.checked=v);

  async function guardarCurso(){
    const participantes=[...document.querySelectorAll('.pcheck:checked')].map(c=>c.value);
    const b={nombre:document.getElementById('cNom').value,fecha:document.getElementById('cFecha').value,
      hora_inicio:document.getElementById('cHi').value,hora_termino:document.getElementById('cHt').value,
      relator:document.getElementById('cRel').value,contenido:document.getElementById('cCont').value,
      con_nota:document.getElementById('cConNota').checked,participantes};
    if(!b.nombre.trim()||!b.fecha||!b.hora_inicio||!b.hora_termino) return alert('Completa nombre, fecha y horas');
    if(!participantes.length) return alert('Selecciona al menos un participante');
    const r=await (await fetch('/api/rrhh/cursos',{method:'POST',headers:HJ,body:JSON.stringify(b)})).json();
    if(!r.success) return alert(r.error);
    alert(`Curso creado ✔ (${fh(r.data.horas)} horas, ${participantes.length} participantes)`);
    ['cNom','cFecha','cHi','cHt','cRel','cCont'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('cConNota').checked=false; marcarTodos(false); calcH();
    tab('bitacora'); cargarBitacora(); verCurso(r.data.id);
  }

  async function cargarBitacora(){
    const j=await (await fetch('/api/rrhh/cursos',{headers:H})).json();
    CURSOS=(j.data||{}).cursos||[];
    const tb=document.getElementById('tbCursos');
    if(!CURSOS.length){ tb.innerHTML='<tr><td colspan="7" class="empty">Aún no hay cursos registrados. Crea el primero en "Nuevo curso".</td></tr>'; return; }
    tb.innerHTML=CURSOS.map(c=>`<tr class="fila-curso" onclick="verCurso(${c.id})"><td>${fd(c.fecha)}</td><td><b>${esc(c.nombre)}</b></td><td>${esc(c.relator||'—')}</td>
      <td style="text-align:center">${c.hora_inicio}–${c.hora_termino}</td><td style="text-align:center"><span class="chip-horas">${fh(c.horas)}</span></td>
      <td style="text-align:center">${c.asistieron??0}/${c.participantes}</td><td style="text-align:center;font-weight:800">${c.con_nota?fh(c.promedio):'<small style="color:#94a3b8">solo asistencia</small>'}</td></tr>`).join('');
  }

  window.verCurso=async id=>{
    const j=await (await fetch('/api/rrhh/cursos/'+id,{headers:H})).json();
    if(!j.success) return alert(j.error);
    const {curso,asistentes}=j.data;
    let h=`<div class="card-box"><div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:8px">
      <div><h5 style="color:var(--navy);margin:0 0 4px">${esc(curso.nombre)}</h5>
      <small style="color:#64748b">${fd(curso.fecha)} · ${curso.hora_inicio}–${curso.hora_termino} · <span class="chip-horas">${fh(curso.horas)} hrs</span>${curso.relator?` · Relator: <b>${esc(curso.relator)}</b>`:''} · ${curso.con_nota?'Con nota':'Solo asistencia'}</small></div>
      <div style="display:flex;gap:6px"><button class="btn-mini" onclick="eliminarCurso(${curso.id})"><i class="bi bi-trash"></i></button>
      <button class="btn-mini" onclick="document.getElementById('detCurso').innerHTML=''">✕ Cerrar</button></div></div>`;
    if(curso.contenido) h+=`<div style="background:#f8fafc;border-left:4px solid var(--navy);border-radius:8px;padding:10px 14px;margin:12px 0;font-size:.86rem;white-space:pre-wrap">${esc(curso.contenido)}</div>`;
    h+=`<table><thead><tr><th>Participante</th><th style="text-align:center">Asistió</th>${curso.con_nota?'<th style="text-align:center">Nota</th>':''}</tr></thead><tbody>`;
    asistentes.forEach(a=>{ h+=`<tr><td><b>${esc(a.nombre)}</b><br><small style="color:#94a3b8">${esc(a.cargo||'')}</small></td>
      <td style="text-align:center"><input type="checkbox" ${a.asistio?'checked':''} onchange="marcar(${a.id},this.checked,${curso.id},${curso.con_nota})"></td>
      ${curso.con_nota?`<td style="text-align:center"><input class="nota-inp" id="nt_${a.id}" value="${a.nota!=null?String(a.nota).replace('.',','):''}" placeholder="—" onchange="marcarNota(${a.id},${curso.id})"></td>`:''}</tr>`; });
    h+=`</tbody></table><p style="font-size:.74rem;color:#64748b;margin:10px 0 0">La asistencia y las notas se guardan al tiro al cambiarlas. Cada curso queda en la ficha del colaborador (Mi Ficha → Cursos).</p></div>`;
    document.getElementById('detCurso').innerHTML=h;
    document.getElementById('detCurso').scrollIntoView({behavior:'smooth'});
  };
  window.marcar=async(id,asistio,idCurso,conNota)=>{
    const nota=conNota?document.getElementById('nt_'+id)?.value:null;
    await fetch('/api/rrhh/cursos/asistentes/'+id,{method:'PUT',headers:HJ,body:JSON.stringify({asistio,nota})}); cargarBitacora(); };
  window.marcarNota=async(id,idCurso)=>{
    const v=document.getElementById('nt_'+id).value;
    const r=await (await fetch('/api/rrhh/cursos/asistentes/'+id,{method:'PUT',headers:HJ,body:JSON.stringify({asistio:true,nota:v})})).json();
    if(!r.success){ alert(r.error); return; } cargarBitacora(); };
  window.eliminarCurso=async id=>{ if(!confirm('¿Eliminar el curso y su asistencia?')) return;
    await fetch('/api/rrhh/cursos/'+id,{method:'DELETE',headers:H}); document.getElementById('detCurso').innerHTML=''; cargarBitacora(); };

  cargarBitacora(); cargarEquipo();
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
