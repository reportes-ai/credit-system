<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directorio — AutoFácil</title>
  <!-- v1.0 — directorio de colaboradores (Fase 1 módulo RRHH) -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; } .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; } .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; color:#fff; font-size:.85rem; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .main { padding:26px 30px; max-width:1200px; margin:0 auto; }
    .banner { background:linear-gradient(135deg,#012d70,#0141A2 55%,#009AFE); border-radius:16px; color:#fff; padding:20px 28px; margin-bottom:18px; display:flex; align-items:center; gap:16px; }
    .banner i { font-size:2.2rem; opacity:.85; } .banner h2 { font-weight:700; margin:0; font-size:1.2rem; } .banner p { margin:2px 0 0; opacity:.85; font-size:.85rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
    .card-p { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); padding:16px 18px; display:flex; gap:14px; align-items:flex-start; }
    .avatar { width:46px; height:46px; border-radius:50%; background:linear-gradient(135deg,#0141A2,#009AFE); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1.05rem; flex-shrink:0; }
    .card-p h6 { margin:0 0 2px; font-weight:700; font-size:.92rem; color:#111827; }
    .card-p .cargo { font-size:.76rem; color:#0141A2; font-weight:600; margin-bottom:6px; }
    .card-p .dato { font-size:.76rem; color:#475569; display:flex; align-items:center; gap:6px; margin-top:2px; word-break:break-all; }
    .card-p .dato a { color:#475569; text-decoration:none; } .card-p .dato a:hover { color:#0141A2; }
    .empty { text-align:center; color:#9ca3af; padding:36px 0; }
  </style>
</head>
<body>
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a> › <a href="/recursos-humanos/">Recursos Humanos</a> › <span style="color:#fff;font-weight:600"><i class="bi bi-person-lines-fill me-1"></i>Directorio</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px"><span class="user-chip" id="navNombre">—</span><button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button></div>
</nav>

<div class="main">
  <div class="banner"><i class="bi bi-person-lines-fill"></i><div><h2>Directorio de Colaboradores</h2><p>Quién es quién en AutoFácil — contacto directo con todo el equipo.</p></div></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap">
    <div style="font-weight:700;color:#012d70" id="resumen">—</div>
    <input id="q" placeholder="Buscar nombre o cargo…" oninput="render()" style="border:1.5px solid #d1d5db;border-radius:8px;padding:7px 12px;font-size:.85rem;width:280px;max-width:60%">
  </div>
  <div class="grid" id="grid"></div>
  <div id="empty" class="empty" style="display:none">Sin resultados.</div>
</div>

<script src="/js/auth-guard.js"></script>
<script>
const token = sessionStorage.getItem('token'), yo = JSON.parse(sessionStorage.getItem('usuario')||'null');
if (!token||!yo) location.href='/login.html';
document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
function logout(){ sessionStorage.clear(); location.href='/login.html'; }
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;');
let DATA = [];
function render(){
  const q = (document.getElementById('q').value||'').toLowerCase();
  const rows = DATA.filter(r => !q || [r.nombre,r.cargo].some(v=>String(v||'').toLowerCase().includes(q)));
  document.getElementById('resumen').textContent = `${rows.length} colaborador(es)`;
  document.getElementById('empty').style.display = rows.length ? 'none' : '';
  document.getElementById('grid').innerHTML = rows.map(r=>`<div class="card-p">
    <div class="avatar">${esc((r.nombre||'?')[0].toUpperCase())}</div>
    <div style="min-width:0">
      <h6>${esc(r.nombre)}</h6>
      <div class="cargo">${esc(r.cargo||'—')}</div>
      ${r.email?`<div class="dato"><i class="bi bi-envelope"></i><a href="mailto:${esc(r.email)}">${esc(r.email)}</a></div>`:''}
      ${r.telefono?`<div class="dato"><i class="bi bi-telephone"></i><a href="tel:${esc(r.telefono)}">${esc(r.telefono)}</a></div>`:''}
      ${r.supervisor?`<div class="dato"><i class="bi bi-diagram-2"></i>Reporta a ${esc(r.supervisor)}</div>`:''}
      ${r.cumple?`<div class="dato"><i class="bi bi-cake2"></i>Cumpleaños ${esc(r.cumple)}</div>`:''}
    </div>
  </div>`).join('');
}
(async()=>{
  const j = await (await fetch('/api/rrhh/directorio', { headers:{Authorization:'Bearer '+token} })).json();
  if (!j.success) { document.getElementById('empty').style.display=''; document.getElementById('empty').textContent = j.error||'Error'; return; }
  DATA = j.data || []; render();
})();
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
