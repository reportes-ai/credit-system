<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encuestas de Clima — RRHH</title>
  <!-- v1.4 — colores corporativos (azul AutoFácil) -->
  <link href="/css/bootstrap.min.css" rel="stylesheet"><link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --bg:#f0f4f8; --teal:#0141A2; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; }
    .topnav-left { display:flex; align-items:center; gap:16px; } .topnav-brand img { height:32px; filter:brightness(0) invert(1); } .topnav-brand { text-decoration:none; display:flex; gap:8px; align-items:center; }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.7); font-size:.85rem; } .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; color:#fff; font-size:.85rem; } .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .main { padding:28px 34px; max-width:960px; margin:0 auto; }
    .page-banner { background:linear-gradient(135deg,var(--navy-dark),var(--navy-light) 60%,#3b82f6); border-radius:16px; color:#fff; padding:22px 30px; margin-bottom:22px; display:flex; align-items:center; gap:16px; } .page-banner i { font-size:2.2rem; opacity:.9; } .page-banner h2 { margin:0; font-size:1.25rem; font-weight:700; } .page-banner p { margin:2px 0 0; opacity:.85; font-size:.84rem; }
    .tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; } .tab { padding:8px 16px; border-radius:20px; font-size:.84rem; font-weight:700; cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#64748b; } .tab.active { background:var(--teal); color:#fff; border-color:var(--teal); }
    .card-box { background:#fff; border-radius:14px; box-shadow:0 1px 6px rgba(0,0,0,.07); padding:22px; margin-bottom:16px; }
    .fld { margin-bottom:12px; } .fld label { display:block; font-size:.78rem; font-weight:600; color:#475569; margin-bottom:5px; } .fld input, .fld textarea, .fld select { width:100%; border:1px solid #cbd5e1; border-radius:8px; padding:9px 11px; font-size:.88rem; box-sizing:border-box; }
    .btn-teal { background:var(--teal); color:#fff; border:none; border-radius:8px; padding:10px 18px; font-weight:700; font-size:.88rem; cursor:pointer; }
    .btn-mini { border:1px solid #cbd5e1; background:#fff; border-radius:7px; padding:5px 10px; font-size:.78rem; cursor:pointer; font-weight:600; }
    table { width:100%; border-collapse:collapse; font-size:.85rem; } th { background:#f8fafc; color:#475569; text-transform:uppercase; font-size:.68rem; text-align:left; padding:10px 12px; border-bottom:1px solid #e5e7eb; } td { padding:10px 12px; border-bottom:1px solid #f1f5f9; }
    .empty { text-align:center; color:#94a3b8; padding:30px 0; }
    .pill { border-radius:12px; padding:2px 9px; font-size:.7rem; font-weight:700; } .BORRADOR { background:#f1f5f9; color:#64748b; } .ABIERTA { background:#dbeafe; color:#1e40af; } .CERRADA { background:#f1f5f9; color:#64748b; }
    .preg { padding:14px 0; border-bottom:1px solid #f1f5f9; } .preg b { font-size:.92rem; }
    .escala { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
    .escala button { min-width:40px; height:40px; border-radius:9px; border:1.5px solid #cbd5e1; background:#fff; font-weight:800; cursor:pointer; color:#64748b; }
    .escala button.on { background:var(--teal); color:#fff; border-color:var(--teal); }
    .bar { background:#eef2f7; border-radius:6px; height:10px; overflow:hidden; } .bar > div { height:100%; background:var(--teal); }
    .enps-big { font-size:2.6rem; font-weight:900; font-family:Consolas,monospace; }
    .preg-row { display:grid; grid-template-columns:1fr 130px 34px; gap:8px; margin-bottom:8px; }
    .preg-row input, .preg-row select { border:1px solid #cbd5e1; border-radius:8px; padding:7px 10px; font-size:.84rem; }
    .btp-clima { background:#0d9488; border-color:#0d9488; color:#fff; }
    .btp-pulso { background:#0284c7; border-color:#0284c7; color:#fff; }
    .btp-enps  { background:#d97706; border-color:#d97706; color:#fff; }
    .btp-comp  { background:#7c3aed; border-color:#7c3aed; color:#fff; }
    .btp-otra  { background:#64748b; border-color:#64748b; color:#fff; }
    .tp { border-radius:12px; padding:2px 9px; font-size:.7rem; font-weight:700; color:#fff; }
    .tp-CLIMA { background:#0d9488; } .tp-PULSO { background:#0284c7; } .tp-ENPS { background:#d97706; } .tp-COMPROMISO { background:#7c3aed; } .tp-OTRA { background:#64748b; }
    .inf-ia { background:#fff7ed; border:1px solid #fed7aa; border-left:4px solid #c2410c; border-radius:10px; padding:14px 18px; margin-top:8px; font-size:.87rem; line-height:1.55; color:#3f2d20; }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-left"><a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a> › <a href="/recursos-humanos/">Recursos Humanos</a> › <span style="color:#fff;font-weight:600"><i class="bi bi-emoji-smile me-1"></i>Encuestas de Clima</span></div></div>
  <div style="display:flex;gap:10px;align-items:center"><span class="user-chip" id="navNombre">—</span><button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button></div>
</nav>
<div class="main">
  <div class="page-banner"><i class="bi bi-emoji-smile"></i><div><h2>Encuestas de Clima</h2><p>Clima, pulso y eNPS — 100% anónimas: tus respuestas no quedan ligadas a tu nombre de ninguna forma.</p></div></div>
  <div class="tabs">
    <div class="tab active" id="t1" onclick="tab('resp')"><i class="bi bi-pencil-square me-1"></i>Responder<span id="badgeR" style="background:#dc2626;color:#fff;border-radius:10px;padding:0 6px;font-size:.68rem;margin-left:6px;display:none">0</span></div>
    <div class="tab" id="t2" onclick="tab('gestion')" style="display:none"><i class="bi bi-clipboard-data me-1"></i>Gestión y Resultados</div>
  </div>

  <div id="secResp"></div>

  <div id="secGestion" style="display:none">
    <div class="card-box">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px">
        <h6 style="color:var(--teal);margin:0">Encuestas</h6>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn-mini btp-clima" onclick="nueva('CLIMA')"><i class="bi bi-plus"></i> Clima anual</button>
          <button class="btn-mini btp-pulso" onclick="nueva('PULSO')"><i class="bi bi-plus"></i> Pulso</button>
          <button class="btn-mini btp-enps" onclick="nueva('ENPS')"><i class="bi bi-plus"></i> eNPS</button>
          <button class="btn-mini btp-comp" onclick="nueva('COMPROMISO')"><i class="bi bi-plus"></i> Compromiso</button>
          <button class="btn-mini btp-otra" onclick="nueva('OTRA')"><i class="bi bi-plus"></i> Otra</button>
        </div></div>
      <table><thead><tr><th>Encuesta</th><th>Tipo</th><th>Cierre</th><th style="text-align:center">Respuestas</th><th>Estado</th><th></th></tr></thead>
      <tbody id="tbEnc"><tr><td colspan="6" class="empty">Cargando…</td></tr></tbody></table>
    </div>
    <div id="panelG"></div>
  </div>
</div>
<script src="/js/auth-guard.js"></script>
<script>
  const token=sessionStorage.getItem('token'), yo=JSON.parse(sessionStorage.getItem('usuario')||'null');
  if(!token||!yo) location.href='/login.html';
  document.getElementById('navNombre').textContent=`${yo?.nombre||''} ${yo?.apellido||''}`.trim();
  function logout(){ sessionStorage.clear(); location.href='/login.html'; }
  const H={Authorization:'Bearer '+token}, HJ={...H,'Content-Type':'application/json'};
  const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  const fd=s=>s?String(s).slice(0,10).split('-').reverse().join('-'):'—';
  let LISTA=[], PLANTILLAS={}, ACTIVOS=0;

  function tab(v){ document.getElementById('secResp').style.display=v==='resp'?'':'none';
    document.getElementById('secGestion').style.display=v==='gestion'?'':'none';
    document.getElementById('t1').classList.toggle('active',v==='resp'); document.getElementById('t2').classList.toggle('active',v==='gestion'); }

  /* ── Responder ── */
  const setV=(id,v,max)=>{ const box=document.getElementById(id); box.dataset.v=v;
    [...box.querySelectorAll('button')].forEach(b=>b.classList.toggle('on',parseInt(b.textContent)===v||(b.textContent==='Sí'&&v===1&&max===1)||(b.textContent==='No'&&v===0&&max===1))); };
  const escBtns=(id,tipo)=>{
    if(tipo==='SI_NO') return `<div class="escala" id="${id}"><button onclick="setV('${id}',1,1)">Sí</button><button onclick="setV('${id}',0,1)">No</button></div>`;
    const max=tipo==='ENPS'?10:5, min=tipo==='ENPS'?0:1;
    let h=`<div class="escala" id="${id}">`; for(let i=min;i<=max;i++) h+=`<button onclick="setV('${id}',${i},${max})">${i}</button>`;
    return h+'</div>'+(tipo==='ENPS'?'<small style="color:#94a3b8">0 = nada probable · 10 = totalmente probable</small>':'<small style="color:#94a3b8">1 = muy en desacuerdo · 5 = muy de acuerdo</small>'); };
  window.setV=setV;

  async function cargarPendientes(){
    const j=await (await fetch('/api/rrhh/encuestas/pendientes',{headers:H})).json();
    const encs=(j.data||{}).encuestas||[];
    const pend=encs.filter(e=>!e.respondida);
    if(pend.length){ const b=document.getElementById('badgeR'); b.textContent=pend.length; b.style.display=''; }
    let h='';
    if(!encs.length) h='<div class="card-box empty">No hay encuestas abiertas por ahora.</div>';
    encs.forEach(e=>{
      h+=`<div class="card-box"><div style="display:flex;justify-content:space-between;align-items:start;gap:8px;flex-wrap:wrap">
        <div><h5 style="color:var(--teal);margin:0 0 2px">${esc(e.titulo)}</h5>
        <small style="color:#64748b">${esc(e.descripcion||'')} ${e.fecha_cierre?'· cierra el '+fd(e.fecha_cierre):''} · <b>anónima</b></small></div>
        ${e.respondida?'<span class="pill ABIERTA">✓ RESPONDIDA</span>':''}</div>`;
      if(!e.respondida){
        e.preguntas.forEach(p=>{ h+=`<div class="preg"><b>${esc(p.texto)}</b>${p.tipo==='TEXTO'
          ?`<textarea id="tx_${p.id}" rows="2" style="width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:8px 10px;margin-top:8px;box-sizing:border-box" placeholder="Tu respuesta (anónima)…"></textarea>`
          :escBtns('q_'+p.id,p.tipo)}</div>`; });
        h+=`<div style="text-align:right;margin-top:12px"><button class="btn-teal" onclick="responder(${e.id})"><i class="bi bi-send me-1"></i>Enviar (anónimo)</button></div>`;
      }
      h+='</div>'; });
    document.getElementById('secResp').innerHTML=h;
    window._ENCS=encs;
  }
  window.responder=async id=>{
    const e=window._ENCS.find(x=>x.id===id);
    const respuestas=e.preguntas.map(p=>{ if(p.tipo==='TEXTO') return {id_pregunta:p.id,texto:document.getElementById('tx_'+p.id)?.value||''};
      const v=document.getElementById('q_'+p.id)?.dataset.v; return {id_pregunta:p.id,valor:v===undefined?null:parseInt(v)}; })
      .filter(r=>r.texto?.trim()||r.valor!=null);
    if(!respuestas.length) return alert('Responde al menos una pregunta');
    const sinR=e.preguntas.filter(p=>p.tipo!=='TEXTO').length-respuestas.filter(r=>r.valor!=null).length;
    if(sinR>0&&!confirm(`Dejaste ${sinR} pregunta(s) sin responder. ¿Enviar igual?`)) return;
    const r=await (await fetch('/api/rrhh/encuestas/responder',{method:'POST',headers:HJ,body:JSON.stringify({id_encuesta:id,respuestas})})).json();
    if(!r.success) return alert(r.error);
    alert('¡Gracias! Tu respuesta quedó registrada en forma anónima. 🙌'); cargarPendientes();
  };

  /* ── Gestión (RRHH) ── */
  async function cargarGestion(){
    const j=await (await fetch('/api/rrhh/encuestas',{headers:H})).json();
    if(!j.success) return;
    document.getElementById('t2').style.display='';
    LISTA=(j.data||{}).encuestas||[]; PLANTILLAS=(j.data||{}).plantillas||{}; ACTIVOS=(j.data||{}).activos||0;
    const tb=document.getElementById('tbEnc');
    if(!LISTA.length){ tb.innerHTML='<tr><td colspan="6" class="empty">Crea la primera con los botones de arriba (traen plantilla editable).</td></tr>'; return; }
    tb.innerHTML=LISTA.map(e=>`<tr><td><b>${esc(e.titulo)}</b></td><td><span class="tp tp-${e.tipo}">${e.tipo}</span></td><td>${fd(e.fecha_cierre)}</td>
      <td style="text-align:center">${e.respuestas}/${ACTIVOS}</td><td><span class="pill ${e.estado}">${e.estado}</span></td>
      <td style="white-space:nowrap">
        ${e.estado==='BORRADOR'?`<button class="btn-mini" onclick="abrirEnc(${e.id})">▶ Abrir</button> <button class="btn-mini" onclick="elimEnc(${e.id})">✕</button>`:''}
        ${e.estado==='ABIERTA'?`<button class="btn-mini" onclick="verRes(${e.id})">Resultados</button> <button class="btn-mini" onclick="cerrarEnc(${e.id})">■ Cerrar</button>`:''}
        ${e.estado==='CERRADA'?`<button class="btn-mini" onclick="verRes(${e.id})">Resultados</button>`:''}</td></tr>`).join('');
  }
  window.nueva=tipo=>{
    const pl=PLANTILLAS[tipo]||[['',''+'ESCALA']];
    const nombres={CLIMA:'Encuesta de Clima '+new Date().getFullYear(),PULSO:'Pulso semanal',ENPS:'eNPS '+new Date().getFullYear(),COMPROMISO:'Encuesta de Compromiso '+new Date().getFullYear(),OTRA:''};
    let h=`<div class="card-box"><h6 style="color:var(--teal)">Nueva encuesta ${tipo}</h6>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:12px">
        <div class="fld"><label>Título</label><input id="nTit" value="${esc(nombres[tipo]||'')}"></div>
        <div class="fld"><label>Fecha de cierre (opcional)</label><input type="date" id="nCierre"></div></div>
      <div class="fld"><label>Descripción (se muestra al responder)</label><input id="nDesc" placeholder="Ej: Responde con honestidad, es 100% anónima"></div>
      <label style="font-size:.78rem;font-weight:600;color:#475569">Preguntas</label><div id="nPregs">`;
    (tipo==='OTRA'?[['','ESCALA']]:pl).forEach(p=>{ h+=filaPreg(p[0],p[1]); });
    h+=`</div><button class="btn-mini" onclick="addPreg()"><i class="bi bi-plus"></i> Pregunta</button>
      <input type="hidden" id="nId" value="">
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
        <button class="btn-mini" onclick="document.getElementById('panelG').innerHTML=''">Cancelar</button>
        <button class="btn-teal" onclick="guardarEnc()">Guardar borrador</button></div></div>`;
    document.getElementById('panelG').innerHTML=h;
    document.getElementById('panelG').scrollIntoView({behavior:'smooth'});
  };
  const filaPreg=(texto,tipo)=>`<div class="preg-row"><input value="${esc(texto)}" placeholder="Pregunta" class="pg-t">
    <select class="pg-tp"><option ${tipo==='ESCALA'?'selected':''}>ESCALA</option><option ${tipo==='ENPS'?'selected':''}>ENPS</option><option ${tipo==='SI_NO'?'selected':''}>SI_NO</option><option ${tipo==='TEXTO'?'selected':''}>TEXTO</option></select>
    <button class="btn-mini" onclick="this.parentElement.remove()">✕</button></div>`;
  window.addPreg=()=>document.getElementById('nPregs').insertAdjacentHTML('beforeend',filaPreg('','ESCALA'));
  window.guardarEnc=async()=>{
    const preguntas=[...document.querySelectorAll('#nPregs .preg-row')].map(r=>({texto:r.querySelector('.pg-t').value,tipo:r.querySelector('.pg-tp').value})).filter(p=>p.texto.trim());
    const b={id:document.getElementById('nId').value||undefined,titulo:document.getElementById('nTit').value,
      descripcion:document.getElementById('nDesc').value,fecha_cierre:document.getElementById('nCierre').value||null,
      tipo:document.querySelector('#panelG h6').textContent.split(' ').pop(),preguntas};
    const r=await (await fetch('/api/rrhh/encuestas',{method:'POST',headers:HJ,body:JSON.stringify(b)})).json();
    if(!r.success) return alert(r.error);
    document.getElementById('panelG').innerHTML=''; cargarGestion();
  };
  window.abrirEnc=async id=>{ if(!confirm('¿Abrir la encuesta? Se avisará por la campana a todos los colaboradores activos (recordatorio semanal a quienes no respondan).')) return;
    const r=await (await fetch(`/api/rrhh/encuestas/${id}/abrir`,{method:'POST',headers:H})).json();
    if(!r.success) return alert(r.error); alert(`Encuesta abierta ✔ ${r.data.avisados} persona(s) avisadas`); cargarGestion(); };
  window.cerrarEnc=async id=>{ if(!confirm('¿Cerrar la encuesta? Nadie más podrá responder.')) return;
    await fetch(`/api/rrhh/encuestas/${id}/cerrar`,{method:'POST',headers:H}); cargarGestion(); };
  window.elimEnc=async id=>{ if(!confirm('¿Eliminar el borrador?')) return;
    await fetch(`/api/rrhh/encuestas/${id}`,{method:'DELETE',headers:H}); cargarGestion(); };

  window.verRes=async id=>{
    const j=await (await fetch(`/api/rrhh/encuestas/${id}/resultados`,{headers:H})).json();
    if(!j.success) return alert(j.error);
    const d=j.data;
    let h=`<div class="card-box"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <h6 style="color:var(--teal);margin:0">${esc(d.encuesta.titulo)} — resultados <small style="color:#94a3b8;font-weight:400">(${d.participantes} respuesta(s), agregado anónimo)</small></h6>
      <button class="btn-mini" onclick="document.getElementById('panelG').innerHTML=''">✕ Cerrar</button></div>`;
    if(!d.preguntas){ h+=`<div class="empty">Aún hay menos de ${d.minimo} respuestas — los resultados se ocultan para proteger el anonimato.</div></div>`;
      document.getElementById('panelG').innerHTML=h; return; }
    d.preguntas.forEach(p=>{
      h+=`<div class="preg"><b>${esc(p.texto)}</b> <small style="color:#94a3b8">(${p.n} resp.)</small>`;
      if(p.tipo==='TEXTO'){ h+=(p.comentarios||[]).map(c=>`<div style="background:#f8fafc;border-radius:8px;padding:8px 12px;margin-top:6px;font-size:.84rem"><i class="bi bi-chat-left-quote me-1" style="color:#94a3b8"></i>${esc(c)}</div>`).join('')||'<small style="color:#94a3b8"> sin comentarios</small>'; }
      else if(p.tipo==='ENPS'){ const c=p.enps>=30?'#16a34a':p.enps>=0?'#d97706':'#dc2626';
        h+=`<div style="display:flex;align-items:center;gap:20px;margin-top:8px;flex-wrap:wrap"><span class="enps-big" style="color:${c}">${p.enps>0?'+':''}${p.enps}</span>
          <small style="color:#64748b">eNPS = %promotores − %detractores<br>😍 Promotores (9-10): <b>${p.promotores}</b> · 😐 Pasivos (7-8): <b>${p.pasivos}</b> · 😞 Detractores (0-6): <b>${p.detractores}</b><br>Referencia: &gt;0 aceptable · &gt;+30 bueno · &gt;+50 excelente</small></div>`; }
      else if(p.tipo==='SI_NO'){ h+=`<div style="margin-top:8px"><div class="bar"><div style="width:${p.pct_si}%"></div></div><small style="color:#64748b"><b>${p.pct_si}%</b> respondió Sí</small></div>`; }
      else { const max=5;
        h+=`<div style="display:flex;align-items:center;gap:14px;margin-top:8px"><b style="font-size:1.3rem;color:var(--teal)">${(p.promedio??0).toLocaleString('es-CL',{minimumFractionDigits:2})}</b>
          <div style="flex:1"><div class="bar"><div style="width:${(p.promedio||0)/max*100}%"></div></div>
          <small style="color:#94a3b8">${[1,2,3,4,5].map(v=>`${v}:${p.dist[v]||0}`).join(' · ')}</small></div></div>`; }
      h+='</div>'; });
    // Informe IA (Opus) — permanente por encuesta
    h+=`<div style="margin-top:16px;border-top:1px solid #eef2f7;padding-top:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <b style="color:#9a3412"><i class="bi bi-stars me-1"></i>Informe IA</b>
        <button class="btn-mini" id="btnIA" onclick="analizarIA(${id})" style="background:#c2410c;color:#fff;border-color:#c2410c">
          <i class="bi bi-stars me-1"></i>${d.encuesta.informe_ia?'Volver a analizar con Opus':'Analizar con Opus'}</button></div>
      <div id="infIA">${d.encuesta.informe_ia
        ? `<small style="color:#94a3b8">Generado el ${new Date(d.encuesta.informe_ia_fecha).toLocaleString('es-CL')} · ${esc(d.encuesta.informe_ia_modelo||'')}</small>
           <div class="inf-ia">${fmtIA(d.encuesta.informe_ia)}</div>`
        : `<small style="color:#94a3b8">Aún sin informe — Opus redacta un análisis ejecutivo de estos resultados y queda guardado permanente en la encuesta.</small>`}</div></div>`;
    h+='</div>';
    document.getElementById('panelG').innerHTML=h;
    document.getElementById('panelG').scrollIntoView({behavior:'smooth'});
  };

  // Markdown mínimo (negritas + saltos) para el informe
  window.fmtIA=t=>esc(t).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');

  window.analizarIA=async id=>{
    const btn=document.getElementById('btnIA');
    btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>Opus analizando…';
    try{
      const r=await fetch(`/api/rrhh/encuestas/${id}/informe-ia`,{method:'POST',headers:H});
      const j=await r.json();
      if(!j.success) throw new Error(j.error||'No se pudo analizar');
      verRes(id);
    }catch(e){ alert(e.message); btn.disabled=false; btn.innerHTML='<i class="bi bi-stars me-1"></i>Analizar con Opus'; }
  };

  cargarPendientes(); cargarGestion();
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
