<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Ficha — AutoFácil</title>
  <!-- v1.0 — ficha del colaborador + carpeta digital (Fase 1 módulo RRHH) -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; } .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; } .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; color:#fff; font-size:.85rem; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .main { padding:28px 32px; max-width:1080px; margin:0 auto; }
    .hero { background:linear-gradient(135deg,#012d70,#0141A2 55%,#009AFE); border-radius:16px; color:#fff; padding:24px 30px; margin-bottom:22px; display:flex; align-items:center; gap:20px; }
    .hero .avatar { width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-size:1.6rem; font-weight:800; }
    .hero h2 { font-weight:700; margin:0; font-size:1.25rem; } .hero p { margin:2px 0 0; opacity:.85; font-size:.86rem; }
    .panel { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); padding:18px 22px; margin-bottom:18px; }
    .panel h5 { font-weight:700; font-size:.92rem; color:#0141A2; margin:0 0 14px; display:flex; align-items:center; gap:8px; }
    .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:12px 18px; } @media(max-width:760px){ .grid3{grid-template-columns:1fr;} }
    .fld label { font-size:.68rem; font-weight:700; text-transform:uppercase; color:#94a3b8; display:block; margin-bottom:2px; }
    .fld .val { font-size:.88rem; color:#111827; min-height:22px; }
    .fld input, .fld select { width:100%; border:1.5px solid #e2e8f0; border-radius:8px; padding:6px 10px; font-size:.85rem; }
    .btn-navy { background:var(--navy); color:#fff; border:none; border-radius:9px; padding:8px 18px; font-weight:700; font-size:.85rem; cursor:pointer; }
    .btn-ghost { background:#fff; border:1.5px solid #d1d5db; color:#374151; border-radius:9px; padding:8px 14px; font-weight:600; font-size:.85rem; cursor:pointer; }
    table { width:100%; border-collapse:collapse; font-size:.84rem; }
    th { background:#f8fafc; color:#475569; font-size:.7rem; text-transform:uppercase; padding:8px 10px; text-align:left; border-bottom:2px solid #e2e8f0; }
    td { padding:8px 10px; border-bottom:1px solid #f1f5f9; }
    .tag { background:#e0e7ff; color:#3730a3; border-radius:6px; padding:2px 8px; font-size:.7rem; font-weight:700; }
    .empty { text-align:center; color:#9ca3af; padding:26px 0; }
    .toast { position:fixed; top:70px; right:20px; background:#16a34a; color:#fff; padding:12px 18px; border-radius:9px; font-weight:600; font-size:.86rem; z-index:2000; display:none; }
  </style>
</head>
<body>
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a> › <a href="/recursos-humanos/">Recursos Humanos</a> › <span style="color:#fff;font-weight:600"><i class="bi bi-person-vcard me-1"></i>Mi Ficha</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px"><span class="user-chip" id="navNombre">—</span><button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button></div>
</nav>

<div class="main">
  <div class="hero">
    <div class="avatar" id="hAvatar">?</div>
    <div><h2 id="hNombre">—</h2><p id="hSub">—</p></div>
  </div>

  <div class="panel">
    <h5><i class="bi bi-person-badge"></i> Datos Laborales</h5>
    <div class="grid3" id="gLaboral"></div>
  </div>

  <div class="panel">
    <h5 style="justify-content:space-between"><span><i class="bi bi-house-heart"></i> Datos de Contacto</span>
      <span><button class="btn-ghost" id="btnEditar" onclick="modoEdicion(true)"><i class="bi bi-pencil me-1"></i>Editar</button>
      <button class="btn-navy" id="btnGuardar" style="display:none" onclick="guardar()"><i class="bi bi-check2 me-1"></i>Guardar</button></span></h5>
    <div class="grid3" id="gContacto"></div>
  </div>

  <div class="panel">
    <h5><i class="bi bi-shield-check"></i> Previsión y Pago</h5>
    <div class="grid3" id="gPrev"></div>
  </div>

  <div class="panel" id="pLiq" style="display:none">
    <h5><i class="bi bi-cash-stack"></i> Mis Liquidaciones de Sueldo</h5>
    <table><thead><tr><th>Mes</th><th>Total Haberes</th><th>Descuentos</th><th>Líquido</th><th></th></tr></thead><tbody id="tbLiq"></tbody></table>
  </div>

  <div class="panel">
    <h5><i class="bi bi-folder2-open"></i> Mi Carpeta Digital</h5>
    <table><thead><tr><th>Tipo</th><th>Documento</th><th>Subido por</th><th>Fecha</th><th></th></tr></thead><tbody id="tbDocs"></tbody></table>
    <div id="docsEmpty" class="empty" style="display:none">Aún no hay documentos en tu carpeta.</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="/js/auth-guard.js"></script>
<script>
const token = sessionStorage.getItem('token'), yo = JSON.parse(sessionStorage.getItem('usuario')||'null');
if (!token||!yo) location.href='/login.html';
document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
function logout(){ sessionStorage.clear(); location.href='/login.html'; }
const H = { Authorization:'Bearer '+token }, HJ = { ...H, 'Content-Type':'application/json' };
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;');
const fD = s => s ? new Date(String(s).slice(0,10)+'T12:00:00').toLocaleDateString('es-CL') : '—';
const fP = v => v!=null && v!=='' ? '$'+Math.round(Number(v)).toLocaleString('es-CL') : '—';
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2600); }

let DATA = null, EDIT = false;
const CONTACTO = [
  ['direccion','Dirección'],['comuna','Comuna'],['ciudad','Ciudad'],
  ['email_personal','Email personal'],['telefono_personal','Teléfono personal'],['estado_civil','Estado civil'],
  ['nacionalidad','Nacionalidad'],['emergencia_nombre','Contacto de emergencia'],['emergencia_fono','Fono emergencia'],
];

function fld(label, val){ return `<div class="fld"><label>${label}</label><div class="val">${val!=null&&val!==''?esc(val):'—'}</div></div>`; }

function render(){
  const u = DATA.usuario, f = DATA.ficha || {};
  document.getElementById('hAvatar').textContent = (u.nombre||'?')[0].toUpperCase();
  document.getElementById('hNombre').textContent = [u.nombre,u.apellido,u.apellido_materno].filter(Boolean).join(' ');
  document.getElementById('hSub').textContent = [u.cargo, u.rut, u.email].filter(Boolean).join(' · ');
  document.getElementById('gLaboral').innerHTML =
    fld('Cargo', u.cargo) + fld('Perfil sistema', u.perfil) + fld('Jefatura', u.supervisor) +
    fld('Fecha de ingreso', fD(u.fecha_ingreso)) + fld('Tipo de contrato', f.tipo_contrato) + fld('Jornada', f.jornada) +
    fld('Centro de costo', u.centro_costo) + fld('Fecha de nacimiento', fD(u.fecha_nacimiento)) + fld('Teléfono corporativo', u.telefono);
  document.getElementById('gPrev').innerHTML =
    fld('AFP', f.afp) + fld('Salud', f.salud) + fld('Sueldo base', fP(f.sueldo_base)) +
    fld('Banco de pago', f.banco_pago) + fld('Tipo de cuenta', f.tipo_cuenta_pago) + fld('N° de cuenta', f.num_cuenta_pago);
  renderContacto();
  const docs = DATA.documentos || [];
  document.getElementById('docsEmpty').style.display = docs.length ? 'none' : '';
  document.getElementById('tbDocs').innerHTML = docs.map(d=>`<tr>
    <td><span class="tag">${esc(d.tipo)}</span></td><td>${esc(d.nombre_archivo)}</td>
    <td>${esc(d.subido_por||'—')}</td><td>${fD(d.created_at)}</td>
    <td><a href="/api/rrhh/docs/archivo/${d.id}?token=" onclick="return abrirDoc(${d.id})" style="font-weight:700"><i class="bi bi-download me-1"></i>Ver</a></td></tr>`).join('');
}
function renderContacto(){
  const f = DATA.ficha || {};
  document.getElementById('gContacto').innerHTML = CONTACTO.map(([k,lbl]) => EDIT
    ? `<div class="fld"><label>${lbl}</label><input id="c_${k}" value="${esc(f[k]||'')}"></div>`
    : fld(lbl, f[k])).join('');
}
function modoEdicion(on){ EDIT = on; document.getElementById('btnEditar').style.display = on?'none':''; document.getElementById('btnGuardar').style.display = on?'':'none'; renderContacto(); }
async function guardar(){
  const body = {}; CONTACTO.forEach(([k]) => body[k] = document.getElementById('c_'+k).value.trim());
  const j = await (await fetch('/api/rrhh/ficha/'+DATA.usuario.id_usuario, { method:'PUT', headers:HJ, body:JSON.stringify(body) })).json();
  if (!j.success) return alert(j.error||'No se pudo guardar');
  Object.assign(DATA.ficha = DATA.ficha||{}, body);
  modoEdicion(false); toast('✓ Datos de contacto actualizados');
}
async function abrirDoc(id){
  try {
    const r = await fetch('/api/rrhh/docs/archivo/'+id, { headers:H });
    if (!r.ok) { alert('No se pudo abrir el documento'); return false; }
    const blob = await r.blob(); window.open(URL.createObjectURL(blob), '_blank');
  } catch(e){ alert('Error al abrir'); }
  return false;
}
async function cargarLiqs(){
  try {
    const j = await (await fetch('/api/rrhh/remuneraciones/mias', { headers:H })).json();
    const rows = j.data||[]; if (!rows.length) return;
    document.getElementById('pLiq').style.display = '';
    document.getElementById('tbLiq').innerHTML = rows.map(l=>`<tr>
      <td><b>${esc(l.mes)}</b></td><td>${fP(l.total_haberes)}</td><td style="color:#b91c1c">−${fP(l.total_descuentos).slice(0)}</td>
      <td style="font-weight:700;color:#15803d">${fP(l.liquido)}</td>
      <td><a href="#" onclick="return verLiq(${l.id})" style="font-weight:700"><i class="bi bi-receipt me-1"></i>Ver</a></td></tr>`).join('');
  } catch(e){}
}
async function verLiq(id){
  const j = await (await fetch('/api/rrhh/remuneraciones/liquidacion/'+id, { headers:H })).json();
  if (!j.success) { alert(j.error||'Error'); return false; }
  const l = j.data, d = l.detalle||{};
  const co = v => '$'+Math.round(Number(v)||0).toLocaleString('es-CL');
  const fila = (lbl,v,neg) => (Number(v)||0) ? `<tr><td style="padding:3px 8px">${lbl}</td><td style="text-align:right;padding:3px 8px;${neg?'color:#b91c1c':''}">${neg?'−':''}${co(v)}</td></tr>` : '';
  const w = window.open('', '_blank');
  w.document.write(`<html><head><title>Liquidación ${l.mes}</title></head>
  <body style="font-family:Segoe UI,sans-serif;max-width:620px;margin:30px auto;color:#1e293b;font-size:13px">
    <h3 style="color:#012d70;margin:0">LIQUIDACIÓN DE SUELDO — ${l.mes}</h3>
    <div style="color:#64748b;font-size:12px;margin-bottom:12px">AutoFácil SpA · RUT 76.916.907-K</div>
    <p><b>${esc(l.nombre)}</b> · ${esc(l.rut||'')} · ${esc(l.cargo||'')}<br>
    <span style="color:#64748b;font-size:12px">${esc(d.tipo_contrato||'')} · AFP ${esc(d.afp||'—')} · ${esc(d.salud||'—')}</span></p>
    <table style="width:100%;border-collapse:collapse">
      <tr><td colspan="2" style="background:#eff6ff;font-weight:800;font-size:11px;padding:5px 8px">HABERES</td></tr>
      ${fila('Sueldo base',d.sueldo_base)}${fila('Comisiones',d.comisiones)}${fila('Otros imponibles',d.otros_imponibles)}${fila('Gratificación legal',d.gratificacion)}${fila('Colación',d.colacion)}${fila('Movilización',d.movilizacion)}${fila('Otros no imponibles',d.otros_no_imponibles)}
      <tr><td style="font-weight:700;padding:3px 8px">Total haberes</td><td style="text-align:right;font-weight:700;padding:3px 8px">${co(d.total_haberes)}</td></tr>
      <tr><td colspan="2" style="background:#eff6ff;font-weight:800;font-size:11px;padding:5px 8px">DESCUENTOS</td></tr>
      ${fila('AFP '+(d.afp||''),d.desc_afp,1)}${fila('Salud',d.desc_salud,1)}${fila('Seguro cesantía AFC',d.desc_afc,1)}${fila('Impuesto único',d.impuesto,1)}${fila('Otros descuentos',d.otros_descuentos,1)}
      <tr><td style="font-weight:700;padding:3px 8px">Total descuentos</td><td style="text-align:right;font-weight:700;color:#b91c1c;padding:3px 8px">−${co(d.total_descuentos)}</td></tr>
      <tr><td style="font-weight:800;font-size:15px;padding:10px 8px 3px">LÍQUIDO A PAGAR</td><td style="text-align:right;font-weight:800;font-size:15px;color:#15803d;padding:10px 8px 3px">${co(d.liquido)}</td></tr>
    </table>
    <div style="margin-top:14px;font-size:10px;color:#94a3b8">Emitida ${l.emitido_at?new Date(l.emitido_at).toLocaleDateString('es-CL'):''} por ${esc(l.emitido_por||'')} · documento informativo</div>
    <script>window.print();<\/script>
  </body></html>`);
  w.document.close();
  return false;
}
(async()=>{
  const j = await (await fetch('/api/rrhh/ficha', { headers:H })).json();
  if (!j.success) { alert(j.error||'Error'); return; }
  DATA = j.data; render();
  cargarLiqs();
})();
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
