<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitudes — RRHH</title>
  <!-- v1.0 — solicitudes paperless: anticipo, prestamo, aumento, ascenso con cadena de aprobacion y firma FES -->
  <link href="/css/bootstrap.min.css" rel="stylesheet"><link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; }
    .topnav-left { display:flex; align-items:center; gap:16px; } .topnav-brand img { height:32px; filter:brightness(0) invert(1); } .topnav-brand { text-decoration:none; display:flex; gap:8px; align-items:center; }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.7); font-size:.85rem; } .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; color:#fff; font-size:.85rem; } .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .main { padding:28px 34px; max-width:1000px; margin:0 auto; }
    .page-banner { background:linear-gradient(135deg,var(--navy-dark),var(--navy-light) 60%,#3b82f6); border-radius:16px; color:#fff; padding:22px 30px; margin-bottom:22px; display:flex; align-items:center; gap:16px; } .page-banner i { font-size:2.2rem; opacity:.9; } .page-banner h2 { margin:0; font-size:1.25rem; font-weight:700; } .page-banner p { margin:2px 0 0; opacity:.85; font-size:.84rem; }
    .tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; } .tab { padding:8px 16px; border-radius:20px; font-size:.84rem; font-weight:700; cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#64748b; } .tab.active { background:var(--navy); color:#fff; border-color:var(--navy); }
    .badge-n { background:#dc2626; color:#fff; border-radius:10px; padding:0 6px; font-size:.68rem; margin-left:6px; }
    .card-box { background:#fff; border-radius:14px; box-shadow:0 1px 6px rgba(0,0,0,.07); padding:22px; margin-bottom:16px; }
    .tipos { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; }
    .tipo-btn { border:1.5px solid #e2e8f0; border-radius:12px; background:#fff; padding:14px; cursor:pointer; text-align:left; }
    .tipo-btn:hover { border-color:var(--navy); } .tipo-btn i { color:var(--navy); font-size:1.3rem; }
    .tipo-btn b { display:block; font-size:.86rem; margin-top:6px; } .tipo-btn small { color:#94a3b8; font-size:.72rem; }
    .fld { margin-bottom:12px; } .fld label { display:block; font-size:.78rem; font-weight:600; color:#475569; margin-bottom:5px; } .fld input, .fld textarea, .fld select { width:100%; border:1px solid #cbd5e1; border-radius:8px; padding:9px 11px; font-size:.88rem; box-sizing:border-box; }
    .btn-navy { background:var(--navy); color:#fff; border:none; border-radius:8px; padding:10px 18px; font-weight:700; font-size:.88rem; cursor:pointer; }
    .btn-mini { border:1px solid #cbd5e1; background:#fff; border-radius:7px; padding:5px 10px; font-size:.78rem; cursor:pointer; font-weight:600; }
    .empty { text-align:center; color:#94a3b8; padding:30px 0; }
    .sol { border:1px solid #eef2f7; border-radius:12px; padding:14px 16px; margin-bottom:12px; }
    .pill { border-radius:12px; padding:2px 9px; font-size:.7rem; font-weight:800; } .PENDIENTE { background:#fef3c7; color:#92400e; } .APROBADA { background:#dcfce7; color:#166534; } .RECHAZADA { background:#fee2e2; color:#b91c1c; }
    .paso-ok { color:#166534; } .paso-no { color:#b91c1c; } .paso-p { color:#94a3b8; }
    .timeline { font-size:.8rem; margin-top:8px; border-left:3px solid #eef2f7; padding-left:12px; }
    .timeline div { margin-bottom:4px; }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-left"><a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a> › <a href="/recursos-humanos/">Recursos Humanos</a> › <span style="color:#fff;font-weight:600"><i class="bi bi-send-check me-1"></i>Solicitudes</span></div></div>
  <div style="display:flex;gap:10px;align-items:center"><span class="user-chip" id="navNombre">—</span><button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button></div>
</nav>
<div class="main">
  <div class="page-banner"><i class="bi bi-send-check"></i><div><h2>Solicitudes</h2><p>Paperless: pide tu anticipo, préstamo, aumento o ascenso — viaja por la cadena de aprobación con firma electrónica y se ejecuta solo al aprobarse.</p></div></div>
  <div class="tabs">
    <div class="tab active" id="t1" onclick="tab('mias')"><i class="bi bi-person me-1"></i>Mis Solicitudes</div>
    <div class="tab" id="t2" onclick="tab('aprobar')"><i class="bi bi-check2-square me-1"></i>Por Aprobar<span class="badge-n" id="badgeA" style="display:none">0</span></div>
    <div class="tab" id="t3" onclick="tab('todas')" style="display:none"><i class="bi bi-collection me-1"></i>Todas y Configuración</div>
  </div>
  <div id="secMias"></div>
  <div id="secAprobar" style="display:none"></div>
  <div id="secTodas" style="display:none"></div>
</div>
<script src="/js/auth-guard.js"></script>
<script>
const TK=sessionStorage.getItem('token'), YO=JSON.parse(sessionStorage.getItem('usuario')||'null');
if(!TK||!YO) location.href='/login.html';
document.getElementById('navNombre').textContent=`${YO?.nombre||''} ${YO?.apellido||''}`.trim();
function logout(){ sessionStorage.clear(); location.href='/login.html'; }
const H={Authorization:'Bearer '+TK}, HJ={...H,'Content-Type':'application/json'};
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;');
const CLP=v=>'$'+Math.round(Number(v)||0).toLocaleString('es-CL');
let TIPOS=[], ES_RRHH=false;

function tab(t){
  ['mias','aprobar','todas'].forEach((x,i)=>{ document.getElementById('sec'+x[0].toUpperCase()+x.slice(1)).style.display=x===t?'':'none';
    document.getElementById('t'+(i+1)).classList.toggle('active',x===t); });
  if(t==='mias')cargarMias(); if(t==='aprobar')cargarAprobar(); if(t==='todas')cargarTodas();
}

/* ── formulario por tipo ── */
function formTipo(t){
  let h='';
  if(t.codigo==='ANTICIPO'||t.codigo==='PRESTAMO') h+=`
    <div class="fld"><label>Monto solicitado *</label><input id="fMonto" placeholder="$"></div>
    <div class="fld"><label>N° de cuotas *</label><input id="fCuotas" type="number" min="1" max="36" value="1"></div>
    ${t.codigo==='PRESTAMO'?'<small style="color:#94a3b8">La tasa de interés la fija RRHH al aprobar (tope: TMC vigente). La cuota se calcula francesa.</small>':''}`;
  if(t.codigo==='AUMENTO') h+=`<div class="fld"><label>Sueldo base propuesto *</label><input id="fSueldo" placeholder="$"></div>`;
  if(t.codigo==='ASCENSO') h+=`
    <div class="fld"><label>Cargo propuesto *</label><input id="fCargo"></div>
    <div class="fld"><label>Sueldo propuesto (opcional)</label><input id="fSueldo" placeholder="$"></div>`;
  h+=`<div class="fld"><label>Fundamento / comentario ${t.codigo==='OTRA'?'*':''}</label><textarea id="fCom" rows="3" placeholder="Explica tu solicitud"></textarea></div>`;
  return h;
}
window.nuevaSol=codigo=>{
  const t=TIPOS.find(x=>x.codigo===codigo);
  const dlg=document.createElement('dialog'); dlg.style.cssText='border:none;border-radius:14px;max-width:480px;width:92%;padding:22px';
  dlg.innerHTML=`<h6 style="color:var(--navy);margin:0 0 4px"><i class="bi ${t.icono} me-1"></i>${esc(t.nombre)}</h6>
    <small style="color:#94a3b8">${esc(t.descripcion||'')}<br>Cadena de aprobación: <b>${t.cadena.join(' → ')}</b></small>
    <div style="margin-top:14px">${formTipo(t)}</div>
    <div style="text-align:right;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn-mini" onclick="this.closest('dialog').close()">Cancelar</button>
      <button class="btn-navy" onclick="enviarSol('${t.codigo}',this)"><i class="bi bi-send me-1"></i>Enviar solicitud</button></div>`;
  document.body.appendChild(dlg); dlg.showModal(); dlg.addEventListener('close',()=>dlg.remove());
  const m=dlg.querySelector('#fMonto')||dlg.querySelector('#fSueldo');
  dlg.querySelectorAll('#fMonto,#fSueldo').forEach(el=>el.addEventListener('input',()=>{ const n=parseInt(el.value.replace(/\D/g,''))||0; el.value=n?CLP(n):''; }));
};
window.enviarSol=async(codigo,btn)=>{
  const dlg=btn.closest('dialog'), v=id=>{ const e=dlg.querySelector('#'+id); return e?e.value:''; };
  const num=s=>parseInt(String(s).replace(/\D/g,''))||0;
  const body={tipo:codigo, monto:num(v('fMonto')), cuotas:parseInt(v('fCuotas'))||1,
    sueldo_propuesto:num(v('fSueldo')), cargo_propuesto:v('fCargo'), comentario:v('fCom')};
  btn.disabled=true;
  const j=await (await fetch('/api/rrhh/solicitudes',{method:'POST',headers:HJ,body:JSON.stringify(body)})).json();
  if(!j.success){ alert(j.error); btn.disabled=false; return; }
  dlg.close(); cargarMias();
};

/* ── render de una solicitud con su timeline ── */
function datosTxt(s){
  const d=s.datos||{};
  if(s.tipo==='ANTICIPO') return `Monto ${CLP(d.monto)} en ${d.cuotas} cuota(s)`;
  if(s.tipo==='PRESTAMO') return `Monto ${CLP(d.monto)} en ${d.cuotas} cuota(s)${d.tasa_pct!=null?` · tasa ${d.tasa_pct}%`:''}`;
  if(s.tipo==='AUMENTO') return `Sueldo propuesto ${CLP(d.sueldo_propuesto)}`;
  if(s.tipo==='ASCENSO') return `Cargo propuesto: ${esc(d.cargo_propuesto)}${d.sueldo_propuesto?` · sueldo ${CLP(d.sueldo_propuesto)}`:''}`;
  return '';
}
function timeline(s,cadena){
  const cad=cadena||['JEFATURA','RRHH'];
  return `<div class="timeline">${cad.map((r,i)=>{
    const f=(s.firmas||[]).find(x=>x.paso===i);
    if(f) return `<div class="${f.decision==='APROBAR'?'paso-ok':'paso-no'}">${f.decision==='APROBAR'?'✔':'✕'} <b>${r}</b> — ${esc(f.nombre)} ${f.cargo?'('+esc(f.cargo)+')':''} · ${f.fecha}${f.comentario?' · «'+esc(f.comentario)+'»':''}</div>`;
    return `<div class="paso-p">${s.estado==='PENDIENTE'&&s.paso===i?'⏳':'○'} <b>${r}</b> — ${s.estado==='PENDIENTE'&&s.paso===i?'esperando':'pendiente'}</div>`;
  }).join('')}</div>`;
}
function solHTML(s,extra){
  const t=TIPOS.find(x=>x.codigo===s.tipo)||{nombre:s.tipo,icono:'bi-file-text',cadena:['JEFATURA','RRHH']};
  return `<div class="sol"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
    <b><i class="bi ${t.icono} me-1" style="color:var(--navy)"></i>${esc(t.nombre)} #${s.id} ${s.nombre&&extra?'— '+esc(s.nombre):''}</b>
    <span class="pill ${s.estado}">${s.estado}</span></div>
    <div style="font-size:.85rem;color:#475569;margin-top:4px">${datosTxt(s)}${s.comentario?`<div style="color:#94a3b8">«${esc(s.comentario)}»</div>`:''}</div>
    ${timeline(s,t.cadena)}${extra||''}</div>`;
}

/* ── Mis solicitudes ── */
async function cargarMias(){
  const sec=document.getElementById('secMias');
  const j=await (await fetch('/api/rrhh/solicitudes/mias',{headers:H})).json();
  const ss=(j.data||{}).solicitudes||[];
  sec.innerHTML=`<div class="card-box"><h6 style="color:var(--navy)">Nueva solicitud</h6>
    <div class="tipos">${TIPOS.map(t=>`<button class="tipo-btn" onclick="nuevaSol('${t.codigo}')"><i class="bi ${t.icono}"></i><b>${esc(t.nombre)}</b><small>${t.cadena.join(' → ')}</small></button>`).join('')}</div></div>
    <div class="card-box"><h6 style="color:var(--navy)">Historial</h6>
    ${ss.map(s=>solHTML(s,'')).join('')||'<div class="empty">Aún no has enviado solicitudes.</div>'}</div>`;
}

/* ── Por aprobar ── */
async function cargarAprobar(){
  const sec=document.getElementById('secAprobar');
  const j=await (await fetch('/api/rrhh/solicitudes/por-aprobar',{headers:H})).json();
  const ss=(j.data||{}).solicitudes||[];
  const b=document.getElementById('badgeA'); b.style.display=ss.length?'':'none'; b.textContent=ss.length;
  sec.innerHTML=`<div class="card-box"><h6 style="color:var(--navy)">Solicitudes esperando tu decisión (${ss.length})</h6>
    ${ss.map(s=>{
      const ajuste = ES_RRHH && s.rol_paso==='RRHH' && ['ANTICIPO','PRESTAMO','AUMENTO','ASCENSO'].includes(s.tipo)
        ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;font-size:.8rem">
            ${s.tipo==='PRESTAMO'?`<label>Tasa % mensual <input id="aj_tasa_${s.id}" style="width:80px;border:1px solid #cbd5e1;border-radius:6px;padding:3px 8px" value="${s.datos.tasa_pct??''}" placeholder="ej 1.5"></label>`:''}
            ${['ANTICIPO','PRESTAMO'].includes(s.tipo)?`<label>Cuotas <input id="aj_cuotas_${s.id}" style="width:60px;border:1px solid #cbd5e1;border-radius:6px;padding:3px 8px" value="${s.datos.cuotas||1}"></label>`:''}
           </div>`:'';
      return solHTML(s,`${ajuste}<div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn-navy" onclick="resolver(${s.id},'APROBAR','${s.tipo}',this)"><i class="bi bi-check2 me-1"></i>Aprobar y firmar</button>
        <button class="btn-mini" style="background:#fee2e2;color:#b91c1c;border-color:#fecaca" onclick="resolver(${s.id},'RECHAZAR','${s.tipo}',this)"><i class="bi bi-x me-1"></i>Rechazar</button></div>`);
    }).join('')||'<div class="empty">Nada pendiente de tu firma. 🎉</div>'}</div>`;
}
window.resolver=async(id,decision,tipo,btn)=>{
  let comentario='';
  if(decision==='RECHAZAR'){ comentario=prompt('Motivo del rechazo (lo verá el solicitante):')||''; if(!comentario.trim()) return; }
  else if(!confirm('¿Aprobar y firmar electrónicamente este paso? Si eres el último de la cadena, la solicitud se ejecuta de inmediato.')) return;
  const datos={};
  const t=document.getElementById('aj_tasa_'+id), c=document.getElementById('aj_cuotas_'+id);
  if(t&&t.value!=='') datos.tasa_pct=parseFloat(String(t.value).replace(',','.'));
  if(c&&c.value!=='') datos.cuotas=parseInt(c.value);
  btn.disabled=true;
  const j=await (await fetch('/api/rrhh/solicitudes/resolver',{method:'POST',headers:HJ,body:JSON.stringify({id,decision,comentario,datos})})).json();
  if(!j.success){ alert(j.error); btn.disabled=false; return; }
  if(j.data.efecto) alert('✔ Aprobada y ejecutada:\n'+j.data.efecto);
  cargarAprobar();
};

/* ── Todas + configuración (RRHH) ── */
async function cargarTodas(){
  const sec=document.getElementById('secTodas');
  const j=await (await fetch('/api/rrhh/solicitudes/todas',{headers:H})).json();
  if(!j.success){ sec.innerHTML=`<div class="card-box empty">${esc(j.error)}</div>`; return; }
  const ss=j.data.solicitudes||[];
  sec.innerHTML=`<div class="card-box"><h6 style="color:var(--navy)">Configuración de cadenas de aprobación</h6>
    <div style="font-size:.8rem;color:#94a3b8;margin-bottom:10px">Marca los pasos de cada tipo (en orden JEFATURA → GERENCIA → RRHH según corresponda). JEFATURA = el "reporta a" de la ficha; GERENCIA = permiso rh_aprobar; RRHH = permiso rh_colaboradores.</div>
    ${TIPOS.map(t=>`<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:8px 0;border-bottom:1px solid #f1f5f9">
      <b style="min-width:220px"><i class="bi ${t.icono} me-1" style="color:var(--navy)"></i>${esc(t.nombre)}</b>
      ${['JEFATURA','GERENCIA','RRHH'].map(r=>`<label style="font-size:.82rem"><input type="checkbox" data-t="${t.codigo}" data-r="${r}" ${t.cadena.includes(r)?'checked':''}> ${r}</label>`).join('')}
      <button class="btn-mini" onclick="guardarCadena('${t.codigo}',this)">Guardar</button></div>`).join('')}</div>
    <div class="card-box"><h6 style="color:var(--navy)">Todas las solicitudes</h6>
    ${ss.map(s=>solHTML(s,' ')).join('')||'<div class="empty">Sin solicitudes.</div>'}</div>`;
}
window.guardarCadena=async(codigo,btn)=>{
  const orden=['JEFATURA','GERENCIA','RRHH'];
  const cadena=orden.filter(r=>document.querySelector(`input[data-t="${codigo}"][data-r="${r}"]`)?.checked);
  const j=await (await fetch('/api/rrhh/solicitudes/tipos',{method:'POST',headers:HJ,body:JSON.stringify({codigo,cadena})})).json();
  if(!j.success) return alert(j.error);
  btn.textContent='✔'; setTimeout(()=>btn.textContent='Guardar',1200);
  const t=TIPOS.find(x=>x.codigo===codigo); if(t) t.cadena=cadena;
};

(async()=>{
  const jt=await (await fetch('/api/rrhh/solicitudes/tipos',{headers:H})).json();
  TIPOS=(jt.data||{}).tipos||[];
  try{ const jp=await (await fetch('/api/rrhh/solicitudes/todas',{headers:H})).json();
    ES_RRHH=!!jp.success;
  }catch(e){}
  if(ES_RRHH) document.getElementById('t3').style.display='';
  cargarMias(); cargarAprobar();
})();
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
