<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vacaciones — RRHH</title>
  <!-- v1.2 — saldo de vacaciones (devengado proporcional vs usados) -->
  <link href="/css/bootstrap.min.css" rel="stylesheet"><link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; }
    .topnav-left { display:flex; align-items:center; gap:16px; } .topnav-brand img { height:32px; filter:brightness(0) invert(1); } .topnav-brand { text-decoration:none; display:flex; gap:8px; align-items:center; }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.7); font-size:.85rem; } .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; color:#fff; font-size:.85rem; } .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .main { padding:28px 34px; max-width:980px; margin:0 auto; }
    .page-banner { background:linear-gradient(135deg,#012d70,#0141A2 50%,#009AFE); border-radius:16px; color:#fff; padding:22px 30px; margin-bottom:22px; display:flex; align-items:center; gap:16px; } .page-banner i { font-size:2.2rem; opacity:.9; } .page-banner h2 { margin:0; font-size:1.25rem; font-weight:700; } .page-banner p { margin:2px 0 0; opacity:.85; font-size:.84rem; }
    .tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; } .tab { padding:8px 16px; border-radius:20px; font-size:.84rem; font-weight:700; cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#64748b; } .tab.active { background:var(--navy); color:#fff; border-color:var(--navy); }
    .card-box { background:#fff; border-radius:14px; box-shadow:0 1px 6px rgba(0,0,0,.07); padding:22px; }
    .fld { margin-bottom:14px; } .fld label { display:block; font-size:.78rem; font-weight:600; color:#475569; margin-bottom:5px; } .fld input, .fld textarea { width:100%; border:1px solid #cbd5e1; border-radius:8px; padding:9px 11px; font-size:.88rem; box-sizing:border-box; } .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .btn-navy { background:var(--navy); color:#fff; border:none; border-radius:8px; padding:10px 18px; font-weight:700; font-size:.88rem; cursor:pointer; }
    table { width:100%; border-collapse:collapse; font-size:.85rem; } th { background:#f8fafc; color:#475569; text-transform:uppercase; font-size:.68rem; text-align:left; padding:10px 12px; border-bottom:1px solid #e5e7eb; } td { padding:10px 12px; border-bottom:1px solid #f1f5f9; }
    .pill { border-radius:12px; padding:2px 9px; font-size:.7rem; font-weight:700; } .PENDIENTE { background:#fef9c3; color:#854d0e; } .APROBADA { background:#dcfce7; color:#166534; } .RECHAZADA { background:#fee2e2; color:#b91c1c; }
    .btn-mini { border:1px solid #cbd5e1; background:#fff; border-radius:7px; padding:5px 10px; font-size:.78rem; cursor:pointer; font-weight:600; } .btn-mini.ok { background:#dcfce7; color:#166534; border-color:#86efac; } .btn-mini.no { background:#fee2e2; color:#b91c1c; border-color:#fca5a5; }
    .empty { text-align:center; color:#94a3b8; padding:30px 0; }
    .badge-count { background:#dc2626; color:#fff; border-radius:10px; padding:0 6px; font-size:.68rem; font-weight:800; margin-left:6px; display:none; }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-left"><a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge" id="versionBadge"></span></a>
    <div class="breadcrumb-nav"><a href="/">Inicio</a> › <a href="/soporte/">Soporte</a> › <a href="/soporte/recursos-humanos/">Recursos Humanos</a> › <span style="color:#fff;font-weight:600"><i class="bi bi-airplane me-1"></i>Vacaciones</span></div></div>
  <div style="display:flex;gap:10px;align-items:center"><span class="user-chip" id="navNombre">—</span><button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button></div>
</nav>
<div class="main">
  <div class="page-banner"><i class="bi bi-airplane"></i><div><h2>Solicitudes de Vacaciones</h2><p>Pide tus días, sigue la aprobación y revisa tu historial.</p></div></div>
  <div id="saldoBox" style="display:none;background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:10px 16px;font-size:.84rem;color:#1e3a8a;margin-bottom:14px"></div>
  <div class="tabs"><div class="tab active" id="t1" onclick="tab('crear')"><i class="bi bi-plus-circle me-1"></i>Nueva solicitud</div><div class="tab" id="t2" onclick="tab('mias')"><i class="bi bi-person me-1"></i>Mis solicitudes</div><div class="tab" id="t3" onclick="tab('bandeja')" style="display:none"><i class="bi bi-inbox me-1"></i>Bandeja RRHH<span class="badge-count" id="bandejaCount">0</span></div><div class="tab" id="t4" onclick="tab('historicas')" style="display:none"><i class="bi bi-clock-history me-1"></i>Solicitudes Históricas</div></div>
  <div id="secCrear" class="card-box">
    <div class="grid2"><div class="fld"><label>Desde</label><input type="date" id="fD"></div><div class="fld"><label>Hasta</label><input type="date" id="fH"></div></div>
    <div class="fld"><label>Comentario (opcional)</label><textarea id="fC" rows="3" placeholder="Motivo o detalle"></textarea></div>
    <div id="diasInfo" style="font-size:.82rem;color:#475569;margin-bottom:10px"></div>
    <div style="text-align:right"><button class="btn-navy" onclick="crear()"><i class="bi bi-send me-1"></i>Enviar solicitud</button></div>
  </div>
  <div id="secLista" class="card-box" style="display:none">
    <table><thead><tr><th>Solicitante</th><th>Desde</th><th>Hasta</th><th>Días</th><th>Estado</th><th id="thAcc"></th></tr></thead><tbody id="tb"><tr><td colspan="6" class="empty">Cargando…</td></tr></tbody></table>
  </div>
</div>
<script src="/js/auth-guard.js"></script>
<script>
  const token=sessionStorage.getItem('token'), yo=JSON.parse(sessionStorage.getItem('usuario')||'null');
  if(!token||!yo) location.href='/login.html';
  document.getElementById('navNombre').textContent=`${yo?.nombre||''} ${yo?.apellido||''}`.trim();
  function logout(){ sessionStorage.clear(); location.href='/login.html'; }
  const H={Authorization:'Bearer '+token}, HJ={...H,'Content-Type':'application/json'};
  const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); const fd=s=>s?String(s).slice(0,10):'';
  let VISTA='mias', ES_RRHH=false;
  function dias(){ const a=document.getElementById('fD').value, b=document.getElementById('fH').value; if(!a||!b||b<a){document.getElementById('diasInfo').textContent='';return;} const n=Math.floor((new Date(b)-new Date(a))/86400000)+1; document.getElementById('diasInfo').textContent=`Total: ${n} día(s) corridos.`; }
  document.getElementById('fD').addEventListener('change',dias); document.getElementById('fH').addEventListener('change',dias);
  const TABMAP={crear:'t1',mias:'t2',bandeja:'t3',historicas:'t4'};
  function tab(t){ ['t1','t2','t3','t4'].forEach(id=>document.getElementById(id).classList.remove('active')); document.getElementById(TABMAP[t]).classList.add('active'); document.getElementById('secCrear').style.display=t==='crear'?'':'none'; document.getElementById('secLista').style.display=t==='crear'?'none':''; if(t!=='crear'){VISTA=t; cargar();} }
  async function cargarPendientes(){ try{ const j=await(await fetch('/api/rrhh/pendientes',{headers:H})).json(); if(j.data?.es_rrhh){ document.getElementById('t3').style.display=''; document.getElementById('t4').style.display=''; const b=document.getElementById('bandejaCount'); const c=j.data.vacaciones||0; if(c>0){b.textContent=c;b.style.display='';}else b.style.display='none'; } }catch(e){} }
  async function crear(){ const fD=document.getElementById('fD').value, fH=document.getElementById('fH').value; if(!fD||!fH)return alert('Indica las fechas');
    const j=await(await fetch('/api/rrhh/vacaciones',{method:'POST',headers:HJ,body:JSON.stringify({fecha_desde:fD,fecha_hasta:fH,comentario:document.getElementById('fC').value})})).json();
    if(!j.success)return alert(j.error); alert(`Solicitud enviada (${j.data.dias} día/s)`); document.getElementById('fC').value=''; tab('mias'); }
  async function cargar(){ const tb=document.getElementById('tb'); tb.innerHTML='<tr><td colspan="6" class="empty">Cargando…</td></tr>';
    const j=await(await fetch('/api/rrhh/vacaciones?vista='+VISTA,{headers:H})).json(); const rows=j.data?.solicitudes||[]; ES_RRHH=j.data?.es_rrhh; document.getElementById('t3').style.display=ES_RRHH?'':'none'; document.getElementById('t4').style.display=ES_RRHH?'':'none'; cargarPendientes();
    document.getElementById('thAcc').textContent = VISTA==='bandeja'?'Acción':'';
    if(!rows.length){tb.innerHTML='<tr><td colspan="6" class="empty">Sin solicitudes.</td></tr>';return;}
    tb.innerHTML=rows.map(s=>`<tr><td>${esc(s.nombre||'')}</td><td>${fd(s.fecha_desde)}</td><td>${fd(s.fecha_hasta)}</td><td><b>${s.dias}</b></td>
      <td><span class="pill ${s.estado}">${s.estado}</span>${s.motivo_rechazo?`<div style="font-size:.7rem;color:#b91c1c">${esc(s.motivo_rechazo)}</div>`:''}</td>
      <td>${(VISTA==='bandeja'&&ES_RRHH&&s.estado==='PENDIENTE')?`<button class="btn-mini ok" onclick="resolver(${s.id},'APROBADA')">Aprobar</button> <button class="btn-mini no" onclick="resolver(${s.id},'RECHAZADA')">Rechazar</button>`:''}</td></tr>`).join('');
  }
  async function resolver(id,estado){ let mot=null; if(estado==='RECHAZADA'){ mot=prompt('Motivo del rechazo:')||''; }
    const j=await(await fetch(`/api/rrhh/vacaciones/${id}/resolver`,{method:'POST',headers:HJ,body:JSON.stringify({estado,motivo_rechazo:mot})})).json();
    if(!j.success)return alert(j.error); cargar(); }
  async function cargarSaldo(){ try{ const j=await(await fetch('/api/rrhh/vacaciones/saldo',{headers:H})).json(); if(!j.success)return; const d=j.data;
    const el=document.getElementById('saldoBox'); const co=n=>String(n).replace('.',',');
    if(d.sin_fecha){ el.innerHTML='<i class="bi bi-info-circle me-1"></i>'+d.mensaje; el.style.display=''; return; }
    el.innerHTML=`<i class="bi bi-sun me-1"></i><b>Tu saldo de vacaciones:</b> ${co(d.disponibles)} día(s) hábil(es) disponibles &nbsp;·&nbsp; abonados ${co(d.devengados)} (períodos + progresivo + proporcional del año en curso) &nbsp;·&nbsp; tomados ${co(d.usados)} &nbsp;·&nbsp; <a href="#" onclick="verCuenta();return false">ver cuenta corriente</a>`;
    el.style.display=''; }catch(e){} }
  async function verCuenta(idU){
    const q = idU ? '?id_usuario='+idU : '';
    const j = await (await fetch('/api/rrhh/vacaciones/cuenta'+q,{headers:H})).json();
    if (!j.success) return alert(j.error);
    const d = j.data, co=n=>Number(n).toLocaleString('es-CL',{minimumFractionDigits:0,maximumFractionDigits:1});
    const fmt = s => s ? s.split('-').reverse().join('-') : 'S/I';
    let filas = '';
    for (const p of (d.periodos||[])) {
      const prog = p.detalle_abono.filter(a=>a.tipo==='PROGRESIVO').reduce((s,a)=>s+a.dias,0);
      filas += `<tr style="background:#eff6ff;font-weight:700">
        <td style="padding:6px 8px">${fmt(p.desde)} → ${fmt(p.hasta)}</td>
        <td style="padding:6px 8px"><span style="font-size:.72rem;font-weight:800;border-radius:5px;padding:1px 7px;background:#dcfce7;color:#15803d">ABONO</span></td>
        <td style="padding:6px 8px;font-size:.8rem;color:#475569">Período (${co(p.abonos-prog)} legales${prog?` + ${co(prog)} progresivo art. 68`:''})</td>
        <td style="padding:6px 8px;text-align:right;color:#15803d">+${co(p.abonos)}</td>
        <td style="padding:6px 8px;text-align:right"></td></tr>`;
      for (const c of p.consumos) filas += `<tr>
        <td style="padding:3px 8px 3px 26px;color:#94a3b8;font-size:.8rem">↳</td>
        <td style="padding:3px 8px"><span style="font-size:.72rem;font-weight:800;border-radius:5px;padding:1px 7px;background:${c.tipo==='AJUSTE'?'#fef3c7':'#fee2e2'};color:${c.tipo==='AJUSTE'?'#92400e':'#b91c1c'}">${c.tipo}</span></td>
        <td style="padding:3px 8px;font-size:.8rem;color:#475569">${c.glosa||''}</td>
        <td style="padding:3px 8px;text-align:right;color:#b91c1c">−${co(c.dias)}</td>
        <td style="padding:3px 8px"></td></tr>`;
      filas += `<tr><td colspan="3" style="padding:2px 8px;text-align:right;font-size:.78rem;color:#64748b">saldo del período</td>
        <td style="padding:2px 8px;text-align:right;font-weight:800;color:${p.saldo>0?'#15803d':'#94a3b8'}">${co(p.saldo)}</td><td></td></tr>
        <tr><td colspan="5" style="border-bottom:1px solid #e5e7eb"></td></tr>`;
    }
    for (const c of (d.cargos_sin_periodo||[])) filas += `<tr>
      <td style="padding:3px 8px;color:#b91c1c;font-weight:700">SOBREGIRO</td>
      <td style="padding:3px 8px"><span style="font-size:.72rem;font-weight:800;border-radius:5px;padding:1px 7px;background:#fee2e2;color:#b91c1c">${c.tipo}</span></td>
      <td style="padding:3px 8px;font-size:.8rem">${c.glosa||''}</td>
      <td style="padding:3px 8px;text-align:right;color:#b91c1c">−${co(c.dias)}</td><td></td></tr>`;
    const w = window.open('','_blank','width=820,height=680');
    w.document.write(`<html><head><title>Cuenta corriente de vacaciones</title></head>
      <body style="font-family:Segoe UI,sans-serif;padding:24px;color:#1e293b">
      <h3 style="color:#012d70">Cuenta corriente de vacaciones</h3>
      <p><b>Disponibles: ${co(d.disponibles)} días hábiles</b> &nbsp;·&nbsp; saldo de períodos cumplidos ${co(d.saldo_periodos)} + proporcional del período en curso ${co(d.proporcional)}</p>
      <table style="width:100%;border-collapse:collapse;font-size:.85rem">${filas||'<tr><td style="padding:14px;text-align:center;color:#94a3b8">Sin movimientos aún (los períodos se depositan automáticamente cada aniversario).</td></tr>'}</table>
      <p style="font-size:.75rem;color:#64748b">Los días tomados se descuentan desde el período más antiguo hacia los más nuevos (FIFO). Abonos: 15 días legales por período cumplido + feriado progresivo (art. 68). Histórico AVSOFT cargado con fechas S/I.</p>
      </body></html>`);
  }
  (async()=>{ await cargarPendientes(); cargarSaldo(); const qid=new URLSearchParams(location.search).get('id'); if(qid){tab('mias');} else tab('crear'); })();
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
