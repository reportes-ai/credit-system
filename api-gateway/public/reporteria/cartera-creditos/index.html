<!DOCTYPE html>
<!-- v1.0 -->
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cartera de Créditos — Reportería AutoFácil</title>
<link rel="icon" href="/img/favicon.png" type="image/png">
<link href="/css/bootstrap-icons.css" rel="stylesheet">
<style>
  :root { --navy:#012d70; --accent:#0141A2; --sky:#009AFE; }
  * { box-sizing:border-box; } body { margin:0; background:#f0f4f8; font-family:'Segoe UI',system-ui,sans-serif; color:#1e293b; }
  .wrap { max-width:1150px; margin:24px auto; padding:0 20px 60px; }
  .banner { background:linear-gradient(135deg,#012d70,#0141A2 55%,#009AFE); border-radius:16px; color:#fff; padding:22px 30px; margin-bottom:20px; display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  .banner > i { font-size:2.4rem; opacity:.85; }
  .banner h2 { margin:0 0 3px; font-size:1.25rem; font-weight:700; }
  .banner p { margin:0; opacity:.8; font-size:.85rem; }
  .banner .filtros { margin-left:auto; display:flex; gap:8px; align-items:end; flex-wrap:wrap; }
  .banner label { font-size:.68rem; font-weight:700; opacity:.8; display:block; margin-bottom:3px; }
  .banner input { border:none; border-radius:8px; padding:7px 10px; font-size:.83rem; }
  .banner button { background:#fff; color:var(--accent); border:none; border-radius:8px; padding:7px 16px; font-size:.83rem; font-weight:700; cursor:pointer; }
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; margin-bottom:20px; }
  .kpi { background:#fff; border-radius:14px; padding:16px 20px; box-shadow:0 1px 6px rgba(0,0,0,.07); border-top:3px solid var(--accent); }
  .kpi .t { font-size:.7rem; font-weight:700; color:#6b7280; text-transform:uppercase; letter-spacing:.05em; }
  .kpi .v { font-size:1.45rem; font-weight:800; color:var(--navy); margin-top:2px; }
  .kpi .s { font-size:.75rem; color:#94a3b8; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media(max-width:900px){ .grid2 { grid-template-columns:1fr; } }
  .panel { background:#fff; border-radius:14px; padding:18px 20px; box-shadow:0 1px 6px rgba(0,0,0,.07); margin-bottom:18px; }
  .panel h5 { margin:0 0 12px; font-size:.92rem; font-weight:700; color:var(--navy); display:flex; align-items:center; gap:8px; }
  .panel h5 .badge3d { margin-left:auto; background:#eff6ff; color:var(--accent); border-radius:8px; padding:2px 9px; font-size:.65rem; font-weight:800; letter-spacing:.06em; }
  .cargando { text-align:center; color:#6b7280; padding:60px 0; font-size:.9rem; }
  @media print { #af-topnav, .banner .filtros { display:none; } body { background:#fff; } .panel, .kpi { box-shadow:none; border:1px solid #e5e7eb; } }
</style>
</head>
<body>
<div id="af-topnav"></div>
<script>window.AF_TOPNAV={breadcrumb:[{label:'Inicio',href:'/'},{label:'Reportería',href:'/reporteria'},{label:'Cartera de Créditos',icon:'bi-file-earmark-bar-graph',current:true}],actions:[{label:'Imprimir',icon:'bi-printer',onclick:'print()'}]};</script>

<div class="wrap">
  <div class="banner">
    <i class="bi bi-file-earmark-bar-graph"></i>
    <div>
      <h2>Cartera de Créditos</h2>
      <p>Resumen de la cartera: etapas, montos financiados y distribución por financiera y ejecutivo</p>
    </div>
    <div class="filtros">
      <div><label>Desde (mes)</label><input type="month" id="fDesde"></div>
      <div><label>Hasta (mes)</label><input type="month" id="fHasta"></div>
      <button onclick="cargar()"><i class="bi bi-funnel me-1"></i>Aplicar</button>
    </div>
  </div>

  <div id="contenido" class="cargando"><div class="spinner"></div>Cargando cartera…</div>
</div>

<script src="/js/auth-guard.js"></script>
<script src="/js/charts3d.js"></script>
<script>
const hdrs = () => ({ 'Authorization':'Bearer '+sessionStorage.getItem('token') });
const CLP = v => '$'+Number(v||0).toLocaleString('es-CL');
const N   = v => Number(v||0).toLocaleString('es-CL');
const EST_COLOR = { OTORGADO:'#22c55e', APROBADO:'#0141A2', RECHAZADO:'#ef4444', DESISTIDO:'#f59e0b', ANULADO:'#64748b', PENDIENTE:'#8b5cf6', 'SIN ESTADO':'#94a3b8' };

async function cargar(){
  const cont = document.getElementById('contenido');
  cont.className = 'cargando'; cont.textContent = 'Cargando cartera…';
  const q = new URLSearchParams();
  const d = document.getElementById('fDesde').value, h = document.getElementById('fHasta').value;
  if (d) q.set('desde', d); if (h) q.set('hasta', h);
  try {
    const r = await fetch('/api/reporteria/cartera?'+q, { headers: hdrs() });
    const j = await r.json();
    if (!j.success) throw new Error(j.error||'Error');
    render(j.data);
  } catch(e) { cont.innerHTML = '<span style="color:#dc2626">Error: '+e.message+'</span>'; }
}

function render(d){
  const cont = document.getElementById('contenido');
  cont.className = '';
  const ticket = d.kpi.otorgados ? d.kpi.monto_otorgado / d.kpi.otorgados : 0;
  const propia = (d.carteraPropia||[]).reduce((s,x)=>s+Number(x.n),0);
  cont.innerHTML = `
    <div class="kpis">
      <div class="kpi"><div class="t">Operaciones en base</div><div class="v">${N(d.kpi.total)}</div><div class="s">todas las etapas</div></div>
      <div class="kpi" style="border-top-color:#22c55e"><div class="t">Créditos otorgados</div><div class="v">${N(d.kpi.otorgados)}</div><div class="s">histórico</div></div>
      <div class="kpi" style="border-top-color:#22c55e"><div class="t">Monto financiado otorgado</div><div class="v">${AF3D.shortNum(d.kpi.monto_otorgado)}</div><div class="s">${CLP(d.kpi.monto_otorgado)}</div></div>
      <div class="kpi"><div class="t">Ticket promedio</div><div class="v">${CLP(Math.round(ticket))}</div><div class="s">por operación otorgada</div></div>
      <div class="kpi" style="border-top-color:#8b5cf6"><div class="t">Cartera propia activa</div><div class="v">${N(propia)}</div><div class="s">${(d.carteraPropia||[]).map(x=>`${x.estado_cartera}: ${x.n}`).join(' · ')||'—'}</div></div>
    </div>
    <div class="grid2">
      <div class="panel"><h5><i class="bi bi-pie-chart-fill"></i>Distribución por etapa <span class="badge3d">3D</span></h5><div id="chEstados"></div></div>
      <div class="panel"><h5><i class="bi bi-bank"></i>Monto otorgado por financiera <span class="badge3d">3D</span></h5><div id="chFin"></div></div>
    </div>
    <div class="panel"><h5><i class="bi bi-calendar3"></i>Colocaciones por mes — últimos 12 meses <span class="badge3d">3D</span></h5><div id="chMes"></div></div>
    <div class="panel"><h5><i class="bi bi-people-fill"></i>Distribución por ejecutivo (monto otorgado) <span class="badge3d">3D</span></h5><div id="chEjec"></div></div>`;

  AF3D.pie(document.getElementById('chEstados'),
    d.porEstado.map(x => ({ label: x.estado, value: Number(x.n), color: EST_COLOR[x.estado] })),
    { fmt: v => N(v)+' ops' });

  AF3D.bars(document.getElementById('chFin'),
    d.porFinanciera.map((x,i) => ({ label: x.financiera, value: Number(x.monto), sub: N(x.n)+' ops', color: ['#0141A2','#009AFE','#22c55e','#f59e0b'][i%4] })),
    { fmt: CLP, short: true });

  AF3D.bars(document.getElementById('chMes'),
    d.porMes.map(x => ({ label: x.mes, value: Number(x.monto), sub: N(x.n)+' ops', color: '#0141A2' })),
    { fmt: CLP, short: true, width: 900, height: 280 });

  AF3D.hbars(document.getElementById('chEjec'),
    d.porEjecutivo.map(x => ({ label: x.ejecutivo, value: Number(x.monto), sub: N(x.n)+' ops' })),
    { fmt: CLP, short: true, width: 900, labelW: 190 });
}
cargar();
</script>
<script src="/js/topnav.js"></script>
<script src="/js/app-version.js"></script>
</body>
</html>
