<!DOCTYPE html>
<!-- v1.0 -->
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cobranza y Mora — Reportería AutoFácil</title>
<link rel="icon" href="/img/favicon.png" type="image/png">
<link href="/css/bootstrap-icons.css" rel="stylesheet">
<style>
  :root { --navy:#012d70; --accent:#0141A2; }
  * { box-sizing:border-box; } body { margin:0; background:#f0f4f8; font-family:'Segoe UI',system-ui,sans-serif; color:#1e293b; }
  .wrap { max-width:1150px; margin:24px auto; padding:0 20px 60px; }
  .banner { background:linear-gradient(135deg,#7f1d1d,#b91c1c 55%,#f59e0b); border-radius:16px; color:#fff; padding:22px 30px; margin-bottom:20px; display:flex; align-items:center; gap:18px; }
  .banner > i { font-size:2.4rem; opacity:.85; }
  .banner h2 { margin:0 0 3px; font-size:1.25rem; font-weight:700; }
  .banner p { margin:0; opacity:.85; font-size:.85rem; }
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; margin-bottom:20px; }
  .kpi { background:#fff; border-radius:14px; padding:16px 20px; box-shadow:0 1px 6px rgba(0,0,0,.07); border-top:3px solid #dc2626; }
  .kpi .t { font-size:.7rem; font-weight:700; color:#6b7280; text-transform:uppercase; letter-spacing:.05em; }
  .kpi .v { font-size:1.45rem; font-weight:800; color:var(--navy); margin-top:2px; }
  .kpi .s { font-size:.75rem; color:#94a3b8; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media(max-width:900px){ .grid2 { grid-template-columns:1fr; } }
  .panel { background:#fff; border-radius:14px; padding:18px 20px; box-shadow:0 1px 6px rgba(0,0,0,.07); margin-bottom:18px; }
  .panel h5 { margin:0 0 12px; font-size:.92rem; font-weight:700; color:var(--navy); display:flex; align-items:center; gap:8px; }
  .panel h5 .badge3d { margin-left:auto; background:#fef2f2; color:#b91c1c; border-radius:8px; padding:2px 9px; font-size:.65rem; font-weight:800; letter-spacing:.06em; }
  table { width:100%; border-collapse:collapse; font-size:.82rem; }
  th { background:#f8fafc; text-align:left; padding:8px 10px; font-size:.68rem; text-transform:uppercase; color:#6b7280; letter-spacing:.04em; }
  td { padding:8px 10px; border-bottom:1px solid #f1f5f9; }
  td.num, th.num { text-align:right; }
  .chip-mora { border-radius:8px; padding:2px 9px; font-size:.72rem; font-weight:700; }
  .m1 { background:#fef9c3; color:#854d0e; } .m2 { background:#ffedd5; color:#9a3412; } .m3 { background:#fee2e2; color:#b91c1c; }
  .cargando { text-align:center; color:#6b7280; padding:60px 0; font-size:.9rem; }
  @media print { #af-topnav { display:none; } body { background:#fff; } .panel, .kpi { box-shadow:none; border:1px solid #e5e7eb; } }
</style>
</head>
<body>
<div id="af-topnav"></div>
<script>window.AF_TOPNAV={breadcrumb:[{label:'Inicio',href:'/'},{label:'Reportería',href:'/reporteria'},{label:'Cobranza y Mora',icon:'bi-cash-coin',current:true}],actions:[{label:'Ir a Cobranza',icon:'bi-bell',href:'/cobranza/'},{label:'Imprimir',icon:'bi-printer',onclick:'print()'}]};</script>

<div class="wrap">
  <div class="banner">
    <i class="bi bi-cash-coin"></i>
    <div>
      <h2>Cobranza y Mora</h2>
      <p>Cuotas vencidas por tramo, tasa de mora, recuperación y seguimiento de deudores — cartera AutoFácil al día de hoy</p>
    </div>
  </div>
  <div id="contenido" class="cargando">Cargando cartera en mora…</div>
</div>

<script src="/js/auth-guard.js"></script>
<script src="/js/charts3d.js"></script>
<script>
const hdrs = () => ({ 'Authorization':'Bearer '+sessionStorage.getItem('token') });
const CLP = v => '$'+Number(v||0).toLocaleString('es-CL');
const N   = v => Number(v||0).toLocaleString('es-CL');
const TRAMO_COLOR = { '1-15':'#facc15', '16-30':'#f59e0b', '31-60':'#f97316', '61-90':'#ef4444', '91+':'#991b1b' };
const chipMora = d => `<span class="chip-mora ${d<=30?'m1':d<=90?'m2':'m3'}">${N(d)} días</span>`;

(async function(){
  const cont = document.getElementById('contenido');
  try {
    const r = await fetch('/api/reporteria/cobranza-mora', { headers: hdrs() });
    const j = await r.json();
    if (!j.success) throw new Error(j.error||'Error');
    const d = j.data;
    const tasa = Number(d.kpi.saldo_impago_total) ? (Number(d.kpi.monto_vencido)/Number(d.kpi.saldo_impago_total)*100) : 0;
    cont.className = '';
    cont.innerHTML = `
      <div class="kpis">
        <div class="kpi"><div class="t">Monto vencido</div><div class="v">${CLP(d.kpi.monto_vencido)}</div><div class="s">${N(d.kpi.cuotas_vencidas)} cuotas vencidas</div></div>
        <div class="kpi"><div class="t">Créditos en mora</div><div class="v">${N(d.kpi.creditos_mora)}</div><div class="s">con al menos 1 cuota vencida</div></div>
        <div class="kpi" style="border-top-color:#f59e0b"><div class="t">Tasa de mora</div><div class="v">${tasa.toLocaleString('es-CL',{maximumFractionDigits:2})}%</div><div class="s">vencido / saldo impago total</div></div>
        <div class="kpi" style="border-top-color:#22c55e"><div class="t">Recuperado últimos 30 días</div><div class="v">${CLP(d.kpi.rec30_monto)}</div><div class="s">${N(d.kpi.rec30_n)} cuotas pagadas con atraso</div></div>
      </div>
      <div class="grid2">
        <div class="panel"><h5><i class="bi bi-pie-chart-fill"></i>Monto vencido por tramo de mora <span class="badge3d">3D</span></h5><div id="chTramosPie"></div></div>
        <div class="panel"><h5><i class="bi bi-bar-chart-fill"></i>Cuotas vencidas por tramo <span class="badge3d">3D</span></h5><div id="chTramosBar"></div></div>
      </div>
      <div class="panel"><h5><i class="bi bi-arrow-repeat"></i>Recuperación — cuotas pagadas con atraso, últimos 6 meses <span class="badge3d">3D</span></h5><div id="chRec"></div></div>
      <div class="panel">
        <h5><i class="bi bi-person-exclamation"></i>Seguimiento de deudores — top ${d.deudores.length} por monto vencido</h5>
        <div style="overflow-x:auto"><table>
          <thead><tr><th>Operación</th><th>Cliente</th><th class="num">Cuotas vencidas</th><th class="num">Monto vencido</th><th>Mora máxima</th><th></th></tr></thead>
          <tbody>${d.deudores.map(x => `
            <tr>
              <td><b>${x.numero_credito || x.num_op || x.id_credito}</b></td>
              <td>${x.cliente||'—'}</td>
              <td class="num">${N(x.cuotas_vencidas)}</td>
              <td class="num"><b>${CLP(x.monto_vencido)}</b></td>
              <td>${chipMora(Number(x.dias_mora))}</td>
              <td><a href="/cobranza/${Number(x.dias_mora)>90?'judicial':'prejudicial'}.html" style="color:var(--accent);font-size:.78rem;font-weight:700;text-decoration:none">Gestionar <i class="bi bi-arrow-right"></i></a></td>
            </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:#9ca3af">Sin deudores en mora 🎉</td></tr>'}
          </tbody>
        </table></div>
      </div>`;

    AF3D.pie(document.getElementById('chTramosPie'),
      d.tramos.map(x => ({ label: x.tramo+' días', value: Number(x.monto), color: TRAMO_COLOR[x.tramo] })),
      { fmt: CLP });

    AF3D.bars(document.getElementById('chTramosBar'),
      d.tramos.map(x => ({ label: x.tramo+' d', value: Number(x.n_cuotas), sub: N(x.n_creditos)+' créd.', color: TRAMO_COLOR[x.tramo] })),
      { fmt: v => N(v)+' cuotas' });

    AF3D.bars(document.getElementById('chRec'),
      d.recuperacion.map(x => ({ label: x.mes, value: Number(x.monto), sub: N(x.n)+' cuotas', color: '#22c55e' })),
      { fmt: CLP, short: true, width: 900, height: 270 });
  } catch(e) { cont.innerHTML = '<span style="color:#dc2626">Error: '+e.message+'</span>'; }
})();
</script>
<script src="/js/topnav.js"></script>
<script src="/js/app-version.js"></script>
</body>
</html>
