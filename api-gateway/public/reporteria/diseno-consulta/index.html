<!DOCTYPE html>
<!-- v1.0 -->
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diseño de Consulta — Reportería AutoFácil</title>
<link rel="icon" href="/img/favicon.png" type="image/png">
<link href="/css/bootstrap-icons.css" rel="stylesheet">
<style>
  :root { --navy:#012d70; --accent:#0141A2; }
  * { box-sizing:border-box; } body { margin:0; background:#eef2f7; font-family:'Segoe UI',system-ui,sans-serif; color:#1e293b; font-size:14px; }
  .layout { display:grid; grid-template-columns:240px 1fr; height:calc(100vh - 60px); }
  /* panel tablas */
  .sidebar { background:#fff; border-right:1.5px solid #dbe3ee; overflow:auto; }
  .sidebar .head { padding:10px 12px 6px; font-weight:800; color:var(--navy); font-size:.8rem; }
  .sidebar input { width:calc(100% - 20px); margin:0 10px 8px; border:1.5px solid #d1d5db; border-radius:8px; padding:5px 9px; font-size:.8rem; outline:none; }
  .tbl-item { padding:5px 12px; font-size:.78rem; cursor:grab; display:flex; justify-content:space-between; gap:6px; }
  .tbl-item:hover { background:#eff6ff; }
  .tbl-item .n { color:#94a3b8; font-size:.66rem; }
  /* zona principal */
  .main { display:flex; flex-direction:column; overflow:hidden; }
  .toolbar { background:#fff; border-bottom:1.5px solid #dbe3ee; padding:7px 12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .btnx { border:none; border-radius:8px; padding:6px 13px; font-size:.78rem; font-weight:700; cursor:pointer; }
  .btn-azul { background:linear-gradient(135deg,#0141A2,#009AFE); color:#fff; }
  .btn-verde { background:#16a34a; color:#fff; }
  .btn-gris { background:#f1f5f9; color:#475569; }
  .btn-on { outline:2px solid var(--accent); }
  /* lienzo */
  .canvas-wrap { flex:1; position:relative; overflow:auto; background:linear-gradient(90deg,#f3f6fb 1px,transparent 1px),linear-gradient(#f3f6fb 1px,transparent 1px); background-size:22px 22px; min-height:180px; }
  #canvas { position:relative; width:2400px; height:1400px; }
  svg#lineas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  svg#lineas line { stroke:#0141A2; stroke-width:2; pointer-events:stroke; cursor:pointer; }
  svg#lineas line.left { stroke-dasharray:6 4; }
  .tcard { position:absolute; width:200px; background:#fff; border:1.5px solid #b6c6de; border-radius:10px; box-shadow:0 3px 10px rgba(2,20,60,.12); overflow:hidden; }
  .tcard .tt { background:linear-gradient(135deg,#012d70,#0255c5); color:#fff; padding:5px 9px; font-size:.74rem; font-weight:800; cursor:move; display:flex; justify-content:space-between; }
  .tcard .tt .x { cursor:pointer; opacity:.7; }
  .tcard .cols { max-height:200px; overflow:auto; }
  .tcard .colr { padding:2px 9px; font-size:.72rem; cursor:grab; display:flex; gap:5px; align-items:center; border-bottom:1px solid #f6f8fc; }
  .tcard .colr:hover { background:#eff6ff; }
  .tcard .colr .pk { color:#eab308; font-size:.62rem; }
  .tcard .colr.dragover { background:#dbeafe; outline:1.5px dashed var(--accent); }
  /* grilla access */
  .grid-wrap { border-top:2px solid #b6c6de; background:#fff; overflow:auto; max-height:270px; }
  table.qgrid { border-collapse:collapse; font-size:.75rem; min-width:100%; }
  .qgrid th { background:#f1f5f9; border:1px solid #dbe3ee; padding:3px 8px; font-size:.62rem; color:#475569; text-align:left; white-space:nowrap; position:sticky; left:0; }
  .qgrid td { border:1px solid #e6ecf5; padding:2px 4px; min-width:150px; }
  .qgrid td input[type=text], .qgrid td select { width:100%; border:none; outline:none; font-size:.74rem; background:transparent; padding:2px 3px; font-family:inherit; }
  .qgrid td.chk { text-align:center; }
  .qgrid .del { color:#dc2626; cursor:pointer; font-size:.7rem; }
  /* resultados */
  .result-wrap { background:#fff; border-top:2px solid #b6c6de; overflow:auto; flex:1; min-height:120px; display:none; }
  table.rt { border-collapse:collapse; font-size:.74rem; width:max-content; min-width:100%; }
  .rt th { background:#012d70; color:#fff; padding:4px 9px; text-align:left; white-space:nowrap; position:sticky; top:0; }
  .rt td { padding:3px 9px; border-bottom:1px solid #f1f5f9; white-space:nowrap; }
  .rt tr:nth-child(even) td { background:#f8fafc; }
  .badge-info { font-size:.7rem; color:#475569; margin-left:auto; }
  dialog { border:none; border-radius:14px; padding:18px; max-width:640px; width:92vw; box-shadow:0 24px 64px rgba(0,0,0,.3); }
  dialog::backdrop { background:rgba(2,13,40,.55); }
  dialog pre { background:#0f172a; color:#a5f3fc; padding:12px; border-radius:10px; font-size:.76rem; overflow:auto; }
  .gl { font-size:.78rem; padding:6px 8px; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between; gap:8px; cursor:pointer; }
  .gl:hover { background:#eff6ff; }
</style>
</head>
<body>
<div id="af-topnav"></div>
<div class="layout">
  <div class="sidebar">
    <div class="head"><i class="bi bi-database"></i> Tablas <span id="nTablas" style="color:#94a3b8;font-weight:400"></span></div>
    <input id="buscaTabla" placeholder="Buscar tabla…" oninput="pintarTablas()">
    <div id="listaTablas"></div>
  </div>
  <div class="main">
    <div class="toolbar">
      <button class="btnx btn-azul" onclick="ejecutar()"><i class="bi bi-play-fill"></i> Ejecutar</button>
      <button class="btnx btn-gris" id="btnTot" onclick="toggleTotales()"><i class="bi bi-sigma"></i> Totales</button>
      <button class="btnx btn-gris" onclick="verSQL()">SQL</button>
      <span style="border-left:1.5px solid #dbe3ee;height:22px"></span>
      <button class="btnx btn-gris" onclick="abrirGuardar()"><i class="bi bi-save"></i> Guardar</button>
      <button class="btnx btn-gris" onclick="abrirLista()"><i class="bi bi-folder2-open"></i> Abrir</button>
      <button class="btnx btn-gris" onclick="nueva()"><i class="bi bi-file-earmark"></i> Nueva</button>
      <span style="border-left:1.5px solid #dbe3ee;height:22px"></span>
      <label style="font-size:.72rem;color:#475569">Devuelve
        <select id="limit" style="border:1.5px solid #d1d5db;border-radius:7px;font-size:.75rem;padding:2px 6px">
          <option>100</option><option selected>1000</option><option>5000</option>
        </select>
      </label>
      <button class="btnx btn-verde" onclick="exportar()" id="btnXls" style="display:none"><i class="bi bi-file-earmark-excel"></i> Excel</button>
      <span class="badge-info" id="info">Arrastra una tabla al lienzo · arrastra un campo sobre otro para relacionar · doble-clic en un campo lo agrega a la grilla</span>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
      <div id="canvas"><svg id="lineas"></svg></div>
    </div>
    <div class="grid-wrap"><table class="qgrid" id="qgrid"></table></div>
    <div class="result-wrap" id="resWrap"><table class="rt" id="rt"></table></div>
  </div>
</div>

<dialog id="dlgSQL"><h4 style="margin:0 0 10px;color:var(--navy)">SQL generado</h4><pre id="sqlTxt"></pre>
  <div style="text-align:right"><button class="btnx btn-gris" onclick="dlgSQL.close()">Cerrar</button></div></dialog>
<dialog id="dlgSave"><h4 style="margin:0 0 10px;color:var(--navy)">Guardar consulta</h4>
  <input id="qNombre" placeholder="Nombre de la consulta" style="width:100%;border:1.5px solid #d1d5db;border-radius:8px;padding:8px 10px">
  <label style="font-size:.8rem;display:flex;gap:6px;align-items:center;margin:10px 0"><input type="checkbox" id="qPublica"> Compartir con otros usuarios</label>
  <div style="text-align:right;display:flex;gap:8px;justify-content:end">
    <button class="btnx btn-gris" onclick="dlgSave.close()">Cancelar</button>
    <button class="btnx btn-verde" onclick="guardarConsulta()">Guardar</button></div></dialog>
<dialog id="dlgOpen"><h4 style="margin:0 0 10px;color:var(--navy)">Consultas guardadas</h4><div id="listaQ" style="max-height:340px;overflow:auto"></div>
  <div style="text-align:right;margin-top:10px"><button class="btnx btn-gris" onclick="dlgOpen.close()">Cerrar</button></div></dialog>

<script src="/js/auth-guard.js"></script>
<script src="/js/topnav.js"></script>
<script src="/js/xlsx.full.min.js"></script>
<script>
const token = sessionStorage.getItem('token');
const H = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
const $ = id => document.getElementById(id);

let SCHEMA = [];                       // [{nombre, filas, columnas:[{col,tipo,pk}]}]
let M = { tablas: [], joins: [], campos: [] };   // modelo
let seq = 0, qId = null, conTotales = false, RES = null;

/* ── panel de tablas ── */
async function cargarTablas() {
  const r = await fetch('/api/diseno-consulta/tablas', { headers: H });
  const j = await r.json();
  if (!j.success) { alert(j.error); return; }
  SCHEMA = j.data.sort((a, b) => a.nombre.localeCompare(b.nombre));
  $('nTablas').textContent = '(' + SCHEMA.length + ')';
  pintarTablas();
}
function pintarTablas() {
  const q = ($('buscaTabla').value || '').toLowerCase();
  $('listaTablas').innerHTML = SCHEMA.filter(t => t.nombre.includes(q)).map(t =>
    `<div class="tbl-item" draggable="true" ondragstart="event.dataTransfer.setData('text/tabla','${t.nombre}')"
      ondblclick="addTabla('${t.nombre}', 40+M.tablas.length*40, 30+M.tablas.length*30)" title="Doble clic o arrastra al lienzo">
      <span><i class="bi bi-table" style="color:#0141A2"></i> ${t.nombre}</span>
      <span class="n">${t.filas == null ? '' : (+t.filas).toLocaleString('es-CL')}</span></div>`).join('');
}
$('canvasWrap').addEventListener('dragover', e => { if (e.dataTransfer.types.includes('text/tabla')) e.preventDefault(); });
$('canvasWrap').addEventListener('drop', e => {
  const t = e.dataTransfer.getData('text/tabla');
  if (!t) return;
  const r = $('canvas').getBoundingClientRect();
  addTabla(t, e.clientX - r.left, e.clientY - r.top);
});

/* ── tablas en el lienzo ── */
function addTabla(nombre, x, y) {
  const alias = 'T' + (++seq);
  M.tablas.push({ nombre, alias, x: Math.max(4, x), y: Math.max(4, y) });
  pintarCanvas();
}
function rmTabla(alias) {
  M.tablas = M.tablas.filter(t => t.alias !== alias);
  M.joins = M.joins.filter(j => j.a.alias !== alias && j.b.alias !== alias);
  M.campos = M.campos.filter(f => f.alias !== alias);
  pintarCanvas(); pintarGrid();
}
function pintarCanvas() {
  const cv = $('canvas');
  cv.querySelectorAll('.tcard').forEach(e => e.remove());
  for (const t of M.tablas) {
    const sch = SCHEMA.find(s => s.nombre === t.nombre);
    const el = document.createElement('div');
    el.className = 'tcard'; el.style.left = t.x + 'px'; el.style.top = t.y + 'px'; el.dataset.alias = t.alias;
    el.innerHTML = `<div class="tt"><span>${t.nombre} <small style="opacity:.6">${t.alias}</small></span><span class="x" onclick="rmTabla('${t.alias}')">✕</span></div>
      <div class="cols">${(sch?.columnas || []).map(c => `
        <div class="colr" draggable="true" data-alias="${t.alias}" data-col="${c.col}"
          ondblclick="addCampo('${t.alias}','${c.col}')" title="${c.tipo} — doble clic agrega a la grilla; arrastra sobre un campo de otra tabla para relacionar">
          ${c.pk ? '<i class="bi bi-key-fill pk"></i>' : '<i class="bi bi-dot" style="color:#cbd5e1"></i>'}${c.col}</div>`).join('')}</div>`;
    cv.appendChild(el);
    // mover card
    const tt = el.querySelector('.tt');
    tt.addEventListener('mousedown', e => {
      if (e.target.classList.contains('x')) return;
      const sx = e.clientX - t.x, sy = e.clientY - t.y;
      const mv = ev => { t.x = Math.max(0, ev.clientX - sx); t.y = Math.max(0, ev.clientY - sy); el.style.left = t.x + 'px'; el.style.top = t.y + 'px'; pintarLineas(); };
      const up = () => { document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); };
      document.addEventListener('mousemove', mv); document.addEventListener('mouseup', up);
    });
  }
  // drag columna → columna = JOIN
  cv.querySelectorAll('.colr').forEach(c => {
    c.addEventListener('dragstart', e => e.dataTransfer.setData('text/col', c.dataset.alias + '|' + c.dataset.col));
    c.addEventListener('dragover', e => { if (e.dataTransfer.types.includes('text/col')) { e.preventDefault(); c.classList.add('dragover'); } });
    c.addEventListener('dragleave', () => c.classList.remove('dragover'));
    c.addEventListener('drop', e => {
      c.classList.remove('dragover');
      const [al, col] = (e.dataTransfer.getData('text/col') || '').split('|');
      if (!al || al === c.dataset.alias) return;
      M.joins.push({ a: { alias: al, col }, b: { alias: c.dataset.alias, col: c.dataset.col }, tipo: 'INNER' });
      pintarLineas();
    });
  });
  pintarLineas();
}
function posCol(alias, col) {
  const el = document.querySelector(`.colr[data-alias="${alias}"][data-col="${col}"]`);
  const card = document.querySelector(`.tcard[data-alias="${alias}"]`);
  if (!card) return null;
  const cvR = $('canvas').getBoundingClientRect();
  if (el) {
    const r = el.getBoundingClientRect();
    if (r.bottom > card.getBoundingClientRect().top + 24 && r.top < card.getBoundingClientRect().bottom)
      return { x: r.left - cvR.left + r.width / 2, y: r.top - cvR.top + r.height / 2, l: r.left - cvR.left, r: r.right - cvR.left };
  }
  const r = card.getBoundingClientRect();
  return { x: r.left - cvR.left + r.width / 2, y: r.top - cvR.top + 12, l: r.left - cvR.left, r: r.right - cvR.left };
}
function pintarLineas() {
  const svg = $('lineas');
  svg.innerHTML = '';
  M.joins.forEach((j, i) => {
    const a = posCol(j.a.alias, j.a.col), b = posCol(j.b.alias, j.b.col);
    if (!a || !b) return;
    const x1 = a.x < b.x ? a.r : a.l, x2 = a.x < b.x ? b.l : b.r;
    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    ln.setAttribute('x1', x1); ln.setAttribute('y1', a.y); ln.setAttribute('x2', x2); ln.setAttribute('y2', b.y);
    if (j.tipo === 'LEFT') ln.classList.add('left');
    ln.style.pointerEvents = 'stroke';
    ln.addEventListener('click', () => {
      const op = prompt(`Relación ${j.a.alias}.${j.a.col} = ${j.b.alias}.${j.b.col}\n1 = INNER (solo coincidentes)\n2 = LEFT (todos de ${j.a.alias})\n0 = eliminar relación`, j.tipo === 'LEFT' ? '2' : '1');
      if (op === '0') M.joins.splice(i, 1);
      else if (op === '2') j.tipo = 'LEFT';
      else if (op === '1') j.tipo = 'INNER';
      pintarLineas();
    });
    svg.appendChild(ln);
  });
}

/* ── grilla estilo Access ── */
function addCampo(alias, col) {
  M.campos.push({ alias, col, nombre: '', total: '', orden: '', mostrar: true, criterio: '', o: '' });
  pintarGrid();
}
function pintarGrid() {
  const filas = [
    ['Campo',    f => `<input type="text" value="${f.nombre || ''}" placeholder="${f.col}" onchange="M.campos[IDX].nombre=this.value" title="Alias de salida (opcional)">`],
    ['Tabla',    f => `${f.alias} · ${M.tablas.find(t => t.alias === f.alias)?.nombre || '?'}<div style="font-size:.66rem;color:#94a3b8">${f.col}</div>`],
    ['Total',    f => `<select onchange="M.campos[IDX].total=this.value" ${conTotales ? '' : 'style="display:none"'}>
        ${['', 'SUM', 'COUNT', 'AVG', 'MIN', 'MAX', 'WHERE'].map(o => `<option value="${o}" ${f.total === o ? 'selected' : ''}>${{'': 'Agrupar por', SUM: 'Suma', COUNT: 'Cuenta', AVG: 'Promedio', MIN: 'Mín', MAX: 'Máx', WHERE: 'Dónde'}[o]}</option>`).join('')}</select>`],
    ['Orden',    f => `<select onchange="M.campos[IDX].orden=this.value"><option value=""></option>
        <option value="ASC" ${f.orden === 'ASC' ? 'selected' : ''}>Ascendente</option><option value="DESC" ${f.orden === 'DESC' ? 'selected' : ''}>Descendente</option></select>`],
    ['Mostrar',  f => `<div class="chk"><input type="checkbox" ${f.mostrar !== false ? 'checked' : ''} onchange="M.campos[IDX].mostrar=this.checked"></div>`],
    ['Criterios', f => `<input type="text" value="${(f.criterio || '').replace(/"/g, '&quot;')}" onchange="M.campos[IDX].criterio=this.value" placeholder='>=100, "texto", LIKE a*, IN(1,2)…'>`],
    ['o:',       f => `<input type="text" value="${(f.o || '').replace(/"/g, '&quot;')}" onchange="M.campos[IDX].o=this.value">`],
    ['',         () => `<span class="del" onclick="M.campos.splice(IDX,1);pintarGrid()"><i class="bi bi-x-circle"></i> quitar</span>`],
  ];
  $('qgrid').innerHTML = filas.map(([lbl, fn]) =>
    `<tr><th>${lbl}</th>${M.campos.map((f, i) => `<td ${lbl === 'Mostrar' ? 'class="chk"' : ''}>${fn(f).replaceAll('IDX', i)}</td>`).join('')}
     ${M.campos.length === 0 && lbl === 'Campo' ? '<td style="color:#94a3b8;font-size:.72rem">doble-clic en un campo de una tabla del lienzo…</td>' : ''}</tr>`).join('');
}
function toggleTotales() {
  conTotales = !conTotales;
  $('btnTot').classList.toggle('btn-on', conTotales);
  if (!conTotales) M.campos.forEach(f => f.total = '');
  pintarGrid();
}

/* ── ejecutar / SQL / exportar ── */
function modelo() { return { ...M, limit: +$('limit').value }; }
async function ejecutar() {
  const r = await fetch('/api/diseno-consulta/ejecutar', { method: 'POST', headers: H, body: JSON.stringify(modelo()) });
  const j = await r.json();
  if (!j.success) { alert(j.error); return; }
  RES = j.data;
  const cols = RES.rows.length ? Object.keys(RES.rows[0]) : [];
  $('rt').innerHTML = `<thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead><tbody>` +
    RES.rows.map(r2 => `<tr>${cols.map(c => `<td>${r2[c] ?? ''}</td>`).join('')}</tr>`).join('') + '</tbody>';
  $('resWrap').style.display = 'block';
  $('btnXls').style.display = '';
  $('info').textContent = `${RES.n.toLocaleString('es-CL')} filas · ${RES.ms} ms`;
}
async function verSQL() {
  const r = await fetch('/api/diseno-consulta/sql', { method: 'POST', headers: H, body: JSON.stringify(modelo()) });
  const j = await r.json();
  $('sqlTxt').textContent = j.success ? j.data.sql : ('⚠ ' + j.error);
  dlgSQL.showModal();
}
function exportar() {
  if (!RES?.rows?.length) return;
  const ws = XLSX.utils.json_to_sheet(RES.rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'consulta');
  XLSX.writeFile(wb, 'consulta.xlsx');
}

/* ── guardar / abrir ── */
function abrirGuardar() { dlgSave.showModal(); }
async function guardarConsulta() {
  const nombre = $('qNombre').value.trim();
  if (!nombre) return;
  const r = await fetch('/api/diseno-consulta/guardadas', { method: 'POST', headers: H,
    body: JSON.stringify({ id: qId, nombre, publica: $('qPublica').checked, modelo: modelo() }) });
  const j = await r.json();
  if (j.success) { qId = j.data.id; dlgSave.close(); $('info').textContent = 'Consulta guardada ✓'; }
  else alert(j.error);
}
async function abrirLista() {
  const r = await fetch('/api/diseno-consulta/guardadas', { headers: H });
  const j = await r.json();
  $('listaQ').innerHTML = (j.data || []).map(q =>
    `<div class="gl" onclick="cargarConsulta(${q.id})"><span><i class="bi bi-file-earmark-text" style="color:#0141A2"></i> ${q.nombre}
      ${q.publica ? '<i class="bi bi-people" title="compartida" style="color:#16a34a"></i>' : ''}</span>
      <span style="color:#94a3b8;font-size:.68rem">${(q.autor || '')} · ${String(q.updated_at).slice(0, 10)}
      <i class="bi bi-trash" style="color:#dc2626;margin-left:6px" onclick="event.stopPropagation();borrarConsulta(${q.id})"></i></span></div>`).join('') || '<div style="color:#94a3b8">Sin consultas guardadas</div>';
  dlgOpen.showModal();
}
async function cargarConsulta(id) {
  const r = await fetch('/api/diseno-consulta/guardadas/' + id, { headers: H });
  const j = await r.json();
  if (!j.success) { alert(j.error); return; }
  M = { tablas: j.data.modelo.tablas || [], joins: j.data.modelo.joins || [], campos: j.data.modelo.campos || [] };
  seq = M.tablas.reduce((a, t) => Math.max(a, +String(t.alias).replace(/\D/g, '') || 0), 0);
  qId = j.data.id; $('qNombre').value = j.data.nombre;
  conTotales = M.campos.some(f => f.total);
  $('btnTot').classList.toggle('btn-on', conTotales);
  if (j.data.modelo.limit) $('limit').value = j.data.modelo.limit;
  dlgOpen.close(); pintarCanvas(); pintarGrid();
}
async function borrarConsulta(id) {
  if (!confirm('¿Eliminar esta consulta guardada?')) return;
  await fetch('/api/diseno-consulta/guardadas/' + id, { method: 'DELETE', headers: H });
  abrirLista();
}
function nueva() {
  M = { tablas: [], joins: [], campos: [] }; qId = null; seq = 0; RES = null;
  $('resWrap').style.display = 'none'; $('btnXls').style.display = 'none'; $('qNombre').value = '';
  pintarCanvas(); pintarGrid();
}

cargarTablas(); pintarGrid();
window.addEventListener('resize', pintarLineas);
$('canvasWrap').addEventListener('scroll', pintarLineas);
</script>
</body>
</html>
