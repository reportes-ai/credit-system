<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compras de Oficina — AutoFácil</title>
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; }
    .topnav { background: linear-gradient(90deg, #012d70, #0255c5); color: #fff; height: 60px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
    .topnav a { color: rgba(255,255,255,0.85); text-decoration: none; }
    .main { max-width: 900px; margin: 60px auto; padding: 0 20px; text-align: center; }
    .card-soon { background: #fff; border-radius: 16px; padding: 48px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    .card-soon i { font-size: 3.4rem; color: #155e75; }
    .card-soon h2 { margin: 16px 0 8px; color: #111827; }
    .card-soon p { color: #6b7280; }
    .btn-volver { display:inline-block; margin-top:18px; background:#0141A2; color:#fff; border-radius:8px; padding:8px 18px; text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
  <nav class="topnav">
    <a href="/soporte/"><img src="/img/logo.png" style="height:32px;filter:brightness(0) invert(1)"></a>
    <a href="/soporte/"><i class="bi bi-arrow-left me-1"></i>Volver a Soporte</a>
  </nav>
  <div class="main">
    <div class="card-soon">
      <i class="bi bi-bag"></i>
      <h2>Compras de Oficina</h2>
      <p>Esta pantalla estará disponible muy pronto: aquí podrás elegir tus artículos, la cantidad y la dirección de despacho.</p>
      <p class="text-muted" style="font-size:.85rem">Mientras tanto, el administrador está configurando el catálogo desde <b>Mantenedores › Mantenedor Compras</b>.</p>
      <a class="btn-volver" href="/soporte/">Volver</a>
    </div>
  </div>
  <script src="/js/app-version.js"></script>
</body>
</html>
