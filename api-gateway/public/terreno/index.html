<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#012d70">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AutoFácil Terreno</title>
  <link rel="manifest" href="/terreno/manifest.json">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/img/favicon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <!-- v1.0 -->
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --accent:#009AFE; --ok:#15803d; --bad:#dc2626; --warn:#b45309; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; background:#eef2f7; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; color:#111827;
           padding-bottom:env(safe-area-inset-bottom); overscroll-behavior-y:contain; }
    button { font-family:inherit; }

    /* ── Login ── */
    #loginView { position:fixed; inset:0; background:linear-gradient(160deg,#012d70,#0141A2 55%,#009AFE); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px; z-index:1000; }
    #loginView img { height:52px; filter:brightness(0) invert(1); margin-bottom:8px; }
    #loginView .sub { color:rgba(255,255,255,.85); font-size:.95rem; font-weight:600; letter-spacing:2px; text-transform:uppercase; margin-bottom:34px; }
    #loginView input { width:100%; max-width:340px; border:none; border-radius:12px; padding:14px 16px; font-size:1rem; margin-bottom:12px; }
    #loginView button { width:100%; max-width:340px; border:none; border-radius:12px; padding:14px; font-size:1rem; font-weight:700; background:#fff; color:var(--navy-dark); cursor:pointer; }
    #loginErr { color:#fecaca; font-size:.85rem; min-height:22px; margin-top:10px; font-weight:600; }

    /* ── Header ── */
    .hdr { background:linear-gradient(135deg,var(--navy-dark),var(--navy)); color:#fff; padding:calc(14px + env(safe-area-inset-top)) 16px 0; position:sticky; top:0; z-index:500; box-shadow:0 2px 12px rgba(0,0,0,.25); }
    .hdr-top { display:flex; align-items:center; justify-content:space-between; }
    .hdr-top img { height:26px; filter:brightness(0) invert(1); }
    .hdr-user { font-size:.78rem; opacity:.85; text-align:right; line-height:1.3; }
    .hdr-user b { font-size:.85rem; }
    .fecha-nav { display:flex; align-items:center; justify-content:center; gap:14px; padding:10px 0 4px; }
    .fecha-nav button { background:rgba(255,255,255,.15); border:none; color:#fff; width:38px; height:38px; border-radius:50%; font-size:1.1rem; cursor:pointer; }
    .fecha-lbl { font-weight:800; font-size:1.02rem; text-transform:capitalize; text-align:center; min-width:170px; }
    .fecha-lbl small { display:block; font-weight:400; opacity:.75; font-size:.72rem; }
    .semana { display:flex; gap:8px; overflow-x:auto; padding:8px 2px 12px; scrollbar-width:none; }
    .semana::-webkit-scrollbar { display:none; }
    .dia-chip { flex:0 0 auto; background:rgba(255,255,255,.12); border:1.5px solid transparent; border-radius:12px; padding:6px 10px; text-align:center; color:#fff; cursor:pointer; min-width:56px; }
    .dia-chip.hoy { border-color:rgba(255,255,255,.6); }
    .dia-chip.sel { background:#fff; color:var(--navy-dark); }
    .dia-chip .d { font-size:.66rem; opacity:.8; text-transform:uppercase; }
    .dia-chip .n { font-weight:800; font-size:.95rem; }
    .dia-chip .c { font-size:.64rem; font-weight:700; }
    .dia-chip .c.done { color:#86efac; } .dia-chip.sel .c.done { color:var(--ok); }

    /* ── Progreso ── */
    .prog { background:#fff; margin:14px 14px 0; border-radius:14px; padding:14px 16px; box-shadow:0 1px 5px rgba(0,0,0,.08); display:flex; align-items:center; gap:14px; }
    .ring { width:56px; height:56px; flex:0 0 auto; position:relative; }
    .ring svg { transform:rotate(-90deg); }
    .ring .txt { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.82rem; color:var(--navy-dark); }
    .prog .info b { font-size:.95rem; }
    .prog .info div { font-size:.78rem; color:#6b7280; }
    .prog .mini { margin-left:auto; text-align:right; font-size:.72rem; color:#6b7280; }
    .prog .mini b { display:block; font-size:1rem; }
    .prog .mini b.p { color:var(--ok); } .prog .mini b.n { color:var(--bad); }

    /* ── Mapa ── */
    #mapaWrap { margin:14px; border-radius:14px; overflow:hidden; box-shadow:0 1px 5px rgba(0,0,0,.08); display:none; }
    #mapa { height:230px; }
    .num-marker { background:var(--navy); color:#fff; border-radius:50%; width:26px; height:26px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.78rem; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.4); }
    .num-marker.done { background:var(--ok); }
    .yo-marker { background:#e11d48; border:3px solid #fff; border-radius:50%; width:16px; height:16px; box-shadow:0 0 0 4px rgba(225,29,72,.25); }

    /* ── Cards de visita ── */
    #lista { padding:6px 14px 90px; }
    .vcard { background:#fff; border-radius:16px; margin-top:12px; box-shadow:0 1px 5px rgba(0,0,0,.08); overflow:hidden; }
    .vcard.done { opacity:.88; }
    .vc-head { display:flex; gap:12px; padding:14px 14px 10px; align-items:flex-start; }
    .vc-num { width:34px; height:34px; flex:0 0 auto; border-radius:50%; background:var(--navy); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; }
    .vcard.done .vc-num { background:var(--ok); }
    .vcard.done.neg .vc-num { background:var(--bad); }
    .vc-tit { flex:1; min-width:0; }
    .vc-tit b { font-size:.93rem; display:block; line-height:1.25; }
    .vc-tit .dir { font-size:.78rem; color:#6b7280; margin-top:2px; }
    .vc-chips { display:flex; flex-wrap:wrap; gap:6px; padding:0 14px 4px 60px; }
    .chip { font-size:.68rem; font-weight:700; border-radius:7px; padding:2px 8px; }
    .ch-est-PROGRAMADA { background:#e5e7eb; color:#374151; }
    .ch-est-REALIZADA  { background:#dcfce7; color:var(--ok); }
    .ch-neg { background:#fee2e2; color:var(--bad); }
    .ch-in  { background:#dbeafe; color:#1d4ed8; }
    .ch-foto{ background:#fef3c7; color:#92400e; }
    .vc-det { padding:8px 14px 4px 60px; font-size:.8rem; color:#374151; display:none; }
    .vc-det .row { padding:3px 0; display:flex; gap:8px; }
    .vc-det .row i { color:#9ca3af; width:16px; text-align:center; flex:0 0 auto; }
    .vc-btns { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:#f1f5f9; margin-top:10px; }
    .vc-btns button { border:none; background:#fff; padding:11px 4px 10px; font-size:.7rem; font-weight:700; color:var(--navy); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; }
    .vc-btns button:active { background:#eff6ff; }
    .vc-btns button:disabled { color:#9ca3af; }
    .vc-btns .ic { font-size:1.05rem; line-height:1; }
    .vc-btns .hecho { color:var(--ok); }

    /* ── Bottom sheet registrar ── */
    dialog { border:none; padding:0; width:100%; max-width:560px; margin:auto auto 0; border-radius:20px 20px 0 0; box-shadow:0 -8px 40px rgba(0,0,0,.35); }
    dialog::backdrop { background:rgba(0,0,0,.45); }
    .sh-head { padding:16px 20px 8px; font-weight:800; font-size:1rem; }
    .sh-head .sub { font-weight:400; font-size:.8rem; color:#6b7280; }
    .sh-body { padding:8px 20px 12px; max-height:66vh; overflow:auto; }
    .sh-foot { padding:12px 20px calc(16px + env(safe-area-inset-bottom)); display:flex; gap:10px; }
    .sh-foot button { flex:1; border:none; border-radius:12px; padding:14px; font-weight:800; font-size:.95rem; cursor:pointer; }
    .b-cancel { background:#e5e7eb; color:#374151; }
    .b-save { background:var(--navy); color:#fff; }
    .b-save:disabled { opacity:.5; }
    .res-btns { display:flex; gap:10px; margin:6px 0 14px; }
    .res-btn { flex:1; border:2.5px solid #e5e7eb; background:#fff; border-radius:14px; padding:14px 6px; font-weight:800; font-size:.95rem; cursor:pointer; color:#6b7280; }
    .res-btn.pos.sel { border-color:var(--ok); background:#f0fdf4; color:var(--ok); }
    .res-btn.neg.sel { border-color:var(--bad); background:#fef2f2; color:var(--bad); }
    .sh-body label { display:block; font-size:.78rem; font-weight:700; color:#374151; margin:10px 0 4px; }
    .sh-body textarea, .sh-body input[type=date], .sh-body input[type=text] { width:100%; border:1.5px solid #d1d5db; border-radius:10px; padding:10px 12px; font-size:.9rem; font-family:inherit; }
    .fotos-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
    .foto-th { width:64px; height:64px; border-radius:10px; object-fit:cover; border:1px solid #e5e7eb; position:relative; }
    .foto-add { width:64px; height:64px; border-radius:10px; border:2px dashed #93c5fd; background:#eff6ff; color:var(--navy); font-size:1.4rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .foto-box { position:relative; }
    .foto-x { position:absolute; top:-6px; right:-6px; width:20px; height:20px; border-radius:50%; border:none; background:var(--bad); color:#fff; font-size:.7rem; line-height:1; cursor:pointer; }

    /* ── Toast + offline ── */
    #toast { position:fixed; bottom:calc(20px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%) translateY(80px); background:#111827; color:#fff; border-radius:12px; padding:12px 20px; font-size:.86rem; font-weight:600; z-index:2000; transition:transform .25s; max-width:90%; text-align:center; }
    #toast.show { transform:translateX(-50%) translateY(0); }
    #offline { display:none; background:#fef3c7; color:#92400e; font-size:.78rem; font-weight:700; text-align:center; padding:7px; }
    .empty { text-align:center; color:#9ca3af; padding:60px 20px; }
    .empty .big { font-size:2.6rem; }
    .spin { border:3px solid #e5e7eb; border-top-color:var(--navy); border-radius:50%; width:34px; height:34px; margin:50px auto; animation:sp 1s linear infinite; }
    @keyframes sp { to { transform:rotate(360deg); } }
    .foot-salir { text-align:center; padding:10px 0 26px; }
    .foot-salir button { background:none; border:none; color:#9ca3af; font-size:.78rem; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView" style="display:none;">
  <img src="/img/logo.png" alt="AutoFácil">
  <div class="sub">Terreno</div>
  <input id="liEmail" type="email" placeholder="Correo" autocomplete="username">
  <input id="liClave" type="password" placeholder="Contraseña" autocomplete="current-password">
  <button onclick="doLogin()">Entrar</button>
  <div id="loginErr"></div>
</div>

<!-- APP -->
<div id="appView" style="display:none;">
  <div class="hdr">
    <div class="hdr-top">
      <img src="/img/logo.png" alt="AutoFácil">
      <div class="hdr-user"><b id="uNombre">—</b><br><span id="verBadge">v1.0</span></div>
    </div>
    <div class="fecha-nav">
      <button onclick="moverDia(-1)">‹</button>
      <div class="fecha-lbl" id="fechaLbl" onclick="fechaInput.showPicker && fechaInput.showPicker()">—</div>
      <button onclick="moverDia(1)">›</button>
      <input type="date" id="fechaInput" style="position:absolute;opacity:0;pointer-events:none" onchange="irFecha(this.value)">
    </div>
    <div class="semana" id="semanaStrip"></div>
  </div>
  <div id="offline">📡 Sin conexión — mostrando lo último guardado</div>

  <div id="progWrap"></div>
  <div id="mapaWrap"><div id="mapa"></div></div>
  <div id="lista"><div class="spin"></div></div>
  <div class="foot-salir"><button onclick="logout()">Cerrar sesión</button></div>
</div>

<!-- SHEET: registrar visita -->
<dialog id="shReg">
  <div class="sh-head">Registrar visita<div class="sub" id="regDealer"></div></div>
  <div class="sh-body">
    <div class="res-btns">
      <button class="res-btn pos" id="btnPos" onclick="setRes('POSITIVO')">👍 Positiva</button>
      <button class="res-btn neg" id="btnNeg" onclick="setRes('NEGATIVO')">👎 Negativa</button>
    </div>
    <label>Comentarios</label>
    <textarea id="regComent" rows="3" placeholder="Qué se conversó, compromisos, competencia…"></textarea>
    <label>Seguimiento (opcional)</label>
    <input type="date" id="regSegFecha">
    <input type="text" id="regSegNota" placeholder="Nota de seguimiento" style="margin-top:6px;">
    <label>Fotos de la visita</label>
    <div class="fotos-row" id="fotosRow"></div>
    <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display:none" onchange="agregarFoto(this)">
  </div>
  <div class="sh-foot">
    <button class="b-cancel" onclick="shReg.close()">Cancelar</button>
    <button class="b-save" id="btnGuardar" onclick="guardarVisita()">Guardar</button>
  </div>
</dialog>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ═══ AutoFácil Terreno — PWA de ejecutivos en la calle ═══ */
const API = '/api';
const $ = id => document.getElementById(id);
let TOKEN = localStorage.getItem('token');
let FECHA = hoyStr();
let DATA = null;              // respuesta de mi-dia
let MAPA = null, CAPA = null;
let MI_POS = null;            // {lat,lng} del GPS
let REG = { id: null, res: null, fotosNuevas: [] };

function hoyStr(){ const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
const H = () => ({ 'Authorization': 'Bearer ' + TOKEN });
const HJ = () => ({ ...H(), 'Content-Type': 'application/json' });
function toast(msg){ const t = $('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 2600); }

/* ── Boot ── */
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/terreno/sw.js').catch(()=>{});
(async function boot(){
  if (!TOKEN) return mostrarLogin();
  // valida el token
  try {
    const r = await fetch(API + '/auth/mis-permisos', { headers: H() });
    if (r.status === 401 || r.status === 403) return mostrarLogin();
    const j = await r.json();
    const u = (j.data && j.data.usuario) || j.usuario || {};
    $('uNombre').textContent = u.nombre ? (u.nombre + ' ' + (u.apellido || '')).trim() : 'Ejecutivo';
  } catch { /* offline: seguimos con lo cacheado */ }
  $('appView').style.display = '';
  cargarDia();
})();

function mostrarLogin(){
  $('loginView').style.display = '';
  $('appView').style.display = 'none';
}
async function doLogin(){
  $('loginErr').textContent = '';
  try {
    const r = await fetch(API + '/auth/login', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email: $('liEmail').value.trim(), password: $('liClave').value }) });
    const j = await r.json();
    if (!j.success) { $('loginErr').textContent = j.error || 'Credenciales inválidas'; return; }
    TOKEN = j.data.token;
    localStorage.setItem('token', TOKEN);
    const u = j.data.usuario || {};
    $('uNombre').textContent = (u.nombre + ' ' + (u.apellido || '')).trim();
    $('loginView').style.display = 'none';
    $('appView').style.display = '';
    cargarDia();
  } catch { $('loginErr').textContent = 'Sin conexión al servidor'; }
}
function logout(){ localStorage.removeItem('token'); location.reload(); }

/* ── Navegación de fechas ── */
function moverDia(n){
  const d = new Date(FECHA + 'T12:00:00'); d.setDate(d.getDate() + n);
  irFecha(d.toISOString().slice(0,10));
}
function irFecha(f){ if (!f) return; FECHA = f; cargarDia(); }

/* ── Carga del día (con fallback offline) ── */
async function cargarDia(){
  $('fechaInput').value = FECHA;
  pintarFechaLbl();
  $('lista').innerHTML = '<div class="spin"></div>';
  $('offline').style.display = 'none';
  try {
    const r = await fetch(`${API}/terreno/mi-dia?fecha=${FECHA}`, { headers: H() });
    if (r.status === 401 || r.status === 403) return mostrarLogin();
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    DATA = j.data;
    localStorage.setItem('terreno_dia_' + FECHA, JSON.stringify(DATA));
  } catch {
    const cache = localStorage.getItem('terreno_dia_' + FECHA);
    if (cache) { DATA = JSON.parse(cache); $('offline').style.display = ''; }
    else { $('lista').innerHTML = '<div class="empty"><div class="big">📡</div>Sin conexión y sin datos guardados de este día</div>'; return; }
  }
  render();
  pedirGPS();
}
function pintarFechaLbl(){
  const d = new Date(FECHA + 'T12:00:00');
  const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  $('fechaLbl').innerHTML = `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}<small>${FECHA === hoyStr() ? 'HOY · toca para elegir fecha' : 'toca para elegir fecha'}</small>`;
}

/* ── Render ── */
function render(){
  renderSemana();
  renderProgreso();
  renderMapa();
  renderLista();
}
function renderSemana(){
  const wrap = $('semanaStrip'); wrap.innerHTML = '';
  const dias = ['DO','LU','MA','MI','JU','VI','SA'];
  (DATA.semana || []).forEach(s => {
    const d = new Date(s.f + 'T12:00:00');
    const el = document.createElement('div');
    el.className = 'dia-chip' + (s.f === FECHA ? ' sel' : '') + (s.f === hoyStr() ? ' hoy' : '');
    el.innerHTML = `<div class="d">${dias[d.getDay()]}</div><div class="n">${d.getDate()}</div>
      <div class="c ${Number(s.r) >= Number(s.n) ? 'done' : ''}">${s.r}/${s.n}</div>`;
    el.onclick = () => irFecha(s.f);
    wrap.appendChild(el);
  });
  const sel = wrap.querySelector('.sel'); if (sel) sel.scrollIntoView({ inline: 'center', block: 'nearest' });
}
function renderProgreso(){
  const vs = DATA.visitas || [];
  if (!vs.length) { $('progWrap').innerHTML = ''; return; }
  const done = vs.filter(v => v.estado === 'REALIZADA').length;
  const pos = vs.filter(v => v.resultado === 'POSITIVO').length;
  const neg = vs.filter(v => v.resultado === 'NEGATIVO').length;
  const pct = Math.round(done / vs.length * 100);
  const r = 24, C = 2 * Math.PI * r;
  $('progWrap').innerHTML = `<div class="prog">
    <div class="ring"><svg width="56" height="56">
      <circle cx="28" cy="28" r="${r}" fill="none" stroke="#e5e7eb" stroke-width="6"/>
      <circle cx="28" cy="28" r="${r}" fill="none" stroke="${pct === 100 ? '#15803d' : '#0141A2'}" stroke-width="6"
        stroke-dasharray="${C}" stroke-dashoffset="${C * (1 - pct/100)}" stroke-linecap="round"/>
    </svg><div class="txt">${pct}%</div></div>
    <div class="info"><b>${done} de ${vs.length} visitas</b><div>${pct === 100 ? '¡Ruta completada! 🎉' : 'ruta del día'}</div></div>
    <div class="mini"><b class="p">${pos} 👍</b><b class="n">${neg} 👎</b></div>
  </div>`;
}
function renderMapa(){
  const vs = (DATA.visitas || []).filter(v => v.lat != null && v.lng != null);
  if (!vs.length || typeof L === 'undefined') { $('mapaWrap').style.display = 'none'; return; }
  $('mapaWrap').style.display = '';
  if (!MAPA) {
    MAPA = L.map('mapa', { zoomControl: false, attributionControl: true });
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(MAPA);
  }
  if (CAPA) CAPA.remove();
  CAPA = L.layerGroup().addTo(MAPA);
  const pts = [];
  vs.forEach((v, i) => {
    const n = (DATA.visitas || []).indexOf(v) + 1;
    const done = v.estado === 'REALIZADA';
    L.marker([v.lat, v.lng], { icon: L.divIcon({ className: '', html: `<div class="num-marker ${done ? 'done' : ''}">${n}</div>`, iconSize: [26, 26], iconAnchor: [13, 13] }) })
      .addTo(CAPA).bindPopup(`<b>${n}. ${v.nombre_dealer}</b><br>${v.direccion_visita || ''}`);
    pts.push([v.lat, v.lng]);
  });
  if (pts.length > 1) L.polyline(pts, { color: '#0141A2', weight: 3, dashArray: '6 8', opacity: .7 }).addTo(CAPA);
  if (MI_POS) L.marker([MI_POS.lat, MI_POS.lng], { icon: L.divIcon({ className: '', html: '<div class="yo-marker"></div>', iconSize: [16, 16], iconAnchor: [8, 8] }) }).addTo(CAPA);
  MAPA.fitBounds(L.latLngBounds(pts).pad(0.25));
  setTimeout(() => MAPA.invalidateSize(), 150);
}
function fFecha(x){ return x ? String(x).slice(0,10).split('-').reverse().join('-') : '—'; }
function renderLista(){
  const vs = DATA.visitas || [];
  if (!vs.length) { $('lista').innerHTML = '<div class="empty"><div class="big">🏖️</div>No tienes visitas programadas este día</div>'; return; }
  $('lista').innerHTML = vs.map((v, i) => {
    const done = v.estado === 'REALIZADA';
    const neg = v.resultado === 'NEGATIVO';
    const kmTxt = (MI_POS && v.lat != null) ? distTxt(MI_POS.lat, MI_POS.lng, v.lat, v.lng) : '';
    return `<div class="vcard ${done ? 'done' : ''} ${neg ? 'neg' : ''}" id="vc${v.id}">
      <div class="vc-head" onclick="toggleDet(${v.id})">
        <div class="vc-num">${done ? (neg ? '✗' : '✓') : (i + 1)}</div>
        <div class="vc-tit"><b>${v.nombre_dealer || '—'}</b>
          <div class="dir">📍 ${v.direccion_visita || v.comuna || '—'}${kmTxt ? ' · ' + kmTxt : ''}</div></div>
      </div>
      <div class="vc-chips">
        <span class="chip ch-est-${v.estado}">${done ? (neg ? 'REALIZADA 👎' : 'REALIZADA 👍') : 'PENDIENTE'}</span>
        ${v.checkin_at ? `<span class="chip ch-in">📍 check-in ${String(v.checkin_at).slice(11,16)}${v.checkin_dist_m != null ? ' · ' + v.checkin_dist_m + ' m' : ''}</span>` : ''}
        ${v.fotos ? `<span class="chip ch-foto">📷 ${v.fotos}</span>` : ''}
      </div>
      <div class="vc-det" id="det${v.id}">
        ${v.contacto || v.cf_nombre ? `<div class="row"><i>👤</i>${v.contacto || v.cf_nombre}</div>` : ''}
        ${v.telefono || v.cf_telefono ? `<div class="row"><i>📞</i>${v.telefono || v.cf_telefono}</div>` : ''}
        <div class="row"><i>🕓</i>Última venta: ${fFecha(v.ultima_venta)} · ${v.creditos_total} créditos hist.</div>
        ${v.com_6_12 != null ? `<div class="row"><i>%</i>Comisión 6-12: ${v.com_6_12} · 13-24: ${v.com_13_24 ?? '—'} · 25-36: ${v.com_25_36 ?? '—'} · 37+: ${v.com_37 ?? '—'}</div>` : ''}
        ${v.comentarios ? `<div class="row"><i>💬</i>${v.comentarios}</div>` : ''}
        ${v.seguimiento_fecha ? `<div class="row"><i>🔔</i>Seguimiento ${fFecha(v.seguimiento_fecha)}: ${v.seguimiento_nota || ''}</div>` : ''}
      </div>
      <div class="vc-btns">
        <button onclick="navegar(${v.id})"><span class="ic">🧭</span>Ir</button>
        <button onclick="llamar(${v.id})" ${!(v.telefono || v.cf_telefono) ? 'disabled' : ''}><span class="ic">📞</span>Llamar</button>
        <button onclick="checkin(${v.id})" ${v.checkin_at ? 'class="hecho"' : ''}><span class="ic">📍</span>${v.checkin_at ? 'Llegué ✓' : 'Llegué'}</button>
        <button onclick="abrirRegistro(${v.id})"><span class="ic">${done ? '✏️' : '📝'}</span>${done ? 'Editar' : 'Registrar'}</button>
      </div>
    </div>`;
  }).join('');
}
function toggleDet(id){ const d = $('det' + id); d.style.display = d.style.display === 'block' ? 'none' : 'block'; }
function visita(id){ return (DATA.visitas || []).find(v => v.id === id); }

/* ── GPS ── */
function pedirGPS(){
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(p => {
    MI_POS = { lat: p.coords.latitude, lng: p.coords.longitude };
    renderMapa(); renderLista();
  }, () => {}, { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 });
}
function distTxt(a, b, c, d){
  const R = 6371, r = Math.PI / 180;
  const x = Math.sin((c - a) * r / 2) ** 2 + Math.cos(a * r) * Math.cos(c * r) * Math.sin((d - b) * r / 2) ** 2;
  const km = 2 * R * Math.asin(Math.sqrt(x));
  return km < 1 ? Math.round(km * 1000) + ' m' : km.toFixed(1) + ' km';
}

/* ── Acciones ── */
function navegar(id){
  const v = visita(id);
  const dest = (v.lat != null) ? `${v.lat},${v.lng}` : encodeURIComponent((v.direccion_visita || '') + ', ' + (v.comuna || '') + ', Chile');
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${dest}&travelmode=driving`, '_blank');
}
function llamar(id){
  const v = visita(id);
  const tel = String(v.telefono || v.cf_telefono || '').replace(/[^\d+]/g, '');
  if (tel) location.href = 'tel:' + tel;
}
function checkin(id){
  if (!navigator.geolocation) return toast('Este dispositivo no tiene GPS disponible');
  toast('Obteniendo ubicación…');
  navigator.geolocation.getCurrentPosition(async p => {
    MI_POS = { lat: p.coords.latitude, lng: p.coords.longitude };
    try {
      const r = await fetch(`${API}/terreno/visitas/${id}/checkin`, { method: 'POST', headers: HJ(),
        body: JSON.stringify({ lat: MI_POS.lat, lng: MI_POS.lng, precision: p.coords.accuracy }) });
      const j = await r.json();
      if (!j.success) return toast(j.error);
      toast(j.data.dist_m != null ? `✓ Check-in a ${j.data.dist_m} m del dealer` : '✓ Check-in registrado');
      cargarDia();
    } catch { toast('Sin conexión — inténtalo de nuevo con señal'); }
  }, () => toast('No se pudo obtener el GPS. Activa la ubicación.'), { enableHighAccuracy: true, timeout: 12000 });
}

/* ── Registro (bottom sheet) ── */
async function abrirRegistro(id){
  const v = visita(id);
  REG = { id, res: v.resultado || null, fotosNuevas: [] };
  $('regDealer').textContent = v.nombre_dealer;
  $('regComent').value = v.comentarios || '';
  $('regSegFecha').value = v.seguimiento_fecha ? String(v.seguimiento_fecha).slice(0,10) : '';
  $('regSegNota').value = v.seguimiento_nota || '';
  setRes(REG.res, true);
  await pintarFotos();
  shReg.showModal();
}
function setRes(r, silent){
  if (!silent) REG.res = r;
  $('btnPos').classList.toggle('sel', REG.res === 'POSITIVO');
  $('btnNeg').classList.toggle('sel', REG.res === 'NEGATIVO');
}
async function pintarFotos(){
  const row = $('fotosRow');
  row.innerHTML = '';
  // fotos ya subidas
  try {
    const j = await (await fetch(`${API}/terreno/visitas/${REG.id}/fotos`, { headers: H() })).json();
    for (const f of (j.data || [])) {
      const box = document.createElement('div'); box.className = 'foto-box';
      const img = document.createElement('img'); img.className = 'foto-th';
      fetch(`${API}/terreno/fotos/${f.id}`, { headers: H() }).then(r => r.blob()).then(b => img.src = URL.createObjectURL(b));
      const x = document.createElement('button'); x.className = 'foto-x'; x.textContent = '✕';
      x.onclick = async () => {
        if (!confirm('¿Eliminar esta foto?')) return;
        await fetch(`${API}/terreno/fotos/${f.id}`, { method: 'DELETE', headers: H() });
        pintarFotos();
      };
      box.append(img, x); row.appendChild(box);
    }
  } catch {}
  // fotos nuevas pendientes de subir
  REG.fotosNuevas.forEach((b, i) => {
    const box = document.createElement('div'); box.className = 'foto-box';
    const img = document.createElement('img'); img.className = 'foto-th'; img.src = URL.createObjectURL(b);
    const x = document.createElement('button'); x.className = 'foto-x'; x.textContent = '✕';
    x.onclick = () => { REG.fotosNuevas.splice(i, 1); pintarFotos(); };
    box.append(img, x); row.appendChild(box);
  });
  const add = document.createElement('div'); add.className = 'foto-add'; add.textContent = '📷';
  add.onclick = () => $('fotoInput').click();
  row.appendChild(add);
}
function agregarFoto(input){
  if (!input.files.length) return;
  const file = input.files[0]; input.value = '';
  // Comprimir a máx 1280px JPEG (las fotos de cámara pesan 3-8 MB; así ~200 KB)
  const img = new Image();
  img.onload = () => {
    const esc = Math.min(1, 1280 / Math.max(img.width, img.height));
    const cv = document.createElement('canvas');
    cv.width = Math.round(img.width * esc); cv.height = Math.round(img.height * esc);
    cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
    cv.toBlob(b => { REG.fotosNuevas.push(b); pintarFotos(); }, 'image/jpeg', 0.78);
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(file);
}
async function guardarVisita(){
  if (!REG.res) return toast('Marca si la visita fue positiva o negativa');
  $('btnGuardar').disabled = true;
  try {
    // 1) resultado (motor único de gestión de visitas)
    const r = await fetch(`${API}/visitas/${REG.id}/gestion`, { method: 'PUT', headers: HJ(),
      body: JSON.stringify({
        resultado: REG.res,
        comentarios: $('regComent').value.trim() || null,
        seguimiento_fecha: $('regSegFecha').value || null,
        seguimiento_nota: $('regSegNota').value.trim() || null,
      }) });
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    // 2) fotos nuevas
    for (const b of REG.fotosNuevas) {
      const fd = new FormData(); fd.append('foto', b, 'visita.jpg');
      await fetch(`${API}/terreno/visitas/${REG.id}/foto`, { method: 'POST', headers: H(), body: fd });
    }
    shReg.close();
    toast('✓ Visita registrada');
    cargarDia();
  } catch (e) { toast(e.message || 'No se pudo guardar — revisa la señal'); }
  finally { $('btnGuardar').disabled = false; }
}
</script>
