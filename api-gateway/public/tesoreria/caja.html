<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caja — AutoFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; --green:#15803d; --red:#dc2626; --amber:#92400e; }
    * { box-sizing:border-box; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }

    /* ── Topnav ── */
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-left { display:flex; align-items:center; gap:16px; }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .breadcrumb-nav a:hover { color:#fff; }
    .breadcrumb-nav .sep { color:rgba(255,255,255,.35); }
    .topnav-right { display:flex; align-items:center; gap:10px; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .btn-logout:hover { background:rgba(255,255,255,.2); }

    /* ── Layout ── */
    .page { max-width:1050px; margin:0 auto; padding:28px 24px 80px; }

    /* ── Caja badge ── */
    .caja-header { background:#fff; border-radius:12px; padding:14px 20px; margin-bottom:22px; display:flex; align-items:center; gap:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); border-left:4px solid var(--navy); }
    .caja-header i { font-size:1.6rem; color:var(--navy); }
    .caja-header-info h6 { margin:0 0 2px; font-weight:700; color:#111827; font-size:.97rem; }
    .caja-header-info span { font-size:.8rem; color:#6b7280; }
    .perm-chips { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
    .perm-chip { font-size:.7rem; font-weight:600; padding:2px 8px; border-radius:8px; }
    .perm-on  { background:#dbeafe; color:#1d4ed8; }
    .perm-off { background:#f1f5f9; color:#9ca3af; text-decoration:line-through; }

    /* ── Búsqueda ── */
    .search-wrap { background:#fff; border-radius:14px; padding:22px 24px; box-shadow:0 1px 4px rgba(0,0,0,.07); margin-bottom:22px; }
    .search-wrap h5 { font-weight:700; font-size:1rem; color:#111827; margin-bottom:14px; }
    .search-row { display:flex; gap:10px; }
    .search-input { flex:1; border-radius:10px; border:2px solid #e5e7eb; padding:11px 16px 11px 42px; font-size:.95rem; outline:none; transition:border-color .15s; }
    .search-input:focus { border-color:var(--navy); }
    .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#9ca3af; font-size:1.1rem; pointer-events:none; }
    .search-field { position:relative; flex:1; }
    .btn-buscar { background:var(--navy); color:#fff; border:none; border-radius:10px; padding:11px 24px; font-size:.9rem; font-weight:700; cursor:pointer; white-space:nowrap; display:flex; align-items:center; gap:7px; }
    .btn-buscar:hover { background:var(--navy-light); }
    .btn-limpiar { background:#f1f5f9; color:#374151; border:none; border-radius:10px; padding:11px 16px; font-size:.9rem; cursor:pointer; }
    .btn-limpiar:hover { background:#e5e7eb; }

    /* ── Resultados ── */
    .results-label { font-size:.8rem; color:#6b7280; font-weight:600; margin-bottom:10px; text-transform:uppercase; letter-spacing:.4px; }
    .credito-card { background:#fff; border-radius:12px; border:2px solid #e5e7eb; padding:16px 20px; margin-bottom:10px; cursor:pointer; transition:border-color .15s, box-shadow .15s; display:flex; align-items:center; gap:16px; }
    .credito-card:hover { border-color:var(--navy); box-shadow:0 4px 16px rgba(1,65,162,.1); }
    .credito-card.selected { border-color:var(--navy); background:#f0f6ff; }
    .cc-icon { width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,#e8eaf6,#c5cae9); display:flex; align-items:center; justify-content:center; font-size:1.3rem; color:var(--navy); flex-shrink:0; }
    .cc-main { flex:1; min-width:0; }
    .cc-nombre { font-weight:700; color:#111827; font-size:.97rem; }
    .cc-sub { font-size:.78rem; color:#6b7280; margin-top:1px; }
    .cc-num { font-weight:700; color:var(--navy); font-size:.88rem; font-family:monospace; }
    .cc-right { text-align:right; flex-shrink:0; }
    .cc-monto { font-weight:800; font-size:1rem; color:#111827; }
    .estado-pill { display:inline-flex; align-items:center; gap:4px; border-radius:20px; padding:3px 10px; font-size:.72rem; font-weight:700; }
    .pill-vigente { background:#dcfce7; color:#15803d; }
    .pill-mora    { background:#fef3c7; color:#92400e; }

    /* ── Panel crédito seleccionado ── */
    .credito-panel { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); overflow:hidden; }
    .cp-header { background:linear-gradient(135deg,var(--navy-dark),#0141A2); color:#fff; padding:18px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
    .cp-title { font-size:1.1rem; font-weight:900; }
    .cp-sub   { font-size:.83rem; opacity:.8; margin-top:2px; }
    .btn-cerrar { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }

    /* Stats */
    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; padding:16px 20px; background:#f8fafc; border-bottom:1px solid #e5e7eb; }
    .stat-box { background:#fff; border-radius:10px; border:1.5px solid #e5e7eb; padding:12px 14px; }
    .stat-box.s-mora   { border-color:#fca5a5; background:#fff5f5; }
    .stat-box.s-pagada { border-color:#86efac; background:#f0fdf4; }
    .stat-box.s-pend   { border-color:#fcd34d; background:#fefce8; }
    .sb-lbl { font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#6b7280; margin-bottom:3px; }
    .stat-box.s-mora .sb-lbl  { color:#b91c1c; }
    .stat-box.s-pagada .sb-lbl{ color:#15803d; }
    .stat-box.s-pend .sb-lbl  { color:#a16207; }
    .sb-val { font-size:1.4rem; font-weight:900; color:#111827; line-height:1; }

    /* Tabla cuotas */
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:.84rem; }
    thead th { background:#f8fafc; color:#374151; font-weight:700; font-size:.72rem; text-transform:uppercase; letter-spacing:.04em; padding:10px 14px; border-bottom:2px solid #e5e7eb; white-space:nowrap; }
    tbody td { padding:10px 14px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr.row-pagada td { background:#f0fdf4; }
    tbody tr.row-mora   td { background:#fff8f0; }
    .text-right { text-align:right; }
    .amt { font-weight:700; font-family:monospace; font-size:.83rem; }
    .amt-mora { color:var(--red); }
    .amt-muted { color:#9ca3af; }

    /* Pills inline */
    .pill { display:inline-flex; align-items:center; gap:4px; border-radius:20px; padding:3px 9px; font-size:.71rem; font-weight:700; white-space:nowrap; }
    .pill-pagada  { background:#dcfce7; color:#166534; }
    .pill-mora    { background:#fee2e2; color:#991b1b; }
    .pill-aldia   { background:#dbeafe; color:#1d4ed8; }
    .pill-pend    { background:#f1f5f9; color:#64748b; }

    /* Botones tabla */
    .btn-pagar { background:linear-gradient(135deg,#16a34a,#15803d); color:#fff; border:none; border-radius:8px; padding:6px 14px; font-size:.79rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:4px; white-space:nowrap; }
    .btn-pagar:hover { opacity:.88; }

    /* Modal pago */
    .modal-field { margin-bottom:16px; }
    .modal-field label { display:block; font-size:.82rem; font-weight:600; color:#374151; margin-bottom:5px; }
    .modal-field .form-control { border-radius:9px; border:1.5px solid #d1d5db; padding:9px 12px; font-size:.9rem; width:100%; }
    .modal-field .form-control:focus { border-color:var(--navy); outline:none; box-shadow:0 0 0 3px rgba(1,65,162,.1); }
    .modal-field .form-control:disabled { background:#f9fafb; color:#6b7280; }
    .info-tag { font-size:.75rem; color:#6b7280; margin-top:4px; display:flex; align-items:center; gap:4px; }
    .total-box { background:#eff6ff; border:1.5px solid #bfdbfe; border-radius:10px; padding:14px 16px; margin-top:4px; display:flex; align-items:center; justify-content:space-between; }
    .total-box .lbl { font-size:.82rem; color:#1e40af; font-weight:600; }
    .total-box .val { font-size:1.3rem; font-weight:900; color:#1e40af; font-family:monospace; }

    /* Empty / spinner */
    .empty-state { text-align:center; color:#9ca3af; padding:48px 0; }
    .spinner-wrap { display:flex; justify-content:center; padding:40px 0; }
    .no-caja-alert { background:#fff7ed; border:1.5px solid #fed7aa; border-radius:12px; padding:20px 24px; color:#92400e; display:flex; align-items:flex-start; gap:14px; }
    .no-caja-alert i { font-size:1.6rem; flex-shrink:0; margin-top:2px; }
    @media(max-width:640px){ .page{padding:16px 12px 80px;} .search-row{flex-direction:column;} }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-left">
    <a href="/" class="topnav-brand">
      <img src="/img/logo.png" alt="AutoFácil">
      <span class="version-badge">v1.1</span>
    </a>
    <div class="breadcrumb-nav">
      <a href="/">Inicio</a><span class="sep">/</span>
      <a href="/tesoreria">Tesorería</a><span class="sep">/</span>
      <span style="color:#fff;font-weight:600"><i class="bi bi-cash-coin me-1"></i>Caja</span>
    </div>
  </div>
  <div class="topnav-right">
    <div class="user-chip">
      <div class="avatar" id="avatarInicial">?</div>
      <div>
        <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
        <div class="perfil-badge" id="navPerfil">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="page">

  <!-- Info caja del usuario -->
  <div id="cajaHeaderWrap"></div>

  <!-- Búsqueda -->
  <div class="search-wrap">
    <h5><i class="bi bi-search me-2 text-primary"></i>Buscar crédito vigente</h5>
    <div class="search-row">
      <div class="search-field">
        <i class="bi bi-search search-icon"></i>
        <input type="text" id="searchInput" class="search-input"
          placeholder="N° de operación, nombre o RUT del cliente..."
          oninput="onSearchInput()" onkeydown="if(event.key==='Enter') buscar()">
      </div>
      <button class="btn-buscar" onclick="buscar()"><i class="bi bi-search"></i> Buscar</button>
      <button class="btn-limpiar" onclick="limpiar()" title="Limpiar"><i class="bi bi-x-lg"></i></button>
    </div>
  </div>

  <!-- Resultados / crédito seleccionado -->
  <div id="resultadosWrap"></div>
  <div id="creditoPanelWrap" style="display:none"></div>

</div>

<!-- ══ MODAL PAGO ══════════════════════════════════════════════════════════ -->
<div class="modal fade" id="modalPago" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header" style="background:linear-gradient(135deg,#012d70,#0141A2);color:#fff;border-radius:12px 12px 0 0">
        <h5 class="modal-title fw-bold" id="modalPagoTitulo">Registrar Pago</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="pagoIdCredito">
        <input type="hidden" id="pagoNumeroCuota">
        <input type="hidden" id="pagoMontoBase">

        <div class="modal-field">
          <label>Monto Cuota</label>
          <input type="number" id="pagoMontoCuota" class="form-control" disabled>
        </div>
        <div class="modal-field">
          <label>Interés por mora <span id="moraInfo" style="font-weight:400;color:#6b7280;font-size:.78rem"></span></label>
          <input type="number" id="pagoMora" class="form-control" min="0" step="1" oninput="recalcTotal()">
          <div class="info-tag" id="moraInfoTag"><i class="bi bi-info-circle"></i><span></span></div>
        </div>
        <div class="modal-field">
          <label>Gastos de cobranza <span id="gastosInfo" style="font-weight:400;color:#6b7280;font-size:.78rem"></span></label>
          <input type="number" id="pagoGastos" class="form-control" min="0" step="1" oninput="recalcTotal()">
          <div class="info-tag" id="gastosInfoTag"><i class="bi bi-info-circle"></i><span></span></div>
        </div>
        <div class="modal-field">
          <label>Fecha de Pago</label>
          <input type="date" id="pagoFecha" class="form-control">
        </div>
        <div class="modal-field">
          <label>Observación</label>
          <input type="text" id="pagoObs" class="form-control" placeholder="Opcional">
        </div>
        <div class="total-box">
          <span class="lbl"><i class="bi bi-cash-coin me-1"></i>Total a cobrar hoy</span>
          <span class="val" id="pagoTotal">$0</span>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-success fw-bold px-4" onclick="confirmarPago()">
          <i class="bi bi-check2-circle me-1"></i>Registrar Pago
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ── Auth ─────────────────────────────────────────────────────────────────── */
const token = localStorage.getItem('token');
const yo    = JSON.parse(localStorage.getItem('usuario') || 'null');
if (!token || !yo) window.location.href = '/login.html';

document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
document.getElementById('navPerfil').textContent  = yo?.perfil || '';
document.getElementById('avatarInicial').textContent = (yo?.nombre||'?').charAt(0).toUpperCase();
function logout(){ localStorage.removeItem('token'); localStorage.removeItem('usuario'); window.location.href='/login.html'; }

const API = (path, opts={}) =>
  fetch(path, { headers:{ Authorization:`Bearer ${token}`, 'Content-Type':'application/json' }, ...opts });
const clp = v => '$' + Math.round(v||0).toLocaleString('es-CL');

/* ── Estado global ───────────────────────────────────────────────────────── */
let _miCaja   = null;   // caja asignada al usuario
let _tmc      = 0;
let _ufHoy    = 0;
let _ufMap    = new Map();   // fecha → valor UF
let _credito  = null;
let _pagos    = [];
let _schedule = [];

/* ── Inicialización ──────────────────────────────────────────────────────── */
(async () => {
  const [rCaja, rTmc, rUf] = await Promise.all([
    API('/api/cajas/mi-caja'),
    API('/api/tasas/vigente'),
    API('/api/uf/vigente'),
  ]);
  const jCaja = await rCaja.json();
  const jTmc  = await rTmc.json();
  const jUf   = await rUf.json();

  _miCaja = jCaja.data;
  _tmc    = jTmc.data?.tasa_anual_mayor || 0;
  _ufHoy  = jUf.data?.valor || 0;

  renderCajaHeader();
})();

function renderCajaHeader() {
  const wrap = document.getElementById('cajaHeaderWrap');
  if (!_miCaja) {
    // Sin caja asignada → bloqueado para TODOS (incluyendo Admin/Gerente)
    // Los pagos siempre deben ir contra una caja real
    wrap.innerHTML = `
      <div class="no-caja-alert">
        <i class="bi bi-lock"></i>
        <div>
          <strong>Sin caja asignada</strong>
          <p style="margin:4px 0 0;font-size:.88rem">No tienes una caja activa asignada. Los pagos deben registrarse contra una caja. Contacta al administrador para que te asigne una.</p>
        </div>
      </div>`;
    document.getElementById('searchInput').disabled = true;
    document.querySelector('.btn-buscar').disabled  = true;
    return;
  } else {
    const perms = [];
    if (_miCaja.puede_pagar_cuotas)       perms.push(`<span class="perm-chip perm-on"><i class="bi bi-cash"></i> Pagar cuotas</span>`);
    if (_miCaja.puede_reversar_pagos)     perms.push(`<span class="perm-chip perm-on"><i class="bi bi-arrow-counterclockwise"></i> Reversar</span>`);
    if (_miCaja.puede_condonar_intereses) perms.push(`<span class="perm-chip perm-on"><i class="bi bi-percent"></i> Cond. intereses ≤${_miCaja.tope_intereses}%</span>`);
    if (_miCaja.puede_condonar_gastos)    perms.push(`<span class="perm-chip perm-on"><i class="bi bi-shield-check"></i> Cond. gastos ≤${_miCaja.tope_gastos}%</span>`);
    wrap.innerHTML = `
      <div class="caja-header">
        <i class="bi bi-cash-stack"></i>
        <div class="caja-header-info">
          <h6><i class="bi bi-circle-fill me-1" style="color:#16a34a;font-size:.5rem;vertical-align:middle"></i>${esc(_miCaja.nombre_caja)}</h6>
          <span>Tu caja activa · Cajero: ${esc((yo?.nombre||'')+' '+(yo?.apellido||''))}</span>
          <div class="perm-chips">${perms.join('')}</div>
        </div>
      </div>`;
  }

  // Verificar permiso de pagar
  if (!_miCaja.puede_pagar_cuotas) {
    document.getElementById('searchInput').disabled = true;
    document.querySelector('.btn-buscar').disabled  = true;
    document.getElementById('cajaHeaderWrap').insertAdjacentHTML('beforeend',`
      <div class="no-caja-alert mt-3">
        <i class="bi bi-lock"></i>
        <div><strong>Sin permiso para pagar cuotas</strong><p style="margin:4px 0 0;font-size:.88rem">Tu caja no tiene habilitado el permiso de pago de cuotas.</p></div>
      </div>`);
  }
}

/* ── Búsqueda ────────────────────────────────────────────────────────────── */
let _searchTimer = null;
function onSearchInput() {
  clearTimeout(_searchTimer);
  const q = document.getElementById('searchInput').value.trim();
  if (q.length < 2) { document.getElementById('resultadosWrap').innerHTML = ''; return; }
  _searchTimer = setTimeout(buscar, 350);
}

async function buscar() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  // ocultar panel crédito si está abierto
  cerrarPanel();
  const wrap = document.getElementById('resultadosWrap');
  wrap.innerHTML = `<div class="spinner-wrap"><div class="spinner-border text-primary" style="width:1.8rem;height:1.8rem"></div></div>`;
  const r = await API(`/api/creditos?q=${encodeURIComponent(q)}&estado=VIGENTE`);
  const j = await r.json();
  const lista = j.data || [];
  if (!lista.length) {
    wrap.innerHTML = `<div class="empty-state"><i class="bi bi-search fs-1 d-block mb-3"></i><p>Sin créditos vigentes para <strong>"${esc(q)}"</strong></p></div>`;
    return;
  }
  wrap.innerHTML = `<div class="results-label">${lista.length} crédito${lista.length!==1?'s':''} encontrado${lista.length!==1?'s':''}</div>` +
    lista.map(c => {
      const cuota = c.cuota ? clp(c.cuota) : '—';
      return `
      <div class="credito-card" onclick="abrirCredito(${c.id_credito})">
        <div class="cc-icon"><i class="bi bi-car-front"></i></div>
        <div class="cc-main">
          <div class="cc-nombre">${esc(c.nombre_cliente)}</div>
          <div class="cc-sub">RUT ${esc(c.rut_cliente)} · ${esc(c.marca||'')} ${esc(c.modelo||'')} ${c.anio||''}</div>
        </div>
        <div class="cc-right">
          <div class="cc-num">${esc(c.numero_credito||'#'+c.id_credito)}</div>
          <div style="font-size:.75rem;color:#6b7280;margin-top:2px">Cuota ${cuota} · ${c.plazo||'?'} meses</div>
        </div>
      </div>`;
    }).join('');
}

function limpiar() {
  document.getElementById('searchInput').value = '';
  document.getElementById('resultadosWrap').innerHTML = '';
  cerrarPanel();
}

function cerrarPanel() {
  document.getElementById('creditoPanelWrap').style.display = 'none';
  document.getElementById('creditoPanelWrap').innerHTML = '';
  _credito = null; _pagos = []; _schedule = [];
  document.querySelectorAll('.credito-card.selected').forEach(el => el.classList.remove('selected'));
}

/* ── Abrir crédito ───────────────────────────────────────────────────────── */
async function abrirCredito(id) {
  // Marcar selección
  document.querySelectorAll('.credito-card').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.credito-card').forEach(el => {
    if (el.getAttribute('onclick')?.includes(`(${id})`)) el.classList.add('selected');
  });

  const panelWrap = document.getElementById('creditoPanelWrap');
  panelWrap.style.display = '';
  panelWrap.innerHTML = `<div class="spinner-wrap"><div class="spinner-border text-primary" style="width:2rem;height:2rem"></div></div>`;
  panelWrap.scrollIntoView({ behavior:'smooth', block:'nearest' });

  const [rC, rP] = await Promise.all([
    API(`/api/creditos/${id}`),
    API(`/api/pagos-credito/${id}`),
  ]);
  const jC = await rC.json();
  const jP = await rP.json();
  _credito = jC.data;
  _pagos   = jP.data || [];

  _schedule = buildSchedule(_credito);
  await precargarUFDias21(_schedule);
  renderPanel();
}

/* ── Amortización francesa ───────────────────────────────────────────────── */
function buildSchedule(c) {
  const r = c.tasa_mensual / 100;
  const n = c.plazo;
  const mf = c.monto_financiado;
  let cuota = (r === 0) ? mf / n : mf * r * Math.pow(1+r, n) / (Math.pow(1+r, n) - 1);
  const fechaBase = c.fecha_primera_cuota ? new Date(c.fecha_primera_cuota) : new Date();
  const sched = [];
  let saldo = mf;
  for (let i = 1; i <= n; i++) {
    const interes = saldo * r;
    const capital = cuota - interes;
    const fechaVenc = new Date(fechaBase);
    fechaVenc.setMonth(fechaVenc.getMonth() + (i - 1));
    saldo -= capital;
    sched.push({ numero: i, fecha: fechaVenc.toISOString().slice(0,10), monto: cuota, capital, interes, saldo: Math.max(0, saldo) });
  }
  return sched;
}

/* ── UF por fecha ────────────────────────────────────────────────────────── */
function dia21Str(fechaVenc) {
  const d = new Date(fechaVenc + 'T12:00:00');
  d.setDate(d.getDate() + 21);
  return d.toISOString().slice(0,10);
}

async function precargarUFDias21(sched) {
  const fechas = [...new Set(sched.map(s => dia21Str(s.fecha)))];
  await Promise.all(fechas.map(async f => {
    if (_ufMap.has(f)) return;
    try {
      const r = await API(`/api/uf/en/${f}`);
      const j = await r.json();
      _ufMap.set(f, j.data?.valor || _ufHoy);
    } catch { _ufMap.set(f, _ufHoy); }
  }));
}

/* ── Cálculos mora/gastos ────────────────────────────────────────────────── */
function calcMora(montoCuota, fechaVenc, hoy = new Date()) {
  const venc = new Date(fechaVenc + 'T12:00:00');
  const dias = Math.max(0, Math.floor((hoy - venc) / 86400000));
  if (dias <= 0) return { monto: 0, dias: 0 };
  const monto = montoCuota * (_tmc / 100 / 365) * dias;
  return { monto: Math.round(monto), dias };
}

function calcGastos(montoCuota, fechaVenc, hoy = new Date()) {
  const venc    = new Date(fechaVenc + 'T12:00:00');
  const dias    = Math.max(0, Math.floor((hoy - venc) / 86400000));
  if (dias < 21) return { monto: 0, dias, aplica: false };
  const f21     = dia21Str(fechaVenc);
  const ufVal   = _ufMap.get(f21) || _ufHoy;
  const uf10    = ufVal * 10;
  const uf40    = ufVal * 40;
  let gastos    = 0;
  if (montoCuota <= uf10)                         gastos = montoCuota * 0.09;
  else if (montoCuota <= uf10 + uf40)             gastos = uf10 * 0.09 + (montoCuota - uf10) * 0.06;
  else                                            gastos = uf10 * 0.09 + uf40 * 0.06 + (montoCuota - uf10 - uf40) * 0.03;
  return { monto: Math.round(gastos), dias, aplica: true, ufVal, f21 };
}

/* ── Render panel crédito ────────────────────────────────────────────────── */
function renderPanel() {
  const c = _credito;
  const hoy = new Date();
  const pagadas = _pagos.map(p => p.numero_cuota);

  let nPagadas = 0, nMora = 0, nPend = 0;
  let montoMoraTotal = 0;

  const filas = _schedule.map(s => {
    const esPagada = pagadas.includes(s.numero);
    const pago     = _pagos.find(p => p.numero_cuota === s.numero);
    const mora     = esPagada ? { monto:0, dias:0 } : calcMora(s.monto, s.fecha, hoy);
    const gastos   = esPagada ? { monto:0, aplica:false } : calcGastos(s.monto, s.fecha, hoy);
    const totalHoy = s.monto + mora.monto + gastos.monto;
    const enMora   = !esPagada && mora.dias > 0;
    if (esPagada) nPagadas++;
    else if (enMora) { nMora++; montoMoraTotal += totalHoy; }
    else nPend++;

    const estadoPill = esPagada
      ? `<span class="pill pill-pagada"><i class="bi bi-check-circle-fill"></i> Pagada</span>`
      : enMora
        ? `<span class="pill pill-mora"><i class="bi bi-exclamation-circle-fill"></i> En mora</span>`
        : `<span class="pill pill-aldia"><i class="bi bi-clock"></i> Al día</span>`;

    const btnPagar = (!esPagada && _miCaja?.puede_pagar_cuotas)
      ? `<button class="btn-pagar" onclick="abrirModalPago(${s.numero},'${s.fecha}',${s.monto},${mora.monto},${gastos.monto})"><i class="bi bi-cash-coin"></i> Pagar</button>`
      : esPagada ? `<small style="color:#9ca3af">—</small>` : `<small style="color:#9ca3af">Sin permiso</small>`;

    const rowClass = esPagada ? 'row-pagada' : (enMora ? 'row-mora' : '');

    return `<tr class="${rowClass}">
      <td class="text-center"><strong>${s.numero}</strong></td>
      <td>${fmtFecha(s.fecha)}</td>
      <td class="text-right amt">${clp(s.monto)}</td>
      <td class="text-right amt ${enMora&&mora.monto?'amt-mora':''}">${mora.monto ? clp(mora.monto) : '<span class="amt-muted">—</span>'}</td>
      <td class="text-right amt ${enMora&&gastos.monto?'amt-mora':''}">${gastos.monto ? clp(gastos.monto) : '<span class="amt-muted">—</span>'}</td>
      <td class="text-right amt" style="${enMora?'color:var(--red);font-size:.9rem':''}">${esPagada ? '<span class="amt-muted">—</span>' : clp(totalHoy)}</td>
      <td class="text-right amt-muted">${pago ? clp(pago.total_pagado) : '<span class="amt-muted">—</span>'}</td>
      <td>${pago ? fmtFecha(pago.fecha_pago||pago.created_at) : '<span style="color:#9ca3af">—</span>'}</td>
      <td>${estadoPill}</td>
      <td>${btnPagar}</td>
    </tr>`;
  }).join('');

  document.getElementById('creditoPanelWrap').innerHTML = `
  <div class="credito-panel mt-3">
    <div class="cp-header">
      <div>
        <div class="cp-title"><i class="bi bi-car-front me-2"></i>${esc(c.nombre_cliente)}</div>
        <div class="cp-sub">
          RUT ${esc(c.rut_cliente)} &nbsp;·&nbsp; N° ${esc(c.numero_credito||c.id_credito)}
          &nbsp;·&nbsp; ${esc(c.marca||'')} ${esc(c.modelo||'')} ${c.anio||''}
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="background:rgba(255,255,255,.15);border-radius:8px;padding:4px 12px;font-size:.78rem;font-weight:700">${c.plazo} meses · ${clp(c.cuota||_schedule[0]?.monto||0)}/mes</span>
        <button class="btn-cerrar" onclick="cerrarPanel()"><i class="bi bi-x-lg me-1"></i>Cerrar</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box s-pagada">
        <div class="sb-lbl"><i class="bi bi-check-circle me-1"></i>Pagadas</div>
        <div class="sb-val">${nPagadas}/${_schedule.length}</div>
      </div>
      <div class="stat-box s-pend">
        <div class="sb-lbl"><i class="bi bi-clock me-1"></i>Pendientes</div>
        <div class="sb-val">${nPend}</div>
      </div>
      <div class="stat-box s-mora" ${nMora===0?'style="opacity:.5"':''}>
        <div class="sb-lbl"><i class="bi bi-exclamation-circle me-1"></i>${nMora} en mora</div>
        <div class="sb-val" style="font-size:1.1rem">${nMora > 0 ? clp(montoMoraTotal) : '—'}</div>
      </div>
      <div class="stat-box">
        <div class="sb-lbl"><i class="bi bi-bank me-1"></i>Financiado</div>
        <div class="sb-val" style="font-size:1.1rem">${clp(c.monto_financiado)}</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="text-center">N°</th>
            <th>Vencimiento</th>
            <th class="text-right">Cuota</th>
            <th class="text-right">Int. Mora</th>
            <th class="text-right">Gtos. Cobr.</th>
            <th class="text-right">Total Hoy</th>
            <th class="text-right">Total Pagado</th>
            <th>Fecha Pago</th>
            <th>Estado</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody>${filas}</tbody>
      </table>
    </div>
  </div>`;
}

/* ── Modal pago ──────────────────────────────────────────────────────────── */
const modalPagoBS = new bootstrap.Modal(document.getElementById('modalPago'));

function abrirModalPago(numeroCuota, fechaVenc, montoCuota, moraCalc, gastosCalc) {
  const mora   = calcMora(montoCuota, fechaVenc);
  const gastos = calcGastos(montoCuota, fechaVenc);

  document.getElementById('pagoIdCredito').value   = _credito.id_credito;
  document.getElementById('pagoNumeroCuota').value = numeroCuota;
  document.getElementById('pagoMontoBase').value   = montoCuota;
  document.getElementById('pagoMontoCuota').value  = Math.round(montoCuota);
  document.getElementById('pagoFecha').value       = new Date().toISOString().slice(0,10);
  document.getElementById('pagoObs').value         = '';
  document.getElementById('modalPagoTitulo').textContent = `Pagar Cuota N° ${numeroCuota} — ${esc(_credito.nombre_cliente)}`;

  // Mora
  const puedeCond  = !!_miCaja?.puede_condonar_intereses;
  const topeMora   = _miCaja?.tope_intereses || 0;
  const moraMin    = puedeCond ? Math.round(mora.monto * (1 - topeMora/100)) : mora.monto;
  const moraInput  = document.getElementById('pagoMora');
  moraInput.value  = mora.monto;
  moraInput.min    = moraMin;
  moraInput.readOnly = !puedeCond && mora.monto === 0;
  if (mora.dias > 0) {
    document.getElementById('moraInfo').textContent = `(${mora.dias} días · TMC ${_tmc.toFixed(2)}% anual)`;
    document.getElementById('moraInfoTag').querySelector('span').textContent =
      puedeCond ? `Puedes condonar hasta un ${topeMora}% (mínimo ${clp(moraMin)})` : 'Sin permiso para condonar';
  } else {
    document.getElementById('moraInfo').textContent = '';
    document.getElementById('moraInfoTag').querySelector('span').textContent = 'Sin días de mora';
    moraInput.value = 0; moraInput.readOnly = true;
  }

  // Gastos
  const puedeCondG = !!_miCaja?.puede_condonar_gastos;
  const topeGastos = _miCaja?.tope_gastos || 0;
  const gastosMin  = puedeCondG ? Math.round(gastos.monto * (1 - topeGastos/100)) : gastos.monto;
  const gastosInput = document.getElementById('pagoGastos');
  gastosInput.value = gastos.monto;
  gastosInput.min   = gastosMin;
  gastosInput.readOnly = !puedeCondG && gastos.monto === 0;
  if (gastos.aplica) {
    document.getElementById('gastosInfo').textContent = `(escalonado · UF del ${gastos.f21}: ${clp(gastos.ufVal)})`;
    document.getElementById('gastosInfoTag').querySelector('span').textContent =
      puedeCondG ? `Puedes condonar hasta un ${topeGastos}% (mínimo ${clp(gastosMin)})` : 'Sin permiso para condonar';
  } else {
    const faltan = 21 - calcMora(montoCuota, fechaVenc).dias;
    document.getElementById('gastosInfo').textContent = '';
    document.getElementById('gastosInfoTag').querySelector('span').textContent =
      mora.dias > 0 ? `Aplica desde el día 21 de mora (faltan ${faltan} días)` : 'Sin mora — no aplica';
    gastosInput.value = 0; gastosInput.readOnly = true;
  }

  recalcTotal();
  modalPagoBS.show();
}

function recalcTotal() {
  const base   = parseFloat(document.getElementById('pagoMontoCuota').value) || 0;
  const mora   = parseFloat(document.getElementById('pagoMora').value)       || 0;
  const gastos = parseFloat(document.getElementById('pagoGastos').value)     || 0;
  document.getElementById('pagoTotal').textContent = clp(base + mora + gastos);
}

async function confirmarPago() {
  const id_credito   = document.getElementById('pagoIdCredito').value;
  const numero_cuota = document.getElementById('pagoNumeroCuota').value;
  const monto_cuota  = parseFloat(document.getElementById('pagoMontoCuota').value) || 0;
  const interes_mora = parseFloat(document.getElementById('pagoMora').value)        || 0;
  const gastos_cob   = parseFloat(document.getElementById('pagoGastos').value)      || 0;
  const total_pagado = monto_cuota + interes_mora + gastos_cob;
  const fecha_pago   = document.getElementById('pagoFecha').value;
  const observacion  = document.getElementById('pagoObs').value.trim();

  // Buscar fecha_vencimiento de la cuota
  const cuota = _schedule.find(s => s.numero == numero_cuota);

  const body = {
    id_credito, numero_cuota, monto_cuota, interes_mora,
    gastos_cobranza: gastos_cob, total_pagado, fecha_pago,
    fecha_vencimiento: cuota?.fecha || null,
    observacion: observacion || null,
    id_caja: _miCaja?.id_caja || null,
  };

  const r = await API('/api/pagos-credito', { method:'POST', body: JSON.stringify(body) });
  const j = await r.json();
  if (!j.success) return alert('Error al registrar: ' + j.error);

  modalPagoBS.hide();
  // Refrescar panel
  const rP = await API(`/api/pagos-credito/${id_credito}`);
  const jP = await rP.json();
  _pagos = jP.data || [];
  renderPanel();
}

/* ── Helpers ─────────────────────────────────────────────────────────────── */
function fmtFecha(f) {
  if (!f) return '—';
  return new Date(f).toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric' });
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
