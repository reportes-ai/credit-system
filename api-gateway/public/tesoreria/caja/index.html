<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caja — AutoFácil</title>
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-left { display:flex; align-items:center; gap:16px; }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .breadcrumb-nav a:hover { color:#fff; }
    .breadcrumb-nav .sep { color:rgba(255,255,255,.35); }
    .topnav-right { display:flex; align-items:center; gap:10px; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .btn-logout:hover { background:rgba(255,255,255,.2); }
    .main-content { padding:28px 32px; max-width:1200px; margin:0 auto; }

    /* Banner */
    .page-banner { background:linear-gradient(135deg,#012d70,#0141A2 50%,#009AFE); border-radius:16px; color:#fff; padding:22px 28px; margin-bottom:24px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .banner-left { display:flex; align-items:center; gap:16px; }
    .banner-icon { font-size:2.2rem; opacity:.85; }
    .banner-title { font-weight:700; font-size:1.2rem; margin:0 0 2px; }
    .banner-sub { opacity:.8; font-size:.85rem; margin:0; }
    .banner-badge { background:rgba(255,255,255,.15); border-radius:10px; padding:8px 16px; text-align:center; white-space:nowrap; }
    .banner-badge-label { font-size:.72rem; opacity:.75; display:block; }
    .banner-badge-value { font-size:1.1rem; font-weight:700; }

    /* Stat cards */
    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:24px; }
    .stat-card { background:#fff; border-radius:12px; padding:16px 18px; box-shadow:0 1px 4px rgba(0,0,0,.07); }
    .stat-label { font-size:.75rem; font-weight:600; color:#6b7280; text-transform:uppercase; letter-spacing:.4px; margin-bottom:4px; }
    .stat-value { font-size:1.5rem; font-weight:700; color:#111827; }
    .stat-value.verde { color:#15803d; }
    .stat-value.rojo  { color:#b91c1c; }
    .stat-value.azul  { color:var(--navy); }

    /* Panel */
    .panel { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); margin-bottom:20px; }
    .panel-header { padding:14px 20px; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
    .panel-header h5 { margin:0; font-weight:700; font-size:.95rem; color:#111827; }
    .panel-body { padding:0; }

    /* Tabla movimientos */
    .table { font-size:.83rem; margin:0; }
    .table thead th { background:#f8fafc; font-weight:700; color:#374151; font-size:.75rem; text-transform:uppercase; letter-spacing:.4px; border-bottom:2px solid #e5e7eb; padding:10px 14px; }
    .table tbody td { padding:10px 14px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    .table tbody tr:last-child td { border-bottom:none; }
    .table tbody tr:hover td { background:#f8fafc; }

    .pill-abono { background:#dcfce7; color:#15803d; border-radius:8px; padding:2px 9px; font-size:.72rem; font-weight:600; }
    .pill-cargo  { background:#fee2e2; color:#b91c1c; border-radius:8px; padding:2px 9px; font-size:.72rem; font-weight:600; }
    .empty-state { text-align:center; color:#9ca3af; padding:48px 20px; }
    .spinner-wrap { display:flex; justify-content:center; padding:40px; }

    /* Vista tesorero — grid de cajas */
    .cajas-overview { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
    .caja-overview-card { background:#fff; border-radius:12px; padding:18px; box-shadow:0 1px 4px rgba(0,0,0,.07); border:2px solid #e5e7eb; cursor:pointer; transition:border-color .15s,box-shadow .15s; }
    .caja-overview-card:hover { border-color:var(--navy); box-shadow:0 4px 16px rgba(1,65,162,.1); }
    .caja-overview-card.activa-card { border-color:var(--navy); background:#f0f6ff; }
    .cov-nombre { font-weight:700; font-size:.95rem; color:#111827; margin-bottom:2px; }
    .cov-cajero { font-size:.8rem; color:#6b7280; margin-bottom:12px; }
    .cov-stats { display:flex; gap:12px; }
    .cov-stat { flex:1; text-align:center; background:#f8fafc; border-radius:8px; padding:8px 4px; }
    .cov-stat-val { font-size:1rem; font-weight:700; color:var(--navy); }
    .cov-stat-lbl { font-size:.7rem; color:#9ca3af; }
    .read-only-banner { background:#fef3c7; border:1px solid #fcd34d; border-radius:10px; padding:10px 16px; font-size:.84rem; color:#92400e; display:flex; align-items:center; gap:8px; margin-bottom:20px; }

    /* Filtro fecha */
    .filtro-fecha { display:flex; align-items:center; gap:8px; font-size:.84rem; }
    .filtro-fecha input { border:1.5px solid #d1d5db; border-radius:8px; padding:5px 10px; font-size:.83rem; }
    .btn-filtrar { background:var(--navy); color:#fff; border:none; border-radius:8px; padding:6px 14px; font-size:.82rem; font-weight:600; cursor:pointer; }
    .btn-filtrar:hover { background:var(--navy-light); }

    @media(max-width:640px){ .main-content{padding:16px;} .stats-row{grid-template-columns:1fr 1fr;} }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-left">
    <a href="/" class="topnav-brand">
      <img src="/img/logo.png" alt="AutoFácil">
      <span class="version-badge">v1.0</span>
    </a>
    <div class="breadcrumb-nav">
      <a href="/">Inicio</a><span class="sep">›</span>
      <a href="/tesoreria/">Tesorería</a><span class="sep">›</span>
      <span style="color:#fff;font-weight:600"><i class="bi bi-cash-coin me-1"></i>Caja</span>
    </div>
  </div>
  <div class="topnav-right">
    <a href="/dashboard" title="Dashboard" style="display:flex;align-items:center;gap:5px;color:rgba(255,255,255,0.85);text-decoration:none;font-size:12px;font-weight:500;padding:5px 10px;border:1px solid rgba(255,255,255,0.25);border-radius:6px;transition:.15s" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">
      <i class="bi bi-bar-chart-line" style="font-size:15px"></i> Dashboard
    </a>
    <div class="user-chip">
      <div class="avatar" id="avatarInicial">?</div>
      <div>
        <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
        <div class="perfil-badge" id="navPerfil">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="main-content" id="mainContent">
  <div class="spinner-wrap"><div class="spinner-border text-primary" style="width:2.5rem;height:2.5rem"></div></div>
</div>

<script src="/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth-guard.js"></script>
<script>
const token = sessionStorage.getItem('token');
const yo    = JSON.parse(sessionStorage.getItem('usuario') || 'null');
if (!token || !yo) window.location.href = '/login.html';

document.getElementById('navNombre').textContent  = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
document.getElementById('navPerfil').textContent   = yo?.perfil || '';
document.getElementById('avatarInicial').textContent = (yo?.nombre||'?').charAt(0).toUpperCase();
function logout(){ sessionStorage.removeItem('token'); sessionStorage.removeItem('usuario'); window.location.href='/login.html'; }

const API = (path, opts={}) =>
  fetch(path, { headers:{ Authorization:`Bearer ${token}`, 'Content-Type':'application/json' }, ...opts });

const esAdmin     = ['Administrador','Gerente'].includes(yo?.perfil);
const esTesorero  = yo?.perfil === 'Tesorero';
const esVista     = esAdmin || esTesorero;   // ve todas las cajas

/* ── Fecha hoy ─────────────────────────────────────────────────── */
const HOY = new Date().toISOString().slice(0,10);
let _desde = HOY, _hasta = HOY;

/* ═══════════════════════════════════════════════════════════════
   VISTA TESORERO / ADMIN — resumen de todas las cajas
   ═══════════════════════════════════════════════════════════════ */
async function vistaTesorero() {
  // Cargar todas las cajas + mi propia caja (si tengo)
  const [rCajas, rMia] = await Promise.all([
    API('/api/cajas').then(r=>r.json()),
    API('/api/cajas/mi-caja').then(r=>r.json()),
  ]);
  const cajas   = (rCajas.data || []).filter(c => c.activo);
  const miCaja  = rMia.data || null;

  // Cargar movimientos de hoy para cada caja
  const stats = {};
  await Promise.all(cajas.map(async c => {
    const r = await API(`/api/cierre-caja?desde=${_desde}&hasta=${_hasta}&id_caja=${c.id_caja}`);
    const j = await r.json();
    stats[c.id_caja] = j.data?.totales || {};
  }));

  const main = document.getElementById('mainContent');
  const bannerTipo = esTesorero ? 'Tesorero' : (esAdmin ? 'Administrador' : '');

  main.innerHTML = `
    ${esTesorero ? `<div class="read-only-banner"><i class="bi bi-eye me-1"></i> Vista de lectura — como Tesorero puedes ver todas las cajas pero no operar en ellas.</div>` : ''}

    <div class="page-banner">
      <div class="banner-left">
        <i class="bi bi-cash-stack banner-icon"></i>
        <div>
          <p class="banner-title">Resumen de Cajas</p>
          <p class="banner-sub">Actividad del día — ${fmtFecha(_desde)}${_desde !== _hasta ? ' al '+fmtFecha(_hasta) : ''}</p>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div class="filtro-fecha">
          <label style="color:rgba(255,255,255,.75);font-size:.8rem">Desde</label>
          <input type="date" id="inputDesde" value="${_desde}" max="${HOY}" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)">
          <label style="color:rgba(255,255,255,.75);font-size:.8rem">Hasta</label>
          <input type="date" id="inputHasta" value="${_hasta}" max="${HOY}" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)">
          <button class="btn-filtrar" onclick="cambiarFecha()"><i class="bi bi-funnel me-1"></i>Filtrar</button>
        </div>
        ${miCaja ? `<span class="banner-badge"><span class="banner-badge-label">Mi caja</span><span class="banner-badge-value"><i class="bi bi-cash-coin me-1"></i>${esc(miCaja.nombre_caja)}</span></span>` : ''}
      </div>
    </div>

    <div class="cajas-overview" id="cajasOverview">
      ${cajas.map(c => {
        const s = stats[c.id_caja] || {};
        const esMia = miCaja && miCaja.id_caja === c.id_caja;
        return `
        <div class="caja-overview-card ${esMia?'activa-card':''}" onclick="verDetalleCaja(${c.id_caja},'${esc(c.nombre)}')">
          <div class="cov-nombre"><i class="bi bi-cash-stack me-1 text-primary"></i>${esc(c.nombre)}${esMia?' <span style="font-size:.7rem;background:#dbeafe;color:#1e40af;border-radius:6px;padding:1px 7px">Mi caja</span>':''}</div>
          <div class="cov-cajero"><i class="bi bi-person me-1"></i>${esc(c.nombre_usuario_asignado||'Sin cajero asignado')}</div>
          <div class="cov-stats">
            <div class="cov-stat">
              <div class="cov-stat-val">${s.transacciones||0}</div>
              <div class="cov-stat-lbl">Trx</div>
            </div>
            <div class="cov-stat">
              <div class="cov-stat-val" style="color:#15803d">${fmt(s.total_pagos||0)}</div>
              <div class="cov-stat-lbl">Pagos</div>
            </div>
            <div class="cov-stat">
              <div class="cov-stat-val" style="color:#b91c1c">${fmt(s.total_reversiones||0)}</div>
              <div class="cov-stat-lbl">Reversiones</div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- Detalle caja seleccionada -->
    <div id="detalleCaja" style="display:none;margin-top:24px"></div>
  `;
}

async function verDetalleCaja(id_caja, nombre) {
  const panel = document.getElementById('detalleCaja');
  panel.style.display = '';
  panel.innerHTML = `<div class="spinner-wrap"><div class="spinner-border text-primary"></div></div>`;
  panel.scrollIntoView({ behavior:'smooth', block:'start' });

  const r = await API(`/api/cierre-caja?desde=${_desde}&hasta=${_hasta}&id_caja=${id_caja}`);
  const j = await r.json();
  if (!j.success) { panel.innerHTML = `<div class="alert alert-danger">${j.error}</div>`; return; }

  const { movimientos, totales } = j.data;
  panel.innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <h5><i class="bi bi-cash-stack me-2 text-primary"></i>${esc(nombre)} — Movimientos</h5>
        <span style="font-size:.8rem;color:#6b7280">${fmtFecha(_desde)}${_desde!==_hasta?' al '+fmtFecha(_hasta):''}</span>
      </div>
      <div class="stats-row" style="padding:16px 20px 0">
        <div class="stat-card"><div class="stat-label">Transacciones</div><div class="stat-value azul">${totales.transacciones||0}</div></div>
        <div class="stat-card"><div class="stat-label">Total pagos</div><div class="stat-value verde">$${fmtN(totales.total_pagos||0)}</div></div>
        <div class="stat-card"><div class="stat-label">Reversiones</div><div class="stat-value rojo">$${fmtN(totales.total_reversiones||0)}</div></div>
        <div class="stat-card"><div class="stat-label">Neto recaudado</div><div class="stat-value ${(totales.total_neto||0)>=0?'verde':'rojo'}">$${fmtN(totales.total_neto||0)}</div></div>
      </div>
      ${renderTablaMovimientos(movimientos)}
    </div>`;
}

async function cambiarFecha() {
  _desde = document.getElementById('inputDesde').value || HOY;
  _hasta = document.getElementById('inputHasta').value || HOY;
  await vistaTesorero();
}

/* ═══════════════════════════════════════════════════════════════
   VISTA CAJERO — solo su caja
   ═══════════════════════════════════════════════════════════════ */
async function vistaCajero(miCaja) {
  const r = await API(`/api/cierre-caja?desde=${_desde}&hasta=${_hasta}&id_caja=${miCaja.id_caja}`);
  const j = await r.json();
  const { movimientos, totales } = j.success ? j.data : { movimientos:[], totales:{} };

  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="page-banner">
      <div class="banner-left">
        <i class="bi bi-cash-coin banner-icon"></i>
        <div>
          <p class="banner-title"><i class="bi bi-cash-stack me-2"></i>${esc(miCaja.nombre_caja)}</p>
          <p class="banner-sub">${miCaja.descripcion||'Mi caja de trabajo'}</p>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div class="filtro-fecha">
          <label style="color:rgba(255,255,255,.75);font-size:.8rem">Desde</label>
          <input type="date" id="inputDesde" value="${_desde}" max="${HOY}" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)">
          <label style="color:rgba(255,255,255,.75);font-size:.8rem">Hasta</label>
          <input type="date" id="inputHasta" value="${_hasta}" max="${HOY}" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)">
          <button class="btn-filtrar" onclick="recargarCajero(${miCaja.id_caja})"><i class="bi bi-funnel me-1"></i>Filtrar</button>
        </div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Transacciones</div><div class="stat-value azul">${totales.transacciones||0}</div></div>
      <div class="stat-card"><div class="stat-label">Total pagos</div><div class="stat-value verde">$${fmtN(totales.total_pagos||0)}</div></div>
      <div class="stat-card"><div class="stat-label">Reversiones</div><div class="stat-value rojo">$${fmtN(totales.total_reversiones||0)}</div></div>
      <div class="stat-card"><div class="stat-label">Neto recaudado</div><div class="stat-value ${(totales.total_neto||0)>=0?'verde':'rojo'}">$${fmtN(totales.total_neto||0)}</div></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h5><i class="bi bi-list-ul me-2 text-primary"></i>Movimientos del período</h5>
        <span style="font-size:.8rem;color:#6b7280">${fmtFecha(_desde)}${_desde!==_hasta?' al '+fmtFecha(_hasta):''}</span>
      </div>
      ${renderTablaMovimientos(movimientos)}
    </div>`;
}

async function recargarCajero(id_caja) {
  _desde = document.getElementById('inputDesde').value || HOY;
  _hasta = document.getElementById('inputHasta').value || HOY;
  const r = await API(`/api/cajas/mi-caja`);
  const j = await r.json();
  if (j.data) vistaCajero(j.data);
}

/* ═══════════════════════════════════════════════════════════════
   VISTA SIN CAJA
   ═══════════════════════════════════════════════════════════════ */
function vistaSinCaja() {
  document.getElementById('mainContent').innerHTML = `
    <div style="text-align:center;padding:80px 20px;color:#6b7280">
      <i class="bi bi-cash-stack" style="font-size:3rem;opacity:.3;display:block;margin-bottom:16px"></i>
      <h5 style="font-weight:700;color:#374151">Sin caja asignada</h5>
      <p style="font-size:.9rem">No tienes ninguna caja asignada aún.<br>Contacta al administrador para que te asigne una.</p>
    </div>`;
}

/* ─── Tabla de movimientos (compartida) ──────────────────────── */
function renderTablaMovimientos(movimientos) {
  if (!movimientos?.length) return `<div class="empty-state"><i class="bi bi-inbox d-block mb-2" style="font-size:2rem"></i>Sin movimientos en este período</div>`;
  return `
    <div style="overflow-x:auto">
    <table class="table table-hover">
      <thead><tr>
        <th>Fecha</th>
        <th>Tipo</th>
        <th>N° Trx</th>
        <th>Crédito</th>
        <th>Cliente</th>
        <th>Cuota</th>
        <th class="text-end">Monto cuota</th>
        <th class="text-end">Mora</th>
        <th class="text-end">Total</th>
        <th>Cajero</th>
      </tr></thead>
      <tbody>
        ${movimientos.map(m => `
        <tr>
          <td style="white-space:nowrap">${fmtFechaCta(m.fecha_mov||m.created_at)}</td>
          <td><span class="${m.tipo_mov==='ABONO'?'pill-abono':'pill-cargo'}">${m.tipo_mov}</span></td>
          <td class="text-muted">${m.numero_transaccion??'—'}</td>
          <td>${esc(m.numero_credito||'—')}</td>
          <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.nombre_cliente||'—')}</td>
          <td class="text-center">${m.numero_cuota??'—'}</td>
          <td class="text-end">$${fmtN(m.monto_cuota||0)}</td>
          <td class="text-end ${Number(m.interes_mora)>0?'text-danger':''}">${Number(m.interes_mora)>0?'$'+fmtN(m.interes_mora):'—'}</td>
          <td class="text-end fw-semibold">$${fmtN(m.total_pagado||0)}</td>
          <td class="text-muted" style="font-size:.78rem">${esc(m.nombre_cajero||'—')}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>`;
}

/* ─── Init ───────────────────────────────────────────────────── */
(async () => {
  if (esVista) {
    await vistaTesorero();
  } else {
    const r = await API('/api/cajas/mi-caja');
    const j = await r.json();
    if (j.data) {
      await vistaCajero(j.data);
    } else {
      vistaSinCaja();
    }
  }
})();

/* ─── Helpers ────────────────────────────────────────────────── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtN(n){ return Number(n).toLocaleString('es-CL'); }
function fmt(n){ return '$'+fmtN(n); }
function fmtFecha(d){ if(!d) return '—'; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }
function fmtFechaCta(d){ if(!d) return '—'; const dt=new Date(d); return dt.toLocaleString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
