<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cajas — AutoFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-left { display:flex; align-items:center; gap:16px; }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; letter-spacing:.5px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .breadcrumb-nav a:hover { color:#fff; }
    .breadcrumb-nav .sep { color:rgba(255,255,255,.35); }
    .topnav-right { display:flex; align-items:center; gap:10px; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .btn-logout:hover { background:rgba(255,255,255,.2); }
    .main-content { padding:32px 40px; max-width:1100px; margin:0 auto; }
    .page-banner { background:linear-gradient(135deg,#012d70,#0141A2 50%,#009AFE); border-radius:16px; color:#fff; padding:24px 32px; margin-bottom:32px; display:flex; align-items:center; gap:18px; }
    .page-banner i { font-size:2.4rem; opacity:.8; }
    .page-banner h2 { font-weight:700; margin:0 0 3px; font-size:1.3rem; }
    .page-banner p { opacity:.8; margin:0; font-size:.88rem; }
    .panel { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); }
    .panel-header { padding:18px 24px; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; justify-content:space-between; }
    .panel-header h5 { margin:0; font-weight:700; font-size:1rem; color:#111827; }
    .panel-body { padding:24px; }
    .cajas-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:18px; }
    .caja-card { border:2px solid #e5e7eb; border-radius:12px; padding:20px; background:#fff; position:relative; transition:border-color .18s,box-shadow .18s; }
    .caja-card.activa:hover { border-color:var(--navy); box-shadow:0 4px 18px rgba(1,65,162,.12); }
    .caja-card.inactiva { opacity:.55; }
    .caja-title { font-weight:700; font-size:1rem; color:#111827; margin-bottom:4px; }
    .caja-desc { font-size:.82rem; color:#6b7280; margin-bottom:14px; }
    .caja-badge { display:inline-flex; align-items:center; gap:5px; font-size:.75rem; font-weight:600; padding:3px 10px; border-radius:20px; }
    .badge-activa { background:#dcfce7; color:#15803d; }
    .badge-inactiva { background:#fee2e2; color:#b91c1c; }
    .caja-actions { display:flex; gap:8px; margin-top:14px; }
    .btn-icon { background:none; border:1px solid #e5e7eb; border-radius:8px; padding:6px 12px; font-size:.82rem; cursor:pointer; display:flex; align-items:center; gap:5px; }
    .btn-icon:hover { background:#f3f4f6; }
    .btn-primary-sm { background:var(--navy); color:#fff; border:none; border-radius:8px; padding:6px 14px; font-size:.82rem; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:5px; }
    .btn-primary-sm:hover { background:var(--navy-light); }
    .usuarios-list { margin-top:14px; display:flex; flex-direction:column; gap:8px; }
    .usuario-row { background:#f8fafc; border-radius:10px; padding:12px 14px; border:1px solid #e5e7eb; }
    .usuario-nombre { font-weight:600; font-size:.88rem; color:#111827; }
    .usuario-perfil { font-size:.75rem; color:#6b7280; }
    .permisos-chips { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
    .chip { font-size:.72rem; font-weight:600; padding:2px 8px; border-radius:10px; }
    .chip-ok { background:#dbeafe; color:#1d4ed8; }
    .chip-no { background:#f1f5f9; color:#94a3b8; text-decoration:line-through; }
    .chip-tope { background:#fef9c3; color:#854d0e; }
    .empty-state { text-align:center; color:#9ca3af; padding:40px 0; }
    .spinner-wrap { display:flex; align-items:center; justify-content:center; padding:60px 0; }
    /* Modal */
    .modal-perm-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #f1f5f9; }
    .modal-perm-row:last-child { border-bottom:none; }
    .modal-perm-label { flex:1; font-size:.9rem; color:#374151; }
    .perm-tope { width:90px; }
    @media(max-width:640px){ .main-content{padding:16px;} .cajas-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-left">
    <a href="/" class="topnav-brand">
      <img src="/img/logo.png" alt="AutoFácil">
      <span class="version-badge">v1.0</span>
    </a>
    <div class="breadcrumb-nav">
      <a href="/">Inicio</a><span class="sep">/</span>
      <a href="/tesoreria">Tesorería</a><span class="sep">/</span>
      <span style="color:#fff;font-weight:600"><i class="bi bi-cash-stack me-1"></i>Cajas</span>
    </div>
  </div>
  <div class="topnav-right">
    <div class="user-chip">
      <div class="avatar" id="avatarInicial">?</div>
      <div>
        <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
        <div class="perfil-badge" id="navPerfil">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="main-content">
  <div class="page-banner">
    <i class="bi bi-cash-stack"></i>
    <div>
      <h2>Módulo de Cajas</h2>
      <p>Crea cajas y asigna usuarios con permisos específicos por caja</p>
    </div>
  </div>

  <!-- Panel principal -->
  <div class="panel">
    <div class="panel-header">
      <h5><i class="bi bi-cash-stack me-2 text-primary"></i>Cajas registradas</h5>
      <button class="btn-primary-sm" onclick="abrirModalCaja()">
        <i class="bi bi-plus-lg"></i> Nueva caja
      </button>
    </div>
    <div class="panel-body">
      <div id="cajasWrap">
        <div class="spinner-wrap"><div class="spinner-border text-primary" style="width:2.5rem;height:2.5rem"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ MODAL CAJA ══════════════════════════════════════════════════════════ -->
<div class="modal fade" id="modalCaja" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" id="modalCajaTitulo">Nueva Caja</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-2">
        <input type="hidden" id="cajId">
        <div class="mb-3">
          <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
          <input type="text" id="cajNombre" class="form-control" placeholder="Ej: Caja Principal">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Descripción</label>
          <input type="text" id="cajDesc" class="form-control" placeholder="Opcional">
        </div>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="cajActivo" checked>
          <label class="form-check-label" for="cajActivo">Caja activa</label>
        </div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary fw-semibold px-4" onclick="guardarCaja()">
          <i class="bi bi-check2 me-1"></i>Guardar
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ══ MODAL ASIGNACIÓN USUARIO ═══════════════════════════════════════════ -->
<div class="modal fade" id="modalUsuario" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" id="modalUsuarioTitulo">Asignar Usuario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-2">
        <input type="hidden" id="asigCajaId">
        <input type="hidden" id="asigUserId">
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuario <span class="text-danger">*</span></label>
          <select id="asigSelect" class="form-select">
            <option value="">— Seleccione usuario —</option>
          </select>
        </div>
        <p class="fw-semibold text-secondary mb-2" style="font-size:.85rem;text-transform:uppercase;letter-spacing:.5px">Permisos</p>
        <div class="modal-perm-row">
          <i class="bi bi-cash text-success fs-5"></i>
          <span class="modal-perm-label">Pagar cuotas</span>
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="permPagar">
          </div>
        </div>
        <div class="modal-perm-row">
          <i class="bi bi-arrow-counterclockwise text-warning fs-5"></i>
          <span class="modal-perm-label">Reversar pagos</span>
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="permReversar">
          </div>
        </div>
        <div class="modal-perm-row">
          <i class="bi bi-percent text-primary fs-5"></i>
          <span class="modal-perm-label">Condonar intereses por mora</span>
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="permCondIntereses" onchange="toggleTope('topeIntereses',this.checked)">
          </div>
          <div class="input-group perm-tope">
            <input type="number" id="topeIntereses" class="form-control form-control-sm" min="0" max="100" step="1" placeholder="0" disabled>
            <span class="input-group-text">%</span>
          </div>
        </div>
        <div class="modal-perm-row">
          <i class="bi bi-shield-check text-info fs-5"></i>
          <span class="modal-perm-label">Condonar gastos de cobranza</span>
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="permCondGastos" onchange="toggleTope('topeGastos',this.checked)">
          </div>
          <div class="input-group perm-tope">
            <input type="number" id="topeGastos" class="form-control form-control-sm" min="0" max="100" step="1" placeholder="0" disabled>
            <span class="input-group-text">%</span>
          </div>
        </div>
        <div class="modal-perm-row border-0 pt-2">
          <i class="bi bi-toggle-on text-secondary fs-5"></i>
          <span class="modal-perm-label">Asignación activa</span>
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="asigActivo" checked>
          </div>
        </div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary fw-semibold px-4" onclick="guardarUsuario()">
          <i class="bi bi-check2 me-1"></i>Guardar
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const token = localStorage.getItem('token');
const yo    = JSON.parse(localStorage.getItem('usuario') || 'null');
if (!token || !yo) window.location.href = '/login.html';
if (!['Administrador','Gerente'].includes(yo?.perfil)) {
  alert('Acceso restringido'); window.location.href = '/tesoreria';
}

document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
document.getElementById('navPerfil').textContent  = yo?.perfil || '';
document.getElementById('avatarInicial').textContent = (yo?.nombre||'?').charAt(0).toUpperCase();
function logout(){ localStorage.removeItem('token'); localStorage.removeItem('usuario'); window.location.href='/login.html'; }

const API = (path, opts={}) => fetch(path, { headers:{ Authorization:`Bearer ${token}`, 'Content-Type':'application/json' }, ...opts });

/* ── estado ─────────────────────────────────────────────────────────────── */
let _cajas = [];
let _usuariosDisp = [];   // todos los usuarios del sistema
let _usuariosCaja = {};   // { id_caja: [...] }

/* ── arranque ───────────────────────────────────────────────────────────── */
(async () => {
  await Promise.all([cargarCajas(), cargarTodosUsuarios()]);
})();

async function cargarCajas() {
  const r = await API('/api/cajas');
  const j = await r.json();
  _cajas = j.data || [];
  await cargarUsuariosDeCajas();
  renderCajas();
}

async function cargarTodosUsuarios() {
  const r = await API('/api/cajas/todos-usuarios');
  const j = await r.json();
  _usuariosDisp = j.data || [];
}

async function cargarUsuariosDeCajas() {
  await Promise.all(_cajas.map(async c => {
    const r = await API(`/api/cajas/${c.id_caja}/usuarios`);
    const j = await r.json();
    _usuariosCaja[c.id_caja] = j.data || [];
  }));
}

/* ── render ─────────────────────────────────────────────────────────────── */
function renderCajas() {
  const wrap = document.getElementById('cajasWrap');
  if (!_cajas.length) {
    wrap.innerHTML = `<div class="empty-state"><i class="bi bi-cash-stack fs-1 mb-3 d-block"></i><p class="mb-0">No hay cajas registradas. Crea la primera.</p></div>`;
    return;
  }
  wrap.innerHTML = `<div class="cajas-grid">${_cajas.map(renderCajaCard).join('')}</div>`;
}

function renderCajaCard(c) {
  const usuarios = _usuariosCaja[c.id_caja] || [];
  const actClass = c.activo ? 'activa' : 'inactiva';
  const badgeHtml = c.activo
    ? `<span class="caja-badge badge-activa"><i class="bi bi-check-circle-fill"></i>Activa</span>`
    : `<span class="caja-badge badge-inactiva"><i class="bi bi-x-circle-fill"></i>Inactiva</span>`;

  const usuariosHtml = usuarios.length
    ? usuarios.map(u => renderUsuarioRow(u)).join('')
    : `<div style="font-size:.8rem;color:#9ca3af;text-align:center;padding:10px 0">Sin usuarios asignados</div>`;

  return `
  <div class="caja-card ${actClass}">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
      <div>
        <div class="caja-title"><i class="bi bi-cash-stack me-1 text-primary"></i>${esc(c.nombre)}</div>
        <div class="caja-desc">${esc(c.descripcion||'Sin descripción')}</div>
      </div>
      ${badgeHtml}
    </div>
    <div class="usuarios-list">${usuariosHtml}</div>
    <div class="caja-actions">
      <button class="btn-icon" onclick="abrirModalCaja(${c.id_caja})"><i class="bi bi-pencil"></i> Editar</button>
      <button class="btn-primary-sm" onclick="abrirModalUsuario(${c.id_caja})"><i class="bi bi-person-plus"></i> Asignar usuario</button>
    </div>
  </div>`;
}

function renderUsuarioRow(u) {
  const chips = [];
  if (u.puede_pagar_cuotas)        chips.push(`<span class="chip chip-ok"><i class="bi bi-cash me-1"></i>Pagar cuotas</span>`);
  if (u.puede_reversar_pagos)      chips.push(`<span class="chip chip-ok"><i class="bi bi-arrow-counterclockwise me-1"></i>Reversar</span>`);
  if (u.puede_condonar_intereses)  chips.push(`<span class="chip chip-tope"><i class="bi bi-percent me-1"></i>Cond. intereses &le;${u.tope_intereses}%</span>`);
  if (u.puede_condonar_gastos)     chips.push(`<span class="chip chip-tope"><i class="bi bi-shield-check me-1"></i>Cond. gastos &le;${u.tope_gastos}%</span>`);
  if (!chips.length)               chips.push(`<span class="chip chip-no">Sin permisos</span>`);

  const estadoBadge = u.activo
    ? `<span style="font-size:.7rem;background:#dcfce7;color:#15803d;border-radius:8px;padding:1px 7px;font-weight:600">Activo</span>`
    : `<span style="font-size:.7rem;background:#fee2e2;color:#b91c1c;border-radius:8px;padding:1px 7px;font-weight:600">Inactivo</span>`;

  return `
  <div class="usuario-row">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div class="usuario-nombre">${esc(u.nombre_usuario||'—')}</div>
        <div class="usuario-perfil">${esc(u.perfil||'—')} · ${esc(u.email||'')}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        ${estadoBadge}
        <button class="btn-icon" style="padding:3px 8px;font-size:.75rem" onclick="editarUsuario(${u.id_caja},${u.id_usuario})"><i class="bi bi-pencil"></i></button>
        <button class="btn-icon" style="padding:3px 8px;font-size:.75rem;border-color:#fee2e2;color:#dc2626" onclick="quitarUsuario(${u.id_caja},${u.id_usuario})"><i class="bi bi-person-x"></i></button>
      </div>
    </div>
    <div class="permisos-chips">${chips.join('')}</div>
  </div>`;
}

/* ── modal caja ─────────────────────────────────────────────────────────── */
const modalCajaBS = new bootstrap.Modal(document.getElementById('modalCaja'));

function abrirModalCaja(id) {
  const c = id ? _cajas.find(x => x.id_caja == id) : null;
  document.getElementById('modalCajaTitulo').textContent = c ? 'Editar Caja' : 'Nueva Caja';
  document.getElementById('cajId').value     = c?.id_caja || '';
  document.getElementById('cajNombre').value = c?.nombre  || '';
  document.getElementById('cajDesc').value   = c?.descripcion || '';
  document.getElementById('cajActivo').checked = c ? !!c.activo : true;
  modalCajaBS.show();
}

async function guardarCaja() {
  const id     = document.getElementById('cajId').value;
  const nombre = document.getElementById('cajNombre').value.trim();
  if (!nombre) return alert('El nombre es requerido');
  const body = {
    nombre,
    descripcion: document.getElementById('cajDesc').value.trim() || null,
    activo: document.getElementById('cajActivo').checked ? 1 : 0,
  };
  const url    = id ? `/api/cajas/${id}` : '/api/cajas';
  const method = id ? 'PUT' : 'POST';
  const r = await API(url, { method, body: JSON.stringify(body) });
  const j = await r.json();
  if (!j.success) return alert('Error: ' + j.error);
  modalCajaBS.hide();
  await cargarCajas();
}

/* ── modal usuario ──────────────────────────────────────────────────────── */
const modalUsuarioBS = new bootstrap.Modal(document.getElementById('modalUsuario'));

function toggleTope(fieldId, enabled) {
  document.getElementById(fieldId).disabled = !enabled;
  if (!enabled) document.getElementById(fieldId).value = '';
}

function abrirModalUsuario(id_caja) {
  document.getElementById('asigCajaId').value = id_caja;
  document.getElementById('asigUserId').value = '';
  document.getElementById('modalUsuarioTitulo').textContent = 'Asignar Usuario';
  // Poblar select
  const sel = document.getElementById('asigSelect');
  sel.innerHTML = '<option value="">— Seleccione usuario —</option>';
  _usuariosDisp.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.id_usuario;
    opt.textContent = `${u.nombre_usuario} (${u.perfil||'—'})`;
    sel.appendChild(opt);
  });
  // Resetear permisos
  ['permPagar','permReversar','permCondIntereses','permCondGastos','asigActivo'].forEach(id => {
    document.getElementById(id).checked = id === 'asigActivo';
  });
  ['topeIntereses','topeGastos'].forEach(id => {
    document.getElementById(id).value = '';
    document.getElementById(id).disabled = true;
  });
  document.getElementById('asigSelect').disabled = false;
  modalUsuarioBS.show();
}

function editarUsuario(id_caja, id_usuario) {
  const u = (_usuariosCaja[id_caja]||[]).find(x => x.id_usuario == id_usuario);
  if (!u) return;
  document.getElementById('asigCajaId').value   = id_caja;
  document.getElementById('asigUserId').value   = id_usuario;
  document.getElementById('modalUsuarioTitulo').textContent = `Editar permisos — ${u.nombre_usuario}`;
  // Select fijo
  const sel = document.getElementById('asigSelect');
  sel.innerHTML = `<option value="${u.id_usuario}">${esc(u.nombre_usuario)} (${esc(u.perfil||'—')})</option>`;
  sel.disabled = true;
  // Permisos
  document.getElementById('permPagar').checked        = !!u.puede_pagar_cuotas;
  document.getElementById('permReversar').checked     = !!u.puede_reversar_pagos;
  document.getElementById('permCondIntereses').checked= !!u.puede_condonar_intereses;
  document.getElementById('permCondGastos').checked   = !!u.puede_condonar_gastos;
  document.getElementById('asigActivo').checked       = !!u.activo;
  document.getElementById('topeIntereses').value    = u.tope_intereses || '';
  document.getElementById('topeGastos').value       = u.tope_gastos    || '';
  document.getElementById('topeIntereses').disabled = !u.puede_condonar_intereses;
  document.getElementById('topeGastos').disabled    = !u.puede_condonar_gastos;
  modalUsuarioBS.show();
}

async function guardarUsuario() {
  const id_caja   = document.getElementById('asigCajaId').value;
  const id_usuario= document.getElementById('asigUserId').value || document.getElementById('asigSelect').value;
  if (!id_usuario) return alert('Seleccione un usuario');
  const permCI = document.getElementById('permCondIntereses').checked;
  const permCG = document.getElementById('permCondGastos').checked;
  const body = {
    id_usuario,
    puede_pagar_cuotas:       document.getElementById('permPagar').checked     ? 1 : 0,
    puede_reversar_pagos:     document.getElementById('permReversar').checked  ? 1 : 0,
    puede_condonar_intereses: permCI ? 1 : 0,
    tope_intereses:           permCI ? (parseFloat(document.getElementById('topeIntereses').value)||0) : 0,
    puede_condonar_gastos:    permCG ? 1 : 0,
    tope_gastos:              permCG ? (parseFloat(document.getElementById('topeGastos').value)||0) : 0,
    activo:                   document.getElementById('asigActivo').checked ? 1 : 0,
  };
  const r = await API(`/api/cajas/${id_caja}/usuarios`, { method:'POST', body: JSON.stringify(body) });
  const j = await r.json();
  if (!j.success) return alert('Error: ' + j.error);
  modalUsuarioBS.hide();
  await cargarCajas();
}

async function quitarUsuario(id_caja, id_usuario) {
  if (!confirm('¿Desactivar esta asignación?')) return;
  await API(`/api/cajas/${id_caja}/usuarios/${id_usuario}`, { method:'DELETE' });
  await cargarCajas();
}

/* ── util ─────────────────────────────────────────────────────────────── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
