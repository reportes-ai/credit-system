<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castigos de Saldo — AutoFácil</title>
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.css" rel="stylesheet">
  <!-- v1.0 -->
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }
    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-left { display:flex; align-items:center; gap:16px; }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; letter-spacing:.5px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .breadcrumb-nav .sep { color:rgba(255,255,255,.35); }
    .topnav-right { display:flex; align-items:center; gap:10px; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .main-content { padding:32px 40px; max-width:1400px; margin:0 auto; }
    .page-banner { background:linear-gradient(135deg,#7f1d1d,#b91c1c 60%,#ef4444); border-radius:16px; color:#fff; padding:24px 32px; margin-bottom:24px; display:flex; align-items:center; gap:18px; }
    .page-banner i { font-size:2.4rem; opacity:.85; }
    .page-banner h2 { font-weight:700; margin:0 0 3px; font-size:1.3rem; }
    .page-banner p { opacity:.85; margin:0; font-size:.88rem; }
    .toolbar { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:18px; }
    .toolbar label { font-size:.78rem; font-weight:600; color:#374151; display:block; margin-bottom:4px; }
    .btn-castigar { background:linear-gradient(135deg,#b91c1c,#ef4444); color:#fff; border:none; border-radius:9px; padding:9px 18px; font-weight:700; font-size:.88rem; cursor:pointer; display:inline-flex; align-items:center; gap:7px; margin-left:auto; }
    .panel { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); overflow:hidden; }
    table { width:100%; border-collapse:collapse; font-size:.83rem; }
    thead th { background:#f8fafc; color:#374151; font-weight:700; padding:11px 14px; text-align:left; border-bottom:2px solid #e5e7eb; white-space:nowrap; }
    tbody td { padding:10px 14px; border-bottom:1px solid #f1f5f9; color:#1f2937; vertical-align:top; }
    .text-right { text-align:right; }
    .badge { font-size:.72rem; font-weight:700; border-radius:6px; padding:2px 8px; display:inline-block; }
    .b-PENDIENTE { background:#fef3c7; color:#92400e; }
    .b-APROBADO  { background:#fee2e2; color:#991b1b; }
    .b-RECHAZADO { background:#e5e7eb; color:#6b7280; }
    .b-ANULADO   { background:#e5e7eb; color:#9ca3af; }
    .b-mot { background:#eff6ff; color:#1e40af; }
    .firma { font-size:.76rem; color:#374151; }
    .firma.pend { color:#b45309; }
    .empty-state { text-align:center; color:#9ca3af; padding:44px 0; }
    @media(max-width:640px){ .main-content{padding:16px;} }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-left">
    <a href="/" class="topnav-brand"><img src="/img/logo.png" alt="AutoFácil"><span class="version-badge">v1.0</span></a>
    <div class="breadcrumb-nav">
      <a href="/">Inicio</a><span class="sep">›</span>
      <a href="/tesoreria/">Tesorería</a><span class="sep">›</span>
      <span style="color:#fff;font-weight:600"><i class="bi bi-file-earmark-minus me-1"></i>Castigos de Saldo</span>
    </div>
  </div>
  <div class="topnav-right">
    <div class="user-chip"><div class="avatar" id="avatarInicial">?</div>
      <div><div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div><div class="perfil-badge" id="navPerfil">—</div></div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="main-content">
  <div class="page-banner">
    <i class="bi bi-file-earmark-minus"></i>
    <div><h2>Castigos de Saldo</h2><p>Operaciones dadas de baja contablemente · motivo, comentario y firmas de aprobación</p></div>
  </div>

  <div class="toolbar">
    <div><label>Estado</label>
      <select id="fEstado" class="form-select form-select-sm" onchange="cargar()">
        <option value="">Todos</option><option>PENDIENTE</option><option>APROBADO</option><option>RECHAZADO</option><option>ANULADO</option>
      </select></div>
    <div><label>Motivo</label>
      <select id="fMotivo" class="form-select form-select-sm" onchange="cargar()">
        <option value="">Todos</option><option>INCOBRABLE</option><option>NEGOCIACION</option><option>OTROS</option>
      </select></div>
    <button class="btn-castigar" onclick="castigarSaldo()"><i class="bi bi-file-earmark-minus"></i>CASTIGAR SALDO</button>
  </div>

  <div class="panel">
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>Solicitado</th><th>N° Op</th><th>Cliente</th><th>Motivo</th><th>Comentario</th>
          <th class="text-right">Saldo castigado</th><th>Estado</th><th>Aprobaciones</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="empty" class="empty-state" style="display:none">Sin castigos registrados.</div>
  </div>
</div>

<script src="/js/auth-guard.js"></script>
<script>
const token = sessionStorage.getItem('token');
const yo    = JSON.parse(sessionStorage.getItem('usuario') || 'null');
if (!token || !yo) window.location.href = '/login.html';
(async () => {
  if (yo?.perfil === 'Administrador') return;
  let ok = false;
  try { const j = await fetch('/api/auth/mis-permisos?_='+Date.now(), { headers:{ Authorization:'Bearer '+token } }).then(r=>r.json());
    ok = (j.funcionalidades||[]).includes('castigos_historial'); } catch(e){}
  if (!ok) { alert('Acceso restringido'); window.location.href = '/tesoreria'; }
})();
document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
document.getElementById('navPerfil').textContent  = yo?.perfil || '';
document.getElementById('avatarInicial').textContent = (yo?.nombre||'?').charAt(0).toUpperCase();
function logout(){ sessionStorage.removeItem('token'); sessionStorage.removeItem('usuario'); window.location.href='/login.html'; }

const H = { Authorization:'Bearer '+token, 'Content-Type':'application/json' };
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtP = v => v!=null&&v!=='' ? '$'+Math.round(Number(v)).toLocaleString('es-CL') : '—';
const fmtDT = s => s ? new Date(s).toLocaleString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';

async function cargar() {
  const qs = new URLSearchParams();
  const e = document.getElementById('fEstado').value, m = document.getElementById('fMotivo').value;
  if (e) qs.set('estado', e); if (m) qs.set('motivo', m);
  const j = await fetch('/api/castigos?'+qs, { headers: H }).then(r=>r.json());
  const rows = j.data || [];
  document.getElementById('empty').style.display = rows.length ? 'none' : '';
  document.getElementById('tbody').innerHTML = rows.map(c => {
    const firma = rol => {
      const f = (c.aprobaciones||[]).find(a => a.rol === rol);
      if (!f) return `<span class="firma pend">pendiente</span>`;
      return `<span class="firma">${f.decision==='APROBADO'?'✔':'✗'} ${esc(f.aprobado_por_nombre||'')}<br><span style="color:#94a3b8">${fmtDT(f.aprobado_at)}</span></span>`;
    };
    return `<tr>
      <td>${fmtDT(c.solicitado_at)}<br><span style="color:#94a3b8;font-size:.75rem">${esc(c.solicitado_por_nombre||'')}</span></td>
      <td><b>${esc(c.num_op)}</b></td>
      <td>${esc(c.cliente||'')}<br><span style="color:#94a3b8;font-size:.75rem">${esc(c.rut||'')}</span></td>
      <td><span class="badge b-mot">${esc(c.motivo)}</span></td>
      <td style="max-width:260px">${esc(c.comentario||'')}</td>
      <td class="text-right">${fmtP(c.saldo_castigado)}${c.aplicado_at?`<br><span style="color:#94a3b8;font-size:.72rem">baja ${fmtDT(c.aplicado_at)}</span>`:''}</td>
      <td><span class="badge b-${c.estado}">${c.estado}</span></td>
      <td><div><b style="font-size:.72rem">Finanzas:</b> ${firma('FINANZAS')}</div><div style="margin-top:4px"><b style="font-size:.72rem">Oper. y Riesgo:</b> ${firma('OPERACIONES')}</div></td>
    </tr>`;
  }).join('');
}

async function castigarSaldo() {
  const numop = (prompt('N° de operación a castigar:')||'').trim();
  if (!numop) return;
  const j = await fetch('/api/castigos/resolver/'+encodeURIComponent(numop), { headers: H }).then(r=>r.json());
  if (!j.success) return alert(j.error || 'Operación no encontrada');
  if (!j.data.propia) return alert('El castigo de saldo solo aplica a operaciones de cartera propia.');
  window.location.href = '/creditos/revisar?id=' + j.data.id_credito;
}

cargar();
</script>
<script src="/js/app-version.js"></script>
</body>
</html>
