<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuentas Transitorias — AutoFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#0141A2; --navy-dark:#012d70; --navy-light:#0255c5; --accent:#009AFE; --bg:#f0f4f8; }
    * { box-sizing:border-box; }
    body { background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; margin:0; min-height:100vh; }

    .topnav { background:linear-gradient(90deg,var(--navy-dark),var(--navy-light)); color:#fff; height:60px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .topnav-left { display:flex; align-items:center; gap:16px; }
    .topnav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .topnav-brand img { height:32px; filter:brightness(0) invert(1); }
    .version-badge { background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:.65rem; font-weight:700; border-radius:6px; padding:2px 8px; }
    .breadcrumb-nav { color:rgba(255,255,255,.6); font-size:.85rem; display:flex; align-items:center; gap:6px; }
    .breadcrumb-nav a { color:rgba(255,255,255,.75); text-decoration:none; }
    .breadcrumb-nav a:hover { color:#fff; }
    .breadcrumb-nav .sep { color:rgba(255,255,255,.35); }
    .topnav-right { display:flex; align-items:center; gap:10px; }
    .user-chip { background:rgba(255,255,255,.12); border-radius:24px; padding:5px 12px; display:flex; align-items:center; gap:8px; font-size:.85rem; }
    .avatar { width:28px; height:28px; background:#90caf9; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--navy); font-weight:700; font-size:.75rem; }
    .perfil-badge { background:rgba(144,202,249,.2); border:1px solid rgba(144,202,249,.4); color:#90caf9; border-radius:12px; padding:2px 10px; font-size:.73rem; font-weight:600; }
    .btn-logout { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:5px 12px; font-size:.82rem; cursor:pointer; }
    .btn-logout:hover { background:rgba(255,255,255,.2); }

    .main-content { max-width:1100px; margin:0 auto; padding:28px 24px; }
    .page-banner { background:linear-gradient(135deg,#012d70,#0141A2 50%,#009AFE); border-radius:16px; color:#fff; padding:28px 36px; margin-bottom:28px; display:flex; align-items:center; gap:20px; }
    .page-banner > i { font-size:3rem; opacity:.8; }
    .page-banner h2 { font-weight:700; margin:0 0 4px; font-size:1.4rem; }
    .page-banner p { opacity:.8; margin:0; font-size:.9rem; }

    /* Stats */
    .resumen-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; margin-bottom:24px; }
    .stat-card { background:#fff; border-radius:14px; padding:20px 24px; box-shadow:0 1px 4px rgba(0,0,0,.07); display:flex; align-items:center; gap:16px; }
    .stat-icon { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.4rem; flex-shrink:0; }
    .stat-icon.blue  { background:#dbeafe; color:#1d4ed8; }
    .stat-icon.green { background:#dcfce7; color:#15803d; }
    .stat-label { font-size:.75rem; color:#6b7280; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
    .stat-val { font-size:1.4rem; font-weight:900; color:#111827; font-family:monospace; line-height:1.2; }

    /* Toolbar */
    .toolbar { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.07); padding:14px 20px; margin-bottom:20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .search-wrap { position:relative; flex:1; min-width:260px; }
    .search-wrap i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#9ca3af; }
    .search-wrap input { padding-left:36px; border-radius:8px; font-size:.88rem; border:1.5px solid #e5e7eb; width:100%; padding-top:8px; padding-bottom:8px; outline:none; }
    .search-wrap input:focus { border-color:var(--navy); box-shadow:0 0 0 3px rgba(1,65,162,.1); }
    .filter-select { border-radius:8px; font-size:.88rem; border:1.5px solid #e5e7eb; padding:8px 12px; outline:none; }
    .count-badge { color:#6b7280; font-size:.85rem; white-space:nowrap; }

    /* Cuenta Card */
    .cuenta-card { background:#fff; border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); margin-bottom:18px; overflow:hidden; }
    .cuenta-header { display:flex; align-items:center; justify-content:space-between; padding:16px 22px; cursor:pointer; border-bottom:1px solid #f1f5f9; user-select:none; }
    .cuenta-header:hover { background:#f8fafc; }
    .cuenta-header-left { display:flex; align-items:center; gap:16px; }
    .op-badge { background:#dbeafe; color:var(--navy); font-weight:800; font-size:.85rem; border-radius:8px; padding:4px 12px; white-space:nowrap; }
    .cuenta-cliente { font-weight:700; color:#111827; font-size:.95rem; }
    .cuenta-rut { font-family:monospace; color:var(--accent); font-size:.82rem; }
    .saldo-badge { font-family:monospace; font-weight:900; font-size:1.1rem; border-radius:10px; padding:5px 14px; white-space:nowrap; }
    .saldo-badge.positivo { background:#dcfce7; color:#15803d; }
    .saldo-badge.cero { background:#f1f5f9; color:#9ca3af; }
    .toggle-icon { font-size:1rem; color:#9ca3af; transition:transform .2s; }
    .toggle-icon.open { transform:rotate(180deg); }

    /* Cartola (extracto bancario) */
    .cartola-wrap { padding:0 22px 18px; }
    .cartola-table { width:100%; border-collapse:collapse; font-size:.83rem; margin-top:12px; }
    .cartola-table thead th { background:#f8fafc; color:#374151; font-weight:700; padding:9px 12px; text-align:left; border-bottom:2px solid #e5e7eb; white-space:nowrap; font-size:.75rem; text-transform:uppercase; letter-spacing:.3px; }
    .cartola-table tbody td { padding:9px 12px; border-bottom:1px solid #f8fafc; vertical-align:middle; }
    .cartola-table tbody tr:last-child td { border-bottom:none; }
    .cartola-table tbody tr:hover td { background:#fafbff; }
    .cartola-table tfoot td { background:#f0f4f8; font-weight:700; padding:10px 12px; border-top:2px solid #e5e7eb; }

    /* Tipos movimiento */
    .tag-abono { background:#dcfce7; color:#15803d; font-weight:700; font-size:.72rem; border-radius:6px; padding:2px 8px; }
    .tag-cargo { background:#fef2f2; color:#dc2626; font-weight:700; font-size:.72rem; border-radius:6px; padding:2px 8px; }
    .tag-historico { background:#fef9c3; color:#92400e; font-weight:700; font-size:.72rem; border-radius:6px; padding:2px 8px; }
    .trx-code { font-family:monospace; font-size:.79rem; font-weight:700; color:var(--navy); background:#dbeafe; border-radius:5px; padding:2px 6px; white-space:nowrap; }
    .monto-abono { font-family:monospace; font-weight:700; color:#15803d; }
    .monto-cargo  { font-family:monospace; font-weight:700; color:#dc2626; }
    .saldo-col { font-family:monospace; font-weight:700; color:#374151; }

    .cartola-loading { text-align:center; padding:24px 0; color:#9ca3af; font-size:.88rem; }
    .empty { text-align:center; color:#9ca3af; padding:48px 0; }
    .pag-row { display:flex; align-items:center; justify-content:space-between; padding:12px 0; }
    .pag-info { font-size:.82rem; color:#6b7280; }

    /* Panel admin corrección */
    .admin-panel { background:#fff7ed; border:1.5px dashed #fb923c; border-radius:10px; padding:16px 20px; margin-top:14px; }
    .admin-panel h6 { font-size:.82rem; font-weight:700; color:#92400e; margin:0 0 12px; }
    .admin-row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:10px; }
    .admin-row label { font-size:.75rem; font-weight:600; color:#92400e; display:block; margin-bottom:3px; }
    .admin-row input { border-radius:7px; border:1.5px solid #fed7aa; padding:6px 10px; font-size:.84rem; outline:none; width:160px; }
    .admin-row input:focus { border-color:#f97316; }
    .btn-admin-fix { background:#dc2626; color:#fff; border:none; border-radius:8px; padding:7px 16px; font-size:.82rem; font-weight:700; cursor:pointer; }
    .btn-admin-fix:hover { background:#b91c1c; }
    .btn-admin-del  { background:#fff; color:#dc2626; border:1.5px solid #dc2626; border-radius:6px; padding:2px 8px; font-size:.72rem; font-weight:700; cursor:pointer; margin-left:8px; }
    .btn-admin-del:hover { background:#fef2f2; }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="topnav-left">
    <a href="/" class="topnav-brand">
      <img src="/img/logo.png" alt="AutoFácil">
      <span class="version-badge">v1.3</span>
    </a>
    <div class="breadcrumb-nav">
      <a href="/">Inicio</a><span class="sep">›</span>
      <a href="/tesoreria/">Tesorería</a><span class="sep">›</span>
      <span style="color:#fff;font-weight:600"><i class="bi bi-arrow-left-right me-1"></i>Cuentas Transitorias</span>
    </div>
  </div>
  <div class="topnav-right">
    <div class="user-chip">
      <div class="avatar" id="avatarInicial">?</div>
      <div>
        <div style="font-weight:600;line-height:1.3;color:#fff" id="navNombre">—</div>
        <div class="perfil-badge" id="navPerfil">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
  </div>
</nav>

<div class="main-content">
  <div class="page-banner">
    <i class="bi bi-arrow-left-right"></i>
    <div>
      <h2>Cuentas Transitorias</h2>
      <p>Extracto de saldos a favor — por crédito y cliente</p>
    </div>
  </div>

  <!-- Resumen estadístico -->
  <div class="resumen-row">
    <div class="stat-card">
      <div class="stat-icon blue"><i class="bi bi-people"></i></div>
      <div>
        <div class="stat-label">Créditos con saldo</div>
        <div class="stat-val" id="statCantidad">—</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green"><i class="bi bi-currency-dollar"></i></div>
      <div>
        <div class="stat-label">Total en saldo a favor</div>
        <div class="stat-val" id="statTotal">—</div>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <i class="bi bi-search"></i>
      <input type="text" id="filtroQ" placeholder="Buscar por N° crédito (OP), RUT o nombre del cliente…" autocomplete="off" oninput="debounce()">
    </div>
    <select id="filtroEstado" class="filter-select" onchange="cargar()">
      <option value="1">Solo con saldo</option>
      <option value="0">Todos</option>
    </select>
    <span class="count-badge" id="countBadge"></span>
  </div>

  <!-- Lista de cuentas con cartola expandible -->
  <div id="listaCuentas">
    <div class="empty"><i class="bi bi-arrow-left-right fs-1 d-block mb-3"></i>Cargando…</div>
  </div>

  <div class="pag-row" id="pagRow" style="display:none">
    <span class="pag-info" id="pagInfo"></span>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary btn-sm" id="btnPrev" onclick="cambiarPag(-1)"><i class="bi bi-chevron-left"></i></button>
      <button class="btn btn-outline-secondary btn-sm" id="btnNext" onclick="cambiarPag(1)"><i class="bi bi-chevron-right"></i></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const token = localStorage.getItem('token');
const yo    = JSON.parse(localStorage.getItem('usuario') || 'null');
if (!token || !yo) window.location.href = '/login.html';
document.getElementById('navNombre').textContent = `${yo?.nombre||''} ${yo?.apellido||''}`.trim();
document.getElementById('navPerfil').textContent  = yo?.perfil || '';
document.getElementById('avatarInicial').textContent = (yo?.nombre||'?').charAt(0).toUpperCase();
function logout() { localStorage.removeItem('token'); localStorage.removeItem('usuario'); window.location.href='/login.html'; }

const H   = { 'Content-Type':'application/json', 'Authorization':'Bearer '+token };
const clp = v => '$' + Math.round(v||0).toLocaleString('es-CL');
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
const trxFmt = n => n ? `TRX-${String(n).padStart(6,'0')}` : '—';
const fmtDt  = v => {
  if (!v) return '—';
  const d = new Date(v);
  if (isNaN(d)) return '—';
  return d.toLocaleDateString('es-CL', { timeZone:'America/Santiago', day:'2-digit', month:'2-digit', year:'numeric' });
};

let _data = [], pag = 1, perPag = 20, debTimer;
const _cartolas = {};   // cache de cartolas cargadas por id_credito

function debounce() { clearTimeout(debTimer); debTimer = setTimeout(cargar, 300); }

async function cargar() {
  pag = 1;
  const q = document.getElementById('filtroQ').value.trim();
  const s = document.getElementById('filtroEstado').value;
  const params = new URLSearchParams({ solo_saldo: s });
  if (q) params.append('q', q);

  document.getElementById('listaCuentas').innerHTML =
    '<div class="empty"><div class="spinner-border text-primary mb-3" style="width:2rem;height:2rem"></div><br>Cargando…</div>';

  const res  = await fetch('/api/cuentas-transitorias?' + params, { headers: H });
  const json = await res.json();
  if (!json.success) return;

  _data = json.data.rows;
  const { cantidad, total } = json.data.resumen;
  document.getElementById('statCantidad').textContent = cantidad.toLocaleString('es-CL');
  document.getElementById('statTotal').textContent    = clp(total);

  render();
}

function cambiarPag(d) { pag += d; render(); }

function render() {
  const desde  = (pag-1)*perPag, hasta = Math.min(pag*perPag, _data.length);
  const pagina = _data.slice(desde, hasta);

  document.getElementById('countBadge').textContent =
    `${_data.length.toLocaleString('es-CL')} crédito${_data.length!==1?'s':''}`;

  const pagRow = document.getElementById('pagRow');
  if (_data.length > perPag) {
    pagRow.style.display = '';
    document.getElementById('pagInfo').textContent =
      _data.length > 0 ? `Mostrando ${desde+1}–${hasta} de ${_data.length.toLocaleString('es-CL')}` : '';
    document.getElementById('btnPrev').disabled = pag <= 1;
    document.getElementById('btnNext').disabled = hasta >= _data.length;
  } else {
    pagRow.style.display = 'none';
  }

  const lista = document.getElementById('listaCuentas');
  if (!pagina.length) {
    lista.innerHTML = '<div class="empty"><i class="bi bi-inbox fs-1 d-block mb-3"></i>Sin resultados</div>';
    return;
  }

  lista.innerHTML = pagina.map(r => renderCuentaCard(r)).join('');
}

function renderCuentaCard(r) {
  const saldo = parseFloat(r.saldo||0);
  const saldoBadge = saldo > 0
    ? `<span class="saldo-badge positivo"><i class="bi bi-check-circle me-1"></i>${clp(saldo)}</span>`
    : `<span class="saldo-badge cero">Sin saldo</span>`;

  return `
  <div class="cuenta-card" id="card-${r.id_credito}">
    <div class="cuenta-header" onclick="toggleCartola(${r.id_credito})">
      <div class="cuenta-header-left">
        <span class="op-badge">N° ${esc(r.numero_credito||r.id_credito)}</span>
        <div>
          <div class="cuenta-cliente">${esc(r.nombre_cliente||'—')}</div>
          <div class="cuenta-rut">${esc(r.rut_cliente||'—')}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:14px">
        ${saldoBadge}
        <i class="bi bi-chevron-down toggle-icon" id="icon-${r.id_credito}"></i>
      </div>
    </div>
    <div id="cartola-${r.id_credito}" style="display:none">
      <div class="cartola-wrap">
        <div class="cartola-loading" id="loading-${r.id_credito}">
          <div class="spinner-border spinner-border-sm text-primary me-2"></div>Cargando extracto…
        </div>
        <div id="contenido-${r.id_credito}"></div>
      </div>
    </div>
  </div>`;
}

async function toggleCartola(id_credito) {
  const wrap = document.getElementById(`cartola-${id_credito}`);
  const icon = document.getElementById(`icon-${id_credito}`);
  const open = wrap.style.display !== 'none';

  wrap.style.display = open ? 'none' : '';
  icon.classList.toggle('open', !open);

  if (!open && !_cartolas[id_credito]) {
    // Cargar cartola
    const res  = await fetch(`/api/cuentas-transitorias/cartola/${id_credito}`, { headers: H });
    const json = await res.json();
    document.getElementById(`loading-${id_credito}`).style.display = 'none';
    if (json.success) {
      _cartolas[id_credito] = json.data;
      document.getElementById(`contenido-${id_credito}`).innerHTML = renderCartola(json.data, id_credito);
    } else {
      document.getElementById(`contenido-${id_credito}`).innerHTML =
        `<p style="color:#dc2626;font-size:.88rem">Error al cargar el extracto: ${esc(json.error)}</p>`;
    }
  } else if (!open) {
    document.getElementById(`loading-${id_credito}`).style.display = 'none';
  }
}

const esAdmin = ['Administrador','Gerente'].includes(yo?.perfil);

function renderCartola(data, id_credito) {
  const movs  = data.movimientos || [];
  const saldo = data.saldo_actual || 0;

  if (!movs.length) {
    return `<p style="color:#9ca3af;font-size:.88rem;margin-top:12px">Sin movimientos registrados.</p>`;
  }

  const rows = movs.map(m => {
    const esAbono     = m.tipo === 'ABONO';
    const esHistorico = m.es_historico;
    const tipoTag = esHistorico
      ? `<span class="tag-historico"><i class="bi bi-clock-history me-1"></i>HIST.</span>`
      : esAbono
        ? `<span class="tag-abono"><i class="bi bi-arrow-down-circle me-1"></i>ABONO</span>`
        : `<span class="tag-cargo"><i class="bi bi-arrow-up-circle me-1"></i>CARGO</span>`;

    const trxCell = m.numero_transaccion
      ? `<span class="trx-code">${trxFmt(m.numero_transaccion)}</span>`
      : '<span style="color:#9ca3af;font-size:.78rem">—</span>';

    const abonoCell = esAbono
      ? `<span class="monto-abono">${clp(m.monto)}</span>`
      : `<span style="color:#d1d5db">—</span>`;
    const cargoCell = !esAbono
      ? `<span class="monto-cargo">(${clp(m.monto)})</span>`
      : `<span style="color:#d1d5db">—</span>`;

    const saldoColor = m.saldo_corriente > 0 ? '#15803d' : (m.saldo_corriente < 0 ? '#dc2626' : '#9ca3af');

    // Botón eliminar para admins en filas ABONO con id_transitoria (no históricas)
    const btnDel = (esAdmin && esAbono && m.id_transitoria && !esHistorico)
      ? `<button class="btn-admin-del" title="Eliminar esta transitoria"
           onclick="eliminarTransitoria(${m.id_transitoria}, ${id_credito})">
           <i class="bi bi-trash"></i>
         </button>`
      : '';

    return `<tr>
      <td style="white-space:nowrap">${fmtDt(m.fecha)}</td>
      <td>${trxCell}</td>
      <td>${tipoTag}</td>
      <td style="color:#374151;font-size:.82rem">${esc(m.concepto||'—')}${btnDel}</td>
      <td class="text-right">${abonoCell}</td>
      <td class="text-right">${cargoCell}</td>
      <td class="text-right saldo-col" style="color:${saldoColor}">${clp(m.saldo_corriente)}</td>
    </tr>`;
  }).join('');

  const saldoColor = saldo > 0 ? '#15803d' : '#9ca3af';

  // Panel corrección admin (solo si hay entrada HIST. o discrepancia)
  const hayHist = movs.some(m => m.es_historico);
  const panelAdmin = (esAdmin && hayHist) ? `
    <div class="admin-panel">
      <h6><i class="bi bi-tools me-1"></i>Panel de Corrección — Movimientos Históricos</h6>
      <p style="font-size:.8rem;color:#92400e;margin-bottom:12px">
        Existen movimientos históricos sin detalle de TRX. Puedes corregirlos usando el botón
        <strong>🗑️</strong> en los ABONOs erróneos, o usando el formulario de corrección.
      </p>
      <div class="admin-row">
        <div>
          <label>ID Transitoria a ELIMINAR</label>
          <input type="number" id="fix_del_${id_credito}" placeholder="ID transitoria">
        </div>
        <div>
          <label>ID Transitoria afectada (cargo)</label>
          <input type="number" id="fix_cargo_id_${id_credito}" placeholder="ID transitoria cargo">
        </div>
        <div>
          <label>TRX del cargo</label>
          <input type="number" id="fix_cargo_trx_${id_credito}" placeholder="N° transacción">
        </div>
        <div>
          <label>Monto cargo ($)</label>
          <input type="number" id="fix_cargo_monto_${id_credito}" placeholder="Ej: 191285">
        </div>
        <button class="btn-admin-fix" onclick="aplicarFix(${id_credito})">
          <i class="bi bi-wrench me-1"></i>Aplicar corrección
        </button>
      </div>
    </div>` : '';

  return `
  <table class="cartola-table">
    <thead>
      <tr>
        <th>Fecha</th>
        <th>TRX</th>
        <th>Tipo</th>
        <th>Descripción</th>
        <th class="text-right">Abono</th>
        <th class="text-right">Cargo</th>
        <th class="text-right">Saldo</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
    <tfoot>
      <tr>
        <td colspan="5">SALDO DISPONIBLE</td>
        <td></td>
        <td class="text-right" style="color:${saldoColor};font-size:1rem">${clp(saldo)}</td>
      </tr>
    </tfoot>
  </table>
  ${panelAdmin}`;
}

async function eliminarTransitoria(id_transitoria, id_credito) {
  if (!confirm(`¿Eliminar la transitoria ID ${id_transitoria}?\nEsta acción NO se puede deshacer.`)) return;
  const res  = await fetch(`/api/cuentas-transitorias/transitoria/${id_transitoria}`, { method:'DELETE', headers:H });
  const json = await res.json();
  if (!json.success) return alert('Error: ' + json.error);
  alert('Transitoria eliminada correctamente.');
  delete _cartolas[id_credito];
  document.getElementById(`loading-${id_credito}`).style.display = '';
  document.getElementById(`contenido-${id_credito}`).innerHTML = '';
  // Recargar cartola y lista
  toggleCartola(id_credito);
  cargar();
}

async function aplicarFix(id_credito) {
  const del   = document.getElementById(`fix_del_${id_credito}`).value;
  const cid   = document.getElementById(`fix_cargo_id_${id_credito}`).value;
  const ctrx  = document.getElementById(`fix_cargo_trx_${id_credito}`).value;
  const cmonto= document.getElementById(`fix_cargo_monto_${id_credito}`).value;
  if (!del) return alert('Ingresa el ID de la transitoria a eliminar.');
  if (!confirm(`Eliminar transitoria ${del} e insertar CARGO de $${cmonto}?\nEsta acción NO se puede deshacer.`)) return;
  const res  = await fetch('/api/cuentas-transitorias/admin/fix-transitoria', {
    method: 'POST', headers: H,
    body: JSON.stringify({
      id_transitoria_eliminar:  parseInt(del),
      id_transitoria_cargo:     cid   ? parseInt(cid)   : null,
      numero_transaccion_cargo: ctrx  ? parseInt(ctrx)  : null,
      monto_cargo:              cmonto? parseFloat(cmonto): null,
    })
  });
  const json = await res.json();
  if (!json.success) return alert('Error: ' + json.error);
  alert('✅ Corrección aplicada correctamente.');
  delete _cartolas[id_credito];
  document.getElementById(`loading-${id_credito}`).style.display = '';
  document.getElementById(`contenido-${id_credito}`).innerHTML = '';
  toggleCartola(id_credito);
  cargar();
}

cargar();
</script>
